aemia, associated with a probable metabolic acidosis (low bicarbonate) and volume contraction (elevated urea / creatinine).\n \nOther possible causes of acidosis, hyperkalaemia and hyponatraemia include:\nPotassium sparing diuretics, often with thiazides\nDiabetic ketoacidosis\nEarly renal failure\n \nThe findings, with the clinical history, are suggestive of primary adrenal failure (Addison\u2019s disease). The likely causes in this age-group are:\nAutoimmune\nTB\nMetastases\nAmyloid infiltration\nBilateral adrenal infarction (eg severe sepsis)\n \nInitial management should include basic resuscitation (with attention to airway, breathing and circulation), followed by IV dexamethasone. This averts the acute glucocorticoid deficiency, but does not interfere with synacthen testing like hydrocortisone. Plasma ACTH should also be measured. Once the diagnosis is confirmed, the patient can be changed to maintenance therapy.", "imgs": [], "cat": "ABG"}, {"q": "A 45 year old male with severe pancreatitis has been ventilated in ICU for 4 days. He has no known past history. The following investigations are obtained on day 4.\n \nHb 78\nWCC 11.1\nNeutrophils 8.2\nPlatelets 97\nINR 1.4\nAPTT 37\nFibrinogen 1.9\n \nDescribe your approach to these results", "a": "the patient has moderate-severe anaemia and thrombocytopaenia in the context of critical illness. There is little evidence in the absence of co-morbid cardiac disease or active haemorrhage to transfuse the patient with either platelets or packed cells\nIt is possible that either problem is due to drug effects or liver disease and these should be excluded (eg HITTS screen, tracking platelet count daily, LFTs etc)\n \nComment: anaemia is very common in critically ill patients. There are numerous factors involved including haemodilution, overt or covert blood loss, abnormal red cell production, abnormal iron handling and decreased red cell survival\nThe TRICC trial (reference) demonstrated the equivalence in safety of a restrictive transfusion policy (trigger for transfusion 70) vrs a more liberal strategy (trigger 100). While there are concerns about some groups (for example active cardiac disease), this provides the basis for current recommendations (NHMRC).\nThe results of the TRICC trial have now been replicated in paediatrics (reference), neonates (reference) and cardiothoracic surgery (reference)\nThere is increasing concern about the deleterious effects of red cell transfusion including Transfusion associated lung injury, transfusion related immunomodulation and viral transmission.\n \n \nReferences :\n1.    Hebert PC, Wells G, Blajchman MA et al. A multicenter, randomized controlled clinical trial of transfusion requirements in criticial care. Transfusion Requirements in Critical Care (TRICC) Investivators, Canadian Critical Care Trials Group. NEJM 1999; 340(6):409-17\n2.    Http://www.nhmrc.gov.au/publications/synopses/_files/cp78.pdf\n3.    Lacroix J, Hebert PC, Hutchison JS et al. Transfusion strategies for patients in pediatric intensive care units. NEJM 2007; 356:1609-1619\n4.    Kirpalani H, Whyte RK, Andersen C et al. The premature infants in need of transfusion (PINT) study. J paeds 2006; 149 (3):301-307", "imgs": [], "cat": "Biochemistry"}, {"q": "A 56 year old patient has been in intensive care for 7 days following coronary artery bypass surgery complicated by sepsis. After routine bloods demonstrated a Hb of 81, the following blood tests were obtained.\n \nIron 6mcmol/L (10-30mcmol/L)\nTransferrin 1.2g/L (1.7-3.0g/L)\nFerratin 498mcg/L (30-300mcg/L)\nTransferrin satn  26% (15-45%)\nC-reactive protein 101mg/L (<5mg/L)\n \nDiscuss the results\nList 4 factors which may contribute to the low Hb\nDescribe your management plan", "a": "The results are characteristic of anaemia of the critically ill. Classic features are a normal to raised ferratin, normal to low transferrin with normal transferrin saturations.  CRP may be raised due to sepsis.\n\n \nFactors include : occult blood loss, haemodilution, altered iron handling, impaired bone marrow synthesis of red cells, increased red cell destruction and drug effects\n \nManagement should be directed at reducing unnecessary blood loss, nutritional and haematinic factor support, and possibly blood transfusion.\n \nComment: Anaemia is a common problem in ICU patients, and is at least in part due to altered iron handling. It is possible that the changes are an adaptive response to deprive bacteria of iron stores or improve bacterial killing by phagocytes. Additionally, cytokines such as IL-1 and IL-6 may promote iron storage as ferratin. Lactoferrin, which binds iron more avidly than transferrin, making it unavailable for erythropoiesis, is produced in greater amounts in sepsis.\n \nIt remains controversial as to whether or not transfusion triggers should be higher in patients with stable cardiac disease. (see TRICC cardiac). Current recommendations (NHMRC) allow for clinician discretion when deciding to transfuse these patients between haemoglobins of 70 and 100.\n \nThere is also concern that the trigger should be raised in other subgroups such as neurotrauma. At this stage there is insufficient evidence to support or refute this claim.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 65 year old male is now in ICU following an out of hospital VF arrest. He required 12 minutes of CPR before return of spontaneous circulation, though remained unconscious on arrival in ED. He is now being cooled to 32 degrees in ICU.\n \n2 hours later he is noted to be oozing from his nasogastric insertion site, his central venous catheter insertion site and is noted to have bloody tracheal aspirates.\n \nThe following blood tests are performed:\nAPTT - 43\nINR - 1.6\nPlatelets 141\nD-dimer - positive\nFDPs - positive\nFibrinogen \u2013 4.9\n \nDiscuss the results\nWhy is the patient bleeding despite normal coagulation parameters?", "a": "There is only a mild reduction in coagulation capacity, far less than expected to cause clinically significant bleeding. Platelets may be low and fibrinogen raised due to acute phase response. The absence of significant D-dimers and FDPs, and normal coags rules out DIC. The thrombocytopaenia of this magnitude would not be expected to cause bleeding.\nThe patient may be bleeding due to hypothermia. Alternatively platelet inhibiting agents (perhaps due to pre-existing cardiac disease), or a background platelet dysfunction syndrome may be responsible.\n \nComment: Hypothermia is associated with a functional coagulopathy. It is not detected on formal bloods because these are conducted at 37 degrees in the laboratory and thus may underestimate the clinical coagulation defect", "imgs": [], "cat": "Biochemistry"}, {"q": "A 67 year old male is admitted to ICU with acute shortness of breath. He has recently undergone a right hemicolectomy for a Dukes B carcinoma. An hour ago, he was transfused 2 units of blood after his Hb fell to 82 post operatively.\nOn examination he has bilateral crepitations, is afebrile, arterial saturations of 93% on 6L O2, a heart rate of 110 and a blood pressure of 125/80. His cardiac examination is otherwise unremarkable and his abdomen is soft and non tender.\nThe following CXR is obtained\n \nDiscuss the possible causes and their mechanisms\nWhat other investigations would you perform?", "a": "Possible causes include TRALI (transfusion related acute lung injury), TACO (tranfusion associated circulatory overload), aspiration pneumonitis or ARDS due to sepsis. Less likely is a haemolytic transfusion reaction. TRALI is most likely.\nTRALI is related to immune and non-immune factors causing inflammation and increased permeability of lung capillary membranes. TACO is related to circulatory overload following transfusion and is largely hydrostatic pressure related.\nEvidence of cardiac dysfunction on Echo or other haemodynamic monitoring may suggest TACO. Sputum culture may reveal an infectious pathogen. Evidence of sepsis should also be sought. Evidence of haemolysis (high LDH and unconjugated bilirubin, low haptoglobin) are important to rule out a haemolytic transfusion reaction\n \nComment: TRALI is increasingly being recognised as a complication of blood and component therapy, probably due to improved awareness. TRALI appears to require a \"two-hit\" process, whereby the lung capillaries are primed (often by the underlying disease), followed by exposure to a blood related capillary irritant.\n \nThe irritant in blood products appears to be either antileukocyte antibodies found in donor blood (identified in about 50% of TRALI) or \"biological response modifiers (BRMs) such as cytokines, biologically active lipids and others. These factors appear to activate leukocytes in the lung and also increase capillary permeability.\n \nTRALI is decreasing in incidence in the UK and USA, probably because female plasma (which is associated with TRALI and presence of antileukocyte antibodies) is now not used as FFP, redirected to fractionation products instead.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF210xr.jpg"], "cat": "Echo"}, {"q": "What is this item?\nWhat is its function? \nList 3 ways this may improve patient safety", "a": "Leukocyte filter\nDonor leukocytes are associated with:\n - Non-haemolytic febrile transfusion reactions\n - graft versus host disease\n - allogenic platelet refractoriness (post transfusion purpura)\n - CMV transmission\n - Transfusion associated immunomodulation (TRIM)\n - possible mortality and organ dysfunction in cardiothoracic surgery\n - possible reduction in cancer recurrence\n \nComment: Leukocytes are associated with multiple complications (above) and are not known to serve any useful function to the recipient. From October 2008, all Australian blood services will be offering leukocyte-depleted blood products only, meaning leukocyte filters will no longer be necessary.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF211eq.JPG"], "cat": "Haematology"}, {"q": "A 42 year old man is brought to emergency following a fall from the roof of his 2 storey house. He has a blood pressure of 75/40, a heart rate of 130, is drowsy and confused, and is poorly perfused. His abdomen is distended and tender. His chest examination is unremarkable. Initial pelvic and chest xrays are normal.\n \nFollowing 3 litres of crystalloid and 4 units of O- and 2 units of type specific blood, he remains hypotensive (BP 85/60) and tachycardic (125)\n \nThe following bloods are taken:\nINR 2.1\nAPTT 45\nFibrinogen 0.9\nPlatelets 91\nHb 67\n \nDiscuss your management of this patient", "a": "The patient requires urgent theatre. Prevention of hypotension (Mean Arterial Pressure 70-80) and hypoxia (Sats <93%) is essential in a man with a likely head injury.\nThe coagulopathy must be reversed but not at the expense of delay in progression to theatre. FFP, cryoprecipitate and red blood cells are all required.\n \nComment: Permissive hypotension is a concept increasing in familiarity in management of trauma. In principle it prevents unnecessary support of blood pressure which may increase bleeding by disrupting clot formation, waste blood products and worsen survival. However, it has been studied only in high-volume trauma centres with impressive door-to-theatre times, and often in young fit patients with penetrating trauma. In blunt trauma victims, particularly with head injury, it is not evidence based and probably inappropriate.\n \nConsensus targets in correction of haemostatic defects in trauma include:\n - Hb > 8\n - INR < 1.5\n - fibrinogen > 1.0\n - platelets > 50-100 (higher values preferred in head injuries)\n \nRecent work seems to indicate that earlier, and more aggressive treatment with FFP, appears to improve outcomes.\n \nReferences :\n1.    Bickell WH, Wall MJ Jr, Pepe PE, Martin RR, Ginger VF, Allen MK, Mattox KL. Immediate versus delayed fluid resuscitation for hypotensive patients with penetrating torso injuries. N Engl J Med. 1994 Oct 27;331(17):1105-9\n2.    Borgman M, Spinella P, Perkins J et al. The ratio of blood products transfused affects mortality in patients receiving massive transfusions at a Combat Support Hospital. J Trauma 2007; 63:805-813", "imgs": [], "cat": "X-Ray"}, {"q": "A 31 year old man is transported to ED following a high speed motorbike accident. His observations at the scene were : HR 130 BP 80/50 GCS 12 Sats initially not recordable due to poor perfusion. Following 2L of crystalloid resuscitation pre hospital his blood pressure improves to 95/70, HR 110, sats 97% on 6L O2 and GCS 15. He denies other medical history\nHis initial bloods reveal the following abnormality:\n \nINR 1.9\nAPTT 46\nFibrinogen 1.1\nHb 97\n \nDiscuss the significance of these results\nHow would you manage the problem?", "a": "The bloods reveal a coagulopathy. This may be pre-existing but is likely to reflect the \"coagulopathy of early trauma\". Dilutional effect of blood loss and crystalloid replacement are less likely but may contribute. The coagulopathy of trauma is thought to be due to the activation of protein C anticoagulant pathway and fibrinolysis, rather than consumption of clotting factors in significant amounts.\nThis is clearly significant on two counts. Firstly, the coagulopathy may worsen the apparent hypovolaemic shock. Additionally, early coagulopathy in trauma has been associated with increased mortality.\nManagement of early coagulopathy in trauma must be decisive and prospective. The patient may have hypovolaemic shock and the presence of a coagulopathy may result in a dangerous spiral of bleeding and worsening coagulopathy.\nManagement consists of:\nHaemorrhagic control (splinting fractures, laparotomy etc)\nAgressive defense of normal pH and temperature\nEarly protocol driven access to coagulation products (FFP, cryoprecipitate, platelets, RBCs)\nConsideration for recombinant activated coagulation factor VII\nConsideration for cell salvage techniques\n \nComment: The coagulopathy of trauma may extend to all causes of systemic hypoperfusion and may represent an adaptive mechanism to improve blood flow in the context of poor perfusion. The coagulopathy is not associated with significant reductions in coagulation proteins. Instead, the mechanism appears to be induction of the Protein C anticoagulant and fibrinolysis systems. Dilution of proteins is unlikely in this scenario as coagulation factor levels need be only higher than 25-30% for normal coagulation to occur. However, this effect may exacerbate the problem.\n \nReference :\n1.    Brohi et al. Annals of Surgery 2007;245:812-8", "imgs": [], "cat": "ABG"}, {"q": "This ECG was taken from a 69 year old man with shortness of breath.\n \nWhat does the ECG show?\nDoes this explain his shortness of breath?", "a": "The ECG demonstrates the patient to be in Atrial Fibrillation with a left bundle branch block. There are repolarisation abnormalities associated with the LBBB \u2013 the ECG cannot be interpreted further.\n \nBoth AF and LBBB can indicate the presence of underlying cardiac disease which may be responsible for his shortness of breath. \n \nComment: Left bundle branch block I associated with multiple cardiac defects including :\nAortic stenosis\nMyocardial infarction\nIschaemic heart disease\nConduction system fibrosis\nInfiltrative cardiac disease\nLeft ventricular hypertrophy", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF24ec.jpg"], "cat": "ECG"}, {"q": "A 22 year old female is admitted ventilated to ICU with an overdose of a benzodiazepine. The following arterial blood gas is obtained on arrival in ICU.\n \n\npH\n\t\n7.60\n\t\n7.35-7.45\n\n\nPaO2\n\t\n100\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n20\n\t\n35-45mmHg\n\n\nHCO3\n\t\n19\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n0\n\t\n-3-+3mmol/L\n\n \nWhat does the blood gas show?\nWhy does the bicarbonate fall?\nHow will you adjust the ventilator?", "a": "There is a marked respiratory alkalaemia. The base excess is within the normal range so there is little or no metabolic compensation. The PaO2 is acceptable.\n \nThe bicarbonate falls because as the CO2 is removed, the equilibrium of the Henderson-Hasselbach equation shifts to the left, resulting in consumption of H+ and HCO3-.\n \nH2O + CO2 \u00f3 H2CO3 \u00f3 H+ + HCO3-\n \nThe patient is being over-ventilated. The CO2 is inversely proportional to the minute ventilation, which can be reduced in one of 2 ways, either the respiratory rate or the tidal volume.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "At 2 a.m. the night intern brings an arterial blood sample to ICU from a 71 year old man who is on the medical ward with lobar pneumonia. She is worried that he has received too much oxygen (he is currently on 8L/min).\n \n\npH\n\t\n7.15\n\t\n7.35-7.45\n\n\nPaO2\n\t\n80\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n65\n\t\n35-45mmHg\n\n\nHCO3\n\t\n22\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n-8\n\t\n-3-+3mmol/L\n\n \nWhat do the gases show?\nHow will you advise the intern to adjust the oxygen?", "a": "There is a marked acidosis and the CO2 is high, consistent with a respiratory acidosis. You would expect the HCO3 to be higher, and the base excess is very low, which both indicate the co-existance of a metabolic acidosis (a mixed acidosis). The PaO2 is acceptable, but the A-a gradient is clearly raised, indicating the presence of significant lung pathology. This is type 2 respiratory failure.\n \nThe patient is clearly very sick and needs the oxygen. It is difficult to say if the patient is normally dependent on hypoxic respiratory drive, but there is currently no evidence of a chronic respiratory acidosis. Reducing the oxygen is clearly not appropriate.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "An intern brings the following arterial gases to the ICU. They were taken from a 73 year old woman who was admitted to the medical ward with new onset atrial fibrillation. She has Chronic Obstructed Respiratory Disease due to a heavy smoking history. She is concerned the patient is a \u201cCO2 retainer\u201d.\n \n\npH\n\t\n7.35\n\t\n7.35-7.45\n\n\nPaO2\n\t\n50\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n64\n\t\n35-45mmHg\n\n\nHCO3\n\t\n34\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+5\n\t\n-3-+3mmol/L\n\n \nWhat do the gases show?\nIs this consistent with a CO2 retainer?\nWhat will you advise the intern to do with oxygen therapy?", "a": "The PaO2 is low. We don\u2019t know how much oxygen the patient is on, if any. The pH is borderline and the CO2 is high, consistent with a respiratory acidosis. The base excess of +5 indicates a metabolic alkalosis which in this case is compensatory. The degree of rise of the bicarbonate reflects a chronic respiratory acidosis.\n \nThese gases are consistent with a chronic respiratory acidosis. Patients with this picture are often reliant on their hypoxic drive.\n \nIf oxygen therapy is required, it is important to closely monitor her for loss of her hypoxic drive. This would include close clinical observation (respiratory rate, conscious state) and regular arterial blood sampling. Oxygen therapy should be tailored to maintain sats of no higher than 92%. Oxygen therapy can be closely controlled by using fixed fraction devices such as venturi masks.\n \nComment : Compensation for respiratory acidosis can be assessed with numerous formulae. For example :\nHCO3 should rise 1 (if acute) and 3-4 (if chronic) for every 10mmHg the PaCO2 rises\nStandard base excess changes by 0.4 x the change in PaCO2 in chronic respiratory acidosis, but does not change in acute.\n \nCO2 will rarely rise higher than 45mmol/L\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "You are asked to review a patient on surgical floor who was admitted with peripheral vascular disease. He has become increasingly septic and is now in respiratory distress. The following blood gases are obtained.\n \n\npH\n\t\n7.15\n\t\n7.35-7.45\n\n\nPaO2\n\t\n170\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n25\n\t\n35-45mmHg\n\n\nHCO3\n\t\n8.4\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n-18.6\n\t\n-3-+3mmol/L\n\n \nWhat do the gases show?\nExplain the results\nWhy is the patient short of breath?", "a": "The PaO2 is higher than normal, indicating the patient is on supplementary oxygen. It would be useful to know how much to assess the A-a gradient. There is a marked acidosis and the bicarbonate and Base Excess are extremely low, indicating severe metabolic acidosis. The CO2 is low due to compensatory hyperventilation, but is not as low as it should be.\n \nThe metabolic acidosis is likely to be due to severe sepsis with impaired peripheral perfusion, and the impaired respiratory compensation indicates the patient is tiring or becoming obtunded. He is clearly very sick.\n \nThe patient is hyperventilating to compensate for the metabolic acidosis. He may also have dyspnoea due to worsening lung function such as ARDS or cardiac pulmonary oedema. If we knew the FiO2 we could assess the A-a gradient \u2013 a rise in the A-a gradient would indicate pulmonary pathology.\n \nComment : Acute metabolic acidosis can be assessed for compensation in a number of ways.\nPaCO2 = 1.5xHCO3 + 8\nDPaCO2 = 1.2xDHCO3\nDPaCO2 = DBE\n \nThe easiest rule of thumb to remember is that the PaCO2 should be the same as the first 2 digits after the decimal point of the pH.\n \n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "These gases have been taken from a patient who is semi-conscious and shut down. The resident says at least the PaCO2 is normal.\n \n\npH\n\t\n7.16\n\t\n7.35-7.45\n\n\nPaO2\n\t\n39\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n42\n\t\n35-45mmHg\n\n\nHCO3\n\t\n14.5\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n-14\n\t\n-3-+3mmol/L\n\n \nDescribe the abnormalities\nIs the PaCO2 normal?", "a": "The patient is grossly hypoxic, and even more so if the patient is on oxygen. There is a marked metabolic acidosis. \n \nThe PaCO2 is in the normal range if there is no metabolic abnormality. The PaCO2 would be expected to be low if compensation is occurring. Given it is inappropriately normal, the patient has an uncompensated metabolic acidosis. This is probably because the patient is getting weaker, tired or obtunded.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "A 73 year old female with severe emphysema has worsening respiratory distress on the surgical ward following a hysterectomy. The ICU resident brings you a blood gas.\n \n\npH\n\t\n7.43\n\t\n7.35-7.45\n\n\nPaO2\n\t\n61\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n64\n\t\n35-45mmHg\n\n\nHCO3\n\t\n41.3\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+14\n\t\n-3-+3mmol/L\n\n \nDescribe the acid-base disturbance", "a": "On initial inspection, the primary problem appears to be a metabolic alkalosis with mild hypoxia (assuming she is not on oxygen). In chronic metabolic alkalosis of this magnitude the CO2 would be expected to rise 6-8mmHg. It is clearly higher than this. This indicates respiratory acidosis.\n \nIt is very uncommon for respiratory compensation for metabolic alkalosis to result in a PaCO2 higher than 55mmHg, as oxygenation is impaired and the patient\u2019s hypoxic drive kicks in.\n \nAn acute respiratory alkalosis on a chronic respiratory acidosis can resemble a primary metabolic alkalosis. In this case, the clinical history and the overly high PaCO2 suggest the true diagnosis.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "A surgical patient has had a stormy course in ICU following a colonic anastomotic breakdown. She has been ventilated for 2 weeks and has a tracheostomy. She is in the process of being weaned. The following arterial gases are obtained.\n \npH\n\t\n7.44\n\t\n7.35-7.45\n\n\nPaO2\n\t\n84\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n53\n\t\n35-45mmHg\n\n\nHCO3\n\t\n35\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+10\n\t\n-3-+3mmol/L\n \nWhat are the likely causes?\nHow does this gas influence weaning?\nWhat can be done to change it?", "a": "There is a metabolic alkalosis. The CO2 is higher than expected due to respiratory compensation alone.\n \nThe gases indicate that the patient has a marked alkalosis and a co-existant respiratory acidosis. Metabolic alkalosis can be due to volume depletion, diuretics, post dialysis, acid loss (eg NGT losses) or due to metabolic compensation for chronic respiratory acidosis. It is perpetuated by steroids, hypokalaemia and ongoing volume contraction.\n \nThe presence of a respiratory acidosis suggests the patient\u2019s respiratory function is still not adequate to ventilate without assistance.\n \nMetabolic alkalosis may make weaning difficult by impairing respiratory drive. When this is thought worthy of treatment, the options include Acetazolamide (which increases bicarbonate excretion) or dilute hydrochloric acid infusion.\n \nComment : The body compensates for metabolic alkalosis by hypoventilating and increasing PaCO2. There are a number of methods used to assess the adequacy of compensation including :\nPaCO2 = 0.9(HCO3) + 9\nDPaCO2 = DHCO3 x 0.6\nDPaCO2 = 0.6 x DBE\nThe CO2 = first 2 digits after the decimal point of the pH\n \nThe CO2 rarely exceeds 55mmHg because hypoxia eventuates and stimulates respiration.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "An elderly patient has been admitted with vomiting. He has a history of cardiac failure for which he takes diuretics, and has had a past peptic ulcer. He becomes unresponsive on the ward. The following gases are obtained. The surgical resident thinks the patient has CO2 narcosis\n \n\npH\n\t\n7.59\n\t\n7.35-7.45\n\n\nPaO2\n\t\n34\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n51\n\t\n35-45mmHg\n\n\nHCO3\n\t\n46\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+25\n\t\n-3-+3mmol/L\n\n \nDescribe the blood gases\nIs the resident right?\nWhat are the likely causes?", "a": "The patient has a severe metabolic alkalosis, with respiratory compensation. The patient is severely hypoxic.\n \nNo, this level of hypercapnoea would not explain his unresponsiveness. The patient is likely to be unconscious due to hypoxia, but other causes should also be excluded (eg intracerebral bleed, hypoglycaemia).\n \nThe cause of hypoxia may be related to impaired respiratory drive caused by severe alkalosis, but other causes should be excluded (eg aspiration, pneumonia, severe cardiac failure, pulmonary embolism). The severe alkalosis is likely to be related to loss of acid in vomit / NGT loss, volume contraction, diuretics and possibly alkali therapy for peptic ulcer disease. Additionally, metabolic alkalosis may be compensating for chronic respiratory acidosis, which is unveiled when the latter is rapidly reversed (eg when the patient has a PE).\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "You are referred a 74 year old lady who has become unconscious on the medical ward. Your resident tells you she is known to be a \u201cCO2 retainer\u201d. She says she was on O2 but took it off after the patient became hypercarbic.\n \n\nTime\n\t\n12.10\n\t\n13.00\n\t\n14.50\n\t\n \n\n\npH\n\t\n7.317\n\t\n7.305\n\t\n7.34\n\t\n7.35-7.45\n\n\nPaO2\n\t\n52\n\t\n83\n\t\n23\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n71\n\t\n101\n\t\n84\n\t\n35-45mmHg\n\n\nHCO3\n\t\n35\n\t\n48\n\t\n44\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n6.8\n\t\n10.8\n\t\n14.4\n\t\n-3-+3mmol/L\n\n \nWhy has the patient become unconscious?\nExplain why this occurred", "a": "The patient has become unconscious due to severe hypoxia. This is due to chronic respiratory disease coupled with hypercapnoea-induced alveolar hypoxia.\n \nComment : When PaCO2 rises, the concentration of oxygen in the alveolus must fall. This can cause critical hypoxia when severe enough.\n \nIt makes sense to lower the patients oxygen to the minimum necessary to sustain tissue oxygenation without compromising respiratory drive. Aiming for a PaO2 of 60, or saturations of 90%, is appropriate. Removing the oxygen in this case resulted in severe hypoxia and an altered conscious state.", "imgs": [], "cat": "ABG"}, {"q": "A 34 year old male is brought into emergency unconscious having been found in a car with the engine running and a hose conducting exhaust into the car. There is also a packet of empty Diazepam and a bottle of whiskey in the car. The folloing gases are obtained in the emergency department on 40% oxygen\n \n\npH\n\t\n7.38\n\t\n7.35-7.45\n\n\nPaO2\n\t\n32\n\t\n75-100mmHg\n\n\nSaO2 (co-oximeter)\n\t\n50%\n\t\n>97%\n\n\nPaCO2\n\t\n48\n\t\n35-45mmHg\n\n\nHCO3\n\t\n28\n\t\n24-30mmol/L\n\n \nAt the time the blood gas was taken, the pulse oximeter reading was 65%.\n \nDescribe the blood gases\nWhat is the apparent cause?", "a": "The blood gases demonstrate gross hypoxia and a mild respiratory acidosis. There is a significant gap between the co-oximeter and the pulse oximeter readings for arterial Hb saturations.\n \nThis is classic of carbon monoxide toxicity. However, the patient\u2019s hypoxia is not explained by this \u2013 other problems such as smoke inhalation should be considered.\n \nComment: The co-oximeter of the blood gas measures 6 wavelengths of light as opposed to the 2 measured by pulse oximetry. This enables it to differentiate between Oxyhaemoglobin and carboxyhaemoglobin. The pulse oximeter interprets the latter as oxyhaemoglobin, and thus recorded saturations are over-read. This is reflected in the real Hb saturation measured by the co-oximeter.\n \nThere is an additional clue. At a PaO2 of 32, the haemoglobin should be about 60% saturated \u2013 the low saturation of 50% is due to carbon monoxide.\n \n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "You are called urgently to see a 32 year old man with ARDS who has suddenly become bradycardic. He is on SIMV, tidal volumes 600ml at rate 20/min with a pressure limit of 40cmH2O.\n \n\nTime\n\t\n0700\n\t\n0720\n\n\nHeart rate\n\t\n90\n\t\n45\n\n\nSystolic blood pressure\n\t\n110\n\t\n60\n\n\nRespiratory rate\n\t\n20\n\t\n20\n\n\nPeak inspiratory pressure\n\t\n35\n\t\n15\n\n\nExhaled tidal volume\n\t\n600\n\t\n220\n\n\nFiO2\n\t\n1.0\n\t\n1.0\n\n\nPaO2\n\t\n70mmHg\n\t\n41mmHg\n\n\nPaCO2\n\t\n45mmHg\n\t\n52mmHg\n\n \nWhy is the patient bradycardic?\nWhat is the underlying problem?", "a": "The patient is not being ventilated. The tidal volumes have fallen and the patient has become hypoxic.\n \nThe exhaled tidal volumes and the peak inspiratory pressures have fallen indicating a leak from the circuit. The most likely sites this occurs is at the end of the endotracheal tube, at the humidifier, where the tubing meets the ventilator, and a leak around the endotracheal cuff.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "A 60 year old woman is ventilated for pneumonia with an SIMV rate of 12 breaths / min, a TV of 700ml with PEEP 5cmH2O. The pressure limit is set to 35cmH2O. Your resident calls you at 0130 because she is sweating and \u2018fighting\u2019 the ventilator and the high pressure alarm keeps going off. An extract from her chart is shown below :\n \n\nTime\n\t\n0030\n\t\n0100\n\t\n0130\n\n\nHeart rate\n\t\n90\n\t\n130\n\t\n149\n\n\nSystolic BP\n\t\n120\n\t\n80\n\t\n60\n\n\nRespiratory rate\n\t\n12\n\t\n24\n\t\n16\n\n\nPeak inspiratory pressure\n\t\n24\n\t\n30\n\t\n35\n\n\nExhaled tidal volume\n\t\n700\n\t\n700\n\t\n300\n\n\nFiO2\n\t\n0.4\n\t\n0.4\n\t\n0.6\n\n\nPaO2\n\t\n100mmHg\n\t\n50mmHg\n\t\n54mmHg\n\n\nPaCO2\n\t\n42mmHg\n\t\n49mmHg\n\t\n60mmHg\n\n \nDiscuss the findings\nWhat are the possible causes?\nHow will you manage this?", "a": "The patient has become acutely distressed and is not ventilating adequately. The exhaled tidal volume is reduced because the patient is pressure limiting, resulting in the ventilator cycling from inspiration to expiration. \n \nThe patient may be underventilating because they are fighting the ventilator, but it is more commonly the otherway around. Causes of high pressure limiting include:\nVentilator fault\nObstructed tubing or endotracheal tube\nRight main bronchial intubation\nAcute bronchconstriction\nAcute change in lung compliance eg severe pulmonary oedema\nPneumothorax\nMarked gas trapping (eg due to asthma)\n \nAdditionally an agitated patient may fight the ventilator.\n \nThe patient should be removed from the ventilator and bagged to exclude a ventilator fault. Clinical examination and investigations are required to exclude the above causes. Increased sedation is a last resort.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ABG"}, {"q": "A 67 year old man is admitted with pulmonary oedema and hypotension. His ECG and cardiac enzymes are unremarkable. A pulmonary arterial catheter is inserted and initial values are obtained :\n \n\n \n\t\n \n\t\nNormal range\n\n\nSystolic blood pressure\n\t\n75mmHg\n\t\n \n\n\nMean arterial pressure\n\t\n60mmHg\n\t\n \n\n\nCardiac Index\n\t\n2.15\n\t\n2.5-4.0 L/min/m2\n\n\nSystemic vascular resistance index\n\t\n3407\n\t\n1970-2390 DS.m2/cm5\n\n\nPulmonary vascular resistance index\n\t\n171\n\t\n225-315 DS.m2/cm5\n\n\nLeft ventricular stroke work index\n\t\n25.0\n\t\n50-62 g/m2\n\n\nCentral venous pressure\n\t\n8cmH2O\n\t\n \n\n\nPulmonary artery occlusion pressure\n\t\n17cmH2O\n\t\n \n\n \nDescribe the abnormalities\nWhat management would you institute?", "a": "The patient is hypotensive. There is a low cardiac output and the left ventricular work is reduced consistent with severe heart failure. The high vascular resistance is compensating for the low blood pressure.\n \nSince the left ventricular filling pressure is adequate, and the cardiac output remains low, an increase in contractility is required. This can be achieved with inotropes. Mechanical cardiac assistance (intra-aoric balloon pump (IABP), extracorporeal membrane oxygenation (ECMO) or ventricular assist device (VAD)) may also be required.\n \nComment : In uncommon circumstances the high SVRI may be contributing to the patient\u2019s poor cardiac output state by increasing the resistance the heart pumps against. Reducing the SVRI (with vasodilators) will then result in improved cardiac performance. However, this is fraught with danger, as critical hypotension may eventuate if the cardiac output does not improve.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "imgs": [], "cat": "ECG"}, {"q": "A 72 year old man with severe pancreatitis is admitted to ICU. He has been given fluid on the ward for hypotension and now has evidence of pulmonary oedema. He has required metaraminol while he is intubated and lines inserted. A pulmonary artery catheter is inserted and the following results obtained :\n \n\n \n\t\n \n\t\nNormal range\n\n\nSystolic blood pressure\n\t\n75mmHg\n\t\n \n\n\nMean arterial pressure\n\t\n42mmHg\n\t\n \n\n\nCardiac Index\n\t\n1.55\n\t\n2.5-4.0 L/min/m2\n\n\nSystemic vascular resistance index\n\t\n3507\n\t\n1970-2390 DS.m2/cm5\n\n\nPulmonary vascular resistance index\n\t\n277\n\t\n225-315 DS.m2/cm5\n\n\nLeft ventricular stroke work index\n\t\n11\n\t\n50-62 g/m2\n\n\nCentral venous pressure\n\t\n2cmH2O\n\t\n \n\n\nPulmonary capillary wedge pressure\n\t\n7cmH2O\n\t\n \n\n \nDescribe the abnormalities\nHow do you evaluate the likelihood of response to further fluid challenges?\nWhy has the patient developed pulmonary oedema?", "a": "The patient has severe cardiogenic shock related to poor left ventricular filling. The SVRI is high to compensate for the poor cardiac output. LVSWI is low, but left ventricular function will be better reflected when hypovolaemia is corrected.\n \nThe absolute number of the PCWP or CVP are relatively poor predictors of response to fluid, though the more extreme they are, the more reliable. The trend of the value measured over time, and the dynamic response (ie the change in the value with fluid challenge) are more likely to predict a rise in cardiac output.\n \nThe patient has evidence of low left ventricular pressures yet has developed pulmonary oedema. This is most likely due to onset of Acute Respiratory Distress Syndrome (ARDS)\n \nComment : There are a number of methods suggested to improve prediction of fluid responsiveness. These include :\nSystolic pressure variation with respiration\nStroke volume variation with respiration\nPCWP and CVP (discussed above)\nEnd diastolic volumes (Echo derived)\nGlobal end diastolic volume (PiCCO derived)\nOther\n \nEach has its benefits and limitations.\n \nAlso, beware interpreting haemodynamic data immediately after short acting vasoactive drugs like metaraminol have been administered.", "imgs": [], "cat": "ECG"}, {"q": "The following ECG is recorded in a 70 year old patient who collapsed in a shopping centre and hit his head, causing an intracerebral contusion. Describe the findings.", "a": "The ECG shows complete heart block which may have been responsible for the patient's collapse.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF37ec.jpg"], "cat": "ECG"}, {"q": "You are asked to review an ECG trace recorded overnight when a patient briefly \u201cpassed out\u201d while being rolled following a total hip replacement.\n \nOutline the features of the ECG", "a": "The trace shows complete heart block with a junctional escape rhythm of 45. \n \nComment: Complete heart block may occur for a number of reasons including ischaemia, pre-existing conduction system fibrosis, drug effect, electrolytes, cardiomyopathy, valvular heart disease and high vagal output.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF37ec1.jpg"], "cat": "ECG"}, {"q": "A 35 year old man was given adenosine for SVT. He was given 6mg then 12 mg, but after a pause the rhythm re-occurred. The following trace is recorded after the third dose, this time 18mg.\n \nWhat does the trace show?", "a": "The trace shows P waves during the A-V pause. This reveals that the arrhythmia was not SVT, but an atrial tachycardia.\n \nComment: Adenosine acts by blocking the AV node. Arrhythmias that are generated by circuits that involve the AV node can be terminated by using adenosine to block this pathway.\n \nIn atrial tachycardias, the rhythm is initiated above the AV node, so adenosine simply blocks its conduction to the ventricles for a period before the rhythm resumes.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF39ec.jpg"], "cat": "ECG"}, {"q": "A 24 year old male is referred to ED due an irregular pulse, picked up when he was donating blood.\n \nWhat does the ECG show?", "a": "Irregular rhythm, though each P is followed by a QRS and each QRS is followed by a P. This is sinus arrhythmia.\n \nComment: This is a common variant in young patients", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF41ec%20sinus%20arrhythmia.jpg"], "cat": "ECG"}, {"q": "A 35 year old female presented to emergency following a fit. She was complaining of tingling in the right side of her face and her left hand, and had a vague headache. \n \nNo hard neurological signs are present though she has mild abdominal tenderness and is slightly jaundiced. An occasional petechial spot is noted. Her temperature is 38.2 degrees Celsius.\n \nA blood film revealed a haemoglobin of 86g/L, a platelet count of 49 x109 and a WCC of 12 x 109.\n \nThe following blood film is performed.\n \nWhat does the blood film show?\nWhat is the likely diagnosis?\nWhat treatment has been shown to improve outcomes?", "a": "The film shows evidence of sheared red blood cells (called schistocytes or fragments) which is seen on the blood film of someone with a microangiopathic haemolytic anaemia. The most likely diagnosis is Thrombotic Thrombocytopaenic Purpura.\n \nTTP results from deposition of fibrin and platelets in capillaries and arterioles. This results in consumption of fibrin / platelets and a shearing injury to circulating erythrocytes. Patients tend to present with classic \u2018pentad\u2019 of symptoms \u2013 neurological changes, renal failure, fever, haemolytic anaemia and thrombocytopaenia. Only 40% of cases appear to have all 5 on presentation.\n \nIn addition to supportive management, treatment options include:\nCorticosteroids\nImmunosuppression\nFFP\nImmunoglobulin\nPlasmapheresis\nAntiplatelet drugs\n \nThe data on all treatments is limited. Currently, plasmapheresis with FFP as replacement fluid has the best supportive evidence. In idiopathic TTP, addition of corticosteroids is probably warranted. There is little evidence to support antiplatelet therapy, other antiinflammatories or immunoglobulin at this time.\n \nOther causes of microangiopathic haemolysis include Haemolytic Uraemic Syndrome, HELLP syndrome, DIC and Malignant Hypertension.\n \n \nReferences :\nUp-to-date\nRosen\u2019s Emergency Medicine.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF45hm.jpg"], "cat": "Haematology"}, {"q": "martin testing", "a": "martin testing", "imgs": [], "cat": "Clinical"}, {"q": "A 67 year old male is admitted to ICU with acute shortness of breath. He has recently undergone a right hemicolectomy for a Dukes B carcinoma. An hour ago, he was transfused 2 units of blood after his Hb fell to 82 post operatively.\nOn examination he has bilateral crepitations, is afebrile, arterial saturations of 93% on 6L O2, a heart rate of 110 and a blood pressure of 125/80. His cardiac examination is otherwise unremarkable and his abdomen is soft and non tender.\nThe following CXR is obtained \n \nDiscuss the possible causes and their mechanisms\nWhat other investigations would you perform?", "a": "Possible causes include TRALI (transfusion related acute lung injury), TACO (tranfusion associated circulatory overload), aspiration pneumonitis or ARDS due to sepsis. Less likely is a haemolytic transfusion reaction. TRALI is most likely.\nTRALI is related to immune and non-immune factors causing inflammation and increased permeability of lung capillary membranes. TACO is related to circulatory overload following transfusion and is largely hydrostatic pressure related.\nEvidence of cardiac dysfunction on Echo or other haemodynamic monitoring may suggest TACO. Sputum culture may reveal an infectious pathogen. Evidence of sepsis should also be sought. Evidence of haemolysis (high LDH and unconjugated bilirubin, low haptoglobin) are important to rule out a haemolytic transfusion reaction\n \nComment: TRALI is increasingly being recognised as a complication of blood and component therapy, probably due to improved awareness. TRALI appears to require a \"two-hit\" process, whereby the lung capillaries are primed (often by the underlying disease), followed by exposure to a blood related capillary irritant.\n \nThe irritant in blood products appears to be either antileukocyte antibodies found in donor blood (identified in about 50% of TRALI) or \"biological response modifiers (BRMs) such as cytokines, biologically active lipids and others. These factors appear to activate leukocytes in the lung and also increase capillary permeability.\n \nTRALI is decreasing in incidence in the UK and USA, probably because female plasma (which is associated with TRALI and presence of antileukocyte antibodies) is now not used as FFP, redirected to fractionation products instead.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF210xr.jpg"], "cat": "Echo"}, {"q": "This CT was taken from a 69 year old female with  haemoptysis, acute respiratory failure and renal failure. \n\nDiscuss the findings. \n\nOutline your differential diagnoses.", "a": "The CT shows bilateral ground glass opacities / alveolar opacities, and bilateral pleural effusions. This CT is consistent with a pulmonary haemorrhage type syndrome such as Goodpastures, Wegener\u2019s, SLE or microscopic polyangiitis.  Less likely alternative diagnoses would include severe infection or acute pulmonary oedema", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF05ct.jpg"], "cat": "X-Ray"}, {"q": "A 75 year old man presents to emergency complaining of feeling faint. \n\nDescribe the ECG. \nList 3 factors which may lead to this.", "a": "Junctional rhythm with retrograde P wave.\n\n \nComment : This ECG demonstrates Sinoatrial node block, a junctional escape (\u201cidiojunctional\u201d) rhythm at a rate of 60bpm. There is a p wave appearing between the QRS complex and the T wave. This is being conducted in a retrograde fashion up the bundle of His.\n \nSinus node block occurs because of ischaemia, hyperkalaemia, increased vagal tone or because of drug therapy. Commonly involved drugs include betablockers, calcium antagonists and digoxin.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF22ec.jpg"], "cat": "ECG"}, {"q": "A 45 year old male presents to a peripheral hospital emergency department complaining of severe central chest pain.\n \nDescribe the ECG\nHow would you manage this patient?", "a": "Acute inferolateral AMI. The patient needs oxygen, aspirin, pain relief and monitoring in an acute care area. He should be thrombolysed immediately unless there are contraindications to do so. He should then have anticoagulation with a low molecular weight heparin and be given clopidogrel. Betablockade, a statin and ACE inhibitors should also be commenced.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF25ec.jpg"], "cat": "ECG"}, {"q": "On the morning ward round you are told a patient has had a \u201crun of VT\u201d. The trace is shown here.\n \nWhat is the rhythm?", "a": "The ECG shows 2 sinus beats and 2 bursts of a wide complex tachycardia. The wide complex component shows no P waves and a rate of 140. Of note, the complexes vary considerably in amplitude and frequency, suggesting AF with aberrancy rather than VT.\n \nComment: \nCauses of irregular wide complex tachycardias include:\nMultiple ventricular ectopics\nAF with aberrancy\nAF with bundle branch block\nAF with pre-excitation pathway\n \nVT often shows some irregularity but is usually not marked", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF27ec.jpg"], "cat": "ECG"}, {"q": "A 35 year old male presents to emergency with severe pleuritic chest pain. The following ECG is recorded.\n\n \nDescribe the features of this ECG\nWhat clinical signs would you look for?", "a": "The ECG demonstrates sinus rhythm at a rate of 75 beats per minute. There is scooped ST elevation from V3-6 and less prominent changes laterally. PR depression is also noted in these leads.\n \nThese changes are most likely due to pericarditis, though ischaemia remains possible.\n \nThere is likely to be a pericardial friction rub present on auscultation. There may also be a low grade fever and tachycardia. Evidence of pericardial effusion should be sought (including jugular venous distension and muffled heart sounds) as well as signs of a cause:\nUraemia\nRespiratory viral\nRadiation\nMalignancy\nVasculitis / autoimmune disease\nTuberculosis\nOther\n \n \nComment: \nThe ECG changes of acute pericarditis are said to evolve through 4 phases.\nDiffuse ST elevation and PR depression\nResolution of stage 1 with T wave flattening\nDeep symmetrical T wave inversion\nResolution\n \nSome, all or none of these stages may be seen in individual patients.\n \nA pericardial rub is best heard at the left sternal edge with the patient sitting forwards in expiration. It is classically scratchy or \u201cVelcro-like\u201d and occurs with a biphasic rhythm equal to that of the heart rate.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF106ec.jpg"], "cat": "ECG"}, {"q": "The following recordings are obtained from a 64 year old aboriginal woman with acute shortness of breath and pulmonary oedema.\n\nSite\n\t\nPressure\n\t\nSaturations\n\n\nRight atrium\n\t\n14\n\t\n76\n\n\nRight ventricle\n\t\n81/7\n\t\n73\n\n\nPulmonary artery\n\t\n79/45\n\t\n \n\n\nLeft atrium\n\t\n22 (mean)\n\t\n91\n\n\nLeft ventricle\n\t\n121/5\n\t\n91\n\n\nAorta\n\t\n116/65\n\t\n90\n\n \nDescribe the findings\nWhat is the most likely cause?\nWhen is surgery advised for this condition?\nList 3 complications of this condition", "a": "There is a gradient between left atrial pressure and the left ventricular diastolic pressure. The former is elevated, and there is marked pulmonary hypertension. The normal end diastolic pressure in the left ventricle suggests the symptoms are not due to systolic failure.\n \nThe most likely diagnosis is mitral stenosis, almost certainly due to rheumatic heart disease.\n \nSurgery is indicated once symptoms become severe. Options for surgery include valvulotomy, valvuloplasty and valve replacement.\n \nComplications include:\nPulmonary hypertension\nBacterial endocarditis\nAtrial fibrillation\nSeptic emboli\nEmbolic stroke", "imgs": [], "cat": "ECG"}, {"q": "A 29 year old intravenous drug user presents to emergency shocked with high fevers. A continuous murmur is heard in the left subclavicular region.\n \n\nSite\n\t\nPressure\n\t\nSaturations\n\n\nRight atrium\n\t\n8\n\t\n73\n\n\nRight ventricle\n\t\n48/5\n\t\n72\n\n\nPulmonary artery\n\t\n46/25\n\t\n82\n\n\nPulmonary Capillary Wedge pressure\n\t\n16\n\t\n97\n\n\nAorta\n\t\n110/61\n\t\n97\n\n \nDescribe the values obtained from the Swan-Ganz catheter\nWhat is the most likely cause?", "a": "The increase in oxygenation between the right ventricle and the pulmonary artery can only be due to an abnormal connection between the left and right circulations. This is probably due to a patent ductus arteriosus. The patient has developed pulmonary hypertension due to the increased blood flow, under pressure from the left side.\n \nA PDA can become a source of bacterial endocarditis, usually at the pulmonary artery opening.", "imgs": [], "cat": "Clinical"}, {"q": "A 24 year old female presented to emergency with lightheadedness and palpitations. These resolved spontaneously at triage. A routine ECG was performed\n\n \nInterpret the ECG\nWhat possible rhythms caused the symptoms?", "a": "The ECG demonstrates the Wolff-Parkinson-White syndrome. The classic features of a short PR interval and a slurred upstroke (delta wave) are present. The ST-T changes are repolarisation abnormalities associated with the abnormal depolarisation.\n \nThe most likely rhythm was Supraventricular Tachycardia (Atrioventricular Re-entrant Tachycardia). AF with rapid ventricular conduction is also possible.\n \nComment: Wolff-Parkinson-White syndrome is caused by an abnormal connection between the atria and ventricles (\u201cthe anomalous bundle of Kent\u201d) which allows \u201cpre-excitation\u201d of the ventricular myocardium. This spreads in a slow unco-ordinated way resulting in a slurred upstroke, before the normally conducted depolarisation engulfs it.\n \nThe morphology of the QRS will be different depending on the site of the pathway. In this case, Type B, the connection is on the right side, causing the QRS in V1 to be predominately negative.\n \nApproximately 60% of patients with WPW will have arrhythmias of some type. The most common is \u201corthodromic\u201d atrioventricular re-entrant tachycardia, in which the impulse is conducted down the Bundle of His and back up the Bundle of Kent. This constitutes 90% of SVT while the remainder is \u201cantidromic\u201d.\n \nA much more serious arrhythmia is atrial fibrillation, which can in some circumstances be conducted unhindered to the ventricle resulting in ventricular rates of >300bpm. This can be lifethreatening.\n \nSymptomatic patients should undergo electrophysiological studies to determine their risk of a potentially fatal arrhythmia. Those with high risk (identified by a short refractory time of the accessory bundle) should undergo ablation therapy while those at low risk can be medically managed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF40ec%20right%20sided%20WPW.jpg"], "cat": "ECG"}, {"q": "A 64 year old male has an ECG performed for dull chest pain. \n \nDescribe the ECG\nWhat medications does he take?", "a": "The ECG demonstrates atrial flutter with 5:1 block. This would be unusual unless the patient was taking medications to slow AV conduction, such as a beta-blocker, calcium channel antagonist or digoxin.\n \nIn this case, the patient was on digoxin, as the slurred \u201creverse tick\u201d ST segments laterally suggest. The patient is likely to also be anticoagulated.\n \nComment: There are many causes of atrial flutter. The most common include:\n \nIschaemia\nMitral regurgitation\nrheumatic heart disease\ncardiomyopathy\nhypertension\nalcoholism\nthyrotoxicosis\n \nIt may respond to flecanide, but often requires DC cardioversion after reversing any underlying factors.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF28ec1.jpg"], "cat": "ECG"}, {"q": "A 68 year old male is admitted to ICU with an exacerbation of chronic obstructive airway disease. \n \nWhat does the ECG show?\nWhat is the likely explanation?\nWhat does this imply about his underlying disease?", "a": "The ECG shows a sinus tachycardia, right axis deviation, P pulmonale and a right bundle branch pattern. There is T wave inversion in the right / septal leads\n \nThese features are suggestive of pulmonary hypertension. Usually there is a dominant R wave in V1 (indicating RV hypertrophy), but there is a deep S wave in V6 suggesting clockwise rotation of the heart, commonly seen in patients with hyperexpansion.\n \nThe most likely cause of the patient\u2019s pulmonary hypertension is severe Chronic Obstructive Airways Disease and associated hypoxia. Clinical features and investigations should be sought to confirm this. Other causes should be considered (eg recurrent pulmonary embolism, chronic left to right shunt, Chronic mitral regurgitation).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF217ec.jpg"], "cat": "ECG"}, {"q": "This ECG was taken from a man with diabetic chronic renal failure on admission to hospital. He has had nausea and occasional vomiting.\n \nWhat does the ECG show?\nWhat is your management plan?", "a": "The ECG shows peaked T waves with QRS widening.\n \nThe changes are consistent with hyperkalaemia. With increasing K, the P wave flattens and disappears and the QRS complex becomes very wide. Eventually the ECG resembles a sine wave, shortly before asystolic arrest.\n \nThe treatment should include:\nIntravenous calcium (indicated in QRS widening to \u201cstabilise\u201d the myocardium and prevent a fatal arrhythmia)\nInsulin-dextrose infusion\nIntravenous bicarbonate\nBeta agonists (eg salbutamol nebulisers)\nResonium\n \nConsideration should be given to reversing the underlying or contributing factors (eg IV fluids), and potentially renal replacement.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF218ec.jpg"], "cat": "ECG"}, {"q": "The following ECG is taken from a 44 year old farmer who presented with increasing shortness of breath. \n \nDescribe the ECG", "a": "The ECG shows a wide complex tachycardia with QRS >0.14s. The axis is quite bizarre. The pattern of the QRS resembles a LBBB pattern. There appear to be occasional p waves amongst the QRS complexes not clearly linked with them.  There are no fusion or capture beats.\n \nThe morphology of the QRS is R wave in V1 and qS in V6.\n \nThese features are suggestive of VT, which was subsequently proven with electrophysiological studies.\n \nComment: Diagnosing VT can be very difficult. Brugada criteria can assist identification :\nIf any of the following apply to the ECG, it should be considered VT :\nIs there an absence of an RS complex in all precordial leads?\nIs the R to S interval >100ms in 1 precordial lead?\nIs there evidence of A-V dissociation?\nAre the morphology criteria present in both V1 and V6 for VT?\n \nFavours VT\nV1 : R, qR or RS\nV6 : S. rS or qR\nIdentical to previous ventricular tachycardia tracing\nFavours SVT with aberrancy\nV1 : rsR\u2019\nV6 : qRs\nIdentical to previous SVT tracing\nIdentical to sinus tracing with conduction delay\n \nIn this case, there is inconclusive evidence of A-V dissociation (look for clinical signs or a longer rhythm strip), but the morphology is suggestive of VT. This is supported by the bizarre axis. Haemodynamic stability does NOT rule out VT.\n \nUltimately, electrophysiological diagnosis is required.\n \n \n \nReferences : Rosen et al. Emergency Medicine. Concepts and Clinical Practice.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF44ec%20VT%202.jpg"], "cat": "ECG"}, {"q": "This ECG is of a 49 year old male who has had central chest pain for 1 hour.\n \nWhat does the ECG show?\nWhat would you do?", "a": "The ECG demonstrates an acute anterior myocardial infarction. The patient should be treated with thrombolysis unless percutaneous coronary intervention is immediately available. He also needs aspirin, clopidogrel and when stable beta-blockade. Statin therapy is also warranted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF59ec1.jpg"], "cat": "ECG"}, {"q": "A 70 year old man presents following a fall in which he broke his neck of femur. The anaesthetics registrar is concerned about his ECG. \n \nDescribe your findings\nWhat management does he require?", "a": "The ECG shows an increased PR interval, right bundle branch block and left axis deviation (most likely to be left anterior hemiblock). This combination is known as trifascicular block.\n \nIn this context, the collapse may be due to block of the posterior fascicle causing complete heart block. The patient requires a pacemaker.\n \nComment: Given that the patient has normal atrial electrical activity (ie not in AF) a dual chamber pacemaker should be inserted. This is to maintain normal A-V sequential contraction, which improves cardiac function.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF219ec.jpg"], "cat": "ECG"}, {"q": "A 35 year old patient has taken an overdose of serzone. In the emergency department he has a brief cardiac arrest which spontaneously reverts with ventilation and 30 seconds of CPR.\n \nThe following ECG is recorded post arrest\n \nWhat does it show?\nWhat is the likely cause of the arrest?", "a": "The ECG shows sinus rhythm. There is mild right axis deviation. There is significant flattening of the T waves, which appear to be markedly prolonged.\n \nThis pattern of ECG change is commonly associated with a pattern of polymorphic ventricular tachycardia known as \u201cTorsade de pointes\u201d.\n \nComment: The QT interval is defined as the period between the start of the QRS and the end of the T wave. This is corrected for pulse rate because of the natural variation with RR interval. A rough rule of thumb is that the QT interval should be less than half of the RR interval.\n \nCommon causes of prolonged QT syndrome are:\n\nDrugs\n\t\nAntiarrhythmics\nPhenothiazines\nHaloperidol\nTricyclic antidepressants\nOther\n\n\nElectrolyte disorders\n\t\nLow calcium, magnesium, potassium\n\n\nIschaemia\n\t\n \n\n\nCongenital syndromes\n\t\nRomano-Ward\nOther\n\n\nHypothermia\n\t\n \n\n \nEpisodes of Torsades can be prevented by increasing heart rate (isoprenaline, pacing) and magnesium infusions.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF220ec.jpg"], "cat": "ECG"}, {"q": "A 55 year old man has been ventilated in ICU for 6 days with severe acute pancreatitis. The following tests are obtained on day 8 of his illness.\n \n\nFree T4\n\t\n7.89pmol/L\n\t\nNormal 9.0-23.0\n\n\nFree T3\n\t\n2.1pmol/L\n\t\nNormal 2.9-8.9\n\n\nTSH\n\t\n0.21mU/L\n\t\nNormal 0.3-5.0\n\n \nExplain the results", "a": "Both the T3 and the T4 levels are low. This is suggestive of hypothyroidism. In primary thyroid failure, it would be expected that the TSH would be high. Its low value could be explained by pituitary failure, but this is very uncommon outside specific clinical syndromes. The most likely cause is sick euthyroid syndrome.\n \nIllness affects thyroid hormone metabolism in multiple ways. There is reduced TSH production, altered conversion of T4 to T3 (relatively more rT3 produced), altered binding to circulating proteins and abnormal action at the tissue level.\n \nThe sick euthyroid syndrome is commonly seen and variations are common, but are usually associated with normal to low values of T4, T3 and TSH.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 22 year old woman is admitted to ICU with a massive pulmonary embolus. Prior to commencing intravenous heparin the following blood tests are obtained.\n \n\nProthrombin time\n\t\n13s\n\t\nNormal <13s\n\n\nINR\n\t\n1.4\n\t\n \n\n\naPTT\n\t\n92s\n\t\n<40s\n\n\naPTT 50:50 mixing test\n\t\n90s\n\t\n<40\n\n \n \nExplain the results", "a": "The results suggest that there is an inhibitor of coagulation in the patient\u2019s blood. If there was a deficiency, addition of donor plasma should correct the coagulation abnormality (as only 25-30% of normal concentration of coagulation proteins is required for normal coagulation). This has not occurred.\n \nIn this context, the most likely cause is lupus anticoagulant.", "imgs": [], "cat": "Clinical"}, {"q": "A 23 year old female presents with a history of an overdose of 24g of paracetamol. She is commenced on intravenous N-Acetyl cysteine. Shortly afterwards, the following photo is taken.\n \nDescribe the findings\nWhat would you do?", "a": "The photo demonstrates an urticarial rash.  This is not an uncommon complication of IV NAC.\n\n \n\nThe patient has taken a significant overdose which could easily result in fulminant hepatic failure.  NAC has been shown to reduce the incidence of hepatic failure in this circumstance.  As such, it should be continued wherever possible.\n\n \n\nThis reaction is usually dose dependent.  The infusion should be slowed or ceased, the allergic reaction treated with intravenous steroids, antihistamines and possibly adrenalin, and the infusion restarted at a lower dose.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF63cp1.jpg"], "cat": "Clinical"}, {"q": "The following C-spine films have been taken on a 27 year old female involved in a high speed motor vehicle accident.\n \nWhat is your report of the films?\nWhat would you do now?", "a": "The films are inadequate to exclude cervical spine injury as the lower cervical spine and cervicothoracic junction have not been visualised. Aside from this, the visible vertebral bodies appear intact and are aligned. The facet joints appear enlocated.\n \nThe AP film also demonstrates fractures of the second and third ribs on the right, as well as the right clavicle. There may be abnormal markings in the left lung.\n \nThe lower cervical spine can be imaged better using a Swimmer's view.  However, given the other significant injuries identified here, a CT is probably justified (including contrast imaging of the aorta and great vessels).\n \nComment: It is essential to assess the adequacy of images before reporting them. The lateral cervical spine image should include all vertebrae from the base of the skull to the top of T1.\n \nAdditionally, the lateral masses of C2 should be visible (they are not), so it is more difficult to tell if the lateral masses of C1 are displaced laterally.\n \nAlways check the rest of the film for abnormalities \u2013 in this case, other bony fractures are evident. Detection of these injuries is very important as they are associated with other significant injuries (such as to the great vessels of the chest).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF53xr%2011.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF53xr%203.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF53xr%202.jpg"], "cat": "Biochemistry"}, {"q": "A 16 year old male has been involved in a motorbike accident on a farm and is intubated with a head injury. He is noted to have a swollen arm during the secondary survey.\n \nWhat do the xrays show?\nHow should this be managed?", "a": "There is a fracture through the neck of the radius. Several growth plates are apparent.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF73xr.jpg"], "cat": "X-Ray"}, {"q": "This 59 year old woman was a front seat passanger in a head on car collision. \n \nDescribe the features of this xray", "a": "There is a complicated fracture of the right acetabulum which extends into the pelvic rim. The head of the femur is dislocated posteriorly.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF69xr.jpg"], "cat": "X-Ray"}, {"q": "This 74 year old woman suffered a cardiac arrest under anaesthesia for a routine colectomy. She required 15 minutes of cardiac massage before a rhythm returned.\n \nShe now has sudden spasms (shown) causing a jolting elevation of both arms with grimacing, lasting 1-2 sec.\n \nWhat is this sign?\nWhat is its significance?\nWhat can you do about it?", "a": "These pictures represent Lance Adams myoclonus, known to occur in patients who are deeply comatose following anoxic injury. The jerks begin typically within the first 24 hours after hypoxia and often are characterized by violent flexion movements. When they persist for more than 30 minutes or occur for most of the first post-resuscitation day, the term myoclonic status epilepticus (MSE) is often used, despite the lack of definitive evidence that these movements represent epileptic activity.  Post-hypoxic MSE occurs in approximately 30% to 40% of comatose adult survivors of cardiopulmonary resuscitation and is difficult to control and associated with a poor prognosis.\n \nIn the largest published series of post-hypoxic MSE, Wijdicks and colleagues found that all 40 patients had intermittent generalized myoclonus involving both face and limb muscles. Stimuli, such as touch, tracheal suctioning, and loud handclaps triggered myoclonic jerks in most of the patients. None of the 40 patients who had acute post-hypoxic MSE awakened, improved in motor response, or survived.\n \nIn another review of 18 patients who had post-hypoxic MSE, 14 patients died within 2 weeks and the two patients who survived were left with profound disability.\n \nA meta-analysis of patients who had post-hypoxic MSE paints a similarly grim picture: of 134 pooled cases, 119 (88.8%) died, 11 (8.2%) remained in a persistent vegetative state, and 4 (3.0%) survived. Of the four patients who survived, two were described as having a good outcome.\n \nTreatment of myoclonic jerks in acute PHM is difficult and of questionable usefulness, particularly in the setting of post-hypoxic MSE. Multiple medications have been used, the most common of which are phenytoin, valproate, and benzodiazepines such as clonazepam. In one study of 18 patients who had post-hypoxic MSE, 13 patients required intravenous anaesthesetic agents, including propofol and midazolam. Despite aggressive treatment of the myoclonic jerks, poor prognosis resulting from the severity of underlying brain injury is the rule rather than the exception.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF195cp%20a2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF195cp%20b2.JPG"], "cat": "ECG"}, {"q": "Describe the following X-ray", "a": "Lateral neck plain film\nAdult\nEnlarged epiglottis - consistent with epiglottitis", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/epiglot.jpg"], "cat": "X-Ray"}, {"q": "Describe the abnormalities present in the following X-rays?\n\nWhat would your management be after each X-ray?", "a": "Right tension pneumothorax in child, mediastinal shift\n\nX-ray on left, ICC is placed extrathoracically, requires repositioning\n\nX-ray on right, ICC is correctly placed, lung remains deflated. Ensure ICC patent and connected to underwater seal drain", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/paedxr1a.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/paedxr1b.jpg"], "cat": "X-Ray"}, {"q": "This photo is taken of a patient who is intubated in ICU with a traumatic brain injury.\n \nWhat associated injury has the patient suffered?", "a": "Fractured base of skull.\n \n \nComment: There is blood coming from the ear which may be due to localised trauma to the ear and ear canal. However, the pattern of blood stains on the pillow suggest that there is a mix of blood and some other type of fluid (in this case CSF), indicating there is a communication with the subarachnoid space. There must be a base of skull fracture.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF223cp.JPG"], "cat": "CT"}, {"q": "This is the xray of a 44 year old male who presented after a blow to the back of the head, following a fall from a scaffold. \n \nDescribe the findings", "a": "Adequate film, the alignment is normal.  The bony structures are normal other than a spinous process fracture of C7.  The soft tissues appear normal.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF224xr.jpg"], "cat": "X-Ray"}, {"q": "A 31 year old male presented to emergency with severe abdominal pain and signs of guarding in his lower abdomen. The following abdominal xray is taken.\n \nWhat are the findings?", "a": "Foreign body in rectum. There is no evidence on this film of perforation", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF225xr1.jpg"], "cat": "X-Ray"}, {"q": "This xray was taken from a 50 year old alcoholic man with fevers, weight loss and purulent sputum production.\n \nDescribe the findings", "a": "There is a spherical opacity in the right upper lobe which has an air-fluid level. The wall is indistinct but appears to be fairly think, making tumour possible. This is most likely a lung abscess.\n \nComment: When fluid and air meet, there is loss of the surface tension on the fluid. The result is a flat fluid level rather than the typical meniscus.\n \nA cavitating mass is usually malignancy or an abscess. To distinguish between the two, look at the free wall of the structure. A thick wall (>5mm) is likely to be malignancy, which is usually squamous cell carcinoma, but can on occasion be due to metastasis.\n \nReference : 100 Chest Xray Problems. Corne and Pointon (2007. Churchill Livingstone press", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF226xr.jpg"], "cat": "X-Ray"}, {"q": "Describe the abnormalities in the following CT scan", "a": "There is a large high density lesion consistent with acute haemorrhage arising in theleft lentiform nucleus and extending superiorly into the centrum semiovale. There is surrounding vasogenic oedema and there is significant displacement of the midline structures towards the right side. In addition to this, there is evidence of extensive intraventricular blood in the lateral 3rd and 4th ventricles. The ventricular system is dilated, particularly the lateral ventricles with prominence of the temporal horns.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO02CT.jpg"], "cat": "ECG"}, {"q": "A 44 year old male is brought to emergency shocked following a motorbike accident. The following image is recorded during the FAST examination (right hypochondrium)", "a": "The image shows evidence of a large right sided haemothorax. A chest drain should be immediately inserted, the patient resuscitated and consideration for surgery given. Other sites of blood loss should also be considered.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF227us.jpg"], "cat": "Biochemistry"}, {"q": "Describe the abnormalities on the following CT scan", "a": "Examination shows extensive interstitial alveolar lung change noted bilaterally. Large amount of loculated pleural effusion noted in the left chest, associated with adjacent pulmonary atelectasis, in particular in the lower zone. No major mediastinal, or hilar lymphadenopathy is noted. The cause for the interstitial alveolar change is not apparent.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO01CT.jpg"], "cat": "X-Ray"}, {"q": "Describe the abnormalities in this CT scan taken 20 secs after the injection of intravenous contrast. The scan is  performed for investigation of sudden onset of breathlessness and hypotension. The image provided is the first image to show intracardiac contrast.", "a": "Contrast opacification of the right side of the heart  at 20 seconds (normally opacified around 8 seconds). There is no visible contrast outlining the left side the heart ( normally opacified in most individuals ). Overall impression suggests of impaired cardiac function. \n\nPulmonary arteries not visualised in this image, so pulmonary embolus unable to be excluded. Possible aetiology includes right ventricular failure or biventricular failure.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO04CT.jpg"], "cat": "ECG"}, {"q": "What complication has occurred in this patient?", "a": "The patient has had a left subclavian central line has been inserted. The guidewire has not been controlled adequately and has embolised into the patient.\n \nComment: When inserting any device using the Seldinger technique, particular attention must be paid to maintaining control of the guidewire at all times. In this case, the patient required thoracic surgery to remove the wire.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF228xr.jpg"], "cat": "Equipment"}, {"q": "Describe the abnormalities in the following CT scan", "a": "Examination demonstrates a large left intraparenchymal haemorrhage in the region of the thalamus measuring about 2.8cm extending into the left lateral ventricle.  There is no definite evidence of hydrocephalus.  There is minor midline shift of 3 mm with some mass-effect and surrounding oedema.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO03CT.jpg"], "cat": "CT"}, {"q": "Describe the findings on the following CT scan", "a": "Abdominal CT with contrast. There is free fluid around the liver, and the spleen has haematoma within the parenchyma, and intracapsular blood. There is horseshoe kidney present.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO06aCT.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DINO06bCT.jpg"], "cat": "CT"}, {"q": "A 12 year old boy is brought into emergency by ambulance after a fall from a horse.\n \nWhat does the CT show?", "a": "The CT shows an acute right sided subdural haematoma. There is significant midline shift and right lateral ventricle compression (mass effect) and evidence of hydrocephalus on the left. \n \nComment: A subdural haematoma is usually cresentic, as it conforms to the inside of the skull. An acute bleed is hyperdense compared with the adjacent brain tissue.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF229ct.jpg"], "cat": "CT"}, {"q": "A75 year old woman is ventilated in your ICU after presenting with abdominal pain. She is hypotensive, febrile, with a lactate of 6 mmol/L. Describe the abnormalities present on the following CT images taken from the same study, and list possible diagnoses", "a": "Abdominal CT. There is an elongated cystic density detected in the distal body and tail region of the pancreas. The rest of the pancreas appears unremarkable. Possible aetiologies include pancreatic neoplasm or pseudo cyst. There is a small to moderate amount of ascites fluid noted within the abdomen, next to the liver, and the spleen, the gallbladder appears unremarkable. There is some dilatation of small bowel loops, with a mild degree of mural thickening in some loops. No mass lesion seen in bowel.\n\nRaises possibility of pancreatic cancer with SBO +/- bowel ischaemia", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO05aCT.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DINO05bCT.jpg"], "cat": "Clinical"}, {"q": "Describe the abnormalities present on the following Xray.", "a": "Extensive opacity in the left mid, lower, and upper zone, and the right mid and upper zone. Right sided PICC line noted. The heart size is difficult to assess due to airspace infiltration. Apical pleural thickening is noted on the left and blunting of the left costophrenic angle suggesting the presence of pleural fluid or tissue. The right pleural space is thought to be clear. No obvious focal bony destructive lesion.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO01xr.jpg"], "cat": "X-Ray"}, {"q": "The following Xray was taken in a 35 yr old man in the recovery ward following surgery for open fixation of fractured femur after a motor vehicle accident. Describe the abnormalities and possible aetiologies.", "a": "o      Xray shows diffuse bilateral alveolar infiltrates. No bone injury is seen.\n\no      Given the history the possible aetiologies are;\n\n\u00a7       negative pressure pulmonary oedema secondary to upper airway obstruction following exubation\n\n\u00a7       pulmonary contusion\n\n\u00a7       fat embolism syndrome\n\n\u00a7       pulmonary oedema  (cardiogenic or neurogenic cause)\n\n\u00a7       ARDS secondary extrapulmonary cause", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DINO03xr.jpg"], "cat": "X-Ray"}, {"q": "You are asked to review a 69-year-old man who has had an elective infra-renal aortic aneurysm repair and has become anuric. An extract from his progress chart is shown below:\n\n \n\nTime\tPulse\tSystolic BP\tCVP\tUrine Output\n2200\t90\t140\t12\t60\n2300\t95\t130\t14\t50\n2400\t90\t135\t15\t80\n0100\t90\t120\t13\t0\n0200\t90\t140\t15\t0\n0300\t94\t145\t16\t0\n0400\t90\t130\t16\t0\n\nWhat is the most likely cause of his oliguria?\n\nWhat investigations would you perform?", "a": "Absolute and sudden cessation of good urine flow, in the absence of hypotension, is almost always due to catheter blockage.\n\nThe abdomen should be palpated and the catheter washed out to diagnose and rectify the problem.\n\n \n\nComment: Although renal failure due to acute onset chronic renal disease may occur, especially if there is operative hypotension or supra-renal aortic clamping, this is only considered after pre-renal failure \u2013 a much more common and more simply treated problem \u2013 is excluded.\n\n \n\nThe above case is based on an extracts from Practical Intensive Care Medicine by Charlie Corke.\n\n This book can be obtained from www.eruditemedicalbooks.com.", "imgs": [], "cat": "Biochemistry"}, {"q": "An 85 year old man has been bedridden for 3 days in a supported accommodation with pneumonia.  The following electrolyte results have been obtained :\n\n \n\nParameter\n\n\t\n\nValue\n\n\t\n\nRange\n\n\n\n\nNa\n\n\t\n\n171\n\n\t\n\n135-145mmol/L\n\n\n\n\nK\n\n\t\n\n3.8\n\n\t\n\n3.5-5.0mmol/L\n\n\n\n\nCl\n\n\t\n\n134\n\n\t\n\n93-108mmol/L\n\n\n\n\nHCO3-\n\n\t\n\n38\n\n\t\n\n22-30mmol/L\n\n\n\n\nUrea\n\n\t\n\n35\n\n\t\n\n3.0-8.0mmol/L\n\n\n\n\nCreatinine\n\n\t\n\n200\n\n\t\n\n60-120mcmol/L\n\n\n\n\nGlucose\n\n\t\n\n5\n\n\t\n\n3.0-5.5mmol/L\n\n \n\nUrine biochemistry\n\n\t\n\n \n\n\n\n\nNa\n\n\t\n\n<5mmol/L\n\n\n\n\nOsmolality\n\n\t\n\n924mOsm/l (measured)\n\n \n\nInterpret these results", "a": "The patient is hyperosmolar.  Calculated osmolality = (2 x Na) + urea + glucose = 342 + 35 + 5 = 382.  The urine sodium is low due to increased sodium reabsorption in response to a low intravascular volume, so the very high urinary osmolality is appropriate as the patient is maximally attempting to retain water in the face of his plasma hyperosmolality.\n\n \n\nThe above case is based on an extract from Practical Intensive Care Medicine by Charlie Corke.\n\n This book can be obtained from www.eruditemedicalbooks.com.", "imgs": [], "cat": "ABG"}, {"q": "A 60 year old male presents to the emergency department with abdominal pain and vomiting increasing over the last week.  His history includes hypertension and type 2 diabetes me
