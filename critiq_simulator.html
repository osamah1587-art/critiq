<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Crit-IQ Data Interpretation</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crit-IQ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00b4d8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0d1117;--surface:#161b22;--border:#21262d;
  --teal:#00b4d8;--red:#f85149;--green:#3fb950;--yellow:#d29922;--orange:#f0883e;--purple:#a371f7;--blue:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
/* HEADER */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#hdr h1{font-family:var(--mono);font-size:13px;color:var(--teal);letter-spacing:.08em;text-transform:uppercase}
#hdr-meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
#prog-bar{height:3px;background:var(--border)}
#prog-fill{height:100%;background:var(--teal);transition:width .3s}
#main{max-width:800px;margin:0 auto;padding:28px 20px 80px}
/* START */
#scr-start{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:24px;text-align:center}
.logo .big{font-family:var(--mono);font-size:38px;font-weight:600;color:var(--teal);line-height:1}
.logo .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:6px}
.stats-row{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stat{background:var(--surface);padding:14px 20px;text-align:center;min-width:90px}
.stat .v{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--teal)}
.stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.filter-section{width:100%;max-width:620px}
.filter-label{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;text-align:left}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:4px;transition:all .15s}
.cat-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(0,180,216,.08)}
.mode-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mode-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 18px;font-family:var(--mono);font-size:12px;cursor:pointer;border-radius:4px;transition:all .15s}
.mode-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(0,180,216,.08)}
.btn-start{background:var(--teal);color:#000;border:none;padding:13px 48px;font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:4px}
/* QUESTION */
#scr-q{display:none}
.q-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.q-num{font-family:var(--mono);font-size:12px;color:var(--muted)}
.q-cat-tag{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:3px;border:1px solid;text-transform:uppercase;letter-spacing:.05em}
/* Category colors */
.tag-ABG{color:#00b4d8;border-color:rgba(0,180,216,.4);background:rgba(0,180,216,.08)}
.tag-ECG{color:#a371f7;border-color:rgba(163,113,247,.4);background:rgba(163,113,247,.08)}
.tag-XRay,.tag-X-Ray{color:#d29922;border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.08)}
.tag-CT{color:#f0883e;border-color:rgba(240,136,62,.4);background:rgba(240,136,62,.08)}
.tag-Echo{color:#3fb950;border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.08)}
.tag-Biochemistry{color:#58a6ff;border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.08)}
.tag-Haematology{color:#f85149;border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.08)}
.tag-MRI,.tag-Ultrasound,.tag-Waveforms,.tag-Equipment,.tag-Clinical{color:#8b949e;border-color:rgba(139,148,158,.4);background:rgba(139,148,158,.08)}
/* Image viewer */
.img-viewer{margin-bottom:16px;text-align:center}
.img-viewer img{width:100%;max-width:600px;border-radius:8px;border:1px solid var(--border);cursor:zoom-in;display:block;margin:0 auto}
.img-thumbs{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.img-thumb{width:60px;height:45px;object-fit:cover;border-radius:4px;border:2px solid var(--border);cursor:pointer;opacity:.6;transition:all .15s}
.img-thumb.active{border-color:var(--teal);opacity:1}
/* Question card */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px}
.q-text{font-size:15px;line-height:1.8;color:var(--text)}
/* Lab table */
.lab-table{width:100%;border-collapse:collapse;margin:16px 0;font-family:var(--mono);font-size:13px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.lab-table th{background:rgba(0,180,216,.12);color:var(--teal);padding:9px 14px;text-align:left;font-weight:600;border-bottom:1px solid rgba(0,180,216,.3)}
.lab-table td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text)}
.lab-table tr:last-child td{border-bottom:none}
.lab-table tr:hover td{background:rgba(255,255,255,.03)}
.val-abnormal{color:var(--red);font-weight:600}
.val-normal{color:var(--green)}
/* Answer */
.ans-box{background:rgba(63,185,80,.04);border:1px solid rgba(63,185,80,.25);border-radius:8px;padding:22px;margin-bottom:16px;display:none}
.ans-box.show{display:block}
.ans-label{font-family:var(--mono);font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ans-label::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;flex-shrink:0}
.ans-img-wrap{margin-bottom:14px}
.ans-img-wrap img{width:100%;max-width:600px;border-radius:8px;border:1px solid rgba(63,185,80,.3);cursor:zoom-in;display:block;margin:0 auto 8px}
.ans-text{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap}
/* Buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:11px 24px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;border-radius:4px;border:none;transition:all .15s;letter-spacing:.03em}
.btn-reveal{background:var(--teal);color:#000}
.btn-reveal:hover{background:#00c8f0}
.btn-next,.btn-finish{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-next:hover,.btn-finish:hover{border-color:var(--teal);color:var(--teal)}
.self-row{display:none;gap:8px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted);flex-wrap:wrap;margin-top:4px}
.self-row.show{display:flex}
.btn-self{padding:8px 18px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;border-radius:4px;border:1px solid;background:transparent}
.btn-got{color:var(--green);border-color:rgba(63,185,80,.5)}
.btn-got:hover{background:rgba(63,185,80,.08)}
.btn-miss{color:var(--red);border-color:rgba(248,81,73,.5)}
.btn-miss:hover{background:rgba(248,81,73,.08)}
/* Results */
#scr-results{display:none}
.res-hdr{text-align:center;margin-bottom:32px}
.res-hdr h2{font-family:var(--mono);font-size:28px;color:var(--teal);margin-bottom:6px}
.res-hdr p{color:var(--muted);font-size:13px}
.big-score{text-align:center;margin:24px 0}
.score-num{font-family:var(--mono);font-size:64px;font-weight:600;line-height:1}
.score-pct{font-family:var(--mono);font-size:20px;color:var(--muted);margin-top:4px}
.score-g{color:var(--green)}.score-m{color:var(--yellow)}.score-b{color:var(--red)}
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-name{width:120px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px}
.cat-score-val{font-family:var(--mono);font-size:12px;width:55px;text-align:right}
.rev-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:24px 0 14px}
.rev-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.rev-item:hover{color:var(--teal)}
.dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-g{background:var(--green)}.dot-r{background:var(--red)}.dot-n{background:var(--muted)}
.btn-restart{background:var(--teal);color:#000;border:none;padding:13px 48px;font-family:var(--mono);font-size:14px;font-weight:600;cursor:pointer;border-radius:4px;display:block;margin:32px auto 0}
/* Lightbox */
#lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
#lb.show{display:flex}
#lb img{max-width:96vw;max-height:88vh;border-radius:6px}
#lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer;line-height:1;font-family:var(--mono)}
@media(max-width:600px){#main{padding:20px 14px 60px}.score-num{font-size:48px}.stats-row{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="hdr">
  <h1>Crit-IQ // Data Interpretation</h1>
  <div id="hdr-meta">529 questions</div>
</div>
<div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
<div id="main">

<!-- START SCREEN -->
<div id="scr-start">
  <div class="logo">
    <div class="big">Data Interpretation</div>
    <div class="sub">Crit-IQ Simulator &mdash; 529 Questions</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="v">529</div><div class="l">Questions</div></div>
    <div class="stat"><div class="v" id="best-disp">&mdash;</div><div class="l">Best %</div></div>
    <div class="stat"><div class="v" id="done-disp">0</div><div class="l">Reviewed</div></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Category Filter</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label" style="margin-bottom:10px">Mode</div>
    <div class="mode-row">
      <button class="mode-btn on" onclick="setMode('seq',this)">Sequential</button>
      <button class="mode-btn" onclick="setMode('rand',this)">Random</button>
      <button class="mode-btn" onclick="setMode('wrong',this)">Review Wrong</button>
    </div>
  </div>
  <button class="btn-start" onclick="startExam()">Start Session</button>
  <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">Source: Crit-IQ Data Interpretation</div>
</div>

<!-- QUESTION SCREEN -->
<div id="scr-q">
  <div class="q-hdr">
    <span class="q-num" id="q-num-lbl">Q1 / 529</span>
    <span class="q-cat-tag" id="q-cat-tag">ABG</span>
  </div>
  <div class="q-card">
    <div class="img-viewer" id="q-img-viewer" style="display:none"></div>
    <div class="q-text" id="q-body"></div>
  </div>
  <div class="ans-box" id="ans-box">
    <div class="ans-label">Model Answer</div>
    <div class="ans-img-wrap" id="ans-img-wrap" style="display:none"></div>
    <div class="ans-text" id="a-body"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-reveal" id="btn-reveal" onclick="revealAns()">View Answer</button>
    <button class="btn btn-next" id="btn-next" onclick="nextQ()" style="display:none">Next &rarr;</button>
    <button class="btn btn-finish" id="btn-fin" onclick="showResults()" style="display:none">Finish</button>
  </div>
  <div class="self-row" id="self-row">
    <span>Self-assess:</span>
    <button class="btn-self btn-got" onclick="markSelf(true)">&#10003; Got it</button>
    <button class="btn-self btn-miss" onclick="markSelf(false)">&#10007; Missed</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="scr-results">
  <div class="res-hdr"><h2>Session Complete</h2><p id="res-sub"></p></div>
  <div class="big-score">
    <div class="score-num" id="res-num"></div>
    <div class="score-pct" id="res-pct"></div>
  </div>
  <div id="cat-breakdown"></div>
  <div class="rev-lbl">Question Review</div>
  <div id="rev-items"></div>
  <button class="btn-restart" onclick="goHome()">New Session</button>
</div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLB()">
  <div id="lb-close">&#10005;</div>
  <img id="lb-img" src="" alt="">
</div>

<script>
var ALL_Q = [{"q": "You are asked to assess a 30 yr old schizophrenic woman with no known medical history who has presented to the Emergency Department with a reduced level of consciousness. Clinically she appears euvolaemic.\n\nDescribe the abnormalities present in the following results.\n\nList the possible aetiologies\n\nNa\n\n\t114 mmol/L\t(136-148)\nK\t2.8 mmol/L\t(3.5-5.0)\nCl\t77 mmol/L\t(98-107)\nHCO3\t27 mmol/L\t(22-32)\nUrea\t2.2 mmol/L\t(2.5-7.0)\nCr\t45 umol/L\t(30-90)\nGlucose\t7.5 mmol/L\t \nOsm\t242 mmol/L\t \nUrine Osm\t52 mOsmol/kg\t(50-1200)\nUrine Na\t15 mmol/L", "a": "Abnormalities: Hypoosmolar, hyponatraemia, hypochloraemia with normal osmolar gap (calculated osmolarity 238 mmol/L, osmolar gap 4). Urine low osmolality with low urinary sodium\n\nAetiology: Hypoosmolar, hyponatraemia, with normal renal function and maximally dilute urine. Most likely H2O intoxication. Other aetiologies that are unlikely include;\n\nSIADH (unlikely as urine maximally dilute, urinary sodium < 20 mmol/L)\nHypothyroidism\nDrugs \u00d4\u00c7\u00f4\ncarbamazepine,\nchlorpropramide\nGlucocorticoid deficiency (unlikely as expect hyperkalaemia)", "imgs": [], "cat": "ABG"}, {"q": "What does this test show?\n\nWhat is the treatment of choice?", "a": "Germ tube test, demonstrating the propagation of Candida albicans. Fluconazole is the treatment of choice.\n\nComment : The germ tube test involves incubating an inoculum in serum warmed to 37 degrees. Only Candida albicans (with few exceptions) grows by sprouting \u2018germ tubes\u2019 to generate hyphae under these conditions. The presence and morphology of the germ tubes can give an indication of the presumptive species. Results of the germ tube test can be available in as little as 3 hours.\n \nThe parallel edges of the germ tube sprouts indicate that the species is albicans. C. albicans was formerly thought to be universally sensitive to fluconazole, but there is emerging evidence of resistance in some parts of the world.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF01mc.jpg"], "cat": "Clinical"}, {"q": "Describe the findings of the following xray.\nIf the patient was haemodynamically unstable, describe your management plan", "a": "Open book fracture of the pelvis with significant pubic diastasis and some superior displacement of the left hemipelvis. Air is noted in the soft tissues of the perineum, the cause of which is unclear.\n\nManagement acutely involves standard trauma management (Airway and cervical spine, breathing, circulation). A haemodynamically unstable patient should have the pelvis stabilised with a pelvic sling or brace. Ongoing instability requires exclusion of other sources of bleeding / hypotension, orthopaedic stabilisation of the pelvis and consideration of angiography to exclude and treat arterial pelvic bleeding. The role of the medical anti-shock trousers (MAST) and laparotomy with pelvic exploration is disputed. Careful attention to correcting coagulopathy and preventing hypothermia are essential.\n \nComment : Bleeding from a fractured pelvis can be torrential. Due to the loss of the tamponade effect, an open book fracture can bleed in excess of 8 L. Bleeding is usually venous, though up to 10% can be amenable to angiographic embolisation. Often the bleeding will eventually tamponade itself, which is improved by reducing the fracture (sling, surgical, MAST suit). Surgical options include extraperitoneal pelvic packing (via a suprapubic incision) and ligation of involved arteries.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF02xr.jpg"], "cat": "X-Ray"}, {"q": "Identify this piece of equipment\nWhat are the indications for its use\nList 4 acute complications", "a": "Minitrach.\n\nEmergency airway and for access to airway for suctioning.\n \nBleeding, infection, tracheal damage, pneumothorax, pain, tracheal transection, other\n \nComment : Some patients may continue to struggle with clearance of secretions due to impaired cough or because of tenacious secretions. A minitrach can retain access to the airway in these circumstances, and can maintain a tract so that emergent reinsertion of a tracheostomy tube can occur.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF08eq.jpg"], "cat": "X-Ray"}, {"q": "A patient involved in a high speed motor vehicle accident has the following noted on secondary survey. \nWhat is the finding? \nWhat would you do?", "a": "Hyphaema\n\n \nManagement includes standard care, exclusion of head injury, quiet restful environment, limited eye movement, avoidance of anticoagulants. Opthalmological opinion is required. Careful observation required as obstruction of aqueous flow may occur leading to acute glaucoma.\n \nComment : It is important to examine a patient thoroughly during the secondary and tertiary surveys to avoid missing life-changing injuries such as an eye injury. A hyphaema has a significant rate of rebleeding, a complication that can threaten long term sight, and the risk is related to the delay in appropriate therapy.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF13cp.JPG"], "cat": "Clinical"}, {"q": "A 49 year old morbidly obese male is on the ward following a total knee replacement. He has a PCA running. You are asked about his pre-operative blood gases.\n\nVariable\n\t\nValue\n\t\nRange\n\n\nFiO2\n\t\n0.21\n\t\n \n\n\npH\n\t\n7.32\n\t\n7.35-7.45\n\n\nPaO2\n\t\n41\n\t\n75-100\n\n\nPaCO2\n\t\n64\n\t\n35-45\n\n\nHCO3-\n\t\n33.9\n\t\n24-30\n\n\nSBE\n\t\n6.1\n\t\n-3 - +3\n \nDescribe the acid-base abnormality\nWhat is the likely cause?\nWhat does Standard Base Excess mean?", "a": "The patient has a chronic, compensated respiratory acidosis. This is most likely due to alveolar hypoventilation due to Obstructive Sleep Apnoea. There is a rise in the A-a gradient (29) which suggests there is also a problem with his lungs.\n\n \nComment : Base excess is the amount of acid required to bring the system back to a normal pH (7.40) when the CO2 has been corrected to 40mmHg and temperature 37 degrees. This therefore represents the metabolic contribution to the acid-base disturbance. This component may be part of the primary problem or may be compensatory. This is the \u2018actual base excess\u2019 or ABE.\n \nBuffering however is influenced by the presence of haemoglobin, and consequently Standard Base Excess is corrected for Hb to more accurately reflects the base excess in the extracellular fluid.\n \nIts also worth noting that when blood is deoxygenated the SBE moves slightly in the alkaline direction (becomes more positive).", "imgs": [], "cat": "ABG"}, {"q": "The following waveform has been taken from a patient ventilated in ICU following an episode of respiratory failure.\n \nWhat mode is the patient in?\nComment on breath A and breath B.", "a": "The patient is on SIMV, pressure limited, set to inspiratory pressure of 15, PEEP 10. The pressure support appears to be 15cmH2O. The rate must be set at about 12 breaths per minute.\n\n \nBreath A is a pressure supported voluntary breath, while breath B occurs after a pause and is a mandatory breath.\n \nComment: Voluntary breaths appear different to mandatory breaths in SIMV mode. They can be identified by the dip in airway pressure immediately before the breath is delivered, which is what the ventilator uses to sense patient effort.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF78wf.jpg"], "cat": "Waveforms"}, {"q": "The following biochemistry is obtained from a 44 year old Thai man who presents with increasing weakness.\n \nDescribe the findings\nWhat is the likely cause?", "a": "The bloods demonstrate a classic pattern of hyponatraemia and hyperkalaemia, renal impairment and mild metabolic acidosis. This is in keeping with Addison\u2019s disease.\n\n \nComment: The pattern of hyperkalaemia and hyponatraemia can be due to:\nDKA\nAcute renal failure with water retention\nPotassium sparing diuretics\nAddison\u2019s disease", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF80bc.jpg"], "cat": "Biochemistry"}, {"q": "The following CT is from a 19 year old who was assaulted at a pub.\n\n \nDescribe the findings", "a": "There is oedema in the left frontal lobe and blood in the subarachnoid space. There is no evidence of midline shift.\n\n \nComment: Blood in the subarachnoid space conforms to the shape of the sulci and gyri.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF83ct.jpg"], "cat": "CT"}, {"q": "A 35 year old male is admitted to intensive care with severe shock. \n\n \nWhat do the results of the full blood examination reveal?", "a": "Acute leukaemoid reaction (severe neutrophilia with marked left shift) due to severe sepsis. The absence of blasts goes against underlying leukaemia. Also note mild anaemia and thrombocytopaenia.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF85hm.jpg"], "cat": "Biochemistry"}, {"q": "What is the following investigation?\n\nWhat does it show?\n\nWhat will you do now?", "a": "This investigation is a Tc-99 radionucleotide cerebral perfusion scan. It shows the absence of flow in the cerebral vessels, and confirms brain death.\n\nThis test allows brain death to be declared \u2013 this is required in two circumstances. 1) to allow organ donation in situations where clinical testing cannot occur and 2) to allow withdrawal of treatment when family are unable to acknowledge futility", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF92si.jpg"], "cat": "Clinical"}, {"q": "14 year old boy who was kneed to stomach while playing football. \nDescribe the findings.\nDescribe your management.", "a": "Xray shows free abdominal air which likely represents a hollow viscus injury. A fluid level is noted suggesting intra-abdominal free fluid. If stable, CT can be considered to delineate the injuries prior to surgery and to exclude additional injuries but the patient will require laparotomy, supportive care and antibiotics.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF06xr.jpg"], "cat": "X-Ray"}, {"q": "The following CT was taken from a 15 year old with abdominal pain after been tackled playing rugby. Describe the findings.", "a": "The CT demonstrates free intraperitoneal air, free fluid, no evidence of solid organ injury. There is air around the ligamentum venosum", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF07ct.jpg"], "cat": "Clinical"}, {"q": "Identify this piece of equipment. \n\nDescribe how it is inserted. \n\nList 3 complications", "a": "Interosseous needle. \n\nFlat part of upper tibia, sterile procedure, local anaesthetic, screwing motion into bone. Aspirate and flush (+/- blood tests), need pressure to get fluid in.\n\nComplications include infection / osteomyelitis, compartment syndrome, bleeding, dislodgement, growth plate disruption, other.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF09eq.jpg"], "cat": "Equipment"}, {"q": "List 4 safety features that ensure the correct gas is given", "a": "Pin index safety system\n\nCylinder colour\n\nNozzle colour\n\nDiameter index safety system\n\nLabelled yolk\n\nKnob texture\n\nComment : Medical gas cylinders are colour coded to provide a visual cue to their contents. \n\nOxygen cylinders have black body with a white top, as in this case.\nNitrous oxide cylinders are completely blue\nEntonox cylinders have a blue body with a top divided into quarters alternating blue and white\nMedical air has a grey body with a white and black top\nCarbon dioxide is grey with a black stripe on the body\n \nThe wall connectors reflect this, with suction ports in yellow", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF10eq.JPG"], "cat": "Biochemistry"}, {"q": "Identify this piece of equipment. \nWhat are the indications for its use? \nHow often must you change it?", "a": "N95 mask. \n \nUsed for respiratory droplet infection spread (eg SARS, pandemic flu) for general presence in room (not procedures), and reverse barrier nursing in severely immunocompromised patients.\n \nShould be discarded after 4-6 hours use (WHO recommendation) and should not be reapplied if taken off\n \nComment : N95 masks are certified to filter 95% of particles of a particular test size. The N refers to the ability to resist oil (N stands for Non-oil resistant). R means resistant to oil and P means oil proof.\n \nWhile these viruses may be too small for the pores in the masks, they often are droplet spread, and the droplets are big enough to get filtered out.\n \nThe Centre for Disease Control currently recommend that for procedures likely to produce droplets (airway suctioning, intubation etc) a higher level of mask protection is required.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF11eq.JPG"], "cat": "Equipment"}, {"q": "Describe the findings on the clinical photo.\nWhat is the likely diagnosis?", "a": "Purpuric rash classic of Neisseria meningitidis\n\nComment : Purpura fulminans is commonly seen in florid Neisseria meningitidis. However, there are other causes :\n\nProtein C or protein S deficiency (neonatal)\nDisseminated intravascular coagulation\nSevere sepsis of other causes (pneumococcal sepsis particularly)", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF14cp.jpg"], "cat": "Clinical"}, {"q": "What is this piece of equipment?\nWhat are the indications for its use?", "a": "Medical AntiShock Trousers\n \nPreviously recommended for severe exsanguinating pelvic fractures. Not commonly utilised now.\n \nComment : MAST suits improve blood pressure but have been associated with worse outcomes, particularly in the subgroup with thoracic trauma. The use of a MAST suit remains controversial, but may have a role when definitive therapy is delayed (eg transportation to definitive centre). Complications include exacerbation of limb ischaemia and pressure ulcers over bony prominences, possibly increasing bleeding due to improved MAP, and decompensation with removal.\n \nMAST suits are generally contraindicated if a patient has a ruptured diaphragm, is pregnant or is in pulmonary oedema.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF15eq.JPG"], "cat": "Biochemistry"}, {"q": "What is this piece of equipment?\nHow does it work?\nWhat is the square wave test?", "a": "This is a pressure transducer that utilises a Wheatstone bridge. The transducer works by the blood pressure pushing against an internal plate with an integrated strain gauge. When the pressure is applied, the plate/strain gauge distorts slightly. That slight distortion causes the internal resistance of the gauge to change. That change in resistance is proportional to the strain induced and this change can be visually displayed on your patient monitor in the shape of a waveform to indicate changes in arterial pressure.\n \nThe square wave test checks the response of the entire transducer system to verify that the measurements are accurate and free of any distortion. It involves snap-flushing the transducer (generating a square wave on the monitor). The response to releasing the flush gives information on the harmonic characteristics of the system. An underdamped trace reverberates up and down more than once before returning to the arterial pressure waveform, while an overdamped trace does not reverberate at all.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF16eq.JPG"], "cat": "Waveforms"}, {"q": "A 76 year old man is recovering from abdominal sepsis following a routine colectomy. He is known to have smoking related lung disease. He was haemofiltered until yesterday and still has high nasogastric aspirates. He is struggling to wean from the ventilator and his CO2 remains high.\n \nThe following Arterial Blood Gases are obtained.\n\n \n\nFiO2\n\t\n0.21\n\t\n \n\n\npH\n\t\n7.54\n\t\n7.35-7.45\n\n\nPaO2\n\t\n61\n\t\n75-100\n\n\nPaCO2\n\t\n52.1\n\t\n35-45\n\n\nHCO3-\n\t\n47.4\n\t\n24-30\n\n\nSBE\n\t\n23.7\n\t\n-3-+3\n\n \n\n \nWhat is the acid-base disturbance?\nWhat are the likely causes?\nList 3 potential factors which perpetuate the alkalosis", "a": "There is a primary metabolic alkalosis which is appropriately compensated.  In this case it is likely that large nasogastric aspirates coupled with volume depletion are causing it.  Patients who have been haemofiltered using lactate-containing fluids also often develop an alkalosis.\n\n \n\nThe kidney has a great ability to remove high levels of bicarbonate.  As such, it is often stated that once an alkalosis is set up, a mechanism is required to maintain it.\n\n \n\nAlkalosis may be perpetuated by\n\nvolume depletion / chloride deficiency\nadrenocorticoid deficiency\nimpaired tubular function\nsevere hypokalaemia\nsevere hypomagnesaemia\n\n \n\nCompensation rule-of-thumb in metabolic acid base disturbances\n\nCO2 is approx same as last 2 digits of pH (in range 7.1 - 7.60)\n\n \n\nExpected compensation by bicarbonate\n\n0.6mmHg CO2 per mmol HCO3 in alkalosis\n1.2mmHg CO2 per mmol HCO3 in acidosis\nCO2 is (1.5xBic)+8 in acidosis\nCO2 is (0.9xbic)+9 in alkalosis\n\n \n\nExpected compensation by base excess\n\nChange in PaCO2 = Change in SBE in metabolic acidosis\nChange in PaCO2 = 0.6 x change in SBE", "imgs": [], "cat": "ABG"}, {"q": "A 50 year old man has severe community acquired pneumonia. He has been on Non-invasive ventilation for 2 hours and now requires intubation. The following gases are obtained before and after intubation.\n \n\nValue\n\t\nPre intubation\n\t\nPost Intubation\n\t\nNormal range\n\n\nFiO2\n\t\n1.0\n\t\n1.0\n\t\n \n\n\nPaO2\n\t\n87\n\t\n104\n\t\n75-100\n\n\nPaCO2\n\t\n27\n\t\n58\n\t\n35-45\n\n\npH\n\t\n7.23\n\t\n7.04\n\t\n7.35-7.45\n\n\nHCO3-\n\t\n13.4\n\t\n12.6\n\t\n24-30\n\n\nSBE\n\t\n-13.7\n\t\n-13.1\n\t\n-3-+3\n\n \nInterpret the blood gases?\nWhy has his oxygenation improved?\nWhat is the A-a gradient?\nWhy has he got worse following intubation?", "a": "Prior to intubation he has a severe metabolic acidosis with respiratory compensation. He then develops a superimposed respiratory acidosis following intubation. His A-a gradient is 593 pre intubation and 537 after.\n \nHis oxygenation is likely to have improved from multiple reasons. These include:\nReduced O2 consumption post induction\nImprove respiratory mechanics\nImproved oxygen delivery\nImproved haemodynamics\n \nThis is a common problem. Due to the acute distress of his disease he is tachypnoeic and compensating for his metabolic acidosis. After intubation he is not ventilated as aggressively as he would do himself, allowing his CO2 to rise and his pH to fall precipitously.", "imgs": [], "cat": "ABG"}, {"q": "A 29 year old male has developed acute renal failure related to rhabdomyolysis after an industrial crush injury. He is stable and recovering well 5 days later. The following results are obtained:\n \n\nValue\n\t\nResult\n\t\nNormal range\n\n\npH\n\t\n7.47\n\t\n7.35-7.45\n\n\nPaO2\n\t\n107mmHg\n\t\n75-100\n\n\nPaCO2\n\t\n45mmHg\n\t\n35-45\n\n\nSBE\n\t\n+5.4\n\t\n-3-+3\n\n\nHCO3-\n\t\n32.2\n\t\n24-30\n\n\nLactate\n\t\n5.2\n\t\n<2.0\n\n \nDescribe the acid-base disturbance\nExplain the gases\nCould he be breathing room air?", "a": "There is a compensated metabolic alkalosis with hyperlactaemia.  This is commonly seen in patients who are recovering from renal impairment and are being haemofiltered using a lactate-based buffer.  This is because the lactate is metabolised to bicarbonate as the patient recovers, generating a metabolic alkalosis.", "imgs": [], "cat": "ABG"}, {"q": "This ECG was taken from a 75 year old man prior to a repair of his fractured neck of femur. He has no known past history.\n \nWhat does the ECG show?\nWhat are the likely causes?", "a": "The ECG shows sinus rhythm, with borderline first degree heart block. It also shows a right bundle branch block, and left axis deviation which in this context most likely represents left anterior hemiblock. This combination is referred to as \u2018trifascicular block\u2019. There is apparently widespread conduction system disease.\n \nConduction system disease can be due to ischaemia, infiltrative heart disease, age-related fibrosis and can be worsened by drugs.\n \nComment: Patients with trifascicular block are relying on the posterior fascicle of the left bundle for conduction to the ventricle. Given the extent of the underlying disease, it is more than likely that this is also diseased. Complete heart block, possibly with haemodynamic instability, may follow. The patient should be monitored carefully intraoperatively, and consideration given to Holter monitoring and pacemaker insertion.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF23ec1.jpg"], "cat": "ECG"}, {"q": "This ECG was taken from a 60 year old female who presented with episodes of dizzy spells.\n \nWhat does the ECG show?\nSupport your answer", "a": "The ECG shows the patient to be in Ventricular Tachycardia.\n \nThis is supported by\nthe concordance of the ventricular leads\nbizarre axis\nwide QRS, >140ms\nA-V dissociation, as evidenced by a fusion beat (seen best in lead 2) and p waves in V1\n \nComment:\nDifferentiating a wide complex supraventricular rhythm from a ventricular rhythm is notoriously difficult. The options here are probably one of the following:\n\u00d4\u00e9\u00bc       Ventricular tachycardia (should be the default until proven otherwise, particularly if the patient is compromised).\n\u00d4\u00e9\u00bc       SVT or flutter with abnormal conduction (pre-existing conduction block or transient rate-related)\n\u00d4\u00e9\u00bc       Supraventricular rhythm with accessory conduction (eg Wolff-Parkinson-White)\n \nTo address this, Brugada et al developed a schema for differentiating VT from SVT with conduction delay.\nIf any of the following apply to the ECG, it should be considered VT :\nIs there an absence of an RS complex in all precordial leads?\nIs the R to S interval >100ms in 1 precordial lead?\nIs there evidence of A-V dissociation?\nAre the morphology criteria present in both V1 and V6 for VT?\n \nFavours VT\nV1 : R, qR or RS\nV6 : S. rS pr qR\nIdentical to previous ventricular tachycardia tracing\nFavours SVT with aberrancy\nV1 : rsR\u2019\nV6 : qRs\nIdentical to previous SVT tracing\nIdentical to sinus tracing with conduction delay\n \nReferences : Rosen et al. Emergency Medicine. Concepts and Clinical Practice.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF26ec1.jpg"], "cat": "ECG"}, {"q": "A 64 year old male has an ECG performed for dull chest pain. \n \nDescribe the ECG\nWhat medications does he take?", "a": "The ECG demonstrates atrial flutter with 5:1 block. This would be unusual unless the patient was taking medications to slow AV conduction, such as a beta-blocker, calcium channel antagonist or digoxin.\n \nIn this case, the patient was on digoxin, as the slurred \u201creverse tick\u201d ST segments laterally suggest. The patient is likely to also be anticoagulated.\n \nComment: Atrial flutter may arise due to ischaemia, rheumatic heart disease or cardiomyopathy. It may respond to flecanide, but often requires DC cardioversion after reversing any underlying factors.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF28ec.jpg"], "cat": "ECG"}, {"q": "A 49 year old male presents to emergency with acute central chest pain. The following ECG is recorded.\n \nWhat does the ECG show?\nWhat alteration to your management would this ECG make?", "a": "The ECG shows an inferior ST elevation myocardial infarction with lateral reciprocal change. There is also evidence of right ventricular infarction with 1mm ST segment elevation in RV4.\n \nThe patient needs standard management of an ST elevation myocardial infarction, with early revascularisation (eg thrombolysis or PCI), aspirin, clopidogrel, oxygen, morphine and anticoagulation.  Consideration should be given to beta-blockade and antistatin therapy.\n \nPatients with RV infarction can deteriorate precipitously when treated with vasodilators. Careful fluid administration and titration of vasodilator infusions is required.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF31ec.jpg"], "cat": "ECG"}, {"q": "A 27 year old male farmer presents after a horse fell on his chest. \n \nList the abnormalities on this Chest Xray\nWhat do you think his heart sounds will sound like?", "a": "There is a chest drain in situ on the right, and subcutaneous air is seen, suggesting a haemo or pneumothorax has been treated.\n \nThere is also increased alveolar shadowing bilaterally consistent with pulmonary contusions, and a small pneumomediastinum.  A posterior fracture of the second rib is noted.\n \nThe heart sounds in pneumopericardium are described as a crunching-like sound, similar to crinkling a potato-chip packet, both in systole and diastole. This is known as Hamman\u2019s crunch.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF47xr.jpg"], "cat": "X-Ray"}, {"q": "Lateral xray of swollen knee in patient ventilated for head injury after MVA. What are the findings and what does this suggest?", "a": "Lipohaemarthrosis, suggesting a fracture\n \nComment: This xray is taken horizontally. The fat-blood fluid level is clearly seen when orientated this way. The fat comes from bone marrow, indicating a fracture is present (though can\u2019t be seen clearly on this xray).\n \nIt is important to fully examine a trauma patient for easily missed injuries like this one.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF48xr.jpg"], "cat": "X-Ray"}, {"q": "MRI of 30 year old patient who presented with sustained fitting and altered conscious state. \n \nDescribe your findings. \nHow would you confirm the diagnosis?\nWhat would your management be?", "a": "High signal in frontotemporal regions of brain. Highly suggestive of Herpes encephalitis. \n \nDiagnosis can be confirmed by demonstrating HSV DNA by PCR of CSF.\n \nNeeds high dose acyclovir, supportive care.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF49mr.jpg"], "cat": "Biochemistry"}, {"q": "73 year old man with years of intermittent cramping abdominal pains, presents with sudden onset severe lower abdominal pain and fever. \n \nDescribe the findings. \nWhat is the most likely diagnosis?", "a": "Riggler\u2019s sign, indicating perforation, probably acute diverticulitis, possibly colonic / rectal tumour.\n \nComment: Free air enables both sides of the thin wall of bowel to be clearly seen, as in this xray. It is often subtle and indicates the presence of free air in the abdomen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF50xr.JPG"], "cat": "X-Ray"}, {"q": "A 23 year old male presents with severe backache, fevers, myalgias and hypotension. Shortly after arrival the following rash is seen.\n \nDescribe the rash\nWhat is the likely pathology?", "a": "This is the classic purpuric rash of Meningococcaemia. Initially macular and blanching, it rapidly turns petechial and purpuric.\n \nComment: Severe pain is a classic feature of meningococcaemia. This should be differentiated from Meningococcal meningitis which is a different clinical syndrome. Severe meningococcaemia causes severe sepsis, fulminant purpuric rash and severe body pains.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF51cp.jpg"], "cat": "Clinical"}, {"q": "An 18 year old male is brought to emergency after a motor bike accident. His initial blood pressure is 82/55, which responds to 2L of crystalloid resuscitation. A CT is performed of his abdomen.\n \nList the findings", "a": "This is a contrast enhanced CT of the abdomen demonstrating free abdominal fluid and a severely lacerated spleen. The anterior part of the spleen is devitalised and not enhancing.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF54ct.jpg"], "cat": "CT"}, {"q": "A 22 year old female is involved in a MVA and is hypotensive at the scene. After 2 litres of crystalloid resuscitation, her observations are BP 85/50, HR 135, Sats 94% (100% via NRBM). A focused abdominal sonogram for trauma (FAST) scan is performed.\n \nWhat are the findings?\nWhat action would you take?", "a": "There is blood in her peritoneum and there is no evidence of pericardial tamponade.\n \nShe requires urgent laparotomy\n \nComment: There are numerous causes of hypotension in early trauma. These include :\nBlood loss (external, abdominal, thoracic, long bone, pelvic)\nTension pneumothorax\nTamponade\nSpinal transection\nCardiac contusion / valve lesion possible\nAnaphylaxis (eg morphine, cephalexin etc).\n \nA FAST scan answers 2 questions:\nIs my patient hypotensive due to pericardial tamponade?\nIs my patient hypotensive because of haemoperitoneum?\n \nIf the answer to the second question is yes, then a laparotomy is required and (with the exception of chest and pelvis plain radiographs) no further investigation is required immediately", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF55us1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF55us2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF55us3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF55us4.jpg"], "cat": "X-Ray"}, {"q": "The following biochemistry is taken from an IV drug user with severe cellulitis of an injection site.\n \nExplain the results\nWhat underlying problems could cause this?", "a": "There is a raised anion gap metabolic acidosis, acute renal failure, a high CK and hyperkalaemia. Additionally there is marked hyperphosphataemia, an LDH rise and AST rise. This pattern is commonly associated with rhabdomyolysis.\n \nThe development of rhabdomyolysis is extremely concerning, and may be due to arterial injection with distal infarction, pyomyositis / necrotising fasciitis, or due to a compartment syndrome.\n \nComment: Muscle cell lysis leads to release of potassium and phosphate, myoglobin, a number of enzymes (CK, LDH, AST) and other cellular components. The phosphate released complexes magnesium and calcium, which are usually low.\n \nRenal failure may ensue due to dehydration, sepsis, hyperosmolality and due to the toxic effects of myoglobin.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF57bc.JPG"], "cat": "Biochemistry"}, {"q": "A 38 year old drug addict has been admitted with sepsis. His blood cultures grow Staph aureus. On day 3 he suddenly becomes shocked and short of breath. A transoesophageal echocardiogram is recorded post intubation.\n \nWhat does the echo show?\nWhat is the significance of the pulse wave doppler study?", "a": "The echo demonstrates severe aortic regurgitation, presumably due to Staphylococcal endocarditis. The jet of regurgitation fills the LVOT.\n \nThe pulse wave Doppler study is performed in the descending aorta, and shows holodiastolic (ie throughout diastole) flow reversal, a sign of severe aortic regurgitation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF58eh.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/DITF58eh2.jpg"], "cat": "ABG"}, {"q": "A 59 year old man is 2 hours post coronary artery bypass grafting, and remains ventilated with an intra-aortic balloon pump in situ. The following trace is recorded:\n \nWhat does the trace show?\nWhat would you do?", "a": "The waveform shows the balloon to be inflating too early.\n \nThe inflation timing needs to be delayed.\n \nComment: When the intra-aortic balloon pump is inflated too early, the left ventricle continues to pump against an obstruction. This results in an increase in the left ventricular work.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF60wf.JPG"], "cat": "ECG"}, {"q": "What is this test? \nWhat does a positive test indicate? \nWhat sample sources can this test be performed on?", "a": "Snake venom detection kit. \n \nPositive test indicates a bite has occured, and the type of antivenom that is indicated to treat this snake. It does not identify the type of snake as such.\n \nVDK can be done on bite site or urine. It cannot be done on blood due to the high rate of false positives.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF61si1.JPG"], "cat": "Clinical"}, {"q": "Identify the 4 landmarks seen in this image. \n\nList 4 complications of this procedure in an intubated patient", "a": "A \u2013 Right main bronchus; B \u2013 Posterior wall of the trachea; C \u2013 left main bronchus; D \u2013 carina\n \nComplications of bronchoscopy include :\nBleeding\nInfection\nloss of airway\nbarotrauma\nhypoxia\ndistress\nraised intracranial pressure\nhypercapnoea\nairway perforation\nother\n \nComment: The easiest way to orientate yourself when doing a bronchoscopy is to look for the posterior wall. In the trachea, the rings of cartilage are C shaped, completed posteriorly by the posterior tracheal membrane. This is relatively easy to see. This feature extends into the major airways too.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF64cp.JPG"], "cat": "Clinical"}, {"q": "List 4 indications for the use of this item. \nList 5 complications of the use of this piece of equipment. \nHow do you know it is inserted in the correct position?", "a": "Indications include : haemothorax, pneumothorax, pleural effusion, empyema, chylothorax, post thoracic surgery. \n \nComplications include: incorrect position, intercostal artery / vein / nerve laceration, pneumothorax, lung laceration, penetration of upper abdominal organs, myocardial damage, pain and consequent pulmonary complications, re-expansion pulmonary oedema, tension pneumothorax, introduction of infection, back-flow of underwater seal drain fluid\n \nCorrect position suggested by \u2013 fingersweep, release of air / fluid (depending on indication), fog in tube, swing, CXR / CT imaging", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF65eq.JPG"], "cat": "X-Ray"}, {"q": "This xray was taken on a 15 year old male with fevers and rigors.\n \nWhat does it show?", "a": "There is a right upper zone opacity with air bronchograms evident. The opacity is limited inferiorly by the horizontal fissure. This is consistent with acute bacterial lobar pneumonia.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF74xr.jpg"], "cat": "X-Ray"}, {"q": "This xray was taken of a 72 year old patient on return to ICU from Coronary Artery Bypass Grafting.\n \nDescribe the findings\nWhat intervention is required?", "a": "The patient is intubated, has a left subclavian central line and there is a left chest and mediastinal drain in situ. There is a left pleural effusion. The endotracheal tube is a little too far in and sits in the upper part of the right main bronchus.\n \nThe right costodiaphragmatic sulcus appears to go on forever. This is called the \u2018deep sulcus sign\u2019 and indicates the presence of a pneumothorax.\n \nThe patient needs an intercostal tube and should have the ETT withdrawn a couple of centimetres.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF75xr.jpg"], "cat": "X-Ray"}, {"q": "A 60 year old man presents to emergency shocked with severe abdominal pain.\n \nDescribe the features of this CT", "a": "There is free air in the abdomen and an air fluid level. This is likely due to a perforation of a hollow viscus. No other abnormality is evident on this slice.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF76ct.jpg"], "cat": "Clinical"}, {"q": "A 65 year old ex smoker has been ventilated for 3 days with a severe exacerbation of COAD. As he is being woken he has become increasingly distressed, requiring frequent sedation.\n \nHis ventilator settings are as follows:\n\u00d4\u00e9\u00bc       SIMV \u2013 volume control\n\u00d4\u00e9\u00bc       Mandatory rate 6\n\u00d4\u00e9\u00bc       Tidal volume 400ml\n\u00d4\u00e9\u00bc       Pressure Support 18cmH2O\n\u00d4\u00e9\u00bc       PEEP 5\n\u00d4\u00e9\u00bc       Flow trigger 4L/min\n \nThe following trace is obtained from the ventilator\n \nDescribe the wave form\nOutline your management", "a": "The above wave form demonstrates the patient is attempting to breath, identified by the dips in the airway pressure (Paw) and the spikes in the flow. However the ventilator is not recognising this, and is not rewarding the patient with gas flow.\n \nThis can be overcome by lowering the sensitivity of the flow trigger. However this often misses the point, which is why is the patient unable to generate enough force to trigger the ventilator.\n \nSolutions to this include :\n\u00d4\u00e9\u00bc       Improving patient power (feeding, electrolytes, reduce sedation etc)\n\u00d4\u00e9\u00bc       Reducing airway resistance (bronchodilators)\n\u00d4\u00e9\u00bc       Reducing lung compliance (drain effusions, PTx)\n\u00d4\u00e9\u00bc       Reduce autoPEEP (reduce tidal volumes, bronchodilators, reduce respiratory rate, improve exhalation time, apply small amount of extrinsic PEEP)\n \nWhen all else fails, reduce the trigger sensitivity.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF84wf.jpg"], "cat": "X-Ray"}, {"q": "A 32 year old female is admitted to ICU following a motor vehicle accident. \n \nComment on her C-spine film.", "a": "This is an inadequate film as we can only see down to C6. There is an anterior tear drop fracture of C5.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF88xr.jpg"], "cat": "Clinical"}, {"q": "Describe the following CXR taken from a 60 year old patient with respiratory failure", "a": "The patient is intubated. There is a pulmonary infiltrate on the left, and 2 left chest drains are present. On the right there is a pneumothorax despite the presence of a chest drain, which appears kinked. The right lung is collapsed and there is significant subcutaneous emphysema.\n\n \nThere is a left subclavian line, an endotracheal tube and a nasogastric tube, which all appear correctly positioned.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF89xr.jpg"], "cat": "X-Ray"}, {"q": "The following CXR is taken of a patient in intensive after insertion of a subclavian central line.\n \nDescribe the findings", "a": "There are bilateral pulmonary infiltrates. The heart looks enlarged and there is a left sided pleural effusion. The subclavian central line looks adequately positioned. There is a mitral valve replacement present.\n \nThe nasogastric tube is situated in the left main bronchus, which must be removed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF90xr.jpg"], "cat": "X-Ray"}, {"q": "List the hardware seen on this CXR", "a": "Endotracheal tube\nNasogastric tube\nRight internal jugular central line\nRight internal jugular Swan-Ganz catheter\n3 chest drains inserted substernally \u2013 one in the mediastinum and one in each pleural space\nMitral annuloplasty ring\nIntra-aortic balloon pump\nSternal wires", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF91xr.jpg"], "cat": "Echo"}, {"q": "This is a CT of a 28 year old man punched to head in a brawl. His GCS on arrival is 8\n \nDescribe your findings\nWhat are the 2 most important preventable determinants of neurological outcome?", "a": "There is a left sided biconvex hyperdensity adjacent to temporal bone consistent with an acute extradural haematoma. An hypodensity in the right posterior frontal and temporal lobes with focal subtle hyperdensities is consistent with haemorrhagic/non haemorrhagic.\ncontusions and adjacent oedema. This is referred to as a contra-cous injury. A left basifrontal hypodensity probably represents a non haemorrhagic contusion.\n \nThe most important preventable factors in brain injury are hypotension and hypoxia.\n \nComment: The concept of primary and secondary brain injury is well known. There is little that can be done about the injury to the brain at the moment of impact. Prevention of secondary injury is the mainstay of brain care.\n \nThe most important factor in brain outcome is maintanance of the demand-supply ratio. Factors which impair delivery include hypotension and hypoxia. Prevention of hypoglycaemia is also important. Hypocapnoea is not recommended for maintenance therapy as it reduces cerebral perfusion. It still has a place in acute intracerebral hypertension while awaiting definitive therapy.\n \nPreventing oxygen demand by preventing seizures and appropriate sedation with or without paralysis allows the brain to tolerate impaired nourishment. Unfortunately induced hypothermia has not been shown effective.\n \nReducing brain swelling is also important as it reduces intracerebral pressure which may otherwise compromise brain perfusion. Keeping the patient\u2019s head up, allowing adequate cerebral venous runoff and maintaining a sodium >145 all assist this.\n \nHyperosmolar therapies such as hypertonic saline and mannitol have a place when acute rises in intracerebral pressure occur.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF93ct.jpg"], "cat": "CT"}, {"q": "A 71 year old woman is admitted to ICU post coronary artery bypass grafting. 15 minutes post extubation she develops acute respiratory distress\n \nDescribe the findings of this CXR", "a": "Bilateral pulmonary infiltrates, most likely acute pulmonary oedema, could also consider ALI due to infection. Right apical pneumothorax. NGT remains in situ. Probable bilateral pleural effusions\n \nComment: Don\u2019t stop looking at the film when you find an abnormality. In this case a subtle pneumothorax is present, adding to the patient\u2019s distress.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF94xr.jpg"], "cat": "X-Ray"}, {"q": "The following trace is recorded from the aortic pressure port of an intra-aortic balloon pump (IABP) in a patient in cardiogenic shock (in 1:2 mode for analysis purposes). \n \nDescribe the findings.", "a": "Late deflation, leading to blunting of the assisted systole\n \nComment: The intra-aortic balloon improves diastolic perfusion of the heart and brain. It also reduces afterload on the heart by deflating just before contraction. However, if it deflates too late, as in this case, it obstructs cardiac outflow and may worsen cardiac performance.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF95wf.jpg"], "cat": "Biochemistry"}, {"q": "A 42 yr old female presents with 36 rs of acute abdominal pain. Describe the findings of this contrast enhanced CT", "a": "This is a contrast enhanced CT demonstrating acute necrotising pancreatitis. Only the tail enhances. Peripancreatic fluid collections are present anteriorly and in the anterior pararenal space on left side.\n \n \nComment: The presence of necrosis of the pancreas is confirmed by the lack of contrast uptake on CT. Necrotic pancreatitis has a significantly worse outcome.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF96ct.jpg"], "cat": "Biochemistry"}, {"q": "A 60 year old man presents with sudden decrease in conscious state. \n \nDescribe the CT findings", "a": "Large hyperdense area is present in the left occipital lobe with\ncompression of the left occipital horn and minimal adjacent oedema, consistent with acute intracerebral haematoma. There is the suggestion of hydrocephalus", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF98ct.jpg"], "cat": "CT"}, {"q": "Comment on the following preoperative CXR", "a": "A large retrocardiac rounded lucency is present with surrounding thick wall consistent with hiatus hernia or lung abscess. The absence of a fundal bubble suggests hiatus hernia.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF99xr.jpg"], "cat": "Clinical"}, {"q": "A 45 year old man presents with recurrent fevers and productive cough. \n \nWhat abnormalities are present? \nWhat are the most likely pathogens? \nWhat underlying causes may be present?", "a": "A large rounded soft tissue density opacity with air fluid level is present in the right upper zone consistent with a lung abscess. A congenital cystic lesion with bronchial communication may give a similar appearance.\n \nMost common pathogens are gram negatives and anaerobes, though others are possible. \n \nCommon underlying causes for lung abscess include bronchus obstruction (peanuts, tumour), post aspiration or cavitating pneumonia", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF100xr.jpg"], "cat": "X-Ray"}, {"q": "23 year old girl presents with haemoptysis, acute renal failure and low-grade fevers. She is very difficult to ventilate due to \u2018high pressuring\u2019. \n \nDescribe the CXR. \nBriefly describe how you would set the ventilator.", "a": "Bilateral diffuse alveolar opacity consistent with pulmonary oedema/ARDS. The paracardiac linear lucency consistent with a pneumomediastinum is probably secondary to barotrauma in view of positive pressure ventilation.\n \nRequires high PEEP and low tidal volumes, preventing excessive Pplat (<30), accepting high PaCO2.\n \nComment: The initial ARDS-net trial demonstrated a reduction in mortality when patients with ARDS were treated with low tidal volumes and high levels of PEEP. Subsequent trials have not shown a benefit when higher levels of PEEP are used.\n \nThe theory behind the \u201copen lung\u201d technique is to use higher levels of PEEP to recruit collapsed lung segments, while simultaneously preventing \u2018ventilator induced lung injury\u2019 (VILI) caused by high inflation pressures and volumes.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF101xr.jpg"], "cat": "ABG"}, {"q": "A 74 year old previously well man presented with 14 hours of severe central chest pains and ST elevation and was subsequently thrombolysed. 2 days later he develops acute shortness of breath. He has a temperature of 37.9, a White Cell Count of 12.1 and a C-reactive protein of 65.\n \nInterpret the CXR\nList 3 potential causes\nDiscuss his prognosis", "a": "There are ill defined opacities in both mid and lower zones, particularly perihilar. This is consistent with alveolar and interstitial oedema. Given the context and the fact that his heart size is enlarged this is most likely cardiogenic.\n \nCardiac failure and pulmonary oedema post myocardial infarction can be due to multiple causes including:\nAcute mitral valve regurgitation\nPapillary muscle dysfunction\nAcute LV dilatation due to the infarction\nIschaemic ventricular septal defect\nAcute tamponade\nOngoing ischaemia causing LV dysfunction\nSufficient myocardial cell death to compromise LV function\n \nThe inflammatory markers and temperature can all be explained by a myocardial infarction. Infection is possible though there is no evidence of this on xray.\n \nThe Killip classification describes mortality after myocardial infarction. \nNo clinical signs of cardiac failure (mortality 6%)\nCrackles in the lungs, an S3 or an elevated JVP (17%)\nFrank pulmonary oedema (38%)\nCardiogenic shock (81%)\n \nReference : Killip T, Kimball JT. Treatment of myocardial infarction in a coronary care unit: a two year experience of 250 patients. Am J Cardiol 1967; 20: 457-464", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF122xr.jpg"], "cat": "ECG"}, {"q": "A 32 year old male presents with acute shortness of breath and mucopurulent sputum.\n \nDescribe the xray findings\nWhat investigations are required?", "a": "The patient is intubated and has a left internal jugular central line and a nasogastric tube.\n \nBoth lungfields are markedly hyperinflated. Prominent bronchovascular markings are noted in the upper zones compared with the lower zones. Given the degree of hyperinflation, the heart shadow looks enlarged.\n \nIn combination the patient has severe emphysematous changes, which appears to have a lower zone predominance. This is suggestive of alpha-1 antitrypsin deficiency. Additionally, the vascular prominence, septal lines and large heart suggest cardiac impairment.\n \nThe patient needs an ECG, Echocardiogram and troponin to investigate the cardiac involvement. Pulmonary function testing and an alpha-1 antitrypsin level is also required.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF124xr.jpg"], "cat": "ECG"}, {"q": "This 33 year old male was found face down at a city nightclub with a GCS of 5. He was intubated by paramedics and transported to hospital. His A-a gradient on 30% oxygen is 72.\n \nDescribe the CXR findings\nList 3 possible causes\nWhat management would you institute for this problem?", "a": "The patient is intubated \u2013 the tube is not in far enough. There is collapse of the right upper lobe, with superior displacement of the horizontal fissure, right hemidiaphragm elevation and deviation of the trachea to the right.\n \nThe causes include :\nLuminal obstruction due to vomitus, broken teeth, sputum plug\nMural pathologies such as a bronchogenic tumour\nExtrinsic compression (eg tumour, lymph node)\n \nA common cause is right main bronchus intubation. When the endotracheal tube is inserted to far in adults it often goes down the RMB. Because the right upper lobe bronchus originates very early in the course of the RMB, it is easily obstructed by the ETT, as in this case. The tube had been repositioned in the emergency department before the xray was taken.\n \nManagement involves bronchoscopy to remove obstructing objects and increasing PEEP and chest physiotherapy to encourage reinflation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF125xr.jpg"], "cat": "ABG"}, {"q": "This 24 year old woman has been admitted for acute gallstone pancreatitis for 3 days. She has now become increasingly short of breath.\n \nDescribe the findings of the xray\nWhat is the likely cause?\nHow is this condition defined?", "a": "There is diffuse alveolar opacity noted in both lungs. The costophrenic angles and the cardiac silhouette are not visible.\n \nThe most likely diagnosis is Acute Respiratory Distress Syndrome (ARDS) related to acute pancreatitis. It may also be acute pulmonary oedema due to excessive rehydration fluids.\n \nARDS is defined by the consensus definition (Bone et al). The criteria include:\nAcute onset\nPulmonary infiltrates, usually bilaterally\nHypoxia, as measured by a PaO2/FiO2 <200 (when <300, referred to as Acute Lung Injury)\nNo evidence of raised left atrial pressure (Pulmonary artery occlusion pressure <18mmHg)\nA diagnosis known to be associated with ARDS\n \nRaised left atrial pressure was previously defined as a pulmonary capillary wedge pressure <18mmHg, but echocardiographic evidence of normal LAP, or absence of clinical signs of raised LAP, is now considered acceptable.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF126xr.jpg"], "cat": "ABG"}, {"q": "A 73 year old woman presents to emergency with acute shortness of breath. She has previously had a prolonged admission to ICU.\n \nDescribe the xray", "a": "There is evidence of right lung volume loss with tracheal deviation to the right. The bronchi in the right upper zone are more prominent and may be dilated, suggesting bronchiectatic change.\n \nElsewhere the lungs appear congested and vascular markings are not clear suggesting interstitial oedema.\n \nThere is an opacity in the right upper zone which appears to hug the contour of the chest wall. There are no air bronchograms, which makes consolidation unlikely. This is consistent with a pleural collection.\n \nThis patient had an infected pleural collection that was treated conservatively at her past ICU admission \u2013 it is now fibrosed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF127xr.jpg"], "cat": "X-Ray"}, {"q": "A 41 year old man presented with fevers, chills, rigors and hypotension.\n \nDescribe the xray findings\nWhat is the likely pathology?", "a": "There is a faintly hazy appearance of the left lower zone. This appears to obscure the left cardiac border which probably places it in the lingula.\n \nThe findings are consistent with early lingula pneumonia. The most common organism is Strep pneumoniae, though others including:\nMycoplasma pneumoniae\nHaemophilus influenzae\nLegionella spp\nChlamydia pneumoniae\nStaph aureus\nMycobacteria\nGram negative bacteria\nAnaerobes", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF128xr.jpg"], "cat": "ABG"}, {"q": "Shortly after intubation for respiratory failure, a 54 year old male has the following capnography trace recorded. \n \nWhat does it suggest?", "a": "The capnograph shows a slow rise rather than a rapid rise to a plateau. This suggests the patient has bronchoconstriction.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF129wf.jpg"], "cat": "ABG"}, {"q": "The following waveforms were captured from a 29 year old with acute respiratory failure. What is the likely cause of their respiratory failure?", "a": "Waveforms show rapid attainment of peak flow, before severe limitation of expiratory flow. This is consistent with small airway disease, and the likely cause is asthma.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF130wf1.jpg"], "cat": "Biochemistry"}, {"q": "Identify this device. \nList four (4) are the complications of this device not working?", "a": "Intubated patients lose the ability to humidify inspired air. This can result in sputum inspisation, defective mucosal activity and other problems. Heat is lost easily from the airways, putting patients at risk of hypothermia.\n \nHumidifiers actively increase the heat and water content of the inspired gases by passing the gas over a heated water bath.\n \nHeat and moisture exchangers also improve humidification and prevent heat loss, but add resistance to the circuit and are less efficient if required for long periods.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF132eq.JPG"], "cat": "Equipment"}, {"q": "A 51 year old man presents to emergency with acute shortness of breath and left sided pleuritic chest pains.\n \nDescribe the features of this chest xray\nHow would you investigate further?", "a": "The chest xray demonstrates a left pleural effusion. There is loss of the left hemidiaphragm, a lateral meniscus and there is no mediastinal shift. No underlying lung pathology can be demonstrated\n \nPossible causes include:\nPulmonary embolism\nAcute haemothorax (eg trauma related)\nParapneumonic effusion\nNeoplastic disease\n \nThe patient should have routine bloods (FBE, coagulation profile, urea and electrolytes), sputum analysis and an aspirate of the pleural fluid sent for microbiology, cytology and biochemistry (protein, LDH, pH, glucose). Other investigations may be indicated by clinical history and exam. Repeat chest imaging may be required after the fluid is drained.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF136xr.jpg"], "cat": "X-Ray"}, {"q": "What is this piece of equipment?\nWhat is the advantage of this item?", "a": "This is a Venturi mask, which delivers a known concentration of oxygen as long as the oxygen flow rate is set to the mask\u2019s specifications.\n \nComment: A Venturi mask allows a fixed concentration of oxygen to be given. This is of most use when a patient relies on their hypoxic drive to trigger ventilation, as it prevents over-supplementation of oxygen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF135eq.JPG"], "cat": "Equipment"}, {"q": "This xray is taken from an elderly lady with shortness of breath, fatigue and weight loss.\n \nWhat does the xray show?", "a": "The xray demonstrates a large pleural effusion. The left side is positioned closest to the xray plate and is thus the least magnified. Thus, the left hemidiaphragm can be clearly seen, but the right cannot. Therefore the pleural effusion is right sided.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF138xr.jpg"], "cat": "X-Ray"}, {"q": "This CXR was taken of a 23 year old rugby player who complained of severe shortness of breath after being crash tackled.\n \nWhat does it show?", "a": "Left sided pneumothorax with complete lung collapse. There is an ICC in the right hemithorax, which is probably inserted too far. There is no sign of residual pneumothorax on this side, nor is there subcutaneous emphysema.\n \nThe film is somewhat rotated but the mediastinum still appears deviated to the right, suggesting the pneumothorax is beginning to tension.\n \nComment: It is always important you check that the expected impact of an intervention actually occurs. In this case, the right intercostal catheter did not relieve the patient\u2019s breathlessness, and the confirmatory xray demonstrated a pneumothorax on the left.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF141xr.jpg"], "cat": "X-Ray"}, {"q": "A 40 year old male presents to emergency in extremis. His blood pressure is unrecordable.\n \nWhat does the xray show?\nExplain why the patient is hypotensive", "a": "The xray shows a right pneumothorax. There is significant shift of the mediastinum and depression of the right hemidiaphragm, indicating significant tension.\n \nWhen the pressure in the chest becomes this high, venous return to the heart is compromised. Additionally, the IVC and SVC may become kinked, further compromising flow. Consequently, left ventricular filling is impaired and cardiac output falls.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF145xr.jpg"], "cat": "ECG"}, {"q": "A 61 year old male returns to ICU following 3 vessel coronary artery bypass grafting. He remains hypoxic on 70% oxygen.\n \nA CXR is performed. Describe the features.", "a": "The xray shows bilateral infiltrates suggesting pulmonary oedema, which may be cardiac or due to bypass lung dysfunction. There is a right sided pneumothorax, the only evidence of which is the deep sulcus sign. There is widening of the mediastinum consistent with haemorrhage. The endotracheal tube is appropriately placed. Blurring of the left diaphragm is consistent with collapse and effusion.\n \nComment: The deep sulcus sign may be the only sign of a pneumothorax in a supine patient, as the air rises anteriorly in this position. On the right side of this film, the sulcus seems to go on for ever.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF151xr.jpg"], "cat": "X-Ray"}, {"q": "A 45 year old male presented with progressive breathlessness and lethargy, worsening over 2 weeks. A procedure has been performed which immediately improved the patient\u2019s symptoms.\n \nWhat procedure has occurred?\nList 3 complications of this procedure", "a": "The patient has had a pericardial drain inserted. This was performed for a pericardial effusion.\n \nThe complications of pericardial catheter insertion include:\nVentricular perforation\nPericardial tamponade\nLAD laceration\nPneumothorax\nInfection\nBleeding\nAir embolus\nArrhythmia", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF155xr.jpg"], "cat": "ECG"}, {"q": "This 68 year old male has become acutely short of breath after a procedure\n \nWhat was the procedure?\nWhat does the xray show?", "a": "The patient has a pneumothorax on the right and has a hilar lung mass. The patient has had a CT guided biopsy which caused the pneumothorax.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF158xr.jpg"], "cat": "X-Ray"}, {"q": "This xray was taken to confirm the position of the Intra-aortic balloon pump. Discuss the results.", "a": "The patient is intubated with bilateral pulmonary infiltrates consistent with pulmonary oedema. There is a nasogastric tube, a right internal jugular central line and 2 chest drains inserted substernally suggesting the patient has just had cardiac surgery.\n \nThe IABP has been placed in the femoral vein and is lying in the SVC.\n \nComment: The IABP is in the best position when the tip lies in the aorta just distal to the left subclavian artery origin. This coincides with the second intercostal space anteriorly on the CXR.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF164xr.jpg"], "cat": "X-Ray"}, {"q": "A 24 year old female has severe pancreatitis. She is intubated for respiratory failure and the following CT is recorded.\n \nWhat are the features of the CT?\nDiscuss the complications of ventilation in ARDS", "a": "The CT shows classical changes of Acute Respiratory Distress Syndrome, with dense consolidation of the inferior zones, and alveolar and interstitial oedema in the anterior and middle zones. Additionally there is a pneumomediastinum. There is no apparent pneumothorax.\n \nIt is well recognised that ventilation may cause lung injury in acute respiratory distress syndrome. This is referred to as ventilator induced lung injury.\n \nComment: Other complications of ventilation fall into 5 categories:\nRelated to intubation \u2013 airway damage, hypotension etc\nRelated to gases \u2013 hypoxia, hypercarbia, hyperoxia\nComplications of ventilation \u2013 VILI, gas trapping, pneumothorax, cardiac dysfunction\nComplications of drugs (liver impairment, myoneuropathy etc)\nComplications of sedentary position (virtually every system) \u2013 bone mineral loss, stasis DVT, stress related gastric ulcers, pressure sores, ventilator induced lung injury, psychological", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF184ct.jpg"], "cat": "X-Ray"}, {"q": "A 37 year old male is in ICU following a motor vehicle accident in which he suffered pulmonary contusions, a severe liver laceration that required massive transfusion of packed cells, a ruptured proximal jejunum and bilateral femoral shaft fractures. He subsequently developed ARDS and required vasoconstrictor support for 3 days. His nutritional requirements are being met parenterally.\n \nOn day 7 the following bloods are recorded.\n \n\nParameter\n\t\nRange\n\t\nDay 3\n\t\nDay 5\n\t\nDay 7\n\n\nProtein\n\t\n62-83g/L\n\t\n44\n\t\n44\n\t\n42\n\n\nAlbumin\n\t\n33-47g/L\n\t\n23\n\t\n22\n\t\n20\n\n\nGlobulin\n\t\n25-45g/L\n\t\n21\n\t\n22\n\t\n22\n\n\nBilirubin\n\t\n<20mcmol/L\n\t\n110\n\t\n190\n\t\n241\n\n\nALP\n\t\n40-110U/L\n\t\n98\n\t\n114\n\t\n191\n\n\nGamma GT\n\t\n<50U/L\n\t\n26\n\t\n61\n\t\n104\n\n\nALT\n\t\n<45U/L\n\t\n44\n\t\n78\n\t\n142\n\n\nAST\n\t\n<40U/L\n\t\n167\n\t\n119\n\t\n189\n\n \nWhat are the possible causes of these results?", "a": "Jaundice and liver dysfunction in ICU is often multifactorial.\n \nInitial rise in bilirubin is largely related to resorption of blood lost into bruising, and also related to massive transfusion. AST may also be raised due to muscle trauma.\n \nThe fall in serum albumin is largely an \u201cacute phase\u201d response and is commonly seen in critically unwell patients.\n \nThe development of raised hepatic enzymes is probably multifactorial:\nRight ventricular dysfunction leading to congestive liver dysfunction (due to ARDS / contusions / PEEP)\nDrugs (eg beta lactams, paracetamol, amiodarone)\nSepsis\nBacterial translocation from gut\nTPN\nIschaemia related to initial shock / vasoconstrictors\nSIRS related to trauma / sepsis / massive transfusion\nBiliary obstruction related to abdominal complication\nRaised intra-abdominal pressure\n \nComment: Bilirubin that is derived from haemolytic transfusion reactions, reabsorbed blood from tissue damage and free Hb from stored blood is largely unconjugated, whereas that related to liver dysfunction in ICU is largely conjugated.\n \nAbnormal liver function is a commonly recognised complication in patients receiving prolonged TPN (>10 days). This is often related to underlying disease, but may also represent a discrete toxic effect on the liver. Typically there is a mild hepatocellular picture but unpredictable effects on bilirubin.\n \nThe underlying pathological effect appears to be hepatic steatosis. It has now been recognised that this largely relates to caloric load, particularly glucose (so called \u201coverfeeding syndrome\u201d). Manganese toxicity or deficiencies of essential fatty acids or carnitine may also contribute. \n \nCholestatic jaundice has also been described in patients on long-term parenteral nutrition. There appears to be a link between cholestasis in lipid administration, and copper may have a role.", "imgs": [], "cat": "ECG"}, {"q": "A 44 year old woman presents with marked weakness. She is unable to stand from a chair and can\u2019t hold her arms above her head. Routine tests reveal abnormal biochemistry \u2013 you are asked to give an opinion.\n \n\n \n\t\nMeasured Value\n\t\nRange\n\n\nNa\n\t\n146\n\t\n135-145(mmol/L)\n\n\nK\n\t\n2.4\n\t\n3.5-5.0(mmol/L)\n\n\nCl\n\t\n108\n\t\n100-110(mmol/L)\n\n\nHCO3\n\t\n35\n\t\n24-32(mmol/L)\n\n\nUrea\n\t\n8.1\n\t\n3.0-8.0(mmol/L)\n\n\nCreatinine\n\t\n110\n\t\n70-120(mcmol/L)\n\n\nGlucose\n\t\n9.4\n\t\n3.0-7.8(mmol/L)\n\n \nDescribe the results\nWhat is the cause of her weakness?", "a": "A metabolic alkalosis combined with hypokalaemia. Mild hypernatraemia and hyperglycaemia.\n \nThe combination is most likely due to Cushing\u2019s syndrome. Potassium wasting diuretics (particularly thiazides) may also present this way. The weakness is in keeping with a proximal myopathy which is consistent with this diagnosis. Hypokalaemia this low is usually due to excess ACTH production, such as bronchial tumours, but may also occur with exogenous steroids or pituitary ACTH release.\n \nSevere hypokalaemia may also cause proximal muscle weakness which is readily reversible when potassium is replaced.", "imgs": [], "cat": "ABG"}, {"q": "A 31 year old man presents to emergency with altered conscious state and hypotension. His wife says he has been getting progressively worse for 2 months. He has recently stopped working due to severe fatigue and he has lost 10kg in weight. Routine biochemistry reveals the following :\n \n\n \n\t\nMeasured Value\n\t\nRange\n\n\nNa\n\t\n127\n\t\n135-145(mmol/L)\n\n\nK\n\t\n6.9\n\t\n3.5-5.0(mmol/L)\n\n\nCl\n\t\n101\n\t\n100-110(mmol/L)\n\n\nHCO3\n\t\n17\n\t\n24-32(mmol/L)\n\n\nUrea\n\t\n14.1\n\t\n3.0-8.0(mmol/L)\n\n\nCreatinine\n\t\n113\n\t\n70-120(mcmol/L)\n\n\nGlucose\n\t\n4.1\n\t\n3.0-7.8(mmol/L)\n\n \nInterpret the results\nWhat is the likely cause?\n\nHow would you manage and investigate?", "a": "The results demonstrate marked hyponatraemia and hyperkal
