ttract fewer marks if mentioned without the first three)\n\nIntrahepatic Cholestasis of Pregnancy:\nViral hepatitis: The commonest cause of jaundice in pregnancy. May occur at any time. The ALT and AST would be expected to be greatly elevated (>500-1000U/L). DIC is rare.", "cat": "Biochemistry"}, {"q": "You are asked to review an 80 year old woman in the emergency department who has presented with a depressed conscious state. She has ischaemic heart disease and paroxysmal atrial fibrillation. Her medication includes aspirin, metoprolol, and amiodarone. On examination she has a temperature of 34.50 C she is drowsy with a GCS of 10, with a pulse of 50 bpm and a BP 90/40mmHg. CT brain scan shows age related atrophy.The blood results are shown.\n\n \n\t\n \n\t\n \n\t\n \n\n\nSodium\n\t\n120\n\t\nmmol/L\n\t\n(137 -145)\n\n\nPotassium\n\t\n4\n\t\nmmol/L\n\t\n(3.5 – 5.0)\n\n\nUrea\n\t\n6\n\t\nmmol/L\n\t\n(2.5 – 7.5)\n\n\nCreatinine\n\t\n90\n\t\nmicromol/L\n\t\n(50 - 100)\n\n\nMeasured Osmolality\n\t\n255\n\t\nmmol/kg\n\t\n(280 - 300)\n\n\nGlucose\n\t\n3\n\t\nmmol/L\n\t\n3.5 – 6.0\n\n\nCK\n\t\n1000\n\t\nU/L\n\t\n(20 - 200)\n\n\nCholesterol\n\t\n7.2\n\t\nmmol/L\n\t\n(3.0-5.5)\n\n \na. What is the likely diagnosis and cause to account for all these blood results?\nb. List 4 measures essential for the specific management of this patient.\n \n \nJFICM Fellowship Exam 2008 No.1", "a": "A)\n\nhypothyroidism\namiodarone\n\n \n\nB)\nCommence thyroxine, probably low dose (50-100ug/day and slowly increase) or administer T3 orally or intravenously\nCommence on glucocorticoids (Hydrocortisone 50mg 6 hourly)\nCorrect the hypoglycaemia with intravenous glucose\nCorrect the hyponatraemia very slowly with hypertonic saline to a sodium 130mmol/L (no more than 2 mmol/L per hour)", "cat": "ECG"}, {"q": "A 34 year old lady who is 34 weeks pregnant presents with acute onset epigastric pain. The plasma biochemistry and the haematology report are provided.\n\n \n\nTest\n\n\t\n\nNormal Range\n\n\n\n\nSodium            138 mmol/L\n\n\t\n\n 135-145\n\n\n\n\nPotassium         4.4 mmol/L  \n\n\t\n\n3.2-4.5\n\n\n\n\nChloride           102 mmol/L\n\n\t\n\n 100-110\n\n\n\n\nBicarbonate      27 mmol/L  \n\n\t\n\n17-28\n\n\n\n\nAnion Gap        9 mmol/L  \n\n\t\n\n5-15\n\n\n\n\nCreatinine        66 micromol/L  \n\n\t\n\n50-100\n\n\n\n\nUrea                4.3 mmol/L  \n\n\t\n\n1.0-5.0\n\n\n\n\nTot Protein      76H g/L     \n\n\t\n\n55-75\n\n\n\n\nAlbumin          36 g/L     \n\n\t\n\n28-38\n\n\n\n\nCalcium           2.35 mmol/L  \n\n\t\n\n2.00-2.50\n\n\n\n\nCa Alb Cor      2.53H mmol/L  \n\n\t\n\n2.00-2.50\n\n\n\n\nPhosphate        1.03 mmol/L  \n\n\t\n\n0.7-1.4\n\n\n\n\nMagnesium       0.8 mmol/L  \n\n\t\n\n0.7-1.0\n\n\n\n\nGlucose           4.7 mmol/L  \n\n\t\n\n3.6-7.7\n\n\n\n\nCK Total         71 U/L     \n\n\t\n\n<160\n\n\n\n\nLD                 748H U/L     \n\n\t\n\n100-200\n\n\n\n\nAST               241H U/L     \n\n\t\n\n10-45\n\n\n\n\nALT              189H U/L     \n\n\t\n\n5-45\n\n\n\n\nGGT              45 U/L     \n\n\t\n\n10-70\n\n\n\n\nALP              185H U/L     \n\n\t\n\n65-180\n\n\n\n\nBilirubin Total      40 micromol/L  \n\n\t\n\n<20\n\n\n\n\nWCC              12.4 ^9/L  \n\nHb               88 g/L  \n\nPlat             64L x10^9/L      \n\n\t\n\n4.0-15.0\n\n110-160\n\n150-400\n\n \n\n \n\n \n\n \n\n1. What is the most likely diagnosis?\n\n2. What 2 additional tests will support your diagnosis?\n\n3. List 4 treatment options\n\n \n\nJFICM Fellowship Exam 2008 No.1", "a": "1.\n\nHELLP syndrome\n\n2.\n\nHaptoglobins : low                        \nBlood film showing evidence of hemolysis \n\n \n\n3.\n\nDelivery of baby                        \nSteroids\nAntihypertensives\nMagnesium sulphate\nPlasma exchange", "cat": "Biochemistry"}, {"q": "A 33 year old female presented with high fever and abdominal pain.  She has gram negative bacteraemia and septic shock.  The following are data from blood gas analysis\n\nBarometric pressure\t760mmHg\nFiO2\t0.3\npH\t7.43\nPaO2\t107\nPaCO2\t23\nHCO3\t15\nSBE\t-8.6\nLactate\t23\nNa\t147\nK\t6.7\nChloride\t95\n\nList the acid-base abnormalities\nWhat are the causes of elevated plasma lactate in sepsis?\nName 3 drugs which result in hyperlactaemia\n\nJFICM Fellowship Exam 2007 No. 1", "a": "High anion gap metabolic acidosis with raised lactate.  Change in base excess < change in anion gap therefore co-existant metabolic alkalosis.  Respiratory compensation is excessive suggesting respiratory alkalosis\nCauses of high lactate in sepsis\nCirculatory failure causing tissue anaerobic metabolism\nMicrovascular shunting and mitochondrial failure, also leading to anaerobic metabolism\nAdrenaline blocking pyruvate dehydrogenase\nInhibition of pyruvate dehydrogenase by endotoxin\nDrugs causing lactic acidosis\nCatecholamines\nMetformin / phenformin\nAlcohols\nCyanide, nitroprusside\nSalicylates", "cat": "ABG"}, {"q": "A 64 year old diabetic with vasculopathy undergoes an attempted endovascular repair of an abdominal aortic aneurysm.  However, the procedure is abandoned because of technical difficulties and he undergoes a surgical repair.  In the first 6 hours after the procedure, he is noted to be oliguric and a blood test reveals a creatinine of 0.24mmol/L (pre-op level 0.15mmol/L)\n\nList 5 likely causes of deterioration of renal function\n\nThe patient is administered IV fluids overnight.  Despite stable blood pressure overnight, the next morning he is noted to be still oliguric.  The plasma biochemistry is as follows:\n\nNa (135-145)\t137\nK (3.5-5.0)\t6.3\nCl (100-110)\t106\nHCO3 (22-33)\t18\nUrea (3-8)\t15.0\nCr (0.07-0.12)\t0.34\nTotal Calcium (2.15-2.6)\t1.75\nPhosphate (0.7-1.4)\t2.75\nAlbumin (33-47)\t26\nGlobulins (25-45)\t35\nTotal bilirubin (4-20)\t20\nConjugated bilirubin (1-4)\t4\n\n\nGamma GT (0-50)\n\n\t6\nALP (40-110)\t100\nLDH (110-250)\t3800\nAST (<40)\t2100\nALT (<40)\t100\n\nWhat is the likely cause of this plasma biochemistry\n\nJFICM Fellowship Exam 2007 No 1", "a": "Renal dysfunction\n\nHypovolaemia (pre-renal)\nAbdominal compartment syndrome\nRenal artery trauma\nCardiogenic dysfunction and shock\nPerioperative ischaemia due to clamp\nUse of contrast during endovascular procedure\nEmbolisation of plaque during endovascular procedure\nPost operative bleeding\nIschaemic rhabdomyolysis\nSepsis (inadvertent bowel ischaemia )\nNephrotoxic drugs\n\nCause of biochemistry\n\nRhabdomyolysis from lower limb ischaemia", "cat": "ABG"}, {"q": "You are called to the ED to review a 75 year old previously independant woman who has presented with GCS12/15 then had a self-limiting seizure. CT brain is normal. On examination she appears euvolaemic. Medications include carbimazole, hydrochlorthiazide, atenolol, and fosinopril.\n\n1. Comment on the following biochemistry\n\n2. What is the osmolar gap?\n\n                   Plasma\t              Plasma\nSodium\t108 mmol/L\tCortisol\t1300 nmol/L\nPotassium\t3.1   mmol/L\tOsmolality\t242 mmol/kg\nChloride\t72 mmol/L\t \t \nBicarbonate\t21 mmol/L\t                  Urine\nUrea\t4.0 mmol/L\tOsmolality\t 502 mmol/kg\nCreatinine\t75 umol/L\tSodium\t94 mmol/L\nGlucose\t12 mmol/L\t \t \n\n3. What are the likely aetiologies?\n\n4. Outline your immediate management plan?", "a": "1. Comment on the following biochemistry\n\nHypo-osmolar hyponatraemia with inappropriately concentrated urine and increased urinary sodium\n\n2. What is the osmolar gap?\n\nOsmolar gap = measured osmo - calculated osmo (2 x Na + urea + glucose)= 242 - 232 = 10 mmol/L. There is not a large increase in unmeasured osmolar substances\n\n3. What are the likely aetiologies?\n\nPatient fits the category of euvolaemic, hypo-osmolar, hypontraemia with urinary Na> 20 mmol/L. The possible aetiologies are SIADH, drugs (includes thiazides), chronic renal failure, hypothyroidism and cortisol deficiency. She does not have evidence of the latter two.\n\nAs she is taking thiazides and carbimazole (antithyroid), it is possible that these have contributed to her condition. SiADH is a possible diagnosis, but requires the exclusion of other aetiologies.\n\n4. Outline your immediate management plan?\n\nResuscitation\nConsider risk of osmotic adaptation\nCentral pontine myelinolysis\nTraditionally said to be due to sudden correction leading to shift water out of brain’\nHowever many patients with rapid correction hyponatraemia have not had morbidity\nMost", "cat": "Biochemistry"}, {"q": "A 16 year old girl is admitted to the childrens ward with severe anorexia, complicated by a mild diarrhoeal illness.  She is rehydrated with IV dextrose and NG feeds are commenced.  On day 2 she is found collapsed in the toilet with a blood pressure of 75/45, atrial fibrillation with a rapid ventricular response of 135 and generalised weakness.\n\nHer electrolytes are as follows :\n\n \n\nParameter\tValue\tNormal Range\npH\t7.22\t7.35-7.45\nPaCO2\t21mmHg\t35-45mmHg\nPaO2\t174mmHg\t \nNa\t130mmol/L\t135-145mmol/L\nK\t1.2mmol/L\t3.5-5mmol/L\nCl\t110mmol/L\t100-110mmol/L\nBlood glucose\t9.0mmol/L\t4.4-8.9mmol/L\nBicarbonate\t16mmol/L\t22-32mmol/L\nPhosphate\t0.29mmol/L\t0.81-1.45mmol/L\nMagnesium\t0.22mmol/L\t0.70-1.10mmol/L\n\nDescribe the findings\n\nWhat is the most likely mechanism for this picture?\n\nHow will you manage this situation?", "a": "There is evidence of severe hypokalaemia, hypomagnesaemia and hypophosphataemia, associated with a mild metabolic acidosis.\n\nThese findings, with the clinical history, are classic of severe refeeding syndrome.  This is related to a relatively sudden rise in blood sugar load and consequent insulin exposure, which results in increased cellular uptake of phosphate, potassium and magnesium.  The hypotension, weakness and dysrhythmias are all results of the electrolyte deficiencies.\n\nManagement includes:\n\nAttention to airway, breathing, circulation\nStop all caloric intake\nMonitor in a high acuity area with resuscitation equipment\nReplace electrolytes aggressively\nGive thiamine and folate (both consumed with refeeding)\nSlowly re-introduce feeding, monitoring fluid balance, cardiac function and electrolytes\n\nComment : Refeeding syndrome is a variable condition associated with reintroduction of feeding after a period of severely restricted caloric intake.  Apon exposure to insulin, there is intracellular shift of essential electrolytes which may resul", "cat": "ABG"}, {"q": "A 68 year old male presents to the ED with altered mental state and lethargy, increasing in severity over the past 2 weeks.  He has a history of traumatic brain injury and alcoholism, and has been taking sodium valproate for a consequent seizure disorder and ramipril for hypertension.  He is known to have abnormal LFTs\n\nOn examination he is found to be obtunded, with florid asterixis.   No focal neurological signs are present.  FBE, electrolytes, INR and arterial blood gases are all normal.  LFTs are largely unchanged, and a serum valproate level is 59mg/L (normal therapeutic range 50-100mg/l).  A head CT is performed, and is reported as normal.  Blood sugar levels are normal.\n\nWhat is the likely diagnosis?", "a": "Valproate hypoerammonaemic encephalopathy.\n\nVHE is an uncommon complication of valproate therapy.  In practice the diagnosis is often delayed by under-recognition.  As in this case, it may be associated with normal therapeutic levels of valproate.  It should be suspected in any patient presenting with confusion who take valproate, particularly in those with suspected or known liver impairment.\n\n \n\nReference : Hepatic encephalopathy precipitated by sodium valproate therapy.  Subhash H et al.  MJA 2008; 188:549", "cat": "ABG"}, {"q": "A 30 year old Malaysian man presents to ED with severe flaccid weakness. He had previously been taking Carbimazole for hyperthyroidism though this had been ceased 12 months previously without complication.\n \nHis initial investigations were as follows :\nNa 135\nK 1.5\nCl 110\nBic 22\nGluc 7.5\nPhosphate 0.41\nMg 0.65\nCa 2.25\nCr 65\n \nWhat is the cause of his weakness? How should he be treated?", "a": "Thyrotoxic periodic paralysis.\n \nTPP is a condition recognised in patients with hyperthyroidism who develop significant hypokalaemia and weakness. The mechanism is incompletely understood but relates to hyperactivity of the Na-K ATPase. This activity may be driven by adrenergic agents, which have more effect in the presence of thyroxine and insulin. Attacks commonly occur at night after high carbohydrate loads (stimulating insulin release) and after periods of exercise.\n \nTPP is more common in Asian men with thyrotoxicosis but is relatively rare in Europeans. Associated hypophosphataemia and moderate hypomagnesaemia are not uncommon. \n \nWhile potassium replacement is effective and often required, rebound hyperkalaemia may occur. It is thought that serum K deficiency is related to transcellular shift and as such, total body potassium is largely unaltered. Early treatment with propranolol may reduce Na-K ATPase activity, and prompt diagnosis and treatment of hyperthyroidism is important.", "cat": "Biochemistry"}, {"q": "A 54 year old man has been ventilated for 7 days following an episode of severe necrotising pancreatitis.  He is struggling to wean from the ventilator.  The following results are obtained.\n\n \n\n \t \tNormal Range\nT3\t1.9pmol/L\t2.9-8.9\nT4\t9.9pmol/L\t9.0-23.0\nTSH\t0.43IU/L\t0.3-5.0\n\nInterpret the results.  Discuss the indication for T3 or T4 therapy", "a": "The results show a low T3 and the values of TSH and T4 are in the low normal range.\n\nThis is a classic pattern of the Sick Euthyroid Syndrome, or Low T3 syndrome.\n\nComment : The thyroid axis is commonly altered in critical illness.  The commonest pattern of thyroid axis dysfunction is isolated low T3, largely related to decreased activity of the 5-deiodinase.  This may result in an increase in rT3.  However, clinical euthyroidism is common in this situation, and may be related to decreased binding of the free hormone and increased expression of nuclear binding sites.\n\nLow total T4 is also common, and the degree appears to correlate with survival. \n\nOften there is an associated decrease in TSH.  This may be an adaptive response, to limit energy consumption.  However, cytokines, dopamine and glucocorticosteroids may also interfere with the axis.\n\nThere are only limited trials of T4 and T3 therapy in critical illness.  At this point there is no evidence to support their use in this context.\n\nMeasurement of free levels of T3 and T4 are complex in critical illness for many reasons.", "cat": "Biochemistry"}, {"q": "A 26 year old female is in intensive care following an appendicectomy for a severely necrotic appendix and peritonitis.  She is on 22mcg/min of noradrenaline and 2.4U/hr of vasopressin.\n\nThe following tests are taken on day 2 in ICU :\n\n \n\nTest\tValue\tNormal Range\nCortisol (baseline)\t480nmol/L\t138-690nmol/L\nCortisol (1 hour post 250mcg ACTH)\t610nmol/L\t \n\nDescribe the results.  Would you give her steroids?", "a": "The results show a cortisol in the normal range, but this may be too low for the degree of illness of the patient.  This is reinforced by a poor reponse to ACTH stimulation (a response of <250nmol/L is considered insufficient in the face of severe illness).  This is the so called \"non-responder\" as defined by Annane.  This has now become known as \"Critical Illness Related Cortisol Insufficiency (CIRCI).\n\nThere is considerable debate about the definitions, measurement and even existance of CIRCI.  Measurement of free cortisol levels, transportation into cells, interation with nuclear receptors and gene expression are all poorly understood, and are not practical in clinical practice.  As such, diagnosis is challenging.\n\nAttempts have been made to identify groups where steroid therapy may be useful.  Annane et al demonstrated steroid therapy had a sparing effect on catecholamine infusions in sepsis.  A subsequent study suggested septic patients with \"exhausted adrenal reserve\" may survive longer with steroids.  However, the recent CORTICUS study did not show any benefit of steroid infusions regardless of response to ACTH.\n\nRecently the concept of the sick euadrenal syndrome has been raised, analagous to the changes seen in the thyroid axis in critical illness.  Further trials are eagerly awaited.", "cat": "Echo"}, {"q": "A 70 year old male presents to emergency with a self-limited convulsion, confusion and diarrhoea.  He has been maintaining fluid intake but is eating poorly.  He has a history including congestive cardiac failure requiring a recent hospital admission, is a reformed smoker and has treated hypertension.  His medications are aspirin, indapamide and metoprolol.  He has no known allergies.\n\n \n\nAn initial blood sample is taken :\n\n \n\n \tValue\tNormal Range\nSodium\t105\t135-145mmol/L\nPotassium\t3.5\t3.5-5.0mmol/L\nChloride\t81\t100-110mmol/L\nBicarbonate\t20\t22-33mmol/L\nUrea\t9.0\t3.0-8.0mmol/L\nCreatinine\t0.11\t0.07-0.12mmol/L\n\nDiscuss the test results\n\nWhat other investigations would you perform to help you interpret these results?\n\nDescribe your immediate management", "a": "Summary of results : there is severe hyponatraemia with mild metabolic acidosis and borderline renal function.  The anion gap is normal.\n\n \n\nThe neurological dysfunction may be explained by the Na result which is very low, but may also be affected by the underlying process (eg Legionella pneumonia, CNS tumour, septic encephalopathy etc)\n\n \n\nHyponatraemia can result from multiple causes.  In this patient, the likely contributors include :\n\ncongestive cardiac failure (due to apparent volume loss and renin-angiotensin system activation)\nloss of salt without replacement due to diarrhoea\nindepamide\nvolume depletion (low volume is a more potent stimulus for ADH secretion than hyponatraemia is to suppress it)\nSIADH\n\nAll may be contributing in some way.\n\n \n\nOther tests : Usually causes are divided into hypo-osmolar and non-hypoosmolar.  Serum osmolality is measured to allow this to be assessed.\n\nSpurious causes of hyponatraemia include hyperglycaemia, hyperlipidaemia and high serum proteins.  These artificially increase Na concentration readings in many laboratory tests.  Urine electrolytes and os", "cat": "Biochemistry"}, {"q": "New Search Previous\n27. \t\n\nA 61 year old female presents with confusion and debility.  She is grossly dehydrated and has had a month long history of progressive back pain.  She is now struggling to mobilise.\n\n \n\nInitial biochemistry is as follows.  You are asked to review in view of the abnormalities detected.\n\n \n\nInterpret the results\n\n \n\n \n\n \tResult\tNormal Range\nSodium\t133\t135-145\nPotassium\t3.9\t3.5-5.2\nChloride\t107\t98-110\nBicarbonate\t26\t22-32\nUrea\t17\t3.0-8.0\nCreatinine\t137\t10-120\nPhosphate\t1.41\t0.70-1.40\nCalcium\t3.84\t2.20-2.55\nProtein\t120\t62-80\nAlbumin\t32\t39-46\nBilirubin\t27\t6-24\nALP\t92\t30-110\nALT\t32\t<40 I/U\n\n \n\nNew Search View Answer Previous", "a": "The most notable abnormality is the marked hypercalcaemia.  This is likely to explain her dehydration and confusion.\n\n \n\nOther abnormalities include evidence of pre-renal azotaemia and mild hyperbilirubinaemia.\n\n \n\nCommon causes of marked hypercalcaemia include malignancy (either due to metastasis, primary bone disease or hormone synthesis), hyperparathyroidism and granulomatous disease.\n\n \n\nOf note, the blood screen also demonstrates a high serum protein level, not due to albumin, and a low anion gap.  These features, in this context, are suggestive of multiple myeloma, due to aberrant immunoglobulin (paraprotein) production.  ALP is often normal despite bony involvement.  A mild hyponatraemia is artifactual due to the high protein content of the sample.", "cat": "Biochemistry"}, {"q": "QL2):   A 40 year old man was urgently referred to the ICU from the renal unit, with a rapid onset of ascending motor and sensory paralysis requiring intubation and ventilation.  He had been admitted to hospital about 1 week previously with the following biochemistry:\n\nCreatinine\n\n\t\n\n880umol/L\n\n\n\n\nUrea\n\n\t\n\n36mmol/L\n\n\n\n\nALT\n\n\t\n\n1281 U/L\n\n\n\n\nPlatelets\n\n\t\n\n85 x10^9/L\n\n\n\n\nProthrombin Time\n\n\t\n\n236 sec\n\n\n\n\n \n\n\n\n\npH\n\n\t\n\n7.14\n\n\n\n\nPaO2\n\n\t\n\n13.5kPa\n\n\n\n\nPaCO2\n\n\t\n\n2.1kPa\n\n\n\n\nLactate\n\n\t\n\n9.5mmol/L\n\n\n\n\nAnion Gap\n\n\t\n\n29mmol/L\n\n \n\nThe patient had been on intermittent haemodialysis since admission with little improvement.  Prior to intubation and ventilation, the patient was confused with increasing weakness and difficulty with swallow.  His pupils were fixed and dilated.\n\n\n\n\nDescribe the abnormalities present on initial blood investigations?\n\nList the differential diagnoses?\n\nWhat management and further investigations would you instigate on the ICU?", "a": "QL2):  Answer: \n\nAbnormalities:\n\nMarked acute renal failure with raised urea and creatinine\n\nLiver dysfunction\n\nThrombocytopaenia\n\nProlonged prothrombin time\n\nMarked metabolic acidosis with hypocapnia and lactaemia\n\nRaised anion gap\n\nDifferential:\n\nGuillain Barre syndrome\n\nMetabolic causes (diabetes, porphyria, uraemia)\n\nInfection\n\nAutoimmune (vasculitides)\n\nToxins (alcohols, methanol, ethylene glycol, organophosphates, heavy metals, arsenic)\n\nCritical illness polyneuropathy\n\nInvestigations and Management:\n\nDifficulty here as diagnosis not clear\n\nResuscitation, stabilisation and support on ICU\n\nRenal replacement therapy to continue (CVVH)\n\nIn view of high anion gap – possibility of self-poisoning.  Consider fomepizole if ethylene glycol poisoning confirmed or suspected.\n\nNerve conduction studies – may help diagnosis GBS.  In this case –features were consistent with ethylene glycol toxicity.\n\nRenal biopsy – acute tubular", "cat": "ABG"}, {"q": "QL3):  A 58yr old man diabetic presents to the ED unconscious.  Following intubation and ventilation his initial bloods are:\n\nHaemoglobin\n\n\t\n\n124 g/L\n\n\n\n\nWCC\n\n\t\n\n6.5 x10^9/L\n\n\n\n\nNa\n\n\t\n\n147mmol/L\n\n\n\n\nK\n\n\t\n\n5.6mmol/L\n\n\n\n\nCl\n\n\t\n\n108mmol/L\n\n\n\n\nUrea\n\n\t\n\n45.4mmol/L\n\n\n\n\nCreatinine\n\n\t\n\n361umol/L\n\n\n\n\nCRP\n\n\t\n\n585mg/L\n\n\n\n\npH\n\n\t\n\n7.32\n\n\n\n\nPaCO2\n\n\t\n\n3.65kPa\n\n\n\n\nPaO2\n\n\t\n\n12.89kPa\n\n\n\n\nBE\n\n\t\n\n-11.3\n\n\n\n\nHCO3-\n\n\t\n\n13.6mmol/L\n\n\n\n\nLactate\n\n\t\n\n2.1mmol/L\n\n\n\n\nGlucose\n\n\t\n\n42mmol/L\n\n\n\n\nPlasma Osmolality\n\n\t\n\n503mOsm/kg\n\n\n\n\nUrine Osmolality\n\n\t\n\n708mOsm/kg\n\n \n\nEstimate the patient’s serum osmolality, osmolar gap and anion gap?\n\nWhat is your diagnosis and initial management plan?", "a": "QL3):  Answer\n\nEstimated Serum Osmolality = 2(Na)+Urea+Glucose = 381.4\n\nEstimated Serum Osmolality = (2*(147)+45.4+42 = 294+45.4+42 = 381.4\n\n \n\nMeasured Serum Osmolality = 503mOsmol/kg (normal 285-295mOsmol/kg)\n\n \n\nOsmolar gap = Measured Osmolality – Calculated Estimated Osmolality\n\nOsmolar gap = 503 – 381.4 = 121.6  (>10mOsm/kg is raised)\n\n \n\nRaised Osmolar gap consider: diabetes mellitus, high blood ethanol, methanol, mannitol or ethylene glycol\n\n \n\nAnion gap = (Na+K)-(Cl+HCO3)\n\nAG = (147+5.6)-(108+13.6) = 30  (normal range 10-18mmol/L)\n\nAG is raised due to excess acid: Pneumonic “Left total knee replacement” = Lactate, Toxins (ethanol, ethylene glycol, methanol), Ketones and Renal failure\n\n \n\nDiagnosis:  Acute Hyperglycaemia Hyperosmolar State (HHS)\n\n(previously known as Hyperglycaemic hyperosmolar non-ketotic coma, but disregarded as ketosis can occur)\n\n \n\nManagement:  Based on 2012 Joint British Diabetes Societies Inpatient Care Group Guidelines:\n\nMeasure or calculate osmolality (2Na+) + glucose + urea to monitor response\n\nUse iv 0.9% Sodium Chloride to restore circulating volume.  Only switch to 0.45% NaCl if osmolality is not declining adequately despite positive fluid balance", "cat": "ABG"}, {"q": "QL9):  A 30 year old anorexic patient presents following a collapse.  She is alert and conscious in the ED.  She tells you that she is known to have Gitelman’s syndrome.  Her bedside ECG and bloods are as follows:\n\n\n\n\n \n\n\n\n\n \n\npH\n\n\t\n\n7.33\n\n\t\n\nNa\n\n\t\n\n140mmol/l\n\n\n\n\nPaCO2\n\n\t\n\n5.62kPa\n\n\t\n\nK\n\n\t\n\n1.9mmol/l\n\n\n\n\nPaO2\n\n\t\n\n13.7kPa\n\n\t\n\nCl\n\n\t\n\n107mmol/l\n\n\n\n\nLac\n\n\t\n\n1.9\n\n\t\n\nHCO3-\n\n\t\n\n21.6mmol/l\n\n \n\n \n\nWhat does the ECG show?\n\nWhat is the likely cause of her symptoms and diagnosis?", "a": "QL9):  Answer:\n\nThe ECG shows ventricular bigeminy caused by acute hypokalaemia (K+ 1.9mmol/l).  Her collapse may have been related to a dysrhythmia (e.g ventricular tachycardia, torsades de pointes).\n\n\n\n\nAcute hypokalaemia is defined as a serum potassium <3.5mmol/l.  It has many causes:\n\nInadequate dietary intake (urine K+<20mmol/l) due to abnormal body losses (e.g. vomiting, diarrhoea, laxative abuse, NG aspiration)\n\nRenal losses (urine K+>20mmol/l, e.g Conns syndrome, Cushings syndrome, Barrters syndrome, Gitelman’s Syndrome, Ectopic ACTH). Renal tubular acidosis.\n\nDrugs (diuretics, corticosteroids, carbapenems, amphotericin B, gentamicin, Cisplatin),\n\nMagnesium deficiency\n\nCompartmental shifts (alkalosis, insulin, Na+/K+ stimulation, hypothermia, hypokalaemic periodic paralysis, delayed following blood transfusion). \n\n \n\nIn this case, the patient had known Gitelman’s syndrome a rare, autosomal recessive renal tubular disorder that usually emerges after childhood and affects the kidney’s ability to conserve potassium or magnesium or both.  Chronic hypokalaemia and hypomagnesaemia is often managed with supplements and diuretics (amiloride, spironolactone), ACE inhibitors and B-blockers tailored towards each individual patient.  The patient in this case normally had low potassium levels which were optimally controlled with treatment, but diuretic abuse", "cat": "ABG"}, {"q": "QL8):  A 25yr old man falls from a cliff edge onto rocks.  On arrival in the ED he deteriorates with worsening shortness of breath. \n\nWhat does the resus portable CXR show?\n\nWhat is your immediate management?", "a": "QL8):  Answer:\n\nLeft Tension Pneumothorax with right shift of heart and mediastinum causing compromise secondary to fractured left 5-7th ribs\n\nImmediate management: needle thoracocentesis in 2nd intercostal space midclavicular line.  A 14G cannula (with 10ml syringe filled with water to confirm air if available) can be used.  Once the cannula is in place an intercostal chest drain should be sited.  Needle thoracocentesis has a high failure rate due either cannula kinkage/displacement or the chest wall muscle being too deep for the cannula to reach the pleural space.  If a chest drain is not immediately available, a thoracostomy may be performed with ashermann seal dressing attached.", "cat": "X-Ray"}, {"q": "QL19):  Comment on this post-operative chest X-ray:", "a": "QL19):  Answer:  Endobronchial nasogastric tube\n\nThis patient is intubated with endotracheal tube seen above the carina. \n\nThe main complication is the presence of the naso-gastric tube in the left main bronchus.  Feeding via a nasogastric tube that is within the lung is a ‘never-event’.  Intensivists need to be vigilant at preventing such a complication which is associated with significant morbidity and mortality.  \n\nBilateral pneumonia is evident.  A left internal jugular vasc-cath and right internal jugular central venous access line are present.", "cat": "X-Ray"}, {"q": "QL20):  List the hardware seen on this CXR and comment on chest pathology?", "a": "QL20):  Answer:\n\nThis patient has a significant right sided empyema, which has not resolved despite a right sided pig-tail drain.  It is likely that this drain needs to be upgraded to a larger surgical chest drain +/- video-assisted thoracoscopic surgery for washout of persistent empyema.\n\nHardware includes:  right pig-tail chest drain, NG tube insitu with the remainder of external NG tube lying unhelpfully over left chest, Left PICC line for long-term antibiotics, tracheostomy tube, ECG clips.", "cat": "ECG"}, {"q": "QL22):  A 75yr old woman presents with acute abdominal pain.  On examination she is obtunded and peritonitic.  An erect chest X-ray was undertaken:\n\n \n\nDescribe the CXR.  What is your diagnosis and subsequent management?", "a": "QL22):  Answer:\n\nThis erect CXR shows significant air under the diaphragm bilaterally, consistent with an acute bowel perforation.  This patient requires resuscitation, stabilisation and if appropriate immediate surgical intervention / laparotomy.", "cat": "X-Ray"}, {"q": "QL31):  A 38yr old patient presents with persistent headache, fatigue and fever.  Her past medical history includes craniotomy for astrocytoma 10yrs previously.   A chest-Xray is undertaken as part of her work up.  Describe the CXR:", "a": "QL31):  Answer:  A ventriculoparietal (VP) shunt is evident overlying the left lung field.  Her CXR is otherwise clear.  Following craniotomy in the past for astrocytoma, the patient developed hydrocephalus and required the insertion of a VP shunt.  On further investigation the VP shunt was deemed to be blocked on this occasion, requiring surgical revision.", "cat": "X-Ray"}, {"q": "QL33):  A cystic fibrosis patient presented with severe respiratory failure. \n\nComment on their CXR below.\n\nWhat organism may be responsible for this CXR appearance in this group of patients?", "a": "QL33): Answer:  \n\nThe CXR shows acute severe bilateral pneumonia.  A left sited portacath for longterm antibiotics is in-situ. \n\nThis cystic fibrosis patient was infected with Burkholderia cepacia, a group of gram-ve negative bacteria.  It is often a cause of pneumonia in immunocompromised individuals with underlying lung disease such as cystic fibrosis.  Infection control precautions are paramount as the bacteria is very difficult to eradicate and can easily be spread between person to person.  Burkholderia infection can cause rapid decline in lung function and ultimately death.  Treatment is difficult and involves supportive therapy (often NIV) and multiple antibiotic regimens.", "cat": "Clinical"}, {"q": "QL39):  Comment on this chest X-ray:  \n\n\n\n\n\n\n\nThe patient was on 100% FiO2 via a Hudson non-rebreathe mask.  Blood gases showed a PaO2 8.0kPa and PaCO2 6.7kPa. \n\nHow would you classify acute respiratory distress syndrome (ARDS)?", "a": "QL39) Answer:\n\nThe chest X-ray shows:\n\nMarked bilateral opacities R>L\n\nNot currently intubated\n\nHickman line Porta-cath evident in right subclavian vein\n\n\n\n\nFor diagnosis, the timing of ARDS must occur within 1 week of a known clinical insult and new or worsening respiratory symptoms.  The Berlin definition classifies ARDS according to the PaO2/FiO2 ratio: mild (PF ratio <39.9kPa or 300mmHg) with positive end-expiratory pressure (CPAP) >5cmH2O, moderate (PF ratio <26.6kPa or 200mmHg) with PEEP >5cmH2O and severe (PF ratio <13.3kPa or 100mmHg) with PEEP .5cmH2O.\n\n \n\nReferences:\n\nThe ARDS Definition Task Force.  Acute Respiratory Distress Syndrome.  The Berlin Definition.  JAMA.  2012; 307(23):2526-2533", "cat": "ABG"}, {"q": "QL42):  A 56 year old patient presents with increasing shortness of breath. \n\nList the abnormalities on this chest X-ray.", "a": "QL42):  Answer:\n\nThere is evidence of acute bilateral pneumonia: right middle lobe and left lower lobe.  The patient has had previous cardiac surgery with midline sternotomy wires evident.", "cat": "X-Ray"}, {"q": "QL43):  You are asked to review the CXR of a 74 year old man on the general ICU.  He was initially admitted in acute respiratory failure following a myocardial infarction.\n\nComment on the CXR.", "a": "QL43):  Answer:\n\nThe patient is intubated and ventilated.  Marked opacities are evident bilaterally and consistent with acute pulmonary oedema.  NG tube is visible. \n\nThe patient is likely to be suffering from cardiogenic shock or acute heart failure following their initial myocardial infarction.", "cat": "Clinical"}, {"q": "QL45): A 35 year old female who was 37 weeks pregnant (G1P0) presented to the A&E department, with a 15-day history of progressively increasing shortness of breath.   For the last 7 days she also complained of swelling in both her legs.  Clinically, her observations were: BP 180/110mmHg, HR 140/min irregular, respiratory rate 36/min, SaO2 96%.  On examination, the patient was pale.  JVP was raised.  On auscultation bilateral crepitations and S3 gallop were evident.\n\nComment on her CXR.\n\nWhat is the suspected diagnosis?\n\nWhat other investigations would you request?", "a": "QL45):  Answer\n\nThe CXR show bilateral shadowing consistent with acute pulmonary oedema.  Her heart appears large and is suspicious of cardiomegaly.\n\nIn view of clinical presentation and the fact that the patient is 37 weeks pregnant, peripartum cardiomyopathy is suspected and needs to be excluded.\n\nOther investigations would include:  urgent echocardiography.  Echo in this case demonstrated that the patient had an ejection fraction of 30% with mild generalised hypokinesia of the left ventricle, mild to moderate TR and mild MR, with signs of congestive cardiac failure. \n\nThe diagnosis in this case is peripartum cardiomyopathy with left ventricular failure.\n\nManagement:  peripartum cardiomyopathy is a diagnosis of exclusion and usually presents in similar way to patients with systolic heart failure.  It often manifests in the final trimester of pregnancy.  Management involves the use of diuretics, vasodilators, digoxin and anticoagulants (particularly in those with an EF <35%).  Delivery of the fetus often reduces the haemodynamic stresses on the heart.  The anaesthetic technique and timing of delivery needs to be a decision undertaken by a multi-disciplinary team, involving obstetricians, cardiologists, anaesthetists and midwives.    ACE inhibitors are considered the main", "cat": "ECG"}, {"q": "QL47):  This is chest X-ray is from a patient on a cardiothoracic intensive care unit.\n\nComment on the X-ray:", "a": "QL47):  Answer\n\nThe CXR shows:\n\nThe patient is intubated.\n\nNG tube in the stomach\n\nRight IJV central line\n\nIntra-aortic balloon pump insitu – the patient is in cardiogenic shock\n\nOverlying ECG wires", "cat": "ECG"}, {"q": "QL50):  Describe the main features on this chest-Xray:", "a": "QL50):  Answer\n\nOn CXR:  The patient has had a mitral and aortic valve replacement.  Right sided pleural effusion evident.", "cat": "X-Ray"}, {"q": "QL51):  A 75 year old man presented with increasing shortness of breath.  Past medical history includes a biventricular pacemaker for cardiac dysfunction.\n\nComment on his CXR:", "a": "QL51):  Answer\n\nThe CXR shows a biventricular pacemaker insitu.  The heart shadow is large and is suspicious of a pericardial effusion or globular heart failure.  Echocardiography confirmed the presence of a pericardial effusion.", "cat": "ECG"}, {"q": "QL53):  You were asked to place a NG tube in patient on the ICU.  A nurse asks whether they can feed the patient?", "a": "QL53):  Answer\n\nNo, the NG should not be used for feeding!  The NG tube has looped on itself in the stomach with the tip actually being back up high in the oesophagus / mouth.  The NG tube needs replacing.", "cat": "Clinical"}, {"q": "QL61):  This patient presented with abdominal pain, nausea and vomiting and constipation. \n\nComment on the CXR and possible diagnosis:", "a": "QL61):  Answer:  The CXR shows: a raised right hemi-diaphragm, with colonic interposition between the liver and diaphragm.  This is called the Chilaiditi sign.  This is a rare anomaly incidentally seen on chest and abdominal radiographs with an incidence of 0.025-0.28%.\n\nChilaiditi syndrome refers to the medical condition in which a Chilaiditi sign is accompanied by clinical symptoms including: abdominal pain (mild to acute abdominal pain), nausea and vomiting, constipation, respiratory distress, complications (volvulus of colon, splenic flexure or transverse colon, caecal perforation and subdiaphragmatic appendicitis).\n\nReferences:\n\nMoaven O, Hodin RA.  Chilaiditi syndrome: a rare entity with important differential diagnoses.  Gastroenterology and Hepatology.  2012; 8(4):276-278", "cat": "X-Ray"}, {"q": "QL78):  Describe this chest X-ray?", "a": "QL78):  Answer:\n\nThe chest X-ray shows significant enlargement of the left atrium.  Left atrial appendage enlargement is highly suggestive of mitral stenosis secondary to rheumatic heart disease.\n\nRheumatic heart disease has a number of classic radiographic findings:   enlarged left atrium, splaying of the mainstem bronchus and posterior displacement of the left lower lobe bronchus.\n\nRheumatic fever may develop as a consequence of group A streptococcal infection.  Rheumatic heart disease is the most serious complication of rheumatic fever and is thought to be due to an autoimmune response post streptococcal infection, causing systemic features, cardiac inflammation and valve damage.\n\nReferences:\n\nChin TK, Berger S.  Pediatric Rheumatic Heart Disease.  2014. http://emedicine.medscape.com/article/891897-overview", "cat": "ECG"}, {"q": "QL79):  This patient presented acutely breathlessness.  Describe this chest X-ray:", "a": "QL79):  Answer:\n\nDiagnosis:  Right lower lobe consolidation – probable acute pneumonia. \n\nIt would be of benefit undertaking an ultrasound of this patient’s chest to exclude pleural effusion.", "cat": "X-Ray"}, {"q": "QL84):  Comment on this chest X-ray:", "a": "QL84):  Answer: \n\nThe CXR shows:\n\nThe patient is intubated.  The endotracheal tube appears to be above the carina\n\nRight sided complete ‘white out’ of the chest.  This is consistent with worsening consolidation.  Endo-bronchial intubation and right bronchial obstruction needs to be excluded.\n\nLeft sided pneumothorax evident.  Left basal consolidation / effusion\n\nRight sided IJV line\n\nOverlying ECG wires", "cat": "ECG"}, {"q": "QL91):  This 67 year old patient presented acutely with shortness of breath.  A blood gas taken on 15 litres O2 (FIO2 90%) showed: pH 7.34, PaCO2 6.5kPa, PaO2 10.2kPa, BE -6.6.  Lactate 3.4.  Hb 87g/L.  A trial of non-invasive ventilation failed, with the patient requiring immediate intubation and ventilation.  He was put on BIPAP (PInsp 30 / PEEP 10).  Frequency 12/min.  Tidal volumes 400ml.\n\nDescribe the chest X-ray below\n\nWhat is your initial diagnosis?\n\nWhat management strategies could you employ for refractory respiratory failure?", "a": "QL91):  Answer:\n\nThe CXR shows:\n\nThe patient is intubated with endotracheal tube seen above the carina\n\nMarked patchy consolidation is evident throughout both lung fields (worse R>L).  These features are consistent with severe pneumonia / Acute respiratory distress syndrome (ARDS)\n\nA left sided CVP line is seen.  The line is not in an ideal position as it appears to be at the junction between the brachiocephalic vein and the SVC.  The line tip is at risk of abutting the wall of the SVC, directing fluid flow into it.  This may increase the risk of vessel extravasation into the chest.  The line ideally should be further in towards the right atria with the end directing fluid flow downwards (not horizontal).\n\nA nasogastric tube is seen in the stomach.\n\nInitial diagnosis:\n\nPaO2=10.2kPa\n\nFiO2=90%\n\nPaO2/FiO2 = 11.33kPa (84.98mmHg)\n\nThe patient is in Severe Respiratory Failure / Severe ARDS\n\nManagement strategies for refractory respiratory failure:\n\nLung protective ventilation (aim for tidal volumes 6-7ml/kg and Peak pressures <30kPa)\n\nHigher PEEP (>10cmH2O) may be beneficial in this severe subgroup of patients\n\nProne positioning for at least 16hrs in patients with PaO2:FiO2<150mmHg.\n\nOscillator (in some patients with severe ARDS HFOV may be considered on an individual basis. However, generic use for all patie", "cat": "ABG"}, {"q": "QL93):  This patient had undergone oseophagectomy recently.  His post-operative course had been complicated by worsening respiratory failure.  On review on the ICU he is receiving CPAP via a non-invasive mask.  He has one chest drain insitu, which is continuously bubbling.\n\nDescribe the CXR below:\n\n \n\n \n\nWhat management options are available for a persistent bronchopleural fistula?", "a": "QL93):  Answer:\n\nThe chest X-ray shows:\n\nBilateral pneumonia, worse throughout the right chest.\n\nA chest drain is in-situ on the left.  However, there is still evidence of pneumothorax and surgical emphysema.  The persistent bubbling of the chest drain is suspicious of a bronchopleural fistula (BPF)\n\nA nasogastric tube is in the stomach\n\nMediastinum:  oesophagectomy staple seen\n\nExternal monitoring and ECG leads are evident throughout the chest\n\nLeft internal jugular vasc-cath line is just seen\n\n\nBronchopleural fistula (BPF):\n\nA bronchopleural fistula (BPF) is when a communication exists (sinus tract) between the bronchial tree and pleural space as evidenced by continued leak post-pneumothorax.  BPF are often difficult to manage and are associated with significant morbidity and mortality.\n\nThe most common cause of BPF is complication following pulmonary resection surgery.  Other causes include: thoracic procedures (e.g. chest drain and line insertion, thoracoscopy), necrotic lung complicating chest infection (pneumonia / empyema), tuberculosis, following chemotherapy or radiotherapy for lung cancer, persistent spontaneous pneumothorax, thoracic trauma and a complication of mechanical ventilation (particularly following acute respiratory distress syndrome (ARDS) where high ventilatory pressures and PEEP are often required).\n\nClinically, BPF often presents with a persistent air leak despite placement of multiple chest drains.   BPF typically complicates", "cat": "ECG"}, {"q": "QL94):  Describe this chest-Xray:", "a": "QL94):  Answer:\n\nThis Chest X-ray shows:\n\nThe patient is intubated\n\nRight internal jugular vein CVP line\n\nBilateral chest drains\n\nBilateral rib fixation\n\nSpinal fusion rods\n\nThis patient has suffered significant trauma with bilateral flail chest / rib fractures and fractured vertebra.  This CXR is taken in the post-operative period after the flail chest and vertebral fractures have been stabilised surgically.\n\nManagement of flail chest:\n\nPatient fluid resuscitation until stabilised and adequately perfused.  Patients should not be excessively fluid restricted.\n\nMechanical ventilation in the absence of respiratory failure is not necessary and should be avoided\n\nOptimal analgesia and chest physiotherapy form the mainstay of conservative management to avoid respiratory failure.  Epidural catheter is the preferred mode of analgesia for severe flail chest injury.  Paravertebral analgesia may be equivalent to epidural analgesia in certain situations when epidural placement is contraindicated.\n\nA trial of continuous positive airway pressure (CPAP) should be tried in alert patients with borderline respiratory compromise.\n\nProtective mechanical ventilation (6-7ml/kg) with positive end-expiratory pressure should be used to support patients with severe respiratory failure for the minimum\n\nHigh-frequency oscillatory ventilation (HFOV) should be considered for patients failing conventional ventilatory modes.\n\nIndependent lung ventilation may also be considered in severe unilateral pulmonary contusion when shunt cannot be corrected.\n\nSurgical fixation of flail chest may be considered in cases of severe flail chest failing to wean from the ventilator or when thoracotomy is required.\n\nReferences:\n\nSimon B, Ebert J, Bokhari F, et al.  Management of pulmonary contusion and flail chest:  An Eastern Association for the Su", "cat": "X-Ray"}, {"q": "QL96):  This patient was stamped on by a herd of cows.  Comment on the CXR:", "a": "QL96):  Answer:\n\nThis patient has suffered significant trauma to their chest.\n\nThe right chest shows a number of rib fractures consistent with a flail chest.  There is lung contusion, an apical pneumothorax and surgical emphysema in the right chest.  There is a right sided surgical intercostal drain.\n\nThe patient is likely to need surgical fixation of this flail chest.  He is at risk of worsening respiratory failure in the next 24-48hrs and is likely to require critical care support e.g. optimal analgesia / epidural / paravertebral catheter / non-invasive ventilation / intubation and mechanical ventilation if need be.  \n\n \n\nReferences:\n\nSimon B, Ebert J, Bokhari F, et al.  Management of pulmonary contusion and flail chest:  An Eastern Association for the Surgery of Trauma practice management guideline.  J Trauma Acute Care Surg  2012;73: S351-S361.", "cat": "X-Ray"}, {"q": "QL100):  Describe this X-ray:\n\n \n\nIn relation to exudative pleural effusions, what are Light’s criteria?\n\n \n\nCan you list causes of exudative and transudate effusions?", "a": "QL100):  Answer:\n\nThe chest X-ray shows:  a large left sided pleural effusion.  Right internal jugular CVP line.  Sternotomy wires.  Right sided lower lobe consolidation.\n\nThis effusion may be related to recent bypass surgery\n\nLight’s criteria:  One of the following needs to be present to determine if pleural fluid is likely to be an exudate:\n\nEffusion protein / serum protein ratio greater than 0.5\n\nEffusion lactate dehydrogenase (LDH) / serum LDH ratio greater than 0.6\n\nEffusion LDH level greater than 2/3s the upper limit of the laboratory’s reference range of serum LDH\n\nLight’s Criteria is 98% sensitivity and 83% specific for identifying an exudative effusion.\n\nCauses of an exudative pleural effusion include:\n\nAscites, Meig’s Syndrome (benign ovarian tumour, ascites and pleural effusion (more commonly right-sided effusion)), pancreatitis, Churg-Strauss disease, Lupus, Rheumatoid arthritis, Wegener’s granulomatosis, hypothyroidism, ovarian hyperstimulation, drug-induced, oesophageal perforation, NG tube in lung, abscess near lung tissue, pneumonia (bacterial, fungal, tuberculosis, parasitic, viral), acute respiratory distress syndrome (ARDS), asbestosis, radiation, sarcoidosis, uraemia, chylothorax, malignancy (carcinoma, lymphoma, leukaemia, mesothelioma, paraproteinaemia), lymphangiectasia.  Post-bypass surgery.\n\nCauses of a transudate pleural effusion include:\n\nHeart failure, hepatic hydrothorax, hypoalbuminaemia, atelectasis (due to increased negative intrapleural pressure), nephrotic syndrome, CSF (leak into pleural space due to thoracic injury or ventriculoperitoneal (VP) shunt dysfunction), missed placed chest drain into the lung, peritoneal dialysis, urinoth", "cat": "ABG"}, {"q": "QL106):  A 65yr man develops sudden shortness of breath on the ward. \n\nDescribe this chest X-ray?\n\nWhat biochemical markers may be helpful in guiding your management plan?  What other investigations would you arrange?\n\nDescribe your management?", "a": "QL106):  Answer:\n\nThe chest X-ray shows features consistent with acute pulmonary oedema secondary to acute heart failure.   These are:  prominent upper lobe veins (upper lobe divertion), diffuse alveolar shadowing, septal lines and peribronchial cuffing.  Other features of heart failure sometimes seen include: cardiomegaly (cardiothoracic ratio >50%), perihilar ‘bats wing’ shadowing, fluid in fissures, pleural effusions and engorged peripheral lymphatics.\n\nIn 2014, the National Institute for Health and Care Excellence (NICE) UK published a guideline for diagnosing and managing acute heart failure in adults.\n\nBiochemical assessment:  It is recommended in new suspected acute heart failure that a single measurement of serum natriuretic peptide (B-type natriuretic peptide (BNP) or N-terminal pro-B-type natriuretic peptide (NT-proBNP) be taken.  BNP <100ng/litre or NT-proBNP <300ng/litre are considered the thresholds to rule out the diagnosis of heart failure.\n\nIn patients with raised natriuretic peptide levels, transthoracic echocardiography should be undertaken within 48hrs to establish the presence or absence of cardiac abnormalities and to guide early specialist management (cardiology).  Routine pulmonary artery catheterisation is not recommended.\n\nManagement:\n\nInitial pharmacological treatment:\n\nDiuretic therapy (e.g. Furosemide bolus or infusion).  If the patient is already on a diuretic, consider a higher dose.  Renal function and urine output should be closely monitored.\n\nOpiates are not recommended routinely, but may be beneficial if patients are acutely distressed\n\nNitrates should be used", "cat": "X-Ray"}, {"q": "QL107):  Describe features on this CXR.  How would you anaesthetise this patient for an elective operation?", "a": "QL107):  Answer:\n\nThis CXR shows that this patient has a large hiatus hernia.  There is significant risk of gastric reflux and potential aspiration on anaesthetic induction for any elective case.  A rapid sequence induction should be undertaken to minimise the risk of passive reflux.", "cat": "Biochemistry"}, {"q": "New Search Previous\n27. \t\n\nQL110):  A patient presented with 3 day history of increasing shortness of breath.  The patient received a renal transplant a number of years ago and is on long-term steroids and anti-rejection medication.\n\nDescribe the chest X-ray below:\n\n\n\n\n\n\n\nWhat is your differential diagnosis?\n\nWhat systemic complications may occur?\n\nWhat treatment would you instigate?\n\nNew Search View Answer Previous", "a": "QL110):  Answer:  Fungal pneumonia\n\nFungi account for only a small proportion of pneumonia.  However, opportunistic fungal infections are more common in patients who are immunocompromised (e.g. patients with leukaemia, lymphoma, receiving myeloblative chemotherapy, solid organ transplantation on immunosuppressive treatment, prolonged corticosteroid therapy, AIDS, prolonged neutropenia, congenital immune deficiency syndromes, post-splenectomy and genetic predisposition).\n\nThe chest X-ray shows:\n\nPatchy nodular infiltrates are seen throughout both lung fields\n\nBulky hilar suggestive of mediastinal hilar lymphadenopathy\n\nDifferential diagnosis includes:\n\nFungal pneumonia\n\nAcute respiratory distress syndrome (ARDS)\n\nChemical pneumonitis\n\nChlamydial pneumonia\n\nPneumoconiosis\n\nPneumocystis jirovecii (carinii) pneumonia\n\nAspiration pneumonia\n\nViral pneumonia\n\nCardiogenic pulmonary oedema\n\nNeurogenic pulmonary oedema\n\nIdiopathic pulmonary fibrosis\n\nInterstitial pulmonary fibrosis\n\nTuberculosis\n\nBacterial pneumonia\n\nEosinophilic pneumonia\n\nCauses of fungal pneumonia may include:\n\nEndemic specieis:  Zygomycetes, Histoplasma, Coccidioides, Blastomyces, Paracoccidioides, Cryptococcus\n\nOpportunistic species: Candida, Aspergillus, Mucor, Pneumocystis jiroveccii\n\nDiagnosis of fungal pneumonia is often difficult to prove relying on clinical presumption and clinical, radiological and microbiological findings.\n\nComplications of fungal pneumonia include:\n\nFungal dissemination to other systemic sites (brain, sk", "cat": "X-Ray"}, {"q": "A 25 year old female patient presents 10 hours post ingestion of 22 paracetamol tablets (500mg each).  She is clinically well, weighs 55kg, has a history of asthma and takes ventolin several times per week.  She has no allergies or other medications.\n\nWhat will you do?", "a": "Assessment ensuring airway, breathing and circulation are intact should occur first.  History and examination can exclude co-ingestants, and a collaborative history should be sought.  At 10 hours there is no value in oral charcoal or other gut decontamination.\n\nAccording to currently available guidelines, given the delay to treatment is prolonged (>8 hours) and the patient has taken a \"likely toxic dose\" (defined as >10g or >200mg/kg) she should be treated with N-acetyl cysteine until results of biochemical testing are available.\n\nIf the paracetamol level is below the treatment line AND the Alanine Transaminase (ALT) is normal, NAC can be ceased.  If either are abnormal, treatment should continue and expert advice sought.  Should ALT remain abnormal at the end of the infusion it should be continued.\n\nImportantly, asthmatics appear to have a higher risk of anaphylactoid reactions to NAC, and great care should be observed when commencing the infusion.\n\nReference : Daly et al.  Guidelines for the management of paracetamol poisoning in Australia and New Zealand - explanation and elaboration.  MJA 2008; 188:296-301", "cat": "Biochemistry"}, {"q": "New Search Previous\n2. \t\n\nA 19 year old man is admitted to a regional intensive care unit pending transfer to a burns unit.  He has sustained deep (full thickness) burns to the entirity of both legs (excluding perineum) when his trousers ignited at work.  The burns occured 1 hour ago, during which he received 1L of crystalloid in the emergency department.  He weighs 100kg.  No other injuries are apparent on secondary survey.\n\nDescribe his fluid management over the next 12 hours until he can be evacuated.\n\nNew Search View Answer Previous", "a": "He will require significant fluid volume to maintain cardiac output and renal function.  Several formulae have been used to estimate fluid requirements, the most commonly quoted being the Parkland Formula (4ml/kg/%BSA of lactated ringers solution, half given in the first 8 hours post burn, the rest over 16 hours.\n\nThe \"Rule of Nines\" suggests these injuries cover 36% of total body surface area (BSA).  Thus, the patient will require 4x36x100 = 14.4L (as one has already been given, 13.4L remains).  One half of this (6.7L) should be given over the next 7 hours, while the remainer is given over the subsequent 16 hours.\n\nUrine output should be maintained >1.0ml/kg/hr, and fluid therapy should be tailored up or down accordingly.\n\nFluid therapy can be associated with abdominal compartment syndrome, pulmonary oedema and fascial compartment syndromes.  A careful watch for these complications is essential.\n\nComment : Gross fluid depletion is common in severely burned patients.  Recent studies have demonstrated that application of these prediction formulae are successful in avoiding underhydration, but may be associated with complications of overhydration.  They should be treated as a guidline only and therapy titrated up or down according to urine output and general perfusion.\n\nNo one crystalloid has been shown to be more efficacious than another in burns.  There are theoretical a", "cat": "Clinical"}, {"q": "A patient involved in a high speed motor vehicle accident has the following noted on secondary survey. \nWhat is the finding? \nWhat would you do?\nMedia\n1", "a": "Hyphaema\n\n \nManagement includes standard care, exclusion of head injury, quiet restful environment, limited eye movement, avoidance of anticoagulants. Opthalmological opinion is required. Careful observation required as obstruction of aqueous flow may occur leading to acute glaucoma.\n \nComment : It is important to examine a patient thoroughly during the secondary and tertiary surveys to avoid missing life-changing injuries such as an eye injury. A hyphaema has a significant rate of rebleeding, a complication that can threaten long term sight, and the risk is related to the delay in appropriate therapy.", "cat": "Clinical"}, {"q": "Describe the findings on the clinical photo.\nWhat is the likely diagnosis?\n\nMedia\n1", "a": "Purpuric rash classic of Neisseria meningitidis\n\nComment : Purpura fulminans is commonly seen in florid Neisseria meningitidis. However, there are other causes :\n\nProtein C or protein S deficiency (neonatal)\nDisseminated intravascular coagulation\nSevere sepsis of other causes (pneumococcal sepsis particularly)", "cat": "Clinical"}, {"q": "A 23 year old male presents with severe backache, fevers, myalgias and hypotension. Shortly after arrival the following rash is seen.\n \nDescribe the rash\nWhat is the likely pathology?\nMedia\n1", "a": "This is the classic purpuric rash of Meningococcaemia. Initially macular and blanching, it rapidly turns petechial and purpuric.\n \nComment: Severe pain is a classic feature of meningococcaemia. This should be differentiated from Meningococcal meningitis which is a different clinical syndrome. Severe meningococcaemia causes severe sepsis, fulminant purpuric rash and severe body pains.", "cat": "Clinical"}, {"q": "Identify the 4 landmarks seen in this image. \n\nList 4 complications of this procedure in an intubated patient\nMedia\n1", "a": "A – Right main bronchus; B – Posterior wall of the trachea; C – left main bronchus; D – carina\n \nComplications of bronchoscopy include :\nBleeding\nInfection\nloss of airway\nbarotrauma\nhypoxia\ndistress\nraised intracranial pressure\nhypercapnoea\nairway perforation\nother\n \nComment: The easiest way to orientate yourself when doing a bronchoscopy is to look for the posterior wall. In the trachea, the rings of cartilage are C shaped, completed posteriorly by the posterior tracheal membrane. This is relatively easy to see. This feature extends into the major airways too.", "cat": "Clinical"}, {"q": "A 23 year old female presents with a history of an overdose of 24g of paracetamol. She is commenced on intravenous N-Acetyl cysteine. Shortly afterwards, the following photo is taken.\n \nDescribe the findings\nWhat would you do?\nMedia\n1", "a": "The photo demonstrates an urticarial rash.  This is not an uncommon complication of IV NAC.\n\n \n\nThe patient has taken a significant overdose which could easily result in fulminant hepatic failure.  NAC has been shown to reduce the incidence of hepatic failure in this circumstance.  As such, it should be continued wherever possible.\n\n \n\nThis reaction is usually dose dependent.  The infusion should be slowed or ceased, the allergic reaction treated with intravenous steroids, antihistamines and possibly adrenalin, and the infusion restarted at a lower dose.", "cat": "Clinical"}, {"q": "This 74 year old woman suffered a cardiac arrest under anaesthesia for a routine colectomy. She required 15 minutes of cardiac massage before a rhythm returned.\n \nShe now has sudden spasms (shown) causing a jolting elevation of both arms with grimacing, lasting 1-2 sec.\n \nWhat is this sign?\nWhat is its significance?\nWhat can you do about it?\nMedia\n1 2", "a": "These pictures represent Lance Adams myoclonus, known to occur in patients who are deeply comatose following anoxic injury. The jerks begin typically within the first 24 hours after hypoxia and often are characterized by violent flexion movements. When they persist for more than 30 minutes or occur for most of the first post-resuscitation day, the term myoclonic status epilepticus (MSE) is often used, despite the lack of definitive evidence that these movements represent epileptic activity.  Post-hypoxic MSE occurs in approximately 30% to 40% of comatose adult survivors of cardiopulmonary resuscitation and is difficult to control and associated with a poor prognosis.\n \nIn the largest published series of post-hypoxic MSE, Wijdicks and colleagues found that all 40 patients had intermittent generalized myoclonus involving both face and limb muscles. Stimuli, such as touch, tracheal suctioning, and loud handclaps triggered myoclonic jerks in most of the patients. None of the 40 patients who had acute post-hypoxic MSE awakened, improved in motor response, or survived.\n \nIn another review of 18 patients who had post-hypoxic MSE, 14 patients died within 2 weeks and the two patients who survived were left with profound disability.\n \nA meta-analysis of patients who had post-hypoxic MSE paints a similarly grim picture: of 134 pooled cases, 119 (88.8%) died, 11 (8.2%) remained in a persistent vegetative state, and 4 (3.0%) survived. Of the four patients who survived, two were described as havin", "cat": "ECG"}, {"q": "This photo is taken of a patient who is intubated in ICU with a traumatic brain injury.\n \nWhat associated injury has the patient suffered?\nMedia\n1", "a": "Fractured base of skull.\n \n \nComment: There is blood coming from the ear which may be due to localised trauma to the ear and ear canal. However, the pattern of blood stains on the pillow suggest that there is a mix of blood and some other type of fluid (in this case CSF), indicating there is a communication with the subarachnoid space. There must be a base of skull fracture.", "cat": "CT"}, {"q": "A 67 year old female has been intubated for decompensated advance Chronic Obstructive Airways Disease.  A swelling is noted in her supraclavicular area.\n\nWhat is the swelling?\n\nMedia\n1", "a": "Apical lung hernia\n\nPatients with advanced hyperinflation often have supraclavicular swellings associated with bullous expansion of the lung apices.\n\nReference :Crowe G.  Apical Lung Hernia.  Med J Aust; 189:56", "cat": "Clinical"}, {"q": "A 75 year old male is admitted to ICU with severe abdominal sepsis.  He is ventilated for 10 days.  The following examination finding is made (photo).\n\nWhat is the complication?\n\nList 3 risk factors for this complication\n\nOutline your prevention and management strategy\n\nMedia\n1", "a": "a) What complication has developed?\n\nPressure area ulcer\n\nb) List 3 risk factors for this complication?\n\nDuration of surgery, faecal incontinence and/or diarrhoea, low albumin concentrations, disturbed\n\nsensory perception, obesity, moisture of the skin, impaired circulation, use of inotropic drugs,\n\ndiabetes mellitus, too unstable to turn, decreased mobility, failure to turn appropriately, and high APACHE II score.\n\nWaterlow’s score, or other valid scores may also give guide to risk\n\nc) What is the prevention and management of this complication?\n\n \n\nPrevention: Maintaining clean and dry skin, visualise skin integrity twice a day, regular pressure relief, pressure relief mattresses\n\nManagement : Remove all pressure from area, appropriate wound management, plastic surgical review, and adequate nutrition. Wound nurse team.", "cat": "Biochemistry"}, {"q": "A 23 year old male returns to ICU after evacuation of an extensive subdural haematoma sustained in a motor vehicle accident.  The following clinical sign is elicited.  Describe its significance\n\nMedia\n1", "a": "There are mid sized non-reactive pupils.  This is likely to be due to absence of brainstem function.\n\nIn a clinical review of 69 patients with fixed dilated pupils after trauma, neurosurgery or stroke, patients with persistant bilaterally fixed pupils after evacuation of a mass lesion never survived.  Even when only one pupil becomes reactive post surgery, there were no outcomes better than vegetative state. \n\nReference : Clussman H et al.  Fixed and Dilated Pupils after Trauma, Stroke and previous intracranial surgery : management and outcome.  J neurol neurosurg psychiatry 2001; 71:175-181", "cat": "CT"}, {"q": "View the attached video.\n\nWhat is the name of the reflex being tested?\n\nDescribe the anatomy of the reflex pathway.\n\nHow do you interpret this patient's response?\n\nMedia\n1", "a": "Fluid (presumably ice cold) is being flushed into the patient's ear, and the eyes are being observed for signs of movement.  The reflex response is known as the oculo-caloric reflex or the vestibulo-ocular reflex.  This reflex allows visual fixation of an object during lateral rotation of the head.\n\nCold water cools the fluid in the semicircular canals which subsequently sinks, and this is detected by the ear as head rotation to the left.  Impulses travel along the vestibular nerve to the vestibular nucleus in the brainstem.  Signals then travel to the contralateral abducent nucleus which controls deviation of the eye towards the right.\n\nNormally a cortically controlled reflex rapidly brings the eyes back to central vision (fast phase of the nystagmus).  The mnemonic COWS is used to remember which side the fast phase goes - Cold Opposite Warm Same.  When cortical function is lost, the eyes tonically deviate to the stimulated side.  When brainstem function is also lost, the eyes do not react to stimulation.\n\nIn this patient there is no response, indicating an interruption at some point on this reflex pathway.  The finding can only be interpreted in the clinical context.", "cat": "Biochemistry"}, {"q": "Carefully observe the following video.\n\nList 3 potential causes of the problem identified.  How would you manage this further?\n\nMedia\n1", "a": "An air leak is audible with every inspiratory cycle.  Potential causes for this are a leak of the cuff, malposition of the cuff, a cuffless tube, a tube that is too small to fit the patient's trachea, and a tracheoesophageal fistula.\n\n \n\nTracheoesophageal fistula is the most concerning of these potentials.  TOF is know to complicate either surgical or percutaneously inserted tracheostomy, and may also occur due to traumatic insertion of tubes or hyperinflated cuffs.  Signs of TOF include a leak, inability to generate set tidal volumes, aspiration pneumonitis and enteral feed suctioned from the endotracheal tube.  Investigations may include bronchoscopy and water soluable contrast radiology studies.  Investigations can be difficult however as the presence of the tube can obscure the leak.\n\n \n\nManagement of the patient requires definition of the problem.  If the cuff continues to decompress it may be leaking, requiring a tube exchange.  An adjustable flange tracheostomy tube may enable to tube to be positioned better for the patient.\n\n \n\nAn acquired TOF is thought unlikely to spontaneously close and is usually managed surgically.  If the patient is not stable enough to tolerate surgery initially, they can be managed conservatively with gastric decompression and jejunal feeding with delayed surgery.", "cat": "Biochemistry"}, {"q": "A 25 year old man is admitted to ICU from ED with an acute deterioration in his level of consciousness.  He has a fever of 38.0, is haemodynamically stable, has no chest or abdominal findings and eye opens to pain.  His pupils are slightly dilated.  He has a history of schizophrenia.\n\nHis electrolytes are normal, as is his liver function.  A CT brain and lumbar puncture are undertaken and are normal.\n\nThe following is found bilaterally on examination.  What potential causes are apparent?\n\nMedia\n1", "a": "This is Clonus\n\n \n\nClonus is a repetative series of involunatry reflex muscle contractions and relaxations.  It is related to unregulated stretch reflex activity of the calf muscles.  A few beats of clonus can sometimes be seen in normal patients, but >5 beats is considered abnormal.  It can also be elicited in some other muscle groups such as the quadriceps by jerking the patella inferiorly.\n\n \n\nThe cause of this lack of regulation is usually related to upper motor neurone lesions (stroke, cord injuries etc.  Other causes include encephalopathies such as that due to liver failure.\n\n \n\nBilateral clonus associated with altered conscious state, fever and serotonergic drugs is likely to represent Serotonergic Syndrome.", "cat": "Biochemistry"}, {"q": "A 67 year old alcoholic man presents to ED grossly unwell, hypotensive and confused.  He reports severe upper abdominal pain for the past 4 days, associated with vomiting.  He has marked tenderness and distention.\n\nThe following clinical finding is recorded.\n\nWhat is the name of this sign? What does it represent?\n\nMedia\n1", "a": "Cullen's sign\n\n \n\nCullen's sign refers to periumbilical bruising and is associated with retroperitoneal bleeding of any cause.  It is best known for being a sign of severe haemorrhagic pancreatitis.  Why retroperitoneal haemorrhage leads to this sign is not entirely clear.\n\n \n\nCuriously, it was named after an obstetrician who described it in ectopic pregnancy.", "cat": "Biochemistry"}, {"q": "A 76 year old woman is admitted to ICU with severe community acquired pneumonia.\n\n \n\nAfter 3 days ventilation, she is struggling to wean from the ventilator.  The following clinical sign is noted.\n\n \n\nWhat is the likely cause?\n\nMedia\n1", "a": "This is the rhythmical \"pill rolling\" tremor of Parkinson's Disease.  It classically has a frequency of 6Hz.", "cat": "ECG"}, {"q": "QL10):\n\nFollowing chemotherapy for a bladder tumour, a patient was admitted to A&E confused and breathless.  He had received metoclopramide 10mg and ondansetron 8mg intravenously following his chemotherapy for sickness.  His observations were: respiratory rate 30/min, blood pressure 112/58mmHg and HR 125/minute, O2 Sats 85% on 15 litres FiO2 via non-rebreath mask.  He was cyanosed.  Physical examination was unremarkable.\n\n \n\nHis initial arterial blood gases showed:\n\n \n\npH\n\n\t\n\n7.42\n\n\n\n\nPaCO2\n\n\t\n\n4.34kPa\n\n\n\n\nPaO2\n\n\t\n\n7.76kPa\n\n\n\n\nBE\n\n\t\n\n-8.0\n\n\n\n\nCOHb\n\n\t\n\n1.8%\n\n\n\n\nMetHb\n\n\t\n\n40.6%\n\n\n\n\nLactate\n\n\t\n\n9.6mmol/L\n\n\n\n\nSO2%\n\n\t\n\n85%\n\n\n\n\nHb\n\n\t\n\n104g/L\n\n\n\n\nBlood: chocolate brown colour\n\n \n\nWhat is the diagnosis and management of this patient?", "a": "QL10):  Answer:\n\nDiagnosis:  Metoclopramide induced-methaemoglobinaemia\n\nMethaemoglobinaemia is the presence of a significant amount of oxidised iron (Fe3+, met-Hb) within haemoglobin (Hb) in the blood.  The oxidised iron stops haemoglobin from binding oxygen. \n\nAlthough rare, it has a wide number of potential causes including: congenital abnormal Hb, enzyme deficiency (e.g G6PD deficiency), chemicals (e.g. phenols, arsine, toluidine), drugs (e.g metoclopramide, acetaminophen metabolites, nitric oxide, paraquat, phenytoin, methylene blue (high doses), chloroquine), food (e.g. Fava beans), local anaesthetics (e.g. bupivacaine, lidocaine, prilocaine), nitrates (e.g. nitroprusside). \n\nNormally met-Hb is <1% as Fe3+ is metabolised via cytochrome b5-reductase pathway to Fe2+.  Clinically only 1.5g/dl (10-15%) of met-Hb is needed to produce cyanosis.  Levels up to 70% can be tolerated if compensatory mechanisms have been developed or amount of haemoglobin is adequate. \n\nMet-Hb levels 20-50% cause headache, confusion and chest pain.  Met-Hb may be acquired in critically ill patients and can be easily missed.  \n\nThe pu", "cat": "ABG"}, {"q": "QL36): You are called urgently to the medical ward to assess a patient who has suffered a seizure.  Prior to the seizure, nursing staff report that the patient had been admitted within the last 24hrs with increasing confusion, nausea and vomiting.  Due to low conscious level the patient was immediately intubated and ventilated and transferred to the ICU.  The patient’s serum sodium was 112mmol/L.\n\nHow may hyponatraemia be defined according to the ESICM 2014 guidance?\n\nDescribe your management of this acute case?\n\n How would management differ if this hyponatraemia was longstanding / chronic?", "a": "QL36):  Answer:\n\nHyponatraemia is defined as a serum sodium concentration <135 mmol/L.  Hyponatraemia is present in up to 20% of critically ill patients admitted to hospital.  Clinical presentation can vary from subtle to severe or even life threatening.\n\nHyponatraemia is defined by the European Society of Intensive Care Medicine (ESICM) 2014 into 3 groups: mild (130-135 mmol/L), moderate (125-129 mmol/L) and profound (<125 mmol/L). \n\nIt is also defined as ‘acute’ if the hyponatraemia is documented to exist <48 hours.  If the hyponatraemia cannot be classified is considered to be ‘chronic’, unless there is evidence to the contrary.\n\nHyponatraemia is also classified according to symptoms: Moderately severe symptoms of hyponatremia include: nausea without vomiting, confusion and headache.  Severe symptoms include vomiting, cardiorespiratory disease, abnormal or deep somnolence, seizures and coma (GCS less than or equal to 8). These symptoms may overlap limiting use of this classification.\n\nClassification can also be based on serum osmolality.  A measured serum osmolality <275 mOsm/kg always indicates hypotonic hyponatraemia, as effective osmolality can never be higher than total or measured osmolality. \n\n \n\nBrain oedema occurs more frequently when hyp", "cat": "Biochemistry"}, {"q": "QL52):  A 82 year old woman with congestive heart failure, hypertension and chronic obstructive pulmonary disease presented with worsening confusion.  A few days previously she had been started on trimethoprim by her general practitioner for a presumed urinary tract infection.   Her blood chemistry showed a potassium of 8.6mmol/L\n\nComment on her ECG:\n\nWhat acute management would you start in this situation?", "a": "QL52):  Answer:\n\nDiagnosis:  Severe hyperkalaemia.  Likely precipitant of hyperkalaemia is the use of trimethoprim which can act in a similar way to amiloride, by blocking sodium channels in the distal nephron and impairing renal potassium secretion.  The concurrent urinary tract infection may have also precipitated acute renal failure causing further issues with potassium.\n\nECG:  The ECG show a sine wave pattern.  This can occur in severe hyperkalaemia and is often preclude to ventricular tachycardia / ventricular fibrillation - cardiac arrest.  Potassium levels >7.0mmol/L is associated with tall tented T-waves +/- flat P waves and increased PR interval.  Widening of the QRS complex leads to the sine wave pattern and to VF/VT.\n\n\nManagement of hyperkalaemia includes:\n\nMonitor ECG\n\n10ml Calcium gluconate (10%) IV over 2min.  Repeated as necessary if severe ECG change persist.\n\nInsulin and glucose infusion:  50ml of 50% glucose with 10 units of actrapid insulin over 30mins.  Monitor for hypoglycaemia.  This regimen may need repeating.  This cause K+ to move into cells.\n\nNebulised salbutamol (2.5mg) to start.\n\nCalcium Resonium 15g/6-8hr in water orally or 30g enema followed by colonic irrigation.  This removes potassium from the body.\n\nUrgent Dialysis  / CVVH may be needed to gain control of the situation.", "cat": "ECG"}, {"q": "QL168):  A 65 year old obese woman presented to the ED with a 3-day history of diarrhoea and vomiting.  She states she has passed very little urine in the last 72hrs.  Past medical history includes: hypertension and type II diabetes mellitus.  She normally takes candesartan, bendroflumethiazide, metformin and insulin.  Her observations: BP 170/70, HR 80/min, sats 96% on room air.  On examination her chest was clear.  Her abdomen was soft and non-tender.  Her admission bloods are:\n\nNa+\n\n\t\n\n126mmol/L\n\n\t\n\nHb\n\n\t\n\n129g/L\n\n\n\n\nK+\n\n\t\n\n5.8mmol/L\n\n\t\n\nPlatlets\n\n\t\n\n214x109/L\n\n\n\n\nUrea\n\n\t\n\n13.2mmol/L (normal 11)\n\n\t\n\nWCC\n\n\t\n\n9.5x109/L\n\n\n\n\nCreatinine\n\n\t\n\n533μmol/L (normal 78)\n\n\t\n\nPhosphate\n\n\t\n\n1.70mmol/L\n\n\n\n\nHCO3-\n\n\t\n\n17mmol/L\n\n\t\n\nGlucose\n\n\t\n\n4.6mmol/L\n\n\n\n\nAlbumin\n\n\t\n\n41mmol/L\n\n\t\n\nCRP\n\n\t\n\n33mg/L\n\n\n\n\nTotal protein\n\n\t\n\n63mmol/L\n\n\t\n\nLactate\n\n\t\n\n7.5mmol/L\n\n\n\n\nPaO2\n\n\t\n\n24kPa\n\n\t\n\nPaCO2\n\n\t\n\n3.6kPa\n\n\n\n\npH\n\n\t\n\n7.23\n\n\t\n\nMg2+\n\n\t\n\n0.65mmol/L\n\nComment on the bloods and likely diagnosis\n\nWhere is this patient on the RIFLE classification?\n\nDescribe your management plan?", "a": "QL168):  Answer:\n\nThis patient has developed an acute kidney injury secondary to fluid losses and concomitant use of nephrotoxic drugs.  Compared to baseline her urea and creatinine are significantly deranged.    She is acidotic with low HCO3- and high lactate.  Her PaCO2 is low in an attempt at respiratory compensation.  She is not hypoxia.  The lactaemia is likely due to metformin use in the presence of acute renal failure.  She is hyperkalaemic with a mild hyponatremia.\n\nAccording to the RIFLE criteria:  Serum creatinine increased from 78 to 533μmol/L (x6.8).  The patient is oliguric. \n\nThe patient’s criteria of acute kidney injury (AKI) = Failure.\n\n\n\n\n \n\nClass:  RIFLE\n\n\t\n\nGFR Criteria\n\n\t\n\nUrine output criteria\n\n\n\n\nRISK\n\n\t\n\nSerum creatinine x1.5 or GFR decrease >25%\n\n\t\n\n<0.5ml/kg/hr x6hrs\n\n\n\n\nINJU", "cat": "ABG"}, {"q": "New Search Previous\n8. \t\n\nQL98):  A diabetic patient presents acutely with sodium of 120mmol/L.  Their blood sugar was 700mg/dL (38.85mmol/L). \n\nWhat is their estimated serum sodium concentration corrected for the presence of hyperglycaemia?\n\nNew Search View Answer Previous", "a": "QL98):  Answer:\n\nCorrected serum sodium (Na+)\n\n \n\nCorrected serum Na+ = 120 + 2.4 x (38.85) - 5.5/5.5 = 120 + 2.4 x (6.0636) = 134.55\n\nCorrected serum Na+ = 120 + (2.4 x (700-100/100) = 134.4\n\nThis equation translates into adding 2.4mmol/l to the measured serum sodium concentration for every 5.5mmol/L (100 mg/dl) incremental rise in serum glucose concentration above a standard serum glucose concentration of 5.5mmol/l (100 mg/dl).\n\n \n\nNon-hypotonic hyponatraemia rarely causes brain oedema and is therefore managed differently from hypotonic hyponatraemia.  It is important to exclude.\n\nThere are three broad categories of non-hypotonic hyponatraemia:\n\nHyponatraemia in presence of a surplus of ‘effective’ osmoles: e.g. glucose, mannitol, glycine, histidine-tryptophan-ketoglutarate, hyperosmolar radiocontrast media, maltose.  Serum osmolality is isotonic / hypertonic.\n\nHyponatraemia in the presence of a surplus of ‘ineffective’ osmoles:  e.g. urea, alcohols, ethylene glycol.  Serum osmolality is isotonic / hypertonic.\n\nPresence of endogenous solutes that cause pseudohyponatraemia (laboratory artefact): Triglycerides, cholesterol and protein, intravenous immunoglobulins, monoclonal gammapathies.  Serum osmolality is isotonic.\n\nEffective osmoles:  Exogenous or endogenous solutes to which cell membranes are impermeable are restricted to the extracellular fluid compartment and are effective osmoles because they create osmotic pressure gradients across cell membranes.  This leads to osmotic movement of water from the intracellular to the extracellular compartment resulting in dilutional hyponatraemia.  As the water shift is from the intracellul", "cat": "Biochemistry"}, {"q": "The following CT is from a 19 year old who was assaulted at a pub.\n\n \nDescribe the findings\nMedia\n1", "a": "There is oedema in the left frontal lobe and blood in the subarachnoid space. There is no evidence of midline shift.\n\n \nComment: Blood in the subarachnoid space conforms to the shape of the sulci and gyri.", "cat": "CT"}, {"q": "This is a CT of a 28 year old man punched to head in a brawl. His GCS on arrival is 8\n \nDescribe your findings\nWhat are the 2 most important preventable determinants of neurological outcome?\nMedia\n1", "a": "There is a left sided biconvex hyperdensity adjacent to temporal bone consistent with an acute extradural haematoma. An hypodensity in the right posterior frontal and temporal lobes with focal subtle hyperdensities is consistent with haemorrhagic/non haemorrhagic.\ncontusions and adjacent oedema. This is referred to as a contra-cous injury. A left basifrontal hypodensity probably represents a non haemorrhagic contusion.\n \nThe most important preventable factors in brain injury are hypotension and hypoxia.\n \nComment: The concept of primary and secondary brain injury is well known. There is little that can be done about the injury to the brain at the moment of impact. Prevention of secondary injury is the mainstay of brain care.\n \nThe most important factor in brain outcome is maintanance of the demand-supply ratio. Factors which impair delivery include hypotension and hypoxia. Prevention of hypoglycaemia is also important. Hypocapnoea is not recommended for maintenance therapy as it reduces cerebral perfusion. It still has a place in acute intracerebral hypertension while
