 30-50% of normal levels of coagulation proteins are usually required to maintain normal APTT.  If there is an inhibitor to a factor (eg those generated against factor 8 in some haemophiliacs), the APTT won't correct.\n\nHowever, in many of these inhibitors, time is required for the inhibitor to neutralise the clotting factor.  Mixing tests performed immediately will correct, then become prolonged again.\n\nLupus anticoagulant is typically NOT time dependent, and APTT will remain prolonged immediately after mixing.  This would be consistent with the cause of her pulmonary embolus.", "imgs": [], "cat": "Clinical"}, {"q": "A 34 year old female is admitted to ICU from the orthopaedics ward with respiratory failure, 5 days following emergency surgery for a compound ankle fracture.  She has had difficulty talking and swallowing her saliva.  She has global weakness with depressed tendon reflexes.  Her wound is ireddened and discharging.  She is afebrile.  The following tests are available from the wound swab taken on day 4.\n\nWhat is the likely cause?", "a": "Clostridium botulinum infection (Wound Botulism).\n\nC botulinum is an anaerobic Gram Positive spore forming rod.  It produces a toxin which blocks the neuromuscular junction by preventing acetylcholine release.  Once established, respiratory weakness is often prolonged as the toxin binds irreversibly.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/clostridium.JPG"], "cat": "Clinical"}, {"q": "A 26 year old female is in intensive care following an appendicectomy for a severely necrotic appendix and peritonitis.  She is on 22mcg/min of noradrenaline and 2.4U/hr of vasopressin.\n\nThe following tests are taken on day 2 in ICU :\n\n \n\nTest\tValue\tNormal Range\nCortisol (baseline)\t480nmol/L\t138-690nmol/L\nCortisol (1 hour post 250mcg ACTH)\t610nmol/L\t \n\nDescribe the results.  Would you give her steroids?", "a": "The results show a cortisol in the normal range, but this may be too low for the degree of illness of the patient.  This is reinforced by a poor reponse to ACTH stimulation (a response of <250nmol/L is considered insufficient in the face of severe illness).  This is the so called \"non-responder\" as defined by Annane.  This has now become known as \"Critical Illness Related Cortisol Insufficiency (CIRCI).\n\nThere is considerable debate about the definitions, measurement and even existance of CIRCI.  Measurement of free cortisol levels, transportation into cells, interation with nuclear receptors and gene expression are all poorly understood, and are not practical in clinical practice.  As such, diagnosis is challenging.\n\nAttempts have been made to identify groups where steroid therapy may be useful.  Annane et al demonstrated steroid therapy had a sparing effect on catecholamine infusions in sepsis.  A subsequent study suggested septic patients with \"exhausted adrenal reserve\" may survive longer with steroids.  However, the recent CORTICUS study did not show any benefit of steroid infusions regardless of response to ACTH.\n\nRecently the concept of the sick euadrenal syndrome has been raised, analagous to the changes seen in the thyroid axis in critical illness.  Further trials are eagerly awaited.", "imgs": [], "cat": "Echo"}, {"q": "A 23 year old female is brought to ED following a motor vehicle accident.  She is hypoxic, hypotensive and unconscious, and requires immediate intubation.\n\nA CXR is obtained.  Describe the results.", "a": "This is a supine, AP film.  The patient is intubated\n\nSurgical emphysema is noted in the right chest wall and in the region of the neck. This indicates there is almost certainly a pneumothorax on the right.  Ill defined opacity is noted in the right mid zone, and there is probably a pleural line laterally consistent with contusion and haemothorax.\n\nThere is a fracture noted through the posterior aspects of the 2nd and 3rd ribs on the left side.  Ill defined opacity is also noted in the left upper zone suggesting possible contusion.\n\nThere is a lucency noted adjacent to the cardiac border suggesting a pneumomediastinum.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/065840%20200707%20chest.jpg"], "cat": "X-Ray"}, {"q": "A 26 year old female is brought to ED after falling 10 meters from a balcony, landing on her back.  Her initial CXR is shown.\n\nDescribe the results", "a": "There is a vertical fracture through the mid shaft of the right clavicle with distraction. There is an undisplaced fracture involving the body of the left scapula. There is a displaced fracture through the posterior aspect of the right second rib and possibly the third rib.\n\nThere is veiling of both hemithoraces suggesting that there may be pleural effusions, probably blood. The lungs appear normally aerated.\n\nThe superior mediastinum is widened. The heart size is normal.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/215207%20051207%20chest.jpg"], "cat": "X-Ray"}, {"q": "A 70 year old male presents to emergency with extreme shortness of breath.  A bedside echocardiograph is taken.\n\nWhat is this view? What is the cause of the patient's dyspnoea?\n\n \n\nImage kindly supplies by Dr Wijesinghe", "a": "This is a long axis view of the left ventricle.  There is a large pericardial effusion present.  The picture is taken in diastole, and shows the right ventricle buckling inwards (top of image).  This suggests that the effusion is under pressure (tamponade).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/27JAN05PSLASTILL.jpg"], "cat": "ABG"}, {"q": "1.Describe the abnormalities present on this CT scan taken in a 52 yr male with breathlessness.\n\n2. What are your immediate treatment priorities?", "a": "1.There is an hypodense lesion with peripheral ring enhancement in the right parapharyngeal space extending from the oropharynx to the hypopharynx measuring 4.1cm in craniocaudal length, 2.7cm in transverse dimension and 2.3 cm in AP dimension.There is some mass-effect causing medial displacement of the the larynx and hypopharynx . However, the airway remains patent at the time of the examination. The adjacent carotid and prevertebral fat plane are preserved.The appearance is consistent with a right parapharyngeal abscess.There are scattered cervical lymphadenopathy in the deep cervical chain bilaterally.\n\n2. Secure airway (preferably in theatre with ENT surgeon and anaesthetist, awake fibreoptic intubation vs inhalational spontaneous breathing induction depending on airway compromise), ensure ventilation, hemodynamic resuscitation as required, drainage of abscess, institute empirical antibiotics", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ppa1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ppa2.JPG"], "cat": "CT"}, {"q": "What is this structure, seen on a transoesophageal echocardiogram?", "a": "This is the short axis view of the aortic valve.  The valve is seen to open into a wide triangle shape during systole.  The non-coronary cusp is on the left of the image, the left coronary cusp is on the right and the right-coronary cusp is below.", "imgs": [], "cat": "Echo"}, {"q": "What is the name of this view taken with a Transoesophageal echocardiogram?  What structures are seen within the ventricular cavity?", "a": "This is the short axis view of the basal left ventricle.  It is taken from behind the heart, and shows the left ventricle as a \"doughnut\", with the right ventricle wrapped around the left side (difficult to see in this example).\n\nThe structures within the image are normal - they are the tips of the mitral valve, the chordae and the papillary muscles.", "imgs": [], "cat": "ECG"}, {"q": "A 36 year old female has been recovering on the ward following intraabdominal sepsis.  She complains of worsening vision in both eyes before her level of consciousness falls and a Medical Emergency Team alert is called (MET).  Soon after she has a grand mal seizure.\n\nAn MRI is performed.  What does it show?  What is the most likely cause?", "a": "Axial T1, T2, FLAIR and diffusion weighted images were performed.\n\nPatchy areas of signal change are seen in the cortical grey matter and subcortical white matter in bilateral occipital and high parietal lobes.  The images show isointense signal on T1 weighted image and hyperintense signal on T2 weighted image and FLAIR images, suggesting intraparenchymal oedema. In the occipital regions there is evidence of restricted diffusion on the diffusion weighted images, which suggests ischaemia. There is mild effacement of adjacent sulci.\n\nBilateral basal ganglia and frontotemporal regions are normal. No midline shift is seen. The ventricles are normal. No evidence of extra-axial collection is seen. Major flow voids of the brain are preserved.\n\nThe findings are in keeping with posterior reversible encephalopathy syndrome (PRES).  PRES is a condition of disordered cerebral autoregulation that results in vasogenic oedema predominantly in the occipital and posterior parietal lobes.  Areas of vasospasm / ischaemia may also occur.  PRES has been described in association with a multitude of conditions, though malignant hypertension and immunosuppression / chemotherapy appear most closely linked.\n\nPRES may be fully reversible if there is control of the underlying condition.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20151.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20248.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20340.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20434.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20523.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20616.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2079.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2084.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2093.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20103.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%201110.JPG"], "cat": "CT"}, {"q": "Name the device in the left lung.\n\nList 3 complications of its use", "a": "This is a nasogastric tube which has been misplaced in the left main bronchus.\n\n \n\nComplications of nasogastric tubes include:\n\nmisplacement\nbleeding\nincreased risk of ventilator associated pneumonia\nperforation\nnasal septal / alae necrosis\ndiscomfort\n\nThis xray highlights the need to confirm placement with a chest xray.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/949046_RA04035108_1.jpg"], "cat": "X-Ray"}, {"q": "What is the device seen in the mediastinum on this CXR?\n\nWhat complication has occured and how can it be prevented?", "a": "The device is a central venous catheter inserted via the left subclavian route.  The patient is also intubated and has cardiac monitoring present.\n\nThe guidewire from the CVC has inadvertently been advanced into the patient and lost.  The tip now appears in an abdominal vein, possibly the splenic.  \n\nThis complication can be prevented by careful control of the guidewire, ensuring it is always visible and able to be held.  It should be fed back into the catheter until the end can be secured before advancing the CVC into the patient.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cxrwireoops_2_1.jpg"], "cat": "Biochemistry"}, {"q": "The following ECG is taken from a 65 year old man who presented with a GCS of 6 and left sided limb stiffness.  No other focal signs are noted.\n\n \n\nWhat does the ECG show?  Suggest a mechanism for this.", "a": "Deep symmetrical T wave inversion across the precordial leads.  This is a common ECG abnormality associated with acute intracranial pathology (including Subarachnoid haemorrhage, as in this case).  Other possible causes include ischaemia and hypertrophic cardiomyopathy.\n\n \n\nComment : Intracranial catastrophes are associated with an array of cardiovascular complications.  ECG abnormalities may be present in up to 25% of patients, including deep T wave inversion as seen in this example.\n\nPatients with intracranial haemorrhage may also be subject to arrhythmias and neurogenic pulmonary oedema (up to 20% at presentation).  The underlying mechanism is thought related to a hyperadrenergic response to the intracranial insult.  In some, cardiogenic shock may also occur, though this is often reversible with supportive care.  Contrary to common belief, this can still be associated with a good clinical outcome.\n\n \n\nReference : Parr M, Finfer S, Morgan M.  Reversible cardiogenic shock complicating subarachnoid haemorrhage.  BMJ; 313:681-3", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/sah%20ECG.jpg"], "cat": "ECG"}, {"q": "Give 2 reasons for this appearance in the ultrafiltrate bag from a CRRT circuit\n\n \n\nJFICM fellowship exam question 1/2009", "a": "Intravascular haemolysis\n\nMyoglobinaemia\n\nRupture of a filter membrane", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/untitled2.jpg"], "cat": "Equipment"}, {"q": "Comment on this ECG, taken from a 70 year old man who complains of weakness and lethary in emergency.  His HR is 45 and his blood pressure is 75/45.", "a": "The ECG demonstrates a grossly widened QRS complex, absent P waves and tented T waves, consistent with severe hyperkalaemia.  This is approaching the classic \"sinusoidal\" pattern seen in severe disease, just prior to terminal arrhythmias.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/severe%20hyperkalaemia.jpg"], "cat": "ECG"}, {"q": "A 48 year old man presents with 3 days of fever and cough.  In emergency he is grossly hypoxic and distressed on 15L O2 via non-rebreather mask, and he requires intubation.\n\n \n\nThe following xray is taken.  Outline the results.", "a": "There is diffuse interstitial and alveolar opacity noted in both lung fields. Cardiac size appears slightly enlarged, but is likely due to the AP projection. No pleural effusion visualised. Features are consistent with that of ARDS.\n\n \n\nThe causes of this picture are multiple and include respiratory (aspiration, drowning, toxic inhalations) or non-respiratory (pancreatitis, severe burns, massive blood transfusion).\n\n \n\nIn this case, the causes is variant H1N1 influenza 2009 (Swine Flu)", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/swine%20flu.jpg"], "cat": "X-Ray"}, {"q": "A 12 month old girl is hospitalised with severe bronchiolitis.  A nasopharyngeal aspirate is taken which is positive for RSV antigen.  She is commenced on bubble nasal CPAP and a nasogastric tube is inserted.  An xray is taken to confirm the diagnosis.  What does it show?", "a": "The NG tube is seen coiled up within the stomach.\n\nThere is mild haziness noted in both the lung fields particularly the inner two thirds. This is consistent with viral pneumonia.\n\nA sharp triangular opacity is noted in the left retrocardiac region and represents a lower lobe collapse. Cardiac size is within normal limits.\n\nComment : this is a classic left lower lobe collapse.  Bronchiolitis results in sputum plugging of proximal and distal airways.  This can result in a heterogenous picture of hyperinflation (from bronchial obstruction with ball-valve type mechanism) and collapse (as in this case).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/LLL%20collapse.jpg"], "cat": "X-Ray"}, {"q": "This image is taken from a patient with post operative abdominal sepsis following open cholecystectomy.  What type of examination is it?  What does it show?", "a": "This is a T-tube cholecystogram.  Contrast is seen running into the biliary tree, uniformly opacifying it, and emptying into the small bowel.  There is no evidence of leak, and there are no filling defects to suggest retained stones.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/t%20tube%20cholangiogram.jpg"], "cat": "Biochemistry"}, {"q": "A 43 year old male is involved in an industrial accident, falling 9m to the ground.  He is alert and his breathing is adequate, however his blood pressure is 75/40 with a heart rate of 130 despite 3L crystalloid.\n\nThe following xray is taken.  Describe the results", "a": "The xray demonstrates complete disruption of the pelvic ring, with distraction of the pubic symphysis and the right sacroiliac joint.  The right hemipelvis has been dislocated superiorly.  This is known as a Type C pelvic fracture in the Tile Classification.  These types of injuries are associated with massive haemorrhage due to disruption of pelvic venous plexuses, and transfusion may be in the tens of units of packed cells.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/pelvic%20fracture.JPG"], "cat": "X-Ray"}, {"q": "A 65 year old male presented to emergency with chest pain for 24 hours, a blood pressure of 70mmHg systolic and was peripherally shut down.  An erect AP CXR was taken and is shown below.\n\nDescribe the findings", "a": "The heart is enlarged consistent with dilated cardiomyopathy. Upper lobe veins are distended and there is an interstitial pattern at both bases with some Kerley B-lines on the right side suggesting the presence of heart failure.\n \nComment : Signs of cardiac failure on a CXR include:\nUpper lobe diversion - compare lower and upper zone blood vessels an equal distance from the hilum.  It is probably related to lower zone pulmonary arteriolar hypoxic vasoconstriction.  Note that upper lobe diversion can only be diagnosed in an ERECT patient.\nCardiomegaly - this is often difficult, particularly in acute patients in whom an erect PA film cannot be taken.  In an PA erect film, cardiomegaly is present if the maximum horizontal diameter of the heart is greater than half the greatest thoracic horizontal diameter.  Also note it may not be present in acute causes of cardiac failure\nKerley's B lines - these lines are due to oedema in the septae dividing the smaller lobules.  They are described as short (1cm) horizontal and non-branching lines which reach the pleura, and are found at the peripheries of the lung bases. \nPeribronchial cuffing - as venous pressure increases, oedema surrounds the small bronchi, giving a cuffed appearance to those seen head on\nAlveolar oedema - at its most fulminant, cardiogenic oedema can result in a confluent alveolar shaddowing, most typically around the hila (giving the characteristic \"bat's wing\" appearance).  Oedema also makes the margins of the hilar vessels blurry.  This is usually, but not always, symmetrical.\nPleural effusions\n\nKerley also defined Kerley A lines (diagonal lines from periphery to the hila in the inner half of the lungs) and Kerley C lines, which are reticular patterned opacities scattered throughout the lungs.  They are less commonly seen than Kerley B lines.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ccf.jpg"], "cat": "X-Ray"}, {"q": "A 19 year old male is found floating unconscious in a swimming pool.  He has a reduced conscious state with a large laceration on his occiput.  A cervical spine xray is taken to exclude injury.\n\nOutline the findings", "a": "There is a wedge compression fracture of C5.  A small fragment is seen displaced anteriorly.\n\nAlso noted is disruption of the normal spinal alignment, with retrolisthesis of C5 on C4, the overlap approximately 25% of the vertebral body diameter.  The AP film at this level shows a step in the spinous processes alignment, suggesting rotation of C5.  There is a small amount of swelling of the prevertebral soft tissue associated with the injury.\n\nThese latter findings suggest a unifacet joint dislocation.\n\nComment : Facet joint dislocations are occasionally seen and are associated with rotational injury.  They can be either unilateral (as in this case) or bilateral.  The upper facet often locks in front of the lower facet, which results in a relatively stable injury.  Classically a unifacet joint dislocation results in a retrolisthesis of 25% of the adjacent vertebral body, while bifacet joints often result in >50% listhesis.  The incidence of neurological injury is significantly higher if both facets dislocate", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ap.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/lateral.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/open%20mouth.jpg"], "cat": "X-Ray"}, {"q": "A 75 year old male is admitted to ICU with severe abdominal sepsis.  He is ventilated for 10 days.  The following examination finding is made (photo).\n\nWhat is the complication?\n\nList 3 risk factors for this complication\n\nOutline your prevention and management strategy", "a": "a) What complication has developed?\n\nPressure area ulcer\n\nb) List 3 risk factors for this complication?\n\nDuration of surgery, faecal incontinence and/or diarrhoea, low albumin concentrations, disturbed\n\nsensory perception, obesity, moisture of the skin, impaired circulation, use of inotropic drugs,\n\ndiabetes mellitus, too unstable to turn, decreased mobility, failure to turn appropriately, and high APACHE II score.\n\nWaterlow\u2019s score, or other valid scores may also give guide to risk\n\nc) What is the prevention and management of this complication?\n\n \n\nPrevention: Maintaining clean and dry skin, visualise skin integrity twice a day, regular pressure relief, pressure relief mattresses\n\nManagement : Remove all pressure from area, appropriate wound management, plastic surgical review, and adequate nutrition. Wound nurse team.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DSCF0577.JPG"], "cat": "Biochemistry"}, {"q": "A 41 year old man presents to emergency following a motor vehicle accident.  He initially complains of chest pain and has a closed head injury and a fractured tibia/fibula.  Multiple skin contusions are noted over his torso.\n\nThe following CXR is taken.  What does it show?  What would you do about it?", "a": "There is evidence of a small pneumomediastinum, which is seen as a sharp demarcation of the decending thoracic aorta.  A very subtle pneumopericardium is evident adjacent to the lingula.  A pneumothorax is not apparent, but as the lung apices are not visible it is not possible to rule it out.\n\nAn ET tube and central line are present and the positions appear satisfactory.\n\nThe potential causes include :\n\noccult pneumothorax\noesophageal damage\nairway injury\n\nInvestigation would initially include a CT scan - where possible oral contrast should be given to demonstrate a perforation of the oesophagus, though this is impossible in intubated patients.  Panendoscopy may be considered to exclude an injury, though there is potential for making the injury worse, and the likelihood of injury should be considered.  MRI may also be of value.\n\n \n\nComment : Pneumomediastinum can be seen in a minority of major traumas.  Other signs can include:\n\nassociated pneumothorax\nstreaky lucencies running inferoposteriorly into the neck\ncontinuous diaphragm sign (the diaphragm appears to run from one side of the chest to the other uninterupted)\n\nOesophageal injuries are relatively rare in blunt trauma and are usually associated with adjacent vertebral fractures.  There is also often fluid associated in the mediastinum on CT, the absence of which makes the diagnosis unlikely.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/pneumomediastinum.jpg"], "cat": "X-Ray"}, {"q": "A 45 year old male presents with confusion and left sided weakness.  He has a history of hypertension and is on a beta-blocker.  A CT scan is performed - discuss the results.", "a": "There is a right basal ganglia haemorrhage extending to deep white matter of the right posterior frontal lobe. There is an area of surrounding vasogenic oedema and there ismidline shift to the left (approximately 1cm). There is also a small quantity of subarachnoid blood. There is no apparent ventricular extension of haemorrhage.\n\nThe temporal horn of the left lateral ventricle is dilated, as is the body and frontal horn suggesting obstruction to flow of CSF at the level of the foramen of Munro.\n\nComment : Despite his hypertension, primary intraparenchymal haemorrhages are uncommon in patients less than 50 years old.  Additionally, primary intracranial haemorrhage in the frontal lobes is quite uncommon.  Consequently, it is important to investigate this man further for an underlying cause (eg vascular malformation, malignancy or berry aneurysm).\n\nOne of the earliest signs of obstructive hydrocephalus is dilatation of the temporal horns of the lateral ventricles.  Even in elderly patients where the ventricles can be dilated due to cerebral atrophy, the temporal horns are rarely seen.  Effaced sulci (as seen in his right hemisphere in the slices at the vertex) and obliterated basal cysterns (not present here) are other signs of rising intracranial pressure.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20152.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20249.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20341.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20435.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20524.JPG"], "cat": "ECG"}, {"q": "A 45 year old man presents to emergency following a motor vehicle accident.  He has a closed head injury and a ruptured spleen, and is now intubated in ICU post splenectomy.\n\nThe lung windows from his CT chest are shown.  What does it show?  What would you do now?", "a": "There is evidence of a small pneumomediastinum.  There is no apparent pneumothorax, nor other cause for the pneumomediastinum seen.  The most common serious causes of this are tracheolaryngeal injuries, major airway injuries and oesophageal injuries.\n\n \n\nIsolated asymptomatic pneumomediastinum is becoming more commonly recognised due to the improved diagnostic accuracy of CT, and the increased frequency of its use in trauma.  It is unclear what the best management of these injuries currently is.  Some authors recommend observation, which is usually associated with good outcomes, while others recommend CT contrast oesophagraphy or endoscopy to rule out additional injuries.\n\n \n\nComment : Serious injury in patients with occult pneumomediastinum is probably rare.  One review published in 2008 found only 7% of patients with pneumomediastinum had major aerodigestive injuries.  Of those whose CT showed no cause, no patient suffered a \"missed injury\" as defined by signs and symptoms during followup which suggested an injury to the aerodigestive tract.  The authors conclude that in most cases, observation of patients with apparently \"simple pneumomediastinum\" is justified.\n\n \n\nReference : Dissanaike S et al.  The evaluation of pneumomediastinum in blunt trauma patients.  J Trauma (2008); 65:1340-5", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20153.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20250.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20342.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20436.JPG"], "cat": "X-Ray"}, {"q": "What device is shown below?\n\nWhen is it used and what are its design features which make it suitable for use?\n\nJFICM exam 1/2009", "a": "A McCoy Blade laryngoscope\n\nA McCoy blade provides improved visualization of the cords in the setting of a difficult intubation. It is used in the normal fashion, and then by squeezing the handle trigger, the tip becomes flexed which allows for the elevation of distal structures, especially the epiglottis.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DSCF0816.JPG"], "cat": "Equipment"}, {"q": "What is this piece of equipment?\n\nDescribe how it is used\n\nList 3 complications of its use", "a": "This is an ENK oxygen flow delivery system for an emergency needle cricothyroidotomy.\n\nThe ENK has an oxygen supply connector at one end and a luer lock connection for attachment to a needle cricothyroidotomy tube at the other.  It allows manual control of oxygen to the patient in emergency situations by intermittently covering and releasing the holes in the delivery system.\n\nThe ENK is connected to the oxygen supply and to the cricothyroidotomy catheter.  Select an oxygen flow of at least 15 and preferably higher.  Intermittently occlude and release all openings in the tubing by pressing thumb and index finger.  About 100 cycles per minute is recommended by the manufacturer.  Special care to allow decompression should occur in cases of complete airway obstruction.\n\nComplications include :\n\nbarotrauma\npneumothorax\npneumomediastinum\ndislodgement (too much pressure can cause the catheter to be ejected from the trachea)\nhypercapnoea (this device provides oxygenation to the patient but does not ventilate them)\ndynamic hyperinflation", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DSCF0818.JPG"], "cat": "X-Ray"}, {"q": "A 19 year old male presents to emergency with severe respiratory distress and non-productive cough.  He has been unwell for 3 days with fevers and chills.\n\nDescribe the features of the xray", "a": "There is ill defined nodularity noted in both the lung fields. Central lucencies are noted in some of these nodules suggesting that these are small bronchi with thickened walls seen end on (peribronchial thickening).  There is no focal mass lesion/patch of consolidation visualised. The cardiac size is normal and no pleural effusion is visualised.\n\n \n\nOf note, there is an azygous fissue seen in the right upper zone.  This is of no significance.\n\n \n\nComment : Peribronchial thickening can be seen in many conditions including asthma and viral pneumonitis.  In this case, the cause was a novel strain of Inflenza A H1N1 (so called Swine Flu).\n\n \n\nThe azygous fissure is a developmental variant that is seen in around 1% of the population. It develops when the apical bronchus develops superomedial to the arch of the azygous vein instead of laterally to it.  The vein subsequently lies at the bottom of a fissure of variable depth within the lung tissue of the upper zone.  It is often comma or tear shaped.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/swine%20flu%20plus%20azygous%20lobe.jpg"], "cat": "X-Ray"}, {"q": "A 77 year old female presents with a sudden collapse and remains unconscious.  The following CT is performed.\n\nWhat does it show?\n\nWhat is the most likely source?", "a": "There is evidence of severe Subarachnoid Haemorrhage (SAH). Most of the blood is interhemispheric, suggesting a berry aneurysm of the anterior communicating artery as the source. There is extensive blood within the ventricles and in both frontal lobes.\n\n \n\nComment : 30-35% of Berry Aneurysms appear to originate from the anterior communicating artery of the Circle of Willis.  A similar number originate at the junction of the internal carotid and the posterior communicating artery, and 20% from the trifurcation of the MCA.  A minority originate from the posterior arteries such as the bifurcation of the basilar artery.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20154.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20251.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20343.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20437.JPG"], "cat": "CT"}, {"q": "A 68 yr male presents to the ED with a history of dysphagia and cough. As part of his work-up he has  aCT-chest. Please describe the findings on the following CT", "a": "CT reconstruction.\n\nAn aneurysm of the aortic root and ascending aorta is present. The aneurysm tapers throughout the arch reaching 3.7cm at the joint origin of the left/right common carotid artery. The aorta further tapers throughout a tortuous descending thoracic course to reach 3cm at the diaphragmatic hiatus.\n\nImportantly, there is an aberrant right subclavian artery which is aneurysmal at its origin (a Kommerell's diverticulum). The ectatic segment compresses the oesophagus against the posterior trachea.\n\nThe common carotid arteries take origin from a prominent common trunk (this measures 2.4cm in diameter) and the left subclavian artery takes origin just distal to this.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/aortaaneurysm1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/aortaaneurysm2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/aortaaneurysm3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/aortaaneurysm4.JPG"], "cat": "Clinical"}, {"q": "Describe the abnormality present on the following CT scan taken 2 days post cardiac surgery in a 70 year old man who has failed to wake up.\n\n \n\nIs this likely to be the cause of his decreased conscious state?", "a": "A well defined hypodensity at the posterior aspect of the right posterior cranial fossa. This may represent an old cerebellar infarct or possibly an epidermoid cyst.\n\n \n\nThis is unlikley to be the cause of reduced consciousness. It is possible that there are new ischaemic injuries that are not yet apparent, and a repeat CT or MRI may clarify this.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cerebellar1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/cerebellar2.JPG"], "cat": "CT"}, {"q": "A 39 year old man is brought to ED following a motor vehicle accident.  He has head and chest injuries as well as a broken left femur.  After initial management in ED he is transferred to CT.\n\nDescribe the findings on this CT.  What has gone wrong?", "a": "The scan demonstrates a large right pneumothorax with associated pneumomediastinum and subcutaneous emphysema.  Unfortunately, an Intercostal Catheter has been placed but is in the wrong position (it is lying in the subcutaneous / soft tissue posteriorly.\n\n \n\nThere are also numerous rib fractures on the right, as well as a right scapula fracture.  The remaining thoracic organs appear normal.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20155.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20252.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20344.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20438.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20525.JPG"], "cat": "X-Ray"}, {"q": "A 46 year old male is brought to ED following a motor bike accident.  He was not wearing a helmet and has a left occipitoparietal area laceration.  His GCS is 7, is haemodynamically stable and his arterial oxygen saturations are 92% on room air.\n\nWhat does the CT brain show?", "a": "There is a left occipitoparietal scalp haematoma with an opaque body seen at the skin level. Air is seen within the cranium which is likely due to an associated fracture.  There is substantial artifact seen in the images, but there may be associated contusion in the left cerebellar hemisphere\n\nThere is a large acute right subdural haematoma compressing the right cerebral hemisphere and producing approximately 15 mm midline shift to the left. The subdural haematoma has a maximum thickness of approximately 13 mm.  The right lateral ventricle is markedly compressed. The left temporal horn is dilated suggesting it is obstructed but there is no other sign hydrocephalus. The basal cisterns are obliterated suggesting raised intracranial pressure.\n\nThere is no intracerebral haemorrhage seen on this scan.\n\nThere is also a blowout fracture of the floor of the right orbit. The medial wall of the orbit appears to be intact however the bubbles of air and soft tissue thickening in the anterior right ethmoid region suggests there may be an undisplaced fracture. Other bony structures appear normal.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20156.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20253.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20345.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20439.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20526.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20617.JPG"], "cat": "CT"}, {"q": "What does the following ECG show?  List 3 possible causes", "a": "There is a bifid p wave.  Otherwise, the ECG looks normal.  Causes include:\n\no    Mitral stenosis\n\no    Poor left ventricular compliance (eg due to ischaemia or hypertension)\n\no    Mitral regurgitation\n\n \n\nComment : Bifid P waves (\u201cP mitrale\u201d) is often defined as a double peaked P wave with an interval between peaks >1mm (0.04s).  This is usually pathological.  It results from delayed activation of the left atrium due to hypertrophy or dilatation.\n\n \n\nThis patient had severe mitral regurgitation on echocardiography", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bifid%20p%20waves.jpg"], "cat": "ECG"}, {"q": "A 42 year old male lies unconscious in ICU following a major head injury.  A CT is taken on day 3.  Describe the findings.", "a": "There is evidence of a right sided craniectomy - a bone flap has been removed.  The cortex is seen herniating through the bone defect.  There is also residual subdural haematoma in the right frontoparietal region measuring about 7mm in maximum thickness anteriorly with adjacent post operative pneumocephalus.\n\nThere is also evidence of haemorrhagic contusion noted in the right inferior temporal lobe anteriorly and the right frontal lobe inferolaterally.\n\nThere is mass effect noted in the right cerebral hemisphere with midline shift of about 7mm at the level of the body of lateral ventricle.  There is mild effacement of the basal cisterns noted.\n\nHaemorrhagic contusion is also noted in the left cerebellar lobe with mild mass effect on the forth ventricle, however there is no evidence of obstruction.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20157.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20254.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20346.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20440.JPG"], "cat": "CT"}, {"q": "Name this piece of equipment.  What is it used for?  Give an example of a situation where it may yield a false negative result", "a": "This is a colorimetric capnograph.  It is used to detect the presence of CO2 to confirm placement of the endotracheal tube in the trachea, and by exclusion, rule out oesophageal intubation.  A false negative result (ie the tube is in the trachea but no carbon dioxide is detected) in arrest situations (CO2 must be transported to the lungs for it to be exhaled).\n\n \n\nComment : Colorimetric capnography works as the indicator paper changes colour as the acid-base status of the gas flowing through it changes - a bit like Litmus paper.  The presence of a colour change confirms CO2 presence and is fairly accurate at detecting endotracheal intubation when compared with infra-red capnography.\n\nThe advantages of colorimetric capnography are that it is cheap, readily available, does not require power and works immediately.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF134eq.JPG"], "cat": "Waveforms"}, {"q": "What is this piece of equipment?  Describe how it is used.  List 3 potential complications", "a": "This is a Minnesota Tube, which is used to tamponade haemorrhage due to oesophageal varices.  It differs from the Sengstaken-Blakemore tube in that it has an extra (4th) lumen for oesophageal drainage.\n\nThe Minnesota Tube is used in uncontrolled haemorrhage due to varices.  The patient usually needs intubation both for airway protection and to tolerate the tube.  Various methods for insertion have been suggested.  The following is just one example : Once inserted (at least 50cm), the position is usually confirmed by partly filling the gastric balloon (eg 50ml) and taking an xray.  Once the position is confirmed, the gastric balloon is filled and traction is applied to the tube (usually with the weight of a 1 litre bag of normal saline).  This alone is usually enough to prevent further bleeding, and pressure is usually maintained for up to 24-48hrs.  Ongoing bleeding can be monitored by draining the oesophageal and gastric lumens.\n\nThe oesophageal balloon is rarely required.  When used it should have pressure limited to the lowest pressure required to stop bleeding (usually less than 20mmHg), and the pressure must be released for 5 minutes every 2-6 hours.  This is because the oesophageal mucosa is very sensitive to ischaemic injury.\n\nComplications include :\n\naspiration\noesophageal perforation\npressure necrosis to oesophagus\nnasal cartilage necrosis\nmalpositioning\nloss of airway", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/PIC_0628.JPG"], "cat": "X-Ray"}, {"q": "Describe the changes present on the following CT scan taken D2 post mitral valve replacement in a 66 year old woman who has woken up with flaccid paralysis of the right arm and right leg.", "a": "Extensive low density change throughout the right cerebellar hemisphere with associated sulcal effacement and effacement of fourth ventricle noted.No evidence of cerebellar tonsillar herniation or hydrocephalus at the time of examination.No intra or extra-axial haemorrhage. No obvious abnormality in the cerebral hemispheres.\n \n\nChanges in the right cerebellar hemisphere has features consistent with acute infarction. Local mass-effect but no evidence of tonsillar herniation at the time of examination. No visible secondary haemorrhage.Difficult to exclude possibility of brainstem involvement with beam hardening artefact in the posterior cranial fossa.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/mh1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mh2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mh3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mh4.JPG"], "cat": "CT"}, {"q": "Describe the changes on this CT taken in a 25 yr old male who underwent a dental extraction 3 days ago, and presents with fever.", "a": "Nasogastric tube and endotracheal tube in situ. There is extensive superficial soft tissue induration and oedema extending from the submandibular region to involve the neck bilaterally. Prominent inflammatory change with ill-defined regions of hypodensity surrounding the geniohyoid and the anterior bellies of the digastric muscles in the floor of the mouth are evident. Both submandibular glands appear somewhat heterogenous, the left more-so than the right. Marked parapharyngeal oedema is effacing the surrounding fat planes and resulting in significant narrowing of the laryngeal luminal diameter with tight abutment of the endotracheal tube. In the left paraphalangeal space and extending to the parotid space there is a reasonably well defined region of hypodensity measuring 3.4 x 1.9 cm on axial dimensions and containing gas locules. The appearance is suspicious for paraphalangeal abscess formation. To a lesser extent, similar changes are present contralaterally although no gas locules are identified. There is no discrete retropharyngeal collection. Multiple enlarged and borderline enlarged lymph nodes are seen throughout the carotid chains bilaterally. A prominent left jugulodigastric lymph node measures 1.2 x 1.7 cm.  Periosteal mucosal thickening throughout the paranasal sinuses is noted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/np1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/np2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/np3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/np4.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/np5.JPG"], "cat": "ABG"}, {"q": "A 23 year old male returns to ICU after evacuation of an extensive subdural haematoma sustained in a motor vehicle accident.  The following clinical sign is elicited.  Describe its significance", "a": "There are mid sized non-reactive pupils.  This is likely to be due to absence of brainstem function.\n\nIn a clinical review of 69 patients with fixed dilated pupils after trauma, neurosurgery or stroke, patients with persistant bilaterally fixed pupils after evacuation of a mass lesion never survived.  Even when only one pupil becomes reactive post surgery, there were no outcomes better than vegetative state. \n\nReference : Clussman H et al.  Fixed and Dilated Pupils after Trauma, Stroke and previous intracranial surgery : management and outcome.  J neurol neurosurg psychiatry 2001; 71:175-181", "imgs": [], "cat": "CT"}, {"q": "You are asked to review a tunnelled vascath that your colleague inserted 2 weeks ago.  The patient has developed fever and lethargy and no focus can be found.  Her inflammatory markers are elevated, suggesting infection.  Your colleague reports that the line was extremely difficult to insert.  On inspection, there is no signs of exit-site or tunnel infection.\n\nThe following results were obtained in an effort to clarify if the line is infected :\n\n \n\nBlood culture 1 : Peripheral blood culture.\n\nGram positive cocci, resembling staph.  Culture pending\n\nTime to positivity 9.5 hours\n\n \n\nBlood culture 2 : Sample from Vascath\n\nGram positive cocci, resembling staph.  Culture pending\n\nTime to positivity 6.3 hours\n\n \n\nComment on the results", "a": "The presence of a staphylococcal species on peripheral and line culture without an alternate focus in a patient with an endovascular device is suggestive of line related sepsis.  Additionally, there is a differential in time to positivity in excess of 120 minutes, which is consistent with an infected line.\n\nThe line should be removed and reinserted.\n\nComment : Diagnosis of catheter infection in \"special\" lines is difficult.  Differential Time to Positivity (DTP) has been found to be highly specific for line infection.  A DTP >120 is consistent with this.\n\nDifferential Quantative Cultures can also be used.  In this test, a 10 fold increase in colony forming units in the sample taken from the line confirms line sepsis.  This is more sensitive with comparable specificity to DTP.  However, the test requires considerable laboratory expertise and is often not available.\n\nDialysis catheters are at high risk of infection, and Staph aureus is a common pathogen.", "imgs": [], "cat": "ABG"}, {"q": "A 65 year old man is recovering in ICU following multiorgan failure from severe pancreatitis.  He was treated with subcutaneous heparin for DVT prophylaxis, and on day 8 his platelet count was noted to be 55 (admission value 320, Day 3 220, Day 6 115).  The following tests are available.\n\nHeparin-PF4 antibody (Elisa) : 0.8 Optical Density Units\n\nWhat investigations should now be performed?", "a": "A functional Heparin Induced Thrombotic Thrombocytopaenia (HITT) assay is now required, as well as venous sonography looking for possible thromboemboli.  The ELISA result is non-specific, being elevated in many inflammatory conditions.  Additionally, the value is in an indeteriminate range.\n\nELISA tests will detect IgM, IgG and IgA anti-PF4-heparin antibodies.  Of these, only IgG is associated with clinical disease.  Therefore, a function assay is required to confirm the diagnosis.  ELISA assays >1.0 optical density units are more likely to be associated with HITT.\n\nThe clinical likelihood of HITT is moderate - onset 6-10 days, fall to <50% baseline, recent exposure to heparin, another cause of thrombocytopaenia not highly likely.  In this situation, until HITT is confirmed, anticoaggulation may be dangerous with coexistant thrombocytopaenia (if the diagnosis was highly likely, alternative anticoagulants can be justified).  Given that DVT often develop prior to platelet fall, and that DVT are difficult to detect clinically in ICU, the patient requires sonography to detect DVT as early as possible.\n\n \n\nReference : Selleng K et al.  Heparin Induced Thrombocytopaenia in Intensive Care Patients.  Crit Care med 2007; 35:1165-76", "imgs": [], "cat": "Biochemistry"}, {"q": "A 56 year old female with a history of alcoholism presents to emergency with an altered conscious state.  She is clammy and shut down, is mumbling incoherently and has only semipurposeful movements.  An ECG and head scan are normal, and there are no focal neurological signs.\n\nThe following biochemistry is obtained\n\n \n\nNa\t142\nK\t3.8\nCl\t113\nHCO3-\t17\nAlb\t22\nPhosphate\t4.0\nLactate\t4.9\npH\t6.93\nCO2\t80\nSBE\t-14.1\nAnion gap\t15.8\nCorrected Anion gap\t3.6\nUrea\t14.8\nCreatinine\t87\nGlucose\t12.1\nOsmolality (measured)\t340\n\n \n\nDescribe the results\n\nWhat is the difference between Anion Gap and Corrected anion gap?", "a": "A mixed respiratory-metabolic acidosis is present.  The serum lactate is raised indicating lactic acidosis.  The anion gap is \"within normal limits\" after allowing for lactate, but the corrected anion gap is raised.  This suggests that lactic acid is not the sole cause of the acidosis and another unmeasured anion is present.\n\nThere is also a raised Osmolar gap (calculated osmolality ~ 310) which in this context suggests toxic alcohol consumption.  In this case, the patient had taken methanol.\n\nThe AGc corrects the AG for the effect of Albumin, Phosphate and Lactate on the measured anion gap.  The normal value should be close to zero, and a raised AGc suggests the presence of an unmeasured anion.  Had the AG alone been used, this might have been missed.\n\n \n\nReference : Kellum J.  Disorders of acid-base balance.  Crit Care Med 2007; 35:2630-36", "imgs": [], "cat": "ABG"}, {"q": "A 76 year old man presents to the emergency department with progressive confusion and altered concious state.  A CT brain is performed and you are asked to review it.\n\nDescribe the features of the scan", "a": "The most notable abnormality is an acute on chronic subdural haematoma extending from the right frontal to parietal lobes.  There is a mixture of hypo-dense (suggesting older subdural) with hyperdense blood, which is acute.  There is layering posteriorly, as the acute blood is more dense and sinks to the bottom of the collection.\n\n \n\nThe rest of the brain is normal, allowing for age related cerebral atrophy.  Also noted is dense calcification within both lobes of the cerebellum (the dentate nuclei), which is occasionally seen in elderly patients.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20158.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20255.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20347.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20441.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20527.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20618.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20710.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2085.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2094.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20104.JPG"], "cat": "CT"}, {"q": "A 25 year old female patient presents 10 hours post ingestion of 22 paracetamol tablets (500mg each).  She is clinically well, weighs 55kg, has a history of asthma and takes ventolin several times per week.  She has no allergies or other medications.\n\nWhat will you do?", "a": "Assessment ensuring airway, breathing and circulation are intact should occur first.  History and examination can exclude co-ingestants, and a collaborative history should be sought.  At 10 hours there is no value in oral charcoal or other gut decontamination.\n\nAccording to currently available guidelines, given the delay to treatment is prolonged (>8 hours) and the patient has taken a \"likely toxic dose\" (defined as >10g or >200mg/kg) she should be treated with N-acetyl cysteine until results of biochemical testing are available.\n\nIf the paracetamol level is below the treatment line AND the Alanine Transaminase (ALT) is normal, NAC can be ceased.  If either are abnormal, treatment should continue and expert advice sought.  Should ALT remain abnormal at the end of the infusion it should be continued.\n\nImportantly, asthmatics appear to have a higher risk of anaphylactoid reactions to NAC, and great care should be observed when commencing the infusion.\n\nReference : Daly et al.  Guidelines for the management of paracetamol poisoning in Australia and New Zealand - explanation and elaboration.  MJA 2008; 188:296-301", "imgs": [], "cat": "Biochemistry"}, {"q": "A 19 year old man is admitted to a regional intensive care unit pending transfer to a burns unit.  He has sustained deep (full thickness) burns to the entirity of both legs (excluding perineum) when his trousers ignited at work.  The burns occured 1 hour ago, during which he received 1L of crystalloid in the emergency department.  He weighs 100kg.  No other injuries are apparent on secondary survey.\n\nDescribe his fluid management over the next 12 hours until he can be evacuated.", "a": "He will require significant fluid volume to maintain cardiac output and renal function.  Several formulae have been used to estimate fluid requirements, the most commonly quoted being the Parkland Formula (4ml/kg/%BSA of lactated ringers solution, half given in the first 8 hours post burn, the rest over 16 hours.\n\nThe \"Rule of Nines\" suggests these injuries cover 36% of total body surface area (BSA).  Thus, the patient will require 4x36x100 = 14.4L (as one has already been given, 13.4L remains).  One half of this (6.7L) should be given over the next 7 hours, while the remainer is given over the subsequent 16 hours.\n\nUrine output should be maintained >1.0ml/kg/hr, and fluid therapy should be tailored up or down accordingly.\n\nFluid therapy can be associated with abdominal compartment syndrome, pulmonary oedema and fascial compartment syndromes.  A careful watch for these complications is essential.\n\nComment : Gross fluid depletion is common in severely burned patients.  Recent studies have demonstrated that application of these prediction formulae are successful in avoiding underhydration, but may be associated with complications of overhydration.  They should be treated as a guidline only and therapy titrated up or down according to urine output and general perfusion.\n\nNo one crystalloid has been shown to be more efficacious than another in burns.  There are theoretical advantages purported for hypertonic saline but outcome studies are lacking (and may be harmful).  Some centres advocate addition of colloids (eg albumin) AFTER 12 hours post burn.\n\nReference : American Burn Association Practice Guidelines : Burn Shock Resuscitation.  J Burn Care and Research; 29:257-65", "imgs": [], "cat": "Biochemistry"}, {"q": "In a clinical trial evaluating a new quantitative test, the following graph is presented.\n\nWhat is it demonstrating?  Explain twhat the value ROC area means.", "a": "This is a Receiver Operating Characteristic (ROC) curve.  It graphically represents the relationship between the true positive rate and the false positive rate.  The ROC area is the area under the curve, which represents the diagnostic power of the test.  An ROC area of 0.5 occurs when the test is unable to discriminate between false and true positives.  The more area (ie as the number approaches 1.0), the better the diagnostic power of the test.\n\n \n\nComment : Most diagnostic tests have an ROC of at least 0.75, while a test is excellent if >0.9.  A test usually works best when a cutoff is used that maximises sensitivity without sacrificing specificity.  This is graphically represented as the top left corner of the curve (its shoulder, in other terms).  However this requires interpretation in context too.  If a test is used for screening, it is important to avoid false negatives (at the expense of increased false positives).  However, if the test is for diagnostic purposes, a threshold that maximises specificity is chosen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ROC.jpg"], "cat": "ABG"}, {"q": "A 65 year old man returns from cardiac theatre following coronary artery graft surgery.  You are able to review his preoperative echocardiogram.  \n\nWhat view is shown?  What abnormality is present?", "a": "This view demonstrates the long axis view of the left ventricular outflow tract and aortic valve.  There is mild aortic regurgitation present.\n\n \n\nComment : The severity of aortic regurgitation can be assessed by numerous markers including : \n\nWidth of jet : width of LVOT\nDensity of the jet\nDiastolic flow reversal in the descending aorta\nPressure half time of the jet\nEarly termination of mitral inflow (suggesting LV pressure is rapidly rising)\nEffective regurgitant orifice (ERO)\nVena contracta width (width of narrowest diameter of the regurgitant jet)\nRegurgitant volume or regurgitant fraction\nMany others!", "imgs": [], "cat": "ECG"}, {"q": "A 39 year old man is ventilated in ICU with acute pancreatitis due to gall stones.  On day 6 he has a persistant fever.  The following test result is obtained.\n\nProcalcitonin - 7ng/ml (0.1-0.5ng/ml\n\nWhat is the significance of this result?", "a": "Procalcitonin is an acute phase protein which is elevated in inflammation and sepsis.  It is often suggested as a predictor of infectious cause of fever, though there remains considerable controversy as to its reliability.  On its own, it should not be used as an indicator of infection.\n\n \n\nComment : Procalcitonin is well known for its role in the production of calcitonin from the C cells of the thyroid gland.  In this context however, procalcitonin rises due to release from non-neuroendocrine sources such as lung, kidney, intestine, fat and muscle.  Lack of the post-processing ability of the C cells sees it released in its precursor form, and thus calcitonin itself is not raised.  Its role in sepsis is not entirely clear, but some evidence suggests it may cause harm, making it a potential candidate as a therapeutic target.\n\n \n\nProcalcitonin is seen to rise between 2-4 hours after an inflammatory insult, with a peak at 12-24 hours.  It tends to track clinical progress.\n\n \n\nIn many studies involving various clinical conditions, sepsis patients statistically have higher procalcitonin levels than non-septic controls.  However, there remains considerable overlap and a clinically useful cut-off value is elusive.  Additionally, numerous assays for procalcitonin exist with variation in performance.\n\n \n\nLevels are seen to rise with clinical and scoring system severity - SIRS (0.6-2.0), severe sepsis (2-10) and overt septic shock (>10).  However, non infectious causes can also generate procalcitonin levels in this range.", "imgs": [], "cat": "Clinical"}, {"q": "A 56 year old woman requires implantation of a tunnelled vascath for intermittant dialysis.  The following xray is taken at the conclusion of the procedure.  Comment on the xray", "a": "There is an anterior pneumothorax present on the left side.  The line is well positioned.\n\n \n\nComment : It may be very difficult to see a pneumothorax in a supine patient on a standard xray.  The features that suggest its presence include a sharp margin to the diaphragm, heart, liver or spleen, a \"deep sulcus sign\" where the costophrenic angle appears to continue well below the normal position, and the appearance of air overlying the liver or stomach.\n\n \n\nIn this case, an erect xray confirmed the presence of the pneumothorax.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cxr%201.jpg"], "cat": "X-Ray"}, {"q": "A 19 year old female is involved in a high speed MVA.  The following xray is taken in the resuscitation phase.  Comment on the findings", "a": "There is a fracture of the inferior pubic ramus. There is also a subtle fracture noted through the superior pubic ramus, extending laterally to the medial / anterior aspect of the left acetabulum.\n\nThere is a lucency through the right side of the sacrum raising the possibility of a fracture at this site.   Otherwise the rest of the pelvis appears normal, with no evidence of SIJ or pubic symphysis disruption.\n\nThere is also a fracture of the left upper femur - the metal work is likely to be a splint.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/PXR.jpg"], "cat": "X-Ray"}, {"q": "A 17 year old male is involved in a high speed motor bike accident.  He is brought to ED with multiple injuries and a GCS of 6 requiring intubation.\n\nThe following CT brain is obtained.  Comment on the images.  Discuss the role of an intracerebral pressure monitor", "a": "The CT demonstrates multiple punctate haemorrhages particularly in the right frontal and temporal lobes.  No oedema is noted and there is no evidence of mass effect.  A small amount of traumatic subarachnoid haemorrhage is noted around the base of skull in the posterior fossa.\n\n \n\nWhile there is considerable debate over the role of ICP monitoring, the Brain Trauma Foundation currently recommends an ICP in the following situations :\n\nall salvagable patients with a severe traumatic brain injury, an abnormal CT and a GCS <9\npatients with GCS <9 and a normal CT if\nage >40 years\nmotor posturing (uni- or bilateral)\nsystolic BP <90mmHg\nan inability to monitor the patient clinically (eg pharmacological paralysis)\n\nThe rationale for the latter is that up to 13% of patients with a normal scan and GCS <8 are subsequently found to have, or subsequently develop, raised ICP.\n\n \n\nNote, an abnormal CT is \"one that reveals haematomas, contusions, swelling, herniation or compressed basal cisterns\".\n\n \n\nComment : Punctate haemorrhages are often seen in CT scans of patients with Diffuse Axonal Injury.  They occur at the interface between grey and white matter.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20159.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20256.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20348.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20442.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20528.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20619.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20711.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2086.JPG"], "cat": "CT"}, {"q": "A 65 year old man presents with severe renal failure following a 2 week illness consisting of vomiting, intermittant diarrhoea and abdominal pain.  A catheter is inserted and after initial fluid resuscitation is making 40-60ml/hr of urine.  He has diffuse mild tenderness across his abdomen.  A CT scan is obtained to investigate his abdominal pain.  Describe the features.", "a": "There is severe bilateral hydronephrosis and hydroureter down to the level of the bladder.  The bladder is small volume and has a prominent thickened wall. A catheter is in situ.\n\n \n\nThere is no evidence of retroperitoneal adenopathy or fibrosis.  The prostate appears normal sized.\n\nThere are features of acute and chronic obstruction.  The ureters usually do not immediately dilate to this degree, suggesting obstruction has been present for some time.  Additionally there is mild diffuse thinning of the renal parenchymal substance, and the thickening of the bladder is probably a long standing feature.  However, there is evidence of bilateral perinephric stranding, so there is likely to be an acute  component.\n\nDecompression of the renal system bilaterally is required to restore renal function.\n\nCauses of bladder fibrosis may include :\n\nchemical cystitis\nchronic infective or haemorrhagic cystitis\nneurogenic bladder\nradiation\npost surgical scarring\ninfiltrative diseases\n\n Comment : It is essential to rule out obstruction as a cause of renal failure in any patient without a clear diagnosis.  In this case the clinical scenario suggested obstruction was unlikely - without investigation the diagnosis would have been missed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20160.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20257.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20349.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20443.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20529.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20620.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20712.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%2087.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%2095.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%20105.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%201111.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%201210.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%201310.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%201410.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Composite%201510.JPG"], "cat": "X-Ray"}, {"q": "Name this device.  What is intended to prevent?", "a": "This device is an endotracheal tube with a supplementary suction port located above the cuff.  This is designed to suction supraglottic secretions (Continuous Aspiration of Subglottic Secretions - CASS).  This technique is designed to reduce the quantity of oropharyngeal secretions entering the trachea around the cuff, thereby reducing the incidence of Ventilator Associated Pneumonia.\n\n \n\nComment : A number of trials have now reported results supporting the use of these tubes, the largest of which was published in 2008 (1).  This has now led some organisations to recommend them in patients requiring mechanical ventilation > 48 hours (2) \n\n \n\nReference :\n\nBouza E et al.  CHEST November 2008 vol. 134 no. 5 938-946\n\nMuscedere J, Dodek P, Keenan S,\n\nclinical practice guidelines for ventilator-associated pneumonia: prevention.\n\nJ Crit Care 2008; 23:126\u2013137.\n\nUpdated comprehensive evidence-based guideline by the Canadian Critical\n\nCare Trials group regarding VAP prevention. Updated from the 2004 guideline.\n\net al. Comprehensive evidence-based", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/IMG_0113.JPG"], "cat": "Equipment"}, {"q": "A 26 year old female is involved in a motor scooter accident.  She is unable to move her legs, and only has use of her shoulders and elbows bilaterally.  The following CT is undertaken.\n\n \n\nComment on the results.  Discuss the potential mechanism of injury.", "a": "Scans have been performed without intravenous contrast. There is a comminuted fracture of the body of C5. There is approximately 50% loss of vertebral body height anteriorly. There is 50% narrowing of the neural canal with 2 retropulsed fragments at this level. The fracture extends posteriorly through the lamina on both sides. There is however no involvement of the vertebral artery foramina.\n\nComment : This is a burst type fracture as the vertebra is crushed and fragments are propelled outwards.  This type of fracture is caused by loading of the spinal collumn (such as impact to the top of the head).  Burst fractures are uncommon in cervical vertebrae, with the exception of C2 (Jefferson's Fracture) and are more commonly seen in lumbar vertebrae.\n\nInterestingly, there is also splitting of the lamina / spinous process (best seen in the coronal sections), which suggests a marked hyperflexion injury.\n\nThis injury has resulted from a combined hyperflexion / loading impact", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/4.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/6.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/7.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/8.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/9.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/10.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/11.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/12.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/13.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/14.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/15.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/161.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/17.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/18.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/19.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/20.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/21.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/22.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/23.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/24.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/25.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/26.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/27.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/28.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/29.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/30.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/31.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/32.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/33.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/34.jpg"], "cat": "Biochemistry"}, {"q": "A 40 year old man has sustained chest injuries in a motor vehicle accident and requires mechanical ventilation for the past 24 hours.  He is attached to the following piece of equipment.\n\nWhat is the piece of equipment and how does it work?\n\nWhat important finding is noted here?  What are the possible causes?", "a": "This is a commercially available underwater seal chest drain kit which is a modified version of the 3 bottle system.\n\nThere is a collection chamber for any drainage of fluid from the chest cavity (D).  Any air flows over this chamber, down the pipe (C) into the underwater seal drain (B).  Suction can be applied and regulated by adjusting the dial (A).\n\nIn addition to the drainage fluid in the chamber, there is a persistant bubbling which appears to co-incide with respiration.  A pneumothorax should drain within a number of hours after insertion of an intercostal catheter, however persistant drainage (eg >24 hours) represents a bronchopleural fistula.  This is a connection between the airways and the pleural space (persistant leak).", "imgs": [], "cat": "X-Ray"}, {"q": "A 2 year old boy has been in hospital with asthma for 7 days.  Despite maximal therapy he is having intermittant exacerbations which have required ICU management.  He has intermittant partial resolution of his symptoms allowing discharge to the ward.  He deteriorates once more and requires intubation.  The following chest xray is obtained following intubation.\n\nDescribe the features.  Suggest a cause.", "a": "There appears to be a slight increase in lucency in the right hemithorax compared to the left. Additionally, there appears to be some shift in the mediastinum to the left.  A subtle increase in density is noted in the right upper zone ? partial atelectasis.\n\nCardiac size appears normal. No pleural effusions visualised. An ET tube and NG tube are noted in situ.\n\nThe radiographic and clinical features may be explained by an inhaled foreign body.  This can result in a ball-valve mechanism which results in air trapping and hyperinflation of one lung.  A tension-like situation may arise.  Inspisated sputum plugs due to asthma may also cause this.\n\nAlternatively, focal collapse due to sputum plugging in the left lung may give this appearance.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cxr%2011.jpg"], "cat": "X-Ray"}, {"q": "What is this piece of equipment?", "a": "This is a commercially available kit for percutaneous insertion of a tracheostomy.  The tracheostomy is an adjustable flange trachy, which is used for patients with abnormal neck anatomy (eg obesity, severe neck oedema etc).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/IMG_0111.JPG"], "cat": "Equipment"}, {"q": "A 35 year old patient is admitted with severe necrotic appendicitis resulting in severe sepsis and multi-organ failure.  On admission is platelet count is 179, Hb 98 and white cell count 26.2.  Continuous renal replacement therapy is commenced on day 3 and is working well for 4 days.  His sepsis appears to have resolved.  On day 7 the filter clots 3 times in 12 hours.  Repeat bloods reveal Hb 85, WCC 16 and plt 62.\n\nDiscuss the causes of his thrombocytopaenia", "a": "There are multiple causes of thrombocytopaenia in ICU patients.  These can include increased destruction (sepsis, DIC), increased loss (haemorrhage, exposure to extracorporeal membranes), sequestration (liver disease), nutritional deficits and bone marrow suppression (critical illness).  Drugs can also influence platelet count.\n\nHeparin induced thrombocytopenia (HIT) is an uncommon drug related cause of thrombocytopaenia, perhaps occuring in 0.5% or less.  The combination of a moderate platelet drop (>50% of baseline, and usually not <20), unexplained clotting and exposure to heparin starting 5-10 days before the acute drop in platelet count makes HIT more likely, particularly if there is no alternative cause apparent.\n\nHIT is related to generation of a specific platelet antibody directed against platelet factor 4.  It is complicated by both thrombocytopania and thrombosis (both venous and arterial).  The highest risk appears to be after stopping heparin.  While HIT may occur with low molecular weight heparin, it is much more common with unfractionated heparin.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 59 year old diabetic woman is admitted to ICU following a hypotensive episode due to a blown fistula in her left arm.  She is resuscitated and observed in ICU.  On the following day she complains of severe abdominal pain.  A CT is performed.\n\nWhat does the CT show?", "a": "A non contrast CT of the abdomen has been performed.  Most notably, there are a few dilated small bowel loops noted in the left lower abdomen and the lower mid abdomen which show fluid distension. There are multiple small bubbles of air seen within the wall of these loops and in the adjacent vasculature in the mesentery suggesting severe ischaemia and gangrene. The large bowel however appears to be normal.\n\nAlso of note, there is marked calcification noted in the abdominal aorta and its branches. It is likely that the severe hypotension compromised the already impaired mesenteric blood flow.\n\nThe residual haematoma from the blown fistula can be seen overlying the left hemithorax.\n\nBoth lobes of the liver appear to be nonspecifically enlarged. Both the kidneys are small and atrophic, consistent with chronic renal disease. No collections visualised.\n\nThe other abdominal organs appear relatively normal.  The gall bladder has been removed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20161.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20258.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20350.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20444.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20530.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20621.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20713.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2088.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20106.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%201112.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%201211.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%201311.JPG"], "cat": "CT"}, {"q": "A 29 year old man is in ICU ventilated with severe sepsis due to lower leg necrotising fasciitis.  On day 4 of ventilation the following CXR is recorded.  Describe the findings.", "a": "Extensive opacity is seen bilaterally in both the lungs which suggests extensive consolidation. This can be due to infection or ARDS. There is blunting of the right CP angle with opacity along the right inner chest wall suggesting right pleural effusion. Left CP angle is not seen on this film, however there is no opacity along the left inner chest wall. An endotracheal tube and right internal jugular central line are in situ.\n\n \n\nComment : Pleural effusions are sometimes difficult to detect in supine patient.  A vague veiling of one lungfield may represent fluid lying posteriorly.  In this case, sufficient fluid is present to creep up the lateral chest wall and is seen \"end on\".  Loculated effusions can also be present and may be difficult to detect.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cxr.jpg"], "cat": "X-Ray"}, {"q": "A 72 year old man presents with acute left sided hemiparesis.  He has a history of atrial fibrillation associated with 2 previous strokes (right frontal and right cerebellar) and is now treated with warfarin.\n\nDescribe the findings on the CT.", "a": "There is evidence of previous strokes, demonstrated as low attenuated areas in the right frontal and right cerebellar areas.\n\nThere is presumably new hypodensity representing a large area of neurogenic oedema extendingwithin the temporoparietal region.\n\nThere is no evidence of associated infarction.  There is evidence of age related cortical atrophy generally.\n\nConcerningly, this has occured on warfarin - the INR should be checked to ensure compliance.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20162.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20259.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20351.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20445.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20531.JPG"], "cat": "ECG"}, {"q": "A 28 year old male is involved in a major motor vehicle trauma.  His GCS is 6 on arrival and will require prompt intubation\n\nHe has sats of 92% on 15L prior to intubation, with HR 110 and BP 105/80.  Air entry is difficult to hear either side due to widespread airway noise and gurgling respirations.\n\nThe following CXR is taken prior to intubation.  Describe the findings.  Do you want to do anything prior to intubation?", "a": "Note that this is a supine xray.\n\nThere is extensive air space opacity throughout both lungs with relative sparing at the left base. In the setting of trauma this could represent pulmonary contusion, aspiration or fat embolism -  no rib fractures are visible.\n\nThere are also bilateral anterior pneumothoraces present \u2013 these can be seen due to the clear outline of the decending aorta and pericardial sac anteriorly, and the \u201cdeep sulcus sign\u201d on both sides.  There is some suggestion of mediastinal air also.  The cardiomediastinal outline is normal. There is an oval air containing lesion in the right upper zone, the significance of which is unclear. \n\nThe pneumothoraces should be drained prior to intubation if time allows as there is the potential for tensioning and sudden deterioration, including arrest.\n\nComment : the difficulty of detecting anterior lying pneumothoraces in supine critically ill patients is again noted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/presentation.jpg"], "cat": "X-Ray"}, {"q": "A 5 year old boy presents to emergency with progressive decline in function for several months.  He is becoming more drowsy and confused.  An MRI is performed, and the T1 images are displayed.\n\nWhat does it show?", "a": "There is evidence of obstruction of CSF flow with marked dilatation of the lateral ventricles (hydrocephalus).  This is not, however seen in the 4th ventricle and the aqueous duct appears to be normal size (ie you can't see it).  The third ventricle is also difficult to detect, and appears to be replaced by some type of mass.\n\nIn this case the child had a large glioma.\n\nComment : T1 images show CSF as black.  Bright signal in the parenchyma can be seen when oedema is present.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/110.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/210.jpg", "http
