nce of a pneumothorax.\n \nThe patient needs an intercostal tube and should have the ETT withdrawn a couple of centimetres.", "cat": "X-Ray"}, {"q": "Describe the following CXR taken from a 60 year old patient with respiratory failure\n\nMedia\n1", "a": "The patient is intubated. There is a pulmonary infiltrate on the left, and 2 left chest drains are present. On the right there is a pneumothorax despite the presence of a chest drain, which appears kinked. The right lung is collapsed and there is significant subcutaneous emphysema.\n\n \nThere is a left subclavian line, an endotracheal tube and a nasogastric tube, which all appear correctly positioned.", "cat": "X-Ray"}, {"q": "The following CXR is taken of a patient in intensive after insertion of a subclavian central line.\n \nDescribe the findings\nMedia\n1", "a": "There are bilateral pulmonary infiltrates. The heart looks enlarged and there is a left sided pleural effusion. The subclavian central line looks adequately positioned. There is a mitral valve replacement present.\n \nThe nasogastric tube is situated in the left main bronchus, which must be removed.", "cat": "X-Ray"}, {"q": "List the hardware seen on this CXR\n\nMedia\n1", "a": "Endotracheal tube\nNasogastric tube\nRight internal jugular central line\nRight internal jugular Swan-Ganz catheter\n3 chest drains inserted substernally – one in the mediastinum and one in each pleural space\nMitral annuloplasty ring\nIntra-aortic balloon pump\nSternal wires", "cat": "Echo"}, {"q": "A 71 year old woman is admitted to ICU post coronary artery bypass grafting. 15 minutes post extubation she develops acute respiratory distress\n \nDescribe the findings of this CXR\nMedia\n1", "a": "Bilateral pulmonary infiltrates, most likely acute pulmonary oedema, could also consider ALI due to infection. Right apical pneumothorax. NGT remains in situ. Probable bilateral pleural effusions\n \nComment: Don’t stop looking at the film when you find an abnormality. In this case a subtle pneumothorax is present, adding to the patient’s distress.", "cat": "X-Ray"}, {"q": "Comment on the following preoperative CXR\n\nMedia\n1", "a": "A large retrocardiac rounded lucency is present with surrounding thick wall consistent with hiatus hernia or lung abscess. The absence of a fundal bubble suggests hiatus hernia.", "cat": "Clinical"}, {"q": "A 45 year old man presents with recurrent fevers and productive cough. \n \nWhat abnormalities are present? \nWhat are the most likely pathogens? \nWhat underlying causes may be present?\nMedia\n1", "a": "A large rounded soft tissue density opacity with air fluid level is present in the right upper zone consistent with a lung abscess. A congenital cystic lesion with bronchial communication may give a similar appearance.\n \nMost common pathogens are gram negatives and anaerobes, though others are possible. \n \nCommon underlying causes for lung abscess include bronchus obstruction (peanuts, tumour), post aspiration or cavitating pneumonia", "cat": "X-Ray"}, {"q": "23 year old girl presents with haemoptysis, acute renal failure and low-grade fevers. She is very difficult to ventilate due to ‘high pressuring’. \n \nDescribe the CXR. \nBriefly describe how you would set the ventilator.\nMedia\n1", "a": "Bilateral diffuse alveolar opacity consistent with pulmonary oedema/ARDS. The paracardiac linear lucency consistent with a pneumomediastinum is probably secondary to barotrauma in view of positive pressure ventilation.\n \nRequires high PEEP and low tidal volumes, preventing excessive Pplat (<30), accepting high PaCO2.\n \nComment: The initial ARDS-net trial demonstrated a reduction in mortality when patients with ARDS were treated with low tidal volumes and high levels of PEEP. Subsequent trials have not shown a benefit when higher levels of PEEP are used.\n \nThe theory behind the “open lung” technique is to use higher levels of PEEP to recruit collapsed lung segments, while simultaneously preventing ‘ventilator induced lung injury’ (VILI) caused by high inflation pressures and volumes.", "cat": "ABG"}, {"q": "A 74 year old previously well man presented with 14 hours of severe central chest pains and ST elevation and was subsequently thrombolysed. 2 days later he develops acute shortness of breath. He has a temperature of 37.9, a White Cell Count of 12.1 and a C-reactive protein of 65.\n \nInterpret the CXR\nList 3 potential causes\nDiscuss his prognosis\nMedia\n1", "a": "There are ill defined opacities in both mid and lower zones, particularly perihilar. This is consistent with alveolar and interstitial oedema. Given the context and the fact that his heart size is enlarged this is most likely cardiogenic.\n \nCardiac failure and pulmonary oedema post myocardial infarction can be due to multiple causes including:\nAcute mitral valve regurgitation\nPapillary muscle dysfunction\nAcute LV dilatation due to the infarction\nIschaemic ventricular septal defect\nAcute tamponade\nOngoing ischaemia causing LV dysfunction\nSufficient myocardial cell death to compromise LV function\n \nThe inflammatory markers and temperature can all be explained by a myocardial infarction. Infection is possible though there is no evidence of this on xray.\n \nThe Killip classification describes mortality after myocardial infarction. \nNo clinical signs of cardiac failure (mortality 6%)\nCrackles in the lungs, an S3 or an elevated JVP (17%)\nFrank pulmonary oedema (38%)\nCardiogenic shock (81%)\n \nReference : Killip T, Kimball JT. Treatment of myocardial infarction in a coronary care unit: a two year experience of 250 patients. Am J Cardiol 1967; 20: 457-464", "cat": "ECG"}, {"q": "A 32 year old male presents with acute shortness of breath and mucopurulent sputum.\n \nDescribe the xray findings\nWhat investigations are required?\nMedia\n1", "a": "The patient is intubated and has a left internal jugular central line and a nasogastric tube.\n \nBoth lungfields are markedly hyperinflated. Prominent bronchovascular markings are noted in the upper zones compared with the lower zones. Given the degree of hyperinflation, the heart shadow looks enlarged.\n \nIn combination the patient has severe emphysematous changes, which appears to have a lower zone predominance. This is suggestive of alpha-1 antitrypsin deficiency. Additionally, the vascular prominence, septal lines and large heart suggest cardiac impairment.\n \nThe patient needs an ECG, Echocardiogram and troponin to investigate the cardiac involvement. Pulmonary function testing and an alpha-1 antitrypsin level is also required.", "cat": "ECG"}, {"q": "This 33 year old male was found face down at a city nightclub with a GCS of 5. He was intubated by paramedics and transported to hospital. His A-a gradient on 30% oxygen is 72.\n \nDescribe the CXR findings\nList 3 possible causes\nWhat management would you institute for this problem?\nMedia\n1", "a": "The patient is intubated – the tube is not in far enough. There is collapse of the right upper lobe, with superior displacement of the horizontal fissure, right hemidiaphragm elevation and deviation of the trachea to the right.\n \nThe causes include :\nLuminal obstruction due to vomitus, broken teeth, sputum plug\nMural pathologies such as a bronchogenic tumour\nExtrinsic compression (eg tumour, lymph node)\n \nA common cause is right main bronchus intubation. When the endotracheal tube is inserted to far in adults it often goes down the RMB. Because the right upper lobe bronchus originates very early in the course of the RMB, it is easily obstructed by the ETT, as in this case. The tube had been repositioned in the emergency department before the xray was taken.\n \nManagement involves bronchoscopy to remove obstructing objects and increasing PEEP and chest physiotherapy to encourage reinflation.", "cat": "ABG"}, {"q": "This 24 year old woman has been admitted for acute gallstone pancreatitis for 3 days. She has now become increasingly short of breath.\n \nDescribe the findings of the xray\nWhat is the likely cause?\nHow is this condition defined?\nMedia\n1", "a": "There is diffuse alveolar opacity noted in both lungs. The costophrenic angles and the cardiac silhouette are not visible.\n \nThe most likely diagnosis is Acute Respiratory Distress Syndrome (ARDS) related to acute pancreatitis. It may also be acute pulmonary oedema due to excessive rehydration fluids.\n \nARDS is defined by the consensus definition (Bone et al). The criteria include:\nAcute onset\nPulmonary infiltrates, usually bilaterally\nHypoxia, as measured by a PaO2/FiO2 <200 (when <300, referred to as Acute Lung Injury)\nNo evidence of raised left atrial pressure (Pulmonary artery occlusion pressure <18mmHg)\nA diagnosis known to be associated with ARDS\n \nRaised left atrial pressure was previously defined as a pulmonary capillary wedge pressure <18mmHg, but echocardiographic evidence of normal LAP, or absence of clinical signs of raised LAP, is now considered acceptable.", "cat": "ABG"}, {"q": "A 73 year old woman presents to emergency with acute shortness of breath. She has previously had a prolonged admission to ICU.\n \nDescribe the xray\nMedia\n1", "a": "There is evidence of right lung volume loss with tracheal deviation to the right. The bronchi in the right upper zone are more prominent and may be dilated, suggesting bronchiectatic change.\n \nElsewhere the lungs appear congested and vascular markings are not clear suggesting interstitial oedema.\n \nThere is an opacity in the right upper zone which appears to hug the contour of the chest wall. There are no air bronchograms, which makes consolidation unlikely. This is consistent with a pleural collection.\n \nThis patient had an infected pleural collection that was treated conservatively at her past ICU admission – it is now fibrosed.", "cat": "X-Ray"}, {"q": "A 41 year old man presented with fevers, chills, rigors and hypotension.\n \nDescribe the xray findings\nWhat is the likely pathology?\nMedia\n1", "a": "There is a faintly hazy appearance of the left lower zone. This appears to obscure the left cardiac border which probably places it in the lingula.\n \nThe findings are consistent with early lingula pneumonia. The most common organism is Strep pneumoniae, though others including:\nMycoplasma pneumoniae\nHaemophilus influenzae\nLegionella spp\nChlamydia pneumoniae\nStaph aureus\nMycobacteria\nGram negative bacteria\nAnaerobes", "cat": "ABG"}, {"q": "A 51 year old man presents to emergency with acute shortness of breath and left sided pleuritic chest pains.\n \nDescribe the features of this chest xray\nHow would you investigate further?\nMedia\n1", "a": "The chest xray demonstrates a left pleural effusion. There is loss of the left hemidiaphragm, a lateral meniscus and there is no mediastinal shift. No underlying lung pathology can be demonstrated\n \nPossible causes include:\nPulmonary embolism\nAcute haemothorax (eg trauma related)\nParapneumonic effusion\nNeoplastic disease\n \nThe patient should have routine bloods (FBE, coagulation profile, urea and electrolytes), sputum analysis and an aspirate of the pleural fluid sent for microbiology, cytology and biochemistry (protein, LDH, pH, glucose). Other investigations may be indicated by clinical history and exam. Repeat chest imaging may be required after the fluid is drained.", "cat": "X-Ray"}, {"q": "This xray is taken from an elderly lady with shortness of breath, fatigue and weight loss.\n \nWhat does the xray show?\nMedia\n1", "a": "The xray demonstrates a large pleural effusion. The left side is positioned closest to the xray plate and is thus the least magnified. Thus, the left hemidiaphragm can be clearly seen, but the right cannot. Therefore the pleural effusion is right sided.", "cat": "X-Ray"}, {"q": "This CXR was taken of a 23 year old rugby player who complained of severe shortness of breath after being crash tackled.\n \nWhat does it show?\nMedia\n1", "a": "Left sided pneumothorax with complete lung collapse. There is an ICC in the right hemithorax, which is probably inserted too far. There is no sign of residual pneumothorax on this side, nor is there subcutaneous emphysema.\n \nThe film is somewhat rotated but the mediastinum still appears deviated to the right, suggesting the pneumothorax is beginning to tension.\n \nComment: It is always important you check that the expected impact of an intervention actually occurs. In this case, the right intercostal catheter did not relieve the patient’s breathlessness, and the confirmatory xray demonstrated a pneumothorax on the left.", "cat": "X-Ray"}, {"q": "A 40 year old male presents to emergency in extremis. His blood pressure is unrecordable.\n \nWhat does the xray show?\nExplain why the patient is hypotensive\nMedia\n1", "a": "The xray shows a right pneumothorax. There is significant shift of the mediastinum and depression of the right hemidiaphragm, indicating significant tension.\n \nWhen the pressure in the chest becomes this high, venous return to the heart is compromised. Additionally, the IVC and SVC may become kinked, further compromising flow. Consequently, left ventricular filling is impaired and cardiac output falls.", "cat": "ECG"}, {"q": "A 61 year old male returns to ICU following 3 vessel coronary artery bypass grafting. He remains hypoxic on 70% oxygen.\n \nA CXR is performed. Describe the features.\nMedia\n1", "a": "The xray shows bilateral infiltrates suggesting pulmonary oedema, which may be cardiac or due to bypass lung dysfunction. There is a right sided pneumothorax, the only evidence of which is the deep sulcus sign. There is widening of the mediastinum consistent with haemorrhage. The endotracheal tube is appropriately placed. Blurring of the left diaphragm is consistent with collapse and effusion.\n \nComment: The deep sulcus sign may be the only sign of a pneumothorax in a supine patient, as the air rises anteriorly in this position. On the right side of this film, the sulcus seems to go on for ever.", "cat": "X-Ray"}, {"q": "A 45 year old male presented with progressive breathlessness and lethargy, worsening over 2 weeks. A procedure has been performed which immediately improved the patient’s symptoms.\n \nWhat procedure has occurred?\nList 3 complications of this procedure\nMedia\n1", "a": "The patient has had a pericardial drain inserted. This was performed for a pericardial effusion.\n \nThe complications of pericardial catheter insertion include:\nVentricular perforation\nPericardial tamponade\nLAD laceration\nPneumothorax\nInfection\nBleeding\nAir embolus\nArrhythmia", "cat": "ECG"}, {"q": "This 68 year old male has become acutely short of breath after a procedure\n \nWhat was the procedure?\nWhat does the xray show?\nMedia\n1", "a": "The patient has a pneumothorax on the right and has a hilar lung mass. The patient has had a CT guided biopsy which caused the pneumothorax.", "cat": "X-Ray"}, {"q": "This xray was taken to confirm the position of the Intra-aortic balloon pump. Discuss the results.\n\nMedia\n1", "a": "The patient is intubated with bilateral pulmonary infiltrates consistent with pulmonary oedema. There is a nasogastric tube, a right internal jugular central line and 2 chest drains inserted substernally suggesting the patient has just had cardiac surgery.\n \nThe IABP has been placed in the femoral vein and is lying in the SVC.\n \nComment: The IABP is in the best position when the tip lies in the aorta just distal to the left subclavian artery origin. This coincides with the second intercostal space anteriorly on the CXR.", "cat": "X-Ray"}, {"q": "A 67 year old male is admitted to ICU with acute shortness of breath. He has recently undergone a right hemicolectomy for a Dukes B carcinoma. An hour ago, he was transfused 2 units of blood after his Hb fell to 82 post operatively.\nOn examination he has bilateral crepitations, is afebrile, arterial saturations of 93% on 6L O2, a heart rate of 110 and a blood pressure of 125/80. His cardiac examination is otherwise unremarkable and his abdomen is soft and non tender.\nThe following CXR is obtained\n \nDiscuss the possible causes and their mechanisms\nWhat other investigations would you perform?\nMedia\n1", "a": "Possible causes include TRALI (transfusion related acute lung injury), TACO (tranfusion associated circulatory overload), aspiration pneumonitis or ARDS due to sepsis. Less likely is a haemolytic transfusion reaction. TRALI is most likely.\nTRALI is related to immune and non-immune factors causing inflammation and increased permeability of lung capillary membranes. TACO is related to circulatory overload following transfusion and is largely hydrostatic pressure related.\nEvidence of cardiac dysfunction on Echo or other haemodynamic monitoring may suggest TACO. Sputum culture may reveal an infectious pathogen. Evidence of sepsis should also be sought. Evidence of haemolysis (high LDH and unconjugated bilirubin, low haptoglobin) are important to rule out a haemolytic transfusion reaction\n \nComment: TRALI is increasingly being recognised as a complication of blood and component therapy, probably due to improved awareness. TRALI appears to require a \"two-hit\" process, whereby the lung capillaries are primed (often by the underlying disease), followed by exposure to a blood related capillary irritant.\n \nThe irritant in blood products appears to be either antileukocyte antibodies found in donor blood (identified in about 50% of TRALI) or \"biol", "cat": "Echo"}, {"q": "Describe the abnormalities present in the following X-rays?\n\nWhat would your management be after each X-ray?\n\nMedia\n1 2", "a": "Right tension pneumothorax in child, mediastinal shift\n\nX-ray on left, ICC is placed extrathoracically, requires repositioning\n\nX-ray on right, ICC is correctly placed, lung remains deflated. Ensure ICC patent and connected to underwater seal drain", "cat": "X-Ray"}, {"q": "This xray was taken from a 50 year old alcoholic man with fevers, weight loss and purulent sputum production.\n \nDescribe the findings\nMedia\n1", "a": "There is a spherical opacity in the right upper lobe which has an air-fluid level. The wall is indistinct but appears to be fairly think, making tumour possible. This is most likely a lung abscess.\n \nComment: When fluid and air meet, there is loss of the surface tension on the fluid. The result is a flat fluid level rather than the typical meniscus.\n \nA cavitating mass is usually malignancy or an abscess. To distinguish between the two, look at the free wall of the structure. A thick wall (>5mm) is likely to be malignancy, which is usually squamous cell carcinoma, but can on occasion be due to metastasis.\n \nReference : 100 Chest Xray Problems. Corne and Pointon (2007. Churchill Livingstone press", "cat": "X-Ray"}, {"q": "What complication has occurred in this patient?\n\nMedia\n1", "a": "The patient has had a left subclavian central line has been inserted. The guidewire has not been controlled adequately and has embolised into the patient.\n \nComment: When inserting any device using the Seldinger technique, particular attention must be paid to maintaining control of the guidewire at all times. In this case, the patient required thoracic surgery to remove the wire.", "cat": "Equipment"}, {"q": "Describe the abnormalities present on the following Xray.\n\n \n\n \n\n\n\n\nMedia\n1", "a": "Extensive opacity in the left mid, lower, and upper zone, and the right mid and upper zone. Right sided PICC line noted. The heart size is difficult to assess due to airspace infiltration. Apical pleural thickening is noted on the left and blunting of the left costophrenic angle suggesting the presence of pleural fluid or tissue. The right pleural space is thought to be clear. No obvious focal bony destructive lesion.", "cat": "X-Ray"}, {"q": "The following Xray was taken in a 35 yr old man in the recovery ward following surgery for open fixation of fractured femur after a motor vehicle accident. Describe the abnormalities and possible aetiologies.\n\nMedia\n1", "a": "o      Xray shows diffuse bilateral alveolar infiltrates. No bone injury is seen.\n\no      Given the history the possible aetiologies are;\n\n§       negative pressure pulmonary oedema secondary to upper airway obstruction following exubation\n\n§       pulmonary contusion\n\n§       fat embolism syndrome\n\n§       pulmonary oedema  (cardiogenic or neurogenic cause)\n\n§       ARDS secondary extrapulmonary cause", "cat": "X-Ray"}, {"q": "Describe the changes in the following Xray\n\nMedia\n1", "a": "The left lung is well-aerated but there is patchy parenchymal change.\nA right central venous catheter is present.\nThere is scant aeration in the right upper zone and dense opacity throughout the remainder of the right hemithorax. No midline shift is seen.", "cat": "X-Ray"}, {"q": "You are asked to assess a tachypnoeic infant in the Emergency Department. Please describe the abnormaliites on the following X-ray, and the interventions you would consider.\n\nMedia\n1", "a": "Findings:\n\nRight tension pneumothorax with mediastinal shift\nLarge gastric air bubble\n\nInterventions:\n\nOxygen\nRight ICC\nGastric tube", "cat": "X-Ray"}, {"q": "Describe the findings in the folowing X-ray taken after insertion of a central line\n\nMedia\n1", "a": "Large right pneumothorax\nRight subclavian line\nDiffuse interstitial infiltrates", "cat": "X-Ray"}, {"q": "Describe the abnormalities on the following CXR\n\nMedia\n1", "a": "Right upper lobe collapse\nRight apical pneumothorax\nFracture 2nd rib", "cat": "X-Ray"}, {"q": "Describe the abnormalities present on this Chest X-ray\n\nMedia\n1", "a": "Bilateral pneumothorax, undrained\n\nSternal wires", "cat": "X-Ray"}, {"q": "A 70 year old patient presents to emergency with a fractured neck of femur.  Her pre-operative xray is shown.\n\n \n\nWhat does the xray show?\n\nWhat are the potential causes?\n\n \n\nMedia\n1", "a": "The xray demonstrates marked cardiomegaly, with a cardiothoracic ratio approaching 70%.  There are prominent vascular markings with some suggestion of upper lobe diversion, but no alveolar or interstitial oedema.  It is not clear whether the film is supine, which would make the cardiothoracic ratio larger and prevents interpretation of upper lobe diversion.\n\nThe potential causes of dilated cardiomyopathy include :\n\nIschaemic heart disease\nValvular pathology (eg MR due to rheumatic heart disease)\nAlcoholic cardiomyopathy\nMyocarditis (post acute phase)\nConnective tissue disorders\nIdiopathic\nOther\n\nComment : Upper lobe diversion is noted when vessels an equal distance from the hilum are compared, and the upper lobe vessels are equal to or larger than the lower lobe vessels in an erect CXR.  This occurs because of lower zone vessel vasoconstriction related to hypoxia, which is more apparent in the lower lobes than upper lobes in cardiogenic pulmonary oedema.  Upper lobe diversion is \"normal\" in supine films and does not represent cardiac failure.\n\nAn enlarged heart is more than half the diameter of the thorax at the same level on a PA film.  An AP film makes the heart look larger, as does a supine film.  Consequently it is difficult to interpret the cardiothoracic ratio.", "cat": "X-Ray"}, {"q": "A 38 year old male motorcyclist is brought into hospital after running into a parked car.  He has reduced air entry on the left and is complaining of left chest and abdominal pain.\n\nDescribe the features of the chest xray\n\nWhat management plan would you initiate for these findings?\n\nMedia\n1", "a": "The xray is a supine AP film, is adequately penetrated and centred, but underinspired.  It demonstrates elevation of the left hemidiaphragm and lower left lung opacity.  Fractures of the second, seventh and ninth ribs are also present laterally. \n\nThere is also air in the soft tissues around the left chest.  Unless there are major lacerations present, this finding should always suggest a pneumothorax.\n\nThe mediastinum is markedly shifted to the right. \n\nThe patient requires an intercostal drain on the left with aggressive analgesia.  Given the degree of the patient's injuries and the mechanism, CT chest is warranted.  It is important to rule out co-existant injuries such as C-spine injury and associated abdominal injuries, and further imaging may be required.  Supportive care, chest physio and close monitoring are required to minimise the chance of secondary pulmonary infection.  Non-invasive ventilation, or even intubation, may be required.\n\nComment : This xray demonstrates a likely left pneumothorax, rib fractures and a left lower zone opacity associated with a raised hemidiaphragm.  Though pulmonary contusion and subsequent lower lobe collapse may explain these findings, the CT in this case demonstrated a left hemidiaphragm rupture.  Noting the raised hemidiaphragm (actually the spleen) in this case was the clue.\n\nThe findings of the xray suggest the patient has aGiven the right lung looks fairly normal, this is probably not due to collapse on the right side.  The mediastinal shift could be due to a tension pneumothorax or", "cat": "X-Ray"}, {"q": "A 19 year old male is brought to ED following a pub brawl.  He is complaining of marked left upper quadrant pain after being kicked repeatedly to that side.\n\nThe following xray is taken.  What does it show? What will you do?\n\nMedia\n1", "a": "The xray demonstrates a massive left pneumothorax, with complete collapse of the left lung.  There is no evidence of radiographic tension.\n\nThe patient needs to be thoroughly evaluated like any other trauma patient, including evaluation of his ABCs, attention to cervical spine protection and exclusion of abdominal injuries.  In this case, the man's pain was due to a subcapsular renal haematoma, and his pneumothorax was relatively asymptomatic.\n\nComment : note how sharp the definition of his heart border and left hemidiaphragm are.  Though this pneumothorax is obvious, others, including in supine patients, are not and clues like this may be the only diagnostic keys.", "cat": "X-Ray"}, {"q": "A 2 month old girl is brought to emergency with difficulty breathing.  She has been snuffly with a runny nose for 2 days, and has a temperature of 38.2 degrees. Crackles and wheezes are heard, evenly distributed across the chest, there is evidence of intercostal retraction and she is grunting.   A chest xray is taken\n\nDescribe the xray.\n\nWhat management options are available and when would you use them?\n\nMedia\n1", "a": "The xray shows evidence of volume loss in both lungs.  On the right, the right upper lobe is completely collapsed with upward rotation of the horizontal fissure.  The left lung volume is also reduced, and there is a retrocardiac triangular shaped shaddow consistant with left lower lobe collapse. \n\nThe most likely cause, given the viral prodromal features, is Bronchiolitis.  However the lung fields are reasonably clear, and as such aspiration of foreign bodies should be considered.\n\nTreatment consists of oxygen to maintain saturations above 92%, ventilatory support (eg Bubble CPAP, intubation), nasal suctioning and attention to fluids, nutrition and electrolytes.  There is no specific cure.  Randomised controlled trials of physiotherapy, glucocorticoids and bronchodilator therapy have not found benefit, and their use is controversial.\n\nIndications for ventilatory support include regular desaturations despite oxygen therapy, apnoeas and fatigue.  A rising CO2 may also point to the latter.\n\nComment : bronchiolitis is a lower respiratory tract viral infection, most often caused by Respiratory Syncytial Virus (RSV).  It occurs mainly as a first episode of wheezing in a child less than 24 months.  It is self limiting and respiratory distress usually improves gradually over 4-5 days.  The chest xray usually demonstrates peribronchial cuffing, patchy atelectasis, lobar collapse and hyperinflation, largely related to swollen mucosa and", "cat": "X-Ray"}, {"q": "A 64 year old man presents to emergency with severe chest pain for the last 4 hours.  He has a past history of heavy smoking and is an insulin requiring diabetic.  His ECG shows non-specific T wave flattening\n\nThe following xray is taken.  Describe the findings.  What would your management plan be?\n\nMedia\n1", "a": "The xray an AP erect film.  The film is well penetrated and centred and is properly inspired.\n\nThe most striking finding is the widening of the upper mediastinum.  This could be due to the film being taken in the AP configuration, which tends to magnify the mediastinum.  However, this does appear abnormal.  The aortic knuckle also appears a little blurry.\n\nThe lung fields have a reticular pattern suggesting some degree of lung fibrosis, the cause of which is unclear.  The cardiac shaddow is mildly enlarged, but there are no other signs of cardiac failure.\n\nThe findings are possibly consistent with an acute aortic dissection.  A CT angiogram must be performed urgently, while oxygen, analgesia and blood pressure control are instituted.  A betablocker, if not contraindicated is a good first choice.\n\nIn this case the CTA demonstrated an extensive aortic dissection.\n\nComment : the other findings of acute aortic dissection include:\n\nwidened superior mediastinum\nblurring of the aortic knuckle\nobliteration of the aorto-pulmonary windom\nrightward deviation of the trachea and/or nasogastric tube\ndownward deviation of the right main bronchus\nright pleural capping / pleural effusion\na double wall of the aortic knuckle", "cat": "ECG"}, {"q": "You are asked to check the CXR position of a portacath inserted this morning by a fellow intensivist.  She says everything went smoothly.\n\nComment on the following CXR\n\nMedia\n1", "a": "The portacath is inserted in the left subclavian vein, and the end appears to sit at the junction of the brachiocephalic vein and the superior vena cava.\n\nThere is subcutaneous air noted in the neck and the left axilla, and on careful inspection there is a small pneumothorax on the left, most notable at the lung base.  The cardiac border also appears unusually sharp, consistent with a pneumothorax.\n\nComment : pneumothoraces are not uncommon complications of central venous access, particularly when the subclavian vein is used.  They may be clinically silent (as in this case) and may not be heralded by aspiration of air during insertion.  An xray is always required.", "cat": "X-Ray"}, {"q": "A 3-yr old boy presents to ED with difficulty swallowing. Please comment on the following X-ray\n\nMedia\n1 2", "a": "A metal coin is identified in the proximal oesophagus. There is no other foreign body seen.\nCardiomediastinal contour is normal, the lungs and pleural spaces are clear.", "cat": "X-Ray"}, {"q": "A 19 year old diabetic female presented in DKA.  She was treated with fluids, electrolyte replacement and insulin, and was monitored with a right radial arterial line and a femoral central line. \n\nOn day 3 she complains of shortness of breath and is found to have saturations of 91% on 4L of oxygen.\n\nThe following CXR is obtained.  What are the results?\n\nMedia\n1", "a": "The heart is not enlarged. The left lateral costophrenic angle is blunted suggesting a small amount of pleural fluid. The left lower lobe pulmonary arteries are very poorly seen, which in the context may represent a pulmonary embolus. There appears to be reduced flow to the right lower lobe pulmonary vessels medially also.\n\nA CTPA in this patient demonstrated bilateral lower lobe pulmonary emboli", "cat": "Clinical"}, {"q": "Describe the findings present on this X-ray taken for breathlessness the day after a procedure\nWhat is the likely aetiology?\n\n \n\nMedia\n1", "a": "1. Right sided pneumothorax up to 4.7 cm in depth at the apex. A mild to moderate degree of atelectasis of the right lung is seen. The left lung and pleural space remain clear. Single chamber pacemaker noted and mitral valve replacement evident.\n\n2. If pacemaker insertion was recent procedure pneumothorax may be secondary to this.", "cat": "X-Ray"}, {"q": "Describe the abnormalities present on this X-ray taken in a 70 yr old woman with recent breathlessness and weight loss.\n\nMedia\n1", "a": "Examination shows abnormal widening of the mid upper mediastinum, in particular on the right side. The trachea deviates slightly to the left of midline. The right hilar shadow appears somewhat prominent, and elevated. There is increased radiodensity in  the medial aspect of the right lung apex which may represent consolidative change. The rest of the lungs are clear. No large effusion is identified.", "cat": "X-Ray"}, {"q": "A 39 year old male is found with an altered conscious state and unable to move after being thrown from a quad-bike.\n\nMedia\n1", "a": "The xray is a supine AP film of the chest.  The patient is on a spine board, has a nipple ring and has ECG dots in place.  There are multiple rib fractures on the left (1, 4, 5) and the right (1, 4, 6).  There is increased opacity on the left suggesting pulmonary contusion +/- haemothorax.  The mediastinum is widened.\n\nThe morphology of the T5 vertebral body is significantly disrupted.  The interspinous line is deviated to the right.  These findings suggest significant spinal column injury.", "cat": "ECG"}, {"q": "A 69 year old female is in intensive care following repair of a perforated malignancy of her caecum.  She describes shortness of breath on day 2 post op, and she has increasing oxygen requirements.\n\nDescribe the features of her chest xray.\n\nMedia\n1", "a": "The xray is poorly inspired and is performed supine.\n\nThere is a right internal jugular central line in situ.\n\nHazy homogenous opacity overlies both lung fields, with obliteration of the diaphragmatic silhoutte.  This represents a combination of moderate sized pleural effusions and bibasal collapse.  The cardiac diameter looks enlarged but this may be due to projection and underinspiration.\n\nThe appearance of this xray is common in sick ICU patients.  Pleural effusions may occur due to hypoproteinaemia, leaky capillaries and poor cardiac performance.  Basal atelectasis is common due to lack of movement, poor inspiration due to pain and other insults, and because of diaphragmatic splinting due to abdominal pathology.", "cat": "X-Ray"}, {"q": "A 22 year old female has an out of hospital arrest due to profound sepsis.  After extensive and prolonged cardiopulmonary resuscitation, she regains a spontaneous cardiac output.  She is on very high doses of inotropic agents and is on a FiO2 of 1.0.\n\nThe following CXR is taken.  Describe the findings.\n\nMedia\n1", "a": "There is marked opacity of both lungs.  The costophrenic angles are clear, which excludes pleural effusions as a cause of this picture.  Given the clinical history, severe alveolar oedema is the cause (in this case, Acute Respiratory Distress Syndrome or ARDS).\n\nThe patient is intubated, has a nasogastric tube and has ECG leads on.  The tip of a misplaced Intra-aortic Balloon Pump (IABP) can be seen in the right atrium.", "cat": "ABG"}, {"q": "Describe the presence and progression of abnormalities in the following 2 X-rays taken 5 days apart\n\nMedia\n1 2", "a": "The first X-ray shows extensive consolidation throughout the left lung and at the right base. The right mid and upper zone are spared. No pleural fluid is demonstrated. Paucity of lung markings in the upper zones suggest underlying emphysema. There is no ETT present\n\nThe second X-ray shows a moderate sized left pneumothorax , with lung edge separation measuring 3.5 cm in the upper zone. The pneumothorax is associated with partial atelectasis of the left lung, associated with increased radio density. No significant midline shift is identified. Two intercostal chest drains can be seen in the left chest, both terminating in the left apical region. Presence of a left internal jugular central line, with its tip in the SVC. For the right lung, there is a patch of ill-defined alveolar shadowing detected in the right lower zone. An ETT (tracheostomy) is present.\n\nThe progression is consistent with partial resolution of severe pneumonia with underlying bullous emphysema, complicated by left-sided pneumothorax in the setting of ventilatory support. The lung remains uninflated despite the presence of 2 ICC's, suggesting inadeqaute drainage system or the presence of a bronchopleural fistula", "cat": "X-Ray"}, {"q": "A 32 year old female presented after a motor vehicle accident.  She was the driver and was T-boned at 100kph by another car.  She is complaining of respiratory distress and upper abdominal pain.\n\nThe following CXR is taken in the resuscitation bay.  Describe the findings\n\nMedia\n1", "a": "There is marked hyperdensity of the right hemithorax with shift of the mediastinum to the left.  This is largely due to a haemothorax.  There is suggestion of a mass in the lower right hemithorax as well - this is likely to be the liver, due to a ruptured hemidiaphragm, or a phrenic nerve palsy.  Ultrasound or CT scanning will provide more information.\n\nIn this case, CT confirmed a ruptured hemidiaphragm with hepatic hernation.", "cat": "ABG"}, {"q": "A 40 year old female motor-cyclist is involved in a high speed accident. She is unconscious at the scene and is intubated by paramedics, and brought to ED. In ED she is hypoxic and hypotensive.\n \nA chest xray is taken as part of her initial assessment. Describe the findings.\nMedia\n1", "a": "The CXR is a supine film. An endotracheal tube is present and the tip is located in the right main bronchus. There is some shift to the left and loss of airspace on the left, suggesting partial collapse of the left lung. An occult right pneumothorax as a cause of the shift cannot be excluded. Generalised haze of the left lung may represent haemothorax. There is a fracture of the right 3rd rib laterally, and a displaced fracture of the right clavicle.", "cat": "X-Ray"}, {"q": "A 65 year old female presents to emergency after falling at home.  She is very light headed and tachycardic. \n\nA chest xray is performed.  Describe the findings\n\nMedia\n1", "a": "There is total opacification of the left hemithorax, with shift of the mediastinum to the right and widening of the right rib spaces.  This, in keeping with the clinical history suggests a massive haemothorax.\n\nNotably, the patient has had cardiac surgery (sternotomy wires are present).  This raises the question of medications, as the patient may be on aspirin / clopidogrel for coronary artery disease, or warfarin for valvular disease.  Either may have contributed to the massive haemothorax.", "cat": "X-Ray"}, {"q": "A 72 year old man returns to ICU from cardiothoracic surgery.  He is hypotensive and is requiring increasing doses of inotropes.  A routine post operative chest xray is taken.\n\nWhat does it show?\n\nMedia\n1", "a": "The xray demonstrates a right sided pneumothorax.  It is difficult to see a lung edge, but there is evidence it is there - the Deep Sulcus Sign.  The right costophrenic angle seems to extend downwards for ever, and the liver outline is clearer that would normally be expected.\n\nThe deep sulcus sign is sometimes the only sign of a pneumothorax on a supine chest xray.", "cat": "X-Ray"}, {"q": "A 72 year old man is admitted post operatively to ICU following a laparotomy for necrotic small bowel.  He has a history of smoking related lung disease, and on admission is saturating in the low 90's despite 60% oxygen.\n\nThe following xray is taken.  What does it show?  What is the likely cause?\n\nMedia\n1", "a": "There is a right sided pneumothorax of considerable size.  The patient is intubated.  The lungs show evidence of chronic obstructive airways disease.\n\nA right sided subclavian vein central venous line is in situ.  These lines are commonly associated with inadvertent pneumothorax.", "cat": "X-Ray"}, {"q": "A 70 year old man has had a pneumothorax secondary to a central line.  He has chronic obstructive airways disease and is oxygenating poorly.  Despite insertion of a right intercostal tube, and an initial gush of air, he remains hypoxic.  A chest xray is taken to confirm the position of the ICC.\n\nReport the findings of the xray.\n\nMedia\n1", "a": "The ICC appears appropriately placed.  Although we can't see the bases of the lungs, the right lung appears to have inflated, although it appears a small residual pneumothorax exists.  There is a right subclavian CVC in situ, which is probably the cause of the initial pneumothorax.\n\nThere is a large left sided pneumothorax with shift of the mediastinum to the right, consistent with tension.\n\nThe patient needs to have a second ICC inserted", "cat": "X-Ray"}, {"q": "A 42 year old woman is admitted to ED with acute asthma.  The following xray is taken.  What previous procedure has been performed?\n\nMedia\n1 2", "a": "This is a clamshell closure of an ostium secundumatrial septal defect.  The device is inserted percutaneously via a catheter which passes the device across the defect from the right atrium.", "cat": "ECG"}, {"q": "A 13 month old girl presents to ED with severe shortness of breath and wheeze.  She is saturating at 89% on room air, and has a respiratory rate of 40.\n\nThe following CXR is taken.  What does it show?  What is the likely diagnosis?\n\nMedia\n1", "a": "There is soft tissue density opacity in the right upper zone suggestive of a partial collapse/consolidation in the upper lobe. Mild haziness also noted in the rest of the lung fields with peribronchial thickening.  The cardiac size is normal.\n\nThis film is consistent with the diagnosis of acute bronchiolitis.", "cat": "X-Ray"}, {"q": "A 25 year old man is recovering post tibial nail insertion following a football injury.  36 hours post insertion, he becomes distressed, confused or hypoxic.  The following xray is taken.\n\nWhat does it show?\n\nMedia\n1", "a": "There is a bilateral patchy ground glass infiltrate.  The mediastinum appears normal, there is no pneumothorax and the ribs are intact.\n\nThe xray is consistent with acute fat embolism syndrome.", "cat": "X-Ray"}, {"q": "A 35 year old man is intubated and ventilated in ICU 4 hours following an acute Subarachnoid Haemorrhage.  He is hypoxic and has pink frothy sputum.  The following xray is taken.\n\nWhat are the results?  What management is required?\n\nMedia\n1", "a": "The xray shows acute pulmonary oedema related to his subarachnoid haemorrhage.  This is referred to as neurogenic pulmonary oedema.\n\nAlternate diagnoses may include aspiration.\n\nComment : The pathophysiology behind acute neurogenic pulmonary oedema is not well understood.  Animal studies have suggested that raised intracranial pressure may lead to grossly increased systemic and pulmonary arterial pressures, with consequent pulmonary oedema.  Blunting these responses in animal models appears to prevent pulmonary oedema.  Increased capillary leak may also contribute, but the mechanism behind this is controversial.\n\nManagement is essentially that of controlling underlying conditions and supportive care.  Neurogenic pulmonary oedema usually resolves over 72 hours.\n\nThere is insufficient data in humans to support any pharmacological management.  Cautious control of blood pressure may be reasonable, though compromising cerebral perfusion pressure must be avoided.", "cat": "X-Ray"}, {"q": "A 23 year old female is brought to ED following a motor vehicle accident.  She is hypoxic, hypotensive and unconscious, and requires immediate intubation.\n\nA CXR is obtained.  Describe the results.\n\nMedia\n1", "a": "This is a supine, AP film.  The patient is intubated\n\nSurgical emphysema is noted in the right chest wall and in the region of the neck. This indicates there is almost certainly a pneumothorax on the right.  Ill defined opacity is noted in the right mid zone, and there is probably a pleural line laterally consistent with contusion and haemothorax.\n\nThere is a fracture noted through the posterior aspects of the 2nd and 3rd ribs on the left side.  Ill defined opacity is also noted in the left upper zone suggesting possible contusion.\n\nThere is a lucency noted adjacent to the cardiac border suggesting a pneumomediastinum.", "cat": "X-Ray"}, {"q": "A 26 year old female is brought to ED after falling 10 meters from a balcony, landing on her back.  Her initial CXR is shown.\n\nDescribe the results\n\nMedia\n1", "a": "There is a vertical fracture through the mid shaft of the right clavicle with distraction. There is an undisplaced fracture involving the body of the left scapula. There is a displaced fracture through the posterior aspect of the right second rib and possibly the third rib.\n\nThere is veiling of both hemithoraces suggesting that there may be pleural effusions, probably blood. The lungs appear normally aerated.\n\nThe superior mediastinum is widened. The heart size is normal.", "cat": "X-Ray"}, {"q": "Name the device in the left lung.\n\nList 3 complications of its use\n\nMedia\n1", "a": "This is a nasogastric tube which has been misplaced in the left main bronchus.\n\n \n\nComplications of nasogastric tubes include:\n\nmisplacement\nbleeding\nincreased risk of ventilator associated pneumonia\nperforation\nnasal septal / alae necrosis\ndiscomfort\n\nThis xray highlights the need to confirm placement with a chest xray.", "cat": "X-Ray"}, {"q": "What is the device seen in the mediastinum on this CXR?\n\nWhat complication has occured and how can it be prevented?\n\nMedia\n1", "a": "The device is a central venous catheter inserted via the left subclavian route.  The patient is also intubated and has cardiac monitoring present.\n\nThe guidewire from the CVC has inadvertently been advanced into the patient and lost.  The tip now appears in an abdominal vein, possibly the splenic.  \n\nThis complication can be prevented by careful control of the guidewire, ensuring it is always visible and able to be held.  It should be fed back into the catheter until the end can be secured before advancing the CVC into the patient.", "cat": "Biochemistry"}, {"q": "A 48 year old man presents with 3 days of fever and cough.  In emergency he is grossly hypoxic and distressed on 15L O2 via non-rebreather mask, and he requires intubation.\n\n \n\nThe following xray is taken.  Outline the results.\n\nMedia\n1", "a": "There is diffuse interstitial and alveolar opacity noted in both lung fields. Cardiac size appears slightly enlarged, but is likely due to the AP projection. No pleural effusion visualised. Features are consistent with that of ARDS.\n\n \n\nThe causes of this picture are multiple and include respiratory (aspiration, drowning, toxic inhalations) or non-respiratory (pancreatitis, severe burns, massive blood transfusion).\n\n \n\nIn this case, the causes is variant H1N1 influenza 2009 (Swine Flu)", "cat": "X-Ray"}, {"q": "A 12 month old girl is hospitalised with severe bronchiolitis.  A nasopharyngeal aspirate is taken which is positive for RSV antigen.  She is commenced on bubble nasal CPAP and a nasogastric tube is inserted.  An xray is taken to confirm the diagnosis.  What does it show?\n\nMedia\n1", "a": "The NG tube is seen coiled up within the stomach.\n\nThere is mild haziness noted in both the lung fields particularly the inner two thirds. This is consistent with viral pneumonia.\n\nA sharp triangular opacity is noted in the left retrocardiac region and represents a lower lobe collapse. Cardiac size is within normal limits.\n\nComment : this is a classic left lower lobe collapse.  Bronchiolitis results in sputum plugging of proximal and distal airways.  This can result in a heterogenous picture of hyperinflation (from bronchial obstruction with ball-valve type mechanism) and collapse (as in this case).", "cat": "X-Ray"}, {"q": "A 65 year old male presented to emergency with chest pain for 24 hours, a blood pressure of 70mmHg systolic and was peripherally shut down.  An erect AP CXR was taken and is shown below.\n\nDescribe the findings\n\nMedia\n1", "a": "The heart is enlarged consistent with dilated cardiomyopathy. Upper lobe veins are distended and there is an interstitial pattern at both bases with some Kerley B-lines on the right side suggesting the presence of heart failure.\n \nComment : Signs of cardiac failure on a CXR include:\nUpper lobe diversion - compare lower and upper zone blood vessels an equal distance from the hilum.  It is probably related to lower zone pulmonary arteriolar hypoxic vasoconstriction.  Note that upper lobe diversion can only be diagnosed in an ERECT patient.\nCardiomegaly - this is often difficult, particularly in acute patients in whom an erect PA film cannot be taken.  In an PA erect film, cardiomegaly is present if the maximum horizontal diameter of the heart is greater than half the greatest thoracic horizontal diameter.  Also note it may not be present in acute causes of cardiac failure\nKerley's B lines - these lines are due to oedema in the septae dividing the smaller lobules.  They are described as short (1cm) horizontal and non-branching lines which reach the pleura, and are found at the peripheries of the lung bases. \nPeribronchial cuffing - as venous pressure increases, oedema surrounds the small bronchi, giving a cuffed appearance to those seen head on\nAlveolar oedema - at its most fulminant, cardiogenic oedema can result in a confluent alveolar shaddowing, most typically around the hila (giving the characteristic \"bat's wing\" appearance).  Oedema also makes the margins of the hilar vessels blurry.  This is usually, but not always, symmetrical.\nPleural effusions\n\nKerley also defined Kerley A lines (diagonal lines from periphery", "cat": "X-Ray"}, {"q": "A 41 year old man presents to emergency following a motor vehicle accident.  He initially complains of chest pain and has a closed head injury and a fractured tibia/fibula.  Multiple skin contusions are noted over his torso.\n\nThe following CXR is taken.  What does it show?  What would you do about it?\n\nMedia\n1", "a": "There is evidence of a small pneumomediastinum, which is seen as a sharp demarcation of the decending thoracic aorta.  A very subtle pneumopericardium is evident adjacent to the lingula.  A pneumothorax is not apparent, but as the lung apices are not visible it is not possible to rule it out.\n\nAn ET tube and central line are present and the positions appear satisfactory.\n\nThe potential causes include :\n\noccult pneumothorax\noesophageal damage\nairway injury\n\nInvestigation would initially include a CT scan - where possible oral contrast should be given to demonstrate a perforation of the oesophagus, though this is impossible in intubated patients.  Panendoscopy may be considered to exclude an injury, though there is potential for making the injury worse, and the likelihood of injury should be considered.  MRI may also be of value.\n\n \n\nComment : Pneumomediastinum can be seen in a minority of major traumas.  Other signs can include:\n\nassociated pneumothorax\nstreaky lucencies running inferoposteriorly into the neck\ncontinuous diaphragm sign (the diaphragm appears to run from one side of the chest to the other uninterupted)\n\nOesophageal injuries are relatively rare in blunt trauma and are usually associated with adjacent vertebral fractures.  There is also often fluid associated in the mediastinum on CT, the absence of which makes the diagnosis unlikely.", "cat": "X-Ray"}, {"q": "A 19 year old male presents to emergency with severe respiratory distress and non-productive cough.  He has been unwell for 3 days with fevers and chills.\n\nDescribe the features of the xray\n\nMedia\n1", "a": "There is ill defined nodularity noted in both the lung fields. Central lucencies are noted in some of these nodules suggesting that these are small bronchi with thickened walls seen end on (peribronchial thickening).  There is no focal mass lesion/patch of consolidation visualised. The cardiac size is normal and no pleural effusion is visualised.\n\n \n\nOf note, there is an azygous fissue seen in the right upper zone.  This is of no significance.\n\n \n\nComment : Peribronchial thickening can be seen in many conditions including asthma and viral pneumonitis.  In this case, the cause was a novel strain of Inflenza A H1N1 (so called Swine Flu).\n\n \n\nThe azygous fissure is a developmental variant that is seen in around 1% of the population. It develops when the apical bronchus develops superomedial to the arch of the azygous vein instead of laterally to it.  The vein subsequently lies at the bottom of a fissure of variable depth within the lung tissue of the upper zone.  It is often comma or tear shaped.", "cat": "X-Ray"}, {"q": "A 56 year old woman requires implantation of a tunnelled vascath for intermittant dialysis.  The following xray is taken at the conclusion of the procedure.  Comment on the xray\n\n \n\nMedia\n1", "a": "There is an anterior pneumothorax present on the left side.  The line is well positioned.\n\n \n\nComment : It may be very difficult to see a pneumothorax in a supine patient on a standard xray.  The features that suggest its presence include a sharp margin to the diaphragm, heart, liver or spleen, a \"deep sulcus sign\" where the costophrenic angle appears to continue well below the normal position, and the appearance of air overlying the liver or stomach.\n\n \n\nIn this case, an erect xray confirmed the presence of the pneumothorax.", "cat": "X-Ray"}, {"q": "A 2 year old boy has been in hospital with asthma for 7 days.  Despite maximal therapy he is having intermittant exacerbations which have required ICU management.  He has intermittant partial resolution of his symptoms allowing discharge to the ward.  He deteriorates once more and requires intubation.  The following chest xray is obtained following intubation.\n\nDescribe the features.  Suggest a cause.\n\nMedia\n1", "a": "There appears to be a slight increase in lucency in the right hemithorax compared to the left. Additionally, there appears to be some shift in the mediastinum to the left.  A subtle increase in density is noted in the right upper zone ? partial atelectasis.\n\nCardiac size appears normal. No pleural effusions visualised. An ET tube and NG tube are noted in situ.\n\nThe radiographic and clinical features may be explained by an inhaled foreign body.  This can result in a ball-valve mechanism which results in air trapping and hyperinflation of one lung.  A tension-like situation may arise.  Inspisated sputum plugs due to asthma may also cause this.\n\nAlternatively, focal collapse due to sputum plugging in the left lung may give this appearance.", "cat": "X-Ray"}, {"q": "A 29 year old man is in ICU ventilated with severe sepsis due to lower leg necrotising fasciitis.  On day 4 of ventilation the following CXR is recorded.  Describe the findings.\n\nMedia\n1", "a": "Extensive opacity is seen bilaterally in both the lungs which suggests extensive consolidation. This can be due to infection or ARDS. There is blunting of the right CP angle with opacity along the right inner chest wall suggesting right pleural effusion. Left CP angle is not seen on this film, however there is no opacity along the left inner chest wall. An endotracheal tube and right internal jugular central line are in situ.\n\n \n\nComment : Pleural effusions are sometimes difficult to detect in supine patient.  A vague veiling of one lungfield may represent fluid lying posteriorly.  In this case, sufficient fluid is present to creep up the lateral chest wall and is seen \"end on\".  Loculated effusions can also be present and may be difficult to detect.", "cat": "X-Ray"}, {"q": "A 28 year old male is involved in a major motor vehicle trauma.  His GCS is 6 on arrival and will require prompt intubation\n\nHe has sats of 92% on 15L prior to intubation, with HR 110 and BP 105/80.  Air entry is difficult to hear either side due to widespread airway noise and gurgling respirations.\n\nThe following CXR is taken prior to intubation.  Describe the findings.  Do you want to do anything prior to intubation?\n\nMedia\n1", "a": "Note that this is a supine xray.\n\nThere is extensive air space opacity throughout both lungs with relative sparing at the left base. In the setting of trauma this could represent pulmonary contusion, aspiration or fat embolism -  no rib fractures are visible.\n\nThere are also bilateral anterior pneumothoraces present – these can be seen due to the clear outline of the decending aorta and pericardial sac anteriorly, and the “deep sulcus sign” on both sides.  There is some suggestion of mediastinal air also.  The cardiomediastinal outline is normal. There is an oval air containing lesion in the right upper zone, the significance of which is unclear. \n\nThe pneumothoraces should be drained prior to intubation if time allows as there is the potential for tensioning and sudden deterioration, including arrest.\n\nComment : the difficulty of detecting anterior lying pneumothoraces in supine critically ill patients is again noted.", "cat": "X-Ray"}, {"q": "A 50 year old man is recovering in ICU after being mauled by a bull.  He has bilateral intercostal drains placed.  His xray the following morning is presented here.  Describe the findings\n\nMedia\n1", "a": "The major finding is a residual left sided pneumothorax.  This is difficult to see because of penetration, the overlying emphysema, the position of the patient etc.  However, there is a faint lung edge seen near the left hilum, and the cardiac border is clearly demarcated.  There is also hyperlucency of the left lungfield.  Considerable subcutaneous emphysema is present on the left.  Evidence of bilateral pulmonary contusions is present.  There are multiple upper rib fractures on the left, and on the right the 7th rib is fractured posteriorly.\n\n \n\nComment : it is important to carefully examine the xray for signs of pneumothorax which can be difficult to detect in critically ill patients.  Additionally, it is essential that you ensure that you get the response to a therapy that you expected.  In this case, the presence of an ICC had not resolved the problem.", "cat": "X-Ray"}, {"q": "A 70 year old woman presents to emergency with shortness of breath and is very distressed.  This is her first presentation with dyspnoea.  She is a reformed smoker with a 20 pack year history.\n\nHer CXR is taken and displayed below.  What are the salient features?\n\nMedia\n1", "a": "FINDINGS:\n\nIll defined interstitial markings are present in both lung fields, more in the mid and lower zones consistent with interstitial oedema.\n\n \n\nThe cardiac size appears normal and no pleural effusions visualised. \n\nThe patient has a nebuliser running\n\nComment : The cardiac shaddow may not be enlarged in cardiac pulmonary oedema.  Cardiac oedema results from acute pulmonary venous hypertension, which may be due to ischaemia, chronic ischaemic cardiac disease, chronic hypertension, valvular disorders and other pathology.", "cat": "X-Ray"}, {"q": "A 44 year old man presents with shortness of breath.\n\n \n\nA PA chest xray is taken.  Describe the findings\n\nMedia\n1", "a": "The heart shaddow of this xray is slightly enlargened for an erect PA film, suggesting cardiomegaly.  There is an increase in the prominence of the vasculature, particularly in the upper zones, and possibly a small right pleural effusion.  The lung fields look clear.  Taken together, these findings suggest early cardiac failure with chronic cardiac disease.\n\n \n\nThere are sternal wires present, and there are two artifical heart valves present.  These are most likely the Mitral and Aortic valves.  ECG leads are also present.\n\nCauses of multiple valve disease include rheumatic fever (the cause in this case), endocarditis and congenital heart disease.", "cat": "ECG"}, {"q": "A 70 year old woman with a past history of chronic obstructive airways disease presents with chest pain following a coughing fit.  She is distressed and short of breath requiring HDU admission. \n\nA CXR is obtained.\n\nWhat does it show?\n\nMedia\n1 2", "a": "There is evidence of a pneumomediastinum / pneumopericardium.  Streaks of air are seen extending into the superior mediastinum / neck and represent surgical emphysema.  This is most likely due to a ruptured peripheral bulla.  Alternative causes of pneumomediastinum include ruptured oesophagus or upper airways and extension of pneumothorax, or a pneumoperitoneum (eg laparoscopy)\n\n \n\nComment : surgical emphysema is often felt above the clavicles when due to pneumomediastinum.", "cat": "X-Ray"}, {"q": "A 23 year old male presents to ED with an asthma attack.  During a coughing bout he develops acute central chest pain.\n\nA CXR is taken to investigate the problem.  Describe the findings\n\nMedia\n1 2", "a": "The lung fields are clear. The cardiac size is normal. No pleural effusion is visible and there is no evidence of hyperinflation or aspiration.\n\nA thin white linear opacity is seen on either side of the mediastinum consistent with a pneumomediastinum. A few streaky lucencies are noted in the superior mediastinum and neck consistent with surgical emphysema.\n \nComment : The causes of a pneumomediastinum could include Mallory Weiss tear, Boerhaaves Syndrome or a ruptured bullus, the latter in this case being most likely.", "cat": "X-Ray"}, {"q": "A 55 year old man is transferred from ED after being intubated for a respiratory infection.  He has a background history of moderate-severe chronic obstructive airways disease.\n\nHe is desaturating to 80% on arrival in ICU and the following xray is obtained.\n\nWhat does it show?  How will you manage him?\n\nMedia\n1 2 3", "a": "The xray shows the classic appearance of right lower lobe collapse.  The features of collapse are loss of airspace and shift of adjacent structures, a homogeneous density in a typical pattern for the lobe involved, and obscuration of adjacent structures.\n\nIn this case, there is loss of airspace on the right with shift of the mediastinum to the right.  The diaphragm is no longer visible, and no air bronchograms can be seen.  The collapsed right lower lobe sits flattened against the diaphragm.\n\nThere is also an area of atelectasis on the left.\n\nThe most likely cause is a sputum plug but other causes such as tumour should be excluded.  Suctioning of the airway, including via bronchoscopy, chest physiotherapy and higher PEEP levels will assist in recruitment of this lung region.  Of course, maintaining high FiO2 in the short term is warranted to maintain normal saturations.", "cat": "ABG"}, {"q": "A 67 year old man is transferred to your unit with a severe exacerbation of his chronic obstructive airways disease.  He is on 75% oxygen, maintaining saturations of 92%.  The following xray is obtained.\n\nWhat does it show?\n\nMedia\n1 2 3", "a": "There is severe bullous lung disease at the apices.  These look like pneumothoraces, as there is loss of tissue density there, but fine septal lines can be seen running across them.  It can be very difficult to exclude a pneumothorax under these circumstances and a CT may be necessary.\n\nIn this case, CT confirmed severe bullous lung disease.\n\nComment : the most common cause of bullous emphysema is smoking.  This classically affects the apices of the lung much more than the bases.   The associated hyperinflation can compress the lower zones, giving them a streaky infiltrate appearance, as seen in this example.\n\nCertain conditions can give a different distribution - for example, alpha-1-antitrypsin deficiency primarily affects the bases of the lungs more than the apices.", "cat": "X-Ray"}, {"q": "A 76 year old woman presents to emergency with progressive respiratory distress.  A chest xray has been taken after a procedure.\n\nWhat does the xray show?\n\nWhat procedure has been performed?\n\nList 3 potential causes\n\nMedia\n1", "a": "The xray is an erect chest film taken in the AP orientation.  She is clearly unwell, with ECG monitoring, oxygen tubing and a right subclavian CVC in place.  There is an homogenous opacity in the lower zone of her left hemithorax, with loss of the diaphragmatic and left heart borders.  The opacity seems to creep up the lateral chest wall (a meniscus sign).  There is no shift in the mediastinum.  These features are consistent with a large left pleural effusion.\n\nA radio-opaque catheter appears to sit within the pleural space of the left chest - this is a pigtail drain.\n\nThere are multiple causes of pleural effusion.  They are loosely categorised as exudative and transudative effusions.  Exudative infusions are usually related to pathology of the lung (infection, pulmonary embolus, cancer) while transudates are mostly due to more global problems (cardiac failure, sepsis, fluid overload).", "cat": "ECG"}, {"q": "A 56 year old male is in intensive care following an oesophagectomy.  He is haemodynamically unstable requiring inotropic and vasopressor support.  The following image is taken.\n\nDescribe the findings\n\nMedia\n1", "a": "This is a contrast oesophagram in an intubated patient.\n\nThe study demonstrates a massive leak of contrast into the chest at the lower end of the oesophagus.\n\nOf note, there is a right sided pneumothorax despite the presence of an intercostal catheter.  Additionally, the endotracheal tube tip is situated in the right main bronchus.  It is difficult to tell from this image, but the ETT is a double lumen tube and is correctly sited.", "cat": "X-Ray"}, {"q": "A 72 year old man presents to ED in respiratory arrest requiring immediate intubation.  He has very high inflation pressures and appears to be gas trapping.  Despite appopriate ventilation measures he becomes haemodynamically unstable.\n\nA chest xray is taken immediately following insertion of a central venous line.  Describe the findings\n\nMedia\n1 2 3", "a": "The patient is intubated with a right internal jugular central venous line.\n\nThe lungs are hyperinflated with some flattening of the diaphragms bilaterally.  Areas of lucency are noted at both apices consistent with marked bullous lung disease.  Overdistension of these areas is causing compression of the more normal lung inferiorly, giving the false impression of an infiltrate.  This is a common finding in smoking-related emphysema.\n\n \n\nComment : it can be very difficult to differentiate bullae from a pneumothorax.  Clues to the diagnosis include a concave lung edge compared with a convex edge of a pneumothorax, and the appearance of fine septal lines traversing the lucency.  The CT images of the same patient demonstrate the pathology clearly.", "cat": "X-Ray"}, {"q": "A 60 year old man is ventilated in Intensive Care following a seizure.  In the emergency department his saturations fall and he requires 60% oxygen to raise them above 90%.  The following CXR is obtained.\n\n \n\nDescribe the results\n\nWhat would you do to correct the problem?\n\nMedia\n1 2 3", "a": "This is an erect AP film of the chest.  It shows the endotracheal tube and nasogastric tubes in good position.  The cardiac silouhette is normal for this projection.  There is some plate like atelectasis in the left lower zone.  The most striking abnormality is the complete collapse of the right lower lobe.\n\n \n\nThe patient needs suctioning, possibly with a bronchoscope, ongoing physio and pulmonary nursing care and possibly increased PEEP to assist recruitment of the collapsed section of lung.\n\n \n\nComment : This is a classic picture of right lower lobe collapse.  The right heart border is still visible, but there is the diaphragm border is obscured.  There is significant airspace volume loss on the right side, with movement of the mediastinal structures to the right.  These improve when the obstruction is removed with bronchoscopy.", "cat": "Biochemistry"}, {"q": "A 9 year old boy with cerebral palsy is admitted to the ICU with respiratory failure.  He fails a trial of non-invasive ventilation and requires intubation.  The following xray is recorded immediately after.\n\nDescribe the results\n\nMedia\n1", "a": "There are extensive bilateral pulmonary infiltrates, particularly dense on the left.  There is a portacath in place in the right internal jugular vein, and the port appears to have been accessed.  Unfortunately the endotracheal tube is located in the right main bronchus.", "cat": "X-Ray"}, {"q": "New Search Previous\n86. \t\n\nA 7 year old girl is admitted to ICU with respiratory failure.  She has a congenital disorder resulting in marked muscle weakness, and has swallow and articulation problems.\n\nA chest xray is taken.  What does it show?\n\nMedia\n1\nNew Search View Answer Previous", "a": "The major abnormality is a triangular shaped opacity behind the heart, obscuring the medial half of a diaphragm.  This is associated with volume loss on the left side.  This is consistent with left lower lobe collapse.", "cat": "X-Ray"}, {"q": "QL6):  What does this radiograph show?", "a": "QL6):  Answer:  Inferior Vena Cava (IVC) Filter\n\nAn IVC filter is often considered in patients who have developed an acute pulmonary embolus and who are at risk of further embolic events from the lower limbs and pelvis (e.g. from deep vein thrombosis) and/or are unable to be fully anti-coagulated due to a co-existent pathology (intracranial bleed).  They can be kept insitu for about 3 months before removal is required.", "cat": "ABG"}, {"q": "QL29):  Describe the issue on this chest X-ray? \n\nHow would you manage this problem?", "a": "QL29):  Answer: \n\nKnotted pulmonary artery catheter (PAC)\n\nManagement:\n\nPrevention: firstly when inserting a PA catheter if a change in waveform does not occur at 10cm intervals after the RA has been entered, then caution is advised in continuing to advance the catheter blindly.  Consider using ultrasound or fluoroscopy to guide insertion if available.\n\nInterventional radiological techniques are often the first choice for removal of knotted catheters.  Surgical open extraction is reserved for difficult cases or where intracardiac fixing of the knot is encountered.", "cat": "X-Ray"}, {"q": "QL56):  A 64 year woman presented with low conscious level following an acute subarachnoid haemorrhage.  An urgent angiogram was undertaken with endovascular cerebral coiling of the responsible cerebral aneurysm. \n\nWhat is the evidence for endovascular cerebral coiling versus surgical clipping?\n\nWhat are the complications of cerebral coiling and SAH?\n\nWhat therapies / interventions are available to prevent some of these complications from occurring?", "a": "QL56):  Answers\n\nThe International Subarachnoid Aneurysm Trial (ISAT) published in 2002, was a randomised prospective study of the outcomes of endovascular and surgical treatment of ruptured cerebral aneurysms in 2143 patients. Patients treated with endovascular coiling had a lower 22.6% lower relative risk of joining a poor outcome group (Rankin Scale Score 3-6) at one year compared to surgical clipping 6.9%.  23.7% were dependent or dead at 1year with endovascular treatment compared to 30.6% allocated to neurosurgical clipping (p=0.0019).  Risk of rebleeding after 1 year was 2 per 1276 patient-years for coiling versus zero per 1081 patient years for clipping.  Risk of rebleeding is low with either therapy, but somewhat more frequent with endovascular coiling.  These results changed significantly the management of SAH in the UK with endovascular coiling being the recommended as the first line intervention.  In the USA and Japan, as a result of the ISAT trial excluding 78% of the participants screened and the concerns over coiling long-term durability, surgical clipping rates are still comparable to coiling.\n\nCombined endovascular and neurosurgical techniques are now being employed with some success. \n\nComplications of cerebral coiling / SAH:\n\nAneurysm rupture /bleeding\n\nWorsening / new ischaemic stroke due to occlusion or sacrifice of cerebral vessels on coiling / Delayed ce", "cat": "CT"}, {"q": "QL60):  This patient was admitted to A&E after a fall down some stairs.  The patient was unconscious on arrival and subsequently intubated and ventilated. \n\nComment on the lateral neck X-ray:", "a": "QL60):  Answer\n\nThe lateral neck x-ray shows fracture-displacement of vertebra at the level C4", "cat": "X-Ray"}, {"q": "QL63):  A 56 year underwent oseophagectomy for oesophageal adenocarcinoma.  3-days post op the patient deteriorated on the high-dependency unit with acute respiratory failure and new atrial fibrillation.  A chest-Xray and barium follow-through was undertaken. \n\nDescribe the findings of the CT chest and Barium follow-through\n\nWhat is your diagnosis?", "a": "QL63):  Answer\n\nCT Chest:  a large right pleural effusion is evident on chest CT.  There is also a small right pneumonthorax apically.\n\nBarium follow-through:  The NG tube is pulled back slightly by the surgeons.  Contrast is then put down the NG to assess the anastomosis.  The barium follow-through shows a contrast leak into the right chest, probably at the level of the anastomosis.\n\nDiagnosis:  Oesophageal anastomotic leak highly probable\n\nManagement:  this is often conservative depending on where the leak is.  Occasionally the patient requires reoperation for washout and anastomotic repair.  Further radiological studies may be required over subsequent days.  The pleural effusion is likely to need a chest drain – placed radiologically or surgically to drain the effusion.", "cat": "ECG"}, {"q": "QL86):  This patient fell off his bike.  He has a swollen left knee.  Comment on this X-ray:", "a": "QL86):  Answer:\n\nThere is a tibial plateau fracture seen on X-ray.  The joint space looks normal with no haemarthrosis.", "cat": "X-Ray"}, {"q": "New Search Previous\n8. \t\n\nQL101):  Comment on this X-ray:\n\nNew Search View Answer Previous", "a": "QL101):  Answer:\n\nRight tibia and fibula midshaft facture is seen", "cat": "X-Ray"}, {"q": "73 year old man with years of intermittent cramping abdominal pains, presents with sudden onset severe lower abdominal pain and fever. \n \nDescribe the findings. \nWhat is the most likely diagnosis?\nMedia\n1", "a": "Riggler’s sign, indicating perforation, probably acute diverticulitis, possibly colonic / rectal tumour.\n \nComment: Free air enables both sides of the thin wall of bowel to be clearly seen, as in this xray. It is often subtle and indicates the presence of free air in the abdomen.", "cat": "X-Ray"}, {"q": "Describe the following X-ray\n\nMedia\n1", "a": "Lateral neck plain film\nAdult\nEnlarged epiglottis - consistent with epiglottitis", "cat": "X-Ray"}, {"q": "A 31 year old male presented to emergency with severe abdominal pain and signs of guarding in his lower abdomen. The following abdominal xray is taken.\n \nWhat are the findings?\nMedia\n1", "a": "Foreign body in rectum. There is no evidence on this film of perforation", "cat": "X-Ray"}, {"q": "A 75 year old woman presents with vomiting and abdominal pain.  The following xray is taken.  Discuss the findings\n\nMedia\n1", "a": "Multiple air fluid levels are noted within the small bowel which are dilated suggesting a small bowel obstruction. The large bowel is not distended.\n\n \n\nSurgical clips are noted in the GB fossa region. No definite radio-opaque calculi visualised.", "cat": "X-Ray"}, {"q": "An 80 year old female presents to ED with abdominal pain.  She is cool peripherally and is tachycardic.\n\nThe following abdominal xray is taken.  What does it show?\n\nMedia\n1", "a": "There is air under the diaphragm and Riggler's sign is present.  These indicate that there has been a perforation of the bowel.  Surgical clips are seen in the right upper quadrant.\n\nRiggler's sign is present when air can be seen on both sides of the bowel wall, as seen in the left upper quadrant of this film.", "cat": "X-Ray"}, {"q": "The following study is performed in a patient following a severe front-on impact motor vehicle accident.\n\n What is the study? What does it demonstrate?\nMedia\n1", "a": "This is an aortic angiogram with run off into the arch and arch vessels. It demonstrates pseudoaneurysm formation of the proximal portions of both the brachiocephalic artery and the left subclavian artery.\n \nComment :\n \nApproximately 30% of patients with aortic injury also have injury to one or more of the arch branch vessels. The incidence of isolated branch vessel injuries is not clear, but appears less common. Multiple vessels are involved in about 10% of cases.\n \nAs in blunt aortic injury, a high index of suspicion is required to diagnose branch vessel injury, as clinical signs are non-specific. Significant injury to the upper chest and neck, including sash-type seatbelt injury should raise clinical suspicion.\n \nCT scanning of the chest and neck is the investigation of choice. Formal arch aortography is invasive and recent results suggest it has a limited role compared with current CT scanning techniques.", "cat": "CT"}, {"q": "A 55 year old male is involved in a motor vehicle accident.  He has multiple long bone fractures and several broken ribs.  He complains of tingling in his legs and midline neck pain.\n\nThe following xray is taken.\n\nWhat is the view?  What does it show?\n\nMedia\n1", "a": "This is a Swimmer's view of the lower cervical spine.  It is used to visualise the lower cervical spine - upper thoracic spine, an area often obscured by the shoulders.\n\nThe xray demonstrates >50% anterior subluxation of C5 on C6, and there is widening of the disk space.  This suggests bilateral facet dislocation. \n\n \n\nComment : Bilateral facet joint dislocation inuries are highly unstable as there is complete loss of supporting ligaments and joint capsules.  It usually results from a flexion injury, and with the disruption / distraction of the posterior ligamentous structures, the facets jump over one another - there may be no fractures of the facets.  The incidence of spinal cord injury is high with this type of injury.", "cat": "X-Ray"}, {"q": "This image is taken from a patient with post operative abdominal sepsis following open cholecystectomy.  What type of examination is it?  What does it show?\n\nMedia\n1", "a": "This is a T-tube cholecystogram.  Contrast is seen running into the biliary tree, uniformly opacifying it, and emptying into the small bowel.  There is no evidence of leak, and there are no filling defects to suggest retained stones.", "cat": "Biochemistry"}, {"q": "New Search Previous\n9. \t\n\nA 87 year old woman is referred to you from ED by the surgical registrar.  They are about to take her to theatre for a small bowel obstruction.  She is dehydrated from third space losses and vomiting, but has been resuscitated in ED.\n\nOn reviewing her, you have a chance to review her xrays.\n\nWhat does it show?\n\nMedia\n1 2 3\nNew Search View Answer Previous", "a": "There is evidence of a small bowel obstruction (there are multiple air fluid levels visible on the erect film, and distention of the small bowel).  However there is also note made of the air in her biliary tree (partially obscured by a gas bubble).  There is no air under the diaphragm and no other sign of perforation on this film.\n\nThe small bowel obstruction is likely due to a large gall stone - a fistula is created between the gallbladder and the bowel, with passage of a stone with impacts distally.  This cannot be seen clearly on the xray. Air fills the biliary tree due to the fistula.\n\nAlternate causes of biliary air include instrumentation and gas-forming infections.  These are usually distinguished clinically.  Air in the portal system may look similar to this pattern and can be due to infection or surgery.", "cat": "X-Ray"}]
