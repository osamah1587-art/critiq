esophagectomy.  He is haemodynamically unstable requiring inotropic and vasopressor support.  The following image is taken.\n\nDescribe the findings", "a": "This is a contrast oesophagram in an intubated patient.\n\nThe study demonstrates a massive leak of contrast into the chest at the lower end of the oesophagus.\n\nOf note, there is a right sided pneumothorax despite the presence of an intercostal catheter.  Additionally, the endotracheal tube tip is situated in the right main bronchus.  It is difficult to tell from this image, but the ETT is a double lumen tube and is correctly sited.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/gastrograffin%20swallow%20cxr.jpg"], "cat": "X-Ray"}, {"q": "A 72 year old man presents to ED in respiratory arrest requiring immediate intubation.  He has very high inflation pressures and appears to be gas trapping.  Despite appopriate ventilation measures he becomes haemodynamically unstable.\n\nA chest xray is taken immediately following insertion of a central venous line.  Describe the findings", "a": "The patient is intubated with a right internal jugular central venous line.\n\nThe lungs are hyperinflated with some flattening of the diaphragms bilaterally.  Areas of lucency are noted at both apices consistent with marked bullous lung disease.  Overdistension of these areas is causing compression of the more normal lung inferiorly, giving the false impression of an infiltrate.  This is a common finding in smoking-related emphysema.\n\n \n\nComment : it can be very difficult to differentiate bullae from a pneumothorax.  Clues to the diagnosis include a concave lung edge compared with a convex edge of a pneumothorax, and the appearance of fine septal lines traversing the lucency.  The CT images of the same patient demonstrate the pathology clearly.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR5.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/cxr%20ct%20answer1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/cxr%20ct%20answer%2021.jpg"], "cat": "X-Ray"}, {"q": "A 65 year old man is admitted to ICU with acute respiratory failure. He is hypoxic and sweaty and is commenced on non-invasive ventilation.\n\nDuring a workup of his condition, the following ultrasound image of his lung is recorded.\n\nWhat does it show?\n\nHow do you interpret the result?", "a": "The image demonstrates a phenomenon known as \"lung rockets\". These lines are also known as 'comet tails', or B lines.\n\nLung rockets are vertical hyperechoic lines (white arrow) that arise from the pleural line (red arrow). They are described as multiple, clearly defined, and spread to the bottom of the screen without fading. The lines also move with the movement of the lung in real time. B lines have been separated by the distance between them - B3 lines are about 3mm apart, while B7 lines are 7mm apart, as in this case.\n\nB7 lines are thought to represent thickening of interlobular septae and is known as 'interstitial syndrome'. When present diffusely over the anterior chest wall, the major causes for this pattern include pulmonary oedema (cardiac and non-cardiac), infection and neoplasia.\n\nB7 lines are probably the ultrasound equivalent of Kerley B lines on a chest xray.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/lung%20rocket.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/lung%20rocket%20answer.JPG"], "cat": "X-Ray"}, {"q": "A 25 year old man is admitted to ICU from ED with an acute deterioration in his level of consciousness.  He has a fever of 38.0, is haemodynamically stable, has no chest or abdominal findings and eye opens to pain.  His pupils are slightly dilated.  He has a history of schizophrenia.\n\nHis electrolytes are normal, as is his liver function.  A CT brain and lumbar puncture are undertaken and are normal.\n\nThe following is found bilaterally on examination.  What potential causes are apparent?", "a": "This is Clonus\n\n \n\nClonus is a repetative series of involunatry reflex muscle contractions and relaxations.  It is related to unregulated stretch reflex activity of the calf muscles.  A few beats of clonus can sometimes be seen in normal patients, but >5 beats is considered abnormal.  It can also be elicited in some other muscle groups such as the quadriceps by jerking the patella inferiorly.\n\n \n\nThe cause of this lack of regulation is usually related to upper motor neurone lesions (stroke, cord injuries etc.  Other causes include encephalopathies such as that due to liver failure.\n\n \n\nBilateral clonus associated with altered conscious state, fever and serotonergic drugs is likely to represent Serotonergic Syndrome.", "imgs": [], "cat": "Biochemistry"}, {"q": "Describe the abnormalities on the following CT", "a": "CT brain, chest, abdomen displayed.\n\nHaemorrhagic supratentorial intra-cerebral lesions with surrounding vasogenic oedema noted. The lesion most likely  represent haemorrhagic metastatic lesion. The largest is in the right frontal lobe \n\nThere is a  right lower lobe pulmonary nodule seen. Multiple low density lesions within the liver are highly suspicious for metastatic lesions.\n \n\nExamination is consistent with metastatic lesions in brain, lung, and liver.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/mel1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mel2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mel3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mel5.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mel4.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/mel6.JPG"], "cat": "Biochemistry"}, {"q": "A 47 year old man is admitted to your ICU with fevers, abdominal pain, and reduced level of consciousness 8 days after autologous bone marrow transplant. His FBC results are Hb 80 g/dl, WCC 0.0, neutrophil 0.0, plateltes 34 (N150-400).\n\n \n\n1. Describe the abnormalities on the following CT?\n\n2. What is the diagnosis?", "a": "1. Extensive mural thickening with submucosal oedema and mural stratification of the large bowel, with pericolic hyperaemia and fat stranding. These changes are also present in the small bowel\n\n \n\n2.  In the context  of neutropaenia,, this is most likely reflective of neutropenic enterocolitis or typhilitis.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/nec2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/nec1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/nec3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/nec4.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/nec5.JPG"], "cat": "Haematology"}, {"q": "A 60 year old man is ventilated in Intensive Care following a seizure.  In the emergency department his saturations fall and he requires 60% oxygen to raise them above 90%.  The following CXR is obtained.\n\n \n\nDescribe the results\n\nWhat would you do to correct the problem?", "a": "This is an erect AP film of the chest.  It shows the endotracheal tube and nasogastric tubes in good position.  The cardiac silouhette is normal for this projection.  There is some plate like atelectasis in the left lower zone.  The most striking abnormality is the complete collapse of the right lower lobe.\n\n \n\nThe patient needs suctioning, possibly with a bronchoscope, ongoing physio and pulmonary nursing care and possibly increased PEEP to assist recruitment of the collapsed section of lung.\n\n \n\nComment : This is a classic picture of right lower lobe collapse.  The right heart border is still visible, but there is the diaphragm border is obscured.  There is significant airspace volume loss on the right side, with movement of the mediastinal structures to the right.  These improve when the obstruction is removed with bronchoscopy.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR6.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CXR%20answer%2011.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CXR%20answer%2021.jpg"], "cat": "Biochemistry"}, {"q": "A 9 year old boy with cerebral palsy is admitted to the ICU with respiratory failure.  He fails a trial of non-invasive ventilation and requires intubation.  The following xray is recorded immediately after.\n\nDescribe the results", "a": "There are extensive bilateral pulmonary infiltrates, particularly dense on the left.  There is a portacath in place in the right internal jugular vein, and the port appears to have been accessed.  Unfortunately the endotracheal tube is located in the right main bronchus.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/blake%203.jpg"], "cat": "X-Ray"}, {"q": "A 30 year old Indian man presents to emergency with shortness of breath and cough.  He has no specific medical past history.  There are no abnormal findings clinically and his CXR is normal.  His saturations on room air are 72%.  Application of oxygen raises the saturations to 81% and the following blood gas is taken.\n\nDescribe the findings.  How do you interpret them?", "a": "The most striking finding is that there is a marked elevation of the p50.  This is reflective of the oxygen saturations of 81% on the co-oximetry findings, despite an adequate pO2.\n\nThe p50 is a measure of the position of the oxygen-haemoglobin dissociation curve.  It represents the pO2 value at which 50% of the Hb is saturated with oxygen.  The p50 will increase with increased temperature, reduced pH and raised CO2.  It is also affected by red cell concentrations of 2,3-DPG, which is in turn affected by anaemia, some hormone disregulation states and chronic hypoxia.\n\nFinally, p50 can be affected by the type of haemoglobin present.  Certain variants of Hb are less able to bind oxygen at a given pO2.  Carboxy-haemoglobin and Met-haemoglobin are occasionally seen in clinical practice.  Rarely, a range of abnormal haemoglobins can also be found, with as many as 65 having a low affinity for oxygen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Abnormal%20Hb%20p50.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/Slide23.jpg"], "cat": "ABG"}, {"q": "A 7 year old girl is admitted to ICU with respiratory failure.  She has a congenital disorder resulting in marked muscle weakness, and has swallow and articulation problems.\n\nA chest xray is taken.  What does it show?", "a": "The major abnormality is a triangular shaped opacity behind the heart, obscuring the medial half of a diaphragm.  This is associated with volume loss on the left side.  This is consistent with left lower lobe collapse.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR7.jpg"], "cat": "X-Ray"}, {"q": "A 67 year old alcoholic man presents to ED grossly unwell, hypotensive and confused.  He reports severe upper abdominal pain for the past 4 days, associated with vomiting.  He has marked tenderness and distention.\n\nThe following clinical finding is recorded.\n\nWhat is the name of this sign? What does it represent?", "a": "Cullen's sign\n\n \n\nCullen's sign refers to periumbilical bruising and is associated with retroperitoneal bleeding of any cause.  It is best known for being a sign of severe haemorrhagic pancreatitis.  Why retroperitoneal haemorrhage leads to this sign is not entirely clear.\n\n \n\nCuriously, it was named after an obstetrician who described it in ectopic pregnancy.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Cullen's%20sign.jpg"], "cat": "Biochemistry"}, {"q": "A 76 year old woman is admitted to ICU with severe community acquired pneumonia.\n\n \n\nAfter 3 days ventilation, she is struggling to wean from the ventilator.  The following clinical sign is noted.\n\n \n\nWhat is the likely cause?", "a": "This is the rhythmical \"pill rolling\" tremor of Parkinson's Disease.  It classically has a frequency of 6Hz.", "imgs": [], "cat": "ECG"}, {"q": "What is this device and what is it used for?\n\nWhat are the advantages and disadvantages of this device?", "a": "This is a Wright's spirometer.  \n\n \n\nThe spirometer is used to confirm measurements of expired volumes of gas.  Expired gas passes through oblique slits within the spirometer, which creates a circular flow of gas.  This results in rotation of a rotor, which is coupled via a set of linkage gears to a display indicator dial and needle. The large needle records single breaths (and can be reset after each) while the smaller needle measures cumulative volumes.  The spirometer measures gas volume in one direction only. Flow can be calculated by averaging recorded volumes over time.\n\nIts advantages are that no power supply is necessary, and the device is lightweight and portable. It is also very accurate for measuring volumes.  Owing to inertia in the system it tends to overestimate higher volumes and underestimate lower ones.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/wright's%20spirometer.jpg"], "cat": "Equipment"}, {"q": "A 25yr old man is brought into to the emergency department after crashing his car into a tree.  The patient was intubated and ventilated on scene by HEMS crew.  Immediate CT scan following primary survey was undertaken:\n\n What abnormalities are evident on this coronal CT view?\n\n What immediate management is required?", "a": "This patient has sustained massive trauma.  Two immediately life-threatening injuries evident on CT were:\n\nPartial transection of the ascending aorta\n\nLeft diaphragmatic rupture with bowel / abdominal content migration into the left chest\n\nImmediate management includes: \n\nAortic dissection repair \u2013 either angiographically via stenting or open cardiac surgical repair.\n\nLaparotomy \u2013 the trans-abdominal approach is often used to remove bowel and abdominal contents from the chest and to repair the left hemi-diaphragm.  Sometimes thoracotomy is required.\n\nComment:  left diaphragmatic rupture occurs most frequently following blunt trauma (80-90% of diaphragmatic rupture cases).  Right sided diaphragmatic rupture is much rarer, but if it does occur is associated with significantly greater traumatic forces and associated severity of injuries.  The liver to some extent provides some protection of the right diaphragm to rupture also.  Diaphragmatic ruptures rarely occur in isolation, with pelvic fractures (40%), splenic rupture (25%), liver laceration (25%) and thoracic aortic tears, as in this case (5-10%) also commonly associated.\n\nFurther reading:\n\nWelsford M, et al.  (2013).  Diaphragmatic injuries.  Medscape Reference.  http://emedicine.medscape.com/article/822999-overview", "imgs": [], "cat": "CT"}, {"q": "A 25yr old man is brought into to the emergency department after crashing his car into a tree.  The patient was intubated and ventilated on scene by HEMS crew.  Immediate CT scan following primary survey was undertaken:\n\n What abnormalities are evident on this coronal CT view?\n\n What immediate management is required?", "a": "This patient has sustained massive trauma.  Two immediately life-threatening injuries evident on CT were:\n\nPartial transection of the ascending aorta\n\nLeft diaphragmatic rupture with bowel / abdominal content migration into the left chest\n\nImmediate management includes: \n\nAortic dissection repair \u2013 either angiographically via stenting or open cardiac surgical repair.\n\nLaparotomy \u2013 the trans-abdominal approach is often used to remove bowel and abdominal contents from the chest and to repair the left hemi-diaphragm.  Sometimes thoracotomy is required.\n\nComment:  left diaphragmatic rupture occurs most frequently following blunt trauma (80-90% of diaphragmatic rupture cases).  Right sided diaphragmatic rupture is much rarer, but if it does occur is associated with significantly greater traumatic forces and associated severity of injuries.  The liver to some extent provides some protection of the right diaphragm to rupture also.  Diaphragmatic ruptures rarely occur in isolation, with pelvic fractures (40%), splenic rupture (25%), liver laceration (25%) and thoracic aortic tears, as in this case (5-10%) also commonly associated.\n\nFurther reading:\n\nWelsford M, et al.  (2013).  Diaphragmatic injuries.  Medscape Reference.  http://emedicine.medscape.com/article/822999-overview", "imgs": [], "cat": "CT"}, {"q": "A 25yr old man is brought into to the emergency department after crashing his car into a tree.  The patient was intubated and ventilated on scene by HEMS crew.  Immediate CT scan following primary survey was undertaken:\n\n What abnormalities are evident on this coronal CT view?\n\n What immediate management is required?", "a": "This patient has sustained massive trauma.  Two immediately life-threatening injuries evident on CT were:\n\nPartial transection of the ascending aorta\n\nLeft diaphragmatic rupture with bowel / abdominal content migration into the left chest\n\nImmediate management includes: \n\nAortic dissection repair \u2013 either angiographically via stenting or open cardiac surgical repair.\n\nLaparotomy \u2013 the trans-abdominal approach is often used to remove bowel and abdominal contents from the chest and to repair the left hemi-diaphragm.  Sometimes thoracotomy is required.\n\nComment:  left diaphragmatic rupture occurs most frequently following blunt trauma (80-90% of diaphragmatic rupture cases).  Right sided diaphragmatic rupture is much rarer, but if it does occur is associated with significantly greater traumatic forces and associated severity of injuries.  The liver to some extent provides some protection of the right diaphragm to rupture also.  Diaphragmatic ruptures rarely occur in isolation, with pelvic fractures (40%), splenic rupture (25%), liver laceration (25%) and thoracic aortic tears, as in this case (5-10%) also commonly associated.\n\nFurther reading:\n\nWelsford M, et al.  (2013).  Diaphragmatic injuries.  Medscape Reference.  http://emedicine.medscape.com/article/822999-overview", "imgs": [], "cat": "CT"}, {"q": "A 25yr old man is brought into to the emergency department after crashing his car into a tree.  The patient was intubated and ventilated on scene by HEMS
