s://djb9j7fyr9fnv.cloudfront.net/media/35.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/41.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/5.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/61.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/71.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/81.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/91.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/101.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/111.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/121.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/131.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/141.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/151.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/162.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/171.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/181.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/191.jpg"], "cat": "MRI"}, {"q": "A 67 year old woman returns to ICU from theatre post CAGS.  2 hours later her inotrope requirements rise and she becomes increasingly hypotensive.  A transoesophageal echocardiogram is performed to elucidate the cause.\n\nWhat does it show?  What treatment is required?", "a": "The clip shows a transgastric short axis view of the heart at the level of the mid-papillary muscles.  It shows the left ventricle barely filling and the right ventricular free wall buckling inwards during the cardiac cycle.  The heart is surrounded by a large pericardial effusion, representing blood.  The patient has cardiac tamponade.\n\nThe patient needs to return to theatre to evacuate the clot and if possible stop the bleeding.  If time critical, the patient may require the procedure to be done in ICU.", "imgs": [], "cat": "ECG"}, {"q": "A 71 year old man is admitted to hospital with marked breathlessness.  His xray demonstrates pulmonary oedema.  He deteriorates and requires ventilation.  A transoesophageal echocardiogram is performed.\n\nWhat does it show?", "a": "The initial loop shows the two chamber view of the mitral valve taken in the mid-oesophageal position.  This view demonstrates the inferior left ventricular wall on the left of screen and the anterior wall on the right.\n\nThe main pathology demonstrated is that one leaflet of the mitral valve (the posterior leaflet) is prolapsing badly back wards into the left atrium during systole.  The leaflets do not coapt.\n\nThe accompanying colour-flow doppler image (in the four chamber position) demonstrates severe mitral valve regurgitation.\n\n \n\nComment : note the eccentric direction of the MR jet caused by pathology of one leaflet.  This means that the jet can hug the wall of the left atrium and make its significance (or even presence) difficult to detect in some views.  Additionally, it may cause curious clinical effects, such as directing the regurgitant jet predominantly into one pulmonary vein causing unilateral symptoms, signs and radiological findings.", "imgs": [], "cat": "ECG"}, {"q": "List 2 clinical applications of the following substance", "a": "This is 20% intralipid.\n\nIntralipid has a role in nutrition both as a caloric source and a supplier of essential fatty acids and fat-soluable vitamins.\n\nIntralipid also has important value in the treatment of cardiotoxic drug toxicity, most notably bupivocaine.  Pre-clinical studies and numerous case reports support its efficacy (see www.lipidrescue.org for more details).\n\n \n\nComment : The role of intralipid in cardiotoxic drug resuscitation is unclear.  While preclinical data is supportive, at present only anecdotal evidence of clinical efficacy exists.  Potential interaction with other resuscitation drugs has not been excluded, nor has its place been established in drugs other than bupivocaine.\n\n \n\nIntralipid's role in nutrition is equally unstable.  There is evidence that enteral nutrition reinforced with omega-3 fatty acids (such as fish oils) can ameliorate production of pro-inflammatory mediators when compared with omega-6 fatty acids (like Intralipid), and this has been demonstrated to have clinical effects in patients with ARDS.  In patients requiring parenteral nutrition there is insufficient evidence to detirmine the best fatty acid profile, though some concerns have been raised that soya based lipids may infact be harmful in patients who are not malnourished and have fasted <10 days.\n\n \n\nReference : www.criticalcarenutrition.com", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/intralipid.jpg"], "cat": "Biochemistry"}, {"q": "A 60 year old man presents to emergency with a new onset seizure lasting 10 minutes and terminating with 5mg IV diazepam.  He remains confused an agitated post seizure.  He appears to have a left hemianopia on visual threat testing.  A contrast CT is performed.\n\nComment on the CT", "a": "This CT is a cerebral angiogram. There is good opacification noted of the intracerebral vasculature.\n\nBoth the internal carotids, middle and anterior cerebral arteries visualised appear normal. The basilar artery and both the posterior cerebral arteries visualised appear normal.\n\nHypodensity is noted in the superior sagittal sinus which is seen to extend into the left transverse sinus, sigmoid sinus and the proximal internal jugular vein consistent with a thrombosis. In many images this is seen as the classic \"empty delta sign\".\n\nThe inferior sagittal sinus vein of galen and the straight sinus extending onto the right sided transverse sinus show good opacification.\n\nThere is ill defined hypodensity noted in the right parietal subcortical white matter which would correspond to an area of ischaemia. The cerebral cortex in this region however does not appear to be hypodense.\n\nNo haematoma visualised.\n\nComment : the empty delta sign is seen when there is clot in the triangular shaped dural sinuses.  The clot is outlined by the bright dural, making it look like a bright white triangle with a grey centre (the empty delta).  This is best seen in the left transverse sinus in image 19.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/112.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/211.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/36.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/42.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/51.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/62.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/72.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/82.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/92.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/102.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/113.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/122.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/132.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/143.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/152.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/163.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/172.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/182.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/192.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/201.JPG"], "cat": "CT"}, {"q": "A 28 year old Zambian presents to emergency with high grade fevers and chills, mild diarrhoea and mild headache, having arrived in Australia from Africa only days ago.  He is alert, has normal blood pressure and looks reasonably well.  He is tachycardic at a rate of 120 bpm.\n\n \nThe following testing is reported :\n \nThick and thin film : malarial parasites detected (ring forms)\nParasite density : 5.6%\nParasite count : 29 000/mcL\n \nP falciparum antigen : positive\nPan-malarial antigen : positive\n \nDiscuss the results", "a": "The results indicate that there are malarial parasites in the peripheral blood smear. The ring forms indicate immature forms of the parasite, which is quite common in acute infection.\n\n \nThe species of parasite can usually be determined from the peripheral smear by a trained technician. In some cases this can be difficult. Antigen testing may assist in rapid differentiation of malaria due to falciparum from that due to other species.\n \nSeveral commercially available kits are in use. In the above example, the kit identifies falciparum antigen, but also the pan-malarial antigen which is part of all malarial species. Unfortunately this cannot differentiate mixed infection from pure falciparum disease.\n \nThese tests are useful as rapid assessment guides, to assist initial management. However, speciation still relies on identification by a trained tech. Other techniques such as nucleic acid amplification are evolving.\n \nThe \u201cthick film\u201d is used to assist identify parasitaemia for low-grade disease where parasites are few in number. The thin film makes it much easier to identify species type, and the density count.  \n \nThe density count reflects the parasite load. This is reported in two ways \u2013 absolute parasite number per volume of blood, and as a percentage. This term is confusing as it is number of parasites per white cell, expressed as a percentage, assuming a normal white cell count.\n \nDensity measures are performed by taking an average of the number of parasite forms seen per field (usually 200 fields and done by two independent operators, a process that can take up to 20 minutes). Density count has been shown to predict outcome, with a parasite load >5% (or >25 000) often identified as potentially severe malaria.  Additionally, density counts are used to monitor response to therapy.\n \nHowever, factors such as previous exposure can mitigate the severity of the disease. In this case, the low virulence of this man\u2019s presentation is due to the fact he has had falciparum malaria on a number of occasions in the past.\n \nAdditionally, severe disease may occur with low parasite counts, and low parasite counts may not accurately reflect total body parasite load. Furthermore, counts may be seen to increase despite therapy in some cases, though clinical course appears to be improving.\n \nR", "imgs": [], "cat": "Biochemistry"}, {"q": "A 50 year old man is recovering in ICU after being mauled by a bull.  He has bilateral intercostal drains placed.  His xray the following morning is presented here.  Describe the findings", "a": "The major finding is a residual left sided pneumothorax.  This is difficult to see because of penetration, the overlying emphysema, the position of the patient etc.  However, there is a faint lung edge seen near the left hilum, and the cardiac border is clearly demarcated.  There is also hyperlucency of the left lungfield.  Considerable subcutaneous emphysema is present on the left.  Evidence of bilateral pulmonary contusions is present.  There are multiple upper rib fractures on the left, and on the right the 7th rib is fractured posteriorly.\n\n \n\nComment : it is important to carefully examine the xray for signs of pneumothorax which can be difficult to detect in critically ill patients.  Additionally, it is essential that you ensure that you get the response to a therapy that you expected.  In this case, the presence of an ICC had not resolved the problem.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cxr%2012.jpg"], "cat": "X-Ray"}, {"q": "A 70 year old man lies unconscious with fixed dilated pupils after a collapse at home yesterday.  His CT at presentation was normal, 1 hour after his collapse.\n\nA repeat CT has been performed.  What are the findings?  What is the likely cause?", "a": "This is a CT angiogram.  The major finding is a large ischaemic stroke in the posterior cerebral artery territory and basilar artery territory bilaterally.  There is sparing of the middle and anterior cerebral arteries, and lower halves of the cerebellum are intact.\n\nThe most likely cause is a problem with the basilar artery such as thrombosis.  The lower half of the cerebellum is supplied by the posterior inferior cerebellar artery which arises from the upper part of the vertebral artery.  In this case, contrast is seen in the vertebrals and the basilar artery, extending into the right posterior cerebral artery, but the left posterior artery is occluded.  It is possible that the clot has migrated and the basilar artery flow was only transiently occluded.\n\nThis horrifying condition may lead to \"Locked In Syndrome\" in which the patient is aware (intact cortex) but has no sensory input or motor output.\n\nComment : This study nicely demonstrates the territory of the posterior cerebral artery.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/114.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/212.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/37.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/43.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/52.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/63.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/73.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/83.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/93.JPG"], "cat": "Biochemistry"}, {"q": "A 34 year old man has severe pancreatitis and is intubated in ICU. \n\nWhat is this equipment set up to measure?\n\nIf the reading was 28cmH20, what complications may arise?", "a": "This is a pressure transducer set up to monitor the bladder pressure.  It is felt that bladder pressure is a measure of intra-abdominal pressure, which can be elevated in a variety of conditions.  This is known as Intra-abdominal hypertension.\n\nA value of 28cmH20 is markedly elevated.  Complications that can arise include :\n\nrenal hypoperfusion and acute renal failure\nimpaired venous return leading to cardiovascular embarrassment\nincreased chest wall compliance resulting in impaired ventilation\nsplanchnic hypoperfusion\n\nComment :\n\nThe World Society of the Abdominal Compartment Syndrome intra-abdominal hypertension as present when intra-abdominal pressures(IAP - measured referenced to the iliac crest in the midaxillary line) are higher than 12cmH2O.\n\nClass 1 - 12-15\nClass 2 - 16-20\nClass 3 - 21-25\nClass 4 - >25\n\nThe \"abdominal compartment syndrome\" is present when there is raised intra abdominal pressure (usually sustained >20) and there is evidence of organ dysfunction OR the abdominal perfusion pressure (defined as MAP - IAP) <60cmH2O\n\n \n\nReference : www.wsacs.org", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Abdo%20pressure.jpg"], "cat": "Equipment"}, {"q": "What is the following peice of equipment?\n\nWhat are the advantages and disadvantages?", "a": "This is a closed endotracheal suction system.\n\nThis system was designed to enclose the suction catheter within the clean field, thereby reducing the risk of ventilator associated pneumonia.  While the catheters may cost more than normal catheters, they can also be reused which  can reduce costs.\n\nUnfortunately there is limited evidence that they reduce the incidence of VAP.  A Cochrane review of the available evidence was published in 2007 and edited in 2008.  It showed that in 16 trials, many of which had significant methodological problems, closed suction systems did not appear to reduce VAP incidence or any other important outcome measure.  Additionally, there appeared to be a statistically significant increase in bacterial colonisation rates of the upper airways.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/suction.jpg"], "cat": "Equipment"}, {"q": "A 36 year old male is involved in a motor vehicle accident.  He is intubated and ventilated.  After initial resuscitation and primary survey, he undergoes CT scanning.\n\nWhat are the major findings?\n\nHow will you manage his chest injuries?\n\nWhat is your ventilation strategy?", "a": "There is a haemopneumothorax on the right side.  Significant pulmonary contusion (bronchograms present) is seen in the right lower lobe and the posterior segment of the right upper lobe.  Less significant pulmonary contusion is seen in the left lung.  The left lower lobe is collapsed (no bronchograms, loss of lung volume).  From these views there is no evidence of mediastinal or bony injury.\n\nThe brain CT demonstrates several punctate haemorrhages, along with minor-moderate effacement of the sulci and lateral ventricles suggesting oedema and diffuse axonal injury.\n\nThe chest injury requires:\n\ninsertion of right ICC\nbronchoscopy and recruitment of left lower lobe, humidified circuit and physiotherapy\nlung protective ventilation (high PEEP low volume ventilation with permissive hypercapnoea)\n\nUnfortunately, the management of his chest conflicts with optimal management of his brain injury.  High PEEP can restrict venous flow from the brain resulting in increased ICPs, can reduce cardiac output which compromises cerebral perfusion, and hypercapnoea can cause dangerous vasodilation of cerebral vessels.\n\nUltimately, poor management of the brain injury is most likely to cause long term disability, and most experts would choose brain-protective over lung-protective course.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/115.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/213.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/38.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/44.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/53.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/64.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/74.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/84.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/116.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/214.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/39.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/45.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/54.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/65.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/75.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/85.JPG"], "cat": "X-Ray"}, {"q": "A 70 year old woman presents to emergency with shortness of breath and is very distressed.  This is her first presentation with dyspnoea.  She is a reformed smoker with a 20 pack year history.\n\nHer CXR is taken and displayed below.  What are the salient features?", "a": "FINDINGS:\n\nIll defined interstitial markings are present in both lung fields, more in the mid and lower zones consistent with interstitial oedema.\n\n \n\nThe cardiac size appears normal and no pleural effusions visualised. \n\nThe patient has a nebuliser running\n\nComment : The cardiac shaddow may not be enlarged in cardiac pulmonary oedema.  Cardiac oedema results from acute pulmonary venous hypertension, which may be due to ischaemia, chronic ischaemic cardiac disease, chronic hypertension, valvular disorders and other pathology.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/untitled1.jpg"], "cat": "X-Ray"}, {"q": "A 36 year old man presents with cardiac failure.  He has a history of heavy alcohol and nicotine abuse but no other risk factors for cardiac disease.\n\nWhat investigation has been performed?", "a": "This is a CT coronary angiogram.\n\nThe angiogram shows a number of plaques involving all three major coronary arteries (see report below).  Ischaemic heart disease may be the cause of his cardiomyopathy.\n\nComment : CT coronary angiography (CTCA) is a rapidly emerging diagnostic modality.  It is performed with ECG gating to create stable imaging techniques, and often requires beta blockade to maintain a heart rate of 60-80.  It is possible to determine ejection fraction with CT ventriculography too.\n\n \n\nCT angiography has been hampered by calcification of plaque resulting in image distortion.  However with newer scanners and software, its accuracy is improving significantly.\n\n \n\nReport :\n\nDominance: right.\n\nLeft main coronary artery: Patent . Measuring about 1.5cms in length. Left main is seen to divide into a LCX and LAD divisions.\n\nLAD: There is a 2cm long and 2mm thick soft plaque noted about 5mm distal to the origin of the LAD. Cross sectional area however does not suggest a significant stenosis.\n\nDistally there is good opacification of the vessels. Small specks of calcification are noted within the plaque.\n\nA single diagonal branch is seen arising from the LAD.\n\nLeft circumflex coronary artery:\n\nThe circumflex vessel is prominent and is seen to extend 1.5cm and shows a large marginal division beyond this point.\n\nAbout 7mm distal to the origin there is a small eccentric soft plaque noted measuring about 5mms in length and 2mms in thickness. A small speck of calcification is noted within it.\n\nNo significant stenosis is seen in this region.\n\nDistally just beyond the origin of the marginal artery there is near complete occlusion of the LCX over a length of 15mms. A very thin streak of contrast is seen in the lumen.\n\nDistally however there is faint opacification seen.\n\nA thin soft plaque is also noted at the origin of the marginal artery.\n\nRight coronary artery:\n\nGood opacification is noted of the entire right coronary artery which is seen to divide distally into a PDA and a posterior left ventricular division. There is a 12mm long soft eccentric plaque noted in the proximal right coronary artery about 2cms distal to its origin which measures about 2mms in thickness. This is seen to cause a 50% stenosis. Distally there is no further evidence of a significant stenosis/occlusion visualised.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/117.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/215.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/310.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/46.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/55.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/66.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/76.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/77.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/86.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/94.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/103.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/118.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/123.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/133.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/144.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/153.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/164.jpg"], "cat": "ECG"}, {"q": "A 65 year old female presents with severe abdominal pain radiating to her back, associated with vomiting.  She is sweaty and has laboured breathing.  She has a history of alcoholism and chronic low back pain.  After volume resuscitation and analgesia she undergoes a contrast CT of her chest and abdomen.  The abdominal slices are shown here.\n\nDescribe the salient findings", "a": "Sections taken through the upper abdomen show an enlarged liver.  It is also noticable that the liver is much darker than usual (it should be the same density as the spleen).  This is consistent with fatty infiltration, probably due to alcoholism.  No other hepatic or biliary pathology is noted.\n\n \n\nThe spleen, pancreas and both the kidneys are within normal limits. Of the available images, the contrast scan of her aorta shows no sign of dissection \n\n \n\nThere is some stranding noted adjacent to the duodenum with a small bubble of air seen outside the duodenal wall. A small amount of free fluid is noted around the spleen and right lobe of liver. Several free air bubbles are noted in the non dependant aspects of the abdomen (eg anterior to the liver).  These findings are consistent with the diagnosis of duodenal perforation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/119.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/216.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/311.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/47.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/56.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/67.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/78.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/104.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1110.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/124.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/134.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/145.JPG"], "cat": "X-Ray"}, {"q": "A 75 year old man is febrile and hypotensive 7 days after major abdominal surgery. He is ventilated in ICU, and an abdominal CT is ordered. \n\n \n\n1. Describe the abnormalities on the CT\n\n2. What diagnostic tests could you perform to identify the source of sepsis?", "a": "1. CT study of the abdomen and pelvis post oral and IV contrast administration.There is a large, right-sided, retroperitoneal collection abutting the infrarenal abdominal aortic aneurysm measuring around 9 x 10 cm axially and almost 20 cm cephalocaudally. The lesion extends from posterior to the right kidney to the right iliac fossa and contains heterogenous material suspicious for haematoma. The abdominal aortic aneurysm measures 8.2 x 5.4 cm axially and contains a significant quantity of mural thrombus. There is no definite contrast extravasation to suggest ongoing active bleeding. Multiple, smaller intraperitoneal fluid collections with enhancing margins are evident throughout the mesentery and extending to the left paracolic gutter region in the pelvis. A small volume of free fluid lies in the right paracolic gutter and surrounds the liver and spleen. No abnormally dilated bowel loops to suggest obstruction or evidence of intraperitoneal free gas.\n\n\n\n\n2. a.CT guided aspiration and culture of the major abdominal collection\n\n     b. Blood, urine, sputum cultures", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/708356a.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/708356b.jpg"], "cat": "Biochemistry"}, {"q": "A 55 year old woman presents with shortness of breath and chest discomfort. Describe the findings present on the following CT scan", "a": "A large hiatus hernia with the majority of the stomach located above the dome of the left diaphragm. The gastro-oesophageal junction lies posterior and to the left. An ectatic thoracic aorta is noted.\nAssociated atelectasis/collapse of the left lower lobe, and to a lesser degree the right lower lobe.\nNo focal destructive bony lesion is identified. Degenerative upper lumbar changes, with scoliosis convex to the left, centred over L3 is noted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/365926a.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/365926b.jpg"], "cat": "CT"}, {"q": "A 41 year old male presents to emergency with severe headache and difficulty walking.  A CT scan is performed.\n\n \n\nWhat abnormality is present?", "a": "There is a wide band of hypodensity noted in the left cerebellar lobe superiorly. It can be clearly seen sitting beneath the tentorium.  The hypodensity is seen to involve the grey and white matter up to the region of the cortex.\n\n \n\nMild mass effect is seen impacting on the adjacent 4th ventricle, and effacement of the left ambient cistern is also noted. The rest of the brain parenchyma is normal. No evidence of hydrocephalus/ mid line shift seen.\n\n \n\nThis CT is consistent with a superior cerebellar artery occlusion on the left.\n\n \n\nComment : Posterior circulation infarcts, particularly in young patients, should raise concerns about a secondary cause (such as cardiac embolus, dissection or posterior circulation thrombus).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/120.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/217.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/312.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/48.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/57.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/68.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/79.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/87.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/95.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/105.JPG"], "cat": "CT"}, {"q": "A 34 year old male reformed heroin abuser is in hospital being treated for Staph aureus pneumonia.  He is treated with erythromycin due to a known penicillin hypersensitivity reaction.  He has been treated for agitation with haloperidol, and his methadone has recently been increased.\n\n \n\nA cardiac arrest is called while on the ward, and his initial rhythm strip is shown.\n\n \n\nDescribe the features.  How would you treat it?  What precipitating factors may have led to this rhythm?", "a": "This is torsade de pointes.\n\n \n\nIf the patient is pulseless, immediate cardioversion is required.  Standard algorithms for management of shockable rhythms are indicated. Magnesium may be indicated and a dose of 5mmol can be given IV. \n\nWhen associated with bradycardias, prevention of recurrent Torsades can be achieved by maintaining an adequate heart rate - pacing or pharmacotherapy with isoprenaline may be of value.  Where possible, the causative agent should be discontinued.\n\n \n\nRisk factors for acquired TdP include :\n\nprolonged QTc (esp if >500ms)\nT-U wave abnormalities (flattened T waves, bifid T waves, prominent U waves fused with T wave) which is often exacerbated by a pause (eg due to a ventricular ectopic)\nMacroscopic T wave alternans (a pattern where T waves alternate between big and small from beat to beat)\nQTc prolonging drugs (eg sotolol, procainamide, quinidine, haloperidol, erythromycin, methadone).  These drugs appear to increase risk by up to 10%\nHypokalaemia, hypomagnesaemia, hypocalcaemia\nBradycardia\n\nComment : this ECG shows a number of common features of Torsades.  Firstly, there is a variable amplitude in a swinging pattern, the so called twisting of the points.  However, there are others :\n\na short-long-short cycle at the initiation.  This is often the result of a ventricular ectopic, followed by a compensatory pause, then another ectopic on the vulnerable part of the T-U wave complex.\nProlonged QTc\nabrupt switching of positive QRS morphology to negative (towards the end of the trace)\n\nOther features that may occur in torsades include a warm-up phenomenon where the R-R intervals get progressively shorter as the rhythm establishes itself, and spontaneous termination (which is rare in VF) with slowing of the R-R interval just prior to termination.\n\n \n\nNote : some drugs may prolong QTc and not be associated with TdP (eg Amiodarone is commonly known to prolong QTc but TdP is relatively rare).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/torsade.jpg"], "cat": "ABG"}, {"q": "A 34 year old woman is referred to you post induction chemotherpay for AML with hypotension and diarrhoea. She is neutropaenic (WCC 0.1) and thrombocytopaenic (platelets 14 x 10^6).\n\n \n\n1. Describe the abnormalities on the following CT scan?\n\n2. What is the most likely diagnosis?\n\n2. What are your broad management options?", "a": "1. CT abdomen reveals transmural thickening of large bowel, predominantly right side with pericolic fat stranding. There is marked dilatation of the caecum, which measures up to 11 cm in maximal diameter. There is no convincing mural gas.\n\n \n\n2. Given recent chemotherapy and neutropaenia, this is most likely a neutropenic colitis or \"typhlitis\", with marked caecal distension posing a risk of perforation.\n\n \n\n3. Typhlitis is an acute life-threatening characterised typically by transmural inflammation of the caecum, +/-  extenson to ascending colon and ileum in immunosuppressed patients. This was initially described in children undergoing chemotherapy for leukaemia, but is increasingly described in adults. It is associated with a high mortality rate, and the decision when to escalate from aggressive medical  management (fluid and vasopressor resuscitation, intravenous antibiotics, airway and ventilatory support) to surgery (cecostomy, right hemicolectomy) is difficult, given the underlying bone marrow suppression and severe sepsis that accompanies this disease.\n\n \n\nIn this case the risk of caecal perforation has to be weighed against the risk of laparotomy in a thrombocytopaenic immunosuppressed patient.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/typh1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/typh2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/typh3.JPG"], "cat": "CT"}, {"q": "Describe the abnormalities present on the following CT chest, performed in a 70 year old woman presenting with cough, fever, and weight loss.", "a": "There is a necrotic mass within the right lower lobe, associated with a complex multiloculated pleural effusion. The imaging appearances are suspicious for pleural empyema. The necrotic mass is most likley  neoplastic, but an underlying pulmonary abscess could have a similar appearance.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/calung1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/calung2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/calung3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/calung4.JPG"], "cat": "X-Ray"}, {"q": "Identify the object indicated by the arrow", "a": "Chlorhexidine impregnated sponge\n\n \n\nComment : Chlorhexidine impregnated sponges are designed to reduce the rate of infection for centrally placed venous catheters.  Timsit et al performed a randomised control trial of the sponges in patients with central venous and peripheral arterial cannulae.  They demonstrated a Hazard Ratio of 0.39 (0.17-93) for major blood stream infections.  It has been noted however that the initial skin preparation for line insertion in this study was povidone iodine, now known to be less effective than chlorhexidine.  It is unclear whether these sponges are as useful in light of this in current practice.\n\n \n\nReference : JAMA 301:1231-41", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/biopatch%202.jpg"], "cat": "Clinical"}, {"q": "A 26 year old female is involved in a high speed motor vehicle accident.  She self extricated and complains of severe back pain.  She is clinically stable, has no obvious chest, abdominal, pelvic or limb injury, and has no signs of neurological injury.\n\nThe following films are taken to investigate her back pain.  What do they show?  How would you manage further?", "a": "The lateral film shows 20% anterior compression of the L2 vertebral body.  The AP film demonstrates widening of the peduncles of L2.  Additionally there is a sudden kyphosis at this level.  These latter changes suggest that there is a burst fracture of the L2 vertebra.\n\n \n\nA CT is required to investigate further, but the fracture should be regarded as unstable and spinal precautions initiated.\n\n \n\nNote : the CT subsequently demonstrated a burst injury to L2 with a retropulsed fragment, and a Chance Fracture of L1.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/back%2011.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/back%202.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/back%202%20answer.JPG"], "cat": "Clinical"}, {"q": "A 22 year old male is admitted to ICU with severe respiratory failure.  He has bilateral diffuse lung infiltrates and is desaturating on 100% oxygen and 15cmH20 of PEEP.  On echocardiography his LV is contracting normally.\n\nHe is placed on the following device.  What is it?  What are the possible modes and which is most likely here?", "a": "Extracorporeal membrane oxygenation (ECMO). \n\nTypically ECMO is described as veno-arterial (VA-ECMO) or venovenous ECMO (VV-ECMO).  Venovenous ECMO is usually required when oxygenation fails.  A catheter is placed in the right atrium via a major vein, in this case the femoral, and blood is pumped via an oxygenator, and returned via another vein (again, in this case, the femoral vein).  VV-ECMO relies on the heart contracting well.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ecmo.jpg"], "cat": "X-Ray"}, {"q": "A 16 year old male falls from the back of a ute, hitting the back of his head.  He is moaning spontaneously, opening his eyes to pain and is moving semipurposefully.\n\nA CT is taken.  What are the findings?", "a": "There are two haematomas measuring 4.2 x 1.1 x 3.1cm and 3.8 x 0.8 x 3cm. They do not cross the sutures and are biconvex, and are thus likely to be extradural. There is a small focus of pneumocephalus which indicates the presence of a fracture (not visible on these sections). There is mass effect with asymmetry of the basal cistern. At the time this was taken, there was no evidence of subfalcine or transtentorial herniation.\n\n \nConclusion: There are 2 extradural haematomas in the temporal and parietal regions causing mass effect, and a likely fracture with pneumocephalus.\n \nComment : This is an excellent example of a EDH, which is usually associated with a fracture and does not cross the suture lines.\n \nThe signal in the right posterior fossa is the enhancement of the tent, not blood.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20163.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20260.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20352.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20446.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20532.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20622.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20714.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%201.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%202.jpg"], "cat": "Clinical"}, {"q": "Name the fluid filled spaces on the following image - A, B, C, D, E and F", "a": "A \u2013 Lateral ventricle opening\nB \u2013 Cistern of the great cerebral vein (Quadrigeminal cistern)\nC \u2013 Fourth Ventricle\nD \u2013 Cerebellomedullary cistern (Cisterna magna)\nE \u2013 Prepontine cistern\nF \u2013 Interpeduncular cistern", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/question.jpg"], "cat": "Clinical"}, {"q": "A 56 year old man with a past history of Marfan's syndrome and an aortic valve replacement presents with a month of increasing unsteadiness with confusion developing over the last week.\n\nA CT is performed.\n\nDescribe the findings.", "a": "There is subacute on chronic haemorrhage,with the heavier acute haemorrhage sinking to the back with chronic haemorrhage layering on top.\n \nThere is evidence of tonsillar herniation, with obliteration of the basal cisterns, indicating high intracranial pressures exist.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/125.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/218.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/313.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/49.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/58.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/69.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/710.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/88.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/96.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/106.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1111.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/126.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/135.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/146.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2011.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2021.jpg"], "cat": "Echo"}, {"q": "A 44 year old man presents with shortness of breath.\n\n \n\nA PA chest xray is taken.  Describe the findings", "a": "The heart shaddow of this xray is slightly enlargened for an erect PA film, suggesting cardiomegaly.  There is an increase in the prominence of the vasculature, particularly in the upper zones, and possibly a small right pleural effusion.  The lung fields look clear.  Taken together, these findings suggest early cardiac failure with chronic cardiac disease.\n\n \n\nThere are sternal wires present, and there are two artifical heart valves present.  These are most likely the Mitral and Aortic valves.  ECG leads are also present.\n\nCauses of multiple valve disease include rheumatic fever (the cause in this case), endocarditis and congenital heart disease.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/MVR%20CXR.jpg"], "cat": "ECG"}, {"q": "A 70 year old male presents to emergency with a self-limited convulsion, confusion and diarrhoea.  He has been maintaining fluid intake but is eating poorly.  He has a history including congestive cardiac failure requiring a recent hospital admission, is a reformed smoker and has treated hypertension.  His medications are aspirin, indapamide and metoprolol.  He has no known allergies.\n\n \n\nAn initial blood sample is taken :\n\n \n\n \tValue\tNormal Range\nSodium\t105\t135-145mmol/L\nPotassium\t3.5\t3.5-5.0mmol/L\nChloride\t81\t100-110mmol/L\nBicarbonate\t20\t22-33mmol/L\nUrea\t9.0\t3.0-8.0mmol/L\nCreatinine\t0.11\t0.07-0.12mmol/L\n\nDiscuss the test results\n\nWhat other investigations would you perform to help you interpret these results?\n\nDescribe your immediate management", "a": "Summary of results : there is severe hyponatraemia with mild metabolic acidosis and borderline renal function.  The anion gap is normal.\n\n \n\nThe neurological dysfunction may be explained by the Na result which is very low, but may also be affected by the underlying process (eg Legionella pneumonia, CNS tumour, septic encephalopathy etc)\n\n \n\nHyponatraemia can result from multiple causes.  In this patient, the likely contributors include :\n\ncongestive cardiac failure (due to apparent volume loss and renin-angiotensin system activation)\nloss of salt without replacement due to diarrhoea\nindepamide\nvolume depletion (low volume is a more potent stimulus for ADH secretion than hyponatraemia is to suppress it)\nSIADH\n\nAll may be contributing in some way.\n\n \n\nOther tests : Usually causes are divided into hypo-osmolar and non-hypoosmolar.  Serum osmolality is measured to allow this to be assessed.\n\nSpurious causes of hyponatraemia include hyperglycaemia, hyperlipidaemia and high serum proteins.  These artificially increase Na concentration readings in many laboratory tests.  Urine electrolytes and osmolality are also important, and possibly cortisol and thyroid function tests.  A head CT is probably required to ensure no intracranial pathology is responsible for both the hyponatraemia and the fit.\n\n \n\nManagement includes:\n\nAttention to airway and breathing\nMaintain normal circulatory parameters\nTerminate further fits with diazepam / midazolam; boluses of concentrated sodium can be used to rapidly elevate serum Na by 2-3mmol/L. \nIf hypovolaemic, rehydration with normal saline is required\nIf euvolaemic or hypervolaemic, most causes will respond to removal of the offending cause and fluid restriction.  Rarely is hypertonic saline required\nSodium manipulation should occur no faster than 1-2mOsm/L per hour to prevent Central Pontine Myelinolysis.  Careful monitoring of bloods and neurological observations are therefore required.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 34 year old female with Crohn's disease is admitted with an acute exacerbation of abdominal pain and diarrhoea.  She reports frequent small volumes of diarrhoea, up to 20 motions per day.\n\nA blood gas is taken in emergency and the emergency registrar asks your advice on the results.\n\n \n\n \tResult\tNormal Range\npH\t7.52\t7.35-7.45\nPaCO2\t50\t35-45mmHg\nPaO2\t81\t80-100mmHg\nHCO3-\t41\t22-33mmHg\nBase excess\t+12\t-3 - +3mmol/L\nNa\t141\t135-145mmol/L\nK\t4.2\t3.5-5.0mmol/L\n\nWhat will you tell the registrar?", "a": "There is a compensated metabolic alkalosis.\n\n \n\nThere are a number of ways of assessing the adequacy of compensation in metabolic acid-base disturbances.  A simple one is to look at the two digits after the decimal point of the pH, and this number should be similar to the PaCO2 (52 vrs 50 in this case, which is about right).  Other rules exist.\n\n \n\nDiarrhoea associated with non-infectious colitis is often associated with a mild to moderate metabolic alkalosis.  The mechanism for this is unclear, but is possibly related to the high NaCl loss in stools.  This results in Na retention in the kidneys (a mechanism enhanced by aldosterone) which results in HCO3 retention. \n\n \n\nSmall bowel or infectious secretory diarrhoea tends to produce metabolic acidosis.  The history of frequent small stools is far more suggestive of colitis than enteritis.", "imgs": [], "cat": "ABG"}, {"q": "What is the item shown in the picture?\n\nIn what circumstances might you use this?", "a": "The item is a laryngoscope handle which includes the power and light source for a fiberoptic rigid laryngoscope blade.\n\nThe blade is non-standard however in that the blade does not sit perpendicularly to the axis of the handle (ie at 90 degrees), rather it sits at a more obtuse angle of 125 degrees.\n\nThis is useful when it is difficult to get the laryngoscope into the patient's mouth due to large breast tissue or facial distortion.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/125%20angle%20handle.jpg"], "cat": "Biochemistry"}, {"q": "View the attached video.\n\nWhat is the name of the reflex being tested?\n\nDescribe the anatomy of the reflex pathway.\n\nHow do you interpret this patient's response?", "a": "Fluid (presumably ice cold) is being flushed into the patient's ear, and the eyes are being observed for signs of movement.  The reflex response is known as the oculo-caloric reflex or the vestibulo-ocular reflex.  This reflex allows visual fixation of an object during lateral rotation of the head.\n\nCold water cools the fluid in the semicircular canals which subsequently sinks, and this is detected by the ear as head rotation to the left.  Impulses travel along the vestibular nerve to the vestibular nucleus in the brainstem.  Signals then travel to the contralateral abducent nucleus which controls deviation of the eye towards the right.\n\nNormally a cortically controlled reflex rapidly brings the eyes back to central vision (fast phase of the nystagmus).  The mnemonic COWS is used to remember which side the fast phase goes - Cold Opposite Warm Same.  When cortical function is lost, the eyes tonically deviate to the stimulated side.  When brainstem function is also lost, the eyes do not react to stimulation.\n\nIn this patient there is no response, indicating an interruption at some point on this reflex pathway.  The finding can only be interpreted in the clinical context.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 87 year old woman is referred to you from ED by the surgical registrar.  They are about to take her to theatre for a small bowel obstruction.  She is dehydrated from third space losses and vomiting, but has been resuscitated in ED.\n\nOn reviewing her, you have a chance to review her xrays.\n\nWhat does it show?", "a": "There is evidence of a small bowel obstruction (there are multiple air fluid levels visible on the erect film, and distention of the small bowel).  However there is also note made of the air in her biliary tree (partially obscured by a gas bubble).  There is no air under the diaphragm and no other sign of perforation on this film.\n\nThe small bowel obstruction is likely due to a large gall stone - a fistula is created between the gallbladder and the bowel, with passage of a stone with impacts distally.  This cannot be seen clearly on the xray. Air fills the biliary tree due to the fistula.\n\nAlternate causes of biliary air include instrumentation and gas-forming infections.  These are usually distinguished clinically.  Air in the portal system may look similar to this pattern and can be due to infection or surgery.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/AXR%201.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/AXR%202.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/AXR%201%20answer.JPG"], "cat": "X-Ray"}, {"q": "A 77 year old man with severe central chest pain radiating to his jugular notch.  An arterial contrast CT of his chest is performed.\n\nWhat does it show?", "a": "A saccular aneurismal dilatation is noted in the AP window region of the ductus arteriosus from the inferior arch of the aorta. It measures around 3 x 2.5 x 2cm.  The aneurysm is thrombosed with a small area of contrast opacification witin it. The communication with the left pulmonary artery is not patent.\nThere is a 3 x 2 x 1.5cm ill defined soft tissue density mass noted in the right lower lobe posteriorly and located on the subpleural aspect. There is no effusion or rib erosion. This may represent an undiagnosed tumour. There is no obvious lymphadenopathy or bony destruction on the views shown here. \n\nComment : This is a rare finding in adults, and the pathology is largely unknown.  It is unclear if the condition is a persistence of the duct or the result of recanalisation.  Since closure starts at the pulmonary end of the ductus at birth, incomplete closure would be expected to occur at the aortic end, as in this case.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/127.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/219.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/314.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/410.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/59.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/610.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/711.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/89.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/97.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/107.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2012.jpg"], "cat": "X-Ray"}, {"q": "A 70 year old woman with a past history of chronic obstructive airways disease presents with chest pain following a coughing fit.  She is distressed and short of breath requiring HDU admission. \n\nA CXR is obtained.\n\nWhat does it show?", "a": "There is evidence of a pneumomediastinum / pneumopericardium.  Streaks of air are seen extending into the superior mediastinum / neck and represent surgical emphysema.  This is most likely due to a ruptured peripheral bulla.  Alternative causes of pneumomediastinum include ruptured oesophagus or upper airways and extension of pneumothorax, or a pneumoperitoneum (eg laparoscopy)\n\n \n\nComment : surgical emphysema is often felt above the clavicles when due to pneumomediastinum.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CXR%20answer.JPG"], "cat": "X-Ray"}, {"q": "A 68 year old man presents to ED with fevers, rigors and central chest pain 3 weeks following coronary artery bypass grafting. A CT scan is performed.\n\n \nDescribe the results.", "a": "The CT is performed without IV contrast.  There is a retrosternal collection noted, and this contains a few bubbles of air.  Given it is now 3 weeks post op, it is likely that this represents infection rather than post operative air.\n\nThe sternotomy is noted.  Importantly the bone density and outline is normal and the sternum is well aligned.\n\nBilateral pleural effusions and basal collapse are also noted.  Their significance is unclear.\n\nComment : Mediastinitis is an uncommon complication of cardiothoracic surgery, occuring in 1-2% of patients.  Risk is considered higher in patients with IMA grafts, particularly if bilateral, emergency surgery, reoperation, re-exploration, obesity and prolonged operative time, among others.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/128.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/220.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/315.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/411.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/510.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2013.JPG"], "cat": "X-Ray"}, {"q": "A 61 year old female presents with confusion and debility.  She is grossly dehydrated and has had a month long history of progressive back pain.  She is now struggling to mobilise.\n\n \n\nInitial biochemistry is as follows.  You are asked to review in view of the abnormalities detected.\n\n \n\nInterpret the results\n\n \n\n \n\n \tResult\tNormal Range\nSodium\t133\t135-145\nPotassium\t3.9\t3.5-5.2\nChloride\t107\t98-110\nBicarbonate\t26\t22-32\nUrea\t17\t3.0-8.0\nCreatinine\t137\t10-120\nPhosphate\t1.41\t0.70-1.40\nCalcium\t3.84\t2.20-2.55\nProtein\t120\t62-80\nAlbumin\t32\t39-46\nBilirubin\t27\t6-24\nALP\t92\t30-110\nALT\t32\t<40 I/U", "a": "The most notable abnormality is the marked hypercalcaemia.  This is likely to explain her dehydration and confusion.\n\n \n\nOther abnormalities include evidence of pre-renal azotaemia and mild hyperbilirubinaemia.\n\n \n\nCommon causes of marked hypercalcaemia include malignancy (either due to metastasis, primary bone disease or hormone synthesis), hyperparathyroidism and granulomatous disease.\n\n \n\nOf note, the blood screen also demonstrates a high serum protein level, not due to albumin, and a low anion gap.  These features, in this context, are suggestive of multiple myeloma, due to aberrant immunoglobulin (paraprotein) production.  ALP is often normal despite bony involvement.  A mild hyponatraemia is artifactual due to the high protein content of the sample.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 48 year old man presented to the ED with chest pain and breathlessness. His ECG show ST depression laterally. Please comment on the CT chest performed.", "a": "This is a contrast CT scan  of the chest and abdomen. It appears to have been performed as a CTPA, with scans taken to demonstrate contrast in the pulmonary artery.  Therre is no evidence of pulmonary embolism.\n\nThere is a Type A aortic dissection extending from the root of the aorta, probably involving the aortic valve, to the common iliac arteries bilaterally. The aortic dissection flap is clearly visible, and the false lumen is identified at the anterior aspect of the ascending aorta, superior aspect of the arch of aorta and the left lateral aspect of the descending time, thoracic and abdominal aorta.\n\nUnfortunately, there is poor contrast opacification of the aorta on both studies, causing difficulty in interpreting the extent of the aortic dissection.\n\nNormal enhancement of the liver, pancreas and spleen are noted. No evidence of bowel wall thickening, intraperitoneal free fluid or free gas is evident. There is also  failure of contrast enhancement of approximately 75% of the left kidney, in keeping with renal infarction. The right kidney enhances homogeneously.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctdh1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ctdh2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ctdh3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ctdh4.JPG"], "cat": "ECG"}, {"q": "Carefully observe the following video.\n\nList 3 potential causes of the problem identified.  How would you manage this further?", "a": "An air leak is audible with every inspiratory cycle.  Potential causes for this are a leak of the cuff, malposition of the cuff, a cuffless tube, a tube that is too small to fit the patient's trachea, and a tracheoesophageal fistula.\n\n \n\nTracheoesophageal fistula is the most concerning of these potentials.  TOF is know to complicate either surgical or percutaneously inserted tracheostomy, and may also occur due to traumatic insertion of tubes or hyperinflated cuffs.  Signs of TOF include a leak, inability to generate set tidal volumes, aspiration pneumonitis and enteral feed suctioned from the endotracheal tube.  Investigations may include bronchoscopy and water soluable contrast radiology studies.  Investigations can be difficult however as the presence of the tube can obscure the leak.\n\n \n\nManagement of the patient requires definition of the problem.  If the cuff continues to decompress it may be leaking, requiring a tube exchange.  An adjustable flange tracheostomy tube may enable to tube to be positioned better for the patient.\n\n \n\nAn acquired TOF is thought unlikely to spontaneously close and is usually managed surgically.  If the patient is not stable enough to tolerate surgery initially, they can be managed conservatively with gastric decompression and jejunal feeding with delayed surgery.", "imgs": [], "cat": "Biochemistry"}, {"q": "Name the 5 objects labelled in the image", "a": "A \u2013 Interpeduncular / Suprasella cistern\n\nB \u2013 Temporal horn of the lateral ventricle, slightly dilated\n\nC \u2013 The Uncus of the temporal lobe\n\nD \u2013 The Ambiens cistern\n\nE \u2013 The Quadrigeminal cistern\n\n \n\nTogether A, D and E form the basal cisterns", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/question%202.jpg"], "cat": "Clinical"}, {"q": "A 38 year old male is thrown from his horse.  He has a fractured left femur, left humerus and left clavicle and has a closed head injury.  A catheter is inserted in ED and 200mls of blood stained urine is recovered.  A 3-way catheter is inserted and irrigation is commenced.  His only history is of contrast allergy.\n\n \n\n4 hours later his abdomen has become swollen and diffusely tender, and while it is difficult to tell due to the irrigation, it appears he is passing minimal urine.\n\n \n\nA non contrast CT of his abdomen is performed.\n\n \n\nOutline the abnormalities", "a": "The major features of the scan are :\n\nfull bladder\nnormal kidneys\na mal-positioned indwelling catheter, which appears to breach the urethra at the level of the prostate\nfluid and air in the ischiorectal and femoral spaces\nunilateral fractures to the inferior and superior pubic rami on the right\n\nComment : approximately 10% of male patients with pubic rami fractures can be associated with posterior urethral tears (the part of the urethra adjacent to or inside the prostate).  About 50% of these are completely ruptured.  Clinical suspicion of an injury mandates a retrograde urethrogram, which in this patient was not possible due to contrast allergy.  The management in this setting (attempt at urethral catheter passage vrs elective suprapubic catheter) is not entirely clear.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/129.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/221.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/316.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/412.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/511.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/611.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/712.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/810.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/98.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/108.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1112.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1210.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/136.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/147.JPG"], "cat": "CT"}, {"q": "A 67 year old woman presents to ED with severe abdominal pain and evidence of bowel obstruction.  She is unwell and requires ICU admission following emergency surgery.  You are reviewing her in ED when you review her CT abdomen.\n\n \n\nDescribe the findings", "a": "The CT shows air in the biliary tree and gall bladder. The gall bladder is decompressed, suggesting a fistula with the bowel.\n\n \nThe differential is air in the portal system, but on the coronal views the portal vein can be clearly visualised. Thus, the air is in the biliary tree.\n \nThe stone can be seen at a transition zone which is not easy to visualise. The stone has calcification around it.\n \nThere is a simple cyst in the kidney", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/130.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/222.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/317.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/413.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/512.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/612.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/713.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/811.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/99.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/109.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1113.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1211.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/Answer%2014.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2022.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%203.jpg"], "cat": "CT"}, {"q": "A 81 year old female presents to emergency following a fall.  She has a bruise to her forehead and is complaining of difficulty swallowing.  She is unable to swallow her saliva.  Her history includes atrial fibrillation and a dilated left ventricle, but she has reasonable exercise capacity.\n\n \n\nHer brain CT is normal.  A CT of her neck is shown.\n\n \n\nWhat does it show?", "a": "There is large prevertebral collection in the mid and lower cervical region having a significant positive mass effect upon the cervical oesophagus. It extends from the body of C2 to C7 and measures 3cm in depth and 5.6cm in width.\n\nThe appearance is most likely representing a haemorrhage into the prevertebral space.\n \n\nThere are adjacent spondylitic changes.  There is a suggestion of a tiny osteophyte that has been avulsed from the anteroinferior aspect of the body of C4, but this is not well visualised in the soft tissue windows.  A bone window view of the region (above) clearly demonstrates the fracture.  Because the patient has AF with left ventricular impairment she may be on warfarin, which would have contributed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/137.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/223.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/318.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/414.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/513.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/613.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2015.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2023.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/scout.JPG"], "cat": "ECG"}, {"q": "A 73 year old woman presents to the emergency department with altered level of consciousness.  She has a history of hypertension and was a heavy smoker until 15 years ago.\n\n \n\nFollowing intubation, a head CT is performed.  What does it show?  Does this change your management?", "a": "An ill defined hypodensity is noted in the region of the head of the caudate nucleus on the left side and the adjacent corona radiata, all consistent with chronic ischaemic changes. There is no mass effect or haemorrhage is visible.\nThe rest of the brain parenchyma is relatively normal. The basal cisterns are normal.\nIn summary, there is evidence of a old caudate stroke, but there is nothing on this scan that indicates a new pathology.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/138.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/224.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/319.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/415.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/514.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/614.JPG"], "cat": "Biochemistry"}, {"q": "A 23 year old male presents to ED with an asthma attack.  During a coughing bout he develops acute central chest pain.\n\nA CXR is taken to investigate the problem.  Describe the findings", "a": "The lung fields are clear. The cardiac size is normal. No pleural effusion is visible and there is no evidence of hyperinflation or aspiration.\n\nA thin white linear opacity is seen on either side of the mediastinum consistent with a pneumomediastinum. A few streaky lucencies are noted in the superior mediastinum and neck consistent with surgical emphysema.\n \nComment : The causes of a pneumomediastinum could include Mallory Weiss tear, Boerhaaves Syndrome or a ruptured bullus, the latter in this case being most likely.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CXR%20answer1.JPG"], "cat": "X-Ray"}, {"q": "A 75 year old man presents following a motor vehicle accident. His mediastinum is noted to be abnormal on plain CXR and a CT chest is arranged.\n\n \nWhat abnormality is present on the CT?", "a": "A 3 x 2.5 x 2cm saccular aneurismal dilatation noted in the AP window region of the ductus arteriosus from the inferior arch of the aorta. The aneurysm is thrombosed with a small area of contrast opacification witin it. The communication with the left pulmonary artery is not patent.\nThere is a 3 x 2 x 1.5cm ill defined soft tissue density mass noted in the right lower lobe posteriorly and located on the subpleural aspect. There is no effusion or rib erosion. This may represent an undiagnosed tumour. There is no obvious lymphadenopathy or bony destruction on the views shown here.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/139.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/225.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/320.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/416.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/515.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/615.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/714.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/812.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2016.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/910.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/1011.JPG"], "cat": "X-Ray"}, {"q": "A 55 year old man is transferred from ED after being intubated for a respiratory infection.  He has a background history of moderate-severe chronic obstructive airways disease.\n\nHe is desaturating to 80% on arrival in ICU and the following xray is obtained.\n\nWhat does it show?  How will you manage him?", "a": "The xray shows the classic appearance of right lower lobe collapse.  The features of collapse are loss of airspace and shift of adjacent structures, a homogeneous density in a typical pattern for the lobe involved, and obscuration of adjacent structures.\n\nIn this case, there is loss of airspace on the right with shift of the mediastinum to the right.  The diaphragm is no longer visible, and no air bronchograms can be seen.  The collapsed right lower lobe sits flattened against the diaphragm.\n\nThere is also an area of atelectasis on the left.\n\nThe most likely cause is a sputum plug but other causes such as tumour should be excluded.  Suctioning of the airway, including via bronchoscopy, chest physiotherapy and higher PEEP levels will assist in recruitment of this lung region.  Of course, maintaining high FiO2 in the short term is warranted to maintain normal saturations.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CXR%20answer%201.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CXR%20answer%202.jpg"], "cat": "ABG"}, {"q": "A 67 year old man is transferred to your unit with a severe exacerbation of his chronic obstructive airways disease.  He is on 75% oxygen, maintaining saturations of 92%.  The following xray is obtained.\n\nWhat does it show?", "a": "There is severe bullous lung disease at the apices.  These look like pneumothoraces, as there is loss of tissue density there, but fine septal lines can be seen running across them.  It can be very difficult to exclude a pneumothorax under these circumstances and a CT may be necessary.\n\nIn this case, CT confirmed severe bullous lung disease.\n\nComment : the most common cause of bullous emphysema is smoking.  This classically affects the apices of the lung much more than the bases.   The associated hyperinflation can compress the lower zones, giving them a streaky infiltrate appearance, as seen in this example.\n\nCertain conditions can give a different distribution - for example, alpha-1-antitrypsin deficiency primarily affects the bases of the lungs more than the apices.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CXR4.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/cxr%20ct%20answer.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/cxr%20ct%20answer%202.jpg"], "cat": "X-Ray"}, {"q": "A 44 year old man is involved in an industrial accident.  A 2 tonne vault door has swung wildly and hit him in the face, throwing him backwards.\n\nFollowing initial management of his airway, he is transferred to CT for further imaging.\n\nDescribe the findings", "a": "There is relative widening of the predental space between the C1 and C2 vertebrae as well as widening of the facets between the C1 and two vertebrae.  These findings would indicate a distraction injury between C1 and C2 involving the soft tissues. \n\n \n\nThere is extensive fracturing of the facial bones which are comminuted and involving most of the bones from the mid orbit to the roof of the maxilla, including the zygomatic arches and pterygoid plates.  This type of injury is known as a Leforte 3 fracture, resulting in complete craniofacial disconnection.  Packing material is present in the mouth and upper airway, presumably to stop bleeding.  There is an ETT and NGT in a good position.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/140.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/226.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/321.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/417.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/516.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/616.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/715.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/813.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/911.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/1012.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/1114.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/1212.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/1310.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/148.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/154.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/165.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/173.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/183.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/193.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/202.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2017.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%2031.jpg"], "cat": "Clinical"}, {"q": "A 78 year old man presents to ED with an altered conscious state.  He is not guarding his airway appropriately and is intubated.  He has no focal neurological signs.  Electrolytes and glucose are normal and there is no evidence of head trauma or seizure activity.\n\nA head CT is performed.  What does it show?", "a": "There is an defined hypodensity  noted in the region of the head of the caudate nucleus on the left side and the adjacent corona radiata.  No mass effect can be identified nor is there evidence of surrounding oedema.  This is consistent with chronic ischaemic changes.\n\n \nNo haemorrhage visualised. The rest of the brain parenchyma is relatively normal. No hydrocephalus visualised and the basal cisterns are normal.\n \nComment : chronic ischaemic changes are often seen in the brain CTs of elderly patients.  Surrounding oedema, as evidenced by ill defined low density change around the lesion, and by the presence of mass effect, are signs that the lesion is acute.\nIn this case, the CT is not contributory", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/149.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/227.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/322.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/418.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/517.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/617.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/answer%204.JPG"], "cat": "Biochemistry"}, {"q": "A 34 year old female presents with intermittant chest tightness and shortness of breath.  She has a strong family history of coronary artery disease and is a smoker, but is otherwise healthy.  She has had no respiratory problems.\n\nThe following ECG is taken when she is pain free.  Describe the findings.", "a": "The ECG is typical of Type 1 Wellen's syndrome, which is highly suggestive of a high grade LAD or left main coronary lesion.\n\n \n\nComment :\n\nThere are two types of Wellen's syndrome.\n\nIn Type 1 Wellen's Syndrome there are biphasic T waves in the anterior leads, and occurs when the patient is pain free.  During episodes of pain, there is a paradoxical pseudonormalisation of the ST segments. This picture occurs in 25% of Wellens Syndrome presentations and is suggestive of a critical proximal Left Anterior Descending Coronary Artery lesion. It is also known as LAD coronary T-wave syndrome.\n\nThis lesion needs early recognition and emergent PCI as it can go on to cause infarction of  anterior wall within a mean of 8.5 days even if treated with medical management.\n\nType 2 Wellens - The other 75 % of Wellens patients present with deep symmetrical T wave inversions across leads 1 and AVL and the V leads with 1 mm ST elevation.\n\nCriteria for Wellens Syndrome\n\nPrior history of chest pain\nChest pain with normal looking ECG (pseudonormalisation)\nNormal of minimally elevated cardiac enzymes\nNo pathological precordial Q waves or loss of R wave progression\nPainfree ST segment elevation in V2 & V3 that is isoelectric or minimally elevated (1mm), concave or straight or\nSymmetric and deep T wave inversion or biphasic T waves in V2 -V5 of V6 in pain free periods\nTight proximal LAD stenosis.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ECG1.jpg"], "cat": "ECG"}, {"q": "A 76 year old woman presents to emergency with progressive respiratory distress.  A chest xray has been taken after a procedure.\n\nWhat does the xray show?\n\nWhat procedure has been performed?\n\nList 3 potential causes", "a": "The xray is an erect chest film taken in the AP orientation.  She is clearly unwell, with ECG monitoring, oxygen tubing and a right subclavian CVC in place.  There is an homogenous opacity in the lower zone of her left hemithorax, with loss of the diaphragmatic and left heart borders.  The opacity seems to creep up the lateral chest wall (a meniscus sign).  There is no shift in the mediastinum.  These features are consistent with a large left pleural effusion.\n\nA radio-opaque catheter appears to sit within the pleural space of the left chest - this is a pigtail drain.\n\nThere are multiple causes of pleural effusion.  They are loosely categorised as exudative and transudative effusions.  Exudative infusions are usually related to pathology of the lung (infection, pulmonary embolus, cancer) while transudates are mostly due to more global problems (cardiac failure, sepsis, fluid overload).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF152xr.jpg"], "cat": "ECG"}, {"q": "A 45 year old man presents to ED following a motor vehicle accident.  He was unrestrained an appears to have hit the windscreen, with major damage to his face and chest.\n\nA lateral C-spine film is taken.  What does it show?", "a": "This film is a lateral C-spine film.  It is incomplete as the C7-T1 junction is not visible.\n\nThere is loss of the normal alignment at C2, suggesting a fracture of the dens with posterior displacement.  There is also disruption of the posterior elements of the atlas (C1) with evidence of some distraction.  This represents a very unstable injury.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF68xr.jpg"], "cat": "Clinical"}, {"q": "An 11 year old boy has fallen off a trampoline 6 hrs earlier and presents having vomited 4 times in the last 2 hours. Please describe the changes present on CT.", "a": "A moderately large left frontal extradural haematoma secondary to a minimally displaced left frontal bone fracture . There is associated sulcal effacement and sub falcine herniation.  No contrecoup injury is demonstrated. A paediatric neurosurgical opinion is required..", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/sc1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/sc2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/sc32.JPG"], "cat": "Biochemistry"}, {"q": "A 55 year old man has presented to ED with sudden onset right sided chest pain and pain in his right leg\n\n1. Describe the abnormalities present on the following CT.\n\n2. Outline the immediate management issues", "a": "1. This is a contrast CT of the chest and abdomen, showing an extensive Type A thoracic aortic dissection. The ascending aorta is aneurysmal, and the Type A dissection extends from just above the root to the aortic bifurcation. There is a large low-density pericardial effusion. The coeliac axis, left renal artery and the inferior mesenteric artery arise from the true lumen. The right renal artery and SMA arise from the false lumen. There is an origin stenosis of the superior mesenteric artery of approximately 50%.\n\n \n\n2. This is a medical emergency. The patient has a Type A dissection with retrograde spread involving the\n\n pericardium (hence the pericardial collection), and extensive dissection threatening blood flow to organs.\n\n- Resuscitate - A,B,C\n\n- Referral - Cardiac surgical\n\n- Assessment of dissection- Echo to assess aortic valve competence, extent of pericardial effusion, myocardial wall motion abnormality due to involvement of coronary vessels,\n\n- Medical stabilisation- control \"shear stress\" with rate and blood pressure control (B-blockers, GTN, SNP ,etc).\n\n- Surgical intervention - In type A surgery superior to medical management.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ad2.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ad3.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ad4.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ad5.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ad6.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ad7.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/ad8.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/3d1.JPG"], "cat": "X-Ray"}, {"q": "What is the following piece of equipment?\n\nHow is it inserted?\n\nList 3 immediate complications from this device", "a": "Balloon tipped temporary transvenous pacing wire\n\nAccess to the major veins must first be obtained.  The natural curve of the catheter favours insertion of a sheath into the right internal jugular / left subclavian vein.  However, other sites are possible.\n\nThe pacing wire is inserted into the sheath.  Once the tip and balloon are in the vein, the balloon is carefully inflated.  Blood flow carries the balloon tip through the tricuspid valve and into the right ventricle.  The balloon should then be deflated or the balloon can be carried into the RVOT and out of the ventricle.\n\nAttaching the distal electrode to a V2 lead allows comparison of the electrical signal from the balloon tip with a surface ECG.  A classical pattern of ECG changes from the tip is seen that can assist location of the device.  When the tip is located in the atrium, the P wave is enlarged.  As the catheter passes into the right ventricle the P wave inverts and the QRS waves increase in amplitude.  Contact with the RV myocardium induces a \"pattern of injury\" signal in the ST segments.\n\nBlind insertion has been described.  The pacing wire is inserted while connected to the pacing box, with pacing signals being sent.  Monitoring of surface ECG for evidence of electrical capture is used to determine adequacy of placement.  While this procedure is often faster and may be effective, it provides little information on position during the procedure.\n\nComplications at the time of insertion include :\n\nbleeding\npneumothorax\narrhythmia\nright ventricular perforation\nmalposition", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/floatation%20pace%20wire.JPG"], "cat": "ECG"}, {"q": "A 56 year old male is in intensive care following an o
