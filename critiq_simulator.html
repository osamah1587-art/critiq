<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crit-IQ Data Interpretation Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#21262d;--teal:#00b4d8;--teal-dim:#0077a0;--red:#f85149;--green:#3fb950;--yellow:#d29922;--purple:#a371f7;--text:#e6edf3;--muted:#8b949e;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
/* HEADER */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#hdr h1{font-family:var(--mono);font-size:13px;color:var(--teal);letter-spacing:.08em;text-transform:uppercase}
#hdr-meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
#prog-bar{height:2px;background:var(--border)}
#prog-fill{height:100%;background:var(--teal);transition:width .3s}
/* MAIN */
#main{max-width:800px;margin:0 auto;padding:28px 20px 80px}
/* START */
#scr-start{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:24px;text-align:center}
.logo{font-family:var(--mono)}
.logo .big{font-size:42px;font-weight:600;color:var(--teal);line-height:1}
.logo .sub{font-size:12px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:6px}
.stats-row{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stat{background:var(--surface);padding:14px 20px;text-align:center;min-width:90px}
.stat .v{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--teal)}
.stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
/* FILTERS */
.filter-section{width:100%;max-width:600px}
.filter-label{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;text-align:left}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:4px;transition:all .15s}
.cat-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(0,180,216,.08)}
.cat-btn.all-btn{border-color:var(--teal);color:var(--teal)}
.mode-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mode-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 18px;font-family:var(--mono);font-size:12px;cursor:pointer;border-radius:4px;transition:all .15s}
.mode-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(0,180,216,.08)}
.btn-start{background:var(--teal);color:#000;border:none;padding:13px 48px;font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:background .15s}
.btn-start:hover{background:#00c8f0}
/* QUESTION */
#scr-q{display:none}
.q-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.q-num{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.q-cat-tag{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:3px;border:1px solid}
.tag-ABG{color:#00b4d8;border-color:rgba(0,180,216,.4);background:rgba(0,180,216,.08)}
.tag-ECG{color:#a371f7;border-color:rgba(163,113,247,.4);background:rgba(163,113,247,.08)}
.tag-XRay,.tag-X-Ray{color:#d29922;border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.08)}
.tag-CT{color:#f0883e;border-color:rgba(240,136,62,.4);background:rgba(240,136,62,.08)}
.tag-Echo{color:#3fb950;border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.08)}
.tag-Biochemistry{color:#58a6ff;border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.08)}
.tag-Haematology{color:#f85149;border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.08)}
.tag-MRI,.tag-Ultrasound,.tag-Waveforms,.tag-Equipment,.tag-Clinical{color:#8b949e;border-color:rgba(139,148,158,.4);background:rgba(139,148,158,.08)}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px}
.q-text{font-size:14px;line-height:1.75;white-space:pre-wrap;color:var(--text)}
.abg-table{width:100%;border-collapse:collapse;margin:14px 0;font-family:var(--mono);font-size:13px}
.abg-table th{background:rgba(0,180,216,.1);color:var(--teal);padding:7px 12px;text-align:left;border-bottom:1px solid var(--teal-dim);font-weight:600}
.abg-table td{padding:6px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.abg-table tr:last-child td{border-bottom:none}
.ans-box{background:rgba(63,185,80,.04);border:1px solid rgba(63,185,80,.25);border-radius:8px;padding:22px;margin-bottom:16px;display:none}
.ans-box.show{display:block}
.ans-lbl{font-family:var(--mono);font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ans-lbl::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block}
.ans-text{font-size:14px;line-height:1.75;white-space:pre-wrap;color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:10px 22px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;border-radius:4px;border:none;transition:all .15s}
.btn-reveal{background:var(--teal);color:#000}
.btn-reveal:hover{background:#00c8f0}
.btn-next,.btn-finish{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-next:hover,.btn-finish:hover{border-color:var(--teal);color:var(--teal)}
.self-row{display:none;gap:8px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px;flex-wrap:wrap}
.self-row.show{display:flex}
.btn-self{padding:7px 16px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;border-radius:4px;border:1px solid;background:transparent;transition:all .15s}
.btn-got{color:var(--green);border-color:rgba(63,185,80,.5)}
.btn-got:hover{background:rgba(63,185,80,.1)}
.btn-miss{color:var(--red);border-color:rgba(248,81,73,.5)}
.btn-miss:hover{background:rgba(248,81,73,.1)}
/* RESULTS */
#scr-results{display:none}
.res-hdr{text-align:center;margin-bottom:32px}
.res-hdr h2{font-family:var(--mono);font-size:28px;color:var(--teal);margin-bottom:6px}
.res-hdr p{color:var(--muted);font-size:13px}
.big-score{text-align:center;margin:24px 0}
.big-score .num{font-family:var(--mono);font-size:64px;font-weight:600;line-height:1}
.big-score .pct{font-family:var(--mono);font-size:20px;color:var(--muted);margin-top:4px}
.score-g{color:var(--green)}.score-m{color:var(--yellow)}.score-b{color:var(--red)}
.cat-breakdown{margin:24px 0}
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.cat-row .cat-name{width:130px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;transition:width .5s}
.cat-score{font-family:var(--mono);font-size:12px;width:60px;text-align:right}
.review-list{margin:24px 0}
.review-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.review-item:hover{color:var(--teal)}
.dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-g{background:var(--green)}.dot-r{background:var(--red)}.dot-n{background:var(--muted)}
.btn-restart{background:var(--teal);color:#000;border:none;padding:13px 48px;font-family:var(--mono);font-size:14px;font-weight:600;cursor:pointer;border-radius:4px;display:block;margin:32px auto 0}
@media(max-width:600px){#main{padding:20px 14px 60px}.big-score .num{font-size:48px}.stats-row{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="hdr">
  <h1>Crit-IQ // Data Interpretation</h1>
  <div id="hdr-meta" style="font-family:var(--mono);font-size:12px;color:var(--muted)">517 questions</div>
</div>
<div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
<div id="main">

<!-- START -->
<div id="scr-start">
  <div class="logo">
    <div class="big">Data Interpretation</div>
    <div class="sub">Crit-IQ Simulator — 517 Questions</div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="v">517</div><div class="l">Questions</div></div>
    <div class="stat"><div class="v" id="best-disp">—</div><div class="l">Best %</div></div>
    <div class="stat"><div class="v" id="done-disp">0</div><div class="l">Reviewed</div></div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Category Filter</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div class="filter-section">
    <div class="filter-label" style="margin-bottom:10px">Mode</div>
    <div class="mode-row">
      <button class="mode-btn on" onclick="setMode('seq',this)">Sequential</button>
      <button class="mode-btn" onclick="setMode('rand',this)">Random</button>
      <button class="mode-btn" onclick="setMode('wrong',this)">Review Wrong</button>
    </div>
  </div>

  <button class="btn-start" onclick="startExam()">Start Session</button>
  <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">Source: Crit-IQ Data Interpretation</div>
</div>

<!-- QUESTION -->
<div id="scr-q">
  <div class="q-hdr">
    <span class="q-num" id="q-num-lbl">Q1 / 517</span>
    <span class="q-cat-tag" id="q-cat-tag">ABG</span>
  </div>
  <div class="q-card"><div class="q-text" id="q-body"></div></div>
  <div class="ans-box" id="ans-box">
    <div class="ans-lbl">Model Answer</div>
    <div class="ans-text" id="a-body"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-reveal" id="btn-reveal" onclick="revealAns()">View Answer</button>
    <button class="btn btn-next" id="btn-next" onclick="nextQ()" style="display:none">Next →</button>
    <button class="btn btn-finish" id="btn-fin" onclick="showResults()" style="display:none">Finish</button>
  </div>
  <div class="self-row" id="self-row">
    <span>Self-assess:</span>
    <button class="btn-self btn-got" onclick="markSelf(true)">✓ Got it</button>
    <button class="btn-self btn-miss" onclick="markSelf(false)">✗ Missed</button>
  </div>
</div>

<!-- RESULTS -->
<div id="scr-results">
  <div class="res-hdr">
    <h2>Session Complete</h2>
    <p id="res-sub"></p>
  </div>
  <div class="big-score">
    <div class="num" id="res-num"></div>
    <div class="pct" id="res-pct"></div>
  </div>
  <div class="cat-breakdown" id="cat-breakdown"></div>
  <div class="review-list">
    <div class="review-lbl">Question Review</div>
    <div id="review-items"></div>
  </div>
  <button class="btn-restart" onclick="goHome()">New Session</button>
</div>

</div>
<script>
const ALL_Q = [{"q": "A 49 year old morbidly obese male is on the ward following a total knee replacement. He has a PCA running. You are asked about his pre-operative blood gases.\n\nVariable\n\t\nValue\n\t\nRange\n\n\nFiO2\n\t\n0.21\n\t\n \n\n\npH\n\t\n7.32\n\t\n7.35-7.45\n\n\nPaO2\n\t\n41\n\t\n75-100\n\n\nPaCO2\n\t\n64\n\t\n35-45\n\n\nHCO3-\n\t\n33.9\n\t\n24-30\n\n\nSBE\n\t\n6.1\n\t\n-3 - +3\n \nDescribe the acid-base abnormality\nWhat is the likely cause?\nWhat does Standard Base Excess mean?", "a": "The patient has a chronic, compensated respiratory acidosis. This is most likely due to alveolar hypoventilation due to Obstructive Sleep Apnoea. There is a rise in the A-a gradient (29) which suggests there is also a problem with his lungs.\n\n \nComment : Base excess is the amount of acid required to bring the system back to a normal pH (7.40) when the CO2 has been corrected to 40mmHg and temperature 37 degrees. This therefore represents the metabolic contribution to the acid-base disturbance. This component may be part of the primary problem or may be compensatory. This is the ‘actual base excess’ or ABE.\n \nBuffering however is influenced by the presence of haemoglobin, and consequently Standard Base Excess is corrected for Hb to more accurately reflects the base excess in the extracellular fluid.\n \nIts also worth noting that when blood is deoxygenated the SBE moves slightly in the alkaline direction (becomes more positive).", "cat": "ABG"}, {"q": "A 76 year old man is recovering from abdominal sepsis following a routine colectomy. He is known to have smoking related lung disease. He was haemofiltered until yesterday and still has high nasogastric aspirates. He is struggling to wean from the ventilator and his CO2 remains high.\n \nThe following Arterial Blood Gases are obtained.\n\n \n\nFiO2\n\t\n0.21\n\t\n \n\n\npH\n\t\n7.54\n\t\n7.35-7.45\n\n\nPaO2\n\t\n61\n\t\n75-100\n\n\nPaCO2\n\t\n52.1\n\t\n35-45\n\n\nHCO3-\n\t\n47.4\n\t\n24-30\n\n\nSBE\n\t\n23.7\n\t\n-3-+3\n\n \n\n \nWhat is the acid-base disturbance?\nWhat are the likely causes?\nList 3 potential factors which perpetuate the alkalosis", "a": "There is a primary metabolic alkalosis which is appropriately compensated.  In this case it is likely that large nasogastric aspirates coupled with volume depletion are causing it.  Patients who have been haemofiltered using lactate-containing fluids also often develop an alkalosis.\n\n \n\nThe kidney has a great ability to remove high levels of bicarbonate.  As such, it is often stated that once an alkalosis is set up, a mechanism is required to maintain it.\n\n \n\nAlkalosis may be perpetuated by\n\nvolume depletion / chloride deficiency\nadrenocorticoid deficiency\nimpaired tubular function\nsevere hypokalaemia\nsevere hypomagnesaemia\n\n \n\nCompensation rule-of-thumb in metabolic acid base disturbances\n\nCO2 is approx same as last 2 digits of pH (in range 7.1 - 7.60)\n\n \n\nExpected compensation by bicarbonate\n\n0.6mmHg CO2 per mmol HCO3 in alkalosis\n1.2mmHg CO2 per mmol HCO3 in acidosis\nCO2 is (1.5xBic)+8 in acidosis\nCO2 is (0.9xbic)+9 in alkalosis\n\n \n\nExpected compensation by base excess\n\nChange in PaCO2 = Change in SBE in metabolic acidosis\nChange in PaCO2 = 0.6 x change in SBE", "cat": "ABG"}, {"q": "A 50 year old man has severe community acquired pneumonia. He has been on Non-invasive ventilation for 2 hours and now requires intubation. The following gases are obtained before and after intubation.\n \n\nValue\n\t\nPre intubation\n\t\nPost Intubation\n\t\nNormal range\n\n\nFiO2\n\t\n1.0\n\t\n1.0\n\t\n \n\n\nPaO2\n\t\n87\n\t\n104\n\t\n75-100\n\n\nPaCO2\n\t\n27\n\t\n58\n\t\n35-45\n\n\npH\n\t\n7.23\n\t\n7.04\n\t\n7.35-7.45\n\n\nHCO3-\n\t\n13.4\n\t\n12.6\n\t\n24-30\n\n\nSBE\n\t\n-13.7\n\t\n-13.1\n\t\n-3-+3\n\n \nInterpret the blood gases?\nWhy has his oxygenation improved?\nWhat is the A-a gradient?\nWhy has he got worse following intubation?", "a": "Prior to intubation he has a severe metabolic acidosis with respiratory compensation. He then develops a superimposed respiratory acidosis following intubation. His A-a gradient is 593 pre intubation and 537 after.\n \nHis oxygenation is likely to have improved from multiple reasons. These include:\nReduced O2 consumption post induction\nImprove respiratory mechanics\nImproved oxygen delivery\nImproved haemodynamics\n \nThis is a common problem. Due to the acute distress of his disease he is tachypnoeic and compensating for his metabolic acidosis. After intubation he is not ventilated as aggressively as he would do himself, allowing his CO2 to rise and his pH to fall precipitously.", "cat": "ABG"}, {"q": "A 29 year old male has developed acute renal failure related to rhabdomyolysis after an industrial crush injury. He is stable and recovering well 5 days later. The following results are obtained:\n \n\nValue\n\t\nResult\n\t\nNormal range\n\n\npH\n\t\n7.47\n\t\n7.35-7.45\n\n\nPaO2\n\t\n107mmHg\n\t\n75-100\n\n\nPaCO2\n\t\n45mmHg\n\t\n35-45\n\n\nSBE\n\t\n+5.4\n\t\n-3-+3\n\n\nHCO3-\n\t\n32.2\n\t\n24-30\n\n\nLactate\n\t\n5.2\n\t\n<2.0\n\n \nDescribe the acid-base disturbance\nExplain the gases\nCould he be breathing room air?", "a": "There is a compensated metabolic alkalosis with hyperlactaemia.  This is commonly seen in patients who are recovering from renal impairment and are being haemofiltered using a lactate-based buffer.  This is because the lactate is metabolised to bicarbonate as the patient recovers, generating a metabolic alkalosis.", "cat": "ABG"}, {"q": "A 22 year old female is admitted ventilated to ICU with an overdose of a benzodiazepine. The following arterial blood gas is obtained on arrival in ICU.\n \n\npH\n\t\n7.60\n\t\n7.35-7.45\n\n\nPaO2\n\t\n100\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n20\n\t\n35-45mmHg\n\n\nHCO3\n\t\n19\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n0\n\t\n-3-+3mmol/L\n\n \nWhat does the blood gas show?\nWhy does the bicarbonate fall?\nHow will you adjust the ventilator?", "a": "There is a marked respiratory alkalaemia. The base excess is within the normal range so there is little or no metabolic compensation. The PaO2 is acceptable.\n \nThe bicarbonate falls because as the CO2 is removed, the equilibrium of the Henderson-Hasselbach equation shifts to the left, resulting in consumption of H+ and HCO3-.\n \nH2O + CO2 ó H2CO3 ó H+ + HCO3-\n \nThe patient is being over-ventilated. The CO2 is inversely proportional to the minute ventilation, which can be reduced in one of 2 ways, either the respiratory rate or the tidal volume.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "At 2 a.m. the night intern brings an arterial blood sample to ICU from a 71 year old man who is on the medical ward with lobar pneumonia. She is worried that he has received too much oxygen (he is currently on 8L/min).\n \n\npH\n\t\n7.15\n\t\n7.35-7.45\n\n\nPaO2\n\t\n80\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n65\n\t\n35-45mmHg\n\n\nHCO3\n\t\n22\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n-8\n\t\n-3-+3mmol/L\n\n \nWhat do the gases show?\nHow will you advise the intern to adjust the oxygen?", "a": "There is a marked acidosis and the CO2 is high, consistent with a respiratory acidosis. You would expect the HCO3 to be higher, and the base excess is very low, which both indicate the co-existance of a metabolic acidosis (a mixed acidosis). The PaO2 is acceptable, but the A-a gradient is clearly raised, indicating the presence of significant lung pathology. This is type 2 respiratory failure.\n \nThe patient is clearly very sick and needs the oxygen. It is difficult to say if the patient is normally dependent on hypoxic respiratory drive, but there is currently no evidence of a chronic respiratory acidosis. Reducing the oxygen is clearly not appropriate.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "An intern brings the following arterial gases to the ICU. They were taken from a 73 year old woman who was admitted to the medical ward with new onset atrial fibrillation. She has Chronic Obstructed Respiratory Disease due to a heavy smoking history. She is concerned the patient is a “CO2 retainer”.\n \n\npH\n\t\n7.35\n\t\n7.35-7.45\n\n\nPaO2\n\t\n50\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n64\n\t\n35-45mmHg\n\n\nHCO3\n\t\n34\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+5\n\t\n-3-+3mmol/L\n\n \nWhat do the gases show?\nIs this consistent with a CO2 retainer?\nWhat will you advise the intern to do with oxygen therapy?", "a": "The PaO2 is low. We don’t know how much oxygen the patient is on, if any. The pH is borderline and the CO2 is high, consistent with a respiratory acidosis. The base excess of +5 indicates a metabolic alkalosis which in this case is compensatory. The degree of rise of the bicarbonate reflects a chronic respiratory acidosis.\n \nThese gases are consistent with a chronic respiratory acidosis. Patients with this picture are often reliant on their hypoxic drive.\n \nIf oxygen therapy is required, it is important to closely monitor her for loss of her hypoxic drive. This would include close clinical observation (respiratory rate, conscious state) and regular arterial blood sampling. Oxygen therapy should be tailored to maintain sats of no higher than 92%. Oxygen therapy can be closely controlled by using fixed fraction devices such as venturi masks.\n \nComment : Compensation for respiratory acidosis can be assessed with numerous formulae. For example :\nHCO3 should rise 1 (if acute) and 3-4 (if chronic) for every 10mmHg the PaCO2 rises\nStandard base excess changes by 0.4 x the change in PaCO2 in chronic respiratory acidosis, but does not change in acute.\n \nCO2 will rarely rise higher than 45mmol/L\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)\nCheck out our n", "cat": "ABG"}, {"q": "You are asked to review a patient on surgical floor who was admitted with peripheral vascular disease. He has become increasingly septic and is now in respiratory distress. The following blood gases are obtained.\n \n\npH\n\t\n7.15\n\t\n7.35-7.45\n\n\nPaO2\n\t\n170\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n25\n\t\n35-45mmHg\n\n\nHCO3\n\t\n8.4\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n-18.6\n\t\n-3-+3mmol/L\n\n \nWhat do the gases show?\nExplain the results\nWhy is the patient short of breath?", "a": "The PaO2 is higher than normal, indicating the patient is on supplementary oxygen. It would be useful to know how much to assess the A-a gradient. There is a marked acidosis and the bicarbonate and Base Excess are extremely low, indicating severe metabolic acidosis. The CO2 is low due to compensatory hyperventilation, but is not as low as it should be.\n \nThe metabolic acidosis is likely to be due to severe sepsis with impaired peripheral perfusion, and the impaired respiratory compensation indicates the patient is tiring or becoming obtunded. He is clearly very sick.\n \nThe patient is hyperventilating to compensate for the metabolic acidosis. He may also have dyspnoea due to worsening lung function such as ARDS or cardiac pulmonary oedema. If we knew the FiO2 we could assess the A-a gradient – a rise in the A-a gradient would indicate pulmonary pathology.\n \nComment : Acute metabolic acidosis can be assessed for compensation in a number of ways.\nPaCO2 = 1.5xHCO3 + 8\nDPaCO2 = 1.2xDHCO3\nDPaCO2 = DBE\n \nThe easiest rule of thumb to remember is that the PaCO2 should be the same as the first 2 digits after the decimal point of the pH.\n \n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "These gases have been taken from a patient who is semi-conscious and shut down. The resident says at least the PaCO2 is normal.\n \n\npH\n\t\n7.16\n\t\n7.35-7.45\n\n\nPaO2\n\t\n39\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n42\n\t\n35-45mmHg\n\n\nHCO3\n\t\n14.5\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n-14\n\t\n-3-+3mmol/L\n\n \nDescribe the abnormalities\nIs the PaCO2 normal?", "a": "The patient is grossly hypoxic, and even more so if the patient is on oxygen. There is a marked metabolic acidosis. \n \nThe PaCO2 is in the normal range if there is no metabolic abnormality. The PaCO2 would be expected to be low if compensation is occurring. Given it is inappropriately normal, the patient has an uncompensated metabolic acidosis. This is probably because the patient is getting weaker, tired or obtunded.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "A 73 year old female with severe emphysema has worsening respiratory distress on the surgical ward following a hysterectomy. The ICU resident brings you a blood gas.\n \n\npH\n\t\n7.43\n\t\n7.35-7.45\n\n\nPaO2\n\t\n61\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n64\n\t\n35-45mmHg\n\n\nHCO3\n\t\n41.3\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+14\n\t\n-3-+3mmol/L\n\n \nDescribe the acid-base disturbance", "a": "On initial inspection, the primary problem appears to be a metabolic alkalosis with mild hypoxia (assuming she is not on oxygen). In chronic metabolic alkalosis of this magnitude the CO2 would be expected to rise 6-8mmHg. It is clearly higher than this. This indicates respiratory acidosis.\n \nIt is very uncommon for respiratory compensation for metabolic alkalosis to result in a PaCO2 higher than 55mmHg, as oxygenation is impaired and the patient’s hypoxic drive kicks in.\n \nAn acute respiratory alkalosis on a chronic respiratory acidosis can resemble a primary metabolic alkalosis. In this case, the clinical history and the overly high PaCO2 suggest the true diagnosis.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "A surgical patient has had a stormy course in ICU following a colonic anastomotic breakdown. She has been ventilated for 2 weeks and has a tracheostomy. She is in the process of being weaned. The following arterial gases are obtained.\n \npH\n\t\n7.44\n\t\n7.35-7.45\n\n\nPaO2\n\t\n84\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n53\n\t\n35-45mmHg\n\n\nHCO3\n\t\n35\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+10\n\t\n-3-+3mmol/L\n \nWhat are the likely causes?\nHow does this gas influence weaning?\nWhat can be done to change it?", "a": "There is a metabolic alkalosis. The CO2 is higher than expected due to respiratory compensation alone.\n \nThe gases indicate that the patient has a marked alkalosis and a co-existant respiratory acidosis. Metabolic alkalosis can be due to volume depletion, diuretics, post dialysis, acid loss (eg NGT losses) or due to metabolic compensation for chronic respiratory acidosis. It is perpetuated by steroids, hypokalaemia and ongoing volume contraction.\n \nThe presence of a respiratory acidosis suggests the patient’s respiratory function is still not adequate to ventilate without assistance.\n \nMetabolic alkalosis may make weaning difficult by impairing respiratory drive. When this is thought worthy of treatment, the options include Acetazolamide (which increases bicarbonate excretion) or dilute hydrochloric acid infusion.\n \nComment : The body compensates for metabolic alkalosis by hypoventilating and increasing PaCO2. There are a number of methods used to assess the adequacy of compensation including :\nPaCO2 = 0.9(HCO3) + 9\nDPaCO2 = DHCO3 x 0.6\nDPaCO2 = 0.6 x DBE\nThe CO2 = first 2 digits after the decimal point of the pH\n \nThe CO2 rarely exceeds 55mmHg because hypoxia eventuates and stimulates respiration.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "An elderly patient has been admitted with vomiting. He has a history of cardiac failure for which he takes diuretics, and has had a past peptic ulcer. He becomes unresponsive on the ward. The following gases are obtained. The surgical resident thinks the patient has CO2 narcosis\n \n\npH\n\t\n7.59\n\t\n7.35-7.45\n\n\nPaO2\n\t\n34\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n51\n\t\n35-45mmHg\n\n\nHCO3\n\t\n46\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n+25\n\t\n-3-+3mmol/L\n\n \nDescribe the blood gases\nIs the resident right?\nWhat are the likely causes?", "a": "The patient has a severe metabolic alkalosis, with respiratory compensation. The patient is severely hypoxic.\n \nNo, this level of hypercapnoea would not explain his unresponsiveness. The patient is likely to be unconscious due to hypoxia, but other causes should also be excluded (eg intracerebral bleed, hypoglycaemia).\n \nThe cause of hypoxia may be related to impaired respiratory drive caused by severe alkalosis, but other causes should be excluded (eg aspiration, pneumonia, severe cardiac failure, pulmonary embolism). The severe alkalosis is likely to be related to loss of acid in vomit / NGT loss, volume contraction, diuretics and possibly alkali therapy for peptic ulcer disease. Additionally, metabolic alkalosis may be compensating for chronic respiratory acidosis, which is unveiled when the latter is rapidly reversed (eg when the patient has a PE).\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "You are referred a 74 year old lady who has become unconscious on the medical ward. Your resident tells you she is known to be a “CO2 retainer”. She says she was on O2 but took it off after the patient became hypercarbic.\n \n\nTime\n\t\n12.10\n\t\n13.00\n\t\n14.50\n\t\n \n\n\npH\n\t\n7.317\n\t\n7.305\n\t\n7.34\n\t\n7.35-7.45\n\n\nPaO2\n\t\n52\n\t\n83\n\t\n23\n\t\n75-100mmHg\n\n\nPaCO2\n\t\n71\n\t\n101\n\t\n84\n\t\n35-45mmHg\n\n\nHCO3\n\t\n35\n\t\n48\n\t\n44\n\t\n24-30mmol/L\n\n\nBase Excess\n\t\n6.8\n\t\n10.8\n\t\n14.4\n\t\n-3-+3mmol/L\n\n \nWhy has the patient become unconscious?\nExplain why this occurred", "a": "The patient has become unconscious due to severe hypoxia. This is due to chronic respiratory disease coupled with hypercapnoea-induced alveolar hypoxia.\n \nComment : When PaCO2 rises, the concentration of oxygen in the alveolus must fall. This can cause critical hypoxia when severe enough.\n \nIt makes sense to lower the patients oxygen to the minimum necessary to sustain tissue oxygenation without compromising respiratory drive. Aiming for a PaO2 of 60, or saturations of 90%, is appropriate. Removing the oxygen in this case resulted in severe hypoxia and an altered conscious state.", "cat": "ABG"}, {"q": "A 34 year old male is brought into emergency unconscious having been found in a car with the engine running and a hose conducting exhaust into the car. There is also a packet of empty Diazepam and a bottle of whiskey in the car. The folloing gases are obtained in the emergency department on 40% oxygen\n \n\npH\n\t\n7.38\n\t\n7.35-7.45\n\n\nPaO2\n\t\n32\n\t\n75-100mmHg\n\n\nSaO2 (co-oximeter)\n\t\n50%\n\t\n>97%\n\n\nPaCO2\n\t\n48\n\t\n35-45mmHg\n\n\nHCO3\n\t\n28\n\t\n24-30mmol/L\n\n \nAt the time the blood gas was taken, the pulse oximeter reading was 65%.\n \nDescribe the blood gases\nWhat is the apparent cause?", "a": "The blood gases demonstrate gross hypoxia and a mild respiratory acidosis. There is a significant gap between the co-oximeter and the pulse oximeter readings for arterial Hb saturations.\n \nThis is classic of carbon monoxide toxicity. However, the patient’s hypoxia is not explained by this – other problems such as smoke inhalation should be considered.\n \nComment: The co-oximeter of the blood gas measures 6 wavelengths of light as opposed to the 2 measured by pulse oximetry. This enables it to differentiate between Oxyhaemoglobin and carboxyhaemoglobin. The pulse oximeter interprets the latter as oxyhaemoglobin, and thus recorded saturations are over-read. This is reflected in the real Hb saturation measured by the co-oximeter.\n \nThere is an additional clue. At a PaO2 of 32, the haemoglobin should be about 60% saturated – the low saturation of 50% is due to carbon monoxide.\n \n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "You are called urgently to see a 32 year old man with ARDS who has suddenly become bradycardic. He is on SIMV, tidal volumes 600ml at rate 20/min with a pressure limit of 40cmH2O.\n \n\nTime\n\t\n0700\n\t\n0720\n\n\nHeart rate\n\t\n90\n\t\n45\n\n\nSystolic blood pressure\n\t\n110\n\t\n60\n\n\nRespiratory rate\n\t\n20\n\t\n20\n\n\nPeak inspiratory pressure\n\t\n35\n\t\n15\n\n\nExhaled tidal volume\n\t\n600\n\t\n220\n\n\nFiO2\n\t\n1.0\n\t\n1.0\n\n\nPaO2\n\t\n70mmHg\n\t\n41mmHg\n\n\nPaCO2\n\t\n45mmHg\n\t\n52mmHg\n\n \nWhy is the patient bradycardic?\nWhat is the underlying problem?", "a": "The patient is not being ventilated. The tidal volumes have fallen and the patient has become hypoxic.\n \nThe exhaled tidal volumes and the peak inspiratory pressures have fallen indicating a leak from the circuit. The most likely sites this occurs is at the end of the endotracheal tube, at the humidifier, where the tubing meets the ventilator, and a leak around the endotracheal cuff.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "A 60 year old woman is ventilated for pneumonia with an SIMV rate of 12 breaths / min, a TV of 700ml with PEEP 5cmH2O. The pressure limit is set to 35cmH2O. Your resident calls you at 0130 because she is sweating and ‘fighting’ the ventilator and the high pressure alarm keeps going off. An extract from her chart is shown below :\n \n\nTime\n\t\n0030\n\t\n0100\n\t\n0130\n\n\nHeart rate\n\t\n90\n\t\n130\n\t\n149\n\n\nSystolic BP\n\t\n120\n\t\n80\n\t\n60\n\n\nRespiratory rate\n\t\n12\n\t\n24\n\t\n16\n\n\nPeak inspiratory pressure\n\t\n24\n\t\n30\n\t\n35\n\n\nExhaled tidal volume\n\t\n700\n\t\n700\n\t\n300\n\n\nFiO2\n\t\n0.4\n\t\n0.4\n\t\n0.6\n\n\nPaO2\n\t\n100mmHg\n\t\n50mmHg\n\t\n54mmHg\n\n\nPaCO2\n\t\n42mmHg\n\t\n49mmHg\n\t\n60mmHg\n\n \nDiscuss the findings\nWhat are the possible causes?\nHow will you manage this?", "a": "The patient has become acutely distressed and is not ventilating adequately. The exhaled tidal volume is reduced because the patient is pressure limiting, resulting in the ventilator cycling from inspiration to expiration. \n \nThe patient may be underventilating because they are fighting the ventilator, but it is more commonly the otherway around. Causes of high pressure limiting include:\nVentilator fault\nObstructed tubing or endotracheal tube\nRight main bronchial intubation\nAcute bronchconstriction\nAcute change in lung compliance eg severe pulmonary oedema\nPneumothorax\nMarked gas trapping (eg due to asthma)\n \nAdditionally an agitated patient may fight the ventilator.\n \nThe patient should be removed from the ventilator and bagged to exclude a ventilator fault. Clinical examination and investigations are required to exclude the above causes. Increased sedation is a last resort.\n \nReference : Practical Intensive Care Medicine. Corke C. 2000 (with permission)", "cat": "ABG"}, {"q": "A 60 year old male presents to the emergency department with abdominal pain and vomiting increasing over the last week.  His history includes hypertension and type 2 diabetes mellitus.\n\nOn examination he is agitated and confused.  His blood pressure is 130/80, respiratory rate 20, heart rate 100 and is afebrile.  He is clammy and cool peripherally.  The following ABG is recorded :\n\n \n\npH\t6.8\nPaCO2\t8.2mmHg\nPaO2\t146mmHg\nHCO3-\t2.1\nLactate\t15.4\nNa\t141\nK\t4.8\nCl\t102\nGlucose\t13.2\n\nOutline the likely causes of this picture", "a": "There is a severe metabolic acidosis.  The anion gap is raised at 29; the change in AG (16) is almost identical to the change in lactate (14), and so is due almost exclusively to lactic acidosis.\n\nThe most likely causes are :\n\nsevere shock\nsepsis\ncardiogenic (risk factors for ischaemic heart disease)\nIntenstinal ischaemia\nMetformin-related lactic acidosis\n\nComment : The mechanism by which metformin causes lactic acidosis is unclear.  These patients can appear shocked, develop multiple organ failure and may mimick an acute abdomen\n\nAccepted risk factors for the development of metformin-related lactic acidosis include advanced age, high dose, renal failure, hypoxia, active alcohol intake and sepsis.  There are also reports in patients without known risk factors.", "cat": "ABG"}, {"q": "A 28 year old woman presented to emergency with rapidly progressive weakness of all 4 limbs and associated myalgias.  She denied sensory symptoms and there was no sign of loss of executive function.  She had no prodromal symptoms.  The following results are obtained :\n\n \n\nBlood results\npH\t7.23\nPaCO2\t29mmHg\nHCO3-\t12meq/L\nBase excess\t-14.1\nNa\t137mmol/L\nK\t0.9mmol/L\nCl\t119mmol/L\nCr\t0.8mg/dL\nBSL\t8.1mmol/L\nCK\t379U/L\nTroponin\tnot detected\n\n \n\n \n\nUrine results\npH\t7.5\nProtein\t4g/L\nNa\t36mmol/L\nK\t37mmol/L\nCl\t22mmol/L\n\n \n\nInterpret the results\n\nExplain the clinical picture", "a": "There is a compensated non-anion gap metabolic acidosis associated with marked hypokalaemia and mild CK rise.  Urine testing indicates proteinuria, an inappropriately high urinary pH for the degree of acidosis, and a positive urinary anion gap.\n\nThese results are in keeping with type 1 or type 2 renal tubular acidosis.  The proteinuria suggests are renal cause.  The weakness is related to the severe hypokalaemia, and should resolve on correction of the potassium level.\n\nComment : The urinary anion gap (Na + K - Cl) can assist in determining if the cause of non-anion gap metabolic acidosis is renal or extra-renal.  Ammonia is the chief mechanism of renal excretion of acid.  To aid excretion it is coupled with chloride.  Consequently, in renal compensation for extrarenal causes, the chloride level is high (thus urinary AG less than 0).  In renal causes, the urinary anion gap is positive.\n\nBeware the use of bicarbonate to rapidly correct pH in this circumstance, as an already low potassium level will fall further, with potentially catastrophic results.\n\nReference :\n\nAnn Clin Biochem 1999; 36:408-422\n\nIntern Emerg Med (2008); 3: 175-177", "cat": "ABG"}, {"q": "A 57 year old alcoholic woman was admitted to ICU following seizures related to abrupt alcohol withdrawal and aspiration pneumonia.  A lorazepam infusion was commenced for simultaneous seizure control and sedation, though doses in excess of 16mg/hr were required.  On day 4 the following gases were obtained :\n\n \n\npH\t6.9\nPaCO2\t40.9\nNa\t127\nK\t3.4\nCl\t93\nHCO3-\t8\nUrea\t20.1\nCreatinine\t188\nLactate\t5.1mmol/L\nGlucose\t13mmol/L\nOsmolality (calculated)\t462mOsm/L\n\nDescribe the results", "a": "The results demonstrate a severe metabolic acidosis which is uncompensated (because the patient is ventilated).  The anion gap is raised (30), which is only partly explained by lactate.  The patient is also hyponatraemic, though there is evidence of severe hyperosmolality, suggesting the hyponatraemia is dilutional.\n\nThe osmolar gap is raised, which together with the raised anion gap raises the possibility of a toxin.\n\nThe likely causes are:\n\nethylene glycol toxicity\nmethanol toxicity\npolyethylene glycol and propylene glycol (constituents of lorazepam)\n\nComment : Both polyethylene glycol and propylene glycol are metabolised to a number of organic acids which can cause an anion gap metabolic acidosis.\n\nIV lorazepam is not available in Australia, but IV diazepam contains significant amounts of propylene glycol and case reports of similar syndromes have occured with its use in large doses.\n\nReference : NEJM 2002; 347:857-858", "cat": "ABG"}, {"q": "A 58 year old male with chronic obstructive airways disease presents with acute shortness of breath, chills and occasional diarrhoea.  The following arterial blood gas is obtained (on 40% oxygen)\n\n \n\npH\t7.44\nPaO2\t96\nPaCO2\t45\nHCO3-\t39\nBase Excess\t+8\n\nDescribe the blood gases\n\nOutline your management", "a": "The blood gases suggest a metabolic alkalosis (supported by the raised pH, bicarbonate and base excess) with respiratory compensation (the high PaCO2).  However the history may also suggest an alternative, an acute respiratory alkalosis on a chronic respiratory acidosis.\n\nIf this is true, the patient is a carbon-dioxide retainer and is dependent on hypoxic drive.  The oxygen should be turned down to maintain saturations of no higher than about 92%.  Frequent blood gases are required to ensure he does not develop hypercarbia.\n\nOther treatment should focus on treatment of his presenting complaint, eg antibiotics, physio, steroids and noninvasive ventilation\n\nComment : the causes of metabolic alkalosis include:\n\nAcid loss\nUpper GIT eg nasogastric suctioning, vomiting\nRenal eg fluid depletion, diuretics, hyperaldosteronism, severe hypokalaemia\nIntracellular shift of hydrogen eg severe hypokalaemia\nColonic adenomas\nExogenous alkali gain\nMilk alkali syndrome\nSome medications\nLactate, citrate administration eg CRRT buffer solutions, massive transfusion\nCompensatory\neg chronic respiratory acidosis", "cat": "ABG"}, {"q": "A 32 year old male with brittle asthma presents to the ICU for management of an acute exacerbation.  He initially self treated with nebulisers and presents as he deteriorated despite this.\n\nIn emergency he is commenced on IV hydrocortisone, continuous nebulisers and antibiotics.  On arrival in ICU he is well perfused, tachycardic at a rate of 124, has arterial saturations of 98% on 10L/min and has a respiratory rate of 28.\n\nHis breathlessness worsens despite improvements in air entry and peak flow measurements.  The following gases are reported:\n\n \n\n \tAdmission\t+4 hours\nFiO2\t0.40\t0.45\npH\t7.53\t7.32\nPaO2\t149\t161\nPaCO2\t22\t21\nHCO3-\t21\t11.7\nSBE\t-2\t-14\nGlucose\t11.2\t12.1\nNa\t141\t143\nCl\t106\t105\n\nDiscuss the blood gas results", "a": "The blood gases on presentation demonstrate a respiratory alkalosis and an enlarged A-a gradient consistent with an acute asthma attack.\n\nIn the second gases, there is a marked metabolic acidosis with a raised anion gap (27).  The change in anion gap is about the same as the change in bicarbonate, suggesting the AGMA explains all the acidosis.  Glucose is relatively normal, making DKA unlikely.  CO2, O2 and clinical findings are unchanged or better suggesting worsening asthma is not the cause.\n\nThe most likely cause is lactic acidosis due to salbutamol therapy, though peripheral hypoxia / shock should be excluded clinically.  The patient is describing increasing breathlessness due to the need for respiratory compensation on top of an acute respiratory condition.\n\nReference :\n\nCrit Care Resusc 2005, 7(2):119-27", "cat": "ABG"}, {"q": "A 14 year old boy is admitted to ICU with vomiting, confusion and listlessness.  He has a history of mild asthma and a complicated repair of a midgut voluvulus at the age of 11.  1 week prior to admission he was started a course of amoxycillin for an otitis media.\n\nThe following results are obtained :\n\n \n\npH\t7.23\nPaO2\t110mmHg\nPaCO2\t21.5mmHg\nBicarbonate\t9mmol/L\nStandard base excess\t-19.1mmol/L\nNa\t142mmol/L\nK\t4.7mmol/L\nCl\t110mmol/L\nLactate\t2.89mmol/L\nGlucose\t7.5mmol/L\n\nList the features of this analysis\n\nWhat is the likely cause?", "a": "There is a marked anion gap metabolic acidosis, with appropriate respiratory compensation.  The high anion gap (28) is not immediately explained as the lactate and the glucose are both normal.\n\nThere are many possible causes of an Anion Gap metabolic acidosis include toxic alcohol ingestion, paraldehyde toxicity, paracetamol toxicity etc.  However, in the context of extensive small bowel resection, the possibility of D-lactate ingestion should be considered.\n\nComment : D-lactic acidosis is a rare disorder characterised by marked CNS symptoms, a markedly raised anion gap and absence of other attributable cause.  It is associated with abnormal gut structure (blind loops, short gut syndrome), ischaemia and bacterial gut overgrowth.  It may be precipitated by antibiotics which select out lactobacillus and streptococcus bovis subtypes.\n\nThe treatment of D-lactic acidosis is usually supportive, withdrawal of contributing factors, restriction of enteral carbohydrate intake and rarely oral antibiotics", "cat": "ABG"}, {"q": "A 70 year old male suffers an out of hospital cardiac arrest.  He is worked on at the scene by intensive care paramedics and regains a spontaneous circulation at 25 minutes.  His bloods on arrival to the emergency department 30 minutes later are listed below :\n\n \n\npH\t7.62\nPaCO2\t30mmHg\nPaO2\t196mmHg\nHCO3-\t30mmol/L\nNa\t140mmol/L\nK\t4.1mmol/L\nCl\t95mmol/L\nGlucose\t10.9mmol/L\n\nDescribe the blood gas results obtained\n\nWhat are the complications of alkalaemia?", "a": "There is a marked alkalosis, and both respiratory and metabolic components contribute to it.  Additionally there is an anion gap metabolic acidosis - there is a triple acid-base disturbance.\n\nThe best explanation is that the patient is being overventilated, has received copious amounts of bicarbonate during the resuscitation, and has a persistant lactic acidosis causing the high anion gap.\n\nAlkalaemia can have effects on multiple systems :\n\nCardiovascular\narteriolar constriction eg cerebral, coronary\npredisposition to catecholamine induced arrhythmias\nRespiratory\nreduced respiratory drive\nsubsequent hypoxia, ventilator dependence\nMetabolic\nStimulation of organic acid production (eg ketones)\nHypokalaemia (weakness, arrhythmias, polyuria)\nHypocalcaemia (tetany, prolonged QTc)\nHypomagnesaemia (arrhythmias, weakness)\nShift of oxyhaemoglobin dissociation curve, reducing O2 offloading at tissue level", "cat": "ABG"}, {"q": "**JFICM Fellowship Exam Question (2008, No.2, Q26.3)\n\nListed below are the co-oximetry data for two patients A & B. What would the pulse oximetry measured saturation be for patient A and patient B?  Give reasons for your answer. \n\nMedia\n1", "a": "Patient A – 90%\n\nPatient B -  90%\n\n \n\nPulse oximetry only uses 2 wavelengths and COHb is measured as OxyHb.", "cat": "Clinical"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q3\n\n A 43 year old man, with no history of previous illnesses is admitted with septic shock requiring administration of high dose vasopressor. His blood results on 40% oxygen, pressure support ventilation are as follows:\n\n\n\n\nParameter\n\n\t\n\nValue\n\n\t\n\nNormal range\n\n\n\n\npH\n\n\t\n\n7.64\n\n\t\n\n7.35-7.45\n\n\n\n\nPaCO2\n\n\t\n\n28 mmHg (3.7 kPa)\n\n\t\n\n35-45 mmHg (4.7-6.0 kPa)\n\n\n\n\nPaO2\n\n\t\n\n189 mmHg (25.2 kPa)\n\n\t\n\n75-98 mmHg (10.0-13.0 kPa)\n\n\n\n\nActual bicarbonate\n\n\t\n\n29 mmol/l\n\n\t\n\n22-26 mmol/l\n\n\n\n\nSodium\n\n\t\n\n147 mmol/l\n\n\t\n\n134-145 mmol/l\n\n\n\n\nPotassium\n\n\t\n\n3.5 mmol/l\n\n\t\n\n3.5-5.1 mmol/l\n\n \n\na. Describe the acid-base abnormality\n\nb. List 3 likely causes of each acid-base abnormality in this patient.", "a": "a. Describe the acid-base abnormality\n\n\nRespiratory and metabolic alkalosis\n\n\nb. List 3 likely causes of each acid-base abnormality in this patient.  \n\nRespiratory alkalosis: Hyperventilation – spontaneous or IPPV induced, septic encephalopathy, pneumonia\n\nMetabolic alkalosis: Diuretics, volume contraction, upper GI losses, steroids.", "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q3\n\n A 41 year old man is admitted to your Emergency Department, unconscious, with the first set of blood results. The second set of blood gases are taken 1 hour later.\n\n \n\n\na. Describe the initial acid-base disturbance\n\nb. List 3 clinical scenarios which may produce such a pattern of arterial blood gas derangement?\n\n \n\n\nMedia\n1", "a": "a. The initial acid-base disturbance is a mixed metabolic and respiratory acidosis with a raised anion gap.\n\n b. Seizures\n\n     Resuscitated cardiac arrest\n\n     Near drowning\n\n     Near hanging", "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No. 2, Q3. \n\nA 48 year old diabetic with a history of alcohol abuse is admitted with abdominal pain and the following results:\n\n\n\na. Give the three most likely diagnoses\n\nb. List two additional investigations that you would perform based on the above information \n\nMedia\n1", "a": "a) Diagnoses: 3 ischaemic bowel, 2 metformin induced lactic acidosis, thiamine deficiency, pancreatitis.\n\n\nb) Two of the following investigations: Diagnostic laparoscopy or laparotomy, CT abdomen, red cell transketolase, lipase", "cat": "Haematology"}, {"q": "A 56 year old female with septic shock and multiple organ failure is admitted to intensive care. She is endotracheally intubated and ventilated. A central venous catheter is inserted into her right subclavian vein, a Vas Cath is inserted into her right femoral vein and a pulmonary artery catheter is inserted via her left subclavian vein.\n\nBlood gas samples are simultaneously taken from all three catheters. The oxygen saturations are as follows:\n50%\n60%\n67%\n \nState which site each of the blood gas samples is taken from and justify your answer                                                                                            \n \n\nJFICM fellowship exam 2008, No.1, Qu. 27", "a": "50% = femoral vein (inferior vena cava) - in sepsis, regional O2 consumption and extraction in gut/splanchnic circulation increases\n60% = pulmonary artery catheter        - pooled blood from SVC and IVC\n67% = subclavian vein (superior vena cava) - in sepsis, cerebral blood flow relatively maintained initially", "cat": "Vital Signs"}, {"q": "16 year old male has been treated all night for diabetic ketoacidosis. In the morning the blood gas printout is as follows:\n\n \n\nBarometric pressure\n\n\t\n\n760\n\n\t\n\nmm Hg\n\n\t\n\n \n\n\n\n\nFiO2\n\n\t\n\n0.21\n\n\t\n\n \n\n\t\n\n \n\n\n\n\npH\n\n\t\n\n7.32\n\n\t\n\n \n\n\t\n\n \n\n\n\n\npO2\n\n\t\n\n100\n\n\t\n\nmm Hg \n\n\t\n\n \n\n\n\n\npCO2\n\n\t\n\n30\n\n\t\n\nmm Hg   \n\n\t\n\n \n\n\n\n\nHCO3-\n\n\t\n\n15.2\n\n\t\n\nmmol/L\n\n\t\n\n \n\n\n\n\nStandard base excess\n\n\t\n\n-11.4\n\n\t\n\nmmol/L\n\n\t\n\n \n\n\n\n\nSodium\n\n\t\n\n136\n\n\t\n\nmmol/L\n\n\t\n\n(135 – 145)\n\n\n\n\nChloride\n\n\t\n\n105\n\n\t\n\nmmol/L\n\n\t\n\n(100 -110)\n\n\n\n\nPotassium\n\n\t\n\n3.5\n\n\t\n\nmmol/L\n\n\t\n\n(3.2 - 4.5)\n\n\n\n\nLactate\n\n\t\n\n1.3\n\n\t\n\nmmol/L\n\n\t\n\n(0.2 - 2.5)\n\n\n\n\nGlucose\n\n\t\n\n5.3\n\n\t\n\nmmol/L\n\n\t\n\n(3.6 – 7.7)\n\n \n\na) Describe the acid-base status. \n\nb) Does he need continuation of insulin therapy over the next 6 hours? Give your reasoning.\n\n \n\n \n\n\t\n\n \n\n\t\n\nReference\n\n\n\n\nNa+\n\n\t\n\n149\n\n\t\n\n135-145 mmol/L\n\n\n\n\nK+\n\n\t\n\n4.5\n\n\t\n\n3.5-5.0 mmol/L\n\n\n\n\nCl-\n\n\t\n\n109\n\n\t\n\n100-109 mmol/L\n\n\n\n\nHCO3-\n\n\t\n\n24\n\n\t\n\n22-33 mmol/L\n\n\n\n\nUrea\n\n\t\n\n40\n\n\t\n\n2.7-8.0 mmol/L\n\n\n\n\nCreatinine\n\n\t\n\n140\n\n\t\n\n50-120 micromol/L\n\n\n\n\nCa++\n\n\t\n\n2.3\n\n\t\n\n2.1-2.6 mmol/L\n\n\n\n\nPO4-\n\n\t\n\n1.4\n\n\t\n\n0.8-1.45 mmol/L\n\n\n\n\nAlbumin\n\n\t\n\n34\n\n\t\n\n33-50 mmol/L\n\n\n\n\nGluc\n\n\t\n\n6.5\n\n\t\n\n3.0-7.8 mmol/L\n\n \n\n c) List 3 differential diagnoses of the above plasma  biochemistry ?                 \n\nSodium\n\n\t\n\n143\n\n\t\n\nmmol/L\n\n\t\n\n(137-145)\n\n\n\n\nPotassium\n\n\t\n\n2.6\n\n\t\n\nmmol/L\n\n\t\n\n(3.1-4.2)\n\n\n\n\nChloride\n\n\t\n\n117\n\n\t\n\nmmol/L\n\n\t\n\n(101-109)\n\n\n\n\nBicarbonate\n\n\t\n\n18\n\n\t\n\nmmol/L\n\n\t\n\n(22-32)\n\n\n\n\nUrea\n\n\t\n\n7.0\n\n\t\n\nmmol/L\n\n\t\n\n(3.0-8.0)\n\n\n\n\nCreatinine\n\n\t\n\n0.08\n\n\t\n\nmmol/L\n\n\t\n\n(0.05-0.12) \n\n \n\nd) List 3 likely causes for the above plasma biochemistry\n\n \n\nJFICM Fellowship Exam 2008 No.1", "a": "a) Raised anion gap metabolic acidosis with appropriate respiratory compensation \nb) The patient will require insulin therapy for the next few hours as the anion gap is raised, indicating ongoing ketoacidosis..\nc )\nDehydration", "cat": "ABG"}, {"q": "The following arterial blood gas and biochemistry results are from a patient with chronic cardiac and respiratory disease and recent profuse vomiting\n\nVariable\n\n\t\n\n \n\n\t\n\n \n\n\t\n\nNormal Range\n\n\n\n\nFiO2\n\n\t\n\n0.4\n\n\t\n\n \n\n\t\n\n \n\n\n\n\npH\n\n\t\n\n7.5\n\n\t\n\n \n\n\t\n\n \n\n\n\n\nPaO2\n\n\t\n\n58\n\n\t\n\nmmH\n\n\t\n\n \n\n\n\n\nPaCO2\n\n\t\n\n47\n\n\t\n\nmmHg\n\n\t\n\n \n\n\n\n\nHCO3\n\n\t\n\n34.8\n\n\t\n\nmmol/L\n\n\t\n\n(22-27)\n\n\n\n\nStandard base excess\n\n\t\n\n10.2\n\n\t\n\nmmol/L\n\n\t\n\n(-2.0 to +2.0)\n\n\n\n\nSodium\n\n\t\n\n137\n\n\t\n\nmmol/L\n\n\t\n\n(135-145)\n\n\n\n\nPotassium\n\n\t\n\n2.5\n\n\t\n\nmmol/L\n\n\t\n\n(3.2-4.5)\n\n\n\n\nChloride\n\n\t\n\n92\n\n\t\n\nmmol/L\n\n\t\n\n(100-110)\n\nDescribe the acid-base and the metabolic disturbance.\nList the potential causes of these abnormalities in this patient\nOutline the management of the metabolic and acid-base disturbance.\n\nJFICM Fellowship Exam 2006 No. 2", "a": "a) The major abnormalities are\n\nmetabolic alkalosis with respiratory compensation\nhypokalaemia and hypochloraemia\nnormal anion gap\nincreased apparent strong Ion difference [(Na + K) - Cl] = 47\n\nb) possible causes\n\ndiuretic therapy\nsteroid therapy\nvomiting from gastric outlet obstruction\npost hypercapnoeic alkalosis\n\nc) management\n\nnormal saline administration\nK supplements\nacetazolamide", "cat": "ABG"}, {"q": "Following cardiopulmonary resuscitation for severe asthma in a 6 year old child the following blood gas results are obtained (she remains unconscious, paralysed and mechanically ventilated). Please explain these results and outline what action you will take.\n\nBarometric pressure = 760 mmHg\nFiO2 0.5\npH 6.65 (7.35-7.45)\npCO2 212 (35-45 mmHg)\npO2 90 mmHg\nHCO3 23 (20-30 mmol/L)\nLactate 12 (<2 mmol/L)\n\nJFICM Fellowship Exam 2005 No. 2", "a": "Features\n\nSevere respiratory acidosis\nNormal A-a gradient\nHyperlactataemia\n\nSevere respiratory acidosis with normal A-a gradient suggests severe asthma without prominant pulmonary parenchymal damage.  The normal bicarbonate suggests that there is inadequate compensation for the acidosis (ie there is also a metabolic acidosis related to the lactic acidosis).\n\nThe lactic acidosis could represent peripheral tissue anaerobic metabolism due to hypoxia and/or hypoperfusion.  It could also be due to salbutamol or adrenaline infusions which are commonly used in severe asthma", "cat": "ABG"}, {"q": "A 22 year old previously well female is admitted to ED with acute pleuritic chest pain.  The has a temp of 37.5 degrees celcius, heart rate 110, blood pressure 110/70 and respiratory rate of 20.  Her chest is clear, as is her CXR.  The following arterial blood gas is obtained on room air.\n\n \n\npH\t7.58\t7.35-7.45\nPaO2\t70\t85-100mmHg\nPaCO2\t30\t35-45mmHg\n\nDescribe the results of the blood gas\n\nWhat is the likely diagnosis?  What would you expect to see on the ECG?", "a": "There is a respiratory alkalosis with a raised A-a gradient (40).  These findings are consistent with acute pulmonary embolus, though other causes should be considered (eg pain, respiratory stimulant drugs, sepsis etc).  The low grade fever and increased respiratory rate fit with acute PE.\n\nThe ECG in acute pulmonary embolus can be variable.  The most common feature is sinus tachycardia and may be normal.  Other changes that can occur include evidence of RV acute overload :\n\nprominent R wave in V1\nRight bundle branch block\nRight axis deviation\n\nThe classically described \"S1Q3T3\" pattern is actually quite rare.\n\nComment : Assuming that this was acute respiratory alkalosis, the bicarbonate would be expected to be 2 above normal (~30mmol/L).", "cat": "ABG"}, {"q": "A 70 year old woman is recovering in ICU following routine aortic valve replacement.  She is slow to progress due to respiratory failure, and a transoesophageal echocardiogram is performed to evaluate her cardiac function.  She is given 40mg propofol and 2mg midazolam, and her airway is anaesthetised with lignocaine spray.  The echocardiogram is performed without incident and demonstrates normal prosthetic valve function and vigorous LV function.\n\n30 minutes after the procedure she is noted to desaturate.  Her sats progressively fall to 85% and she has profound cyanosis.  Despite hand ventilation on 100% oxygen, her saturations fail to improve.  An arterial blood gas is taken.\n\n \n\npH\t7.48\nPaCO2\t41mmHg\nPaO2\t424mmHg\nHCO3\t31mmol/L\nSats\t99.9%\n\nThe arterial blood is noted to be dark brown in colour\n\nDescribe the gases and explain the results.  What would you do?", "a": "There is a mild metabolic alkalosis.  There is a marked discrepancy between the pulse oximeter and the \"Saturation reading\" of the arterial blood gas analysis.  Additionally, despite a high PaO2, the patient is cyanosed and the pulse oximeter saturations are low.  This, and the clinical syndrome, are consistent with severe methaemaglobinaemia.  In this case, it is likely to have been precipitated by the lignocaine spray.\n\nApart from supportive management and withdrawal of the offending cause, treatment relies on the administration of methylene blue (1-2mg/kg, administered over 5 min).\n\nComment : the pulse oximeter analyses the absorbtion of 2 wavelengths of light only.  It only reports Hb in terms of oxygenate and deoxygenated haemoglobin.  As levels of MetHb increase, pulse oximeter readings trend towards 85%.\n\nThe saturations reported by standard blood gas analysis are calculated values based on the PaO2 and other variables.  This explains why the reported sats are so high.\n\nThe", "cat": "ABG"}, {"q": "A 56 year old female with a history of alcoholism presents to emergency with an altered conscious state.  She is clammy and shut down, is mumbling incoherently and has only semipurposeful movements.  An ECG and head scan are normal, and there are no focal neurological signs.\n\nThe following biochemistry is obtained\n\n \n\nNa\t142\nK\t3.8\nCl\t113\nHCO3-\t17\nAlb\t22\nPhosphate\t4.0\nLactate\t4.9\npH\t6.93\nCO2\t80\nSBE\t-14.1\nAnion gap\t15.8\nCorrected Anion gap\t3.6\nUrea\t14.8\nCreatinine\t87\nGlucose\t12.1\nOsmolality (measured)\t340\n\n \n\nDescribe the results\n\nWhat is the difference between Anion Gap and Corrected anion gap?", "a": "A mixed respiratory-metabolic acidosis is present.  The serum lactate is raised indicating lactic acidosis.  The anion gap is \"within normal limits\" after allowing for lactate, but the corrected anion gap is raised.  This suggests that lactic acid is not the sole cause of the acidosis and another unmeasured anion is present.\n\nThere is also a raised Osmolar gap (calculated osmolality ~ 310) which in this context suggests toxic alcohol consumption.  In this case, the patient had taken methanol.\n\nThe AGc corrects the AG for the effect of Albumin, Phosphate and Lactate on the measured anion gap.  The normal value should be close to zero, and a raised AGc suggests the presence of an unmeasured anion.  Had the AG alone been used, this might have been missed.\n\n \n\nReference : Kellum J.  Disorders of acid-base balance.  Crit Care Med 2007; 35:2630-36", "cat": "ABG"}, {"q": "A 34 year old female with Crohn's disease is admitted with an acute exacerbation of abdominal pain and diarrhoea.  She reports frequent small volumes of diarrhoea, up to 20 motions per day.\n\nA blood gas is taken in emergency and the emergency registrar asks your advice on the results.\n\n \n\n \tResult\tNormal Range\npH\t7.52\t7.35-7.45\nPaCO2\t50\t35-45mmHg\nPaO2\t81\t80-100mmHg\nHCO3-\t41\t22-33mmHg\nBase excess\t+12\t-3 - +3mmol/L\nNa\t141\t135-145mmol/L\nK\t4.2\t3.5-5.0mmol/L\n\nWhat will you tell the registrar?", "a": "There is a compensated metabolic alkalosis.\n\n \n\nThere are a number of ways of assessing the adequacy of compensation in metabolic acid-base disturbances.  A simple one is to look at the two digits after the decimal point of the pH, and this number should be similar to the PaCO2 (52 vrs 50 in this case, which is about right).  Other rules exist.\n\n \n\nDiarrhoea associated with non-infectious colitis is often associated with a mild to moderate metabolic alkalosis.  The mechanism for this is unclear, but is possibly related to the high NaCl loss in stools.  This results in Na retention in the kidneys (a mechanism enhanced by aldosterone) which results in HCO3 retention. \n\n \n\nSmall bowel or infectious secretory diarrhoea tends to produce metabolic acidosis.  The history of frequent small stools is far more suggestive of colitis than enteritis.", "cat": "ABG"}, {"q": "New Search Previous\n36. \t\n\nA 30 year old Indian man presents to emergency with shortness of breath and cough.  He has no specific medical past history.  There are no abnormal findings clinically and his CXR is normal.  His saturations on room air are 72%.  Application of oxygen raises the saturations to 81% and the following blood gas is taken.\n\nDescribe the findings.  How do you interpret them?\n\nMedia\n1 2\nNew Search View Answer Previous", "a": "The most striking finding is that there is a marked elevation of the p50.  This is reflective of the oxygen saturations of 81% on the co-oximetry findings, despite an adequate pO2.\n\nThe p50 is a measure of the position of the oxygen-haemoglobin dissociation curve.  It represents the pO2 value at which 50% of the Hb is saturated with oxygen.  The p50 will increase with increased temperature, reduced pH and raised CO2.  It is also affected by red cell concentrations of 2,3-DPG, which is in turn affected by anaemia, some hormone disregulation states and chronic hypoxia.\n\nFinally, p50 can be affected by the type of haemoglobin present.  Certain variants of Hb are less able to bind oxygen at a given pO2.  Carboxy-haemoglobin and Met-haemoglobin are occasionally seen in clinical practice.  Rarely, a range of abnormal haemoglobins can also be found, with as many as 65 having a low affinity for oxygen.", "cat": "ABG"}, {"q": "You are asked to assess a 30 yr old schizophrenic woman with no known medical history who has presented to the Emergency Department with a reduced level of consciousness. Clinically she appears euvolaemic.\n\nDescribe the abnormalities present in the following results.\n\nList the possible aetiologies\n\nNa\n\n\t114 mmol/L\t(136-148)\nK\t2.8 mmol/L\t(3.5-5.0)\nCl\t77 mmol/L\t(98-107)\nHCO3\t27 mmol/L\t(22-32)\nUrea\t2.2 mmol/L\t(2.5-7.0)\nCr\t45 umol/L\t(30-90)\nGlucose\t7.5 mmol/L\t \nOsm\t242 mmol/L\t \nUrine Osm\t52 mOsmol/kg\t(50-1200)\nUrine Na\t15 mmol/L", "a": "Abnormalities: Hypoosmolar, hyponatraemia, hypochloraemia with normal osmolar gap (calculated osmolarity 238 mmol/L, osmolar gap 4). Urine low osmolality with low urinary sodium\n\nAetiology: Hypoosmolar, hyponatraemia, with normal renal function and maximally dilute urine. Most likely H2O intoxication. Other aetiologies that are unlikely include;\n\nSIADH (unlikely as urine maximally dilute, urinary sodium < 20 mmol/L)\nHypothyroidism\nDrugs ÔÇô\ncarbamazepine,\nchlorpropramide\nGlucocorticoid deficiency (unlikely as expect hyperkalaemia)", "cat": "ABG"}, {"q": "The following biochemistry is obtained from a 44 year old Thai man who presents with increasing weakness.\n \nDescribe the findings\nWhat is the likely cause?\nMedia\n1", "a": "The bloods demonstrate a classic pattern of hyponatraemia and hyperkalaemia, renal impairment and mild metabolic acidosis. This is in keeping with Addison’s disease.\n\n \nComment: The pattern of hyperkalaemia and hyponatraemia can be due to:\nDKA\nAcute renal failure with water retention\nPotassium sparing diuretics\nAddison’s disease", "cat": "Biochemistry"}, {"q": "The following biochemistry is taken from an IV drug user with severe cellulitis of an injection site.\n \nExplain the results\nWhat underlying problems could cause this?\nMedia\n1", "a": "There is a raised anion gap metabolic acidosis, acute renal failure, a high CK and hyperkalaemia. Additionally there is marked hyperphosphataemia, an LDH rise and AST rise. This pattern is commonly associated with rhabdomyolysis.\n \nThe development of rhabdomyolysis is extremely concerning, and may be due to arterial injection with distal infarction, pyomyositis / necrotising fasciitis, or due to a compartment syndrome.\n \nComment: Muscle cell lysis leads to release of potassium and phosphate, myoglobin, a number of enzymes (CK, LDH, AST) and other cellular components. The phosphate released complexes magnesium and calcium, which are usually low.\n \nRenal failure may ensue due to dehydration, sepsis, hyperosmolality and due to the toxic effects of myoglobin.", "cat": "Biochemistry"}, {"q": "A 37 year old male is in ICU following a motor vehicle accident in which he suffered pulmonary contusions, a severe liver laceration that required massive transfusion of packed cells, a ruptured proximal jejunum and bilateral femoral shaft fractures. He subsequently developed ARDS and required vasoconstrictor support for 3 days. His nutritional requirements are being met parenterally.\n \nOn day 7 the following bloods are recorded.\n \n\nParameter\n\t\nRange\n\t\nDay 3\n\t\nDay 5\n\t\nDay 7\n\n\nProtein\n\t\n62-83g/L\n\t\n44\n\t\n44\n\t\n42\n\n\nAlbumin\n\t\n33-47g/L\n\t\n23\n\t\n22\n\t\n20\n\n\nGlobulin\n\t\n25-45g/L\n\t\n21\n\t\n22\n\t\n22\n\n\nBilirubin\n\t\n<20mcmol/L\n\t\n110\n\t\n190\n\t\n241\n\n\nALP\n\t\n40-110U/L\n\t\n98\n\t\n114\n\t\n191\n\n\nGamma GT\n\t\n<50U/L\n\t\n26\n\t\n61\n\t\n104\n\n\nALT\n\t\n<45U/L\n\t\n44\n\t\n78\n\t\n142\n\n\nAST\n\t\n<40U/L\n\t\n167\n\t\n119\n\t\n189\n\n \nWhat are the possible causes of these results?", "a": "Jaundice and liver dysfunction in ICU is often multifactorial.\n \nInitial rise in bilirubin is largely related to resorption of blood lost into bruising, and also related to massive transfusion. AST may also be raised due to muscle trauma.\n \nThe fall in serum albumin is largely an “acute phase” response and is commonly seen in critically unwell patients.\n \nThe development of raised hepatic enzymes is probably multifactorial:\nRight ventricular dysfunction leading to congestive liver dysfunction (due to ARDS / contusions / PEEP)\nDrugs (eg beta lactams, paracetamol, amiodarone)\nSepsis\nBacterial translocation from gut\nTPN\nIschaemia related to initial shock / vasoconstrictors\nSIRS related to trauma / sepsis / massive transfusion\nBiliary obstruction related to abdominal complication\nRaised intra-abdominal pressure\n \nComment: Bilirubin that is derived from haemolytic transfusion reactions, reabsorbed blood from tissue damage and free Hb from stored blood is largely unconjugated, whereas that related to liver dysfunction in ICU is largely", "cat": "ECG"}, {"q": "A 44 year old woman presents with marked weakness. She is unable to stand from a chair and can’t hold her arms above her head. Routine tests reveal abnormal biochemistry – you are asked to give an opinion.\n \n\n \n\t\nMeasured Value\n\t\nRange\n\n\nNa\n\t\n146\n\t\n135-145(mmol/L)\n\n\nK\n\t\n2.4\n\t\n3.5-5.0(mmol/L)\n\n\nCl\n\t\n108\n\t\n100-110(mmol/L)\n\n\nHCO3\n\t\n35\n\t\n24-32(mmol/L)\n\n\nUrea\n\t\n8.1\n\t\n3.0-8.0(mmol/L)\n\n\nCreatinine\n\t\n110\n\t\n70-120(mcmol/L)\n\n\nGlucose\n\t\n9.4\n\t\n3.0-7.8(mmol/L)\n\n \nDescribe the results\nWhat is the cause of her weakness?", "a": "A metabolic alkalosis combined with hypokalaemia. Mild hypernatraemia and hyperglycaemia.\n \nThe combination is most likely due to Cushing’s syndrome. Potassium wasting diuretics (particularly thiazides) may also present this way. The weakness is in keeping with a proximal myopathy which is consistent with this diagnosis. Hypokalaemia this low is usually due to excess ACTH production, such as bronchial tumours, but may also occur with exogenous steroids or pituitary ACTH release.\n \nSevere hypokalaemia may also cause proximal muscle weakness which is readily reversible when potassium is replaced.", "cat": "ABG"}, {"q": "A 31 year old man presents to emergency with altered conscious state and hypotension. His wife says he has been getting progressively worse for 2 months. He has recently stopped working due to severe fatigue and he has lost 10kg in weight. Routine biochemistry reveals the following :\n \n\n \n\t\nMeasured Value\n\t\nRange\n\n\nNa\n\t\n127\n\t\n135-145(mmol/L)\n\n\nK\n\t\n6.9\n\t\n3.5-5.0(mmol/L)\n\n\nCl\n\t\n101\n\t\n100-110(mmol/L)\n\n\nHCO3\n\t\n17\n\t\n24-32(mmol/L)\n\n\nUrea\n\t\n14.1\n\t\n3.0-8.0(mmol/L)\n\n\nCreatinine\n\t\n113\n\t\n70-120(mcmol/L)\n\n\nGlucose\n\t\n4.1\n\t\n3.0-7.8(mmol/L)\n\n \nInterpret the results\nWhat is the likely cause?\n\nHow would you manage and investigate?", "a": "The results demonstrate marked hyponatraemia and hyperkalaemia, associated with a probable metabolic acidosis (low bicarbonate) and volume contraction (elevated urea / creatinine).\n \nOther possible causes of acidosis, hyperkalaemia and hyponatraemia include:\nPotassium sparing diuretics, often with thiazides\nDiabetic ketoacidosis\nEarly renal failure\n \nThe findings, with the clinical history, are suggestive of primary adrenal failure (Addison’s disease). The likely causes in this age-group are:\nAutoimmune\nTB\nMetastases\nAmyloid infiltration\nBilateral adrenal infarction (eg severe sepsis)\n \nInitial management should include basic resuscitation (with attention to airway, breathing and circulation), followed by IV dexamethasone. This averts the acute glucocorticoid deficiency, but does not interfere with synacthen testing like hydrocortisone. Plasma ACTH should also be measured. Once the diagnosis is confirmed, the patient can be changed to maintenance therapy.", "cat": "ABG"}, {"q": "A 55 year old man has been ventilated in ICU for 6 days with severe acute pancreatitis. The following tests are obtained on day 8 of his illness.\n \n\nFree T4\n\t\n7.89pmol/L\n\t\nNormal 9.0-23.0\n\n\nFree T3\n\t\n2.1pmol/L\n\t\nNormal 2.9-8.9\n\n\nTSH\n\t\n0.21mU/L\n\t\nNormal 0.3-5.0\n\n \nExplain the results", "a": "Both the T3 and the T4 levels are low. This is suggestive of hypothyroidism. In primary thyroid failure, it would be expected that the TSH would be high. Its low value could be explained by pituitary failure, but this is very uncommon outside specific clinical syndromes. The most likely cause is sick euthyroid syndrome.\n \nIllness affects thyroid hormone metabolism in multiple ways. There is reduced TSH production, altered conversion of T4 to T3 (relatively more rT3 produced), altered binding to circulating proteins and abnormal action at the tissue level.\n \nThe sick euthyroid syndrome is commonly seen and variations are common, but are usually associated with normal to low values of T4, T3 and TSH.", "cat": "Biochemistry"}, {"q": "An 85 year old man has been bedridden for 3 days in a supported accommodation with pneumonia.  The following electrolyte results have been obtained :\n\n \n\nParameter\n\n\t\n\nValue\n\n\t\n\nRange\n\n\n\n\nNa\n\n\t\n\n171\n\n\t\n\n135-145mmol/L\n\n\n\n\nK\n\n\t\n\n3.8\n\n\t\n\n3.5-5.0mmol/L\n\n\n\n\nCl\n\n\t\n\n134\n\n\t\n\n93-108mmol/L\n\n\n\n\nHCO3-\n\n\t\n\n38\n\n\t\n\n22-30mmol/L\n\n\n\n\nUrea\n\n\t\n\n35\n\n\t\n\n3.0-8.0mmol/L\n\n\n\n\nCreatinine\n\n\t\n\n200\n\n\t\n\n60-120mcmol/L\n\n\n\n\nGlucose\n\n\t\n\n5\n\n\t\n\n3.0-5.5mmol/L\n\n \n\nUrine biochemistry\n\n\t\n\n \n\n\n\n\nNa\n\n\t\n\n<5mmol/L\n\n\n\n\nOsmolality\n\n\t\n\n924mOsm/l (measured)\n\n \n\nInterpret these results", "a": "The patient is hyperosmolar.  Calculated osmolality = (2 x Na) + urea + glucose = 342 + 35 + 5 = 382.  The urine sodium is low due to increased sodium reabsorption in response to a low intravascular volume, so the very high urinary osmolality is appropriate as the patient is maximally attempting to retain water in the face of his plasma hyperosmolality.\n\n \n\nThe above case is based on an extract from Practical Intensive Care Medicine by Charlie Corke.\n\n This book can be obtained from www.eruditemedicalbooks.com.", "cat": "ABG"}, {"q": "A 64 year old man presents with weakness and confusion.  His wife states he has been taking his bowel prep solution prior to semi-elective right hemicolectomy.  He is haemodynamically stable, afebrile and drowsy.  His weight is unchanged from his outpatient appointment 1 week prior.\n\nThe following biochemistry results are available\n\n \n\nNa\t121mmol/L\nK\t2.2mmol/L\nCl\t84mmol/L\nHCO3\t28mmol/L\nUrea\t2.8mmol/L\nCreatinine\t47mcmol/L\nGlucose\t7.2mmol/L\nPhosphate\t1.43mmol/L\nAlbumin\t30g/L\nLDH\t251 U/L\nALT\t21 U/L\nAST\t31 U/L\nTotal Bilirubin\t15mcmol/L\nTotal Calcium\t2.05mmol/L\nCK\t608 U/L\n\nDiscuss the results and management", "a": "Hyponatraemia related to salt loss, relative water excess and marked hypokalaemia.\n\nCorrection of hypokalaemia is important to prevent complications of hypokalaemia (including muscle weakness and cardiac arrhythmias) and to remove its contributory effect on hyponatraemia.  In the absence of signs of dehydration, fluid restriction is appropriate, particularly given the stimulus for the condition is transient.  Hypertonic saline may be appropriate if neurological deterioration occurs (increasing drowsiness, headache, seizures)\n\nComment : Hypokalaemia contributes to hyponatraemia because the resulting reduction in intracellular ions causes a net movement of water to the extracellular space.  In normal patients this small amount of fluid may be insignificant, but in volume deplete patients, hyponatraemia may be exacerbated.\n\nReference : Critical Care and Resuscitation 2002; 4:238-9", "cat": "ABG"}, {"q": "A 75 year old male presents with confusion and coffee ground vomitus.  The following results are obtained :\n\n \n\nNa\t139mmol/L\nK\t3.6mmol/L\nCl\t105mmol/L\nHCO3\t20mmol/L\nUrea\t14mmol/L\nCreatinine\t98mcmol/L\n\nDiscuss the results", "a": "The results show a mild metabolic acidosis and a borderline raised anion gap.  The cause of this is not immediately clear, though renal failure does not appear to be the cause.\n\nThe urea is raised proportionately more than the creatinine, which could be explained by gastrointestinal blood loss, or fluid depletion\n\nComment : There are a number of causes of urea rise out of proportion with creatinine.  The most common are:\n\nGastrointestinal bleeding\nMarked volume depletion\nCatabolic state eg sepsis\nGlucocorticosteroid use\nResolving acute tubular necrosis (where glomerular function improves faster than tubular function, the former controlling Cr, the latter responsible for urea elimination)", "cat": "ABG"}, {"q": "A 45 year old male has been in hospital for right knee septic arthritis which has cultured methicillin sensitive Staphylococcus aureus.  He has been treated with IV flucloxacillin, his knee has been irrigated and he is receiving paracetamol and a morphine PCA for analgesia.\n\nOn day 13 of his admission he developed fever, sweats and tachycardia.  His knee was clinically much improved since admission.  His biochemical results are listed below.\n\n \n\nNa\t138mmol/L\nK\t2.8mmol/L\nCl\t93mmol/L\nHCO3-\t6mmol/L\nurea\t18.6mmol/L\ncreatinine\t541mcmol/dL\nLactate\t0.7mmol/L\n\nInterpret the blood gases\n\nWhat is the likely pathology?", "a": "The arterial blood gases demonstrate a raised anion gap metabolic acidosis.  The lactate is normal. \n\nThe most likely cause is pyroglutamic acidosis from Flucloxacillin and paracetamol use, coupled with retention of organic acids due to acute renal failure.  Other possibilities such as acute diabetic ketoacidosis or endocarditis with septic emboli should be excluded.\n\nComment : acute renal failure can certainly contribute to the AGMA, but this is unlikely to explain it entirely.  A bicarb <10 and a AG >20-25 are rarely reported in pure renal failure.\n\nPyroglutamic acidosis has been reported in the context of flucloxacillin, paracetamol and vigabatrin use.  It is more likely associated with renal or hepatic dysfunction or critical illness.  It can also occur in some inherited metabolic disorders.\n\nReference :\n\nMJA 2006; 185 (4): 223-225", "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q22\n\nA 45 year old man received an allogeneic bone marrow transplant for Acute Lymphatic Leukaemia. 26 days after the transplant the patient developed severe gastroenteritis and a maculopapular skin rash and respiratory insufficiency.\n\nThe following investigations were performed (Fig 1)\n\nList 3 possible diagnoses\n\nMedia\n1", "a": "Sepsis\n\nCMV\n\nGVH", "cat": "Biochemistry"}, {"q": "JFICM Fellowship Exam, 2008, No.2, Q18\n\n A 63 year old patient with a background of type II diabetes had vascular surgery 24 hours previously. His post operative course has been uncomplicated except for consistently elevated serum potassium measurements. He is not receiving supplemental potassium and vital recordings have been stable. His most recent arterial blood gases and plasma biochemistry are presented below:\n\na)describe the acid base abnormality\n\nb)list 3 causes of the acid base abnormality\n\nc)what is the most likely cause of the abnormality?\n\nMedia\n1", "a": "a) Describe the acid base abnormality\n\n This is a normal anion gap metabolic acidosis.                        \n\n\nb) List three causes of the acid-base abnormality.\n\n\nThe major causes are:\n\nLoss of bicarbonate (eg diarrhoea, pancreatic biliary drainage and urinary diversions (ureterosigmoidostomy)\nRenal tubular acidosis (RTA).\nOther: saline loading, TPN and cholestyramine use                   \n\n \n\nc) What is the most likely cause in this patient\n\nType 4 RTA.", "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q18\n\n\nAn 81 yr old woman is admitted to the ICU with a 24 hr history of altered mental state and confusion. she has a history of type II diabetes managed with metformin. The flollowing blood results were taken on admission.\n\na. Which clinical condition is most consistent with the above data? - Justify your answer from the results provided.  \n\n\nb. List 3 complications of this condition.\n\n \n\n\n \n\nMedia\n1", "a": "a. Which clinical condition is most consistent with the above data? - Justify your answer from the results provided.  \n\n \n\nAnswer: Non ketotic hyper osmolar state                                                              \n\n \n\nMarked hyperglycaemia (higher than usually observed DKA) plasma glucose may be >55mmol/L.\nHyperosmolarity (by definition osmolarity should be >320)\nRelatively normal pH/HCO3 suggesting non ketotic state. A small anion gap acidosis may be present secondary to lactate.\n\n \n\nb. List 3 complications of this condition.\n\n \n\nCerebral oedema:\nVascular thrombosis:\nElectrolyte derangements in particular hypokalemia, dysnatraemia. Hyperchloremia from saline administration.\nIntercurrent events such as sepsis, aspiration,  myocardial infarction, iatrogenic ( eg vascular access related complication)\nHypotension and shock due to intravascular volume depletion or inadequate resuscitation.", "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q18\n\n \n\nYou are called to the Emergency Department to review a nulliparous 28 year old woman. She is currently 35 weeks pregnant, and has presented with 72 hours of nausea and vomiting accompanied by epigastric and right upper quadrant pain. On examination she was jaundiced, confused and had a blood pressure of 120/70.\n\nLaboratory results from a venous blood taken on arrival are shown below:\n\n \n\n List 3 likely differential diagnoses for the above history and laboratory data\n\nMedia\n1", "a": "A number of differentials are possible however in the third trimester in a nulliparous woman the three main considerations are:\n\n·       Acute fatty liver of pregnancy ( AFLP):\n\n·       HELLP (Haemolysis, elevated liver enzymes and low platelets) Syndrome:\n\nPre eclampsia with hepatic involvement.                                                            \n\n \n\nOther considerations are: (these are not the cause of severe hepatic failure in pregnancy and so will a
