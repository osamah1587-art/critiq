s 2 sinus beats and 2 bursts of a wide complex tachycardia. The wide complex component shows no P waves and a rate of 140. Of note, the complexes vary considerably in amplitude and frequency, suggesting AF with aberrancy rather than VT.\n \nComment: \nCauses of irregular wide complex tachycardias include:\nMultiple ventricular ectopics\nAF with aberrancy\nAF with bundle branch block\nAF with pre-excitation pathway\n \nVT often shows some irregularity but is usually not marked", "cat": "ECG"}, {"q": "A 35 year old male presents to emergency with severe pleuritic chest pain. The following ECG is recorded.\n\n \nDescribe the features of this ECG\nWhat clinical signs would you look for?\nMedia\n1", "a": "The ECG demonstrates sinus rhythm at a rate of 75 beats per minute. There is scooped ST elevation from V3-6 and less prominent changes laterally. PR depression is also noted in these leads.\n \nThese changes are most likely due to pericarditis, though ischaemia remains possible.\n \nThere is likely to be a pericardial friction rub present on auscultation. There may also be a low grade fever and tachycardia. Evidence of pericardial effusion should be sought (including jugular venous distension and muffled heart sounds) as well as signs of a cause:\nUraemia\nRespiratory viral\nRadiation\nMalignancy\nVasculitis / autoimmune disease\nTuberculosis\nOther\n \n \nComment: \nThe ECG changes of acute pericarditis are said to evolve through 4 phases.\nDiffuse ST elevation and PR depression\nResolution of stage 1 with T wave flattening\nDeep symmetrical T wave inversion\nResolution\n \nSome, all or none of these stages may be seen in individual patients.\n \nA pericardial rub is best heard at the left sternal edge with the patient sitting forwards in expiration. It is classically scratchy or “Velcro-like” and occurs with a biphasic rhythm equal to that of the heart rate.", "cat": "ECG"}, {"q": "A 24 year old female presented to emergency with lightheadedness and palpitations. These resolved spontaneously at triage. A routine ECG was performed\n\n \nInterpret the ECG\nWhat possible rhythms caused the symptoms?\nMedia\n1", "a": "The ECG demonstrates the Wolff-Parkinson-White syndrome. The classic features of a short PR interval and a slurred upstroke (delta wave) are present. The ST-T changes are repolarisation abnormalities associated with the abnormal depolarisation.\n \nThe most likely rhythm was Supraventricular Tachycardia (Atrioventricular Re-entrant Tachycardia). AF with rapid ventricular conduction is also possible.\n \nComment: Wolff-Parkinson-White syndrome is caused by an abnormal connection between the atria and ventricles (“the anomalous bundle of Kent”) which allows “pre-excitation” of the ventricular myocardium. This spreads in a slow unco-ordinated way resulting in a slurred upstroke, before the normally conducted depolarisation engulfs it.\n \nThe morphology of the QRS will be different depending on the site of the pathway. In this case, Type B, the connection is on the right side, causing the QRS in V1 to be predominately negative.\n \nApproximately 60% of patients with WPW will have arrhythmias of some type. The most common is “orthodromic” atrioventricular re-entrant tachycardia, in which the impulse is conducted down the Bundle of His and back up the Bundle of Kent. This constitutes 90% of SVT while the remainder is “antidromic”.\n \nA much more serious arrhythmia is atrial fibrillation, which can in some circumstances be conducted unhindered to the ventricle resulting in ventricular rates of >300bpm. This can be lifethreatening.\n \nSymptomatic patients should undergo electrophysiological studies to determine their risk of a potentially fatal arrhythmia. Those with high risk (identified by a short refractory time of the accessor", "cat": "ECG"}, {"q": "A 64 year old male has an ECG performed for dull chest pain. \n \nDescribe the ECG\nWhat medications does he take?\nMedia\n1", "a": "The ECG demonstrates atrial flutter with 5:1 block. This would be unusual unless the patient was taking medications to slow AV conduction, such as a beta-blocker, calcium channel antagonist or digoxin.\n \nIn this case, the patient was on digoxin, as the slurred “reverse tick” ST segments laterally suggest. The patient is likely to also be anticoagulated.\n \nComment: There are many causes of atrial flutter. The most common include:\n \nIschaemia\nMitral regurgitation\nrheumatic heart disease\ncardiomyopathy\nhypertension\nalcoholism\nthyrotoxicosis\n \nIt may respond to flecanide, but often requires DC cardioversion after reversing any underlying factors.", "cat": "ECG"}, {"q": "A 68 year old male is admitted to ICU with an exacerbation of chronic obstructive airway disease. \n \nWhat does the ECG show?\nWhat is the likely explanation?\nWhat does this imply about his underlying disease?\nMedia\n1", "a": "The ECG shows a sinus tachycardia, right axis deviation, P pulmonale and a right bundle branch pattern. There is T wave inversion in the right / septal leads\n \nThese features are suggestive of pulmonary hypertension. Usually there is a dominant R wave in V1 (indicating RV hypertrophy), but there is a deep S wave in V6 suggesting clockwise rotation of the heart, commonly seen in patients with hyperexpansion.\n \nThe most likely cause of the patient’s pulmonary hypertension is severe Chronic Obstructive Airways Disease and associated hypoxia. Clinical features and investigations should be sought to confirm this. Other causes should be considered (eg recurrent pulmonary embolism, chronic left to right shunt, Chronic mitral regurgitation).", "cat": "ECG"}, {"q": "This ECG was taken from a man with diabetic chronic renal failure on admission to hospital. He has had nausea and occasional vomiting.\n \nWhat does the ECG show?\nWhat is your management plan?\nMedia\n1", "a": "The ECG shows peaked T waves with QRS widening.\n \nThe changes are consistent with hyperkalaemia. With increasing K, the P wave flattens and disappears and the QRS complex becomes very wide. Eventually the ECG resembles a sine wave, shortly before asystolic arrest.\n \nThe treatment should include:\nIntravenous calcium (indicated in QRS widening to “stabilise” the myocardium and prevent a fatal arrhythmia)\nInsulin-dextrose infusion\nIntravenous bicarbonate\nBeta agonists (eg salbutamol nebulisers)\nResonium\n \nConsideration should be given to reversing the underlying or contributing factors (eg IV fluids), and potentially renal replacement.", "cat": "ECG"}, {"q": "The following ECG is taken from a 44 year old farmer who presented with increasing shortness of breath. \n \nDescribe the ECG\nMedia\n1", "a": "The ECG shows a wide complex tachycardia with QRS >0.14s. The axis is quite bizarre. The pattern of the QRS resembles a LBBB pattern. There appear to be occasional p waves amongst the QRS complexes not clearly linked with them.  There are no fusion or capture beats.\n \nThe morphology of the QRS is R wave in V1 and qS in V6.\n \nThese features are suggestive of VT, which was subsequently proven with electrophysiological studies.\n \nComment: Diagnosing VT can be very difficult. Brugada criteria can assist identification :\nIf any of the following apply to the ECG, it should be considered VT :\nIs there an absence of an RS complex in all precordial leads?\nIs the R to S interval >100ms in 1 precordial lead?\nIs there evidence of A-V dissociation?\nAre the morphology criteria present in both V1 and V6 for VT?\n \nFavours VT\nV1 : R, qR or RS\nV6 : S. rS or qR\nIdentical to previous ventricular tachycardia tracing\nFavours SVT with aberrancy\nV1 : rsR’\nV6 : qRs\nIdentical to previous SVT tracing\nIdentical to sinus tracing with conduction delay\n \nIn this case, there is inconclusive evidence of A-V dissociation (look for clinical signs or a longer rhythm strip), but the morphology is suggestive of VT. This is supported by the bizarre axis. Haemodynamic stability does NOT rule out VT.\n \nUltimately, electrophysiological diagnosis is required.\n \n \n \nReferences : Rosen et al. Emergency Medicine. Concepts and Clinical Practice.", "cat": "ECG"}, {"q": "This ECG is of a 49 year old male who has had central chest pain for 1 hour.\n \nWhat does the ECG show?\nWhat would you do?\nMedia\n1", "a": "The ECG demonstrates an acute anterior myocardial infarction. The patient should be treated with thrombolysis unless percutaneous coronary intervention is immediately available. He also needs aspirin, clopidogrel and when stable beta-blockade. Statin therapy is also warranted.", "cat": "ECG"}, {"q": "A 70 year old man presents following a fall in which he broke his neck of femur. The anaesthetics registrar is concerned about his ECG. \n \nDescribe your findings\nWhat management does he require?\nMedia\n1", "a": "The ECG shows an increased PR interval, right bundle branch block and left axis deviation (most likely to be left anterior hemiblock). This combination is known as trifascicular block.\n \nIn this context, the collapse may be due to block of the posterior fascicle causing complete heart block. The patient requires a pacemaker.\n \nComment: Given that the patient has normal atrial electrical activity (ie not in AF) a dual chamber pacemaker should be inserted. This is to maintain normal A-V sequential contraction, which improves cardiac function.", "cat": "ECG"}, {"q": "A 35 year old patient has taken an overdose of serzone. In the emergency department he has a brief cardiac arrest which spontaneously reverts with ventilation and 30 seconds of CPR.\n \nThe following ECG is recorded post arrest\n \nWhat does it show?\nWhat is the likely cause of the arrest?\nMedia\n1", "a": "The ECG shows sinus rhythm. There is mild right axis deviation. There is significant flattening of the T waves, which appear to be markedly prolonged.\n \nThis pattern of ECG change is commonly associated with a pattern of polymorphic ventricular tachycardia known as “Torsade de pointes”.\n \nComment: The QT interval is defined as the period between the start of the QRS and the end of the T wave. This is corrected for pulse rate because of the natural variation with RR interval. A rough rule of thumb is that the QT interval should be less than half of the RR interval.\n \nCommon causes of prolonged QT syndrome are:\n\nDrugs\n\t\nAntiarrhythmics\nPhenothiazines\nHaloperidol\nTricyclic antidepressants\nOther\n\n\nElectrolyte disorders\n\t\nLow calcium, magnesium, potassium\n\n\nIschaemia\n\t\n \n\n\nCongenital syndromes\n\t\nRomano-Ward\nOther\n\n\nHypothermia\n\t\n \n\n \nEpisodes of Torsades can be prevented by increasing heart rate (isoprenaline, pacing) and magnesium infusions.", "cat": "ECG"}, {"q": "The following ECG is recorded from a 35 year old who was trapped for 90 minutes within a car following a high speed accident.\n\nWhat does the ECG show?\n\nWhat is your acute management?\n\nMedia\n1", "a": "The ECG shows marked ECG widening with a bizarre, almost sinusoidal pattern.  This is classical of marked hyperkalaemia.  In this case it is due to massive cellular destruction associated with crush injury and rhabdomyolysis.\n\nImmediate management includes intravenous calcium chloride to stabilise the myocardium and prevent fatal arrhythmias, cardiac monitoring and preparation to treat such arrhythmias, IV bicarbonate, IV dextrose-insulin infusions and IV / nebulised beta agonists (eg salbutamol) which may acutely lower the potassium.  In rhabdomyolysis however the above treatments are often complicated (eg bicarbonate worsens phosphate-induced hypocalcaemia and IV calcium often doesn't work due to high phosphate load), and immediate renal replacement therapy may be necessary.  Treatment of the underlying cause is also essential (release compartments etc).", "cat": "ECG"}, {"q": "The following ECG is recorded from a 40 year old patient who presented following a sudden collapse and mild central chest pain.\n\nWhat does the ECG show?\n\nWhat other ECG signs can occur in patients with the likely condition?\n\n \n\n(ECG provided by Dr Nhi Nguyen)\n\nMedia\n1", "a": "The ECG shows sinus tachycardia with a classical S1Q3T3 pattern : a deep S in lead 1, a pathological Q wave in lead 3 and T wave inversion in lead 3.\n\nOther features that can be seen include : acute atrial fibrillation, rightward axis, right bundle branch block (complete or partial) and T wave inversion in leads V1-4, and there may be ST depression in lead 2.  These changes are related to acute RV overload and may resolve, particularly the RBBB.\n\n \n\nComment : the S1Q3T3 pattern is relatively infrequent (~10%) in acute PE and is usually associated with massive PE.  The most common presenting ECG sign is sinus tachycardia.  In chronic PE, right atrial hypertrophy may also present, seen as peaked P waves (\"P pulmonale\").", "cat": "ECG"}, {"q": "A 45 year old male presents with acute lethargy, weakness and nausea.  He has been vomiting and can't hold anything down.  His history includes hypertension and type 2 diabetes mellitus which is controlled by oral hypoglycaemic mediations\n\nDescribe the ECG\n\nWhat is your immediate management plan?\n\nECG supplied by Dani Howe\n\nMedia\n1", "a": "The ECG demonstrates marked features of hyperkalaemia, viz:\n\nTented T waves\nWidening of the QRS\nProlonged PR interval and P wave flattening\n\nFurther progression often leads to fusion of the QRS and the T waves (loss of the ST segment) and sinus arrest.  Ultimately a sinusoidal pattern is seen. \n\nImmediate management should include:\n\nTriage to an appropriately monitored acute area\nOxgygen and IV access\nIntravenous calcium should be given to \"stabilise\" the myocardium and prevent arrhythmias\nIntravenous sodium bicarbonate to raise arterial pH and drive K intracellularly\nDextrose-insulin infusions to promote intracellular movement of K\nBeta-agonists (eg high dose salbutamol nebulisers) can assist\nResonium to assist removal of body stores of potassium\nInvestigation and management of cause of hyperkalaemia (in this case acute renal failure)\nDialysis / renal replacement therapy may be required", "cat": "ABG"}, {"q": "A 72 year old male presented with sudden onset sweatiness, disorientation, shortness of breath and mild headache, lasting 15 minutes.  He was mildly disorientated on presentation, with no apparent neurological deficit.  His troponin was mildly elevated at presentation (TnI 0.2mcg/L - ref range <0.04mcg/L)\n\nHe had no significant past medical history though his family reported he'd been having episodes of confusion over the past 6 months. \n\nThe following resting ECG is taken 72 hours after admission.  There have been no dynamic changes since admission\n\nDescribe the findings?\n\nWhat is are the potential causes for these findings?\n\nWhat additional investigations are required?\n\nMedia\n1", "a": "The ECG shows :\n\nSinus rhythm\nFirst degree AV block\nLeft anterior hemiblock (consistent with left anterior fascicular block)\nPathological Q waves, ST elevation and biphasic T waves in anteroseptal leads\n\nThe lack of changes over time suggest STEMI is unlikely.  A high left anterior descending artery lesion may cause this resting pattern with \"pseudonormalisation\" during pain (known as Wellen's syndrome).  Other causes of persistant ST elevation include left ventricular aneurysm.\n\nThe patient requires cardiac catheterisation, brain CT and an echocardiogram. \n\nIn this case, Echocardiography demonstrated a large left ventricular aneurysm, with a large mobile intramural thrombus.  CT scan demonstrated multiple small infarcts, probably causing \"vascular dementia\", secondary to microembolisation from the ventricular clot.", "cat": "ECG"}, {"q": "A 71 year old male is seen in admission clinic prior to his hernia repair.  The following ECG is taken.  He reports a mild history of hypertension, and has had two recent \"turns\" which resolved rapidly.\n\nWhat does the ECG show?  What would you do?\n\n \n\nECG provided by Chris Dugan, with thanks\n\nMedia\n1", "a": "The ECG shows sinus rhythm at rate 60.  There is borderline PR prolongation, right bundle branch block and left anterior hemi block (otherwise known as bi- or tri-fascicular block).\n\nThe patient needs referal to cardiology for assessment for pacing prior to surgery.\n\nThis patient suffered an episode of third degree block with haemodynamic compromise requiring temporary transvenous pacing, 3 days after this ECG was taken.", "cat": "ECG"}, {"q": "A 43 year old man presents to a secondary level hospital with acute chest pain.  He is confused, hypotensive, cold and is coughing pulmonary oedema fluid.  He is given high flow oxygen, aspirin and morphine.  The following ECG is taken.  Discuss the results\n\nWhat would you do? \n\nMedia\n1", "a": "The ECG shows a massive anterolateral myocardial infarction.  The clinical signs suggest severe cardiogenic shock / cardiac failure in this context.\n\nAfter securing the airway, applying oxygen and PEEP, securing IV access and taking blood, the patient should receive thrombolysis if there are no contraindications.  Alternatively, urgent PCI if available may be possible.  He would likely benefit from intra-aortic balloon counterpulsation.  Cardiology should be urgently consulted with regard to urgent PCI or CAGS.\n\nComment : Cardiogenic shock has an extremely high mortality and survival depends on returning flow to the coronary arteries.  Maintaining diastolic pressure without increasing myocardial oxygen demand and afterload is difficult with medications.  IABP can reduce afterload while improving coronary perfusion.  Ultimately, revascularisation either with thrombolysis or mechanical methods is required.", "cat": "ECG"}, {"q": "A 45 year old dialysis patient presents to emergency with abdominal pains and light headedness.  While awaiting assessment, her conscious state falls and the following ECG is taken.\n\nWhat does it show?  What would you do?\n\nMedia\n1", "a": "The ECG demonstrates complete heart block with a wide complex ventricular escape rhythm of 20.  She requires :\n\nsupport of airway and oxygenation\nimmediate IV access, with bloods for ABG, blood chemistry, full blood examination and glucose\ndrug therapy for severe bradycardia (atropine, adrenaline, isoprenaline)\ntemporary transcutaneous pacing\n\nIn the clinical setting, the possibility of severe hyperkalaemia is relatively high.  In this case, the serum potassium was 7.9mmol/L.  The patient's ECG normalised with 10mls 10% calcium chloride", "cat": "ECG"}, {"q": "The following ECG is taken from a 65 year old man who presented with a GCS of 6 and left sided limb stiffness.  No other focal signs are noted.\n\n \n\nWhat does the ECG show?  Suggest a mechanism for this.\n\nMedia\n1", "a": "Deep symmetrical T wave inversion across the precordial leads.  This is a common ECG abnormality associated with acute intracranial pathology (including Subarachnoid haemorrhage, as in this case).  Other possible causes include ischaemia and hypertrophic cardiomyopathy.\n\n \n\nComment : Intracranial catastrophes are associated with an array of cardiovascular complications.  ECG abnormalities may be present in up to 25% of patients, including deep T wave inversion as seen in this example.\n\nPatients with intracranial haemorrhage may also be subject to arrhythmias and neurogenic pulmonary oedema (up to 20% at presentation).  The underlying mechanism is thought related to a hyperadrenergic response to the intracranial insult.  In some, cardiogenic shock may also occur, though this is often reversible with supportive care.  Contrary to common belief, this can still be associated with a good clinical outcome.\n\n \n\nReference : Parr M, Finfer S, Morgan M.  Reversible cardiogenic shock complicating subarachnoid haemorrhage.  BMJ; 313:681-3", "cat": "ECG"}, {"q": "Comment on this ECG, taken from a 70 year old man who complains of weakness and lethary in emergency.  His HR is 45 and his blood pressure is 75/45.\n\nMedia\n1", "a": "The ECG demonstrates a grossly widened QRS complex, absent P waves and tented T waves, consistent with severe hyperkalaemia.  This is approaching the classic \"sinusoidal\" pattern seen in severe disease, just prior to terminal arrhythmias.", "cat": "ECG"}, {"q": "What does the following ECG show?  List 3 possible causes\n\nMedia\n1", "a": "There is a bifid p wave.  Otherwise, the ECG looks normal.  Causes include:\n\no    Mitral stenosis\n\no    Poor left ventricular compliance (eg due to ischaemia or hypertension)\n\no    Mitral regurgitation\n\n \n\nComment : Bifid P waves (“P mitrale”) is often defined as a double peaked P wave with an interval between peaks >1mm (0.04s).  This is usually pathological.  It results from delayed activation of the left atrium due to hypertrophy or dilatation.\n\n \n\nThis patient had severe mitral regurgitation on echocardiography", "cat": "ECG"}, {"q": "A 34 year old male reformed heroin abuser is in hospital being treated for Staph aureus pneumonia.  He is treated with erythromycin due to a known penicillin hypersensitivity reaction.  He has been treated for agitation with haloperidol, and his methadone has recently been increased.\n\n \n\nA cardiac arrest is called while on the ward, and his initial rhythm strip is shown.\n\n \n\nDescribe the features.  How would you treat it?  What precipitating factors may have led to this rhythm?\n\nMedia\n1", "a": "This is torsade de pointes.\n\n \n\nIf the patient is pulseless, immediate cardioversion is required.  Standard algorithms for management of shockable rhythms are indicated. Magnesium may be indicated and a dose of 5mmol can be given IV. \n\nWhen associated with bradycardias, prevention of recurrent Torsades can be achieved by maintaining an adequate heart rate - pacing or pharmacotherapy with isoprenaline may be of value.  Where possible, the causative agent should be discontinued.\n\n \n\nRisk factors for acquired TdP include :\n\nprolonged QTc (esp if >500ms)\nT-U wave abnormalities (flattened T waves, bifid T waves, prominent U waves fused with T wave) which is often exacerbated by a pause (eg due to a ventricular ectopic)\nMacroscopic T wave alternans (a pattern where T waves alternate between big and small from beat to beat)\nQTc prolonging drugs (eg sotolol, procainamide, quinidine, haloperidol, erythromycin, methadone).  These drugs appear to increase risk by up to 10%\nHypokalaemia, hypomagnesaemia, hypocalcaemia\nBradycardia\n\nComment : this ECG shows a number of common features of Torsades.  Firstly, there is a variable amplitude in a swinging pattern, the so called twisting of the points.  However, there are others :\n\na short-long-short cycle at the initiation.  This is often the result of a ventricular ectopic, followed by a compensatory pause, then another", "cat": "ABG"}, {"q": "New Search Previous\n33. \t\n\nA 34 year old female presents with intermittant chest tightness and shortness of breath.  She has a strong family history of coronary artery disease and is a smoker, but is otherwise healthy.  She has had no respiratory problems.\n\nThe following ECG is taken when she is pain free.  Describe the findings.\n\nMedia\n1\nNew Search View Answer Previous", "a": "The ECG is typical of Type 1 Wellen's syndrome, which is highly suggestive of a high grade LAD or left main coronary lesion.\n\n \n\nComment :\n\nThere are two types of Wellen's syndrome.\n\nIn Type 1 Wellen's Syndrome there are biphasic T waves in the anterior leads, and occurs when the patient is pain free.  During episodes of pain, there is a paradoxical pseudonormalisation of the ST segments. This picture occurs in 25% of Wellens Syndrome presentations and is suggestive of a critical proximal Left Anterior Descending Coronary Artery lesion. It is also known as LAD coronary T-wave syndrome.\n\nThis lesion needs early recognition and emergent PCI as it can go on to cause infarction of  anterior wall within a mean of 8.5 days even if treated with medical management.\n\nType 2 Wellens - The other 75 % of Wellens patients present with deep symmetrical T wave inversions across leads 1 and AVL and the V leads with 1 mm ST elevation.\n\nCriteria for Wellens Syndrome\n\nPrior history of chest pain\nChest pain with normal looking ECG (pseudonormalisation)\nNormal of minimally elevated cardiac enzymes\nNo pathological precordial Q waves or loss of R wave progression\nPainfree ST segment elevation in V2 & V3 that is isoelectric or minimally elevated (1mm), concave or straight or\nSymmetric and deep T wave inversion or biphasic T waves in V2 -V5 of V6 in pain free periods\nTight proximal LAD stenosis.", "cat": "ECG"}, {"q": "QL7):  A 18yr old student suddenly collapses in the street.  Paramedics arrived shortly.  She is cyanotic with a low conscious level on initial assessment.  On transferring into the ambulance she arrests.  Following 2min of CPR she regains spontaneous circulation and is transferred urgently to the hospital ED.  Following intubation and ventilation a bedside ECG is taken.\n\n \n\nWhat does her ECG show?\n\n\n\n\n \n\nIn view of haemodynamic instability (BP 75/50) a quick focused echocardiogram is undertaken.\n\n \n\nWhat does this show?\n\n \n\nWhat acute management will you instigate?", "a": "QL7):  Answer:\n\nHer ECG shows: Sinus tachycardia (rate about 150/min).  There is a predominant S deflection in lead I QRS, and a Q wave with T-wave inversion in lead III.  This is the classical S1Q3T3 pattern rarely seen in the presence of massive pulmonary embolus.\n\nThe focused echocardiogram image shows a 4-chamber view.  The RV (left upper chamber on image), RA (left lower chamber), LV (right upper chamber) is easily seen, with the LA only just visible (right lower chamber on image).  The RV is unusually dilated and is almost, if not larger than the LV.  This is highly suggestive of significant RV strain often caused by a massive pulmonary embolus.\n\nIn view of haemodynamic instability and recent arrest with clinically ECG and Echo findings, this is a massive pulmonary embolus until proven otherwise.  The patient should be thrombolysed immediately (e,g Alteplase) and transferred once stable to intensive care for ongoing management and anticoagulation.  If thrombolysis fails, with the patient remaining unstable, thrombectomy may be considered if such anintervention is available.\n\n \n\nReferences:\n\nLapner ST, Kearon C.  Diagnosis and management of pulmonary embolism.  BMJ 2013;346:f757 doi: 10.1136/bmj.f757\n\nOuellette DR, Mosenifar Z, et al. (2011).  Pulmonary Embolism Clinical Sc", "cat": "ECG"}, {"q": "QL11):  You are called to A&E resus to assess a 55yr old man who has had an out of hospital cardiac arrest.  Paramedics had found him collapsed with an initial rhythm of ventricular tachycardia.  Brief CPR had been undertaken with 1x DC shock resulting in successful return of circulation.  He remains GCS 3/15 but is spontaneously breathing.  His past medical history includes schizophrenia which he takes quetiapine to control.\n\nComment on his admission ECG?\n\nHow would you manage this condition?", "a": "QL11):  Answer:\n\nThe ECG shows an extremely prolonged QTc of 752ms = Long QT Syndrome (LQTS).  Rate is 60/min with sinus rhythm.  Ventricular ectopics / non-sustained torsade de pointe can be seen in V1-V3.  Normal QTc is less than 440ms.  Quetiapine may be the cause of this patient’s prolonged QT interval and likely ventricular dysrhythmia causing arrest.\n\nLQTS is a disorder of myocardial electrical conduction that results impaired ventricular conduction. It is caused by malfunction of cardiac ion channels impairing ventricular repolarisation. This predisposes to the development of polymorphic tachycardia torsade de pointes, which can degenerate to ventricular fibrillation.\n\nDiagnosis:\n\nQT interval: is the time between start of the Q wave to end of the T wave.  This represents ventricular depolarisation and repolarisation.  The QT interval varies with heart rate, increasing with bradycardia and decreasing with tachycardia\n\nThe QT interval is corrected for heart rate (Bazett's formula).  [QTc) =  QT/ √RR]  (where RR is the interval between R waves).  Normal QT is 0.3 sec to 0.44 sec, QTc > 0.44 sec is considered prolonged.\n\nAcute management of prolonged QTc includes:\n\nABC management / resuscitation\n\nAvoidance of drug causing LQTS\n\nMaintenance of normocarbia, normothermia, correction of electrolyte imbalance (K+, Mg2+) and acidosis\n\nManagement", "cat": "ECG"}, {"q": "QL12):  A 52yr old presents to a remote country A&E with acute chest pain which started 4hrs ago.  The nearest PCI centre is over 3hrs away. \n\nWhat does this ECG show?\n\nWhat acute management would you instigate?", "a": "QL12):  Answer:\n\nAn acute Anterolateral ST-elevation myocardial infarction (STEMI) with inferior ischaemia (ST-depression) is evident on ECG.\n\nAcute management with thrombolysis:\n\nABC resuscitation / CPR if required\n\nAdministration of oxygen (particularly if oxygen saturations <95%)\n\nMorphine or other injectable opiate for acute pain\n\nNitrate (GTN spray / sublingual tablet / infusion for acute intractable pain)\n\nAspirin 300mg (PO/iv) and Ticagrelor 180mg loading, 90mg BD maintenance PO. \n\n \n\nPrasugrel (60mg loading, 10mg OD maintenance) can be given instead of ticagrelor if clopidogrel-naive patients with no history of cerebrovascular disease.  Clopidogrel (300mg loading, 75mg OD maintenance)  can be given if neither agents are available.  Ticagrelor and prasugrel have a more rapid onset of action and greater potency with proven superiority in trials when compared clopidogrel.\n\nIf percutaneous coronary intervention (PCI) cannot be undertaken within 120min of first medical contact, then the patient requires urgent thrombolysis (ideally within 30mins of first medical contact).  A fibrin-specific agent is recommended (over non-fibrin specific agents):\n\nTenecteplase (single i.v. bolus: 30 mg if <60 kg, 35 mg if 60 to <70 kg, 40 mg if 70 to <80 kg, 45 mg if 80 to <90 kg, 50 mg if ≥90 kg,\n\nAlteplase (15 mg i.v. bolus 0.75 mg/kg over 30 min (up to 50 mg) then 0.5 mg/kg over 60 min i.v. (up to 35 mg)\n\nReteplase (10 units + 10 units i.v. bolus given 30 min apart)\n\nStreptokinase (1.5 million units over 30–60min i.v).\n\nDual antiplatelet therapy is indicated and must be given.  Aspirin (150-500mg orally or 250mg iv) and adenosine diphospha", "cat": "ECG"}, {"q": "QL13): A 58yr old patient presents with acute chest pain.\n\nWhat does the ECG show?\n\nWhat would be your acute management?", "a": "QL13):  Answer:\n\nThe ECG shows acute ST-elevation in leads V1-V4.  Possible lateral ischaemia V5-V6, I and AVL with ST depression and T-wave inversion AVL. \n\nECG consistent with Anterior STEMI with lateral ischaemia.\n\nAcute management would include:\n\nABC resuscitation / CPR if required\n\nAdministration of oxygen (particularly if oxygen saturations <95%)\n\nMorphine or other injectable opiate for acute pain\n\nNitrate (GTN spray / sublingual tablet / infusion for acute intractable pain)\n\nConsideration for urgent percutaneous coronary intervention (PCI) within 12hrs of chest pain onset or thrombolysis if PCI not possible within first 120mins of first medical contact.\n\nDual antiplatelet therapy should be started as early as possible before angiography.  Aspirin (150-300mg) and adenosine diphosphate (ADP) receptor blocker (Prasugrel [60 mg PO loading dose, 10 mg maintenance dose] or Ticagrelor [180 mg PO loading dose, 90 mg maintenance dose BD]; these drugs have a more rapid onset of action and greater potency and have proved superior to clopidogrel in large outcome trials.\n\nInjectable anticoagulant must be used during PCI: Bivalirudin (with use of GP IIb/IIIa blocker restricted to rescue) is recommended over unfractionated heparin and GP IIb/IIIa blocker.  Enoxaparin is preferred over unfractionated heparin.\n\n \n\nReferences:\n\nEuropean Society of Cardiology Task Force.  ESC Guidelines for the management of acute myocardial infarction in patients presenting with ST-segment elevation.  The Task Force on the management of ST-segment elevation acute myocardial infarction of the European Society of Cardiology (ESC).  European Heart Journal (2012) 33, 2569–2619\n\ndoi:10.1093/eurheartj/ehs215", "cat": "ECG"}, {"q": "QL28):  Comment on this ECG rhythm strip:", "a": "QL28):  Answer:\n\nThis ECG rhythm strip shows:  sinus rhythm, heart rate about 60 beats per minute.  Prolonged PR interval evident, which is suggestive of first degree heart block.", "cat": "ECG"}, {"q": "New Search Previous\n6. \t\n\nQL59):  A 27 year female presented to A&E after an episode of palpitations that began 45minutes earlier.  The patient describes her heart as ‘racing and pounding’.  She describes feeling light headed and sweaty.  She felt like she was going to die.  Milder episodes had occurred during the three previous days.  No other past medical history of note was reported.  She was not on any medications.  Family history revealed that her maternal uncle died age 35 for unknown reasons.  On examination her observations were normal except for a sinus tachycardia (100beats/min).  No other abnormalities were found. \n\nComment on her ECG.\n\nWhat is your diagnosis and management plan?\n\nNew Search View Answer Previous", "a": "QL59): Answer: \n\nThe ECG shows subtle downsloping ST-segment elevation in leads V1 and V2 suggestive but not diagnostic of Brugada syndrome.\n\nA diagnosis of Brugada syndrome was considered in view of her symptoms and close family history of sudden cardiac death (SCD). \n\nManagement:  Urgent cardiology opinion with electrophysiology lab investigations.   The patient may require an implantable cardioverter defibrillator (ICD).\n\nBrugada syndrome is a cause of sudden cardiac death (SCD).  It is characterised by a right bundle branch block (RBBB) pattern, often incomplete in V1 and V2, ST-elevation in the right precordial leads which is often transient, a normal heart structure and the propensity for life threatening ventricular tachycardia.\n\n \n\nReferences:\n\nWatrich DG, Woods RA, Steiner IP.  Brugada syndrome in a young patient with palpitations.  CJEM 2005; 7(5):347-350", "cat": "ECG"}, {"q": "A 38 year old drug addict has been admitted with sepsis. His blood cultures grow Staph aureus. On day 3 he suddenly becomes shocked and short of breath. A transoesophageal echocardiogram is recorded post intubation.\n \nWhat does the echo show?\nWhat is the significance of the pulse wave doppler study?\nMedia\n1 2", "a": "The echo demonstrates severe aortic regurgitation, presumably due to Staphylococcal endocarditis. The jet of regurgitation fills the LVOT.\n \nThe pulse wave Doppler study is performed in the descending aorta, and shows holodiastolic (ie throughout diastole) flow reversal, a sign of severe aortic regurgitation.", "cat": "ABG"}, {"q": "A 70 year old man is admitted with shortness of breath and respiratory failure to the intensive care unit. A systolic murmur is audible on examination. A chest X-ray reveals upper lobe diversion of pulmonary veins. A transthoracic echo reveals the following. (abnormal values marked with an asterix)\nOBSERVATIONS:\n \nTRICUSPID VALVE:                        Normal\nPULMONIC VALVE:                        Normal\nRIGHT VENTRICLE:                         Normal size and function\nRIGHT ATRIUM/IVC:                         Normal\nMITRAL VALVE:                               Normal\n \n*LEFT VENTRICULAR EVALUATION\nNormal LV size. Moderate to severe impairment of systolic function. EF 25%. No regional wall motion abnormalities. Moderate LV hypertrophy.\n*LEFT ATRIUM: Mildly enlarged.\n*AORTIC VALVE:  Thickened and calcified, with reduced opening. No aortic regurgitation.\nAortic valve area                               0.68cm2                      (2-4)\nLeft ventricular outflow tract:\nMaximum velocity                              0.55 m/s;                    (0.8 – 1.2)\nVelocity time integral (VTI)               8.58 cm;\n \nAortic valve   \nMaximum velocity                              2.93 m/s;                    (<2.0)\nVelocity time integral (VTI)               43 cm;\nMax pressure gradient                      34 mm Hg                 (<16)\nMean pressure gradient                    18 mm Hg                 (<10)\nDimensionless severity index (DSI)             0.19              \n \nBased on the above information, what is the likely underlying diagnosis responsible for this patient’s symptoms? Comment on the severity of the underlying diagnosis and provide reasons for your answer.\n \nJFICM Fellowship Exam 2008 No.2", "a": "Severe aortic stenosis (2.0) with impaired LV systolic function.\nReasons: Valve area less than 0.7 cm2 (1.5) and DSI less than 0.2.\n Pressure", "cat": "ECG"}, {"q": "With regards to the following loop\n\n1. What is the view called?\n\n2. Describe the abnormalities\n\n3. What is the likely diagnosis?\n\n4. What treatment is indicated and why?\n\nMedia\n1", "a": "1. TOE, mid-oesophageal, 4 chamber view\n\n2.  A large (unmeasured) echodense mass is present in the left atrium. It appears to be adherent to the atrial border of the anterior mitral valve leaflet, and possibly the interatrial septum, and fills the majority of the left atrium. The mass prolapses through the mitral valve during diastole. Colour flow doppler is not shown, and it is likely there is associated mitral incompetence. The left and right ventricles and tricuspid valves are visualised and appear normal in this view\n\n3. Atrial myxoma: most common primary heart tumour, 80% occur in the left atrium, most commonly arise from left atrial border of fossa ovalis.\n\n4. Due to the size of the lesion and risk of obstruction, worsening valve incompetence, or thrombotic complication, operative removal is indicated. This would require cardiopulmonary bypass.", "cat": "ECG"}, {"q": "Describe the views and abnormalities present on the following loops?\n\nMedia\n1 2 3 4 5", "a": "1. The views shown are;\n\nmid-oesophageal 4-chamber (ME-4) with and without colour flow doppler\nmid-oesophageal 2-chamber (ME-2)\ntrans-gastric short-axis (SAX)\ntrans-gastric long-axis (LAX)\n\n2. There is severe global hypokinesis of the left ventricle, with dyskinesis of the base of the septum, and only the base of the anterolateral segment contracting . There is also a central mitral regurgitant jet.", "cat": "Echo"}, {"q": "A 70 year old male presents to emergency with extreme shortness of breath.  A bedside echocardiograph is taken.\n\nWhat is this view? What is the cause of the patient's dyspnoea?\n\n \n\nImage kindly supplies by Dr Wijesinghe\n\nMedia\n1", "a": "This is a long axis view of the left ventricle.  There is a large pericardial effusion present.  The picture is taken in diastole, and shows the right ventricle buckling inwards (top of image).  This suggests that the effusion is under pressure (tamponade).", "cat": "ABG"}, {"q": "What is this structure, seen on a transoesophageal echocardiogram? \n\nMedia\n1", "a": "This is the short axis view of the aortic valve.  The valve is seen to open into a wide triangle shape during systole.  The non-coronary cusp is on the left of the image, the left coronary cusp is on the right and the right-coronary cusp is below.", "cat": "Echo"}, {"q": "What is the name of this view taken with a Transoesophageal echocardiogram?  What structures are seen within the ventricular cavity?\n\nMedia\n1", "a": "This is the short axis view of the basal left ventricle.  It is taken from behind the heart, and shows the left ventricle as a \"doughnut\", with the right ventricle wrapped around the left side (difficult to see in this example).\n\nThe structures within the image are normal - they are the tips of the mitral valve, the chordae and the papillary muscles.", "cat": "ECG"}, {"q": "A 65 year old man returns from cardiac theatre following coronary artery graft surgery.  You are able to review his preoperative echocardiogram.  \n\nWhat view is shown?  What abnormality is present?\n\n \n\nMedia\n1", "a": "This view demonstrates the long axis view of the left ventricular outflow tract and aortic valve.  There is mild aortic regurgitation present.\n\n \n\nComment : The severity of aortic regurgitation can be assessed by numerous markers including : \n\nWidth of jet : width of LVOT\nDensity of the jet\nDiastolic flow reversal in the descending aorta\nPressure half time of the jet\nEarly termination of mitral inflow (suggesting LV pressure is rapidly rising)\nEffective regurgitant orifice (ERO)\nVena contracta width (width of narrowest diameter of the regurgitant jet)\nRegurgitant volume or regurgitant fraction\nMany others!", "cat": "ECG"}, {"q": "A 67 year old woman returns to ICU from theatre post CAGS.  2 hours later her inotrope requirements rise and she becomes increasingly hypotensive.  A transoesophageal echocardiogram is performed to elucidate the cause.\n\nWhat does it show?  What treatment is required?\n\nMedia\n1", "a": "The clip shows a transgastric short axis view of the heart at the level of the mid-papillary muscles.  It shows the left ventricle barely filling and the right ventricular free wall buckling inwards during the cardiac cycle.  The heart is surrounded by a large pericardial effusion, representing blood.  The patient has cardiac tamponade.\n\nThe patient needs to return to theatre to evacuate the clot and if possible stop the bleeding.  If time critical, the patient may require the procedure to be done in ICU.", "cat": "ECG"}, {"q": "A 71 year old man is admitted to hospital with marked breathlessness.  His xray demonstrates pulmonary oedema.  He deteriorates and requires ventilation.  A transoesophageal echocardiogram is performed.\n\nWhat does it show?\n\nMedia\n1 2", "a": "The initial loop shows the two chamber view of the mitral valve taken in the mid-oesophageal position.  This view demonstrates the inferior left ventricular wall on the left of screen and the anterior wall on the right.\n\nThe main pathology demonstrated is that one leaflet of the mitral valve (the posterior leaflet) is prolapsing badly back wards into the left atrium during systole.  The leaflets do not coapt.\n\nThe accompanying colour-flow doppler image (in the four chamber position) demonstrates severe mitral valve regurgitation.\n\n \n\nComment : note the eccentric direction of the MR jet caused by pathology of one leaflet.  This means that the jet can hug the wall of the left atrium and make its significance (or even presence) difficult to detect in some views.  Additionally, it may cause curious clinical effects, such as directing the regurgitant jet predominantly into one pulmonary vein causing unilateral symptoms, signs and radiological findings.", "cat": "ECG"}, {"q": "New Search Previous\n11. \t\n\nA 65 year old man is admitted to ICU with acute respiratory failure. He is hypoxic and sweaty and is commenced on non-invasive ventilation.\n\nDuring a workup of his condition, the following ultrasound image of his lung is recorded.\n\nWhat does it show?\n\nHow do you interpret the result?\n\nMedia\n1 2\nNew Search View Answer Previous", "a": "The image demonstrates a phenomenon known as \"lung rockets\". These lines are also known as 'comet tails', or B lines.\n\nLung rockets are vertical hyperechoic lines (white arrow) that arise from the pleural line (red arrow). They are described as multiple, clearly defined, and spread to the bottom of the screen without fading. The lines also move with the movement of the lung in real time. B lines have been separated by the distance between them - B3 lines are about 3mm apart, while B7 lines are 7mm apart, as in this case.\n\nB7 lines are thought to represent thickening of interlobular septae and is known as 'interstitial syndrome'. When present diffusely over the anterior chest wall, the major causes for this pattern include pulmonary oedema (cardiac and non-cardiac), infection and neoplasia.\n\nB7 lines are probably the ultrasound equivalent of Kerley B lines on a chest xray.", "cat": "X-Ray"}, {"q": "QL73):  Describe your management strategy if an emergency situation arose with tracheostomy on ICU?", "a": "QL73):  Answer:\n\nPatients with tracheostomy are becoming increasingly common and may be found not only on the Intensive Care Unit, but in a variety of locations throughout the hospital and wider community.  Although tracheostomy/laryngectomy airway emergencies are rare, any member of staff may find themselves having to deal with an imminent airway crisis which, if not resolved promptly, can lead to significant patient harm or death. \n\nThe most commonly encountered problems in patients with tracheostomy include; blockage, full or partial tube displacement and bleeding.  Such complications are stressful events for both staff and the patient.  It is important that tracheostomy tubes are secure but comfortable for the patient and that good tracheostomy care is maintained to reduce such complications.  A recent publication: National Audit Project 4 (NAP4) by the Royal College of Anaesthetists and Difficult Airway Society identified the ‘displaced tracheostomy’ as the greatest cause of major morbidity and mortality in the intensive care unit, with obese patients being particularly at risk.    NAP4 recommended that all patients should have an emergency re-intubation plan.\n\nIn 2012, McGrath et al, published some multi-disciplinary guidelines for the management of tracheostomy and laryngectomy airway emergencies.   These guidelines are presented below and should form the basis of an emergency tracheostomy plan.\n\n\n\n\n\n\n\n\n\n\n \n\nReferences:\n\n \n\nwww.trachostomy.org.uk\n\n \n\nMcGrath BA, Bates L, Atkinson D, Moore JA.  Multidisciplinary guidelines for the management of tracheostomy and laryngectomy airway emergencies.  Anaesthesia.  2012; 67:1025-1041\n\n \n\nThe Royal College of Anaesthetists UK (RCOA): 4th National Audit Project (NAP4): Major complications of airway managemen", "cat": "Biochemistry"}, {"q": "QL74):  You undertake a rapid sequence induction in a patient who is to have an emergency appendicectomy.   On laryngoscopy you are unable to see the vocal cords.\n\nDescribe your management plan for an unanticipated difficult intubation during rapid sequence induction in this non-obstetric patient.", "a": "QL74):  Answer:\n\nThis is an unanticipated difficult intubation during rapid sequence induction.  The Difficult Airway Society (DAS) UK guidelines offer an excellent approach (gold standard in UK) to this situation.  These are present below:\n\n\n\n\n \n\nReferences:\n\n \n\nHenderson JJ, Popat MT, Latto IP, Pearce AC.  Difficult Airway Society guidelines for management of the unanticipated difficult intubation.  Anaesthesia.  2004; 59:675-694\n\n \n\nhttp://www.das.uk.com", "cat": "Clinical"}, {"q": "QL75):  What is this? \n\n\n\n\nDescribe the symptoms and signs of local anaesthetic toxicity and management if this were to occur?", "a": "QL75):  Answer\n\nIntralipid is thought to work by acting as a lipid sink (absorbing circulating local anaesthetic, shifting the pharmacokinetics away from tissue receptors) or/and counteracting the local anaesthetic inhibition of myocardial fatty acid metabolism thereby preserving ATP within the heart\n\nManagement of severe local anaesthetic toxicity AAGBI safety guideline 2010:\n\nRecognition of LA toxicity: Sudden alteration in mental status, agitation, and loss of consciousness, +/-tonic-clonic convulsions.   CVS collapse: sinus bradycardia, conduction blocks, asystole and ventricular tachyarrhythmias.  Toxicity may occur sometimes after an initial injection.\n\nNote: intoxication can present in many different ways, making it very difficult to recognise.  After injection toxicity may develop at any time in the following hour.  Infusion of local anaesthetic through a catheter allows intoxication to develop at any time.\n\n\n   Stop injecting the LA, request help, maintain the airway and, if necessary, secure it with a tracheal tube.  100% oxygen and ensure adequate lung ventilation (hyperventilation may help by increasing plasma pH in the presence of metabolic acidosis). Establish intravenous access and control seizures with small amounts of benzodiazepine, thiopental or propofol.   Consider drawing blood for analysis.\n\nNote: laboratories have encountered difficulty analysing blood drawn during lipid emulsion therapy.  If circumstances allow draw blood for later analysis before lipid emulsion therapy begins.\n\nTreatment\n\nCirculatory arrest:  CPR and arrhythmia management using standard protocols. Recognise arrhythmias are very refractory to treatment and recovery may take >1hr.  Prepare for prolonged CPR.   Consider ca", "cat": "ABG"}, {"q": "QL76):  You are the anaesthetist undertaking a general anaesthetic for an elective functional endoscopic sinus surgery (FESS) case.  Following anaesthetic induction with propofol, fentanyl and atracurium the patient is intubated successfully.  Sevoflurane was used for maintenance of anaesthesia.  Ten minutes into the start of surgery, you notice that the patient’s blood pressure is persistently low (BP 60/40) despite boluses of metaraminol and ephedrine.  They are also tachycardic (105/min).  Airway pressures on the ventilator start to alarm ‘high’.  She is apyrexial.\n\nWhat is your differential diagnosis?\n\nWhat would be your acute management of this case?\n\nWhat early and late investigations would you organise?", "a": "QL76):  Answer:\n\nFinding: Intraoperative hypotension, tachycardia and raised airway pressures (acute bronchospasm). \n\nDifferential diagnosis: \n\nAnaphylaxis to anaesthetic drugs (e.g. atracurium)\n\nMyocardial event / Thrombotic event\n\nAcute bronchospasm (asthma, anaphylaxis)\n\nOver-zealous administration of anaesthetic (unlikely)\n\nMalignant hyperthermia (unlikely)\n\nBleeding event (very unlikely with this type of surgery)\n\n\nDiagnosis: Intraoperative Anaphylaxis\n\nAcute Management involves:\n\nABC resuscitation approach / Follow the AAGBI algorithm below for management of acute anaphylaxis\n\nDeclare a problem ‘A Critical Incident’ / Call for help / Tell the surgeons to stop surgery immediately or quickly finish\n\nMaintain 100% oxygen\n\nElevate legs if possible / iv crystalloid boluses (500-1000ml)\n\nAdrenaline 1:10,000 (50μg boluses iv, 0.5ml of 1:10,000).  Adrenaline infusion may be required.\n\nHydrocortisone (200mg iv), Chlorphenamine (10mg iv)\n\nSalbutamol (neb and/or iv infusion) for severe bronchospasm / Magnesium\n\nCritical care support\n\nInvestigations:\n\nFull laboratory bloods\n\nSerum Tryptase at time zero (when possible) and at 1-2hrs", "cat": "ECG"}, {"q": "QL77):    \n\nHow would a patient with suspected malignant hyperpyrexia present? \n\n \n\nDescribe your acute management?", "a": "QL77):  Answer:\n\n\n\n\n\n\n\nReferences:\n\n\nhttp://www.aagbi.org/sites/default/files/MH%20guideline%20for%20web%20v2.pdf", "cat": "Clinical"}, {"q": "New Search Previous\n6. \t\n\nQL99):  A 72 year man with benign prostatic hypertrophy presented for elective transurethral resection of prostate.  A spinal anaesthetic was done successfully with the patient put into the lithotomy position.  During the procedure, the patient became very restless and agitated.  He then had a seizure.  The patient was intubated and ventilated.\n\nWhat do you think has caused this acute deterioration?\n\nHow would you manage this situation?\n\nNew Search View Answer Previous", "a": "QL99):  During transurethral resection of the prostate the patient is placed in the lithotomy position.  A resectoscope (a modified cystoscope) is inserted into the urethra and slices of prostate are removed using a bare wire and cutting diathermy.  Bleeding vessels are coagulated using a roller ball diathermy instrument.   The field is continuously irrigated with warmed fluid to distend the bladder and wash away blood and dissected prostatic tissue.  Normally, some irrigation fluid will be absorbed by the patient through large prostatic venous sinuses that are exposed during resection.  The extent to which absorption occurs into these sinuses depends on the height of the irrigating solution container above the surgical table (driving hydrostatic pressure) and longer resection times.  Electrolyte solutions such as 0.9% saline, cannot be used as they are highly ionised and will conduct the high frequency diathermy current.  Distilled water may be used, but absorption of large quantities may lead to haemolysis and hyponatraemia.  Iso-osmotic non-electrolyte solutions are now commonly used, such as glycine and Cytal (a combination of mannitol and sorbitol).\n\nTURP-Syndrome:  excessive absorption of glycine / Cytal will lead to circulatory overload, acute pulmonary oedema, cardiac failure and even cardiac arrest.  Hyponatraemia may complicate and cause central nervous system effects such as agitation, confusion, seizu", "cat": "Clinical"}, {"q": "Identify this piece of equipment\nWhat are the indications for its use\nList 4 acute complications\nMedia\n1", "a": "Minitrach.\n\nEmergency airway and for access to airway for suctioning.\n \nBleeding, infection, tracheal damage, pneumothorax, pain, tracheal transection, other\n \nComment : Some patients may continue to struggle with clearance of secretions due to impaired cough or because of tenacious secretions. A minitrach can retain access to the airway in these circumstances, and can maintain a tract so that emergent reinsertion of a tracheostomy tube can occur.", "cat": "X-Ray"}, {"q": "Identify this piece of equipment. \n\nDescribe how it is inserted. \n\nList 3 complications\n\nMedia\n1", "a": "Interosseous needle. \n\nFlat part of upper tibia, sterile procedure, local anaesthetic, screwing motion into bone. Aspirate and flush (+/- blood tests), need pressure to get fluid in.\n\nComplications include infection / osteomyelitis, compartment syndrome, bleeding, dislodgement, growth plate disruption, other.", "cat": "Equipment"}, {"q": "List 4 safety features that ensure the correct gas is given\n\nMedia\n1", "a": "Pin index safety system\n\nCylinder colour\n\nNozzle colour\n\nDiameter index safety system\n\nLabelled yolk\n\nKnob texture\n\nComment : Medical gas cylinders are colour coded to provide a visual cue to their contents. \n\nOxygen cylinders have black body with a white top, as in this case.\nNitrous oxide cylinders are completely blue\nEntonox cylinders have a blue body with a top divided into quarters alternating blue and white\nMedical air has a grey body with a white and black top\nCarbon dioxide is grey with a black stripe on the body\n \nThe wall connectors reflect this, with suction ports in yellow", "cat": "Biochemistry"}, {"q": "Identify this piece of equipment. \nWhat are the indications for its use? \nHow often must you change it?\nMedia\n1", "a": "N95 mask. \n \nUsed for respiratory droplet infection spread (eg SARS, pandemic flu) for general presence in room (not procedures), and reverse barrier nursing in severely immunocompromised patients.\n \nShould be discarded after 4-6 hours use (WHO recommendation) and should not be reapplied if taken off\n \nComment : N95 masks are certified to filter 95% of particles of a particular test size. The N refers to the ability to resist oil (N stands for Non-oil resistant). R means resistant to oil and P means oil proof.\n \nWhile these viruses may be too small for the pores in the masks, they often are droplet spread, and the droplets are big enough to get filtered out.\n \nThe Centre for Disease Control currently recommend that for procedures likely to produce droplets (airway suctioning, intubation etc) a higher level of mask protection is required.", "cat": "Equipment"}, {"q": "What is this piece of equipment?\nWhat are the indications for its use?\nMedia\n1", "a": "Medical AntiShock Trousers\n \nPreviously recommended for severe exsanguinating pelvic fractures. Not commonly utilised now.\n \nComment : MAST suits improve blood pressure but have been associated with worse outcomes, particularly in the subgroup with thoracic trauma. The use of a MAST suit remains controversial, but may have a role when definitive therapy is delayed (eg transportation to definitive centre). Complications include exacerbation of limb ischaemia and pressure ulcers over bony prominences, possibly increasing bleeding due to improved MAP, and decompensation with removal.\n \nMAST suits are generally contraindicated if a patient has a ruptured diaphragm, is pregnant or is in pulmonary oedema.", "cat": "Biochemistry"}, {"q": "What is this piece of equipment?\nHow does it work?\nWhat is the square wave test?\nMedia\n1", "a": "This is a pressure transducer that utilises a Wheatstone bridge. The transducer works by the blood pressure pushing against an internal plate with an integrated strain gauge. When the pressure is applied, the plate/strain gauge distorts slightly. That slight distortion causes the internal resistance of the gauge to change. That change in resistance is proportional to the strain induced and this change can be visually displayed on your patient monitor in the shape of a waveform to indicate changes in arterial pressure.\n \nThe square wave test checks the response of the entire transducer system to verify that the measurements are accurate and free of any distortion. It involves snap-flushing the transducer (generating a square wave on the monitor). The response to releasing the flush gives information on the harmonic characteristics of the system. An underdamped trace reverberates up and down more than once before returning to the arterial pressure waveform, while an overdamped trace does not reverberate at all.", "cat": "Waveforms"}, {"q": "List 4 indications for the use of this item. \nList 5 complications of the use of this piece of equipment. \nHow do you know it is inserted in the correct position?\nMedia\n1", "a": "Indications include : haemothorax, pneumothorax, pleural effusion, empyema, chylothorax, post thoracic surgery. \n \nComplications include: incorrect position, intercostal artery / vein / nerve laceration, pneumothorax, lung laceration, penetration of upper abdominal organs, myocardial damage, pain and consequent pulmonary complications, re-expansion pulmonary oedema, tension pneumothorax, introduction of infection, back-flow of underwater seal drain fluid\n \nCorrect position suggested by – fingersweep, release of air / fluid (depending on indication), fog in tube, swing, CXR / CT imaging", "cat": "X-Ray"}, {"q": "Identify this device. \nList four (4) are the complications of this device not working?\nMedia\n1", "a": "Intubated patients lose the ability to humidify inspired air. This can result in sputum inspisation, defective mucosal activity and other problems. Heat is lost easily from the airways, putting patients at risk of hypothermia.\n \nHumidifiers actively increase the heat and water content of the inspired gases by passing the gas over a heated water bath.\n \nHeat and moisture exchangers also improve humidification and prevent heat loss, but add resistance to the circuit and are less efficient if required for long periods.", "cat": "Equipment"}, {"q": "What is this piece of equipment?\nWhat is the advantage of this item?\nMedia\n1", "a": "This is a Venturi mask, which delivers a known concentration of oxygen as long as the oxygen flow rate is set to the mask’s specifications.\n \nComment: A Venturi mask allows a fixed concentration of oxygen to be given. This is of most use when a patient relies on their hypoxic drive to trigger ventilation, as it prevents over-supplementation of oxygen.", "cat": "Equipment"}, {"q": "What is this item?\nWhat is its function? \nList 3 ways this may improve patient safety\nMedia\n1", "a": "Leukocyte filter\nDonor leukocytes are associated with:\n - Non-haemolytic febrile transfusion reactions\n - graft versus host disease\n - allogenic platelet refractoriness (post transfusion purpura)\n - CMV transmission\n - Transfusion associated immunomodulation (TRIM)\n - possible mortality and organ dysfunction in cardiothoracic surgery\n - possible reduction in cancer recurrence\n \nComment: Leukocytes are associated with multiple complications (above) and are not known to serve any useful function to the recipient. From October 2008, all Australian blood services will be offering leukocyte-depleted blood products only, meaning leukocyte filters will no longer be necessary.", "cat": "Haematology"}, {"q": "What is this piece of equipment?\n\nHow does it work?\n\n \n\nMedia\n1", "a": "Heimlich valve.\n\nIt works because the rubber tube inside the case collapses when the patient breaths in, preventing air entering the chest via the ICC, and opens during expiration when the pressure inside the chest (and thus the tube) is positive.\n\nComment : the Heimlich valve is re-emerging as an alternative to an underwater seal drain.  Complications include disconnection and obstruction, and it usually is not appropriate for large volume air leaks and pleural effusions.", "cat": "X-Ray"}, {"q": "What is this device?\n\nWhat features does it possess which enable this function?\n\nMedia\n1", "a": "Rapid infusion device\n\nThe device is designed to utilise the Seldinger technique of insertion (needle over wire).  The catheter is short and large bore.  Radius is the most important factor in resistance to flow through a tube, closely followed by length.", "cat": "Equipment"}, {"q": "What is the following piece of equipment and how does it work?  \n\nMedia\n1", "a": "This is a rotameter, which measures the flow of a fluid, in this case oxygen.  It contains a tapered glass tube, which allows the \"float\" to move upwards with increasing flows, and downwards through gravity.  With increasing flows, more space around the float is required to allow flow to continue.  The float is designed to rotate, which tells you the float is working, and is not stuck in the tube.\n\nComment : Because the float relies on gravity it must be vertical when working.", "cat": "Equipment"}, {"q": "Give 2 reasons for this appearance in the ultrafiltrate bag from a CRRT circuit\n\n \n\nJFICM fellowship exam question 1/2009\n\nMedia\n1", "a": "Intravascular haemolysis\n\nMyoglobinaemia\n\nRupture of a filter membrane", "cat": "Equipment"}, {"q": "What device is shown below?\n\nWhen is it used and what are its design features which make it suitable for use?\n\nJFICM exam 1/2009\n\nMedia\n1", "a": "A McCoy Blade laryngoscope\n\nA McCoy blade provides improved visualization of the cords in the setting of a difficult intubation. It is used in the normal fashion, and then by squeezing the handle trigger, the tip becomes flexed which allows for the elevation of distal structures, especially the epiglottis.", "cat": "Equipment"}, {"q": "What is this piece of equipment?\n\nDescribe how it is used\n\nList 3 complications of its use\n\nMedia\n1", "a": "This is an ENK oxygen flow delivery system for an emergency needle cricothyroidotomy.\n\nThe ENK has an oxygen supply connector at one end and a luer lock connection for attachment to a needle cricothyroidotomy tube at the other.  It allows manual control of oxygen to the patient in emergency situations by intermittently covering and releasing the holes in the delivery system.\n\nThe ENK is connected to the oxygen supply and to the cricothyroidotomy catheter.  Select an oxygen flow of at least 15 and preferably higher.  Intermittently occlude and release all openings in the tubing by pressing thumb and index finger.  About 100 cycles per minute is recommended by the manufacturer.  Special care to allow decompression should occur in cases of complete airway obstruction.\n\nComplications include :\n\nbarotrauma\npneumothorax\npneumomediastinum\ndislodgement (too much pressure can cause the catheter to be ejected from the trachea)\nhypercapnoea (this device provides oxygenation to the patient but does not ventilate them)\ndynamic hyperinflation", "cat": "X-Ray"}, {"q": "Name this piece of equipment.  What is it used for?  Give an example of a situation where it may yield a false negative result\n\nMedia\n1", "a": "This is a colorimetric capnograph.  It is used to detect the presence of CO2 to confirm placement of the endotracheal tube in the trachea, and by exclusion, rule out oesophageal intubation.  A false negative result (ie the tube is in the trachea but no carbon dioxide is detected) in arrest situations (CO2 must be transported to the lungs for it to be exhaled).\n\n \n\nComment : Colorimetric capnography works as the indicator paper changes colour as the acid-base status of the gas flowing through it changes - a bit like Litmus paper.  The presence of a colour change confirms CO2 presence and is fairly accurate at detecting endotracheal intubation when compared with infra-red capnography.\n\nThe advantages of colorimetric capnography are that it is cheap, readily available, does not require power and works immediately.", "cat": "Waveforms"}, {"q": "What is this piece of equipment?  Describe how it is used.  List 3 potential complications\n\nMedia\n1", "a": "This is a Minnesota Tube, which is used to tamponade haemorrhage due to oesophageal varices.  It differs from the Sengstaken-Blakemore tube in that it has an extra (4th) lumen for oesophageal drainage.\n\nThe Minnesota Tube is used in uncontrolled haemorrhage due to varices.  The patient usually needs intubation both for airway protection and to tolerate the tube.  Various methods for insertion have been suggested.  The following is just one example : Once inserted (at least 50cm), the position is usually confirmed by partly filling the gastric balloon (eg 50ml) and taking an xray.  Once the position is confirmed, the gastric balloon is filled and traction is applied to the tube (usually with the weight of a 1 litre bag of normal saline).  This alone is usually enough to prevent further bleeding, and pressure is usually maintained for up to 24-48hrs.  Ongoing bleeding can be monitored by draining the oesophageal and gastric lumens.\n\nThe oesophageal balloon is rarely required.  When used it should have pressure limited to the lowest pressure required to stop bleeding (usually less than 20mmHg), and the pressure must be released for 5 minutes every 2-6 hours.  This is because the oesophageal mucosa is very sensitive to ischaemic injury.\n\nComplications include :\n\naspiration\noesophageal perforation\npressure necrosis to oesophagus\nnasal cartilage necrosis\nmalpositioning\nloss of airway", "cat": "X-Ray"}, {"q": "Name this device.  What is intended to prevent?\n\nMedia\n1", "a": "This device is an endotracheal tube with a supplementary suction port located above the cuff.  This is designed to suction supraglottic secretions (Continuous Aspiration of Subglottic Secretions - CASS).  This technique is designed to reduce the quantity of oropharyngeal secretions entering the trachea around the cuff, thereby reducing the incidence of Ventilator Associated Pneumonia.\n\n \n\nComment : A number of trials have now reported results supporting the use of these tubes, the largest of which was published in 2008 (1).  This has now led some organisations to recommend them in patients requiring mechanical ventilation > 48 hours (2) \n\n \n\nReference :\n\nBouza E et al.  CHEST November 2008 vol. 134 no. 5 938-946\n\nMuscedere J, Dodek P, Keenan S,\n\nclinical practice guidelines for ventilator-associated pneumonia: prevention.\n\nJ Crit Care 2008; 23:126–137.\n\nUpdated comprehensive evidence-based guideline by the Canadian Critical\n\nCare Trials group regarding VAP prevention. Updated from the 2004 guideline.\n\net al. Comprehensive evidence-based", "cat": "Equipment"}, {"q": "A 40 year old man has sustained chest injuries in a motor vehicle accident and requires mechanical ventilation for the past 24 hours.  He is attached to the following piece of equipment.\n\nWhat is the piece of equipment and how does it work?\n\nWhat important finding is noted here?  What are the possible causes?\n\nMedia\n1", "a": "This is a commercially available underwater seal chest drain kit which is a modified version of the 3 bottle system.\n\nThere is a collection chamber for any drainage of fluid from the chest cavity (D).  Any air flows over this chamber, down the pipe (C) into the underwater seal drain (B).  Suction can be applied and regulated by adjusting the dial (A).\n\nIn addition to the drainage fluid in the chamber, there is a persistant bubbling which appears to co-incide with respiration.  A pneumothorax should drain within a number of hours after insertion of an intercostal catheter, however persistant drainage (eg >24 hours) represents a bronchopleural fistula.  This is a connection between the airways and the pleural space (persistant leak).", "cat": "X-Ray"}, {"q": "What is this piece of equipment?\n\nMedia\n1", "a": "This is a commercially available kit for percutaneous insertion of a tracheostomy.  The tracheostomy is an adjustable flange trachy, which is used for patients with abnormal neck anatomy (eg obesity, severe neck oedema etc).", "cat": "Equipment"}, {"q": "List 2 clinical applications of the following substance\n\nMedia\n1", "a": "This is 20% intralipid.\n\nIntralipid has a role in nutrition both as a caloric source and a supplier of essential fatty acids and fat-soluable vitamins.\n\nIntralipid also has important value in the treatment of cardiotoxic drug toxicity, most notably bupivocaine.  Pre-clinical studies and numerous case reports support its efficacy (see www.lipidrescue.org for more details).\n\n \n\nComment : The role of intralipid in cardiotoxic drug resuscitation is unclear.  While preclinical data is supportive, at present only anecdotal evidence of clinical efficacy exists.  Potential interaction with other resuscitation drugs has not been excluded, nor has its place been established in drugs other than bupivocaine.\n\n \n\nIntralipid's role in nutrition is equally unstable.  There is evidence that enteral nutrition reinforced with omega-3 fatty acids (such as fish oils) can ameliorate production of pro-inflammatory mediators when compared with omega-6 fatty acids (like Intralipid), and this has been demonstrated to have clinical effects in patients with ARDS.  In patients requiring parenteral nutrition there is insufficient evidence to detirmine the best fatty acid profile, though some concerns have been raised that soya based lipids may infact be harmful in patients who are not malnourished and have fasted <10 days.\n\n \n\nReference : www.criticalcarenutrition.com", "cat": "Biochemistry"}, {"q": "A 34 year old man has severe pancreatitis and is intubated in ICU. \n\nWhat is this equipment set up to measure?\n\nIf the reading was 28cmH20, what complications may arise?\n\nMedia\n1", "a": "This is a pressure transducer set up to monitor the bladder pressure.  It is felt that bladder pressure is a measure of intra-abdominal pressure, which can be elevated in a variety of conditions.  This is known as Intra-abdominal hypertension.\n\nA value of 28cmH20 is markedly elevated.  Complications that can arise include :\n\nrenal hypoperfusion and acute renal failure\nimpaired venous return leading to cardiovascular embarrassment\nincreased chest wall compliance resulting in impaired ventilation\nsplanchnic hypoperfusion\n\nComment :\n\nThe World Society of the Abdominal Compartment Syndrome intra-abdominal hypertension as present when intra-abdominal pressures(IAP - measured referenced to the iliac crest in the midaxillary line) are higher than 12cmH2O.\n\nClass 1 - 12-15\nClass 2 - 16-20\nClass 3 - 21-25\nClass 4 - >25\n\nThe \"abdominal compartment syndrome\" is present when there is raised intra abdominal pressure (usually sustained >20) and there is evidence of organ dysfunction OR the abdominal perfusion pressure (defined as MAP - IAP) <60cmH2O\n\n \n\nReference : www.wsacs.org", "cat": "Equipment"}, {"q": "What is the following peice of equipment?\n\nWhat are the advantages and disadvantages?\n\nMedia\n1", "a": "This is a closed endotracheal suction system.\n\nThis system was designed to enclose the suction catheter within the clean field, thereby reducing the risk of ventilator associated pneumonia.  While the catheters may cost more than normal catheters, they can also be reused which  can reduce costs.\n\nUnfortunately there is limited evidence that they reduce the incidence of VAP.  A Cochrane review of the available evidence was published in 2007 and edited in 2008.  It showed that in 16 trials, many of which had significant methodological problems, closed suction systems did not appear to reduce VAP incidence or any other important outcome measure.  Additionally, there appeared to be a statistically significant increase in bacterial colonisation rates of the upper airways.", "cat": "Equipment"}, {"q": "Identify the object indicated by the arrow\n\nMedia\n1", "a": "Chlorhexidine impregnated sponge\n\n \n\nComment : Chlorhexidine impregnated sponges are designed to reduce the rate of infection for centrally placed venous catheters.  Timsit et al performed a randomised control trial of the sponges in patients with central venous and peripheral arterial cannulae.  They demonstrated a Hazard Ratio of 0.39 (0.17-93) for major blood stream infections.  It has been noted however that the initial skin preparation for line insertion in this study was povidone iodine, now known to be less effective than chlorhexidine.  It is unclear whether these sponges are as useful in light of this in current practice.\n\n \n\nReference : JAMA 301:1231-41", "cat": "Clinical"}, {"q": "A 22 year old male is admitted to ICU with severe respiratory failure.  He has bilateral diffuse lung infiltrates and is desaturating on 100% oxygen and 15cmH20 of PEEP.  On echocardiography his LV is contracting normally.\n\nHe is placed on the following device.  What is it?  What are the possible modes and which is most likely here?\n\nMedia\n1", "a": "Extracorporeal membrane oxygenation (ECMO). \n\nTypically ECMO is described as veno-arterial (VA-ECMO) or venovenous ECMO (VV-ECMO).  Venovenous ECMO is usually required when oxygenation fails.  A catheter is placed in the right atrium via a major vein, in this case the femoral, and blood is pumped via an oxygenator, and returned via another vein (again, in this case, the femoral vein).  VV-ECMO relies on the heart contracting well.", "cat": "X-Ray"}, {"q": "What is the item shown in the picture?\n\nIn what circumstances might you use this?\n\nMedia\n1", "a": "The item is a laryngoscope handle which includes the power and light source for a fiberoptic rigid laryngoscope blade.\n\nThe blade is non-standard however in that the blade does not sit perpendicularly to the axis of the handle (ie at 90 degrees), rather it sits at a more obtuse angle of 125 degrees.\n\nThis is useful when it is difficult to get the laryngoscope into the patient's mouth due to large breast tissue or facial distortion.", "cat": "Biochemistry"}, {"q": "What is the following piece of equipment?\n\nHow is it inserted?\n\nList 3 immediate complications from this device\n\nMedia\n1", "a": "Balloon tipped temporary transvenous pacing wire\n\nAccess to the major veins must first be obtained.  The natural curve of the catheter favours insertion of a sheath into the right internal jugular / left subclavian vein.  However, other sites are possible.\n\nThe pacing wire is inserted into the sheath.  Once the tip and balloon are in the vein, the balloon is carefully inflated.  Blood flow carries the balloon tip through the tricuspid valve and into the right ventricle.  The balloon should then be deflated or the balloon can be carried into the RVOT and out of the ventricle.\n\nAttaching the distal electrode to a V2 lead allows comparison of the electrical signal from the balloon tip with a surface ECG.  A classical pattern of ECG changes from the tip is seen that can assist location of the device.  When the tip is located in the atrium, the P wave is enlarged.  As the catheter passes into the right ventricle the P wave inverts and the QRS waves increase in amplitude.  Contact with the RV myocardium induces a \"pattern of injury\" signal in the ST segments.\n\nBlind insertion has been described.  The pacing wire is inserted while connected to the pacing box, with pacing signals being sent.  Monitoring of surface ECG for evidence of electrical capture is used to determine adequacy of placement.  While this procedure is often faster and may be effective, it provides little information on position during the procedure.\n\nComplications at the time of insertion include :\n\nbleeding\npneumothorax\narrhythmia\nright ventricular perforation\nmalposition", "cat": "ECG"}, {"q": "New Search Previous\n29. \t\n\nWhat is this device and what is it used for?\n\nWhat are the advantages and disadvantages of this device?\n\nMedia\n1\nNew Search View Answer Previous", "a": "This is a Wright's spirometer.  \n\n \n\nThe spirometer is used to confirm measurements of expired volumes of gas.  Expired gas passes through oblique slits within the spirometer, which creates a circular flow of gas.  This results in rotation of a rotor, which is coupled via a set of linkage gears to a display indicator dial and needle. The large needle records single breaths (and can be reset after each) while the smaller needle measures cumulative volumes.  The spirometer measures gas volume in one direction only. Flow can be calculated by averaging recorded volumes over time.\n\nIts advantages are that no power supply is necessary, and the device is lightweight and portable. It is also very accurate for measuring volumes.  Owing to inertia in the system it tends to overestimate higher volumes and underestimate lower ones.", "cat": "Equipment"}, {"q": "QL4):\n\nWhat is this?\n\n \n\nWhat are the perceived benefits of using such a device?", "a": "QL4):  Answer\n\nSize 7.0  Endotracheal tube with supra-glottic suction (TaperGuard TM ETT)\n\nOne theory for ventilator associated pneumonia (VAP) is the translocation of oropharyngeal bacteria into the airways.  Bacterial biofilm/slime accumulates above the endotracheal inflated cuff.  Despite the cuff being inflated, bacteria can still translocate around.  Supraglottic suction provides continuous low pressure suction above the cuff, which effectively removes secretions and biofilm theoretically reducing translocation and VAP risk. \n\nEvidence for effectiveness or not in reducing VAP is awaited.", "cat": "Equipment"}, {"q": "QL21):  Describe this airway device?  In what patients would this device be considered?", "a": "QL21):  Answer:\n\nThis device is an uncuffed, size 3.0 (internal diameter, mm) endotracheal tube.\n\n\nThis size of endotracheal tube would be suitable for preterm neonates (weight 2-4kg).\n\nA rough guide for sizing endotracheal tubes in neonates/paediatrics:\n\nIf the infant weight is <2kg a size 2.5 endotracheal tube (ETT) would be suitable. \n\n2-4kg a size 3.0mm ETT\n\nTerm neonate 3.5mm ETT\n\n3months-1yr 4.0mmETT\n\nOver 2yrs the formula: ETT size = (age/4)+4 is often used.", "cat": "Equipment"}, {"q": "QL68): \n\nWhat is this device?\n\nWhat readings are acceptable values on the ICU?", "a": "QL68):  Answer:\n\nThis device is a Tracheal Cuff Pressure Manometer.\n\nOverinflation of endotracheal cuffs (high volume, low pressure cuffs) can cause significant morbidity to patients, particularly if patients are ventilated for a long duration.  Complications of cuff overinflation include: tracheal ischaemia, tracheal stenosis, tracheal tears and tracheomalacia.\n\nTracheal cuff monitoring using a manometer or through continuous tracheal cuff pressure monitoring varies significantly between institutes including: the
