;

const CATS = ['ABG','ECG','X-Ray','CT','Echo','Biochemistry','Haematology','MRI','Ultrasound','Waveforms','Equipment','Clinical'];
const CAT_COUNTS = {};
ALL_Q.forEach(q => { CAT_COUNTS[q.cat] = (CAT_COUNTS[q.cat]||0)+1; });

let selCats = new Set(CATS);
let mode = 'seq';
let queue = [];
let idx = 0;
let scores = {};
let sessionScores = {};

function loadState(){
  try{
    const s = localStorage.getItem('ciq_scores');
    if(s) scores = JSON.parse(s);
    const b = localStorage.getItem('ciq_best');
    if(b) document.getElementById('best-disp').textContent = b+'%';
    document.getElementById('done-disp').textContent = Object.keys(scores).length;
  }catch(e){}
}

function saveState(){
  try{ localStorage.setItem('ciq_scores', JSON.stringify(scores)); }catch(e){}
}

function buildCatGrid(){
  const g = document.getElementById('cat-grid');
  g.innerHTML = '';
  // All button
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn all-btn';
  allBtn.textContent = 'All';
  allBtn.onclick = () => {
    selCats = new Set(CATS);
    document.querySelectorAll('.cat-btn:not(.all-btn)').forEach(b => b.classList.add('on'));
  };
  g.appendChild(allBtn);
  CATS.forEach(cat => {
    const cnt = CAT_COUNTS[cat]||0;
    if(!cnt) return;
    const b = document.createElement('button');
    b.className = 'cat-btn on';
    b.textContent = cat + ' (' + cnt + ')';
    b.onclick = () => {
      if(selCats.has(cat)){ selCats.delete(cat); b.classList.remove('on'); }
      else { selCats.add(cat); b.classList.add('on'); }
    };
    g.appendChild(b);
  });
}

function setMode(m, el){
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function startExam(){
  sessionScores = {};
  let pool = ALL_Q.map((q,i)=>i).filter(i => selCats.has(ALL_Q[i].cat));
  if(mode === 'rand') pool = pool.sort(()=>Math.random()-.5);
  else if(mode === 'wrong') {
    pool = pool.filter(i => scores[i] === false);
    if(!pool.length) pool = ALL_Q.map((_,i)=>i).filter(i=>selCats.has(ALL_Q[i].cat));
  }
  queue = pool;
  idx = 0;
  document.getElementById('scr-start').style.display = 'none';
  document.getElementById('scr-q').style.display = 'block';
  loadQ();
}

function loadQ(){
  const qi = queue[idx];
  const q = ALL_Q[qi];
  document.getElementById('q-num-lbl').textContent = 'Q'+(idx+1)+' / '+queue.length;
  document.getElementById('prog-fill').style.width = ((idx/queue.length)*100)+'%';
  const tag = document.getElementById('q-cat-tag');
  tag.textContent = q.cat;
  tag.className = 'q-cat-tag tag-'+q.cat.replace(/[^a-zA-Z]/g,'');
  document.getElementById('q-body').innerHTML = formatQ(q.q);
  document.getElementById('a-body').textContent = q.a;
  document.getElementById('ans-box').classList.remove('show');
  document.getElementById('btn-reveal').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-fin').style.display = 'none';
  document.getElementById('self-row').classList.remove('show');
  document.getElementById('self-row').innerHTML = '<span>Self-assess:</span><button class="btn-self btn-got" onclick="markSelf(true)">✓ Got it</button><button class="btn-self btn-miss" onclick="markSelf(false)">✗ Missed</button>';
}

function formatQ(text){
  if(text.includes('\t')){
    const lines = text.split('\n');
    let pre=[], tableRows=[], post=[], inT=false;
    for(let i=0;i<lines.length;i++){
      if(lines[i].includes('\t')&&lines[i].trim()){
        inT=true; tableRows.push(lines[i]);
      } else if(inT&&tableRows.length>1){
        post=lines.slice(i); break;
      } else if(!inT){ pre.push(lines[i]); }
    }
    if(tableRows.length>1){
      const firstCells = tableRows[0].split('\t').filter(c=>c.trim());
      const isHdr = firstCells.some(c=>['Variable','Value','Range','Parameter','Result','Normal','Test'].some(h=>c.includes(h)));
      let tbl='<table class="abg-table">';
      if(isHdr){
        tbl+='<thead><tr>'+firstCells.map(h=>'<th>'+esc(h.trim())+'</th>').join('')+'</tr></thead><tbody>';
        tableRows.slice(1).forEach(r=>{
          const cells=r.split('\t').filter(c=>c.trim());
          if(cells.length) tbl+='<tr>'+cells.map(c=>'<td>'+esc(c.trim())+'</td>').join('')+'</tr>';
        });
      } else {
        tbl+='<thead><tr><th>Variable</th><th>Value</th><th>Reference</th></tr></thead><tbody>';
        tableRows.forEach(r=>{
          const cells=r.split('\t').filter(c=>c.trim());
          if(cells.length) tbl+='<tr>'+cells.map(c=>'<td>'+esc(c.trim())+'</td>').join('')+'</tr>';
        });
      }
      tbl+='</tbody></table>';
      let postText = post.join('\n').replace(/New Search.*/s,'').trim();
      return '<span style="white-space:pre-wrap">'+esc(pre.join('\n').trim())+'</span>'+tbl+'<span style="white-space:pre-wrap">'+esc(postText)+'</span>';
    }
  }
  return '<span style="white-space:pre-wrap">'+esc(text.replace(/New Search[\s\S]*/,'').trim())+'</span>';
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function revealAns(){
  document.getElementById('ans-box').classList.add('show');
  document.getElementById('btn-reveal').style.display='none';
  document.getElementById('self-row').classList.add('show');
  if(idx===queue.length-1) document.getElementById('btn-fin').style.display='inline-block';
  else document.getElementById('btn-next').style.display='inline-block';
}

function markSelf(correct){
  const qi=queue[idx];
  scores[qi]=correct; sessionScores[qi]=correct;
  saveState();
  document.getElementById('self-row').innerHTML=correct
    ?'<span style="color:var(--green);font-family:var(--mono);font-size:13px">✓ Marked correct</span>'
    :'<span style="color:var(--red);font-family:var(--mono);font-size:13px">✗ Marked for review</span>';
}

function nextQ(){ idx++; loadQ(); }

function showResults(){
  document.getElementById('scr-q').style.display='none';
  document.getElementById('scr-results').style.display='block';
  const total=queue.length;
  const attempted=Object.keys(sessionScores).length;
  const correct=Object.values(sessionScores).filter(v=>v===true).length;
  const pct=attempted>0?Math.round((correct/attempted)*100):0;
  const numEl=document.getElementById('res-num');
  numEl.textContent=correct+'/'+attempted;
  numEl.className='num '+(pct>=70?'score-g':pct>=50?'score-m':'score-b');
  document.getElementById('res-pct').textContent=pct+'% self-assessed correct';
  document.getElementById('res-sub').textContent=total+' questions reviewed';
  try{
    const prev=parseInt(localStorage.getItem('ciq_best')||'0');
    if(pct>prev) localStorage.setItem('ciq_best',pct);
  }catch(e){}
  // Category breakdown
  const catData={};
  queue.forEach(qi=>{
    const cat=ALL_Q[qi].cat;
    if(!catData[cat]) catData[cat]={correct:0,total:0};
    catData[cat].total++;
    if(sessionScores[qi]===true) catData[cat].correct++;
  });
  let bdHtml='<div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px">By Category</div>';
  Object.entries(catData).sort((a,b)=>b[1].total-a[1].total).forEach(([cat,d])=>{
    const p=d.total>0?Math.round((d.correct/d.total)*100):0;
    const col=p>=70?'var(--green)':p>=50?'var(--yellow)':'var(--red)';
    bdHtml+=`<div class="cat-row"><div class="cat-name">${cat}</div><div class="cat-bar-wrap"><div class="cat-bar" style="width:${p}%;background:${col}"></div></div><div class="cat-score" style="color:${col}">${d.correct}/${d.total}</div></div>`;
  });
  document.getElementById('cat-breakdown').innerHTML=bdHtml;
  // Review list
  let revHtml='';
  queue.forEach((qi,i)=>{
    const r=sessionScores[qi];
    const dc=r===true?'dot-g':r===false?'dot-r':'dot-n';
    const preview=ALL_Q[qi].q.replace(/\t/g,' ').substring(0,80).trim()+'...';
    revHtml+=`<div class="review-item"><div class="dot ${dc}"></div><span>Q${i+1}: ${esc(preview)}</span></div>`;
  });
  document.getElementById('review-items').innerHTML=revHtml;
}

function goHome(){
  document.getElementById('scr-results').style.display='none';
  document.getElementById('scr-start').style.display='flex';
  loadState();
}

buildCatGrid();
loadState();
</script>
</body>
</html>
