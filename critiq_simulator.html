large doses of vasoconstrictors to maintain her pressures, and the following morning she shows signs of abdominal tenderness.  She undergoes CT scanning.\n\nWhat does the scan show?", "a": "The abdominal scan demonstrates significant intra abdominal fluid.  Additionally there is marked thickening of the small and large bowel wall with increased enhancement with contrast.  These changes cross the vascular supply regions.  These changes are consistent with rebound hyperaemia following marked hypoperfusion - the so-called \"Shocked Bowel\" appearance.\n\nIntravascular devices are noted in both femoral veins.\n\nOther than a small calcified gall stone, the other abdominal organs are normal.\n\nComment : Ischaemic gut can be due to vascular obstruction or non-obstructive causes.  This is an example of the latter, which like other causes of inflammatory bowel, causes increased contrast enhancement and wall thickening.  It also tends to cross vascular territories. \n\nIn contrast, vascular obstruction can have the following features :\n\nthickened bowel wall\nloss of contrast enhancement\nfollows vascular territory\nair in the gut intestinal wall\ncan sometimes see hyperdense vessel (due to clot) at the point of obstruction", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20125.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20222.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20315.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20412.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2058.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2063.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2072.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%208.JPG"], "cat": "CT"}, {"q": "A 32 year old female presented after a motor vehicle accident.  She was the driver and was T-boned at 100kph by another car.  She is complaining of respiratory distress and upper abdominal pain.\n\nThe following CXR is taken in the resuscitation bay.  Describe the findings", "a": "There is marked hyperdensity of the right hemithorax with shift of the mediastinum to the left.  This is largely due to a haemothorax.  There is suggestion of a mass in the lower right hemithorax as well - this is likely to be the liver, due to a ruptured hemidiaphragm, or a phrenic nerve palsy.  Ultrasound or CT scanning will provide more information.\n\nIn this case, CT confirmed a ruptured hemidiaphragm with hepatic hernation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ruptured%20right%20hemidiaphragm%20with%20liver%20hernia.jpg"], "cat": "ABG"}, {"q": "A 72 year old man presents following a fall 2 days previously, which has been followed by headache and confusion.  He has a history of ischaemic heart disease and his only medication is aspirin.\n\nDescribe the features of the following CT.", "a": "The CT shows a hyperdense lesion within the layers of the right tentorium, extending into the right temporo-parietal area.  This is consistent with a subdural haematoma.  The density of the blood suggests that the bleed is acute (within days).\n\nThere is evidence of mass effect with compression of the temporal horn of the right lateral ventricle.  There is no evidence of midline shift or herniation.\n\nAge related cerebral atrophy is also noted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20126.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20223.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20316.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20413.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2059.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2064.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2073.JPG"], "cat": "CT"}, {"q": "A 32 year old female is the driver in a car which crashed at high speed into a tree. The impact was predominantly to the drivers door. She complains of marked shortness of breath and right sided trunk pain. She is tachycardic, moderately hypotensive and hypoxic. No neurological abnormality is present.\n \nA CT of her chest is performed \u2013 what does it show?", "a": "The scans show a collapsed right lower lobe. A moderate right sided haemothorax is noted. There is evidence of a ruptured right hemidiaphragm with presence of the liver displaced into the right hemithorax. The left lung is relatively clear. The mediastinum is slightly displaced to the left side, and a small pneumomediastinum is present. However, the mediastinal structures are within normal limits.\nA right sided intercostal tube is noted with the tube lying anterior to the liver. A small residual pneumothorax is present.\n \nNo fractures of the ribs or spine are apparent on these views.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20127.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20224.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20317.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20414.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20510.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2065.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2074.JPG"], "cat": "X-Ray"}, {"q": "A 40 year old female motor-cyclist is involved in a high speed accident. She is unconscious at the scene and is intubated by paramedics, and brought to ED. In ED she is hypoxic and hypotensive.\n \nA chest xray is taken as part of her initial assessment. Describe the findings.", "a": "The CXR is a supine film. An endotracheal tube is present and the tip is located in the right main bronchus. There is some shift to the left and loss of airspace on the left, suggesting partial collapse of the left lung. An occult right pneumothorax as a cause of the shift cannot be excluded. Generalised haze of the left lung may represent haemothorax. There is a fracture of the right 3rd rib laterally, and a displaced fracture of the right clavicle.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/3rd%20r%20rib%20fracture%20and%20rmb%20intubation.jpg"], "cat": "X-Ray"}, {"q": "A 40 year old female motor-cyclist is involved in a high speed accident. She is unconscious at the scene and is intubated by paramedics, and brought to ED. In ED she is hypoxic and hypotensive.\n \nA pelvis xray is taken as part of her initial assessment. Describe the findings.", "a": "There are bilateral superior and inferior pubic rami fractures. The remainder of the pelvis appears normal\n \nThis is not an unstable fracture unless there is instability of the posterior part of the pelvis (eg ligamentous separation of the SIJs), which can be detected clinically.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bilat%20sup%20inf%20rami%20fractures.jpg"], "cat": "X-Ray"}, {"q": "A 76 year old man is brought to ED with an altered conscious state.  He appears to have a right sided facial droop. \n\nA CT of his brain is performed.  Is the scan normal?", "a": "The most notable abnormality is the hyper-dense Middle Cerebral Artery sign.  This is caused by thrombus in the MCA and is one of the earliest CT signs of acute ischaemic stroke. \n\nThere are other early signs of ischaemia too.  Careful examination demonstrates a subtle hypodensity in the left basal ganglia region involving the lentiform nucleus and the head of the caudate nucleus. This is due to early oedema.  On the coronal slices, the \u201cinsular cortex\u201d is seen to bow out slightly due to the swelling.\n\nThese features are consistent with a left early acute MCA territory ischaemic infarct. No evidence of haemorrhage visualised.\n\nComment : in Middle Cerebral Artery occlusions the earliest signs are the presence of a hyperdense artery and loss of grey-white differentiation and oedema in the basal ganglia.  These changes can be subtle and careful examination is required.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20128.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20225.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20318.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20415.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20511.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2066.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2075.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2081.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%209.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2010.JPG"], "cat": "CT"}, {"q": "A 50 year old male cyclist is brought into ED having run into the back of a parked car at high speed.  He is complaining of severe dyspnoea and chest pain.\n\n Describe the features of the CT", "a": "There is marked surgical emphysema noted along the left chest wall.  An intercostal tube is noted in the left hemithorax.  A small residual haemopneumothorax is present.\n\nThere is collapse of the left lung noted with herniation of the spleen and peritoneal fat through the ruptured left hemidiaphragm.\n\nThe mediastinal vascular structures are within normal limits.\n\nMultiple fractures of the left sided ribs are present.  The thoracic spine is intact.\n\nThere is a laceration also noted through the lower pole of the spleen measuring about 4cm. Minimal perisplenic fluid noted at the inferior pole.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20129.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20226.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20319.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20416.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20512.JPG"], "cat": "X-Ray"}, {"q": "A 16 year old girl is admitted to the childrens ward with severe anorexia, complicated by a mild diarrhoeal illness.  She is rehydrated with IV dextrose and NG feeds are commenced.  On day 2 she is found collapsed in the toilet with a blood pressure of 75/45, atrial fibrillation with a rapid ventricular response of 135 and generalised weakness.\n\nHer electrolytes are as follows :\n\n \n\nParameter\tValue\tNormal Range\npH\t7.22\t7.35-7.45\nPaCO2\t21mmHg\t35-45mmHg\nPaO2\t174mmHg\t \nNa\t130mmol/L\t135-145mmol/L\nK\t1.2mmol/L\t3.5-5mmol/L\nCl\t110mmol/L\t100-110mmol/L\nBlood glucose\t9.0mmol/L\t4.4-8.9mmol/L\nBicarbonate\t16mmol/L\t22-32mmol/L\nPhosphate\t0.29mmol/L\t0.81-1.45mmol/L\nMagnesium\t0.22mmol/L\t0.70-1.10mmol/L\n\nDescribe the findings\n\nWhat is the most likely mechanism for this picture?\n\nHow will you manage this situation?", "a": "There is evidence of severe hypokalaemia, hypomagnesaemia and hypophosphataemia, associated with a mild metabolic acidosis.\n\nThese findings, with the clinical history, are classic of severe refeeding syndrome.  This is related to a relatively sudden rise in blood sugar load and consequent insulin exposure, which results in increased cellular uptake of phosphate, potassium and magnesium.  The hypotension, weakness and dysrhythmias are all results of the electrolyte deficiencies.\n\nManagement includes:\n\nAttention to airway, breathing, circulation\nStop all caloric intake\nMonitor in a high acuity area with resuscitation equipment\nReplace electrolytes aggressively\nGive thiamine and folate (both consumed with refeeding)\nSlowly re-introduce feeding, monitoring fluid balance, cardiac function and electrolytes\n\nComment : Refeeding syndrome is a variable condition associated with reintroduction of feeding after a period of severely restricted caloric intake.  Apon exposure to insulin, there is intracellular shift of essential electrolytes which may result in potentially fatal deficiencies, particularly for phosphate.  Additionally, consumption of thiamine may precipitate acute deficiency, known as Wernicke's encephalopathy.\n\nHypophosphataemia is associated with :\n\nimpaired oxygen transfer\ncardiomyopathy\nweakness and eventual respiratory insufficiency\nrhabdomyolysis\nhaemolysis\nneurological dysfunction", "imgs": [], "cat": "ABG"}, {"q": "A 22 year old previously well female is admitted to ED with acute pleuritic chest pain.  The has a temp of 37.5 degrees celcius, heart rate 110, blood pressure 110/70 and respiratory rate of 20.  Her chest is clear, as is her CXR.  The following arterial blood gas is obtained on room air.\n\n \n\npH\t7.58\t7.35-7.45\nPaO2\t70\t85-100mmHg\nPaCO2\t30\t35-45mmHg\n\nDescribe the results of the blood gas\n\nWhat is the likely diagnosis?  What would you expect to see on the ECG?", "a": "There is a respiratory alkalosis with a raised A-a gradient (40).  These findings are consistent with acute pulmonary embolus, though other causes should be considered (eg pain, respiratory stimulant drugs, sepsis etc).  The low grade fever and increased respiratory rate fit with acute PE.\n\nThe ECG in acute pulmonary embolus can be variable.  The most common feature is sinus tachycardia and may be normal.  Other changes that can occur include evidence of RV acute overload :\n\nprominent R wave in V1\nRight bundle branch block\nRight axis deviation\n\nThe classically described \"S1Q3T3\" pattern is actually quite rare.\n\nComment : Assuming that this was acute respiratory alkalosis, the bicarbonate would be expected to be 2 above normal (~30mmol/L).", "imgs": [], "cat": "ABG"}, {"q": "An 18 year old female is brought to emergency after a high speed MVA.  She is hypoxic, unconscious and hypotensive.\n\nFollowing basic resuscitation she is taken to CT for abdominal scanning.\n\nDescribe the results of the scan", "a": "Abdominal soft tissue windows and lung windows of lower chest and upper abdomen are available.\n\nThe lower chest shows evidence of bilateral haemopneumothorax noted with more significant haemothorax on the left side. Surgical emphysema is noted on the right.  The underlying lungs are significantly contused / consolidated.\n\nThere is a 4cm horizontal laceration noted just anterior to the caudate lobe of the liver. The laceration measures about 1cm in thickness. \n\nThere is also a contusion noted through the anterosuperior aspect of the spleen and is surrounded by a subcapsular haematoma.\n\nA moderate amount of blood is noted around the liver, spleen, paracolic spaces and in the pelvis.\n\nThe rest of the liver appears normal. The gallbladder and pancreatic region appear normal. Both the kidneys have a normal size. No definite evidence of contusion/laceration is visualised.\n\nThere is generalised mucosal enhancement noted of the bowel which is likely to be oedema of the wall consistent with \"shock bowel\".\n\nComment : this is a classic appearance of shock bowel due to hypoperfusion and stasis of contrast within the bowel wall.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20130.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20227.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20320.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20417.JPG"], "cat": "X-Ray"}, {"q": "A 58 year old male presents after being punched at a hotel, falling back and hitting his head.  He has a GCS of 7 at the scene and is intubated by paramedics.  No other injury is immediately apparent.\n\nDescribe the features of the CT", "a": "Scattered tiny haemorrhagic contusions are noted in both the parietal lobes superiorly within the cortex. Similar small lesions are seen in the left temporal lobe and in other areas.  These features are consistent with diffuse axonal injury (DAI).\n\nThere is a small amount of subarachnoid haemorrhage is also noted in the left temporal and frontal sulci and right frontal sulci.\n\nThere is no significant mass effect seen and no evidence of ventricular dilatation/midline shift.  The basal cisterns are normal.\n\nThere is a large soft tissue contusion/haematoma noted over the right side of the scalp\n\nComment : Diffuse axonal injury is related to the shear forces generated between areas of the brain with different densities when accelleration or decelleration occurs.  This can be seen on CT early after injury is punctate haemorrhages in the cortex or deeper structures, particularly at grey-white matter junctions.  The extent of injury is often underestimated by CT - MRI is better at demonstrating these lesions.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20131.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20228.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20321.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20418.JPG"], "cat": "ECG"}, {"q": "A 22 year old male presents to ED with increasing left upper quadrant pain, a week after being kneed in the abdomen playing football.  He is pale and sweaty.\n\nDescribe the features of the CT", "a": "This contrast CT of the abdomen shows an enormous perinephric haematoma surrounding the left kidney.  The kidney itself is enhancing, but appears to have been lacerated through the anterior aspect of the lower pole.\n\nThe spleen and the liver look normal, though there is significant free fluid within the peritoneal space, surrounding the spleen and liver superiorly, and extending into the pelvis inferiorly.  The other organs appear normal, other than a simple cyst of the right kidney.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20132.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20229.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20322.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20419.JPG"], "cat": "CT"}, {"q": "A 31 year old woman presents to emergency 15 minutes after a first ever convulsion.  Her blood sugar was normal, Sats 99% on room air and haemodynamically stable.  There is no history of fitting in her family and she has no other medical problems.\n\n \n\nA CT is performed.  What does it show?", "a": "There is a subtle 3.5cm diameter poorly defined hyperdense mass noted in the left posterior frontal lobe with thick peripheral calcifications within it.  There is adjacent white matter oedema noted with mass effect (it is compressing the lateral ventricle and causing 5mm shift of the midline).  No evidence of haemorrhage or hydrocephalus is seen. \n\nSlight thinning and bowing out of the adjacent frontal bone is noted laterally. No erosion of the cortex is seen however.  The rest of the brain parenchyma is normal.\n\nThese features suggest the possibility of an underlying slow growing tumour or vascular malformation.\n\nA contrast enhanced CT or MRI are required for further evaluation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20133.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20230.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20323.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20420.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20513.JPG"], "cat": "CT"}, {"q": "A 27 year old is involved in a motorbike accident.  He is complaining of severe pain in his left knee and lower leg. \n\nDoes this CT explain why?", "a": "There is a comminuted fracture noted of the upper end of the tibia involving the articular surface.  A lipohaemarthrosis is seen within the joint.\n\nThe articular alignment however appears to be normal.  The adjacent femoral bone, the patella and the fibula are intact.\n\nContrast has been used and demonstrates the arterial structures.  The popliteal artery is totally occluded for a distance of about 9cm. There must be collateral flow as the trifurcation is seen with contrast in the distal vessels, though to a lesser degree than in the right leg.\n\nThis may be due to thrombosis/dissection.  There is no active extravasation of contrast seen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20134.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20231.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20324.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20421.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20514.JPG"], "cat": "Biochemistry"}, {"q": "A 76 year old man is recovering on the ward from cryptococcal meningitis.  He has had 6 days of antifungal therapy.  On day 7 he becomes increasingly drowsy and nauseated.  No focal neurological signs are found and no other cause for decreased level of consciousness is noted.\n\nA CT is performed. \n\nWhat does it show?  How would you manage this problem?", "a": "The CT shows dilatation of the lateral, third and fourth ventricles.  Though there is age related cerebral atrophy, the ventricular dilatation is out of preportion to the basal cisterns and the prominence of the sulci.  This is suggestive of acute obstructive hydrocephalus.  The obstruction is likely to be at the level where the CSF leaves the ventricular system (Foramen of Luschka and Magendi).\n\nManagement involves acute management of the patient's airway, breathing and circulation, ensuring adequate oxygenation and maintenance of blood pressure.  As with any acute neurological condition, attention to temperature, blood glucose and serum sodium are required.  Definitive management requires neurosurgical intervention to decrease the pressure, by insertion of a shunt.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20135.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20232.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20325.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20422.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20515.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2068.JPG"], "cat": "ECG"}, {"q": "A 51 year old male presents following a fall from a balcony, approximately 6m above the ground.  He is unconscious and was intubated at the scene.  The following CT is obtained.\n\nDescribe the results", "a": "There is evidence of a complete bifacetal dislocation of the C6 anteriorly over C7 vertebral body.  This appears to have completely obstructed the spinal canal with likely severe cord injury.  A fracture of the postero-inferior aspect of the C6 vertebral body is also present with small fragments seen retropulsion to the spinal canal.  Note the C6-7 disc space is markedly reduced.\n\nThe posterior laminae and spinous process of the C6 vertebral are fractured and displaced posteriorly.  A further fracture is seen through the left antero-inferior aspect of the C7 vertebra. Small wedge fracture fragment is seen of the antero-superior aspect of the T2 vertebral body.\n\nThere is soft tissue swelling noted anterior to the C6-7 vertebra.\n\nThe rest of the vertebral bodies and disc spaces appear normal.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20136.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20233.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20326.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20423.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20516.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2069.JPG"], "cat": "CT"}, {"q": "A 70 year old woman presents to ED with central chest pain, hypoxia and signs of right ventricular failure.  A CTPA is ordered by ED staff.\n\nWhat does it show?", "a": "Filling defects are noted in the distal portions of both the main pulmonary arteries straddling the upper and lower lobe arterial divisions. The defects are seen trailing down into both the lower lobe pulmonary arteries,and are also seen in parts of the upper lobe arteries.\n\nThere are some changes of mosaic perfusion seen in both the upper lobes predominantly in the apices and anterior segments.\n\nComment : lobular areas of alternating high and low attenuation on CTPA is known as \"mosaic perfusion\".  This is thought due to occlusion of small pulmonary arteries.  Sometimes the calibre of the vessels within the darker areas are seen to be smaller than in whiter areas, though this is often subtle.  They are much more common in chronic PE but can be seen in acute PE.  They are the CT version of the CXR finding known as Westermark's sign.  Note that a similar pattern can be seen with heterogenous small airways disease leading to lobular gas trapping.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20137.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20234.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20327.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20424.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20517.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20610.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2076.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2082.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2091.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20101.JPG"], "cat": "ECG"}, {"q": "A 24 year old female passenger in a high speed motor vehicle accident is brought to emergency hypotensive and tachycardic. \n\nThe following abdominal CT is performed.  Describe the results.  What would you do?", "a": "There is a large laceration / contusion within the right lobe of the liver.  There is free fluid around the liver, spleen and within the pelvis.  Other organs in the abdomen appear normal and there is no boney injury immediately apparent.\n\nThe lower chest lung windows demonstrate a large right sided pneumothorax despite an Intercostal tube.  The tube appears lodged in the mediastinum.\n\nComment : There is fluid in the abdomen which is likely to be blood.  There does not appear to be enough blood to cause hypotension, though in combination with other sources of blood loss may contribute.  No contrast has been given so active bleeding is difficult to appreciate (delayed phase CTs are very useful for detecting this). \n\nIt is important to use all available information - the lower cuts of the chest on the CT demonstrate a residual pneumothorax, despite an intercostal tube.  The tube has been advanced too far and may be occluded - it needs to be withdrawn.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20139.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20236.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20329.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20426.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20519.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20613.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2077.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2083.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2092.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20102.JPG"], "cat": "X-Ray"}, {"q": "A 65 year old female presents to emergency after falling at home.  She is very light headed and tachycardic. \n\nA chest xray is performed.  Describe the findings", "a": "There is total opacification of the left hemithorax, with shift of the mediastinum to the right and widening of the right rib spaces.  This, in keeping with the clinical history suggests a massive haemothorax.\n\nNotably, the patient has had cardiac surgery (sternotomy wires are present).  This raises the question of medications, as the patient may be on aspirin / clopidogrel for coronary artery disease, or warfarin for valvular disease.  Either may have contributed to the massive haemothorax.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/haemothorax.jpg"], "cat": "X-Ray"}, {"q": "A 23 year old diabetic female presents with sepsis and loin pain.  Ultrasound shows no obstruction but evidence of renal scarring due to chronic reflux.  She is commenced on ceftriaxone 2g daily.\n\nAt 13 hours, her blood culture becomes positive with Serratia marcescens.  \n\nDiscuss her antibiotic management", "a": "Serratia marcescens is one of a group of bacteria that produce an inducible cephalosporinase (ie the bacteria has a chromosomally encoded betalactamase which is expressed when exposed to cephalosporins).  This usually develops with days and often results in treatment failures, even though in vitro the bug is sensitive.\n\nThe other bugs to which this applies are given the collective name \"ESCAPPM organisms\".  These include Enterobacter, Serratia, Citrobacter freundii, Acinetobacter (some),  Providencia, Proteus vulgaris and penneri and Morganella morganii.  Aeromonas has been included by some authors", "imgs": [], "cat": "Ultrasound"}, {"q": "A 32 year old female presents to emergency with a rapid deterioration in conscious state over the past 3 hours.  She has been unwell for 2 days with body aches, neck pain and lethargy.  \n\nOn examination she has neck stiffness, has a GCS of 12 and has a temperature of 38.9 degrees.  A lumbar puncture is performed and the results are as follows :\n\nGram stain - no organisms seen\nWCC 16/mmsq\nRCC 8/mmsq\nGlucose <0.3mmol/L\nProtein 2600 mg/dL\nIndia ink - negative\n\nInterpret the results\n\nWhat would your management plan be?", "a": "The results show an extremely low glucose and a very high protein level.  The most likely cause of this is bacterial meningitis.  Against this diagnosis, the white cell count is very low (99% of patients with bacterial meningitis have a CSF WCC >100/mmsq).  However there are a number of case reports of early CSF cultures having misleadingly low white cell counts.\n\nGiven the clinical picture is highly suggestive of bacterial meningitis, the glucose and protein counts, and the severity of consequences of mistreatment, treatment should begin on a presumptive basis.  This should include antibiotics to cover the common bacterial causes (Meningococcus, Pneumococcus and Haemophilus), steroids and possibly aciclovir until herpes encephalitis is excluded.  Supportive neurocritical care is also required.\n\nIn this case, meningococcal PCR was positive.  A repeat lumbar puncture demonstrated a CSF WCC of 1900 cells/mmsq.\n\n \n\nReference: Fishman RA. Cerebrospinal fluid in diseases of the nervous system. 2d ed. Philadelphia: Saunders, 1992.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 44 year old male has been in intensive care for management of chest trauma sustained in a motor vehicle accident.  On discharge to the ward, his central venous catheter is removed, and the tip sent for culture.  The insertion site appears clean and he is afebrile.\n\n2 days later, the following report is sent to the ICU for your review.\n\nCVC tip: Semiquantitative culture\n\n>15 CFUs\n\nStaphylococcus epidermidis\n\n \n\nAntibiogram\nPenicillin\tFlucloxacillin\tAugmentin\tClindamycin\tErythromycin\tTetracycline\nR\tS\tS\tS\tS\tS\n\nDiscuss the results and your management", "a": "The results show that by the Maki method (cutting off the tip and subcutaneous segment of the catheter and rolling it once on an agar plate), there are >15 colony forming units (ie 15 separate growth colonies on the plate) which is consistent with a positive result.  Assuming there are still no symptoms or signs of infection, and that appropriate collection has occured (sterile technique, skin cleansing, sterile transportation), this constitutes colonisation only.  Antibiotic management is not warranted (particularly now the catheter is out)\n\nComment : Maki's method is but one of many methods of defining catheter-related infection.  In Maki's study, the method successfully identified all cases of line related bacteraemia and 64% of local site infections.  Though infection at a distant site which results in bacteraemia (ie haematogenous spread) did cause some growth on the CVC tip, it did not reach 15 CFUs.  No catheters with <15CFU were associated with positive blood cultures or local site infections.  This is now the most commonly used method of defining CRI.\n\nThere is no role for routine screening of lines - without symptoms or signs of infection, this line should not have been sent for culture", "imgs": [], "cat": "Clinical"}, {"q": "A 26 year old man presents to ED a week following an assault at the pub, where he was beaten with a chair.  He has developed acute abdominal pain and distension and feels very light headed and unwell.\n\nWhat injury has he received?", "a": "There is marked contusion and laceration of the spleen.  Bright blood can be seen in this portal phase scan which indicates active bleeding from the injury.  The splenic vessels themselves appear normal.  There is evidence of massive blood loss into the peritoneal cavity.  Bowel can be seen swimming in the fluid.\n\nComment : Delayed splenic rupture has been an observed phenomenon for some time, and is defined as rupture of clinically inapparent splenic injury >7 days following injury.  Intitial case reports suggested this was simply a failure to recognise and diagnose the condition.  However, case reports are now emerging that DSR can present with initially normal CT scans, followed by catastrophic bleeding >1 week later.\n\nFurther reading : Gamblin TC, Wall CE Jr, Royer GM, Dalton ML, Ashley DW. Delayed splenic rupture: Case reports and review of the literature. J Trauma 2005; 59:1231-1234.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20140.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20237.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20330.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20427.JPG"], "cat": "CT"}, {"q": "A 25 year old female presents with a 3 day history of fever, headache and vomiting.  She is usually well and has no specific risk factors on questioning.  Her temp is 39.1, HR 95, BP 110/80.  She is photophobic and has some neck stiffness.  There is no rash or other added signs, and her GCS is 15.\n\nThe following pathology is reported.  What are the possible causes?  What other tests would you do?", "a": "The pattern on this CSF is likely to be viral (lowish WCC, predominant monocytosis, normal glucose and protein), though 10% of patients with bacterial meningitis can also have this pattern.\n\nCommon causes include:\n\nViral - enteroviruses (by far the most common), herpes simplex encephalitis, varicella, HIV, arborviruses\n\nBacterial - partially treated, listeria\n\nOther - tuberculosis, cryptococcus\n\nNon-infectious - drugs, toxins, inflammatory disorders, CNS malignancy, other\n\nEssential tests now include:\n\nextended culture\ncryptococcal antigen and India Ink stain (positive in up to 50%)\nZN staining for acid fast bacilli\nPCR for enteroviruses and HSV\nOthers specific to risk factors\nCytology", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CSF.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/blood.jpg"], "cat": "Biochemistry"}, {"q": "An 8 year old boy has presented to emergency with a seizure.  He has recently been unwell with fevers and lethargy, resolving completely 2 weeks ago.  The fevers have returned and  he has had progressive confusion, irritability and listlessness over the last 3 days.  No meningism is found on clinical examination.  His pupillary reflexes are sluggish, and he has spasticity and increased tone in all four limbs.\n\nAfter stabilising the patient, an MRI is performed.\n\nWhat does it show?  What treatment would you institute?", "a": "This is a FLAIR sequence MRI (CSF and other free flowing fluid is suppressed, showing areas of oedema.  It shows an area of high signal in multiple discrete areas, particularly at Grey-White interfaces, with central lower signal.  FLAIR stands for Fluid Attenuated Inversion Recovery.\n\nThe most likely diagnosis is Acute Demyelinating Encephalomyelitis, due to the convincing clinical story.  However, there are features which are consistent with Multiple sclerosis, including a lesion in the corpus collosum.  Alternative diagnoses could include metastatic infection or malignancy, though there is little evidence of mass effect which would be expected with these diagnoses.  Increased enhancement with contrast would be expected with infection / malignancy too (these scans are non-contrast).\n\nComment : ADEM is most commonly seen in children, particularly <12 years old.  It commonly follows a viral illness or vaccination, and is associated with a period of recovery prior to onset of neurological symptoms.  Common features include a monophasic presentation (as opposed to Multiple Sclerosis), progressive conscious state change, upper motor neurone signs, cranial nerve dysfunction and seizures.\n\nComplete recovery can be seen within one month (up to 60%) with complications (most commonly seizures) seen in 30%. Relapse is not common.  Steroids are believed to improve outcomes.  Immunoglobulin has also been used with reported success.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/mradem1_9_3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mradem2_9_5.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mradem4_9_15.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mradem5_9_17.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mradenm6_9_21.jpg"], "cat": "Biochemistry"}, {"q": "A 59 year old man is found unconscious at home.  He is haemodynamically stable, has a normal blood sugar and once ventilated, has no respiratory issues.\n\nHe has small unresponsive pupils, no evidence of cough or gag reflexes, and is not breathing.  He has non responsive occulocaloric and corneal reflexes.  There is no evidence of IV drug use or trauma.\n\nThe following Diffusion Weighted Image (first 3 images) and Magnetic Resonance Angiography scans are performed.  Describe the results", "a": "The DWI images show areas of restricted diffusion involving the pons and medulla (except for a small area on the posterolateral aspect on the left side), right cerebellar peduncle, vermis, multiple areas in the right cerebellar hemisphere, multiple small foci in bilateral occipital lobes and a small focus in the splenium of corpus callosum on the right side. . The midbrain and left cerebellar hemisphere appear to be relatively spared. These findings are strongly consistent with infarction.\n\nThere is a complete block of the basilar artery immediately after the union of the bilateral vertebral arteries. This thrombus is just extending into the proximal left PCA for a short distance.  Other arteries appear normal.\n\nThese features are consistent with basilar artery thrombosis and infarction of the pons and medulla.\n\nThrombolysis is controversial in complete basilar artery thrombosis.  Survivors are left severely impaired, and treatment may be futile.\n\nComment : Diffusion Weighted imaging is an MRI sequence which rapidly detects impaired fluid shift (eg normal purfusion), and can demonstrate infarction early after flow stops.  It would be expected that some oedema would be present on T2 and FLAIR imaging.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20141.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20238.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20331.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20428.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20520.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20614.JPG"], "cat": "MRI"}, {"q": "This is an image from an MRI scan of a 60 year old man with altered conscious state.\n\nWhat type of image sequence is this?  What is this image sequence used for?", "a": "The image is a FLAIR image (Fluid Attenuated Inversion Recovery).  In this sequence, the CSF (and any other free-running fluid) appears jet black, and any increased signal in the brain is due to oedema.\n\nComment:\n\nT1 images also have dark CSF, but this is usually a mirky appearance.  It is useful for demonstrating acute haemorrhage in brain tissue.\n\nIn T2 images, the CSF appears bright, as does oedema fluid. \n\nDiffusion Weighted Imaging studies detect normal flow of fluids across spaces.  This is very useful for detecting the earliest changes associated with cerebral infarction.\n\nSTIR is another sequence which suppresses signal associated with fat.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/flair%20axial%2012.jpg"], "cat": "Biochemistry"}, {"q": "An 80 year old man is admitted to ED with increasing confusion following a minor fall 2 days ago.  He has been progressively deteriorating in cognitive function over the past 2 months.\n\nA CT is performed.  What does it show?", "a": "There is a fairly large 15 x 8 x 3.5 cm acute on chronic subdural haematoma noted extending from the right frontal to the posterior parietal region. There is mass effect noted on the adjacent brain with shift of the midline by about 10mm at the level of the lateral ventricle.\n\nThe brain parenchyma is otherwise normal and shows age related atrophic changes.  No evidence of hydrocephalus can be seen.\n\nComment : There is evidence of old subdural haemorrhage - this is the darker fluid.  The fluid changes density during maturation, which is why it floats on top of the heavier acute blood (white).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20143.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20240.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20333.JPG"], "cat": "CT"}, {"q": "A 19 year old diabetic was admitted to ICU with severe DKA.  She required a femoral vein CVC for access to central circulation.  On day 3 she develops an acute lower limb DVT extending into her femoral vein.  The catheter is removed and she complains of shortness of breath and mild pleuritic chest pain.\n\nClinically she looks well and has normal blood pressure.  Her heart rate is 105 and her saturations are 95% on room air.\n\nA CTPA is performed to rule out acute pulmonary embolus.  What does it show?", "a": "There is a very large saddle embolus straddling the bifurcation of the main pulmonary artery, and extending down into the left lower lobe pulmonary artery. There are further pulmonary emboli in the first and second order branches of the right pulmonary artery.\n\nComment : Despite the massive clot straddling her pulmonary artery bifircuation, and further clot in her pulmonary arteries, there is enough flow to preserve oxygenation.  It is remarkable that she has such trivial signs and symptoms - a good reminder to take the diagnosis seriously.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20144.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20241.JPG"], "cat": "Clinical"}, {"q": "A 70 year old woman is recovering in ICU following routine aortic valve replacement.  She is slow to progress due to respiratory failure, and a transoesophageal echocardiogram is performed to evaluate her cardiac function.  She is given 40mg propofol and 2mg midazolam, and her airway is anaesthetised with lignocaine spray.  The echocardiogram is performed without incident and demonstrates normal prosthetic valve function and vigorous LV function.\n\n30 minutes after the procedure she is noted to desaturate.  Her sats progressively fall to 85% and she has profound cyanosis.  Despite hand ventilation on 100% oxygen, her saturations fail to improve.  An arterial blood gas is taken.\n\n \n\npH\t7.48\nPaCO2\t41mmHg\nPaO2\t424mmHg\nHCO3\t31mmol/L\nSats\t99.9%\n\nThe arterial blood is noted to be dark brown in colour\n\nDescribe the gases and explain the results.  What would you do?", "a": "There is a mild metabolic alkalosis.  There is a marked discrepancy between the pulse oximeter and the \"Saturation reading\" of the arterial blood gas analysis.  Additionally, despite a high PaO2, the patient is cyanosed and the pulse oximeter saturations are low.  This, and the clinical syndrome, are consistent with severe methaemaglobinaemia.  In this case, it is likely to have been precipitated by the lignocaine spray.\n\nApart from supportive management and withdrawal of the offending cause, treatment relies on the administration of methylene blue (1-2mg/kg, administered over 5 min).\n\nComment : the pulse oximeter analyses the absorbtion of 2 wavelengths of light only.  It only reports Hb in terms of oxygenate and deoxygenated haemoglobin.  As levels of MetHb increase, pulse oximeter readings trend towards 85%.\n\nThe saturations reported by standard blood gas analysis are calculated values based on the PaO2 and other variables.  This explains why the reported sats are so high.\n\nThe arterial blood gas also performs a co-oximeter reading uses 6 wavelengths of light.  This allows for differentiation of other types of Hb (oxyHb, deoxyHb, metHb, carboxyHb and sulphHb for example).", "imgs": [], "cat": "ABG"}, {"q": "A 72 year old man returns to ICU from cardiothoracic surgery.  He is hypotensive and is requiring increasing doses of inotropes.  A routine post operative chest xray is taken.\n\nWhat does it show?", "a": "The xray demonstrates a right sided pneumothorax.  It is difficult to see a lung edge, but there is evidence it is there - the Deep Sulcus Sign.  The right costophrenic angle seems to extend downwards for ever, and the liver outline is clearer that would normally be expected.\n\nThe deep sulcus sign is sometimes the only sign of a pneumothorax on a supine chest xray.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/deep%20sulcus%20sign2.JPG"], "cat": "X-Ray"}, {"q": "An 80 year old female presents to ED with abdominal pain.  She is cool peripherally and is tachycardic.\n\nThe following abdominal xray is taken.  What does it show?", "a": "There is air under the diaphragm and Riggler's sign is present.  These indicate that there has been a perforation of the bowel.  Surgical clips are seen in the right upper quadrant.\n\nRiggler's sign is present when air can be seen on both sides of the bowel wall, as seen in the left upper quadrant of this film.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/freegas2_2_1.jpg"], "cat": "X-Ray"}, {"q": "A 24 year old man presents to ED hypotensive after being crushed between a boat and a dock for a period of 30 minutes.  He was compressed between his nipples and his pelvis.\n\nAfter 2 L saline resuscitation he stabilises and is sent for CT\n\nComment on the results", "a": "The scan shows disruption of the duodenum between the second and third parts, with fluid / haemorrhage in this area, and fluid in the peritoneum.  No contrast is seen in this area which suggests ongoing bleeding is unlikely.\n\nAdditionally, there is no contrast enhancement of the right kidney due to an obstruction of the right renal artery (where there is a filling defect).  An additional filling defect is noted in the right internal iliac artery, though contrast is seen distal to the obstruction.\n\nFractures are noted of the lateral process of L1 and possibly L2", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20145.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20242.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20334.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20429.JPG"], "cat": "Biochemistry"}, {"q": "A 71 year old male is seen in admission clinic prior to his hernia repair.  The following ECG is taken.  He reports a mild history of hypertension, and has had two recent \"turns\" which resolved rapidly.\n\nWhat does the ECG show?  What would you do?\n\n \n\nECG provided by Chris Dugan, with thanks", "a": "The ECG shows sinus rhythm at rate 60.  There is borderline PR prolongation, right bundle branch block and left anterior hemi block (otherwise known as bi- or tri-fascicular block).\n\nThe patient needs referal to cardiology for assessment for pacing prior to surgery.\n\nThis patient suffered an episode of third degree block with haemodynamic compromise requiring temporary transvenous pacing, 3 days after this ECG was taken.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bifasicular%20block.jpg"], "cat": "ECG"}, {"q": "A 70 year old male presents with severe chest-abdominal pain and shock.  A contrast enhanced arterial phase CT is performed.\n\nDescribe the results", "a": "There is hyperdense fluid noted within the pericardial sac measuring approximately 2.5 cms in maximum AP diameter anteriorly. Fluid is seen to extend to the superior recess at the level of the arch of the aorta\n\nThe appearance and clinical history is suggestive of haemorrhage, but the cause of this however is not clear. The most likely cause is aortic dissection though this cannot be clearly seen.  There is no aneurysmal change or intimal flap apparent.\n\nContrast can be seen refluxing into the inferior vena cava, where is layers due to the higher density, and into the hepatic veins.  This is due to increased right sided pressures.\n\nThe lung fields are relatively clear with basal congestion and atelectatic changes. No pleural effusion/ collection visualised.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20146.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20243.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20335.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20430.JPG"], "cat": "X-Ray"}, {"q": "A 41 year old male presented to ED with confusion after being assaulted at the pub.  A head CT is performed to rule out intracranial injury.\n\nDescribe the findings of the scan", "a": "FINDINGS : No focal brain parenchymal lesion seen.  The basal cisterns are normal.\n\nThere is soft tissue contusion noted in the right periorbital region, and an air fluid level is noted in the right maxillary sinus. This is an important sign of associated injury.  There is a suggestion of a blow out fracture of the posterolateral floor of the orbit. There is no herniation of muscle seen however.\n\nThe rest of the bones visualised are normal. An orbital blowout fracture was confirmed on bone windows.\n\nComment : It is important to check the entire scan for evidence of injury - in this case, there is evidence available of a potentially important injury which can be easily missed unless a careful examination is made.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20147.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20244.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20336.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20431.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20521.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20615.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2078.JPG"], "cat": "Clinical"}, {"q": "A 70 year old woman presents with chest pain and hypotension.  A CTPA is performed.\n\nIs the scan normal?", "a": "There is no evidence of intrapulmonary pathology, and the CTPA excludes any major pulmonary embolus.\n\nThere is, however, an anatomical variant.  There is a persistant left sided SVC (which is less bright due to the lack of contrast), which wraps around the heart to empty into the right atrium.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20148.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20245.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20337.JPG"], "cat": "Biochemistry"}, {"q": "A 72 year old man is admitted post operatively to ICU following a laparotomy for necrotic small bowel.  He has a history of smoking related lung disease, and on admission is saturating in the low 90's despite 60% oxygen.\n\nThe following xray is taken.  What does it show?  What is the likely cause?", "a": "There is a right sided pneumothorax of considerable size.  The patient is intubated.  The lungs show evidence of chronic obstructive airways disease.\n\nA right sided subclavian vein central venous line is in situ.  These lines are commonly associated with inadvertent pneumothorax.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/right%20PTx%20with%20ETT%20and%20SCV%20CVC.jpg"], "cat": "X-Ray"}, {"q": "A 70 year old man has had a pneumothorax secondary to a central line.  He has chronic obstructive airways disease and is oxygenating poorly.  Despite insertion of a right intercostal tube, and an initial gush of air, he remains hypoxic.  A chest xray is taken to confirm the position of the ICC.\n\nReport the findings of the xray.", "a": "The ICC appears appropriately placed.  Although we can't see the bases of the lungs, the right lung appears to have inflated, although it appears a small residual pneumothorax exists.  There is a right subclavian CVC in situ, which is probably the cause of the initial pneumothorax.\n\nThere is a large left sided pneumothorax with shift of the mediastinum to the right, consistent with tension.\n\nThe patient needs to have a second ICC inserted", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/left%20PTx%20with%20ETT%20and%20right%20ICC.jpg"], "cat": "X-Ray"}, {"q": "A 53 year old man presents to ED having fallen 3 storeys.  He is unconscious, maintaining his airway with support and is haemodynamically stable.  He has moved his arms to painful stimulus, but not his legs.\n\nComment on the lateral C-spine film\n\nWhat would you do now?", "a": "This film is inadequate as it only shows the cervical spine from C1 to  the top of C6.  There is no acute injury demonstrated in this film.\n\nFor appropriate plain films to be performed, a repeat film with the arms pulled down, or a swimmers view, are required to visualise the C7-T1 junction.  Additionally, an odontoid process view (open mouth), AP and possibly obliques are required.\n\nGiven the mechanism and suggestive clinical findings, a CT is likely warranted.\n\nIn this case, there was a bifacet dislocation at the C6-7 level, not seen on this initial xray.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/incomplete%20lateral.jpg"], "cat": "X-Ray"}, {"q": "A 68 year old male presents to the ED with altered mental state and lethargy, increasing in severity over the past 2 weeks.  He has a history of traumatic brain injury and alcoholism, and has been taking sodium valproate for a consequent seizure disorder and ramipril for hypertension.  He is known to have abnormal LFTs\n\nOn examination he is found to be obtunded, with florid asterixis.   No focal neurological signs are present.  FBE, electrolytes, INR and arterial blood gases are all normal.  LFTs are largely unchanged, and a serum valproate level is 59mg/L (normal therapeutic range 50-100mg/l).  A head CT is performed, and is reported as normal.  Blood sugar levels are normal.\n\nWhat is the likely diagnosis?", "a": "Valproate hypoerammonaemic encephalopathy.\n\nVHE is an uncommon complication of valproate therapy.  In practice the diagnosis is often delayed by under-recognition.  As in this case, it may be associated with normal therapeutic levels of valproate.  It should be suspected in any patient presenting with confusion who take valproate, particularly in those with suspected or known liver impairment.\n\n \n\nReference : Hepatic encephalopathy precipitated by sodium valproate therapy.  Subhash H et al.  MJA 2008; 188:549", "imgs": [], "cat": "Biochemistry"}, {"q": "A 22 year old female is brought to ED after crashing her vehicle in a Go-Carting competition.  She is complaining of severe neck pain.\n\nThe following xray is taken.  Describe the findings", "a": "The lateral C-spine film is incomplete as it only shows C1-C6.  There is retrolisthesis of C5 on C6, shifting approximately 7mm in distance.  There is also a fracture through the anterior-inferior corner of the C5 vertebral body.\n\nThis is an unstable injury", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/958982_RA04059772_1.jpg"], "cat": "X-Ray"}, {"q": "A 79 year old man is found collapsed in his garden.  He has apparently had a syncopal episode and has hit his face against a garden post.  He has no recollection of the event, and describes pain in his occipital area.  He has no apparent neurological signs\n\nA plain xray is taken - describe the results", "a": "There is a fracture through the upper portion of the dens, with retrolisthesis of the C1 on C2.  Osteopenia is noted in the bones of the cervical spine.\n\nComment : Due to the relatively large area at the upper end of the cervical spinal canal, significant disruption can occur without neurological outcomes.\n\nA high level of suspicion for vertebral injuries is required in elderly patients, particularly those with osteopenia.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cropped.jpg"], "cat": "X-Ray"}, {"q": "A 45 year old man is brought to ED following a motor vehicle accident.  He has a GCS of 13 with a significant facial laceration.\n\nA CT is performed of his cervical spine.\n\nDescribe the results", "a": "There is a transverse fracture noted through the base of the odontoid process just below the level of the articulation of the anterior arch of the atlas.  On the left this extends towards the lateral mass.\n\nThe vertebral alignment, the facetal joints, the spinous processes and the disc spaces are normal.\n\nThere is minimal soft tissue thickening noted anterior to the fractures.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20149.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20246.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20338.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20432.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20522.JPG"], "cat": "Clinical"}, {"q": "A 42 year old woman is admitted to ED with acute asthma.  The following xray is taken.  What previous procedure has been performed?", "a": "This is a clamshell closure of an ostium secundumatrial septal defect.  The device is inserted percutaneously via a catheter which passes the device across the defect from the right atrium.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/clamshell%20asd%20closure.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/clamshell%20asd%20closure%20lateral.jpg"], "cat": "X-Ray"}, {"q": "A 13 month old girl presents to ED with severe shortness of breath and wheeze.  She is saturating at 89% on room air, and has a respiratory rate of 40.\n\nThe following CXR is taken.  What does it show?  What is the likely diagnosis?", "a": "There is soft tissue density opacity in the right upper zone suggestive of a partial collapse/consolidation in the upper lobe. Mild haziness also noted in the rest of the lung fields with peribronchial thickening.  The cardiac size is normal.\n\nThis film is consistent with the diagnosis of acute bronchiolitis.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bronchiolitis%20and%20rul%20collapse.jpg"], "cat": "X-Ray"}, {"q": "A 43 year old man presents to a secondary level hospital with acute chest pain.  He is confused, hypotensive, cold and is coughing pulmonary oedema fluid.  He is given high flow oxygen, aspirin and morphine.  The following ECG is taken.  Discuss the results\n\nWhat would you do?", "a": "The ECG shows a massive anterolateral myocardial infarction.  The clinical signs suggest severe cardiogenic shock / cardiac failure in this context.\n\nAfter securing the airway, applying oxygen and PEEP, securing IV access and taking blood, the patient should receive thrombolysis if there are no contraindications.  Alternatively, urgent PCI if available may be possible.  He would likely benefit from intra-aortic balloon counterpulsation.  Cardiology should be urgently consulted with regard to urgent PCI or CAGS.\n\nComment : Cardiogenic shock has an extremely high mortality and survival depends on returning flow to the coronary arteries.  Maintaining diastolic pressure without increasing myocardial oxygen demand and afterload is difficult with medications.  IABP can reduce afterload while improving coronary perfusion.  Ultimately, revascularisation either with thrombolysis or mechanical methods is required.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/massive%20mi.JPG"], "cat": "ECG"}, {"q": "A 45 year old dialysis patient presents to emergency with abdominal pains and light headedness.  While awaiting assessment, her conscious state falls and the following ECG is taken.\n\nWhat does it show?  What would you do?", "a": "The ECG demonstrates complete heart block with a wide complex ventricular escape rhythm of 20.  She requires :\n\nsupport of airway and oxygenation\nimmediate IV access, with bloods for ABG, blood chemistry, full blood examination and glucose\ndrug therapy for severe bradycardia (atropine, adrenaline, isoprenaline)\ntemporary transcutaneous pacing\n\nIn the clinical setting, the possibility of severe hyperkalaemia is relatively high.  In this case, the serum potassium was 7.9mmol/L.  The patient's ECG normalised with 10mls 10% calcium chloride", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/hyperkalaemia.jpg"], "cat": "ECG"}, {"q": "A 54 year old male with chronic liver disease has failed to regain consciousness 1 week after admission to ICU with septic shock. complicated by cardiac  arrest.\n\n1. Please comment on the following MRI\n\n2. What is the likely aetiology?", "a": "1. Widespread infarction involving the cerebellum and cerebral hemispheres bilaterally. The distribution of infarcts is predominantly in the watershed zones between the vascular territories with further areas of cerebral infarction involving the left middle and posterior cerebral artery territories.\n\n2. The appearances are most likely secondary to severe global hypotension or hypoxic episode.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/mrijun091.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mrijune0921.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mrijun0932.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/mrijun0941.jpg"], "cat": "MRI"}, {"q": "A 26 year old female with melanoma is referred to ICU with hypotension.\n\n1. Please comment on the following CT scan, what is the likely aetiology?\n\n2. What therapeutic measures would you  implement to treat this?", "a": "1. Large soft tissue deposits consistent with the appearance of metastatic disease are demonstrated within the liver, with a massive lesion, appearing to originate from segment 4, which occupies most of, and expands the left lobe of liver. Other relatively smaller deposits in segments 2 and 3. There is a hyperdense fluid collection adjacent to the inferior margin of the liver  in keeping with the appearance of an haematoma.This is associated  with free fluid.\n\n2. \n\n-resuscitate, particularly volume and packed cell replacement\n\n- correct coagulopathy\n\n- interventional radiology to embolise bleeding\n\n- surgical options limited, with consideration of overall prognosis", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/livermet1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/livermet2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/livermet3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/livermet4.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/livermet5.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/livermet6.jpg"], "cat": "CT"}, {"q": "A 57 year old alcoholic patient presents to the emergency department with fever and tachycardia.  He is confused and is referred to ICU for management and observation. \n\nHe has clinical ascites; his abdominal exam reveals mild generalised tenderness.  A therapeutic tap is performed, and some fluid is sent for analysis.\n\n \n\nWhite cell count\t1123 cells/uL\nPolymorphs\t954 cells/uL\npH\t7.21\n\nWhat does the fluid show?\n\nList 4 complications of this procedure", "a": "The fluid shows a high white cell count which is predominantly neutrophils consistent with acute spontaneous bacterial peritonitis.  The pH is low which is consistent with infection.\n\nRisks of an abdominal paracentes include :\n\nBleeding\nIntroduce infection\nBowel perforation\nParacentesis leak\nTip fragmentation\nCardiovascular compromise / renal impairment / hyponatraemia / encephalopathy related to rapid fluid shifts (usually only related to therapeutic taps)\n\nComment : Spontaneous bacterial peritonitis is a clinically nebulous disease which can range from absent signs to florid peritonism.  A paracentisis is often required to confirm the diagnosis.  Fluid can be directly innoculated into blood culture bottles at the bedside, and gram stain plus biochemical testing (as above) can provide preliminary information.\n\nA PMN count >250 cells/uL appears to increase the likelihood of  SBP significantly, while counts less than this make the diagnosis unlikely (likelihood ratio 0.20).  Acidic fluid (pH<7.35) is also highly associated with infection.\n\nReference : Wong C et al.  JAMA 2008; 299:1166-78", "imgs": [], "cat": "ABG"}, {"q": "A 56 year old diabetic man presents to emergency with severe cellulitis, hypotension, fever and tachycardia. The area of cellulitis extends from ankle to knee and originated from a cut obtained while beach fishing in northern New South Wales. Haemorrhagic bullae are present.\n\n While supportive care is initiated, blood cultures, routine bloods and a wound swab are taken. Surgical debridement is planned.\n \nThe initial wound swab gram stain reports the presence of slightly curved gram negative bacteria.\n \nWhat is the likely cause? What is the treatment of choice?", "a": "Vibrio vulnificus cellulitis. Intravenous ciprofloxacin is the treatment of choice. Ceftriaxone or a tetracycline are alternatives, while aminoglycocides have variable efficacy.\n \nComment : V. vulnificus is a virulent gram negative organism commonly found in warmer salt water (halophilic). Like all Vibrio species, it tends to have a slight curve in its shape. It is known to cause severe necrotising wound infections, often related to sea water wounds. Patients with immune compromise, particularly liver disease, are thought to be at higher risk.\n \nV. vulnificus is also associated with gastrointestinal disease and sepsis caused by ingestion of undercooked seafood inoculated with the organism.", "imgs": [], "cat": "ECG"}, {"q": "The following study is performed in a patient following a severe front-on impact motor vehicle accident.\n\n What is the study? What does it demonstrate?", "a": "This is an aortic angiogram with run off into the arch and arch vessels. It demonstrates pseudoaneurysm formation of the proximal portions of both the brachiocephalic artery and the left subclavian artery.\n \nComment :\n \nApproximately 30% of patients with aortic injury also have injury to one or more of the arch branch vessels. The incidence of isolated branch vessel injuries is not clear, but appears less common. Multiple vessels are involved in about 10% of cases.\n \nAs in blunt aortic injury, a high index of suspicion is required to diagnose branch vessel injury, as clinical signs are non-specific. Significant injury to the upper chest and neck, including sash-type seatbelt injury should raise clinical suspicion.\n \nCT scanning of the chest and neck is the investigation of choice. Formal arch aortography is invasive and recent results suggest it has a limited role compared with current CT scanning techniques.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/branch%20artery%20injury%20angiogram.jpg"], "cat": "CT"}, {"q": "A 30 year old Malaysian man presents to ED with severe flaccid weakness. He had previously been taking Carbimazole for hyperthyroidism though this had been ceased 12 months previously without complication.\n \nHis initial investigations were as follows :\nNa 135\nK 1.5\nCl 110\nBic 22\nGluc 7.5\nPhosphate 0.41\nMg 0.65\nCa 2.25\nCr 65\n \nWhat is the cause of his weakness? How should he be treated?", "a": "Thyrotoxic periodic paralysis.\n \nTPP is a condition recognised in patients with hyperthyroidism who develop significant hypokalaemia and weakness. The mechanism is incompletely understood but relates to hyperactivity of the Na-K ATPase. This activity may be driven by adrenergic agents, which have more effect in the presence of thyroxine and insulin. Attacks commonly occur at night after high carbohydrate loads (stimulating insulin release) and after periods of exercise.\n \nTPP is more common in Asian men with thyrotoxicosis but is relatively rare in Europeans. Associated hypophosphataemia and moderate hypomagnesaemia are not uncommon. \n \nWhile potassium replacement is effective and often required, rebound hyperkalaemia may occur. It is thought that serum K deficiency is related to transcellular shift and as such, total body potassium is largely unaltered. Early treatment with propranolol may reduce Na-K ATPase activity, and prompt diagnosis and treatment of hyperthyroidism is important.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 55 year old male is involved in a motor vehicle accident.  He has multiple long bone fractures and several broken ribs.  He complains of tingling in his legs and midline neck pain.\n\nThe following xray is taken.\n\nWhat is the view?  What does it show?", "a": "This is a Swimmer's view of the lower cervical spine.  It is used to visualise the lower cervical spine - upper thoracic spine, an area often obscured by the shoulders.\n\nThe xray demonstrates >50% anterior subluxation of C5 on C6, and there is widening of the disk space.  This suggests bilateral facet dislocation. \n\n \n\nComment : Bilateral facet joint dislocation inuries are highly unstable as there is complete loss of supporting ligaments and joint capsules.  It usually results from a flexion injury, and with the disruption / distraction of the posterior ligamentous structures, the facets jump over one another - there may be no fractures of the facets.  The incidence of spinal cord injury is high with this type of injury.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/950346_RA04035115_1.jpg"], "cat": "X-Ray"}, {"q": "Research into a simple diagnostic test reveals the following results:\n\n \n\n \tDisease present\tDisease Absent\nTest positive\t12\t8\nTest negative\t4\t32\n\nWhat is the sensitivity, specificity, postive and negative predictive values for this test?", "a": "Sensitivity = 75%\n\nSpecificity = 80%\n\nPositive predictive value = 60%\n\nNegative predictive value = 89%\n\nComment : These characteristics are commonly quoted in the literature.\n\nThe sensitivity is the proportion of patients who have the disease who test positive.  The higher the sensitivity, the fewer the false negative rate.\n\nThe specificity is the proportion of those who do not have the disease who test negative.  Tests with high specificity have very few false positives.\n\nPositive and negative predictive values give more information about the result of the test in an individual patient.  They are heavily influenced by the prevalence of the disease in the population being studied - the higher the prevalence, the higher the PPV and vice versa.  PPV is the probability of disease in a patient with a positive test, and the NPV is the probability of NO disease in a patient with a negative test.", "imgs": [], "cat": "Clinical"}, {"q": "What is the following piece of equipment and how does it work?", "a": "This is a rotameter, which measures the flow of a fluid, in this case oxygen.  It contains a tapered glass tube, which allows the \"float\" to move upwards with increasing flows, and downwards through gravity.  With increasing flows, more space around the float is required to allow flow to continue.  The float is designed to rotate, which tells you the float is working, and is not stuck in the tube.\n\nComment : Because the float relies on gravity it must be vertical when working.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DSCF0042.JPG"], "cat": "Equipment"}, {"q": "A 20 year old man is recovering post insertion of a femoral nail post motor vehicle accident.  The following morning he becomes progressively drowsy and is grossly hypoxic.  The following CTPA is performed.  What does it show?", "a": "No evidence of filling defects are noted in the pulmonary arterial tree.  No significant mediastinal abnormality is visualised.\n\nLung windows show diffuse bilateral infiltrates with ground glass opacification with subtle nodularity. No evidence of pleural effusion/ pneumothorax visualised.\n\nThe findings are consistent with fat embolism.\n\nComment : Fat embolism syndrome is characterised by altered conscious state, petichial rash and hypoxia, and is thought due to the release of fatty bone marrow droplets into the circulation.  It can be associated with anaemia and low platelets.  Treatment is essentially supportive.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20150.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20247.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20339.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20433.JPG"], "cat": "X-Ray"}, {"q": "A 25 year old man is recovering post tibial nail insertion following a football injury.  36 hours post insertion, he becomes distressed, confused or hypoxic.  The following xray is taken.\n\nWhat does it show?", "a": "There is a bilateral patchy ground glass infiltrate.  The mediastinum appears normal, there is no pneumothorax and the ribs are intact.\n\nThe xray is consistent with acute fat embolism syndrome.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/fat%20embolism.jpg"], "cat": "X-Ray"}, {"q": "A 35 year old man is intubated and ventilated in ICU 4 hours following an acute Subarachnoid Haemorrhage.  He is hypoxic and has pink frothy sputum.  The following xray is taken.\n\nWhat are the results?  What management is required?", "a": "The xray shows acute pulmonary oedema related to his subarachnoid haemorrhage.  This is referred to as neurogenic pulmonary oedema.\n\nAlternate diagnoses may include aspiration.\n\nComment : The pathophysiology behind acute neurogenic pulmonary oedema is not well understood.  Animal studies have suggested that raised intracranial pressure may lead to grossly increased systemic and pulmonary arterial pressures, with consequent pulmonary oedema.  Blunting these responses in animal models appears to prevent pulmonary oedema.  Increased capillary leak may also contribute, but the mechanism behind this is controversial.\n\nManagement is essentially that of controlling underlying conditions and supportive care.  Neurogenic pulmonary oedema usually resolves over 72 hours.\n\nThere is insufficient data in humans to support any pharmacological management.  Cautious control of blood pressure may be reasonable, though compromising cerebral perfusion pressure must be avoided.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/neurogenic%20APO%20from%20SAH.jpg"], "cat": "X-Ray"}, {"q": "A 70 year old female presents via a district HDU with hypoxia and bilateral pulmonary infiltrates.  The following lung function tests are obtained.\n\nDescribe the features of the test.  Explain the terms DLCO, KCO and KCOcorr\n\nWhat are the potential diagnoses?", "a": "There is reduced FVC and FEV1, and the FEV1/FVC ratio is higher than predicted indicating a restrictive type lung disease process.\n\nDLCO is the diffusion capacity of the lung, as measured by carbon monoxide transfer.  DLCO is affected by the surface area of the lung available for gas transfer, the thickness / diffusibility of the membrane, the pulmonary blood flow, and the absorbtion of the gas by the blood (primarily affected by Hb concentration).\n\nKCO is the diffusion capacity, corrected for lung volume.  KCOcorr is the KCO, corrected for haemoglobin concentration.\n\nIn this case, the KCOcorr is significantly higher than expected.\n\nThese results are explained by a pulmonary haemorrhage syndrome.  Hb within the lung binds to CO just as it does in the blood, making apparent absorbtion of CO much higher than expected for the reduced lung volume.\n\nThe most common causes include:\n\nWegener's granulomatosis\nMicrocytic polyangiitis\nGoodpasture's syndrome\nIdiopathic pulmonary haemorrhage", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/pulmonary%20haemorrhage.jpg"], "cat": "X-Ray"}, {"q": "A 54 year old man has been ventilated for 7 days following an episode of severe necrotising pancreatitis.  He is struggling to wean from the ventilator.  The following results are obtained.\n\n \n\n \t \tNormal Range\nT3\t1.9pmol/L\t2.9-8.9\nT4\t9.9pmol/L\t9.0-23.0\nTSH\t0.43IU/L\t0.3-5.0\n\nInterpret the results.  Discuss the indication for T3 or T4 therapy", "a": "The results show a low T3 and the values of TSH and T4 are in the low normal range.\n\nThis is a classic pattern of the Sick Euthyroid Syndrome, or Low T3 syndrome.\n\nComment : The thyroid axis is commonly altered in critical illness.  The commonest pattern of thyroid axis dysfunction is isolated low T3, largely related to decreased activity of the 5-deiodinase.  This may result in an increase in rT3.  However, clinical euthyroidism is common in this situation, and may be related to decreased binding of the free hormone and increased expression of nuclear binding sites.\n\nLow total T4 is also common, and the degree appears to correlate with survival. \n\nOften there is an associated decrease in TSH.  This may be an adaptive response, to limit energy consumption.  However, cytokines, dopamine and glucocorticosteroids may also interfere with the axis.\n\nThere are only limited trials of T4 and T3 therapy in critical illness.  At this point there is no evidence to support their use in this context.\n\nMeasurement of free levels of T3 and T4 are complex in critical illness for many reasons.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 44 year old female is ventilated in intensive care following a motor vehicle accident.  She has a closed head injury, 2 long bone fractures and a splenic laceration managed conservatively.\n\nOn day 3 she is commenced on nasogastric feeds.  She has a soft abdomen, is afebrile and there is no evidence of sepsis.  The following observations are recorded.\n\n \n\nTime\tFeed rate (ml/hr)\tAspirates (ml)\n1000\t20\t \n1200\t20\t \n1400\t20\t80 (returned)\n1600\t40\t \n1800\t40\t \n2000\t40\t100 (returned)\n2200\t80\t \n0000\t80\t160 (returned)\n0200\t80\t \n0400\t80\t240 (discard)\n0600\t40\t \n0800\t40\t175 (returned)\n\nWhat would you do?", "a": "There is evidence of delayed gastric emptying which is impairing nutritional delivery.\n\nInitial steps should be to look for reversible causes, which could include :\n\nmechanical bowel obstruction\ndrugs that slow gut motility (anticholinergics, sedatives, narcotics)\nelectrolyte imbalance\nsepsis\n\nManagement should then include:\n\ntreat any reversible causes\nraise the head of the bed to 30 degrees (if not already)\ncommence prokinetic agents (maxalon, erythromicin, both; others may include naloxone, neostigmine)\nconsider post-pyloric feeding\ndecrease feeding rates as a last measure\n\nCurrent recommendations (ASPEN / SCCM nutritional guidelines 2009) suggest that feeding rates should not be reduced unless gastric residual volumes are >500ml, assuming there are no other signs of intolerance, and that this is not related to increased complication rates.  Up to 250mls of aspirate are commonly returned.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 29 year old female presents with a pulmonary embolism.  Prior to anticoagulant therapy, her APTT is found to be 57.\n\nThe following test is performed\n\nAPTT\t56\t25-39s\nAPTT 50:50 (immediate)\t54\t25-39s\nAPTT 50:50 (2 hours)\t54\t25-39s\n\nInterpret the results", "a": "This test is a 50:50 mixing test, designed to differentiate between an isolated factor deficiency and the presence of an inhibitor.  In theory, mixing plasma from a normal subject with that of the patient will normalise the APTT if there is a simple factor deficiency.  This is because only
