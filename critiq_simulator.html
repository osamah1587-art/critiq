llitus.\n\nOn examination he is agitated and confused.  His blood pressure is 130/80, respiratory rate 20, heart rate 100 and is afebrile.  He is clammy and cool peripherally.  The following ABG is recorded :\n\n \n\npH\t6.8\nPaCO2\t8.2mmHg\nPaO2\t146mmHg\nHCO3-\t2.1\nLactate\t15.4\nNa\t141\nK\t4.8\nCl\t102\nGlucose\t13.2\n\nOutline the likely causes of this picture", "a": "There is a severe metabolic acidosis.  The anion gap is raised at 29; the change in AG (16) is almost identical to the change in lactate (14), and so is due almost exclusively to lactic acidosis.\n\nThe most likely causes are :\n\nsevere shock\nsepsis\ncardiogenic (risk factors for ischaemic heart disease)\nIntenstinal ischaemia\nMetformin-related lactic acidosis\n\nComment : The mechanism by which metformin causes lactic acidosis is unclear.  These patients can appear shocked, develop multiple organ failure and may mimick an acute abdomen\n\nAccepted risk factors for the development of metformin-related lactic acidosis include advanced age, high dose, renal failure, hypoxia, active alcohol intake and sepsis.  There are also reports in patients without known risk factors.", "imgs": [], "cat": "ABG"}, {"q": "A 28 year old woman presented to emergency with rapidly progressive weakness of all 4 limbs and associated myalgias.  She denied sensory symptoms and there was no sign of loss of executive function.  She had no prodromal symptoms.  The following results are obtained :\n\n \n\nBlood results\npH\t7.23\nPaCO2\t29mmHg\nHCO3-\t12meq/L\nBase excess\t-14.1\nNa\t137mmol/L\nK\t0.9mmol/L\nCl\t119mmol/L\nCr\t0.8mg/dL\nBSL\t8.1mmol/L\nCK\t379U/L\nTroponin\tnot detected\n\n \n\n \n\nUrine results\npH\t7.5\nProtein\t4g/L\nNa\t36mmol/L\nK\t37mmol/L\nCl\t22mmol/L\n\n \n\nInterpret the results\n\nExplain the clinical picture", "a": "There is a compensated non-anion gap metabolic acidosis associated with marked hypokalaemia and mild CK rise.  Urine testing indicates proteinuria, an inappropriately high urinary pH for the degree of acidosis, and a positive urinary anion gap.\n\nThese results are in keeping with type 1 or type 2 renal tubular acidosis.  The proteinuria suggests are renal cause.  The weakness is related to the severe hypokalaemia, and should resolve on correction of the potassium level.\n\nComment : The urinary anion gap (Na + K - Cl) can assist in determining if the cause of non-anion gap metabolic acidosis is renal or extra-renal.  Ammonia is the chief mechanism of renal excretion of acid.  To aid excretion it is coupled with chloride.  Consequently, in renal compensation for extrarenal causes, the chloride level is high (thus urinary AG less than 0).  In renal causes, the urinary anion gap is positive.\n\nBeware the use of bicarbonate to rapidly correct pH in this circumstance, as an already low potassium level will fall further, with potentially catastrophic results.\n\nReference :\n\nAnn Clin Biochem 1999; 36:408-422\n\nIntern Emerg Med (2008); 3: 175-177", "imgs": [], "cat": "ABG"}, {"q": "A 57 year old alcoholic woman was admitted to ICU following seizures related to abrupt alcohol withdrawal and aspiration pneumonia.  A lorazepam infusion was commenced for simultaneous seizure control and sedation, though doses in excess of 16mg/hr were required.  On day 4 the following gases were obtained :\n\n \n\npH\t6.9\nPaCO2\t40.9\nNa\t127\nK\t3.4\nCl\t93\nHCO3-\t8\nUrea\t20.1\nCreatinine\t188\nLactate\t5.1mmol/L\nGlucose\t13mmol/L\nOsmolality (calculated)\t462mOsm/L\n\nDescribe the results", "a": "The results demonstrate a severe metabolic acidosis which is uncompensated (because the patient is ventilated).  The anion gap is raised (30), which is only partly explained by lactate.  The patient is also hyponatraemic, though there is evidence of severe hyperosmolality, suggesting the hyponatraemia is dilutional.\n\nThe osmolar gap is raised, which together with the raised anion gap raises the possibility of a toxin.\n\nThe likely causes are:\n\nethylene glycol toxicity\nmethanol toxicity\npolyethylene glycol and propylene glycol (constituents of lorazepam)\n\nComment : Both polyethylene glycol and propylene glycol are metabolised to a number of organic acids which can cause an anion gap metabolic acidosis.\n\nIV lorazepam is not available in Australia, but IV diazepam contains significant amounts of propylene glycol and case reports of similar syndromes have occured with its use in large doses.\n\nReference : NEJM 2002; 347:857-858", "imgs": [], "cat": "ABG"}, {"q": "A 64 year old man presents with weakness and confusion.  His wife states he has been taking his bowel prep solution prior to semi-elective right hemicolectomy.  He is haemodynamically stable, afebrile and drowsy.  His weight is unchanged from his outpatient appointment 1 week prior.\n\nThe following biochemistry results are available\n\n \n\nNa\t121mmol/L\nK\t2.2mmol/L\nCl\t84mmol/L\nHCO3\t28mmol/L\nUrea\t2.8mmol/L\nCreatinine\t47mcmol/L\nGlucose\t7.2mmol/L\nPhosphate\t1.43mmol/L\nAlbumin\t30g/L\nLDH\t251 U/L\nALT\t21 U/L\nAST\t31 U/L\nTotal Bilirubin\t15mcmol/L\nTotal Calcium\t2.05mmol/L\nCK\t608 U/L\n\nDiscuss the results and management", "a": "Hyponatraemia related to salt loss, relative water excess and marked hypokalaemia.\n\nCorrection of hypokalaemia is important to prevent complications of hypokalaemia (including muscle weakness and cardiac arrhythmias) and to remove its contributory effect on hyponatraemia.  In the absence of signs of dehydration, fluid restriction is appropriate, particularly given the stimulus for the condition is transient.  Hypertonic saline may be appropriate if neurological deterioration occurs (increasing drowsiness, headache, seizures)\n\nComment : Hypokalaemia contributes to hyponatraemia because the resulting reduction in intracellular ions causes a net movement of water to the extracellular space.  In normal patients this small amount of fluid may be insignificant, but in volume deplete patients, hyponatraemia may be exacerbated.\n\nReference : Critical Care and Resuscitation 2002; 4:238-9", "imgs": [], "cat": "ABG"}, {"q": "A 75 year old male presents with confusion and coffee ground vomitus.  The following results are obtained :\n\n \n\nNa\t139mmol/L\nK\t3.6mmol/L\nCl\t105mmol/L\nHCO3\t20mmol/L\nUrea\t14mmol/L\nCreatinine\t98mcmol/L\n\nDiscuss the results", "a": "The results show a mild metabolic acidosis and a borderline raised anion gap.  The cause of this is not immediately clear, though renal failure does not appear to be the cause.\n\nThe urea is raised proportionately more than the creatinine, which could be explained by gastrointestinal blood loss, or fluid depletion\n\nComment : There are a number of causes of urea rise out of proportion with creatinine.  The most common are:\n\nGastrointestinal bleeding\nMarked volume depletion\nCatabolic state eg sepsis\nGlucocorticosteroid use\nResolving acute tubular necrosis (where glomerular function improves faster than tubular function, the former controlling Cr, the latter responsible for urea elimination)", "imgs": [], "cat": "ABG"}, {"q": "A 58 year old male with chronic obstructive airways disease presents with acute shortness of breath, chills and occasional diarrhoea.  The following arterial blood gas is obtained (on 40% oxygen)\n\n \n\npH\t7.44\nPaO2\t96\nPaCO2\t45\nHCO3-\t39\nBase Excess\t+8\n\nDescribe the blood gases\n\nOutline your management", "a": "The blood gases suggest a metabolic alkalosis (supported by the raised pH, bicarbonate and base excess) with respiratory compensation (the high PaCO2).  However the history may also suggest an alternative, an acute respiratory alkalosis on a chronic respiratory acidosis.\n\nIf this is true, the patient is a carbon-dioxide retainer and is dependent on hypoxic drive.  The oxygen should be turned down to maintain saturations of no higher than about 92%.  Frequent blood gases are required to ensure he does not develop hypercarbia.\n\nOther treatment should focus on treatment of his presenting complaint, eg antibiotics, physio, steroids and noninvasive ventilation\n\nComment : the causes of metabolic alkalosis include:\n\nAcid loss\nUpper GIT eg nasogastric suctioning, vomiting\nRenal eg fluid depletion, diuretics, hyperaldosteronism, severe hypokalaemia\nIntracellular shift of hydrogen eg severe hypokalaemia\nColonic adenomas\nExogenous alkali gain\nMilk alkali syndrome\nSome medications\nLactate, citrate administration eg CRRT buffer solutions, massive transfusion\nCompensatory\neg chronic respiratory acidosis", "imgs": [], "cat": "ABG"}, {"q": "A 32 year old male with brittle asthma presents to the ICU for management of an acute exacerbation.  He initially self treated with nebulisers and presents as he deteriorated despite this.\n\nIn emergency he is commenced on IV hydrocortisone, continuous nebulisers and antibiotics.  On arrival in ICU he is well perfused, tachycardic at a rate of 124, has arterial saturations of 98% on 10L/min and has a respiratory rate of 28.\n\nHis breathlessness worsens despite improvements in air entry and peak flow measurements.  The following gases are reported:\n\n \n\n \tAdmission\t+4 hours\nFiO2\t0.40\t0.45\npH\t7.53\t7.32\nPaO2\t149\t161\nPaCO2\t22\t21\nHCO3-\t21\t11.7\nSBE\t-2\t-14\nGlucose\t11.2\t12.1\nNa\t141\t143\nCl\t106\t105\n\nDiscuss the blood gas results", "a": "The blood gases on presentation demonstrate a respiratory alkalosis and an enlarged A-a gradient consistent with an acute asthma attack.\n\nIn the second gases, there is a marked metabolic acidosis with a raised anion gap (27).  The change in anion gap is about the same as the change in bicarbonate, suggesting the AGMA explains all the acidosis.  Glucose is relatively normal, making DKA unlikely.  CO2, O2 and clinical findings are unchanged or better suggesting worsening asthma is not the cause.\n\nThe most likely cause is lactic acidosis due to salbutamol therapy, though peripheral hypoxia / shock should be excluded clinically.  The patient is describing increasing breathlessness due to the need for respiratory compensation on top of an acute respiratory condition.\n\nReference :\n\nCrit Care Resusc 2005, 7(2):119-27", "imgs": [], "cat": "ABG"}, {"q": "A 45 year old male has been in hospital for right knee septic arthritis which has cultured methicillin sensitive Staphylococcus aureus.  He has been treated with IV flucloxacillin, his knee has been irrigated and he is receiving paracetamol and a morphine PCA for analgesia.\n\nOn day 13 of his admission he developed fever, sweats and tachycardia.  His knee was clinically much improved since admission.  His biochemical results are listed below.\n\n \n\nNa\t138mmol/L\nK\t2.8mmol/L\nCl\t93mmol/L\nHCO3-\t6mmol/L\nurea\t18.6mmol/L\ncreatinine\t541mcmol/dL\nLactate\t0.7mmol/L\n\nInterpret the blood gases\n\nWhat is the likely pathology?", "a": "The arterial blood gases demonstrate a raised anion gap metabolic acidosis.  The lactate is normal. \n\nThe most likely cause is pyroglutamic acidosis from Flucloxacillin and paracetamol use, coupled with retention of organic acids due to acute renal failure.  Other possibilities such as acute diabetic ketoacidosis or endocarditis with septic emboli should be excluded.\n\nComment : acute renal failure can certainly contribute to the AGMA, but this is unlikely to explain it entirely.  A bicarb <10 and a AG >20-25 are rarely reported in pure renal failure.\n\nPyroglutamic acidosis has been reported in the context of flucloxacillin, paracetamol and vigabatrin use.  It is more likely associated with renal or hepatic dysfunction or critical illness.  It can also occur in some inherited metabolic disorders.\n\nReference :\n\nMJA 2006; 185 (4): 223-225", "imgs": [], "cat": "ABG"}, {"q": "A 14 year old boy is admitted to ICU with vomiting, confusion and listlessness.  He has a history of mild asthma and a complicated repair of a midgut voluvulus at the age of 11.  1 week prior to admission he was started a course of amoxycillin for an otitis media.\n\nThe following results are obtained :\n\n \n\npH\t7.23\nPaO2\t110mmHg\nPaCO2\t21.5mmHg\nBicarbonate\t9mmol/L\nStandard base excess\t-19.1mmol/L\nNa\t142mmol/L\nK\t4.7mmol/L\nCl\t110mmol/L\nLactate\t2.89mmol/L\nGlucose\t7.5mmol/L\n\nList the features of this analysis\n\nWhat is the likely cause?", "a": "There is a marked anion gap metabolic acidosis, with appropriate respiratory compensation.  The high anion gap (28) is not immediately explained as the lactate and the glucose are both normal.\n\nThere are many possible causes of an Anion Gap metabolic acidosis include toxic alcohol ingestion, paraldehyde toxicity, paracetamol toxicity etc.  However, in the context of extensive small bowel resection, the possibility of D-lactate ingestion should be considered.\n\nComment : D-lactic acidosis is a rare disorder characterised by marked CNS symptoms, a markedly raised anion gap and absence of other attributable cause.  It is associated with abnormal gut structure (blind loops, short gut syndrome), ischaemia and bacterial gut overgrowth.  It may be precipitated by antibiotics which select out lactobacillus and streptococcus bovis subtypes.\n\nThe treatment of D-lactic acidosis is usually supportive, withdrawal of contributing factors, restriction of enteral carbohydrate intake and rarely oral antibiotics", "imgs": [], "cat": "ABG"}, {"q": "A 70 year old male suffers an out of hospital cardiac arrest.  He is worked on at the scene by intensive care paramedics and regains a spontaneous circulation at 25 minutes.  His bloods on arrival to the emergency department 30 minutes later are listed below :\n\n \n\npH\t7.62\nPaCO2\t30mmHg\nPaO2\t196mmHg\nHCO3-\t30mmol/L\nNa\t140mmol/L\nK\t4.1mmol/L\nCl\t95mmol/L\nGlucose\t10.9mmol/L\n\nDescribe the blood gas results obtained\n\nWhat are the complications of alkalaemia?", "a": "There is a marked alkalosis, and both respiratory and metabolic components contribute to it.  Additionally there is an anion gap metabolic acidosis - there is a triple acid-base disturbance.\n\nThe best explanation is that the patient is being overventilated, has received copious amounts of bicarbonate during the resuscitation, and has a persistant lactic acidosis causing the high anion gap.\n\nAlkalaemia can have effects on multiple systems :\n\nCardiovascular\narteriolar constriction eg cerebral, coronary\npredisposition to catecholamine induced arrhythmias\nRespiratory\nreduced respiratory drive\nsubsequent hypoxia, ventilator dependence\nMetabolic\nStimulation of organic acid production (eg ketones)\nHypokalaemia (weakness, arrhythmias, polyuria)\nHypocalcaemia (tetany, prolonged QTc)\nHypomagnesaemia (arrhythmias, weakness)\nShift of oxyhaemoglobin dissociation curve, reducing O2 offloading at tissue level", "imgs": [], "cat": "ABG"}, {"q": "The following CT is taken from a brain trauma patient with GCS 3.\n\nDescribe the findings", "a": "This is Sim-Man who went through our CT scanner during a critically ill patient transportation workshop.  It just goes to show you anyone can get a GCS of 1 or higher.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/d%20ummy.gif", "https://djb9j7fyr9fnv.cloudfront.net/media/d%20ummy%202.gif", "https://djb9j7fyr9fnv.cloudfront.net/media/d%20ummy%203.gif"], "cat": "CT"}, {"q": "A 56 year woman has presented to hospital with 2 weeks of breathlessness and fevers, with a background of 40 pack years smoking. Describe the findings on the following CT scan.", "a": "Large complex loculated left-sided pleural effusion with associated atelectasis. The heart is enlarged with a CT ratio of 130:230 mm. A small right-sided pleural effusion is also noted. Widespread multifocal consolidation is demonstrated throughout the right lung. The left lower lobe of the left lung is completely collapsed, with extensive atelectasis of the left upper lobe as well. The effusion is most probably a complicated parapneumonic effusion. Less likely diagnoses include empyema although there is no evidence of gas, or rim enhancement. A malignant process cannot be completely excluded.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctchest.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctchest2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctchester3.jpg"], "cat": "X-Ray"}, {"q": "A 45 yr old man is transferred to your ICU following a minor procedure. The anaesthetist tells you he was a difficult intubation, requiring multiple passes of an introducer. He reports that the patient has been difficult to ventilate, and has recently noticed blood up the ETT. Describe the abnormalities present on the following CT scan", "a": "Complete collapse of the right middle and lower lobes and collapse of the posterior and apical segments of the right upper lobe.\nSoft tissue mass arises apparently from the region of bronchus intermedius, partially obstructing the right main bronchus and extending into the right lumen of the double-lumen endotracheal tube.\nDouble lumen tube\nLarge volume of fluid is present in the right hemithorax separating the fissures.\nThe left bronchus is patent but there is significant infective and atelectatic change in the dependent portions of the posterior aspect of the left lung. No midline shift is noted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctchestjj1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctchestjj2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctchestjj3.jpg"], "cat": "CT"}, {"q": "Describe the changes in the following Xray", "a": "The left lung is well-aerated but there is patchy parenchymal change.\nA right central venous catheter is present.\nThere is scant aeration in the right upper zone and dense opacity throughout the remainder of the right hemithorax. No midline shift is seen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/xraychestjj1.jpg"], "cat": "X-Ray"}, {"q": "A 46 yr old female presents with 6 weeks of increasing breathlessness and malaise. She reports no cough or fevers, no recent travel ,and no exposure to animals. Describe the findings on the following CT scan.", "a": "There is widespread alveolar opacity involving all lung lobes with a degree of septal thickening at the apices. Associated with this is significant mediastinal and hilar lymphadenopathy as well as a small right-sided pleural effusion and small anterior pericardial effusion. Lymphadenopathy is most likely reactive although a neoplastic process cannot be completely excluded.\n\nThe appearance is thought to most likely represent an infective or inflammatory process.\n\nDifferentials for infection would include;\n\n bacterial, viral, fungal or protozoan sources and in particular atypical infections such as pneumocystis, chlamydia, varicella and mycobacteria should be considered.\nInflammatory causes would include hypersensitivity pneumonitides such as extrinsic allergic alveolitis (secondary to drugs or environmental exposure) or a cryptogenic organising pneumonia (COP).\nSuch an appearance arising as a result of pulmonary oedema (cardiogenic or non-cardiogenic) is thought less likely. The possibility of myocarditis leading to pulmonary oedema cannot, however, be excluded. \nless likely is a collagen vascular disease (Church-Strauss/ Wegenar granulomatosis, a neoplastic process such as alveolar cell carcinoma, or sarcoidosis.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CTchestrr1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CT%20chestrr2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CT%20chestrr3.jpg"], "cat": "X-Ray"}, {"q": "You are asked to assess a tachypnoeic infant in the Emergency Department. Please describe the abnormaliites on the following X-ray, and the interventions you would consider.", "a": "Findings:\n\nRight tension pneumothorax with mediastinal shift\nLarge gastric air bubble\n\nInterventions:\n\nOxygen\nRight ICC\nGastric tube", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/paedxr2.jpg"], "cat": "X-Ray"}, {"q": "Describe the findings in the folowing X-ray taken after insertion of a central line", "a": "Large right pneumothorax\nRight subclavian line\nDiffuse interstitial infiltrates", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ICUCXR8.jpg"], "cat": "X-Ray"}, {"q": "Describe the abnormalities on the following CXR", "a": "Right upper lobe collapse\nRight apical pneumothorax\nFracture 2nd rib", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ICUCXR7.jpg"], "cat": "X-Ray"}, {"q": "Describe the abnormalities present on this Chest X-ray", "a": "Bilateral pneumothorax, undrained\n\nSternal wires", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bilatptx.jpg"], "cat": "X-Ray"}, {"q": "A 70 year old patient presents to emergency with a fractured neck of femur.  Her pre-operative xray is shown.\n\n \n\nWhat does the xray show?\n\nWhat are the potential causes?", "a": "The xray demonstrates marked cardiomegaly, with a cardiothoracic ratio approaching 70%.  There are prominent vascular markings with some suggestion of upper lobe diversion, but no alveolar or interstitial oedema.  It is not clear whether the film is supine, which would make the cardiothoracic ratio larger and prevents interpretation of upper lobe diversion.\n\nThe potential causes of dilated cardiomyopathy include :\n\nIschaemic heart disease\nValvular pathology (eg MR due to rheumatic heart disease)\nAlcoholic cardiomyopathy\nMyocarditis (post acute phase)\nConnective tissue disorders\nIdiopathic\nOther\n\nComment : Upper lobe diversion is noted when vessels an equal distance from the hilum are compared, and the upper lobe vessels are equal to or larger than the lower lobe vessels in an erect CXR.  This occurs because of lower zone vessel vasoconstriction related to hypoxia, which is more apparent in the lower lobes than upper lobes in cardiogenic pulmonary oedema.  Upper lobe diversion is \"normal\" in supine films and does not represent cardiac failure.\n\nAn enlarged heart is more than half the diameter of the thorax at the same level on a PA film.  An AP film makes the heart look larger, as does a supine film.  Consequently it is difficult to interpret the cardiothoracic ratio.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Cardiomegaly.jpg"], "cat": "X-Ray"}, {"q": "The following ECG is recorded from a 35 year old who was trapped for 90 minutes within a car following a high speed accident.\n\nWhat does the ECG show?\n\nWhat is your acute management?", "a": "The ECG shows marked ECG widening with a bizarre, almost sinusoidal pattern.  This is classical of marked hyperkalaemia.  In this case it is due to massive cellular destruction associated with crush injury and rhabdomyolysis.\n\nImmediate management includes intravenous calcium chloride to stabilise the myocardium and prevent fatal arrhythmias, cardiac monitoring and preparation to treat such arrhythmias, IV bicarbonate, IV dextrose-insulin infusions and IV / nebulised beta agonists (eg salbutamol) which may acutely lower the potassium.  In rhabdomyolysis however the above treatments are often complicated (eg bicarbonate worsens phosphate-induced hypocalcaemia and IV calcium often doesn't work due to high phosphate load), and immediate renal replacement therapy may be necessary.  Treatment of the underlying cause is also essential (release compartments etc).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/404a.jpg"], "cat": "ECG"}, {"q": "The following ECG is recorded from a 40 year old patient who presented following a sudden collapse and mild central chest pain.\n\nWhat does the ECG show?\n\nWhat other ECG signs can occur in patients with the likely condition?\n\n \n\n(ECG provided by Dr Nhi Nguyen)", "a": "The ECG shows sinus tachycardia with a classical S1Q3T3 pattern : a deep S in lead 1, a pathological Q wave in lead 3 and T wave inversion in lead 3.\n\nOther features that can be seen include : acute atrial fibrillation, rightward axis, right bundle branch block (complete or partial) and T wave inversion in leads V1-4, and there may be ST depression in lead 2.  These changes are related to acute RV overload and may resolve, particularly the RBBB.\n\n \n\nComment : the S1Q3T3 pattern is relatively infrequent (~10%) in acute PE and is usually associated with massive PE.  The most common presenting ECG sign is sinus tachycardia.  In chronic PE, right atrial hypertrophy may also present, seen as peaked P waves (\"P pulmonale\").", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/S1Q3T3.png"], "cat": "ECG"}, {"q": "A 25 year old male is brought to hospital following a motor bike accident.  He was unconscious and apnoeic at the scene and was intubated by paramedics prior to transportation.\n\nThe following lateral C-spine film is taken.  Describe the results.\n\n(Image courtesy Dr Benjamin Bloom)", "a": "There is atlanto-occipital dislocation and associated prevertebral swelling.\n\nComment : Atlanto-occipital dislocation is an unusual injury which can be missed unless looked for.  Power's method is the ratio of the distances between the tip of the clivus to the posterior atlas arch and the anterior atlas arch to the posterior edge of the foramen magnum (should be less than 1), measured on lateral C-spine film.\n\nOther methods also exist, but as a rule, a line running along the posterior clivus should pass through the tip of the dens.\n\nReference : Bloom B, Powell B. Surviving atlanto-occipital dislocation.  Emerg Med Aus 2007; 19:379-82", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/x-ray%20c-spine.jpg"], "cat": "Clinical"}, {"q": "Describe the abnormalities present on the following CT scan of a diabetic patient presenting with septic shock.\nWhat are the likely organisms?\nList the management priorities", "a": "CT abdomen shows relatively well-circumscribed, slightly heterogenously enhancing lesion in upper pole of right kidney. Several locules of gas are identified at periphery. There is also subcapsular fluid present in continuity with the lesion, with further gas locules evident within. This is highly suggestive of a renal abscess. The presence of gas raises the possibility of emphysematous pyelonephritis, particularly in a diabetic\nE.Coli 66%, Klebsiella 26%, other (Proteus, Pseudomonas, Streptococcus, mixed). Clostridium and Candida are rare organisms.\nResuscitation, antibiotics (meropenem, timentin, 3rd generation cephalosporin etc), and either urgent percutaneous drainage or nephrectomy. Nephrectomy is suggested in most cases, with percutaneous drainage reserved for cases where gas is confined to collecting system or renal parenchyma", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/perinephric.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/perinephric2.jpg"], "cat": "CT"}, {"q": "A 70 year female who presented to hospital with a STEMI and cardiogenic shock 2 days earlier is complaining of abdominal pain. She has undergone urgent coronary angiogram and stent placement. \n\n1. Describe the findings on the following CT scan\n\n2. Briefly outline your management plan", "a": "There is a large retroperitoneal haematoma to the right of the midline, with different densities in the blood suggesting ongoing bleeding.  A catheter is present in the right femoral artery, given history this could be femoral cannula from angiogram, or IABP for cardiogenic shock.\nPatient is most likely on antiplatelet and antithrombin agents for AMI and stent. These will need to be ceased, and any coagulation abnormality reversed.  The bleeding is likely to have originated from cath or IABP insertion site. Removal of femoral catheter / IABP should only be performed after vascular consultation as high risk of further bleeding.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/retroperithaem.jpg"], "cat": "CT"}, {"q": "A 34 year old male is intubated and ventilated in ICU with multiple injuries following an MVA.  He grimaces when his right arm is moved.  The following xrays are obtained.\n\nWhat do they show?\n\nWhat complications may occur with this injury?", "a": "There is a multi-part fracture of the distal radius with volar displacement and angulation, known as a Smith's fracture.  The fracture line appears to extend into the radiocarpal joint.\n\nThe complication of immediate concern is median nerve injury.  Malunion, post-traumatic arthritis and angulation are also possible.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/smiths%20b.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/smiths%20a.jpg"], "cat": "X-Ray"}, {"q": "A 24 year old male is intubated following a head injury sustained in a bar brawl.  His GCS is 6, only responding to pain when his right arm is moved.\n\nWhat does the xray demonstrate?\n\nHow will you manage this?", "a": "There is an anterior dislocation of the glenohumeral joint.\n\nManagement involves reduction of the joint after attention to pain relief.  It is also important to exclude associated fractures before manipulation occurs.  A number of methods for relocating the shoulder have been described including traction-counter traction, Hippocratic method, Kocher's manouver, Stimson's method and even massage of biceps head.  Appropriate techniques are required to ensure adequate muscle relaxation and sedation before relocation can occur. \n\nRelocation must occur in a timely fashion as the incidence of neurovascular injuries increases with time.  A period of immobilisation is required followed by active physiotherapy.\n\nComment : The shoulder dislocates anteriorly in up to 97% of cases.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/shoulder%20dislocation%202.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/shoulder%20dislocation%201.jpg"], "cat": "X-Ray"}, {"q": "A 51 year old male presents to emergency with central severe chest pain.  The following CT is obtained\n\nWhat does it show?\n\nList 3 complications from this condition?", "a": "The CT demonstrates a Stamford type A thoracic aortic dissection.\n\nComplications of thoracic aortic dissection include:\n\nrupture (and likely death)\npericardial tamponade\naortic valve disruption\ncoronary artery obstruction\ncerebral artery obstruction\nother arterial obstruction (renal, mesenteric, coeliac, spinal)", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/thoracic%20aortic%20dissection%20CT.jpg"], "cat": "Echo"}, {"q": "A 58 year old male is admitted to the emergency department with an altered level of conscious state following a fit.  Little else is known about him.\n\nDescribe the CT\n\nList the most likely causes", "a": "The CT demonstrates a large hypodense area in the territory of the right middle cerebral artery.  There is oedema, effacement of the sulci and midline shift.\n\nThe most likely cause is thromboembolism related to clot (usually from the heart, or less commonly from the great vessels or paradoxical emboli), or dissection of the internal carotid artery.  Vasculitis, recreational drug abuse and thrombophilic disorders are rarer causes", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ischaemic%20hemispheric%20stroke.jpg"], "cat": "CT"}, {"q": "What is this piece of equipment?\n\nHow does it work?", "a": "Heimlich valve.\n\nIt works because the rubber tube inside the case collapses when the patient breaths in, preventing air entering the chest via the ICC, and opens during expiration when the pressure inside the chest (and thus the tube) is positive.\n\nComment : the Heimlich valve is re-emerging as an alternative to an underwater seal drain.  Complications include disconnection and obstruction, and it usually is not appropriate for large volume air leaks and pleural effusions.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DSCF04173.JPG"], "cat": "X-Ray"}, {"q": "What is this device?\n\nWhat features does it possess which enable this function?", "a": "Rapid infusion device\n\nThe device is designed to utilise the Seldinger technique of insertion (needle over wire).  The catheter is short and large bore.  Radius is the most important factor in resistance to flow through a tube, closely followed by length.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DSCF0423.JPG"], "cat": "Equipment"}, {"q": "A 58 yr old woman has presented to her LMO with pain in her abdomen and back. Please report the findings of the following CT scan.", "a": "The examination identifies an extensive dissection detected in the thoracic, and abdominal aorta. It commences in the ascending portion, and terminates at the external iliac arteries.\n\nThe dissection affects the brachiocephalic artery, with complete occlusion of the right common carotid artery behind the right sternoclavicular joint. There is interruption of contrast opacification of the right subclavian artery, indicating suspected significant ostial stenosis. Both vertebral arteries are opacified by contrast. Evidence of pericardial effusion is noted.\n\nThe dissection extends into the SMA, and left main renal artery, which are producing proximal luminal narrowing of at least 50%.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/CTAdissect1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CTAdissect2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CTAdissect3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/CTAdissect4.jpg"], "cat": "X-Ray"}, {"q": "A fit 80 yr old man who plays golf 5 days/week has developed backpain over the last 5 days. He has a history of prostate cancer 10 yrs ago, with no known disease currently. He is stable, HR 70 bpm, BP 120/60 mmHg, SpO2 99% on 2l/m O2.\n\n1. Describe the abnormalities present on the following CT scan\n\n2. Birefly discuss the major management issues", "a": "Contrast CTPA showing an extensive saddle embolus straddles the right and left main pulmonary arteries. An  area of subpleural pulmonary infarction is also evident laterally at the right base.\n \nThe major issues revovle around the unusual situation of having such large clot burden with so little compromise;\nResuscitative: patient stable both hemodynamically and respiratory.\nAnticoagulation: requires therapeutic heparin or clexane\nEcho: TTE to establish RV effects of clot, may help tip balance of further decisions\nThrombolysis:  with no evidence of compromise, the indication for thrombolysis is only arguable based on clot burden, with little evidence to support this (some suggestion reduction in chronic complications). Alternately could heparinise and monitor, and lyse only if deteriorates.\nPumonary thrombectomy: Saddle embolus is easily reached operatively, but operation carries high morbidity and mortality. Given patient not compromised, this could be considered and discussed with respiratory / cardiothoracic after response to anticoagulation established\nIVC filter: Although not strictly indicated, it is arguable that with such large clot burden he may not tolerate further embolus.\nEstablish aetiology: Given history should at least examine prostate, and order PSA. Ordre thrombophilia screen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctpesaddle1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctpesaddle2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctpesaddle3.jpg"], "cat": "CT"}, {"q": "A 28yr old male presents to ED with sudden loss of consciousness. On arrival he has fixed pupils, a petechial rash, and decerebrate posturing. He is intubated and undergoes urgent CT brain.\n\n1. Describe the findings on CT brain\n\n2. Describe the abnormalities on FBC\n\nHaemoglobin              142 g/L                   (125-175)\n   Platelets                    20 x 10^9/L             (150-500)\nWhite Cell Count         169 x 10^9/L          (4.0-11.0)\n     Neutrophils             1.7  x 10^9/L          (2.0-8.0)\n     Lymphocytes           5.1 x 10^9/L          (1.0-4.0)\n     Monocytes               0.0                           (0.1-1.0)\n     Bands                       3.4                          (0.0-0.5)\n     Promyelocytes       57.0\n     Blasts                       102.1\n \n\n3. What is your diagnosis?\n\n4. What are your overall management strategies?", "a": "Large intraparenchymal bleed centred on the right thalamus and corona radiata is associated with significant mass-effect including 8 mm of subfalcine herniation. Haemorrhage extends throughout the ventricular system and the temporal horns of the lateral ventricles are markedly dilated indicating hydrocephalus. At this time there is no gross cerebellar tonsillar herniation.\nMarked thrombocytopenia with numerous bilobed blasts and promyelocytes\nsuggestive of Acute Promyelocytic Leukaemia (APML).\nAML with intracerebral haemorrhage secondary to thrombocytopaenia.\nOverall prognosis extremely poor given evidence of  brain injury and underlying disease. Priorities to initially stabilise patient if possible (institute management of intracranial hypertension) while discuss with haem oncologist and gather family.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctbrainaml1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctbrainaml2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctbrainaml3.jpg"], "cat": "ECG"}, {"q": "A 67 yr old woman presents to the ED following out-of-hospital cardiac arrest. On D3 she has been unsedated for 48 hrs, has GCS 3/15, and sluggishly reactive pupils. CT brain is performed.\n\n1. Report the findings of the CT\n\n2. What is her prognosis and what factors are useful as prognostic indicators?", "a": "Findings are consistent with diffuse cerebral oedema, with effacement of the sulci, ventricles and basal cisterns, along with loss of grey-white matter differentiation globally. Fullness in the foramen magnum is highly suspicious for impending cerebellar tonsil herniation.\nPrognosis very poor. Poor prognostic indicators include;\nAbsence of motor response to pain\nAbsence of pupillary response\nGeneralised myoclonus\nBilaterally absent somatosensory evoked potentials\nBrain derived S-100 and non-specific enolase\nMRI", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctbrainhbi1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctbrainhbi2.jpg"], "cat": "MRI"}, {"q": "A 24yr old woman with no medical history presents to ED with fitting and reduced level of consciousness.\n\n1. Describe the findings  present on CT\n\n2. Outline the management prioritites", "a": "1. There is high density involving essentially all the named veins and dural venous sinuses consistent with extensive thrombosis. This involves the cortical veins overlying the cerebral hemispheres and superior sagittal sinus. The internal cerebral veins, basal vein of Rosenthal, great vein of Galen, inferior sagittal sinus and straight sinus are involved. Thrombus extends into the transverse and sigmoid sinuses also.\nHyperdensity is seen in several foci in the left frontal lobe. Whilst these could represent small thrombosed vessels, the possibility of subarachnoid haemorrhage cannot be entirely excluded.Grey/white matter differentiation is preserved, with no evidence of acute infarction. The ventricular system, basal cisterns and extra-axial spaces are normal.\nNo intracranial mass, haemorrhage or collection is detected. No fracture or focal bony abnormality is identified. Normal aeration of the visualised paranasal sinuses and petrous temporal bones.\n\n2.\n\nABC\nstop seizures\nanticoagulate with heparin or LMWH\nconsider systemic or angiographic directed lysis of deteriorates despite this\nneurosurgical intervention if deteriorate (hydrocephalus treatment)\nascertain cause (thrombophilia, CNS infection, pregnancy, OCP, chronic inflammatory disease, local surgery)", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctbraincvt1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctbraincvt2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctbraincvt3.jpg"], "cat": "ECG"}, {"q": "1. Describe the abnormalities present on the following CT scan images\n\n2. List your differential diagnosis", "a": "1. Widespread  pulmonary nodules appear enlarged and some are confluent. There are some enlarged mediastinal and axillary lymph nodes. Multiple focal lesions in the spleen which may represent lymphoma deposits or abscesses.\n\n2. Lymphomatous infiltrates, infective foci, inflammation", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctchestlymphoma1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctchestlymphoma3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctchestlymphoma22.jpg"], "cat": "ABG"}, {"q": "A 65 yr old man presents to the ED breathless with a swollen right arm.\n\n1. Describe the changes present on CT\n\n2. What further disgnostic tests would you perform?", "a": "Non-contrast CT chest has been performed.\n\nThere are numerous well-defined nodules measuring 1- 3 mm in size, which are randomly distributed throughout all three zones of both lungs.\nSome subpleural nodules are also observed. Coalescence of the nodules is observed in bilateral upper lobes anteriorly.\nNo evidence of honeycombing. No significant alveolar opacification.\nPassive atelectasis of right lung base is noted, associated with a right-sided moderate pleural effusion. There is a small pleural effusion on left side as well.\nCalciifed pleural plaques on bilateral diaphragmatic domes suggestive of previous asbestosis exposure.\nRight paravertebral soft tissue mass at the level of T6-T8, measuring approximately 6 x 3.3 x 5.3 cm in size. This may most likely represent a mesothelioma, although the possibility of a bronchial carcinoma also has to be considered.\nAnother soft tissue density mass measuring 3 x 2.8 x 3.8 cm is noted in right side of the superior mediastinum which may represent a lymph node mass. \nNo significant lymphadenopathy or mediastinal masses are detected within the limitations of a non-contrast study.\n \n\n2. Pleural fluid aspiration for urgent microbiology and cytology. If this is inconclusive the paravertebral soft tissue mass is amendable for CT guided biopsy is pleural fluid cytology is non-diagnostic.", "imgs": [], "cat": "ABG"}, {"q": "A 34 year old woman with severe rheumatoid arthritis presents with fever and left sided weakness.\n\nBiopsy of the lesion was sent for culture with the following results :\n\nGram stain - weakly positive branching filiments and rods\nWeakly acid fast\nNon-alcohol fast\n\nWhat is the most likely organism?\n\nWhat management is indicated?", "a": "The most likely cause is Nocardia cerebral abscess.  Management involves appropriate antibiotic cover (Trimethoprim-sulfamethoxazole is the first line agent), consideration for drainage and minimisation of immunosuppressive therapy if possible.\n\nDiscussion : Nocardia species (the most common being asteroides) are aerobic, filamentous organisms that are most common in immunosuppressed hosts.   Nocardia commonly causes pulmonary, renal and central nervous system granuloma / abscesses. Infection occurs most in patients with impaired cell-mediated immunity (particularly T cells).\n\nThe organism is weakly gram positive and tends to bud and branch.  It is acid but not alcohol fast.  It grows on standard media but is often slow to grow - it is important to warn laboratory staff that Nocardia is suspected clinically.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/nocardia%20brain%20abscess%20ring%20enhancing.jpg"], "cat": "Biochemistry"}, {"q": "A 45 year old male presents with acute lethargy, weakness and nausea.  He has been vomiting and can't hold anything down.  His history includes hypertension and type 2 diabetes mellitus which is controlled by oral hypoglycaemic mediations\n\nDescribe the ECG\n\nWhat is your immediate management plan?\n\nECG supplied by Dani Howe", "a": "The ECG demonstrates marked features of hyperkalaemia, viz:\n\nTented T waves\nWidening of the QRS\nProlonged PR interval and P wave flattening\n\nFurther progression often leads to fusion of the QRS and the T waves (loss of the ST segment) and sinus arrest.  Ultimately a sinusoidal pattern is seen. \n\nImmediate management should include:\n\nTriage to an appropriately monitored acute area\nOxgygen and IV access\nIntravenous calcium should be given to \"stabilise\" the myocardium and prevent arrhythmias\nIntravenous sodium bicarbonate to raise arterial pH and drive K intracellularly\nDextrose-insulin infusions to promote intracellular movement of K\nBeta-agonists (eg high dose salbutamol nebulisers) can assist\nResonium to assist removal of body stores of potassium\nInvestigation and management of cause of hyperkalaemia (in this case acute renal failure)\nDialysis / renal replacement therapy may be required", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/hyperkalaemia%20ecg1.jpg"], "cat": "ABG"}, {"q": "A 72 year old male presented with sudden onset sweatiness, disorientation, shortness of breath and mild headache, lasting 15 minutes.  He was mildly disorientated on presentation, with no apparent neurological deficit.  His troponin was mildly elevated at presentation (TnI 0.2mcg/L - ref range <0.04mcg/L)\n\nHe had no significant past medical history though his family reported he'd been having episodes of confusion over the past 6 months. \n\nThe following resting ECG is taken 72 hours after admission.  There have been no dynamic changes since admission\n\nDescribe the findings?\n\nWhat is are the potential causes for these findings?\n\nWhat additional investigations are required?", "a": "The ECG shows :\n\nSinus rhythm\nFirst degree AV block\nLeft anterior hemiblock (consistent with left anterior fascicular block)\nPathological Q waves, ST elevation and biphasic T waves in anteroseptal leads\n\nThe lack of changes over time suggest STEMI is unlikely.  A high left anterior descending artery lesion may cause this resting pattern with \"pseudonormalisation\" during pain (known as Wellen's syndrome).  Other causes of persistant ST elevation include left ventricular aneurysm.\n\nThe patient requires cardiac catheterisation, brain CT and an echocardiogram. \n\nIn this case, Echocardiography demonstrated a large left ventricular aneurysm, with a large mobile intramural thrombus.  CT scan demonstrated multiple small infarcts, probably causing \"vascular dementia\", secondary to microembolisation from the ventricular clot.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/LV%20aneurysm.jpg"], "cat": "ECG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q26.1\n\n1. A 64 year old man is admitted to ICU with a 5 day history of increasing shortness of breath, non-productive cough and acute respiratory failure.\n\nClinical examination reveals reduced breath sounds and inspiratory and expiratory wheeze bilaterally. Chest X-Ray reveals hyperinflated lung fields. The following data are from pulmonary function testing performed 3 months ago.\n\n \n\nVariable\n\n\t\n\nPredicted\n\n\t\n\nPre-bronchodilator\n\n\t\n\nPost-bronchodilator\n\n\n\n\nFEV1 (L/min)\n\n\t\n\n3.15\n\n\t\n\n0.77\n\n\t\n\n0.85\n\n\n\n\nFVC (L/min)\n\n\t\n\n4.05\n\n\t\n\n3.00\n\n\t\n\n3.38\n\n\n\n\nFEV1/FVC %\n\n\t\n\n70\n\n\t\n\n20\n\n\t\n\n25%\n\n \n\nThe patient is intubated and volume-controlled ventilation instituted. The settings are SIMV, rate of 8, TV 500 ml, FIO2 1.0, PEEP 0. Three sets of ventilatory parameters are provided below.  \n\n \n\n1. Based on the information above, select from A,B or C, which pattern will be most likely to fit with his respiratory dysfunction and explain why? (Fig 1)\n\n2. This is the patients flow-volume loop. What abnormality is illustrated (Fig 2)\n\n3. This is the patient's flow-time respiratory waveform. Waht abnormality is illustrated by this trace? (Fig 3)\n\n4. List 3 changes to the ventilator settings you could do to correct the abnormality noted in Fig 3", "a": "1. A (A high peak-plateau  gradient with high peaks are consistent with obstructive lung disease)\n\n2. Expiratory flow scooped out - increased expiratory resistance\n\n3. Incomplete emptying / potential for gas trapping\n\n4. Decrease respiratory rate\n\n     Increase peak inspiratory flow\n\n     Decrease the I:E ratio (increase expiratory time//decrease inspiratory time)", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%2026.1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/Figure%2026.1b.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/Figure%2026.1c.jpg"], "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q26.2\n\nA 56 year old female with septic shock and multiple organ failure is admitted to intensive care.  She is endotracheally intubated and ventilated. This is the patient\u2019s pressure-volume loop. What abnormalities does the loop indicate?", "a": "Reduced compliance / Increased resistance", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Figure%2026.2.jpg"], "cat": "Equipment"}, {"q": "**JFICM Fellowship Exam Question (2008, No.2, Q26.3)\n\nListed below are the co-oximetry data for two patients A & B. What would the pulse oximetry measured saturation be for patient A and patient B?  Give reasons for your answer.", "a": "Patient A \u2013 90%\n\nPatient B -  90%\n\n \n\nPulse oximetry only uses 2 wavelengths and COHb is measured as OxyHb.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%2026.3.jpg"], "cat": "Clinical"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q28\n\nA 56 year old man was admitted to your ICU for monitoring of his deteriorating conscious state following an acute thrombotic stroke involving the carotid territory. Over the next 6 hours, the patient\u2019s conscious state has improved significantly. However, you are notified of an abnormal coagulation result from a sample taken at 6 hours after admission to intensive care.  There are no signs of bleeding.\n\n                                    Baseline                   6 hours\n\n \n\nPT                                    13                          27                        (12-16 sec)\n\nAPTT                                34                         120                       (32-36 sec)\n\nINR                                  1.1                          2.1\n\nTT                                    12                           34                        (12-14 sec)\n\nPlatelets                          146                         148                      (150-300 X 109/L)\n\nFibrinogen                        3.6                         0.9                        (2.5-4 G/L)\n\na)  Suggest a reason for the abnormal blood result.", "a": "Patient has received thrombolysis. Release of brain thromobplastin causing a DIC is unlikely as patient is clinically getting better and platelets are normal.", "imgs": [], "cat": "Biochemistry"}, {"q": "JFICM Fellowship Exam 2008, No,2, Q 22\n\nA previously healthy 34 year old woman is transferred to your hospital intubated and ventilated with a history of a prolonged generalized tonic-clonic convulsion. On arrival, she is deeply unconscious with a GCS of 3, fixed dilated pupils, absent tendon reflexes and bilateral up-going plantar reflexes. An admission CT scan shows bilateral intracerebral haemorrhages. A full blood count report is as follows:\n\n \n\n1) Hb 78 g/l                                   (130-150),\n\n2) WCC 14.5 x 106/mm3                   (4.0-11.0),\n\n3) Platelets 43 x 106 /mm3           (150-300)\n\n \n\nBlood picture:  Thrombocytopaenia, fragmented cells and reticulocytosis\n\nBased on the history, CT scan and the haematology report provide 3 possible diagnoses", "a": "Eclampsia\n\nThrombotic thrombocytopaenic purpura\n\nHUS\n\nMeningococcal meningitis with DIC \u2026(although big bleed is unlikely)\n\nVasculitis.", "imgs": [], "cat": "CT"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q22\n\nA 45 year old man received an allogeneic bone marrow transplant for Acute Lymphatic Leukaemia. 26 days after the transplant the patient developed severe gastroenteritis and a maculopapular skin rash and respiratory insufficiency.\n\nThe following investigations were performed (Fig 1)\n\nList 3 possible diagnoses", "a": "Sepsis\n\nCMV\n\nGVH", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%2022.1.jpg"], "cat": "Biochemistry"}, {"q": "JFICM Fellowship Exam, 2008, No.2, Q18\n\n A 63 year old patient with a background of type II diabetes had vascular surgery 24 hours previously. His post operative course has been uncomplicated except for consistently elevated serum potassium measurements. He is not receiving supplemental potassium and vital recordings have been stable. His most recent arterial blood gases and plasma biochemistry are presented below:\n\na)describe the acid base abnormality\n\nb)list 3 causes of the acid base abnormality\n\nc)what is the most likely cause of the abnormality?", "a": "a) Describe the acid base abnormality\n\n This is a normal anion gap metabolic acidosis.                        \n\n\nb) List three causes of the acid-base abnormality.\n\n\nThe major causes are:\n\nLoss of bicarbonate (eg diarrhoea, pancreatic biliary drainage and urinary diversions (ureterosigmoidostomy)\nRenal tubular acidosis (RTA).\nOther: saline loading, TPN and cholestyramine use                   \n\n \n\nc) What is the most likely cause in this patient\n\nType 4 RTA.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%2018.2.jpg"], "cat": "Biochemistry"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q18\n\n\nAn 81 yr old woman is admitted to the ICU with a 24 hr history of altered mental state and confusion. she has a history of type II diabetes managed with metformin. The flollowing blood results were taken on admission.\n\na. Which clinical condition is most consistent with the above data? - Justify your answer from the results provided.  \n\n\nb. List 3 complications of this condition.", "a": "a. Which clinical condition is most consistent with the above data? - Justify your answer from the results provided.  \n\n \n\nAnswer: Non ketotic hyper osmolar state                                                              \n\n \n\nMarked hyperglycaemia (higher than usually observed DKA) plasma glucose may be >55mmol/L.\nHyperosmolarity (by definition osmolarity should be >320)\nRelatively normal pH/HCO3 suggesting non ketotic state. A small anion gap acidosis may be present secondary to lactate.\n\n \n\nb. List 3 complications of this condition.\n\n \n\nCerebral oedema:\nVascular thrombosis:\nElectrolyte derangements in particular hypokalemia, dysnatraemia. Hyperchloremia from saline administration.\nIntercurrent events such as sepsis, aspiration,  myocardial infarction, iatrogenic ( eg vascular access related complication)\nHypotension and shock due to intravascular volume depletion or inadequate resuscitation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%2018.1.jpg"], "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q18\n\n \n\nYou are called to the Emergency Department to review a nulliparous 28 year old woman. She is currently 35 weeks pregnant, and has presented with 72 hours of nausea and vomiting accompanied by epigastric and right upper quadrant pain. On examination she was jaundiced, confused and had a blood pressure of 120/70.\n\nLaboratory results from a venous blood taken on arrival are shown below:\n\n \n\n List 3 likely differential diagnoses for the above history and laboratory data", "a": "A number of differentials are possible however in the third trimester in a nulliparous woman the three main considerations are:\n\n\u00b7       Acute fatty liver of pregnancy ( AFLP):\n\n\u00b7       HELLP (Haemolysis, elevated liver enzymes and low platelets) Syndrome:\n\nPre eclampsia with hepatic involvement.                                                            \n\n \n\nOther considerations are: (these are not the cause of severe hepatic failure in pregnancy and so will attract fewer marks if mentioned without the first three)\n\nIntrahepatic Cholestasis of Pregnancy:\nViral hepatitis: The commonest cause of jaundice in pregnancy. May occur at any time. The ALT and AST would be expected to be greatly elevated (>500-1000U/L). DIC is rare.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%2018.3.jpg"], "cat": "Biochemistry"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q15\n\nThe following information was obtained during the insertion of a right heart catheter\n\n \n\nRA         14                mm Hg\n\nRV         105/14         mmHg\n\nPA          33/18          mmHg\n\nPAOP     14               mmHg\n\nCI            2.4              L/min/m2\n\n \n\n\na)     What dominant abnormality is indicated by the right heart catheter data?\n\nb)    List two (2) likely causes of the abnormality", "a": "a)     What dominant abnormality is indicated by the right heart catheter data?\n\n            Pressure gradient between the RV and PA\n\n \n\nb)    List two (2) likely causes of the abnormality \n\n      pulmonary valve stenosis\n\n      supravalvular or RVOT stenosis", "imgs": [], "cat": "Clinical"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q11 \n\nA 27 year old male with a prolonged ICU stay following a subarachnoid haemorrhage has a CSF specimen taken from his external ventricular drain.\n\n\nThe CSF gram stain result is:\n\n\nRed Blood Cells            1946 x 106/L                      (0-5 x 106/L)\n\nPolymorphs                   198 x 106/L                        (0-5 x 106/L)\n\nMononuclear cells         74 x 106/L\n\n \n\nGram stain:                    scant gram positive cocci.\n\n \n\na). What is your assessment of the CSF result and provide a reason ?                             \n\nb). List two likely organisms commonly reported on the Gram stain in this setting.\n\n\nc). List 2 therapies you may consider based on this report .", "a": "a). What is your assessment of the CSF result and provide a reason ?                                     Ventriculitis : due to raised WCC:RCC ratio and a positive gram stain\n\nb). List two likely organisms commonly reported on the Gram stain in this setting.\n\n            Staphylococcus epidermidis\n\n            Staphylococcus aureus\n\nc). List 2 therapies you may consider based on this report .                   \n\nRemoval of EVD +/- replacement\n\nVancomycin", "imgs": [], "cat": "ECG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q11 \n\nA previously well, 19 year old female presents with fever, headache, photophobia and neck stiffness.\n\n\na). List three (3) clinical features that would indicate the need for a brain CT scan prior to lumbar puncture in this patient?\n\nb) A lumbar puncture is performed. The initial results reveal:\n\n\n\n\nRed blood cells             356 x 106/L                       (0-5 x 106/L)\n\nPolymorphs                  3180 x 106/L                      (0-5 x 106/L)\n\nMononuclear cells        206 x 106/L\n\nProtein                          2.96 g/L                              (0.15 \u2013 0.40 g/L)\n\nGlucose                        0.4 mmol/L                        (2.5 \u2013 5.6 mmol/L)\n\n \n\nWhat are the three (3) most likely causative organisms?\n\n \n\n\nc) After 24 hours of appropriate therapy she develops new onset of generalised tonic-clonic seizures. List three (3) likely intracranial causes.", "a": "a). List three (3) clinical features that would indicate the need for a brain CT scan prior to lumbar puncture in this patient?\n\n \n\n            New onset seizures\n\n            Immunocompromised state\n\n            Abnormal level of consciousness\n\n            Focal neurological signs (signs suspicious of a space occupying lesion)\n\nHistory of CNS disease (mass lesion, stroke, focal infection)\n\n            Papilloedema\n\n \n\nb) What are the three (3) most likely causative organisms?\n\n \n\n            Neisseria meningitidis\n\n            Streptococcus pneumoniae\n\n            Haemophilus influenzae\n\n \n\nc) List three (3) likely intracranial causes.\n\n            Raised intracranial pressure\n\n            Cerebritis\n\n            Cerebral abscess\n\n            Septic venous thrombosis", "imgs": [], "cat": "CT"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q11\n\nA 66yo diabetic female with a history of a recent febrile illness now presents with increasing weakness and altered sensation in both legs. A lumbar puncture is performed and the initial CSF result is shown.\n\n \n\nRed blood cells                        594 x 106/L                 (0-5 x 106/L)\n\nPolymorphs                             550 x 106/L                 (0-5 x 106/L)\n\nMononuclear cells                   154 x 106/L\n\nProtein                                     0.99g/L                        (0.15 \u2013 0.40g/L)\n\nGlucose                                  10.4 mmol/L                (2.5-5.6 mmol/L)\n\nNo organisms seen\n\n \n\na). What is the most important diagnostic investigation indicated in this clinical scenario?\n\n\n\n\nb). What is the most likely diagnosis?", "a": "a). What is the most important diagnostic investigation indicated in this clinical scenario?\n\n            MRI of the spine\n\n \n\nb). What is the most likely diagnosis?\n\n            Epidural abscess", "imgs": [], "cat": "Biochemistry"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q.9\n\n \n\nThe above is a capnograph trace obtained from a patient in an intensive care unit.\n\n \n\na) What technology is used for the detection of CO2 in expired breath in the ICU?\n\nb) List 3 uses for capnography in intensive care\n\nc) List 3 conditions which may increase the gradient between end-tidal and arterial PCO2?", "a": "a) What technology is used for the detection of CO2 in expired breath in the ICU?\n\n \n\nInfra-red absorption spectrophotometry \n\n \n\nb) List 3 uses for capnography in intensive care\n\n \n\nAirway disconnection alarm\n\nConfirmation of ET tube placement in airway\n\nDuring CPR to assess adequacy of cardiac compression\n\nRecognition of spontaneous breath during apnoea test\n\nNeurosurgical patient to provide protection against unexpected hypercapnia\n\n \n\nc) List 3 conditions which may increase the gradient between end-tidal and arterial PCO2?\n\n \n\nLow cardiac output or cardiogenic shock\n\nPulmonary embolism\n\nCardiac arrest\n\nPositive pressure ventilation and use of PEEP\n\nHigh V/Q ratios.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Fig%209.2.jpg"], "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q6 \n\nA 57 year old female has the following haematology and coagulation profile post admission to the intensive care unit after a laparotomy for intraabdominal sepsis with significant blood loss.\n\n \n\nWCC                (3.5 \u2013 11.00 x109/L)              *2.77\n\nHb                   (115 \u2013165 g/L)                        *65\n\nPlatelets          (150-400 x109/L)                    *14\n\nPT                    (12.0 \u2013 15 Sec)                      *28.9\n\nINR                  (0.8 \u2013 1.1)                               *2.7\n\nAPTT               (25.0 \u2013 37.0 Sec)                    *122.5\n\nFibrinogen       (2.20-4.30g/L)                         *1.1\n\n \n\n\na) What is the most likely cause of the coagulation abnormalities?      \n\n \n\nb) How would you correct the coagulopathy and briefly provide a reason for your choice of therapy or therapies?", "a": "a) What is the most likely cause of the coagulation abnormalities?                              \n\nHaemodilution with inadequate replacement of blood and clotting factors DIC\n\n\n\n\nb) How would you correct the coagulopathy and briefly provide a reason for your choice of therapy or therapies? \n\n\nEnsure patient is normothermic\n\nExclude ongoing surgical haemorrhage\n\nPlatelets to increase platelet count\n\nFFP to replace factors II, V, VII, IX, X, and XI.\n\nCryoprecipitate to replace factor VIII, and fibrinogen if FFP does not reverse INR.\n\nActivated Factor 7", "imgs": [], "cat": "Haematology"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q6\n\n A 44 year old male presents with dyspnoea and is diagnosed as having multiple pulmonary emboli on Computerised tomography pulmonary angiogram (CTPA). He is commenced on 1000 units of heparin per hour after a 5000 unit bolus.  During the night his heparin has steadily increased to 1500 units per hour.\n\nThese blood results are from the next morning.\n\na) Give 2 reasons for the relatively low APTT despite heparin therapy\n\n\nb) List 4 causes for an increased predisposition to venous thromboembolic disease", "a": "a) Give 2 reasons for the relatively low APTT despite heparin therapy\n\nInadequate heparinisation\n\nATIII deficiency\n\nIncreased heparin clearance\n\nIncreased hepain binding proteins\n\n\n \n\nb) List 4 causes for an increased predisposition to venous thromboembolic disease\n\n\nProtein C def\n\nProtein S def\n\nAT III def\n\nMalignancy\n\nFactor V Leiden\n\nLupus anticoagulant", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%206.2.jpg"], "cat": "Clinical"}, {"q": "JFICM Fellowship Exam, 2008, No.2, Q6\n\n A 58 year old male is admitted with haematemesis. His coagulation profile is shown below. List 2 likely causes of his coagulation abnormalities?", "a": "1) Liver dysfunction due to alcoholic or viral liver disease.\n\n2) Vit K deficiency\n\n3) Patient on warfarin therapy.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%206.3.jpg"], "cat": "Clinical"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q3\n\n A 43 year old man, with no history of previous illnesses is admitted with septic shock requiring administration of high dose vasopressor. His blood results on 40% oxygen, pressure support ventilation are as follows:\n\n\n\n\nParameter\n\n\t\n\nValue\n\n\t\n\nNormal range\n\n\n\n\npH\n\n\t\n\n7.64\n\n\t\n\n7.35-7.45\n\n\n\n\nPaCO2\n\n\t\n\n28 mmHg (3.7 kPa)\n\n\t\n\n35-45 mmHg (4.7-6.0 kPa)\n\n\n\n\nPaO2\n\n\t\n\n189 mmHg (25.2 kPa)\n\n\t\n\n75-98 mmHg (10.0-13.0 kPa)\n\n\n\n\nActual bicarbonate\n\n\t\n\n29 mmol/l\n\n\t\n\n22-26 mmol/l\n\n\n\n\nSodium\n\n\t\n\n147 mmol/l\n\n\t\n\n134-145 mmol/l\n\n\n\n\nPotassium\n\n\t\n\n3.5 mmol/l\n\n\t\n\n3.5-5.1 mmol/l\n\n \n\na. Describe the acid-base abnormality\n\nb. List 3 likely causes of each acid-base abnormality in this patient.", "a": "a. Describe the acid-base abnormality\n\n\nRespiratory and metabolic alkalosis\n\n\nb. List 3 likely causes of each acid-base abnormality in this patient.  \n\nRespiratory alkalosis: Hyperventilation \u2013 spontaneous or IPPV induced, septic encephalopathy, pneumonia\n\nMetabolic alkalosis: Diuretics, volume contraction, upper GI losses, steroids.", "imgs": [], "cat": "ABG"}, {"q": "JFICM Fellowship Exam 2008, No.2, Q3\n\n A 41 year old man is admitted to your Emergency Department, unconscious, with the first set of blood results. The second set of blood gases are taken 1 hour later.\n\n \n\n\na. Describe the initial acid-base disturbance\n\nb. List 3 clinical scenarios which may produce such a pattern of arterial blood gas derangement?", "a": "a. The initial acid-base disturbance is a mixed metabolic and respiratory acidosis with a raised anion gap.\n\n b. Seizures\n\n     Resuscitated cardiac arrest\n\n     Near drowning\n\n     Near hanging", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%203.2.jpg"], "cat": "Clinical"}, {"q": "JFICM Fellowship Exam 2008, No. 2, Q3. \n\nA 48 year old diabetic with a history of alcohol abuse is admitted with abdominal pain and the following results:\n\n\n\na. Give the three most likely diagnoses\n\nb. List two additional investigations that you would perform based on the above information", "a": "a) Diagnoses: 3 ischaemic bowel, 2 metformin induced lactic acidosis, thiamine deficiency, pancreatitis.\n\n\nb) Two of the following investigations: Diagnostic laparoscopy or laparotomy, CT abdomen, red cell transketolase, lipase", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/Table%203.3.jpg"], "cat": "Clinical"}, {"q": "A 56 year old female with septic shock and multiple organ failure is admitted to intensive care. She is endotracheally intubated and ventilated. A central venous catheter is inserted into her right subclavian vein, a Vas Cath is inserted into her right femoral vein and a pulmonary artery catheter is inserted via her left subclavian vein.\n\nBlood gas samples are simultaneously taken from all three catheters. The oxygen saturations are as follows:\n50%\n60%\n67%\n \nState which site each of the blood gas samples is taken from and justify your answer                                                                                            \n \n\nJFICM fellowship exam 2008, No.1, Qu. 27", "a": "50% = femoral vein (inferior vena cava) - in sepsis, regional O2 consumption and extraction in gut/splanchnic circulation increases\n60% = pulmonary artery catheter        - pooled blood from SVC and IVC\n67% = subclavian vein (superior vena cava) - in sepsis, cerebral blood flow relatively maintained initially", "imgs": [], "cat": "Equipment"}, {"q": "A 70 year old man is admitted with shortness of breath and respiratory failure to the intensive care unit. A systolic murmur is audible on examination. A chest X-ray reveals upper lobe diversion of pulmonary veins. A transthoracic echo reveals the following. (abnormal values marked with an asterix)\nOBSERVATIONS:\n \nTRICUSPID VALVE:                        Normal\nPULMONIC VALVE:                        Normal\nRIGHT VENTRICLE:                         Normal size and function\nRIGHT ATRIUM/IVC:                         Normal\nMITRAL VALVE:                               Normal\n \n*LEFT VENTRICULAR EVALUATION\nNormal LV size. Moderate to severe impairment of systolic function. EF 25%. No regional wall motion abnormalities. Moderate LV hypertrophy.\n*LEFT ATRIUM: Mildly enlarged.\n*AORTIC VALVE:  Thickened and calcified, with reduced opening. No aortic regurgitation.\nAortic valve area                               0.68cm2                      (2-4)\nLeft ventricular outflow tract:\nMaximum velocity                              0.55 m/s;                    (0.8 \u2013 1.2)\nVelocity time integral (VTI)               8.58 cm;\n \nAortic valve   \nMaximum velocity                              2.93 m/s;                    (<2.0)\nVelocity time integral (VTI)               43 cm;\nMax pressure gradient                      34 mm Hg                 (<16)\nMean pressure gradient                    18 mm Hg                 (<10)\nDimensionless severity index (DSI)             0.19              \n \nBased on the above information, what is the likely underlying diagnosis responsible for this patient\u2019s symptoms? Comment on the severity of the underlying diagnosis and provide reasons for your answer.\n \nJFICM Fellowship Exam 2008 No.2", "a": "Severe aortic stenosis (2.0) with impaired LV systolic function.\nReasons: Valve area less than 0.7 cm2 (1.5) and DSI less than 0.2.\n Pressure gradients may be low in the presence of LV dysfunction", "imgs": [], "cat": "ECG"}, {"q": "16 year old male has been treated all night for diabetic ketoacidosis. In the morning the blood gas printout is as follows:\n\n \n\nBarometric pressure\n\n\t\n\n760\n\n\t\n\nmm Hg\n\n\t\n\n \n\n\n\n\nFiO2\n\n\t\n\n0.21\n\n\t\n\n \n\n\t\n\n \n\n\n\n\npH\n\n\t\n\n7.32\n\n\t\n\n \n\n\t\n\n \n\n\n\n\npO2\n\n\t\n\n100\n\n\t\n\nmm Hg \n\n\t\n\n \n\n\n\n\npCO2\n\n\t\n\n30\n\n\t\n\nmm Hg   \n\n\t\n\n \n\n\n\n\nHCO3-\n\n\t\n\n15.2\n\n\t\n\nmmol/L\n\n\t\n\n \n\n\n\n\nStandard base excess\n\n\t\n\n-11.4\n\n\t\n\nmmol/L\n\n\t\n\n \n\n\n\n\nSodium\n\n\t\n\n136\n\n\t\n\nmmol/L\n\n\t\n\n(135 \u2013 145)\n\n\n\n\nChloride\n\n\t\n\n105\n\n\t\n\nmmol/L\n\n\t\n\n(100 -110)\n\n\n\n\nPotassium\n\n\t\n\n3.5\n\n\t\n\nmmol/L\n\n\t\n\n(3.2 - 4.5)\n\n\n\n\nLactate\n\n\t\n\n1.3\n\n\t\n\nmmol/L\n\n\t\n\n(0.2 - 2.5)\n\n\n\n\nGlucose\n\n\t\n\n5.3\n\n\t\n\nmmol/L\n\n\t\n\n(3.6 \u2013 7.7)\n\n \n\na) Describe the acid-base status. \n\nb) Does he need continuation of insulin therapy over the next 6 hours? Give your reasoning.\n\n \n\n \n\n\t\n\n \n\n\t\n\nReference\n\n\n\n\nNa+\n\n\t\n\n149\n\n\t\n\n135-145 mmol/L\n\n\n\n\nK+\n\n\t\n\n4.5\n\n\t\n\n3. ium\n\t\n120\n\t\nmmol/L\n\t\n(137 -145)\n\n\nPotassium\n\t\n4\n\t\nmmol/L\n\t\n(3.5 \u2013 5.0)\n\n\nUrea\n\t\n6\n\t\nmmol/L\n\t\n(2.5 \u2013 7.5)\n\n\nCreatinine\n\t\n90\n\t\nmicromol/L\n\t\n(50 - 100)\n\n\nMeasured Osmolality\n\t\n255\n\t\nmmol/kg\n\t\n(280 - 300)\n\n\nGlucose\n\t\n3\n\t\nmmol/L\n\t\n3.5 \u2013 6.0\n\n\nCK\n\t\n1000\n\t\nU/L\n\t\n(20 - 200)\n\n\nCholesterol\n\t\n7.2\n\t\nmmol/L\n\t\n(3.0-5.5)\n\n \na. What is the likely diagnosis and cause to account for all these blood results?\nb. List 4 measures essential for the specific management of this patient.\n \n \nJFICM Fellowship Exam 2008 No.1", "a": "A)\n\nhypothyroidism\namiodarone\n\n \n\nB)\nCommence thyroxine, probably low dose (50-100ug/day and slowly increase) or administer T3 orally or intravenously\nCommence on glucocorticoids (Hydrocortisone 50mg 6 hourly)\nCorrect the hypoglycaemia with intravenous glucose\nCorrect the hyponatraemia very slowly with hypertonic saline to a sodium 130mmol/L (no more than 2 mmol/L per hour)", "imgs": [], "cat": "ECG"}, {"q": "A previously well 54 year old man presents with confusion. On examination a fine non-blanching rash is noted. Temperature The initial blood results are provided below.\n\nVenous biochemistry\nNa                   135      mmol/L            (135-145)       \nK                     3.8       mmol/L            (3.5-4.5)\nUrea                18        mmol/L            (2.9-8.2)          *\nCr                    177      \u03bcmol/L            (70-120)          *\nBilirubin          45        \u03bcmol/L             (<20)               *\n \nHaematology\nHb                   99        g/L                   (135-180)        *\nWBC               10.8     x 109/L                        (4.0-11.0)\nPlt                    26        x 109/L                        (140-400)        *\nBlood film:      Schistocytes\n \nCoagulation\nPT                   10        s                      (9-12)\nAPTT              29        s                      (24-39)\nFibrinogen       3.0       g/L                   (1.7-4.5)\n \nWhat is the most likely diagnosis?         \n What treatment needs to be instituted urgently?                                              \n \n\nJFICM Fellowship Exam 2008 No.1", "a": "Thrombotic thrombocytopaenic purpura\n\nUrgent plasmapheresis", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/DITF51cp.jpg"], "cat": "Biochemistry"}, {"q": "A 34 year old lady who is 34 weeks pregnant presents with acute onset epigastric pain. The plasma biochemistry and the haematology report are provided.\n\n \n\nTest\n\n\t\n\nNormal Range\n\n\n\n\nSodium            138 mmol/L\n\n\t\n\n 135-145\n\n\n\n\nPotassium         4.4 mmol/L  \n\n\t\n\n3.2-4.5\n\n\n\n\nChloride           102 mmol/L\n\n\t\n\n 100-110\n\n\n\n\nBicarbonate      27 mmol/L  \n\n\t\n\n17-28\n\n\n\n\nAnion Gap        9 mmol/L  \n\n\t\n\n5-15\n\n\n\n\nCreatinine        66 micromol/L  \n\n\t\n\n50-100\n\n\n\n\nUrea                4.3 mmol/L  \n\n\t\n\n1.0-5.0\n\n\n\n\nTot Protein      76H g/L     \n\n\t\n\n55-75\n\n\n\n\nAlbumin          36 g/L     \n\n\t\n\n28-38\n\n\n\n\nCalcium           2.35 mmol/L  \n\n\t\n\n2.00-2.50\n\n\n\n\nCa Alb Cor      2.53H mmol/L  \n\n\t\n\n2.00-2.50\n\n\n\n\nPhosphate        1.03 mmol/L  \n\n\t\n\n0.7-1.4\n\n\n\n\nMagnesium       0.8 mmol/L  \n\n\t\n\n0.7-1.0\n\n\n\n\nGlucose           4.7 mmol/L  \n\n\t\n\n3.6-7.7\n\n\n\n\nCK Total         71 U/L     \n\n\t\n\n<160\n\n\n\n\nLD                 748H U/L     \n\n\t\n\n100-200\n\n\n\n\nAST               241H U/L     \n\n\t\n\n10-45\n\n\n\n\nALT              189H U/L     \n\n\t\n\n5-45\n\n\n\n\nGGT              45 U/L     \n\n\t\n\n10-70\n\n\n\n\nALP              185H U/L     \n\n\t\n\n65-180\n\n\n\n\nBilirubin Total      40 micromol/L  \n\n\t\n\n<20\n\n\n\n\nWCC              12.4 ^9/L  \n\nHb               88 g/L  \n\nPlat             64L x10^9/L      \n\n\t\n\n4.0-15.0\n\n110-160\n\n150-400\n\n \n\n \n\n \n\n \n\n1. What is the most likely diagnosis?\n\n2. What 2 additional tests will support your diagnosis?\n\n3. List 4 treatment options\n\n \n\nJFICM Fellowship Exam 2008 No.1", "a": "1.\n\nHELLP syndrome\n\n2.\n\nHaptoglobins : low                        \nBlood film showing evidence of hemolysis \n\n \n\n3.\n\nDelivery of baby                        \nSteroids\nAntihypertensives\nMagnesium sulphate\nPlasma exchange", "imgs": [], "cat": "Biochemistry"}, {"q": "A 33 year old female presented with high fever and abdominal pain.  She has gram negative bacteraemia and septic shock.  The following are data from blood gas analysis\n\nBarometric pressure\t760mmHg\nFiO2\t0.3\npH\t7.43\nPaO2\t107\nPaCO2\t23\nHCO3\t15\nSBE\t-8.6\nLactate\t23\nNa\t147\nK\t6.7\nChloride\t95\n\nList the acid-base abnormalities\nWhat are the causes of elevated plasma lactate in sepsis?\nName 3 drugs which result in hyperlactaemia\n\nJFICM Fellowship Exam 2007 No. 1", "a": "High anion gap metabolic acidosis with raised lactate.  Change in base excess < change in anion gap therefore co-existant metabolic alkalosis.  Respiratory compensation is excessive suggesting respiratory alkalosis\nCauses of high lactate in sepsis\nCirculatory failure causing tissue anaerobic metabolism\nMicrovascular shunting and mitochondrial failure, also leading to anaerobic metabolism\nAdrenaline blocking pyruvate dehydrogenase\nInhibition of pyruvate dehydrogenase by endotoxin\nDrugs causing lactic acidosis\nCatecholamines\nMetformin / phenformin\nAlcohols\nCyanide, nitroprusside\nSalicylates", "imgs": [], "cat": "ABG"}, {"q": "A 64 year old diabetic with vasculopathy undergoes an attempted endovascular repair of an abdominal aortic aneurysm.  However, the procedure is abandoned because of technical difficulties and he undergoes a surgical repair.  In the first 6 hours after the procedure, he is noted to be oliguric and a blood test reveals a creatinine of 0.24mmol/L (pre-op level 0.15mmol/L)\n\nList 5 likely causes of deterioration of renal function\n\nThe patient is administered IV fluids overnight.  Despite stable blood pressure overnight, the next morning he is noted to be still oliguric.  The plasma biochemistry is as follows:\n\nNa (135-145)\t137\nK (3.5-5.0)\t6.3\nCl (100-110)\t106\nHCO3 (22-33)\t18\nUrea (3-8)\t15.0\nCr (0.07-0.12)\t0.34\nTotal Calcium (2.15-2.6)\t1.75\nPhosphate (0.7-1.4)\t2.75\nAlbumin (33-47)\t26\nGlobulins (25-45)\t35\nTotal bilirubin (4-20)\t20\nConjugated bilirubin (1-4)\t4\n\n\nGamma GT (0-50)\n\n\t6\nALP (40-110)\t100\nLDH (110-250)\t3800\nAST (<40)\t2100\nALT (<40)\t100\n\nWhat is the likely cause of this plasma biochemistry\n\nJFICM Fellowship Exam 2007 No 1", "a": "Renal dysfunction\n\nHypovolaemia (pre-renal)\nAbdominal compartment syndrome\nRenal artery trauma\nCardiogenic dysfunction and shock\nPerioperative ischaemia due to clamp\nUse of contrast during endovascular procedure\nEmbolisation of plaque during endovascular procedure\nPost operative bleeding\nIschaemic rhabdomyolysis\nSepsis (inadvertent bowel ischaemia )\nNephrotoxic drugs\n\nCause of biochemistry\n\nRhabdomyolysis from lower limb ischaemia", "imgs": [], "cat": "ABG"}, {"q": "A 52 year old woman was admitted the previous night with an altered level of consciousness which improved rapidly with administration of glucose. She is referred to ICU the next day with confusion, ataxia and a worsening level of consciousness. Her CT head was normal.\n\nThe blood sugar level in the morning is 8 mmol/l on a 5% Dextrose infusion at 80 ml/hr. Her full blood count from the previous night is available.\n\n \n\nTest\n\n\t\n\nValue\n\n\t\n\nNormal Range\n\n\n\n\nHb\n\n\t\n\n88\n\n\t\n\n130-180 g/l\n\n\n\n\nWCC\n\n\t\n\n7.4 x 109 /l\n\n\t\n\n4.5 \u2013 11 x 109/l\n\n\n\n\nPlatelets\n\n\t\n\n88 x 109 /l\n\n\t\n\n150 \u2013 400 x 109/l\n\n\n\n\nMCV\n\n\t\n\n110 fl\n\n\t\n\n80 \u2013 98 fl\n\n\n\n\nMCH\n\n\t\n\n30 pg\n\n\t\n\n27 \u2013 33 pg\n\n\n\n\nMCHC\n\n\t\n\n320 g/l\n\n\t\n\n310 \u2013 360 g/l\n\n\n\n\n \n\n\t\n\n \n\n\t\n\n \n\n\n\n\nPT\n\n\t\n\n12 sec\n
