s-abdominal approach is often used to remove bowel and abdominal contents from the chest and to repair the left hemi-diaphragm.  Sometimes thoracotomy is required.\n\nComment:  left diaphragmatic rupture occurs most frequently following blunt trauma (80-90% of diaphragmatic rupture cases).  Right sided diaphragmatic rupture is much rarer, but if it does occur, it is associated with higher traumatic forces and greater severity of injuries.  The liver to some extent provides some protection of the right diaphragm to rupture.  Diaphragmatic ruptures rarely occur in isolation, with pelvic fractures (40%), splenic rupture (25%), liver laceration (25%) and thoracic aortic tears (5-10%), as in this case, commonly concurrently associated.\n\n\n\n\nFurther reading:\n\nWelsford M, et al.  (2013).  Diaphragmatic injuries.  Medscape Reference.  http://emedicine.medscape.com/article/822999-overview", "imgs": [], "cat": "CT"}, {"q": "QL1):  A 25yr old man is brought into to the emergency department after crashing his car into a tree.  The patient was intubated and ventilated on scene by HEMS crew.  Immediate CT scan following primary survey was undertaken:\n\n What abnormalities are evident on this coronal CT view?\n\n What immediate management is required?", "a": "Answer QL1:\n\nThis patient has sustained massive trauma.  Two immediately life-threatening injuries evident on CT are:\n\nPartial transection of the ascending aorta\n\nLeft diaphragmatic rupture with bowel / abdominal content migration into the left chest\n\nImmediate management includes: \n\nAortic dissection repair \u2013 either angiographically via stenting or open cardiac surgical repair.\n\nLaparotomy \u2013 the trans-abdominal approach is often used to remove bowel and abdominal contents from the chest and to repair the left hemi-diaphragm.  Sometimes thoracotomy is required.\n\nComment:  left diaphragmatic rupture occurs most frequently following blunt trauma (80-90% of diaphragmatic rupture cases).  Right sided diaphragmatic rupture is much rarer, but if it does occur it is associated with significantly greater traumatic forces and associated severity of injuries.  The liver to some extent provides some protection of the right diaphragm to rupture also.  Diaphragmatic ruptures rarely occur in isolation, with pelvic fractures (40%), splenic rupture (25%), liver laceration (25%) and thoracic aortic tears, as in this case (5-10%) commonly concurrently associated.\n\n \n\nFurther reading:\n\nWelsford M, et al.  (2013).  Diaphragmatic injuries.  Medscape Reference.  http://emedicine.medscape.com/article/822999-overview", "imgs": [], "cat": "CT"}, {"q": "QL1):  A 25yr old man is brought into the emergency department after crashing his car into a tree.  The patient was intubated and ventilated on scene by HEMS crew.  Immediate CT scan following primary survey was undertaken:\n\n What abnormalities are evident on this coronal CT view?\n\n What immediate management is required?", "a": "QL1): Answer\n\nThis patient has sustained massive trauma.  Two immediately life-threatening injuries evident on CT are:\n\nPartial transection of the ascending aorta\n\nLeft diaphragmatic rupture with bowel / abdominal content migration into the left chest\n\nImmediate management includes: \n\nAortic dissection repair \u2013 either angiographically via stenting or open cardiac surgical repair.\n\nLaparotomy \u2013 the trans-abdominal approach is often used to remove bowel and abdominal contents from the chest and to repair the left hemi-diaphragm.  Sometimes thoracotomy is required.\n\nComment:  left diaphragmatic rupture occurs most frequently following blunt trauma (80-90% of diaphragmatic rupture cases).  Right sided diaphragmatic rupture is much rarer, but if it does occur it is associated with significantly greater traumatic forces and associated severity of injuries.  The liver to some extent provides some protection of the right diaphragm to rupture also.  Diaphragmatic ruptures rarely occur in isolation, with pelvic fractures (40%), splenic rupture (25%), liver laceration (25%) and thoracic aortic tears, as in this case (5-10%) commonly concurrently associated.\n\n\n\n\nFurther reading:\n\nWelsford M, et al.  (2013).  Diaphragmatic injuries.  Medscape Reference.  http://emedicine.medscape.com/article/822999-overview", "imgs": [], "cat": "CT"}, {"q": "QL2):   A 40 year old man was urgently referred to the ICU from the renal unit, with a rapid onset of ascending motor and sensory paralysis requiring intubation and ventilation.  He had been admitted to hospital about 1 week previously with the following biochemistry:\n\nCreatinine\n\n\t\n\n880umol/L\n\n\n\n\nUrea\n\n\t\n\n36mmol/L\n\n\n\n\nALT\n\n\t\n\n1281 U/L\n\n\n\n\nPlatelets\n\n\t\n\n85 x10^9/L\n\n\n\n\nProthrombin Time\n\n\t\n\n236 sec\n\n\n\n\n \n\n\n\n\npH\n\n\t\n\n7.14\n\n\n\n\nPaO2\n\n\t\n\n13.5kPa\n\n\n\n\nPaCO2\n\n\t\n\n2.1kPa\n\n\n\n\nLactate\n\n\t\n\n9.5mmol/L\n\n\n\n\nAnion Gap\n\n\t\n\n29mmol/L\n\n \n\nThe patient had been on intermittent haemodialysis since admission with little improvement.  Prior to intubation and ventilation, the patient was confused with increasing weakness and difficulty with swallow.  His pupils were fixed and dilated.\n\n\n\n\nDescribe the abnormalities present on initial blood investigations?\n\nList the differential diagnoses?\n\nWhat management and further investigations would you instigate on the ICU?", "a": "QL2):  Answer: \n\nAbnormalities:\n\nMarked acute renal failure with raised urea and creatinine\n\nLiver dysfunction\n\nThrombocytopaenia\n\nProlonged prothrombin time\n\nMarked metabolic acidosis with hypocapnia and lactaemia\n\nRaised anion gap\n\nDifferential:\n\nGuillain Barre syndrome\n\nMetabolic causes (diabetes, porphyria, uraemia)\n\nInfection\n\nAutoimmune (vasculitides)\n\nToxins (alcohols, methanol, ethylene glycol, organophosphates, heavy metals, arsenic)\n\nCritical illness polyneuropathy\n\nInvestigations and Management:\n\nDifficulty here as diagnosis not clear\n\nResuscitation, stabilisation and support on ICU\n\nRenal replacement therapy to continue (CVVH)\n\nIn view of high anion gap \u2013 possibility of self-poisoning.  Consider fomepizole if ethylene glycol poisoning confirmed or suspected.\n\nNerve conduction studies \u2013 may help diagnosis GBS.  In this case \u2013features were consistent with ethylene glycol toxicity.\n\nRenal biopsy \u2013 acute tubular necrosis and oxalate crystal deposition evident\n\n\n\n\nDiagnosis:  Delayed presentation of Ethylene glycol poisoning.\n\n \n\nComment:  Ethylene glycol presents in three stages:  1.  Early neurological signs (intoxication within first 1hr of ingestion).  2.  Cardiorespiratory symptoms and instability (12-18hrs).  3.  Delayed neurologic phase with profound limb weakness and cranial nerve palsies which occur 5 to 20 days post ingestion.\n\n \n\nReferences:\n\nGlossop AJ, Bryden DC.  Case report: an unusual presentation of ethylene glycol poisoning.  JICS.  2009; 10(2):118-121", "imgs": [], "cat": "ABG"}, {"q": "QL3):  A 58yr old man diabetic presents to the ED unconscious.  Following intubation and ventilation his initial bloods are:\n\nHaemoglobin\n\n\t\n\n124 g/L\n\n\n\n\nWCC\n\n\t\n\n6.5 x10^9/L\n\n\n\n\nNa\n\n\t\n\n147mmol/L\n\n\n\n\nK\n\n\t\n\n5.6mmol/L\n\n\n\n\nCl\n\n\t\n\n108mmol/L\n\n\n\n\nUrea\n\n\t\n\n45.4mmol/L\n\n\n\n\nCreatinine\n\n\t\n\n361umol/L\n\n\n\n\nCRP\n\n\t\n\n585mg/L\n\n\n\n\npH\n\n\t\n\n7.32\n\n\n\n\nPaCO2\n\n\t\n\n3.65kPa\n\n\n\n\nPaO2\n\n\t\n\n12.89kPa\n\n\n\n\nBE\n\n\t\n\n-11.3\n\n\n\n\nHCO3-\n\n\t\n\n13.6mmol/L\n\n\n\n\nLactate\n\n\t\n\n2.1mmol/L\n\n\n\n\nGlucose\n\n\t\n\n42mmol/L\n\n\n\n\nPlasma Osmolality\n\n\t\n\n503mOsm/kg\n\n\n\n\nUrine Osmolality\n\n\t\n\n708mOsm/kg\n\n \n\nEstimate the patient\u2019s serum osmolality, osmolar gap and anion gap?\n\nWhat is your diagnosis and initial management plan?", "a": "QL3):  Answer\n\nEstimated Serum Osmolality = 2(Na)+Urea+Glucose = 381.4\n\nEstimated Serum Osmolality = (2*(147)+45.4+42 = 294+45.4+42 = 381.4\n\n \n\nMeasured Serum Osmolality = 503mOsmol/kg (normal 285-295mOsmol/kg)\n\n \n\nOsmolar gap = Measured Osmolality \u2013 Calculated Estimated Osmolality\n\nOsmolar gap = 503 \u2013 381.4 = 121.6  (>10mOsm/kg is raised)\n\n \n\nRaised Osmolar gap consider: diabetes mellitus, high blood ethanol, methanol, mannitol or ethylene glycol\n\n \n\nAnion gap = (Na+K)-(Cl+HCO3)\n\nAG = (147+5.6)-(108+13.6) = 30  (normal range 10-18mmol/L)\n\nAG is raised due to excess acid: Pneumonic \u201cLeft total knee replacement\u201d = Lactate, Toxins (ethanol, ethylene glycol, methanol), Ketones and Renal failure\n\n \n\nDiagnosis:  Acute Hyperglycaemia Hyperosmolar State (HHS)\n\n(previously known as Hyperglycaemic hyperosmolar non-ketotic coma, but disregarded as ketosis can occur)\n\n \n\nManagement:  Based on 2012 Joint British Diabetes Societies Inpatient Care Group Guidelines:\n\nMeasure or calculate osmolality (2Na+) + glucose + urea to monitor response\n\nUse iv 0.9% Sodium Chloride to restore circulating volume.  Only switch to 0.45% NaCl if osmolality is not declining adequately despite positive fluid balance\n\nRate of fall of plasma Na+ should not exceed 10mmol/L in 24hrs\n\nFall in blood glucose should be no more than 5mmol/L/hr.  Low dose iv Insulin (0.05 units/kg/hr) commenced only once the blood glucose is no longer falling or immediately if there is a significant ketonuria.  Plasma Na+ and glucose closely related to osmolality and too greater changes in serum osmolality can be harmful.\n\nAim to achieve positive fluid balance of 3-6 litres by 12hrs. \n\nAssess for complications: fluid overload, cerebral oedema, central pontine myelinosis.  Correct precipitants.\n\nProphylactic anticoagulation required as DVT/PE risk high\n\n \n\nReferences:\n\nJBDSCG.  (2012).  The management of the hyperosmolar hyperglycaemic state (HHS) in adult with diabetes. \n\nhttp://www.diabetes.org.uk/Documents/Position%20statements/JBDS-IP-HHS-Adults.pdf", "imgs": [], "cat": "ABG"}, {"q": "QL4):\n\nWhat is this?\n\n \n\nWhat are the perceived benefits of using such a device?", "a": "QL4):  Answer\n\nSize 7.0  Endotracheal tube with supra-glottic suction (TaperGuard TM ETT)\n\nOne theory for ventilator associated pneumonia (VAP) is the translocation of oropharyngeal bacteria into the airways.  Bacterial biofilm/slime accumulates above the endotracheal inflated cuff.  Despite the cuff being inflated, bacteria can still translocate around.  Supraglottic suction provides continuous low pressure suction above the cuff, which effectively removes secretions and biofilm theoretically reducing translocation and VAP risk. \n\nEvidence for effectiveness or not in reducing VAP is awaited.", "imgs": [], "cat": "Equipment"}, {"q": "QL5):  A CT scan is urgently undertaken in a patient who has collapsed. \n\n\n\n\nWhat does the scan show?\n\nWhat management would you consider?", "a": "QL5):  Answer:\n\nA CTPA has been undertaken.  A saddle pulmonary embolus is evident on scan. \n\nThe patient should be considered for thrombolysis if haemodynamic instability is present (massive PE) or raised troponin.  If patient stable (subacute PE) evidence for thrombolysis is limited with decision to give based on each individual clinical case (mortality benefit of thrombolysis vs higher risk of bleeding).  Anticoagulation should be given regardless of whether thrombolysed or not.\n\n\n\n\nTwo studies (Chatterjee 2014 and Meyer 2014) have looked into thrombolysis for PE:\n\nChatterjee et al. in their meta-analysis found:  all cause mortality was lower with thrombolytics than with anticoagulants (2.17 vs 3.89% OR 0.53, NNT=59).  However thrombolytics were associated with an increased risk of major bleeding including intracerebral haemorrhage (ICH) vs. anticoagulants 9.24 vs 3.42%, OR 2.73, NNH 18).  Thrombolytics were associated with a lower risk of recurrent PE (1.17 vs 3.04%, OR 0.4).  8 trials looked at patients with intermediate-risk PE.  In these patients thrombolytics were associated with lower mortality than anticoagulants, 1.39 vs 2.92%, OR 0.48, but with more bleeding events (7.74 vs 2.25%, OR3.19).  Patients >65yrs old showed a non-significant reduction in risk of mortality from thrombolytics vs anticoagulants OR 0.55, though there was a greater risk of major bleeds with thrombolytics OR 3.10.  In patients <65yrs old major bleeding was not significantly increased with thrombolytics use OR1.25.\nMeyer et al. investigated the clinical efficacy and safety of tenecteplase in patients with intermediate risk pulmonary embolism.  Death or haemodynamic decompensation was significantly less common in the tenecteplase group (2.6%) compared with placebo (5.6%) at 7 days after randomisation p=0.02).  Haemodynamic decompensation was less common in the tenecteplase group (1.6% vs 5.0%, p=0.002).  However, mortality was similiar in the two groups (1.2% in tenecteplase vs 1.8% placebo, p=0.42) at 30days.  Adverse events were more common in the tenecteplase group than placebo with respect to major extracranial bleeding (6.3% vs 1.2% p<0.001) and stroke (2.4% vs 0.2%,p=0.003).  By day 30, adverse events had occurred in 10.9% of the tenecteplase group and 11.8% in the placebo group (p=0.63).  Tenecteplase tended to perform better in the younger subgroup of patients <75yrs.  Benefit of thrombolysis in patients with intermediate-risk PE the haemodynamic benefits of early thrombolysis are countered by an increase in haemorrhagic complications with similiar overall mortality warranting caution and use being limited to carefully selected patients with impending haemody", "imgs": [], "cat": "CT"}, {"q": "QL6):  What does this radiograph show?", "a": "QL6):  Answer:  Inferior Vena Cava (IVC) Filter\n\nAn IVC filter is often considered in patients who have developed an acute pulmonary embolus and who are at risk of further embolic events from the lower limbs and pelvis (e.g. from deep vein thrombosis) and/or are unable to be fully anti-coagulated due to a co-existent pathology (intracranial bleed).  They can be kept insitu for about 3 months before removal is required.", "imgs": [], "cat": "ABG"}, {"q": "QL7):  A 18yr old student suddenly collapses in the street.  Paramedics arrived shortly.  She is cyanotic with a low conscious level on initial assessment.  On transferring into the ambulance she arrests.  Following 2min of CPR she regains spontaneous circulation and is transferred urgently to the hospital ED.  Following intubation and ventilation a bedside ECG is taken.\n\n \n\nWhat does her ECG show?\n\n\n\n\n \n\nIn view of haemodynamic instability (BP 75/50) a quick focused echocardiogram is undertaken.\n\n \n\nWhat does this show?\n\n \n\nWhat acute management will you instigate?", "a": "QL7):  Answer:\n\nHer ECG shows: Sinus tachycardia (rate about 150/min).  There is a predominant S deflection in lead I QRS, and a Q wave with T-wave inversion in lead III.  This is the classical S1Q3T3 pattern rarely seen in the presence of massive pulmonary embolus.\n\nThe focused echocardiogram image shows a 4-chamber view.  The RV (left upper chamber on image), RA (left lower chamber), LV (right upper chamber) is easily seen, with the LA only just visible (right lower chamber on image).  The RV is unusually dilated and is almost, if not larger than the LV.  This is highly suggestive of significant RV strain often caused by a massive pulmonary embolus.\n\nIn view of haemodynamic instability and recent arrest with clinically ECG and Echo findings, this is a massive pulmonary embolus until proven otherwise.  The patient should be thrombolysed immediately (e,g Alteplase) and transferred once stable to intensive care for ongoing management and anticoagulation.  If thrombolysis fails, with the patient remaining unstable, thrombectomy may be considered if such anintervention is available.\n\n \n\nReferences:\n\nLapner ST, Kearon C.  Diagnosis and management of pulmonary embolism.  BMJ 2013;346:f757 doi: 10.1136/bmj.f757\n\nOuellette DR, Mosenifar Z, et al. (2011).  Pulmonary Embolism Clinical Scoring Systems.  Medscape Reference.  Http://emedicine.medscape.com/article/1918940-overview\n\nWilson S, MacKay A. Ultrasound in Critical Care.  Continuing Education in Anaesthesia, Critical Care and Pain.  2012; 12(4):190-194", "imgs": [], "cat": "ECG"}, {"q": "QL8):  A 25yr old man falls from a cliff edge onto rocks.  On arrival in the ED he deteriorates with worsening shortness of breath. \n\nWhat does the resus portable CXR show?\n\nWhat is your immediate management?", "a": "QL8):  Answer:\n\nLeft Tension Pneumothorax with right shift of heart and mediastinum causing compromise secondary to fractured left 5-7th ribs\n\nImmediate management: needle thoracocentesis in 2nd intercostal space midclavicular line.  A 14G cannula (with 10ml syringe filled with water to confirm air if available) can be used.  Once the cannula is in place an intercostal chest drain should be sited.  Needle thoracocentesis has a high failure rate due either cannula kinkage/displacement or the chest wall muscle being too deep for the cannula to reach the pleural space.  If a chest drain is not immediately available, a thoracostomy may be performed with ashermann seal dressing attached.", "imgs": [], "cat": "X-Ray"}, {"q": "QL9):  A 30 year old anorexic patient presents following a collapse.  She is alert and conscious in the ED.  She tells you that she is known to have Gitelman\u2019s syndrome.  Her bedside ECG and bloods are as follows:\n\n\n\n\n \n\n\n\n\n \n\npH\n\n\t\n\n7.33\n\n\t\n\nNa\n\n\t\n\n140mmol/l\n\n\n\n\nPaCO2\n\n\t\n\n5.62kPa\n\n\t\n\nK\n\n\t\n\n1.9mmol/l\n\n\n\n\nPaO2\n\n\t\n\n13.7kPa\n\n\t\n\nCl\n\n\t\n\n107mmol/l\n\n\n\n\nLac\n\n\t\n\n1.9\n\n\t\n\nHCO3-\n\n\t\n\n21.6mmol/l\n\n \n\n \n\nWhat does the ECG show?\n\nWhat is the likely cause of her symptoms and diagnosis?", "a": "QL9):  Answer:\n\nThe ECG shows ventricular bigeminy caused by acute hypokalaemia (K+ 1.9mmol/l).  Her collapse may have been related to a dysrhythmia (e.g ventricular tachycardia, torsades de pointes).\n\n\n\n\nAcute hypokalaemia is defined as a serum potassium <3.5mmol/l.  It has many causes:\n\nInadequate dietary intake (urine K+<20mmol/l) due to abnormal body losses (e.g. vomiting, diarrhoea, laxative abuse, NG aspiration)\n\nRenal losses (urine K+>20mmol/l, e.g Conns syndrome, Cushings syndrome, Barrters syndrome, Gitelman\u2019s Syndrome, Ectopic ACTH). Renal tubular acidosis.\n\nDrugs (diuretics, corticosteroids, carbapenems, amphotericin B, gentamicin, Cisplatin),\n\nMagnesium deficiency\n\nCompartmental shifts (alkalosis, insulin, Na+/K+ stimulation, hypothermia, hypokalaemic periodic paralysis, delayed following blood transfusion). \n\n \n\nIn this case, the patient had known Gitelman\u2019s syndrome a rare, autosomal recessive renal tubular disorder that usually emerges after childhood and affects the kidney\u2019s ability to conserve potassium or magnesium or both.  Chronic hypokalaemia and hypomagnesaemia is often managed with supplements and diuretics (amiloride, spironolactone), ACE inhibitors and B-blockers tailored towards each individual patient.  The patient in this case normally had low potassium levels which were optimally controlled with treatment, but diuretic abuse often exacerbated her hypokalaemia resulting in hospital admission.\n\n \n\nECG changes: often non-specific but PR interval prolongation, T-wave inversion and prominent U-waves are common.  Ventricular tachycardias (VT, Torsades de pointes), bigeminy, atrial tachycardias and cardiac arrest may be seen.\n\n \n\nManagement involves replacing potassium:  this can be given enterally (e.g. Sando-K) if mild K>2.5mmol/l.  However, as in this case, severe hypokalaemia requires treatment with potassium containing fluid \u2013 depending on route (peripheral vs central) should not exceed 40mmol/hr with most units using slower rates.  A possible regimen could be:\n\nCentrally via CVC: Potassium chloride 20mmol in 100ml 0.9% saline over 1hr or Potassium chloride 40mmol in 100ml 0.9% saline over 2hrs.\n\nPeripheral intravenous access: Potassium chloride 20mmol in 500ml saline over 4hrs (5mmol/hr)\n\n \n\nReferences:\n\nBersten AD, Soni N.  (2014).  Oh\u2019s Intensive Care Manual.  Seventh Edition", "imgs": [], "cat": "ABG"}, {"q": "QL10):\n\nFollowing chemotherapy for a bladder tumour, a patient was admitted to A&E confused and breathless.  He had received metoclopramide 10mg and ondansetron 8mg intravenously following his chemotherapy for sickness.  His observations were: respiratory rate 30/min, blood pressure 112/58mmHg and HR 125/minute, O2 Sats 85% on 15 litres FiO2 via non-rebreath mask.  He was cyanosed.  Physical examination was unremarkable.\n\n \n\nHis initial arterial blood gases showed:\n\n \n\npH\n\n\t\n\n7.42\n\n\n\n\nPaCO2\n\n\t\n\n4.34kPa\n\n\n\n\nPaO2\n\n\t\n\n7.76kPa\n\n\n\n\nBE\n\n\t\n\n-8.0\n\n\n\n\nCOHb\n\n\t\n\n1.8%\n\n\n\n\nMetHb\n\n\t\n\n40.6%\n\n\n\n\nLactate\n\n\t\n\n9.6mmol/L\n\n\n\n\nSO2%\n\n\t\n\n85%\n\n\n\n\nHb\n\n\t\n\n104g/L\n\n\n\n\nBlood: chocolate brown colour\n\n \n\nWhat is the diagnosis and management of this patient?", "a": "QL10):  Answer:\n\nDiagnosis:  Metoclopramide induced-methaemoglobinaemia\n\nMethaemoglobinaemia is the presence of a significant amount of oxidised iron (Fe3+, met-Hb) within haemoglobin (Hb) in the blood.  The oxidised iron stops haemoglobin from binding oxygen. \n\nAlthough rare, it has a wide number of potential causes including: congenital abnormal Hb, enzyme deficiency (e.g G6PD deficiency), chemicals (e.g. phenols, arsine, toluidine), drugs (e.g metoclopramide, acetaminophen metabolites, nitric oxide, paraquat, phenytoin, methylene blue (high doses), chloroquine), food (e.g. Fava beans), local anaesthetics (e.g. bupivacaine, lidocaine, prilocaine), nitrates (e.g. nitroprusside). \n\nNormally met-Hb is <1% as Fe3+ is metabolised via cytochrome b5-reductase pathway to Fe2+.  Clinically only 1.5g/dl (10-15%) of met-Hb is needed to produce cyanosis.  Levels up to 70% can be tolerated if compensatory mechanisms have been developed or amount of haemoglobin is adequate. \n\nMet-Hb levels 20-50% cause headache, confusion and chest pain.  Met-Hb may be acquired in critically ill patients and can be easily missed.  \n\nThe pulse oximetry spectrum of Met-Hb overlaps with oxyhaemoglobin (660 and 910nm) so cannot be measured using pulse oximetry.  In the presence of Met-Hb, pulse oximetry O2 saturation will fall by one half of the Met-Hb concentration, when the Met-Hb concentration is between 3 and 20%.  For example, if O2 Saturations read 98% in presence of Met-Hb of 10%, pulse oximetry will fall to 93% (98-5).  When levels of Met-Hb >30% the pulse oximetry tends to plateau around 85% irrespective of PaO2 or Met-Hb%. \n\nDefinite measurement of Met-Hb requires oximetry measurement. \n\nManagement involves removal of triggering agent (if possible) and administration of Methylene blue 1-2mg/kg for 5 min.  Methylene blue may reduce Met-Hb levels quickly, as the dye acts to transport an electron from NADPH to haemoglobin.  Methylene blue is contraindicated in patients with G6PD deficiency as this can cause a severe haemolytic reaction. \n\n \n\nReferences:\n\nGiangreco GJ, Campbell D, Cowan M", "imgs": [], "cat": "ABG"}, {"q": "QL11):  You are called to A&E resus to assess a 55yr old man who has had an out of hospital cardiac arrest.  Paramedics had found him collapsed with an initial rhythm of ventricular tachycardia.  Brief CPR had been undertaken with 1x DC shock resulting in successful return of circulation.  He remains GCS 3/15 but is spontaneously breathing.  His past medical history includes schizophrenia which he takes quetiapine to control.\n\nComment on his admission ECG?\n\nHow would you manage this condition?", "a": "QL11):  Answer:\n\nThe ECG shows an extremely prolonged QTc of 752ms = Long QT Syndrome (LQTS).  Rate is 60/min with sinus rhythm.  Ventricular ectopics / non-sustained torsade de pointe can be seen in V1-V3.  Normal QTc is less than 440ms.  Quetiapine may be the cause of this patient\u2019s prolonged QT interval and likely ventricular dysrhythmia causing arrest.\n\nLQTS is a disorder of myocardial electrical conduction that results impaired ventricular conduction. It is caused by malfunction of cardiac ion channels impairing ventricular repolarisation. This predisposes to the development of polymorphic tachycardia torsade de pointes, which can degenerate to ventricular fibrillation.\n\nDiagnosis:\n\nQT interval: is the time between start of the Q wave to end of the T wave.  This represents ventricular depolarisation and repolarisation.  The QT interval varies with heart rate, increasing with bradycardia and decreasing with tachycardia\n\nThe QT interval is corrected for heart rate (Bazett's formula).  [QTc) =  QT/ \u221aRR]  (where RR is the interval between R waves).  Normal QT is 0.3 sec to 0.44 sec, QTc > 0.44 sec is considered prolonged.\n\nAcute management of prolonged QTc includes:\n\nABC management / resuscitation\n\nAvoidance of drug causing LQTS\n\nMaintenance of normocarbia, normothermia, correction of electrolyte imbalance (K+, Mg2+) and acidosis\n\nManagement of any associated neurological injury (e.g. Subarachnoid Haemorrhage)\n\nIf ECG deteriorates to Torsade de pointes:\n\nMgSO4: acts by effectively suppressing amplitude of early after depolarisation (EADs) and blocking calcium inflow. 2g IV over 2-3 min, then infusion 3-20mg/min; is effective in preventing Torsade recurrence.\n\nSerum K should be maintained above 4.5 mmol/L\n\nTransvenous pacing may be required to accelerate heart rate and shorten QT\n\n \n\nReferences:\n\nHunter JD, Sharma P, Rathi S.  Long QT syndrome.  Continuing Education in Anaesthesia, Critical Care and Pain.  2008; 8(2):67-70.", "imgs": [], "cat": "ECG"}, {"q": "QL12):  A 52yr old presents to a remote country A&E with acute chest pain which started 4hrs ago.  The nearest PCI centre is over 3hrs away. \n\nWhat does this ECG show?\n\nWhat acute management would you instigate?", "a": "QL12):  Answer:\n\nAn acute Anterolateral ST-elevation myocardial infarction (STEMI) with inferior ischaemia (ST-depression) is evident on ECG.\n\nAcute management with thrombolysis:\n\nABC resuscitation / CPR if required\n\nAdministration of oxygen (particularly if oxygen saturations <95%)\n\nMorphine or other injectable opiate for acute pain\n\nNitrate (GTN spray / sublingual tablet / infusion for acute intractable pain)\n\nAspirin 300mg (PO/iv) and Ticagrelor 180mg loading, 90mg BD maintenance PO. \n\n \n\nPrasugrel (60mg loading, 10mg OD maintenance) can be given instead of ticagrelor if clopidogrel-naive patients with no history of cerebrovascular disease.  Clopidogrel (300mg loading, 75mg OD maintenance)  can be given if neither agents are available.  Ticagrelor and prasugrel have a more rapid onset of action and greater potency with proven superiority in trials when compared clopidogrel.\n\nIf percutaneous coronary intervention (PCI) cannot be undertaken within 120min of first medical contact, then the patient requires urgent thrombolysis (ideally within 30mins of first medical contact).  A fibrin-specific agent is recommended (over non-fibrin specific agents):\n\nTenecteplase (single i.v. bolus: 30 mg if <60 kg, 35 mg if 60 to <70 kg, 40 mg if 70 to <80 kg, 45 mg if 80 to <90 kg, 50 mg if \u226590 kg,\n\nAlteplase (15 mg i.v. bolus 0.75 mg/kg over 30 min (up to 50 mg) then 0.5 mg/kg over 60 min i.v. (up to 35 mg)\n\nReteplase (10 units + 10 units i.v. bolus given 30 min apart)\n\nStreptokinase (1.5 million units over 30\u201360min i.v).\n\nDual antiplatelet therapy is indicated and must be given.  Aspirin (150-500mg orally or 250mg iv) and adenosine diphosphate (ADP) receptor blocker: ticagrelor or prasugrel or clopidogrel if neither of the other two agents are available.\n\nAnticoagulation is recommended in STEMI patients treated with lytics until revascularization (if performed) or for the duration of hospital stay up to 8 days.\n\nThe anticoagulant can be:\n\nUnfractionated heparin (60 U/kg i.v. bolus with a maximum of 4000 U followed by an i.v. infusion of 12 U/kg with a maximum of 1000 U/h for 24\u201348 h.  Target aPTT: 50\u201370 s or 1.5 to 2.0 times that of control to be monitored at 3, 6, 12 and 24 h).\n\nEnoxaparin (In patients <75 years of age: 30 mg i.v. bolus followed 15 min later by 1 mg/kg s.c. every 12 h until hospital discharge for a maximum of 8 days The first two doses should not exceed 100 mg.  In patients >75 years of age:  no i.v. bolus; start with first s.c. dose of 0.75 mg/kg with a maximum of 75 mg for the first two s.c. doses.  In patients with creatinine clearance of <30 mL/min, regardless of age, th", "imgs": [], "cat": "ECG"}, {"q": "QL13): A 58yr old patient presents with acute chest pain.\n\nWhat does the ECG show?\n\nWhat would be your acute management?", "a": "QL13):  Answer:\n\nThe ECG shows acute ST-elevation in leads V1-V4.  Possible lateral ischaemia V5-V6, I and AVL with ST depression and T-wave inversion AVL. \n\nECG consistent with Anterior STEMI with lateral ischaemia.\n\nAcute management would include:\n\nABC resuscitation / CPR if required\n\nAdministration of oxygen (particularly if oxygen saturations <95%)\n\nMorphine or other injectable opiate for acute pain\n\nNitrate (GTN spray / sublingual tablet / infusion for acute intractable pain)\n\nConsideration for urgent percutaneous coronary intervention (PCI) within 12hrs of chest pain onset or thrombolysis if PCI not possible within first 120mins of first medical contact.\n\nDual antiplatelet therapy should be started as early as possible before angiography.  Aspirin (150-300mg) and adenosine diphosphate (ADP) receptor blocker (Prasugrel [60 mg PO loading dose, 10 mg maintenance dose] or Ticagrelor [180 mg PO loading dose, 90 mg maintenance dose BD]; these drugs have a more rapid onset of action and greater potency and have proved superior to clopidogrel in large outcome trials.\n\nInjectable anticoagulant must be used during PCI: Bivalirudin (with use of GP IIb/IIIa blocker restricted to rescue) is recommended over unfractionated heparin and GP IIb/IIIa blocker.  Enoxaparin is preferred over unfractionated heparin.\n\n \n\nReferences:\n\nEuropean Society of Cardiology Task Force.  ESC Guidelines for the management of acute myocardial infarction in patients presenting with ST-segment elevation.  The Task Force on the management of ST-segment elevation acute myocardial infarction of the European Society of Cardiology (ESC).  European Heart Journal (2012) 33, 2569\u20132619\n\ndoi:10.1093/eurheartj/ehs215", "imgs": [], "cat": "ECG"}, {"q": "QL14:  An 80yr old woman was hospitalised with acute dyspnoea.  Her past medical history consisted of mild congestive cardiac failure, hypertension and atrial fibrillation.  Despite hypoxia, no haemodynamic instability was seen.  CT-Pulmonary angiogram revealed a unilateral pulmonary embolus.  A heparin infusion was started with non-invasive ventilation for respiratory failure on the high dependency unit.\n\nBy day 6, the patient had improved, but complained of pain in her feet.  On examination cyanosis of both feet with loss of pulses was evident.  Doppler ultrasound revealed bilateral lower limb venous thrombosis and arterial thrombosis in the tibial arteries despite being on heparin.  Her bloods were as follows:\n\nAdmission bloods:\n\n \n\nFull blood count\n\n\t\n\n92g/l\n\n\t\n\npH\n\n\t\n\n7.46\n\n\n\n\nWhite cell count\n\n\t\n\n8.0 x 109/L\n\n\t\n\nPaO2\n\n\t\n\n7.6kPa Room air\n\n\n\n\nPlatelets\n\n\t\n\n153 x 109/L\n\n\t\n\nPaCO2\n\n\t\n\n4.86kPa\n\n\n\n\nMCV\n\n\t\n\n82fl\n\n\t\n\nHCO3\n\n\t\n\n27.3mmol/L\n\n\n\n\nUrea\n\n\t\n\n13.0mmol/L\n\n\t\n\nPT\n\n\t\n\n11.2s\n\n\n\n\nCreatinine\n\n\t\n\n85\u03bcmol/L\n\n\t\n\nAPTT\n\n\t\n\n35s\n\n\n\n\nC-Reactive Protein (CRP)\n\n\t\n\n94mg/L\n\n\t\n\nFib\n\n\t\n\n4.3g/L\n\n\n\n\nNa+\n\n\t\n\n142mmol/L\n\n\t\n\nK+\n\n\t\n\n4.2mmol/L\n\nDay 6:\n\nFull blood count\n\n\t\n\n87g/l\n\n\t\n\npH\n\n\t\n\n7.40\n\n\n\n\nWhite cell count\n\n\t\n\n5.5 x 109/L\n\n\t\n\nPaO2\n\n\t\n\n12.2kPa on 28% FiO2\n\n\n\n\nPlatelets\n\n\t\n\n28 x 109/L\n\n\t\n\nPaCO2\n\n\t\n\n4.20kPa\n\n\n\n\nMCV\n\n\t\n\n80fl\n\n\t\n\nHCO3\n\n\t\n\n24.7mmol/L\n\n\n\n\nUrea\n\n\t\n\n12.0mmol/L\n\n\t\n\nPT\n\n\t\n\n13.2s\n\n\n\n\nCreatinine\n\n\t\n\n85\u03bcmol/L\n\n\t\n\nAPTT / APTTR\n\n\t\n\n44s / 2.5\n\n\n\n\nC-Reactive Protein (CRP)\n\n\t\n\n15mg/L\n\n\t\n\nFib\n\n\t\n\n1.6g/L\n\n\n\n\nNa+\n\n\t\n\n137mmol/L\n\n\t\n\nK+\n\n\t\n\n3.4mmol/L\n\n \n\n \n\n\n\n\nComment on the blood results?\n\n \n\nWhat is your differential diagnosis and most likely diagnosis? \n\n \n\nWhat is your management of this condition?", "a": "QL14):  Answer:\n\nMarked thrombocytopaenia is evident (platelet fall from 153 to 28x 109/L.  Patient has a microcytic anaemia.  Improved hypoxaemia since admission.\n\nDifferential diagnosis includes:\n\nA thrombotic Embolic event (AF) could account for arterial thrombosis \u2013 but difficult to explain the deep vein thrombosis.  Unlikely in view of being on heparin infusion if used in therapeutic APTR range.\n\nDevelopment of disseminated intravascular coagulation with the fall in fibrinogen \u2013 ?cause of thrombosis\n\nThrombocytopaenia \u2013 due to sepsis, drug related, heparin induced, other.\n\nThe most likely diagnosis: Heparin-induced Thrombocytopaenia (HIT)  (type 2)\n\n \n\nHeparin Induced Thrombocytopaenia (HIT):\n\n2 types: Type I (non-immune) / Type 2 (immune)\n\nType 2 is rare but life-threatening syndrome that may occur after exposure to unfractionated heparin (10x higher) or more rarely low-molecular weight heparin. \n\nMay occur even after exposure to flush heparin\n\nOften occurs late (days 5-10) where the platelets fall by 50% or below 50x109/L. \n\nAssociated with thrombosis (75% cases) and/or skin necr", "imgs": [], "cat": "ABG"}, {"q": "QL15):  A patient developed acute thrombocytopaenia five days following acute critical admission with acute renal failure.  On clinical examination, the patient was receiving renal replacement therapy in the form of CVVH (continuous veno-venous haemofiltration) with heparin for circuit anticoagulation.  She was also noted to have a swollen left calf (possible deep vein thrombosis) and erythematous skin lesions over her chest and abdomen.  Heparin-induced thrombocytopaenia (HIT) was suspected.\n\n\n\n\nAdmission Platelets:    240 x109/L\n\nDay 5 Platelets:           35 x 109/L\n\n\n\n\nHow can you estimate the pre-test probability of HIT?\n\nWhat is this patient\u2019s pre-test score?\n\nWhat assays are done to investigate heparin induced thrombocytopaenia?", "a": "QL15):  Answer:\n\nThe pre-test probability of HIT can be calculated using the 4 T\u2019s Score:\n\n\n\n\nCategory:\n\n\t\n\n2 Points\n\n\t\n\n1 Point\n\n\t\n\n0 Points\n\n\n\n\nThrombocytopaenia\n\n\t\n\n>50% fall or nadir >20x109/L\n\n\t\n\n30-50% fall or nadir 10-19x\n\n\t\n\n<30% fall or nadir <10x109/L\n\n\n\n\nTiming of platelets fall\n\n\t\n\nHeparin exposure 5-10 days before platelets drop (or <1 day if exposed to heparin in the last 30 days)\n\n\t\n\n>10 days since heparin or uncertain timing (or <1 day if exposed to heparin in the last 30-100 days)\n\n\t\n\n<4 days since heparin exposure and NO recent, previous exposure to heparin\n\n\n\n\nThrombosis or other signs / symptoms\n\n\t\n\nIdentified thrombosis, skin necrosis, or acute systemic reactions after administration of heparin\n\n\t\n\nWorsening, recurrent or silent thrombosis, and/or skin lesions\n\n\t\n\nNone\n\n\n\n\nOther potential causes of Thrombocytopaenia\n\n\t\n\nNone identified\n\n\t\n\nPossible\n\n\t\n\nDefinite\n\n \n\nScore 0 to 3: Low pre-test probability (<5%)\n\nScore 4 to 5: Intermediate pre-test probability (10-30%)\n\nScore 6 to 8: High pre-test probability (20-80%)\n\n \n\n \n\n \n\nThe pre-test probability for this patient would be: score 6 (high test probability \u2013 therefore to undergo formal HIT screening)\n\n \n\n2 points for thrombocytopaenia: fall in platelets to 35 x 109/L\n\n \n\n2 points for timing: 5 days\n\n \n\n1 point for thrombosis: suspected deep vein thrombosis and associated skin lesions (no necrosis)\n\n \n\n1 point for other causes of thrombocytopaenia: could be caused by blood loss, being on CVVH alone, sepsis.\n\n \n\n \n\nAssays done are dependent on local resources and policy.  They may include:\n\n \n\nSerological Assay:  detect circulating IgG, IgA and IgM antibodies.\n\nFunctional Assays:  measure platelet activation and detect heparin-dependent antibodies capable of binding to and activating the Fc receptors on platelets: heparin induced platelet activation test, serotonin-14C release assay or solid-phase PF4/Heparin Enzyme immunoassay\n\n \n\nReferences:\n\n \n\nSakr Y.  Heparin induced thrombocytopaenia in the ICU: an overview.  Critical Care 2011, 15:211.  http://ccforum.com/content/15/2/211", "imgs": [], "cat": "Biochemistry"}, {"q": "QL16):  A 34yr old woman was run over by a truck.  On admission to the emergency department she was alert but in severe pain.  Paramedics had put on a pelvic binder prior to transfer.\n\nWhat major injury is identified on the trauma CT reconstruction?\n\nDescribe your management and potential complications?", "a": "QL16):  Answer:\n\nTrauma CT reconstruction shows a complex pelvic fracture with significant disruption of the pubic rami.  The whole pelvis and sacrum is involved with numerous fractures.\n\nManagement:\n\nManagement of pelvic trauma is controversial with the EAST (Eastern American Society for Trauma) and Magnone et al. (Italian consensus) providing most up to date guidance.  See references below.\n\nABC management / Fluid and blood product resuscitation and replacement\n\nPelvic binder and focused assessment sonography for trauma (FAST) important\n\nUse of external fixation, preperitoneal pelvic packing, laparotomy\n\nInterventional angiography and embolisation\n\n \n\nReferences:\n\nJR Calc.  (2009).  Major Pelvic Trauma. http://www.jrcalc.org.uk/newjrcalcguidance/pelvic_trauma_final210409.pdf\n\nMagnone S, Coccolini F, et al.  Management of hemodynamically unstable pelvic trauma: results of the first Italian Conference.  World Journal of Emergency Surgery.  2014.   http://www.wjes.org/content/pdf/1749-7922-9-18.pdf\n\nCullinane DC, Schiller HJ, et al.  Eastern Association for the Surgery of Trauma Practice Management Guidelines for Hemorrhage in Pelivc fracture \u2013 Update and Systematic Review.  The Journal of TRAUMA Injury, Infection, and Critical Care.  2010; 71(6):1850-1868.  https://www.east.org/resources/treatment-guidelines/pelvic-fracture-hemorrhage%E2%80%94update-and-systematic-review", "imgs": [], "cat": "Biochemistry"}, {"q": "QL17):  The following CT was undertaken following an assault.\n\nDescribe the findings?", "a": "QL17):  Answer:\n\nA left upper traumatic pneumothorax is evident on CT.  A chest drain is required.", "imgs": [], "cat": "X-Ray"}, {"q": "QL18):  A patient attends the A&E department after an assault. \n\n \n\nDescribe the findings on CT?", "a": "QL18):  Answer:\n\nBilateral Pneumothoracies are evident on sagittal CT.", "imgs": [], "cat": "Clinical"}, {"q": "QL19):  Comment on this post-operative chest X-ray:", "a": "QL19):  Answer:  Endobronchial nasogastric tube\n\nThis patient is intubated with endotracheal tube seen above the carina. \n\nThe main complication is the presence of the naso-gastric tube in the left main bronchus.  Feeding via a nasogastric tube that is within the lung is a \u2018never-event\u2019.  Intensivists need to be vigilant at preventing such a complication which is associated with significant morbidity and mortality.  \n\nBilateral pneumonia is evident.  A left internal jugular vasc-cath and right internal jugular central venous access line are present.", "imgs": [], "cat": "X-Ray"}, {"q": "QL20):  List the hardware seen on this CXR and comment on chest pathology?", "a": "QL20):  Answer:\n\nThis patient has a significant right sided empyema, which has not resolved despite a right sided pig-tail drain.  It is likely that this drain needs to be upgraded to a larger surgical chest drain +/- video-assisted thoracoscopic surgery for washout of persistent empyema.\n\nHardware includes:  right pig-tail chest drain, NG tube insitu with the remainder of external NG tube lying unhelpfully over left chest, Left PICC line for long-term antibiotics, tracheostomy tube, ECG clips.", "imgs": [], "cat": "ECG"}, {"q": "QL21):  Describe this airway device?  In what patients would this device be considered?", "a": "QL21):  Answer:\n\nThis device is an uncuffed, size 3.0 (internal diameter, mm) endotracheal tube.\n\n\nThis size of endotracheal tube would be suitable for preterm neonates (weight 2-4kg).\n\nA rough guide for sizing endotracheal tubes in neonates/paediatrics:\n\nIf the infant weight is <2kg a size 2.5 endotracheal tube (ETT) would be suitable. \n\n2-4kg a size 3.0mm ETT\n\nTerm neonate 3.5mm ETT\n\n3months-1yr 4.0mmETT\n\nOver 2yrs the formula: ETT size = (age/4)+4 is often used.", "imgs": [], "cat": "Equipment"}, {"q": "QL22):  A 75yr old woman presents with acute abdominal pain.  On examination she is obtunded and peritonitic.  An erect chest X-ray was undertaken:\n\n \n\nDescribe the CXR.  What is your diagnosis and subsequent management?", "a": "QL22):  Answer:\n\nThis erect CXR shows significant air under the diaphragm bilaterally, consistent with an acute bowel perforation.  This patient requires resuscitation, stabilisation and if appropriate immediate surgical intervention / laparotomy.", "imgs": [], "cat": "X-Ray"}, {"q": "QL23):  A 35yr old man is brought into the emergency department after a road traffic collision.  He is cerebrally irritated requiring immediate RSI.  What does his CT scan show?", "a": "QL23):  Answer:\n\nThis CT scan shows an acute right sided subdural haematoma with significant right intracranial haemorrhage.  There is some associated midline shift to the left with compression of the right lateral ventricle.", "imgs": [], "cat": "CT"}, {"q": "QL24):  A 76yr old man presents with increasing confusion following recurrent falls. \n\nWhat does the CT scan show?", "a": "QL24):  Answer:\n\nThe CT scan shows bilateral old subdural haematomas with acute hydrocephalus.  This patient, if appropriate, may require an extraventricular drain (EVD) siting to relieve the hydrocephalus.  The subdural haematomas may be treated conservatively or if they are causing significant neurological compromise, they may require surgical evacuation.", "imgs": [], "cat": "ECG"}, {"q": "QL27):  A 41yr old patient presents to A&E with increasing dizziness and abnormal gait.  An MRI was subsequently done.  What does the MRI scan show?", "a": "QL27):  Answer:\n\n \n\nA cerebellar tumour is evident on MRI sagittal view.", "imgs": [], "cat": "MRI"}, {"q": "QL28):  Comment on this ECG rhythm strip:", "a": "QL28):  Answer:\n\nThis ECG rhythm strip shows:  sinus rhythm, heart rate about 60 beats per minute.  Prolonged PR interval evident, which is suggestive of first degree heart block.", "imgs": [], "cat": "ECG"}, {"q": "QL29):  Describe the issue on this chest X-ray? \n\nHow would you manage this problem?", "a": "QL29):  Answer: \n\nKnotted pulmonary artery catheter (PAC)\n\nManagement:\n\nPrevention: firstly when inserting a PA catheter if a change in waveform does not occur at 10cm intervals after the RA has been entered, then caution is advised in continuing to advance the catheter blindly.  Consider using ultrasound or fluoroscopy to guide insertion if available.\n\nInterventional radiological techniques are often the first choice for removal of knotted catheters.  Surgical open extraction is reserved for difficult cases or where intracardiac fixing of the knot is encountered.", "imgs": [], "cat": "X-Ray"}, {"q": "QL30):  What does this head CT scan show? \n\nHow would you undertake brainstem death testing?", "a": "QL30):  Answer: \n\nCT Head with loss of grey/white differentiation consistent with brain death and cerebellar herniation.\n\n\nBrain-stem death testing according to Academy of Medical Royal Colleges (UK):\n\nTesting for brainstem death is to be made by two doctors who have been registered for more than five years and are competent in the procedure.  At least one should be a consultant.  Testing should be undertaken by the doctors together and must always be performed completely and successfully on two occasions in total.\n\nBoth doctors need to be satisfied that the patient suffers from a condition that has led to irreversible brain damage and that potentially reversible causes for the patient\u2019s condition have been adequately excluded (preconditions), such as depressant drugs, neuromuscular blocking drugs, hypothermia and metabolic or endocrine disturbances.\n\nTwo sets of test are undertaken in total.  If brainstem death is confirmed after the first set of tests, this is the time recorded as time of death.\n\nBrain-stem death testing assesses absence of:\n\nPupil reaction to light / Corneal reflexes / Lack of evidence of eye movement on caloric testing\nAbsence of motor response in the cranial nerve distribution in response to stimulation of the face, limbs or trunk\nAbsence of gag reflex and cough reflex\nAbsence of any respiratory movements on apnoea testing (PaCO2 >6.5kPa)\n\n\n\n\nReferences:\n\nhttp://www.bts.org.uk/Documents/A%20CODE%20OF%20PRACTICE%20FOR%20THE%20DIAGNOSIS%20AND%20CONFIRMATION%20OF%20DEATH.pdf", "imgs": [], "cat": "ABG"}, {"q": "QL31):  A 38yr old patient presents with persistent headache, fatigue and fever.  Her past medical history includes craniotomy for astrocytoma 10yrs previously.   A chest-Xray is undertaken as part of her work up.  Describe the CXR:", "a": "QL31):  Answer:  A ventriculoparietal (VP) shunt is evident overlying the left lung field.  Her CXR is otherwise clear.  Following craniotomy in the past for astrocytoma, the patient developed hydrocephalus and required the insertion of a VP shunt.  On further investigation the VP shunt was deemed to be blocked on this occasion, requiring surgical revision.", "imgs": [], "cat": "X-Ray"}, {"q": "QL32):  A 56yr old was found in cardiac arrest following a fall.  CPR by paramedics was successful with return of spontaneous circulation.  Despite this, GCS remained 3/15 with no respiratory effort seen.  Trauma CT series was undertaken. \n\nWhat injuries can be seen on neck CT?", "a": "QL32):  Answer:  C1-C2 Fracture dislocation with displacement into the spinal canal / cord.  The patient is intubated.  C6 vertebral disruption is also evident.\n\nThis patient has sustained a significant high cervical spine injury and if they survive their cardiac arrest, quadriplegia with ventilator dependence is a significant possibility.", "imgs": [], "cat": "Clinical"}, {"q": "QL33):  A cystic fibrosis patient presented with severe respiratory failure. \n\nComment on their CXR below.\n\nWhat organism may be responsible for this CXR appearance in this group of patients?", "a": "QL33): Answer:  \n\nThe CXR shows acute severe bilateral pneumonia.  A left sited portacath for longterm antibiotics is in-situ. \n\nThis cystic fibrosis patient was infected with Burkholderia cepacia, a group of gram-ve negative bacteria.  It is often a cause of pneumonia in immunocompromised individuals with underlying lung disease such as cystic fibrosis.  Infection control precautions are paramount as the bacteria is very difficult to eradicate and can easily be spread between person to person.  Burkholderia infection can cause rapid decline in lung function and ultimately death.  Treatment is difficult and involves supportive therapy (often NIV) and multiple antibiotic regimens.", "imgs": [], "cat": "Clinical"}, {"q": "QL34):  A 57yr old previously fit and well man was admitted under the medical team with worsening jaundice and general fatigue.  A CT scan was undertaken as the diagnosis was unclear. \n\nWhat does his CT scan show? \n\nWhat management options would you consider?", "a": "QL34): Answer:  The CT scan of the chest shows a large pericardial effusion and bilateral pleural effusions.\n\nManagement:\n\nUrgent cardiology review /cardiothoracic review.  Pericardial effusion in this case is likely to be causing a degree of heart failure / tamponade.   Liver engorgement due to heart failure maybe the cause of jaundice in this case or it may be related to the cause of pericarditis e.g. viral infection.\n\nConsideration for pericardiocentesis and pleural effusion drainage is required urgently.\n\nAetiology is unclear -> further are investigations required\n\nPossible causes of pericardial effusion include:  pericarditis caused by viral infections (CMV, coxsackieviruses, echoviruses and HIV).  Malignancy.  Injury to pericardium or heart from medical procedure.  Myocardial infarction.  Uraemia secondary to severe renal failure.  Autoimmune disease (lupus, rheumatoid arthritis).  Bacterial infections (e.g. tuberculosis).  Idiopathic pericardial effusions\n\nSymptoms of pericardial effusion caused by pericarditis include:  fever, fatigue, muscle aches, shortness of breath, nausea, vomiting.  Often no symptoms of pericardial effusion are present if pericarditis is absent.  Large pericardial effusions cause shortness of breath, palpitations, light-headedness, syncope, cool and clammy skin\n\nPericarditis treatment:  non-steroidal anti-inflammatories, corticosteroids and colchicine.\n\nFor urgent drainage:  pericardiocentesis or pericardiectomy\n\n\n\n\nReferences:\n\nStrimel WJ, Fredi JL, et al.  Pericardial Effusion.  Medscape.  2014.  http://emedicine.medscape.com/article/157325-overview", "imgs": [], "cat": "X-Ray"}, {"q": "QL35):  This patient presented to accident and emergency following a road-traffic collision.  Despite their neck being immobilised with a cervical collar they complained of significant neck pain. \n\nDescribe the CT neck:", "a": "QL35):  Answer:  C2 Peg fracture\n\nFrom this scan alone, it is difficult to comment on the entire cervical spine.  However, on assessment of C1-C2 level there is a C2 Peg fracture.", "imgs": [], "cat": "Clinical"}, {"q": "QL36): You are called urgently to the medical ward to assess a patient who has suffered a seizure.  Prior to the seizure, nursing staff report that the patient had been admitted within the last 24hrs with increasing confusion, nausea and vomiting.  Due to low conscious level the patient was immediately intubated and ventilated and transferred to the ICU.  The patient\u2019s serum sodium was 112mmol/L.\n\nHow may hyponatraemia be defined according to the ESICM 2014 guidance?\n\nDescribe your management of this acute case?\n\n How would management differ if this hyponatraemia was longstanding / chronic?", "a": "QL36):  Answer:\n\nHyponatraemia is defined as a serum sodium concentration <135 mmol/L.  Hyponatraemia is present in up to 20% of critically ill patients admitted to hospital.  Clinical presentation can vary from subtle to severe or even life threatening.\n\nHyponatraemia is defined by the European Society of Intensive Care Medicine (ESICM) 2014 into 3 groups: mild (130-135 mmol/L), moderate (125-129 mmol/L) and profound (<125 mmol/L). \n\nIt is also defined as \u2018acute\u2019 if the hyponatraemia is documented to exist <48 hours.  If the hyponatraemia cannot be classified is considered to be \u2018chronic\u2019, unless there is evidence to the contrary.\n\nHyponatraemia is also classified according to symptoms: Moderately severe symptoms of hyponatremia include: nausea without vomiting, confusion and headache.  Severe symptoms include vomiting, cardiorespiratory disease, abnormal or deep somnolence, seizures and coma (GCS less than or equal to 8). These symptoms may overlap limiting use of this classification.\n\nClassification can also be based on serum osmolality.  A measured serum osmolality <275 mOsm/kg always indicates hypotonic hyponatraemia, as effective osmolality can never be higher than total or measured osmolality. \n\n \n\nBrain oedema occurs more frequently when hyponatraemia develops in less than 48 hours, as the brain needs time to adapt to a hypotonic environment, achieved by extruding sodium, potassium, chloride and organic osmoles from its cells.  Before adaptation, there is a risk of brain oedema, because the lower extracellular osmolality promotes a shift of water into the cells.  After adaptation, brain cells can sustain damage if the serum sodium concentration increases too rapidly due to breakdown of the myelin sheaths insulating individual neurons causing the osmotic demyelination syndrome.  Distinguishing between acute and chronic hyponatraemia is important when assessing risk of brain oedema and osmotic demyelination syndrome.  Chronic hyponatraemia is much more common than acute hyponatraemia, so if hyponatraemia cannot be classified the ESICM consider the hyponatraemia to being chronic.\n\n \n\nVolume status: patients with hyponatraemia may be hypovolaemic, euvolaemic or hypervolaemic.  Determining volume", "imgs": [], "cat": "Biochemistry"}, {"q": "QL37:  A 30yr old patient presented with blurred vision and severe headache.  A head CT scan was undertaken as part of the emergency work-up. \n\nComment on the first CT scan and subsequent angiogram.\n\n \n\n \n\n\n\n\nWhilst on the ward, the patient suddenly dropped their conscious level, requiring emergency resuscitation and intubation / ventilation.  A repeat CT scan was undertaken.\n\n \n\nWhat does this 2nd CT scan show?", "a": "QL37)  Answer: \n\nOn the initial contrast CT head, a basilar artery aneurysm is identified.  The angiogram confirms the presence of a right sided basilar artery aneurysm.\n\nFollowing patient deterioration on the ward, a repeat contrast CT head shows that the basilar artery aneurysm has unfortunately ruptured, with intracranial blood and evidence of raised intracranial pressure.  Urgent neurosurgical / radiological intervention is required.", "imgs": [], "cat": "CT"}, {"q": "QL38):  This patient presented with an acute abdominal pain and agitation whilst in police custody.  He had recently returned from Thailand.\n\nComment on the CT findings:", "a": "QL38):  Answer:\n\nOn CT scan a large number of tablets are visible in the patient\u2019s rectum / sigmoid.  It is likely that the patient is a \u2018drug mule\u2019 or \u2018body-packer\u2019 where drugs are smuggled in body cavities.  Massive drug over-dose and other complications can occur if concealed drugs get into the systemic circulation e.g. if the drug container leaks.  The acute abdomen and agitated presentation in this patient is suspicious that this may be a complication of smuggled drugs.", "imgs": [], "cat": "CT"}, {"q": "QL39):  Comment on this chest X-ray:  \n\n\n\n\n\n\n\nThe patient was on 100% FiO2 via a Hudson non-rebreathe mask.  Blood gases showed a PaO2 8.0kPa and PaCO2 6.7kPa. \n\nHow would you classify acute respiratory distress syndrome (ARDS)?", "a": "QL39) Answer:\n\nThe chest X-ray shows:\n\nMarked bilateral opacities R>L\n\nNot currently intubated\n\nHickman line Porta-cath evident in right subclavian vein\n\n\n\n\nFor diagnosis, the timing of ARDS must occur within 1 week of a known clinical insult and new or worsening respiratory symptoms.  The Berlin definition classifies ARDS according to the PaO2/FiO2 ratio: mild (PF ratio <39.9kPa or 300mmHg) with positive end-expiratory pressure (CPAP) >5cmH2O, moderate (PF ratio <26.6kPa or 200mmHg) with PEEP >5cmH2O and severe (PF ratio <13.3kPa or 100mmHg) with PEEP .5cmH2O.\n\n \n\nReferences:\n\nThe ARDS Definition Task Force.  Acute Respiratory Distress Syndrome.  The Berlin Definition.  JAMA.  2012; 307(23):2526-2533", "imgs": [], "cat": "ABG"}, {"q": "QL40):  A patient presented after being struck in the head with a cricket ball. \n\nWhat does the CT Head scan show?", "a": "QL40):  Answer: \n\nA right extra-dural haematoma is seen on CT.", "imgs": [], "cat": "Clinical"}, {"q": "QL41):  Comment on this MRI brain:", "a": "QL41):  Answer:  A right frontal well defined circumferential cavitating lesion is identified with surrounding oedema.  This lesion turned out to be a frontal brain abscess.", "imgs": [], "cat": "MRI"}, {"q": "QL42):  A 56 year old patient presents with increasing shortness of breath. \n\nList the abnormalities on this chest X-ray.", "a": "QL42):  Answer:\n\nThere is evidence of acute bilateral pneumonia: right middle lobe and left lower lobe.  The patient has had previous cardiac surgery with midline sternotomy wires evident.", "imgs": [], "cat": "X-Ray"}, {"q": "QL43):  You are asked to review the CXR of a 74 year old man on the general ICU.  He was initially admitted in acute respiratory failure following a myocardial infarction.\n\nComment on the CXR.", "a": "QL43):  Answer:\n\nThe patient is intubated and ventilated.  Marked opacities are evident bilaterally and consistent with acute pulmonary oedema.  NG tube is visible. \n\nThe patient is likely to be suffering from cardiogenic shock or acute heart failure following their initial myocardial infarction.", "imgs": [], "cat": "Clinical"}, {"q": "QL44):  Comment on this pelvic CT:", "a": "QL44):  Answer:\n\nThe CT scan shows a pelvic sarcoma invading into the sacrum", "imgs": [], "cat": "CT"}, {"q": "QL45): A 35 year old female who was 37 weeks pregnant (G1P0) presented to the A&E department, with a 15-day history of progressively increasing shortness of breath.   For the last 7 days she also complained of swelling in both her legs.  Clinically, her observations were: BP 180/110mmHg, HR 140/min irregular, respiratory rate 36/min, SaO2 96%.  On examination, the patient was pale.  JVP was raised.  On auscultation bilateral crepitations and S3 gallop were evident.\n\nComment on her CXR.\n\nWhat is the suspected diagnosis?\n\nWhat other investigations would you request?", "a": "QL45):  Answer\n\nThe CXR show bilateral shadowing consistent with acute pulmonary oedema.  Her heart appears large and is suspicious of cardiomegaly.\n\nIn view of clinical presentation and the fact that the patient is 37 weeks pregnant, peripartum cardiomyopathy is suspected and needs to be excluded.\n\nOther investigations would include:  urgent echocardiography.  Echo in this case demonstrated that the patient had an ejection fraction of 30% with mild generalised hypokinesia of the left ventricle, mild to moderate TR and mild MR, with signs of congestive cardiac failure. \n\nThe diagnosis in this case is peripartum cardiomyopathy with left ventricular failure.\n\nManagement:  peripartum cardiomyopathy is a diagnosis of exclusion and usually presents in similar way to patients with systolic heart failure.  It often manifests in the final trimester of pregnancy.  Management involves the use of diuretics, vasodilators, digoxin and anticoagulants (particularly in those with an EF <35%).  Delivery of the fetus often reduces the haemodynamic stresses on the heart.  The anaesthetic technique and timing of delivery needs to be a decision undertaken by a multi-disciplinary team, involving obstetricians, cardiologists, anaesthetists and midwives.    ACE inhibitors are considered the mainstay of treatment post-delivery.\n\nReferences:\n\nLata I, Gupta R, Sahu S, Singh H.  Emergency management of decompensated peripartum cardiomyopathy.  J Emerg Trauma Shock.  2009, 2(2):124-128.", "imgs": [], "cat": "ECG"}, {"q": "QL46):  A 52 year old man presented with a short history of increasing shortness of breath.  He had no past medical history of note. \n\nOn the ward his condition deteriorated and a CTPA was organised.\n\nComment on the CT chest:", "a": "QL46):  Answer:\n\nThe CTPA did not show an acute pulmonary embolus.  However, it did show bilateral pleural effusions and large anterior mediastinal mass.  Further investigations revealed lymphoma.", "imgs": [], "cat": "X-Ray"}, {"q": "QL47):  This is chest X-ray is from a patient on a cardiothoracic intensive care unit.\n\nComment on the X-ray:", "a": "QL47):  Answer\n\nThe CXR shows:\n\nThe patient is intubated.\n\nNG tube in the stomach\n\nRight IJV central line\n\nIntra-aortic balloon pump insitu \u2013 the patient is in cardiogenic shock\n\nOverlying ECG wires", "imgs": [], "cat": "ECG"}, {"q": "QL48):  A 25 year old man renal transplant patient presented with a month history of productive cough, weight loss and malaise.   The patient was on prednisone and tacrolimus.   A high resolution CT of his chest was undertaken. \n\nDescribe the CT findings and give a differential diagnosis:", "a": "QL48):  Answer:\n\nThe CT chest shows bilateral widespread effusions and consolidation\n\nDifferential diagnosis includes: \n\nPneumonia:  typical and atypical bacterial / viral causes\n\nTuberculosis\n\nAspergillosis\n\nSputum cultures and bronchoalveolar lavage from this patient grew Aspergillus fumigatus.    Aspergillus is a saprophytic aerobic fungus.  It produces airborne spores which may be inhaled.  Pulmonary aspergillosis occurs most commonly in patients who have underlying disease or immunosuppressed.  Clinical symptoms may take months to years to present.  They often include chronic cough, sputum production, fever and weight loss and malaise.  Radiological features often include multiple nodular opacities and areas of consolidation with or without cavitation or adjacent pleural thickening.  It usually occurs in the upper lobes.  Treatment is often with amphotericin B / itraconazole.  Other agents such as voriconazole, posaconazole and ravuconazole may be an alternative to Aspergillus species resistant to amphotericin.", "imgs": [], "cat": "X-Ray"}, {"q": "QL49):  Comment on this CXR:", "a": "QL49):  Answer:\n\nThe patient has been shot with a shot-gun as there is evidence of shot gun pellets in the right chest.\n\nA right chest drain is in-situ.", "imgs": [], "cat": "Clinical"}, {"q": "QL50):  Describe the main features on this chest-Xray:", "a": "QL50):  Answer\n\nOn CXR:  The patient has had a mitral and aortic valve replacement.  Right sided pleural effusion evident.", "imgs": [], "cat": "X-Ray"}];

var CATS = ['ABG','ECG','X-Ray','CT','Echo','Biochemistry','Haematology','MRI','Ultrasound','Waveforms','Equipment','Clinical'];
var CAT_COUNTS = {};
ALL_Q.forEach(function(q){ CAT_COUNTS[q.cat] = (CAT_COUNTS[q.cat]||0)+1; });

var selCats = new Set(CATS);
var mode = 'seq';
var queue = [], idx = 0, scores = {}, sessionScores = {};

function loadState(){
  try{
    var s = localStorage.getItem('ciq_scores'); if(s) scores = JSON.parse(s);
    var b = localStorage.getItem('ciq_best'); if(b) document.getElementById('best-disp').textContent = b+'%';
    document.getElementById('done-disp').textContent = Object.keys(scores).length;
  }catch(e){}
}
function saveState(){ try{ localStorage.setItem('ciq_scores', JSON.stringify(scores)); }catch(e){} }

function buildCatGrid(){
  var g = document.getElementById('cat-grid');
  g.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'cat-btn on all-btn';
  allBtn.textContent = 'All';
  allBtn.onclick = function(){
    selCats = new Set(CATS);
    document.querySelectorAll('.cat-btn:not(.all-btn)').forEach(function(b){ b.classList.add('on'); });
  };
  g.appendChild(allBtn);
  CATS.forEach(function(cat){
    var cnt = CAT_COUNTS[cat]||0; if(!cnt) return;
    var b = document.createElement('button');
    b.className = 'cat-btn on';
    b.textContent = cat + ' (' + cnt + ')';
    b.onclick = function(){
      if(selCats.has(cat)){ selCats.delete(cat); b.classList.remove('on'); }
      else { selCats.add(cat); b.classList.add('on'); }
    };
    g.appendChild(b);
  });
}

function setMode(m, el){
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
}

function startExam(){
  sessionScores = {};
  var pool = ALL_Q.map(function(_,i){ return i; }).filter(function(i){ return selCats.has(ALL_Q[i].cat); });
  if(mode === 'rand') pool = pool.sort(function(){ return Math.random()-.5; });
  else if(mode === 'wrong'){
    pool = pool.filter(function(i){ return scores[i] === false; });
    if(!pool.length) pool = ALL_Q.map(function(_,i){ return i; }).filter(function(i){ return selCats.has(ALL_Q[i].cat); });
  }
  queue = pool; idx = 0;
  document.getElementById('scr-start').style.display = 'none';
  document.getElementById('scr-q').style.display = 'block';
  loadQ();
}

function loadQ(){
  var qi = queue[idx];
  var q = ALL_Q[qi];
  document.getElementById('q-num-lbl').textContent = 'Q'+(idx+1)+' / '+queue.length;
  document.getElementById('prog-fill').style.width = ((idx/queue.length)*100)+'%';
  var tag = document.getElementById('q-cat-tag');
  tag.textContent = q.cat;
  tag.className = 'q-cat-tag tag-'+q.cat.replace(/[^a-zA-Z]/g,'');

  // Question images
  var viewer = document.getElementById('q-img-viewer');
  if(q.imgs && q.imgs.length){
    var qImgs = q.imgs.filter(function(s){ return s.includes('cloudfront') && !s.includes('answer') && !s.includes('Answer'); });
    if(!qImgs.length) qImgs = [q.imgs[0]];
    var html = '<img id="main-qimg" src="'+qImgs[0]+'" onclick="openLB(this.src)" onerror="this.parentElement.style.display='none'">';
    if(qImgs.length > 1){
      html += '<div class="img-thumbs">';
      qImgs.forEach(function(src, i){
        html += '<img class="img-thumb'+(i===0?' active':'')+'" src="'+src+'" onclick="switchQImg(this,''+src+'')">';
      });
      html += '</div>';
    }
    viewer.innerHTML = html;
    viewer.style.display = 'block';
  } else {
    viewer.innerHTML = '';
    viewer.style.display = 'none';
  }

  document.getElementById('q-body').innerHTML = formatQ(q.q);
  document.getElementById('a-body').textContent = q.a;
  document.getElementById('ans-img-wrap').innerHTML = '';
  document.getElementById('ans-img-wrap').style.display = 'none';
  document.getElementById('ans-box').classList.remove('show');
  document.getElementById('btn-reveal').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-fin').style.display = 'none';
  var sr = document.getElementById('self-row');
  sr.classList.remove('show');
  sr.innerHTML = '<span>Self-assess:</span><button class="btn-self btn-got" onclick="markSelf(true)">&#10003; Got it</button><button class="btn-self btn-miss" onclick="markSelf(false)">&#10007; Missed</button>';
}

function switchQImg(thumb, src){
  document.getElementById('main-qimg').src = src;
  document.querySelectorAll('.img-thumb').forEach(function(t){ t.classList.remove('active'); });
  thumb.classList.add('active');
}

function openLB(src){ document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('show'); }
function closeLB(){ document.getElementById('lb').classList.remove('show'); }

function formatQ(text){
  // Remove Media/carousel artifacts
  text = text.replace(/\nMedia\n[\d\s\n]+$/,'').replace(/\nMedia\n[\d ]+\n/,'\n');
  
  // Parse tab-separated table
  if(text.indexOf('\t') !== -1){
    var lines = text.split('\n');
    var pre = [], tableRows = [], post = [], inTable = false;
    for(var i = 0; i < lines.length; i++){
      var line = lines[i];
      if(line.indexOf('\t') !== -1 && line.trim()){
        inTable = true; tableRows.push(line);
      } else if(inTable && tableRows.length > 1){
        post = lines.slice(i); break;
      } else if(!inTable){
        pre.push(line);
      }
    }
    if(tableRows.length > 1){
      var cells0 = tableRows[0].split('\t').map(function(c){ return c.trim(); }).filter(Boolean);
      var isHdr = cells0.some(function(c){ return ['Variable','Value','Range','Parameter','Result','Normal','Test','FiO2','pH'].some(function(h){ return c.includes(h); }); });
      var tbl = '<table class="lab-table">';
      if(isHdr){
        tbl += '<thead><tr>'+cells0.map(function(h){ return '<th>'+esc(h)+'</th>'; }).join('')+'</tr></thead><tbody>';
        tableRows.slice(1).forEach(function(r){
          var cells = r.split('\t').map(function(c){ return c.replace(/\xa0/g,'').trim(); }).filter(function(c){ return c; });
          if(cells.length) tbl += '<tr>'+cells.map(function(c){ return '<td>'+esc(c)+'</td>'; }).join('')+'</tr>';
        });
      } else {
        tbl += '<thead><tr><th>Variable</th><th>Value</th><th>Reference</th></tr></thead><tbody>';
        tableRows.forEach(function(r){
          var cells = r.split('\t').map(function(c){ return c.replace(/\xa0/g,'').trim(); }).filter(function(c){ return c; });
          if(cells.length) tbl += '<tr>'+cells.map(function(c){ return '<td>'+esc(c)+'</td>'; }).join('')+'</tr>';
        });
      }
      tbl += '</tbody></table>';
      var postText = post.join('\n').replace(/New Search[\s\S]*/,'').replace(/Media[\s\S]*/,'').trim();
      return '<p style="white-space:pre-wrap;margin-bottom:12px">'+esc(pre.join('\n').replace(/\xa0/g,' ').trim())+'</p>'+tbl+(postText?'<p style="white-space:pre-wrap;margin-top:12px">'+esc(postText)+'</p>':'');
    }
  }
  var cleaned = text.replace(/New Search[\s\S]*/,'').replace(/\xa0/g,' ').trim();
  return '<p style="white-space:pre-wrap">'+esc(cleaned)+'</p>';
}

function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function revealAns(){
  var qi = queue[idx]; var q = ALL_Q[qi];
  // Answer images — look for answer-specific images
  if(q.imgs && q.imgs.length > 1){
    var ansImgs = q.imgs.filter(function(s){ return s.toLowerCase().includes('answer') || s.toLowerCase().includes('ans'); });
    if(!ansImgs.length && q.imgs.length > 1) ansImgs = q.imgs.slice(1);
    if(ansImgs.length){
      var wrap = document.getElementById('ans-img-wrap');
      wrap.innerHTML = ansImgs.map(function(src){ return '<img src="'+src+'" onclick="openLB(this.src)" onerror="this.style.display='none'">'; }).join('');
      wrap.style.display = 'block';
    }
  }
  document.getElementById('ans-box').classList.add('show');
  document.getElementById('btn-reveal').style.display = 'none';
  document.getElementById('self-row').classList.add('show');
  if(idx === queue.length-1) document.getElementById('btn-fin').style.display = 'inline-block';
  else document.getElementById('btn-next').style.display = 'inline-block';
}

function markSelf(correct){
  var qi = queue[idx];
  scores[qi] = correct; sessionScores[qi] = correct; saveState();
  document.getElementById('self-row').innerHTML = correct
    ? '<span style="color:var(--green);font-family:var(--mono);font-size:13px">&#10003; Marked correct</span>'
    : '<span style="color:var(--red);font-family:var(--mono);font-size:13px">&#10007; Marked for review</span>';
}

function nextQ(){ idx++; loadQ(); }

function showResults(){
  document.getElementById('scr-q').style.display = 'none';
  document.getElementById('scr-results').style.display = 'block';
  var total = queue.length;
  var attempted = Object.keys(sessionScores).length;
  var correct = Object.values(sessionScores).filter(function(v){ return v === true; }).length;
  var pct = attempted > 0 ? Math.round((correct/attempted)*100) : 0;
  var numEl = document.getElementById('res-num');
  numEl.textContent = correct+'/'+attempted;
  numEl.className = 'score-num '+(pct>=70?'score-g':pct>=50?'score-m':'score-b');
  document.getElementById('res-pct').textContent = pct+'% self-assessed correct';
  document.getElementById('res-sub').textContent = total+' questions reviewed';
  try{ var prev = parseInt(localStorage.getItem('ciq_best')||'0'); if(pct>prev) localStorage.setItem('ciq_best',pct); }catch(e){}
  // Category breakdown
  var catData = {};
  queue.forEach(function(qi){
    var cat = ALL_Q[qi].cat;
    if(!catData[cat]) catData[cat] = {correct:0,total:0};
    catData[cat].total++;
    if(sessionScores[qi] === true) catData[cat].correct++;
  });
  var bdHtml = '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px">By Category</div>';
  Object.keys(catData).sort(function(a,b){ return catData[b].total - catData[a].total; }).forEach(function(cat){
    var d = catData[cat];
    var p = d.total > 0 ? Math.round((d.correct/d.total)*100) : 0;
    var col = p>=70?'var(--green)':p>=50?'var(--yellow)':'var(--red)';
    bdHtml += '<div class="cat-row"><div class="cat-name">'+cat+'</div><div class="cat-bar-wrap"><div class="cat-bar" style="width:'+p+'%;background:'+col+'"></div></div><div class="cat-score-val" style="color:'+col+'">'+d.correct+'/'+d.total+'</div></div>';
  });
  document.getElementById('cat-breakdown').innerHTML = bdHtml;
  // Review list
  var revHtml = '';
  queue.forEach(function(qi, i){
    var r = sessionScores[qi];
    var dc = r===true?'dot-g':r===false?'dot-r':'dot-n';
    var preview = ALL_Q[qi].q.replace(/	/g,' ').substring(0,80).trim()+'...';
    revHtml += '<div class="rev-item"><div class="dot '+dc+'"></div><span>Q'+(i+1)+': '+esc(preview)+'</span></div>';
  });
  document.getElementById('rev-items').innerHTML = revHtml;
}

function goHome(){
  document.getElementById('scr-results').style.display = 'none';
  document.getElementById('scr-start').style.display = 'flex';
  loadState();
}

// PWA install
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  var b = document.createElement('div');
  b.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#00b4d8;color:#000;padding:12px 28px;border-radius:8px;font-family:monospace;font-size:13px;font-weight:600;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(0,180,216,.4);white-space:nowrap';
  b.textContent = 'Add to Home Screen';
  b.onclick = function(){ e.prompt(); b.remove(); };
  document.body.appendChild(b);
  setTimeout(function(){ b.remove(); }, 10000);
});

try {
  buildCatGrid();
  loadState();
} catch(e) {
  console.error('Init error:', e);
  document.getElementById('cat-grid').innerHTML = '<div style="color:red;font-family:monospace;font-size:12px">Error: '+e.message+'</div>';
}
</script>
