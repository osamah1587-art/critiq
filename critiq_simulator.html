\n\t\n\n(12-18)\n\n\n\n\nAPTT\n\n\t\n\n36\n\n\t\n\n32-38\n\n \n\n1.What is the likely cause of her confusional state?\n\n2.What specific treatment would you institute for resolution of her mental status?\n\n \n\nJFICM Fellowship Exam 2007 No. 1", "a": "1.What is the likely cause of her confusional state?\n\nWernickes encephalopathy\n\n2.What specific treatment would you institute for resolution of her mental status?\n\nThiamine 100 mg IV", "imgs": [], "cat": "Biochemistry"}, {"q": "A 54 year old lady presented to the emergency department after having been unwell for 4 days. Her Full Blood Count (FBC) report is provided below.\n\n \n\nHb                  * 128     g/L                    (130 \u2013 180)  \n\nWBC              * 56.51   X109/L              (3.50 - 11.00)\n\nPlatelet              347     X109/L               (150 - 450)\n\nRBC                 5.27    X1012/L              (4.50 - 6.50)\n\nHCT                 0.414                             (0.40 - 0.54)\n\nMCV                82.6    fL                       (80 \u2013 100)  \n\nMCH             * 26.3    pg                        (26.5 - 33.0)\n\nMCHC             310     g/L                       (310 \u2013 360)  \n\n \n\nNEUTROPHIL (96.3 %)  * 54.40  X10^9/L    (1.7 - 7.0)\n\nLYMPHOCYTE (2.8 %)     1.60    X10^9/L    (1.5 - 4.0)  \n\n MONOCYTE     (0.7 %)    0.44    X10^9/L    (0.1 - 0.8)  \n\n EOSINOPHIL    (0.1 %)    0.05    X10^9/L    (0.04 - 0.44)\n\n BASOPHIL        (0.1  %)   0.02    X10^9/L    (0.00 - 0.20)\n\n \n\n1.What likely haematological process is revealed by the abnormal white cell and neutrophil count ?\n\n2.Cite 3 features on this FBC which support your answer in (1)\n\n \n\nJFICM Fellowship Exam 2007 No.1", "a": "1. What likely haematological process  is revealed by the abnormal white cell and neutrophil count ?\n\n A leukemoid reaction. \n\n2. Cite 3 features on this FBC which support your answer in (1)        \n\n>50000 cells\n\nNormal basophil and eosinophil count.\n\nPresence of  D\u00f6hle bodies\n\nPresence of toxic granulation", "imgs": [], "cat": "Haematology"}, {"q": "The following arterial blood gas and biochemistry results are from a patient with chronic cardiac and respiratory disease and recent profuse vomiting\n\nVariable\n\n\t\n\n \n\n\t\n\n \n\n\t\n\nNormal Range\n\n\n\n\nFiO2\n\n\t\n\n0.4\n\n\t\n\n \n\n\t\n\n \n\n\n\n\npH\n\n\t\n\n7.5\n\n\t\n\n \n\n\t\n\n \n\n\n\n\nPaO2\n\n\t\n\n58\n\n\t\n\nmmH\n\n\t\n\n \n\n\n\n\nPaCO2\n\n\t\n\n47\n\n\t\n\nmmHg\n\n\t\n\n \n\n\n\n\nHCO3\n\n\t\n\n34.8\n\n\t\n\nmmol/L\n\n\t\n\n(22-27)\n\n\n\n\nStandard base excess\n\n\t\n\n10.2\n\n\t\n\nmmol/L\n\n\t\n\n(-2.0 to +2.0)\n\n\n\n\nSodium\n\n\t\n\n137\n\n\t\n\nmmol/L\n\n\t\n\n(135-145)\n\n\n\n\nPotassium\n\n\t\n\n2.5\n\n\t\n\nmmol/L\n\n\t\n\n(3.2-4.5)\n\n\n\n\nChloride\n\n\t\n\n92\n\n\t\n\nmmol/L\n\n\t\n\n(100-110)\n\nDescribe the acid-base and the metabolic disturbance.\nList the potential causes of these abnormalities in this patient\nOutline the management of the metabolic and acid-base disturbance.\n\nJFICM Fellowship Exam 2006 No. 2", "a": "a) The major abnormalities are\n\nmetabolic alkalosis with respiratory compensation\nhypokalaemia and hypochloraemia\nnormal anion gap\nincreased apparent strong Ion difference [(Na + K) - Cl] = 47\n\nb) possible causes\n\ndiuretic therapy\nsteroid therapy\nvomiting from gastric outlet obstruction\npost hypercapnoeic alkalosis\n\nc) management\n\nnormal saline administration\nK supplements\nacetazolamide", "imgs": [], "cat": "ABG"}, {"q": "A 68 yr old critically ill man with pulmonary infiltrates has the following haematology results.\n\nHb\t79\t(130-170g/L)\nMCV\t83.8\t(80-96fL)\nWCC\t1.5\t4-11\nPlts\t47\t140-400\n\nWhat is the haematological diagnosis?\nList three potential causes of the haematological abnormalities?\nOutline what relevant information could be obtained from a bone marrow biopsy in this case.\nList the problems associated with massive transfusion in the critically ill.\nOutline your principles of management for each.\n\n\nJFICM Fellowship Exam 2005 No.1", "a": "The haematologic term is pancytopaenia (sometimes called aplastic anaemia, but this subset really requires demonstration of an empty bone marrow).\n\nPotential causes include aplastic anaemia (eg external radiation, drugs (chloramphenicol, sulphonamides), toxins (benzene)), replacement of marrow (eg malignancy), megaloblastic anaemia, myelodysplastic syndromes and overwhelming sepsis.\n\nBone marrow biopsy would confirm the diagnosis and allow therapy to be targeted.  It would assess marrow cellularity, identify normality or otherwise of haematopoietic cells (eg megaloblastic change), demonstrate infiltration or fibrosis, or macrophages engorged with haematopoietic cells (eg viral haemophagocytic syndrome)", "imgs": [], "cat": "X-Ray"}, {"q": "Following cardiopulmonary resuscitation for severe asthma in a 6 year old child the following blood gas results are obtained (she remains unconscious, paralysed and mechanically ventilated). Please explain these results and outline what action you will take.\n\nBarometric pressure = 760 mmHg\nFiO2 0.5\npH 6.65 (7.35-7.45)\npCO2 212 (35-45 mmHg)\npO2 90 mmHg\nHCO3 23 (20-30 mmol/L)\nLactate 12 (<2 mmol/L)\n\nJFICM Fellowship Exam 2005 No. 2", "a": "Features\n\nSevere respiratory acidosis\nNormal A-a gradient\nHyperlactataemia\n\nSevere respiratory acidosis with normal A-a gradient suggests severe asthma without prominant pulmonary parenchymal damage.  The normal bicarbonate suggests that there is inadequate compensation for the acidosis (ie there is also a metabolic acidosis related to the lactic acidosis).\n\nThe lactic acidosis could represent peripheral tissue anaerobic metabolism due to hypoxia and/or hypoperfusion.  It could also be due to salbutamol or adrenaline infusions which are commonly used in severe asthma", "imgs": [], "cat": "ABG"}, {"q": "A 67 year old female has been intubated for decompensated advance Chronic Obstructive Airways Disease.  A swelling is noted in her supraclavicular area.\n\nWhat is the swelling?", "a": "Apical lung hernia\n\nPatients with advanced hyperinflation often have supraclavicular swellings associated with bullous expansion of the lung apices.\n\nReference :Crowe G.  Apical Lung Hernia.  Med J Aust; 189:56", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/lung%20hernia%201.jpg"], "cat": "Clinical"}, {"q": "The following CT scan was performed on a 30 year old male with vomiting and severe abdominal pain.\n\nDescribe the features of the CT scan", "a": "The scan shows gross swelling and inflammation of the pancreas consistent with acute pancreatitis.  There is also bilateral \"renal halo sign\" (attenuation of the perirenal fat) due to retroperitoneal oedema.\n\nReference : Athappan G, Ariyamuthu V and Rajamani V. Bilateral renal halo sign in acute pancreatitis. Med J Aust 2008; 189:228\n\nThanks to Ganesh Athappan and the MJA for provision of the images", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/halo%20sign"], "cat": "CT"}, {"q": "A 40 year old triathlete presented with fevers, chills and right upper quadrant discomfort.  Evidence of jaundice was found on clinical examination and mild hepatomegaly. \n\nHis blood results were as follows\n\n \n\nInitial blood results\nParameter\tValue\tNormal Range\nAlbumin\t29g/L\t33-47\nALP\t164U/L\t30-115\nGGT\t207 U/L\t0-45\nALT\t76 U/L\t<40\nAST\t279U/L\t<40\nLDH\t4268 U/L\t100-225\n\n\nWCC\n\n\t13.4\t4-11\nHb\t90g/dL\t120-150\nPlt\t179\t150-500\nINR\t1.3\t \nAPTT\t37\t \nBilirubin\t110\t<20\nCreatinine\t117\t<120\n\nThe following CT scan is obtained.\n\nDescribe the findings.  What are the likely causes?", "a": "The CT images demonstrate multiple low attenuating lesions in both lobes of the liver.  There are a number of cysts in the right kidney also  The blood results are suggestive of a mixed obstructive and hepatocellular hepatic dysfunction and associated sepsis.\n\nThe possible causes include:\n\nInfection\nPyogenic bacterial abscesses\nCandidal infection\nTuberculosis (miliary)\nMalignancy\nLung\nBreast\nColon\nMelanoma\n\nIn this case the patient had disseminated malignant melanoma\n\nReference : Buchholz S, Rudan G.  A professional kitesurfer with multiple liver lesions.  Med J Aust 2007; 187:590-591\n\nThanks to Stephan Buchholz and the MJA for allowing us to use their images", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/liver%20mets%20from%20melanoma.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/liver%20mets%20from%20melanoma%202.jpg"], "cat": "CT"}, {"q": "With regards to the following loop\n\n1. What is the view called?\n\n2. Describe the abnormalities\n\n3. What is the likely diagnosis?\n\n4. What treatment is indicated and why?", "a": "1. TOE, mid-oesophageal, 4 chamber view\n\n2.  A large (unmeasured) echodense mass is present in the left atrium. It appears to be adherent to the atrial border of the anterior mitral valve leaflet, and possibly the interatrial septum, and fills the majority of the left atrium. The mass prolapses through the mitral valve during diastole. Colour flow doppler is not shown, and it is likely there is associated mitral incompetence. The left and right ventricles and tricuspid valves are visualised and appear normal in this view\n\n3. Atrial myxoma: most common primary heart tumour, 80% occur in the left atrium, most commonly arise from left atrial border of fossa ovalis.\n\n4. Due to the size of the lesion and risk of obstruction, worsening valve incompetence, or thrombotic complication, operative removal is indicated. This would require cardiopulmonary bypass.", "imgs": [], "cat": "Echo"}, {"q": "1. A 65 yr old male is slow to wake after presenting with severe sepsis. Please comment on the following CT scan\n\n2. What neurological sequelae are expected?", "a": "1. A symmetrical pattern of oedema is present throughout the subcortical and deep white matter of both occipital hemispheres. There is effacement of the cortical sulcal pattern within the occipital hemispheres but there is no concomitant attenuative abnormality within the brain stem, remaining supratentorium or the cerebellar hemispheres to suggest any further areas of the oedema or ischaemic infarction.\n\n2. Cortical blindness", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/honk1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/honk2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/honk3.jpg"], "cat": "CT"}, {"q": "1. A 65 yr old man is slow to wake after a severe hyperosmolar non-ketotic coma with associated sepsis. Describe the abnormalities on the following MRI?", "a": "1.There is extensive abnormal high T2 signal involving both grey matter and white matter in much of the occipital and parietal lobes, with a definite posterior distribution. This large area does demonstrate moderately increased signal on the DWI trace. There is noted to be relative sparing of the medial aspect of the left occipital lobe.\n\nThe areas of restricted diffusion are consistent with cytotoxic oedema and likely represent infarction, although the restricted diffusion does not absolutely equate to infarction and there may be some reversibility of the areas of restricted diffusion particularly in the setting of hypertensive encephalopathy/reversible posterior leucoencephalopathy syndrome.\n\nThere are a number of other scattered small foci of restricted diffusion in the superior white matter of both frontal lobes, in the posterior aspect of the left corona radiata and in the posterior limb of the left internal capsule, right external capsule, anterior left thalamus, splenium of the corpus callosum on the right and genu of the corpus callosum on the right and a further focus at the anterosuperior aspect of the frontal horn of the right lateral ventricle. These foci are all relatively small but are suspicious for further small areas of infarction.\n\nThere is no evidence of infarction or restricted diffusion involving the brainstem or cerebellum.\nThere is mild to moderate local mass-effect in the occipital and parietal lobes with some sulcal effacement, but no other marked mass-effect.\n\nWithin the confluent areas of high T2 signal in the occipital and parietal regions bilaterally there are linear and punctate areas of high T1 signal with a gyriform distribution and punctate and linear areas of susceptibility on the gradient echo sequence. This is consistent with moderately diffuse petechial haemorrhage in these regions and also suggests that there is a significant component of tissue damage in these regions. There is no evidence of any large focal parenchymal haematoma or extra-axial collection.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/honkmri1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/honkmri2.jpg"], "cat": "CT"}, {"q": "A 27 yr old male presents with a history of  testicular germ cell tumour and  increasing shortness of breath. Please comment on the following CT scan", "a": "There are innumerable rounded, soft tissue density lesions throughout both lungs, the largest measuring 2 cm in diameter. These are consistent with metatstatic germ cell tumour. This is accompanied by widespread patchy groundglass and airspace opacity, which extends throughout both lung. This  could have a number of causes, including infective, although in the presence of haemoptysis - haemorrhage is likely possibility. No convincing hilar or axillary lymphadenopathy is identified.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctmets1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctmets2.jpg"], "cat": "X-Ray"}, {"q": "Describe the views and abnormalities present on the following loops?", "a": "1. The views shown are;\n\nmid-oesophageal 4-chamber (ME-4) with and without colour flow doppler\nmid-oesophageal 2-chamber (ME-2)\ntrans-gastric short-axis (SAX)\ntrans-gastric long-axis (LAX)\n\n2. There is severe global hypokinesis of the left ventricle, with dyskinesis of the base of the septum, and only the base of the anterolateral segment contracting . There is also a central mitral regurgitant jet.", "imgs": [], "cat": "Echo"}, {"q": "A 38 year old male motorcyclist is brought into hospital after running into a parked car.  He has reduced air entry on the left and is complaining of left chest and abdominal pain.\n\nDescribe the features of the chest xray\n\nWhat management plan would you initiate for these findings?", "a": "The xray is a supine AP film, is adequately penetrated and centred, but underinspired.  It demonstrates elevation of the left hemidiaphragm and lower left lung opacity.  Fractures of the second, seventh and ninth ribs are also present laterally. \n\nThere is also air in the soft tissues around the left chest.  Unless there are major lacerations present, this finding should always suggest a pneumothorax.\n\nThe mediastinum is markedly shifted to the right. \n\nThe patient requires an intercostal drain on the left with aggressive analgesia.  Given the degree of the patient's injuries and the mechanism, CT chest is warranted.  It is important to rule out co-existant injuries such as C-spine injury and associated abdominal injuries, and further imaging may be required.  Supportive care, chest physio and close monitoring are required to minimise the chance of secondary pulmonary infection.  Non-invasive ventilation, or even intubation, may be required.\n\nComment : This xray demonstrates a likely left pneumothorax, rib fractures and a left lower zone opacity associated with a raised hemidiaphragm.  Though pulmonary contusion and subsequent lower lobe collapse may explain these findings, the CT in this case demonstrated a left hemidiaphragm rupture.  Noting the raised hemidiaphragm (actually the spleen) in this case was the clue.\n\nThe findings of the xray suggest the patient has aGiven the right lung looks fairly normal, this is probably not due to collapse on the right side.  The mediastinal shift could be due to a tension pneumothorax or", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ruptured%20left%20hemidiaphragm.jpg"], "cat": "X-Ray"}, {"q": "A 47 year old female is brought to ED following a high speed motor vehicle accident.  On arrival in ED she has a blood pressure of 130/80 with a heart rate of 105, a respiratory rate of 14, is maintaining her own airway and has saturations of 99% on 15L via non rebreather mask.  On painful stimulus she does not open her eyes nor make an audible sound, and flexes to pain.\n\nNo other injuries are identified on the secondary survey.  Plain films of chest and pelvis are normal, as is a lateral C-spine\n\nFollowing intubation, a head CT is performed. Describe the following images.", "a": "The CT demonstrates several small haemorrhagic contusions in both parietal lobes, and another in the posterior aspect of the left frontal lobe.  Minimal oedematous change is noted around them.  Traumatic subarachnoid blood is also noted in the left temporoparietal area, and blood is seen in both occipital horns of the lateral ventricles and the interpeduncular cistern.\n\nThe findings are consistent with diffuse axonal injury.\n\nComment : the common changes of diffuse axonal injury include petechial haemorrhages most commonly found at the grey-white matter interface.  These changesare largely due to shearing between brain structures with different densities, and often become more apparent over 24 hours.  These injuries are often under-appreciated on CT.  MRI scans of these patients are often far more impressive.  Morbidity is often substantial.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%201.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%202.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%203.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%204.JPG"], "cat": "CT"}, {"q": "A 19 year old male is brought to ED following a pub brawl.  He is complaining of marked left upper quadrant pain after being kicked repeatedly to that side.\n\nThe following xray is taken.  What does it show? What will you do?", "a": "The xray demonstrates a massive left pneumothorax, with complete collapse of the left lung.  There is no evidence of radiographic tension.\n\nThe patient needs to be thoroughly evaluated like any other trauma patient, including evaluation of his ABCs, attention to cervical spine protection and exclusion of abdominal injuries.  In this case, the man's pain was due to a subcapsular renal haematoma, and his pneumothorax was relatively asymptomatic.\n\nComment : note how sharp the definition of his heart border and left hemidiaphragm are.  Though this pneumothorax is obvious, others, including in supine patients, are not and clues like this may be the only diagnostic keys.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/left%20pneumothorax.jpg"], "cat": "X-Ray"}, {"q": "A 2 month old girl is brought to emergency with difficulty breathing.  She has been snuffly with a runny nose for 2 days, and has a temperature of 38.2 degrees. Crackles and wheezes are heard, evenly distributed across the chest, there is evidence of intercostal retraction and she is grunting.   A chest xray is taken\n\nDescribe the xray.\n\nWhat management options are available and when would you use them?", "a": "The xray shows evidence of volume loss in both lungs.  On the right, the right upper lobe is completely collapsed with upward rotation of the horizontal fissure.  The left lung volume is also reduced, and there is a retrocardiac triangular shaped shaddow consistant with left lower lobe collapse. \n\nThe most likely cause, given the viral prodromal features, is Bronchiolitis.  However the lung fields are reasonably clear, and as such aspiration of foreign bodies should be considered.\n\nTreatment consists of oxygen to maintain saturations above 92%, ventilatory support (eg Bubble CPAP, intubation), nasal suctioning and attention to fluids, nutrition and electrolytes.  There is no specific cure.  Randomised controlled trials of physiotherapy, glucocorticoids and bronchodilator therapy have not found benefit, and their use is controversial.\n\nIndications for ventilatory support include regular desaturations despite oxygen therapy, apnoeas and fatigue.  A rising CO2 may also point to the latter.\n\nComment : bronchiolitis is a lower respiratory tract viral infection, most often caused by Respiratory Syncytial Virus (RSV).  It occurs mainly as a first episode of wheezing in a child less than 24 months.  It is self limiting and respiratory distress usually improves gradually over 4-5 days.  The chest xray usually demonstrates peribronchial cuffing, patchy atelectasis, lobar collapse and hyperinflation, largely related to swollen mucosa and mucous plugging.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bronchiolitis.jpg"], "cat": "X-Ray"}, {"q": "A 64 year old man presents to emergency with severe chest pain for the last 4 hours.  He has a past history of heavy smoking and is an insulin requiring diabetic.  His ECG shows non-specific T wave flattening\n\nThe following xray is taken.  Describe the findings.  What would your management plan be?", "a": "The xray an AP erect film.  The film is well penetrated and centred and is properly inspired.\n\nThe most striking finding is the widening of the upper mediastinum.  This could be due to the film being taken in the AP configuration, which tends to magnify the mediastinum.  However, this does appear abnormal.  The aortic knuckle also appears a little blurry.\n\nThe lung fields have a reticular pattern suggesting some degree of lung fibrosis, the cause of which is unclear.  The cardiac shaddow is mildly enlarged, but there are no other signs of cardiac failure.\n\nThe findings are possibly consistent with an acute aortic dissection.  A CT angiogram must be performed urgently, while oxygen, analgesia and blood pressure control are instituted.  A betablocker, if not contraindicated is a good first choice.\n\nIn this case the CTA demonstrated an extensive aortic dissection.\n\nComment : the other findings of acute aortic dissection include:\n\nwidened superior mediastinum\nblurring of the aortic knuckle\nobliteration of the aorto-pulmonary windom\nrightward deviation of the trachea and/or nasogastric tube\ndownward deviation of the right main bronchus\nright pleural capping / pleural effusion\na double wall of the aortic knuckle", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/thoracic%20aortic%20dissection.jpg"], "cat": "ECG"}, {"q": "You are asked to check the CXR position of a portacath inserted this morning by a fellow intensivist.  She says everything went smoothly.\n\nComment on the following CXR", "a": "The portacath is inserted in the left subclavian vein, and the end appears to sit at the junction of the brachiocephalic vein and the superior vena cava.\n\nThere is subcutaneous air noted in the neck and the left axilla, and on careful inspection there is a small pneumothorax on the left, most notable at the lung base.  The cardiac border also appears unusually sharp, consistent with a pneumothorax.\n\nComment : pneumothoraces are not uncommon complications of central venous access, particularly when the subclavian vein is used.  They may be clinically silent (as in this case) and may not be heralded by aspiration of air during insertion.  An xray is always required.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/subtle%20pneumothorax%20post%20portacath.jpg"], "cat": "X-Ray"}, {"q": "A 26 year old male is admitted to the orthopaedic ward following a motorbike accident.  He sustained a fracture/dislocation of his right ankle but was otherwise well.  He complained of neck pain but cervical spine films were reported as normal and the collar removed.  No other injuries were recorded.\n\nOvernight, his GCS was reported to fall.  He was able to follow command but was unable to speak.  The following CT was obtained.\n\nWhat does the CT show?  What is the likely pathology?  How would you treat it?", "a": "The CT shows a low density area involving most of the right cerebellar hemisphere with mild mass effect (the 4th ventricle is compressed and mildly displaced to the left).\n\nThe lateral and third ventricles are not dilated, suggesting that there is no occlusion of CSF flow at this point.  There is no other focal abnormality in the brain to explain the patient's condition.\n\nThe most likely cause in these circumstances is vertebral artery injury with dissection or thromboembolism.  A CT or MRI angiogram are required to elucidate the cause.\n\nIn this case a CTA was performed which showed narrowing of the right vertebral artery at the level of C5-6.  There was an associated right transverse process fracture at C7.\n\nManagement of these injuries remains controversial.  It usually involves anticoagulation to reduce thromboembolic events, however this approach has not been subjected to rigorous testing.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2031.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2021.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2011.JPG"], "cat": "CT"}, {"q": "Please comment on the CT brain of a 74 yr lady who has presented to the emergency department with a reduced conscious state", "a": "The findings are consistent with post ischaemic and infarctive oedema within the right MCA territory. The consequent mass effect results in significant transtentorial herniation and brainstem compression together with subfalcial herniation and contralateral hydrocephalus. At this point there is no evidence of haemorrhagic transformation. The right MCA is now clearly extremely hyperdense in keeping with established thrombosis.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/rmcastroke1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/rmcastroke2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/rmcastroke3.jpg"], "cat": "CT"}, {"q": "Please comment on the following CT peformed on a 54yr woman who presented with breathlessness following a blunt injury to the neck recently.", "a": "A retropharyngeal soft tissue density is present  measuring 9.0 x 2.7cm at the level of the hyoid bone and 18.0cm craniocaudally. High attenuating material seen in the postero inferior aspect is suggestive of blood/blood products, and is consistent with a retropharyngeal haematoma. Evidence of septation is noted. The larynx and pharynx are  compressed anteriorly. An endotracheal tube and a left central venous line are noted in situ.The imaged lung apices show no focal lesions. No evidence of destructive lesions involving the cervical spine.\n\nCONCLUSION:\nThe retropharyngeal soft tissue density may represent an organising and resolving retropharyngeal haematoma.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/retrophyarngeal1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/retropharyngeal2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/retropharyngeal3.jpg"], "cat": "Equipment"}, {"q": "A 35 year old woman is shopping when she is noted to collapse.  Her GCS is documented to be 3 at the scene but is 6 on arrival in ED.  Her blood pressure is 140/80, her heart rate 85, her saturations are 99% on 6L via Hudson mask and her temperature is normal.  Her BSL is in the normal range.\n\nDescribe the features of the CT.  What is the most likely cause?", "a": "The CT shows hyperdensity in the CSF over the left hemispheric sulci consistent with acute subarachnoid haemorrhage.  There is also blood in the sylvian fissure, suprasellar cystern, the 4th ventricle and the basal cysterns.  At present there is no sign of hydrocephalus or herniation.\n\nThe most likely cause of the SAH is rupture of a berry aneurysm, most likely involving the left middle cerebral artery.  Alternate sites are possible however and angiography (CT, MRI or direct) is required.  Other causes of SAH include arteriovenous malformations, trauma and malignancy.  Occasionally no cause is found.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2013.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2022.JPG"], "cat": "CT"}, {"q": "An 80 year old female is brought to ED with a decreased level of consciousness.  She is self ventilating but response non-specifically to pain only.  Her eyes are divergent and has decreased tone particularly on the left side.\n\nThe following CT is obtained.  What are the findings?", "a": "There is a poorly defined hypodense area in the right posterior frontal and anterior parietal regions, which involves both grey and white matter.  There is mild mass effect with effacement of the sulci in this region.  Age related atrophic changes are also present. \n\nThe overall picture is infarction (recent due to oedema) of the anterior part of the right MCA territory.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2014.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2023.JPG"], "cat": "CT"}, {"q": "A 76-year-old male had a VF arrest 5 days ago. He has been off sedation for 2 days and remains obtunded. Please comment on the following CT.", "a": "Non-contrast examination was performed through the cranium. The examination identifies a moderate sized wedge shaped hypodensity detected in the left parietal lobe, just dorsal to the vertex. The lesion measures approximately 5.4 cm in AP dimension, with craniocaudal length of 4 cm. Appearance is suggestive of a cortical infarction. There is some curvilinear hyperattenuation detected within the parietal infarct, suggestive of either subarachnoid blood, or gyral haemorrhage. Appearance is suggestive of haemorrhagic infarct.\n\nA second wedge shaped hypodensity is detected dorsally within the left occipital lobe. It has a transverse width of 2.6 cm, with AP dimension of 2 cm. Appearance is suggestive of occipital infarct. Both lesions are associated with sulcal effacement, indicating subacute nature. ? Embolic in origin, versus watershed infarction. Suggest clinical correlation.\n\nNo significant midline shift is noted. There is minor indentation of the left occipital horn, indicating oedema from adjacent ischaemia. No significant midline shift is noted. No further intracerebral haemorrhage is identified. Some enlargement of the ventricular size, and sulci, suggestive of some involutional change. No further intracranial lesions are noted. No evidence of uncal, or tonsillar herniation.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/cva1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/cva2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/cva3.jpg"], "cat": "ECG"}, {"q": "Describe the abnormalities present on this CT of an elderly patient with GCS 4", "a": "Large intraparenchymal cerebellar haemorrhage, is predominantly left side extending into the vermis. Notable cerebellar tonsillar (approximately 9mm), and upward herniation through the tentorium cerebri. The brainstem and fourth ventricle are compressed. Secondary hydrocephalus of the third and lateral ventricles noted.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctsg1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctsg2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctsg3.jpg"], "cat": "CT"}, {"q": "Comment on the following CT performed in a  70 yr male with history of acute delirium and numerous falls.", "a": "Non-contrast brain CT.\n\nBilateral linear hyperdensities in the CSF space may represent acute haemorrhage within chronic subdural hygromas. No visible fracture. No significant mass-effect.\nPeriventricular leucomalacia is probably due to small vessel disease.\n\nNo focal destructive bony lesion is identified on review of bone windows.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctas1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctas2.jpg"], "cat": "ECG"}, {"q": "Please comment on the following CT performed in a patient with severe epigastric pain.", "a": "CT angiogram chest/abdomen\nThere is a dissection of the thoracic and abdominal aorta that extends into the heart\nwith evidence of a pericardial effusion.\nIt does not extend into the carotids but crosses their origins.\nThe dissection extends to the level of the iliacs.\nThere is no blood flow down the right iliac artery and no perfusion of the right\nkidney.\nThe perfusion to left kidney also appears somewhat diminished.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctad1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctad2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctad3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctad4.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctad5.jpg"], "cat": "X-Ray"}, {"q": "A 3-yr old boy presents to ED with difficulty swallowing. Please comment on the following X-ray", "a": "A metal coin is identified in the proximal oesophagus. There is no other foreign body seen.\nCardiomediastinal contour is normal, the lungs and pleural spaces are clear.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/coin1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/coin2.jpg"], "cat": "X-Ray"}, {"q": "A 60 yr old diabetic presents with fevers and abdominal pain. Comment on the following CT", "a": "A large staghorn calculus approximately 31 x 13 x 16mm obstructs the right renal pelvis. Resultant pyonephrosis and thinning of the renal cortex is noted.\nA large irregular calcific density in the lower pole of the right kidney measures 12.8 x 11 x 9 mm. It is associated with a large locule of gas. A collection 20 x 10 x 7 mm extends from the inferior pole of the right kidney to the femoral canal at the level of the hip joint, and involves the psoas muscle.\nPockets of free fluid are noted in the pouch of Douglas, and left lateral to the body of the uterus measuring 26 x 14 x 26 mm and 24 x 17 x 20 mm respectively. These pockets of fluid may represent additional locules of collection. The left kidney enhances homogeneously, and drains into non-dilated collecting system. The bowel loops are of normal calibre, without obvious mural thickening.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctsh1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctsh2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctsh3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctsh4.jpg"], "cat": "Clinical"}, {"q": "Please comment on the findings in the following CT in a patient with back pain", "a": "Post- contrast imaging through chest abdomen and pelvis in arterial phase of contrast administration.\nAneurysmal dilatation of the distal arch of the aorta and descending thoracic aorta is evident with a dissection flap commencing within the distal arch of the aorta, 5 cm from the origin of the left brachiocephalic artery. Calcification of the wall of the dissection is evident within this region. Further inferiorly, within the descending thoracic aorta, a very large thoracic aortic aneurysm is present measuring 18 cm in length, 12.5 cm in the AP dimension and 13.5 cm in width. This appears to contain a true and false lumen with calcification of the wall of the aneurysm. Mural thrombus is present anteriorly. The dissection flap extends inferiorly into the abdominal aorta with extension of the dissection into both common iliac arteries. Tortuosity of the abdominal aorta is evident. An abdominal aortic aneurysm is present measuring 8.5 cm in transverse diameter and 6.3 cm in the AP diameter. The abdominal aortic aneurysm commences 2.5 cm below the level of the renal arteries.\nNo focal lung lesions evident. Small bilateral pleural effusions are present. No mediastinal lymphadenopathy. No abdominal mass visible. No free peritoneal fluid evident.\n\nCONCLUSION:\nLarge dissecting thoracic aortic aneurysm commencing distal to the major branches of the aortic arch and extending into the abdominal aorta passed the bifurcation into the common iliac arteries. This is associated with aneurysmal dilatation of the thoracic aorta measuring up to 13.5 cm in transverse diameter and aneurysmal dilatation of the abdominal aorta which measures 8.5 cm in transverse diameter.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctda21.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctda22.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctda23.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctda24.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctda25.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctda26.jpg"], "cat": "X-Ray"}, {"q": "Comment on the following CT in a patient with hypoxia and dyspnoea", "a": "A large amount of thrombus occupies the right main pulmonary artery with extensions into the major lobar branches.\nThrombus also is present in the left main pulmonary artery with a predominant extension into the lower lobe artery but also is with a small extension into the upper lobe artery.\nNo focal lung lesion is seen.\nNo significant pulmonary collection is evident.\n\nCONCLUSION: Very extensive pulmonary thromboembolism with large emboli in both main pulmonary arteries.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctpe21.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctpe22.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctpe23.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctpe24.jpg"], "cat": "Clinical"}, {"q": "Comment on the CT findings in this 55 yr old woman with fever and abdominal pain", "a": "Abnormal gas collection noted at the inferior pole of the left kidney which is predominantly subcapsular but small locules are seen in the region of inflammation adjacent to the left psoas muscle and in the posterior pararenal fat adjacent to the lower pole of the kidney. The possibility of an abscess at this side is raised although no discrete fluid collection can be identified at this time. No renal calculi and no hydronephrosis.\n\nIncidental note of a left ovarian cyst measuring up to 5 cm in size. Mildly prominent left para-aortic lymph nodes are likely reactive in nature. The splenic size is at or just above the upper limits of normal", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/ctki1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctki2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctki3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ctki4.jpg"], "cat": "ABG"}, {"q": "A 73 year old man presents with abdominal pain.  He has had a recent procedure.\n\nWhat operation has he had?\n\nIs there evidence of a problem with this procedure that is causing the pain?", "a": "The CT demonstrates a large fusiform abdominal aortic aneurysm.  This has been repaired utilising a  trouser endoluminal graft.  This originates just below the level of the renal arteries and extends into the upper portions of both common iliac arteries.\n\nThere is no evidence of contrast leak from the graft.  However there is an enormous retroperitoneal haematoma.  Correlation with the post-repair scans is required to rule out ongoing leakage.  There is no evidence of renal or mesenteric ischaemia.  Minor diverticular disease can be seen, but no cause for the abdominal pain is seen in the available images.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2015.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2024.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2033.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2041.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%205.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%207.JPG"], "cat": "Biochemistry"}, {"q": "A 52 year old man presents to the emergency department with severe abdominal pain.  He is tachycardic and hypotensive.\n\nWhat type of scan has been performed?\n\nDescribe the findings on the CT", "a": "This is a CT contrast angiogram that shows opacification of the thoracic and abdominal aorta.\n\n \n\nThere is a fusiform abdominal aortic aneurysm noted arising about 1.5cms below the origin of the renal arteries and extending down to the bifurcation.\n\nThere is evidence of marked stranding and fluid collection noted in the left retroperitoneal region in the anterior and posterior pararenal spaces extending down to the pelvic brim. The left kidney is displaced laterally by the collection which is poorly defined.  There is thin calcification noted in the wall of the abdominal aorta. No \"blush\" of contast is seen.\n\n \n\nBoth the renal arteries are normal.\n\n \n\nNo intraperitoneal fluid seen.\n\n \n\nThe liver, gallbladder, spleen and pancreas to the extent visualised are normal.\n\n \n\nIMPRESSION\n\nFeatures are consistent with a fusiform abdominal aortic aneurysm with large left retroperitoneal collections consistent with leaking aneurysm. The exact site however is not clear", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2016.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2025.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2034.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2042.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2051.JPG"], "cat": "Biochemistry"}, {"q": "A 10 year old boy is brought to the Emergency Department following a fall from a balcony.  He was talking though confused on initial assessment, but as he is being transferred back to ED after ST scanning he becomes less responsive.  He is now posturing to pain only.\n\nWhat does the scan show?\n\nHow would you treat him?", "a": "There is a moderate sized 6.5 x 2cm hyperdense lenticular shaped opacity noted in the right frontal region anterolaterally consistent with an acute Extradural Haematoma (EDH).\n\n \n\nThere is evidence of adjacent mass effect noted with shift of the mid line by about 7mm at the level of the lateral ventricle.  The right lateral ventricle is compressed.  The rest of the brain parenchyma appears normal. No evidence of ventricular dilatation visualised. The basal cisterns are normal.\n\n \n\nIt is likely that increasing extradural haematoma is resulting in a critical rise in intracranial pressure.  Untreated this will result in unconsciousness, brain herniation, brainstem compression and eventual death.\n\nEmergency treatment needs to be implemented, including prompt intubation, oxygenation and control of carbon dioxide levels.  In the face of impending herniation, hyperventilation (eg to CO2 25) and hyperosmolar fluid therapy (mannitol or hypertonic saline) are warranted.  Ensuring cerebral perfusion pressure is maintained is critical, though until intracerebral pressure monitoring is achieved, ICP must be assumed.  In a 10 year old boy, a CPP of 55mmHg is recommended - thus a MAP of at least 75mmHg is required in this child.\n\nImmediate transfer to theatre for evacuation of the clot, either by craniotomy or burr holes, is essential to his survival.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2017.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2026.JPG"], "cat": "ECG"}, {"q": "A 19 year old diabetic female presented in DKA.  She was treated with fluids, electrolyte replacement and insulin, and was monitored with a right radial arterial line and a femoral central line. \n\nOn day 3 she complains of shortness of breath and is found to have saturations of 91% on 4L of oxygen.\n\nThe following CXR is obtained.  What are the results?", "a": "The heart is not enlarged. The left lateral costophrenic angle is blunted suggesting a small amount of pleural fluid. The left lower lobe pulmonary arteries are very poorly seen, which in the context may represent a pulmonary embolus. There appears to be reduced flow to the right lower lobe pulmonary vessels medially also.\n\nA CTPA in this patient demonstrated bilateral lower lobe pulmonary emboli", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/pulmonary%20embolus%20cxr.jpg"], "cat": "Clinical"}, {"q": "A 20 year old woman is recovering from a caesarian section in hospital complicated by post partum haemorrhage.  She becomes dyspnoeic 4 days post op. \n\nA CTPA is performed.  Describe the results", "a": "This is a contrast enhanced examination of the pulmonary tree.  There is a very large saddle embolus straddling the bifurcation of the main pulmonary artery, and extending down into the left lower lobe pulmonary artery. There are further pulmonary emboli in the first and second order branches of the right pulmonary artery. There is a small to moderate pleural effusion on the left. No sign of pulmonary infarct.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%2018.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2027.JPG"], "cat": "X-Ray"}, {"q": "A 45 year old man is brought to emergency following a fall from a horse.  He complains of marked abdominal pain.  All other examination appears normal.\n\nWhat does the scan show?", "a": "There is evidence of a 3cm long laceration noted at the superior pole of the spleen.\n\n \n\nSeveral 1-2cm areas of contusion are noted in the spleen (grade 2-3). The splenic outline is otherwise normal. There is mild irregularity noted at its inferomedial aspect. Minimal fluid is noted near the splenic hilum and around the right lobe of the liver.\n\n \n\nThe rest of the abdomen appears normal\n\n \n\nComment : CT is an effective tool to evaluate structural damage to the spleen.  Utilisation of contrast improves the ability of CT to detect active bleeding (seen as a contrast \"blush\").\n\nThe American Association for the Surgery of Trauma (AAST) has published guidelines on classification of splenic trauma.  Injuries are classed from grade 1 to 5, and each grade incrementally increases likelihood of need for laparotomy.   Many algorithms for conservative management of splenic trauma include injury severity grade.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20111.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20210.JPG"], "cat": "Biochemistry"}, {"q": "A 75 year old woman presents with vomiting and abdominal pain.  The following xray is taken.  Discuss the findings", "a": "Multiple air fluid levels are noted within the small bowel which are dilated suggesting a small bowel obstruction. The large bowel is not distended.\n\n \n\nSurgical clips are noted in the GB fossa region. No definite radio-opaque calculi visualised.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/small%20bowel%20obstruction.jpg"], "cat": "X-Ray"}, {"q": "A 75 year old woman presented to the emergency department with vomiting and abdominal pain.  She is tachycardic but normotensive. \n\nThe following CT is recorded.\n\nList 3 potential causes of this condition", "a": "There is mild dilatation noted of the small bowel loops throughout the abdomen with multiple fluid levels. The distal small bowel however appears to be collapsed suggestive of an obstruction. The level of the obstruction appears to be in the mid lower abdomen. No definite mass lesion seen. Several diverticulae are noted in the sigmoid colon region with faecal loading.\n\nA moderate sized hiatus hernia is noted. The remaining abdominal organs appear normal.  Minimal fluid is noted adjacent to the right lobe of the liver.\n\nBowel obstruction can result from extraluminal causes (tumour, adhesions), luminal causes (eg stricture, tumour, intussusception) or intraluminal causes (eg foreign body).", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20110.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2029.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2035.JPG"], "cat": "Clinical"}, {"q": "A 57 year old man presents to emergency with a syncopal episode and chest pain.  The pain has now migrated to his back.\n\nThe following CT is recorded\n\nWhat are the findings of the CT?\n\nList 5 complications of this condition", "a": "The CT scan is a contrast enhanced scan of the aorta from root to bifircation.  There is good opacification noted of the entire thoracic and abdominal aorta and its branches.  There is uniform dilatation noted of the entire ascending aorta which measures about 5.2cms in maximum diameter. No significant calcification is seen however. \n\nThere is evidence of an extensive dissecting membrane seen extending from the root of the aorta down to the level of the bifurcation.  The dissection also is seen to extend into the left subclavian and right brachiocephalic artery.  The opacification on either side of the dissecting membrane however is uniform suggesting communication.\n\n The right kidney does not enhance adequately compared to the left one though the renal artery is visualised. The dissecting membrane is seen close to the right renal ostium suggesting possible partial obstruction.\n\n Both the kidneys have a normal size. There is a large simple cyst noted arising from the left kidney.  Several simple cysts are also noted in the liver.\n\n Complications associated with extensive aortic dissection include pericardial tamponade, aortic valve disruption, ischaemia to brain, limbs, spinal cord and abdominal viscera, and rupture", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20112.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20211.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2036.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2043.JPG"], "cat": "CT"}, {"q": "A 20 year old male presented to emergency with his parents.  They report that he'd been unwell for 5 days with increasing lethargy and confusion.  Despite his confusion he indicated he was nauseated and had a headache\n\nAfter initial investigations are performed, the patient is taken for CT scan.\n\nWhat does the scan show?\n\n \n\nThese images were provided by Richard Whitaker, with thanks", "a": "This is a non-contrast CT scan of the brain  from the base of skull to the vertex.\nThere is a left sided acute subdural haematoma extending over the left frontal, parietal and temporal lobes - it measures approximately 6mm in the maximum width over the left frontal lobe.\n\nThe subdural haemorrhage also causes mid line shift of approximately 7mm towards the right side with mass effect obliterating the left lateral ventricle. Also, there is some intraparenchymal haemorrhage within the left frontal lobe with some surrounding oedema. There is an area of low attenuation in the basal part of the right frontal lobe containing areas of high signal intensity, likely representing intraventricular haemorrhage/contusion, with some surrounding oedema. There is no evidence of intraventricular haemorrhage.\n\nThe basal cisterns are effaced, suggestive of raised intracranial pressure.\n\n\nThere is an undisplaced fracture of the occipital bone in the mid line. Two fractures also extend laterally in the base of the occipital bone. The mastoid air cells and frontal sinuses are well aerated.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20212.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20114.JPG"], "cat": "ECG"}, {"q": "A 59 year old man presented with a sudden collapse and altered conscious state. He is groaning and flexing to pain.\n\nThe following CT is obtained.  What does it show?  How is the severity of this condition graded?\n\n \n\nThese images were provided by Richard Whitaker, with thanks.", "a": "There is evidence of a subarachnoid haemorrhage is seen with blood concentrated in the subarachnoid spaces in the region of the basilar artery bifurcation and extending down behind the clivus. It is associated with mild prominence of the lateral ventricles and some haemorrhage which has refluxed into the lateral ventricles. Further haemorrhage is seen in the 3rd and 4th ventricles. The basal cisterns are very slightly effaced but there is still preservation of all the basal cisterns. There is no midline shift. The most likely cause is a berry aneurysm of the tip of the basilar artery. \n\n\n \n\nThe severity of acute subarachnoid haemorrhage can be graded either clinically or radiographically. \n\nThe Hunt and Hess classification system, described in 1968, grades patients based on the initial neurological picture, ranging from asymptomatic or minimal symptoms through to profound coma.  Mortality roughly correlates with grade based on this system.\n\nThe World Federation of Neurosurgeons similarly classes SAH based on initial GCS and the presence or absence of focal neurological deficits. \n\nThe Fisher Grade classifies SAH based on initial CT appearance.  More severe grades have increasing thickness of blood in the CSF space and the presence of intraventricular or intraparenchymal blood.\n\nMany variations exist on these systems exist", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20115.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20213.JPG"], "cat": "ECG"}, {"q": "A 23 year old male who fell from a second floor balcony.  On arrival he has a gash over his right eye, is confused and combative requiring intubation for control.  Blood is oozing from his right ear.  He does not appear to have any other injuries.\n\nA CT is taken - describe the findings.\n\n \n\nThese images were provided by Richard Whitaker, with thanks", "a": "This is a non contrast CT of the brain with bone windows. \n\nThe brain CT demonstrates  a biconvex density adjacent to this fracture, consistent with an extradural haematoma.  A small intracerebral haemorrhage is also noted in the adjacent frontoparietal regions. There is mild mass effect compressing the anterior horn of the adjacent right lateral ventricle, which is displaced towards the left. There is a haematoma present in the overlying skin. No other intracranial haemorrhage could be seen.\n\nThere is a fracture through the right temporal base. A small amount of gas is noted inside the skull adjacent to the fracture.  There is no base of skull fracture. No fracture is seen at least in the C1/2 level. The nose deviates towards the right and there is an old fracture present. No definite recent facial fracture is seen. Fluid in the frontal sinuses and the right antrum is probably blood. The ethmoidal cells and sphenoidal cells are virtually opaque.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%201a1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%201b1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%201c1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%202a1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%202b1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%202c1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%203a1.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%203b1.JPG"], "cat": "CT"}, {"q": "Describe the findings present on this X-ray taken for breathlessness the day after a procedure\nWhat is the likely aetiology?", "a": "1. Right sided pneumothorax up to 4.7 cm in depth at the apex. A mild to moderate degree of atelectasis of the right lung is seen. The left lung and pleural space remain clear. Single chamber pacemaker noted and mitral valve replacement evident.\n\n2. If pacemaker insertion was recent procedure pneumothorax may be secondary to this.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/paceptx.jpg"], "cat": "X-Ray"}, {"q": "Describe the abnormalities present on this X-ray taken in a 70 yr old woman with recent breathlessness and weight loss.", "a": "Examination shows abnormal widening of the mid upper mediastinum, in particular on the right side. The trachea deviates slightly to the left of midline. The right hilar shadow appears somewhat prominent, and elevated. There is increased radiodensity in  the medial aspect of the right lung apex which may represent consolidative change. The rest of the lungs are clear. No large effusion is identified.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/medistmass.jpg"], "cat": "X-Ray"}, {"q": "A 49 year old male is involved in a motor vehicle accident.  His GCS at the scene is 10 and deteriorates to 8 on arrival.  He is intubated and sent for CT scanning.\n\nDescribe the features of this study.\n\nImages supplied by Richard Whitaker, with thanks.", "a": "There is acute subdural collection on the right side. There is also an intracerebral haematoma in the right frontal lobe as well as multiple smaller petechial intracerebral haemorrhages in the right frontal lobe and also up in to the right parietal lobe. There is significant deal of midline shift towards the left with compression of the lateral ventricles. There is almost complete effacement of the convexity sulci consistent with raised intracranial pressure.\n\nThe left antrum contains fluid. The ethmoidal cells are opaque. There is a large haematoma over the left occipital bone.\n\nNo skull fracture can be seen.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20117.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20214.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2037.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2044.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2052.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%206.JPG"], "cat": "CT"}, {"q": "A 39 year old male is found with an altered conscious state and unable to move after being thrown from a quad-bike.", "a": "The xray is a supine AP film of the chest.  The patient is on a spine board, has a nipple ring and has ECG dots in place.  There are multiple rib fractures on the left (1, 4, 5) and the right (1, 4, 6).  There is increased opacity on the left suggesting pulmonary contusion +/- haemothorax.  The mediastinum is widened.\n\nThe morphology of the T5 vertebral body is significantly disrupted.  The interspinous line is deviated to the right.  These findings suggest significant spinal column injury.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/trauma%20chest%20multiple%20rib%20fractures%20blateral%20contusions%20t4%20fracture.jpg"], "cat": "ECG"}, {"q": "A 39 year old male presents after a motorbike accident.  He is intubated and has not been seen to move his legs.  He is intensely sweaty from the nipples up.\n\nAfter resuscitation and treatment of other injuries, the following images are obtained.  What do they show?", "a": "There are multiple fractures within the spinal column.  There are vertebral body fractures including a  partial burst fracture of the T5 vertebral body with disruption of the posterior inferior portion of the body and mild retropulsion of fragments.  Further fracture is noted of the anterosuperior margin of the T6 vertebral body.  The articular facets above and below T5 on both sides are fractured through.  The spinous processes of T4, 5 and 6 are also fractured.  This is a highly unstable injury.\n\nNote is made of a depressed sternal body fracture with associated air in the anterior mediastinum.  It is not clear if this is due to pneumothorax or pneumomediastinum.\n\nThe patient is intubated and has a nasogastric tube in situ.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20118.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20215.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2038.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2045.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2053.JPG"], "cat": "X-Ray"}, {"q": "A 39 year old male is brought to emergency after flipping his motorbike.  He is unable to move his legs or feel below his nipples.  A CT scan is performed. \n\nWhat does these images show?  What management is required?", "a": "The CT demonstrates the cervical section of the vertebral column.  The vertebral alignment is normal.\n\n There is a transverse fracture noted in the coronal plane extending through the posterosuperior aspect of the C2 vertebral body into both the lateral masses at the junction with the pedicles and extending through the transverse foramena.  There is mild widening at the fracture site by about 3mm bilaterally.  There is also widening of the posterior intervertebral disc space noted between C2 and C3. The body of C2 has slipped forwards slightly.  The lamina and spinous process is normal.\n\nA further oblique fracture is noted to the C7 spinous process. Minimal displacement noted.\n\nSoft tissue windows show hyperdensity in the region of the posterior longitudinal ligament extending from C2 to C5 level, suggestive of an epidural haematoma. This appears to be compromising the spinal canal space.\n\nIn addition to management of other traumatic injuries, the patient requires careful attention to spinal protection and transfer to a spinal unit.  These images do not explain the patient's symptomatology, and further investigation of the spine is warranted (in this case a burst fracture of T5 was noted).  Careful clinical examination for signs of higher cord compression is essential, as this may mandate evacuation of the extradural haematoma.  The issue of steroids, especially in patients with concommitant brain injuries, remains controversial.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20119.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20216.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2039.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2046.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2054.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2061.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2071.JPG"], "cat": "CT"}, {"q": "A 40 year old male is brought to ED following a high speed MVA.  The driver of the car was killed in the accident, and the patient has severe chest injuries.  He is intubated and sent for CT scanning.\n\nDescribe the features of the CT brain", "a": "The CT is a non contast image from vertex to foramen magnum.\n\nThere is no focal abnormality of the brain tissue seen.  There is no intra-cranial haemorrhage or haematoma, nor any evidence of brain oedema. \n\nThe study is essentially normal.\n\nThere is a small fluid level in the left frontal sinus which may be related to an unseen fracture.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20120.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20217.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20310.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2047.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2055.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2062.JPG"], "cat": "CT"}, {"q": "A 69 year old female is in intensive care following repair of a perforated malignancy of her caecum.  She describes shortness of breath on day 2 post op, and she has increasing oxygen requirements.\n\nDescribe the features of her chest xray.", "a": "The xray is poorly inspired and is performed supine.\n\nThere is a right internal jugular central line in situ.\n\nHazy homogenous opacity overlies both lung fields, with obliteration of the diaphragmatic silhoutte.  This represents a combination of moderate sized pleural effusions and bibasal collapse.  The cardiac diameter looks enlarged but this may be due to projection and underinspiration.\n\nThe appearance of this xray is common in sick ICU patients.  Pleural effusions may occur due to hypoproteinaemia, leaky capillaries and poor cardiac performance.  Basal atelectasis is common due to lack of movement, poor inspiration due to pain and other insults, and because of diaphragmatic splinting due to abdominal pathology.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bilateral%20effusions%20and%20collapse.jpg"], "cat": "X-Ray"}, {"q": "A 30 year old woman has a prolonged cardiac arrest following an amniotic fluid embolism.  She is intubated in intensive care, has a GCS of 3 without sedation for 2 days.\n\nA CT scan is performed.  Describe the features.", "a": "There is evidence of severe cerebral oedema and intracranial hypertension.  There is total loss of grey/white matter differentiation noted in both the cerebral and cerebellar hemispheres.  Effacement of the sulci, lateral , 3rd and 4th ventricles are noted with non visualisation of the basal cisterns suggesting severe cerebral oedema. There is no evidence of intracerebral haemorrhage visualised.\n\nThese findings are in keeping with severe hypoxic ischaemic encephalopathy and a good neurological outcome is impossible.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20121.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20218.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20311.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2048.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2056.JPG"], "cat": "CT"}, {"q": "A 22 year old female has an out of hospital arrest due to profound sepsis.  After extensive and prolonged cardiopulmonary resuscitation, she regains a spontaneous cardiac output.  She is on very high doses of inotropic agents and is on a FiO2 of 1.0.\n\nThe following CXR is taken.  Describe the findings.", "a": "There is marked opacity of both lungs.  The costophrenic angles are clear, which excludes pleural effusions as a cause of this picture.  Given the clinical history, severe alveolar oedema is the cause (in this case, Acute Respiratory Distress Syndrome or ARDS).\n\nThe patient is intubated, has a nasogastric tube and has ECG leads on.  The tip of a misplaced Intra-aortic Balloon Pump (IABP) can be seen in the right atrium.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/severe%20ARDS%201.jpg"], "cat": "ABG"}, {"q": "Please comment on the following CT scan, taken in a 60 year old women with breathlessness and fever", "a": "Post-contrast CT scan of the neck has been performed.\n\nA large  retropharyngeal soft tissue density measuring 9.0 x 2.7cm at the level of the hyoid bone and 18.0cm craniocaudally is present. High attenuating material seen in the postero inferior aspect is suggestive of blood/blood products, and is consistent with a retropharyngeal haematoma. Evidence of septation is present. The larynx and pharynx are compressed anteriorly. An endotracheal tube and a left central venous line are noted in situ.\n \n\nAppearances may represent an organising and resolving retropharyngeal haematoma. The clinical report of fever raises the possibility of infection and abscess formation", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/neckhaem1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/neckhaem2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/neckhaem3.jpg"], "cat": "CT"}, {"q": "You are called to review a 55 yr old man who has been struck by a 4WD while riding a push-bike. Their is no loss of consciousness, and he is reporting abdominal and chest pain.\n\nPlease comment on the following CT scan", "a": "Contrast CT abdomen\n\nBoth kidneys are enlarged with multiple large cysts, consistent with polycystic disease. Fluid-fluid levels are demonstrated in a cyst in the midpole of the right kidney and left kidney,probably due to haemorrhage.\n\nSubtle hypodensity in the anterior aspect of the spleen, linear hypodensity in the body of the spleen, and irregular margin inferiorly is suspicious for minor splenic injury. Haemorrhage is noted posterior to the spleen. A trace of fluid in the left paracolic gutter, and adjacent to the psoas is also noted, with a small amount of fluid in the pelvis. No evidence of free intra-abdominal gas.\n\nThere is no evidence of extravasation of contrast suggestive of an injury to the drainage system. Good excretion of contrast is demonstrated, despite gross bilateral cysts.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/chesttrauma1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/chesttrauma2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/chesttrauma3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/chesttrauma4.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/chesttrauma5.jpg"], "cat": "CT"}, {"q": "You are called to the ED to review a 75 year old previously independant woman who has presented with GCS12/15 then had a self-limiting seizure. CT brain is normal. On examination she appears euvolaemic. Medications include carbimazole, hydrochlorthiazide, atenolol, and fosinopril.\n\n1. Comment on the following biochemistry\n\n2. What is the osmolar gap?\n\n                   Plasma\t              Plasma\nSodium\t108 mmol/L\tCortisol\t1300 nmol/L\nPotassium\t3.1   mmol/L\tOsmolality\t242 mmol/kg\nChloride\t72 mmol/L\t \t \nBicarbonate\t21 mmol/L\t                  Urine\nUrea\t4.0 mmol/L\tOsmolality\t 502 mmol/kg\nCreatinine\t75 umol/L\tSodium\t94 mmol/L\nGlucose\t12 mmol/L\t \t \n\n3. What are the likely aetiologies?\n\n4. Outline your immediate management plan?", "a": "1. Comment on the following biochemistry\n\nHypo-osmolar hyponatraemia with inappropriately concentrated urine and increased urinary sodium\n\n2. What is the osmolar gap?\n\nOsmolar gap = measured osmo - calculated osmo (2 x Na + urea + glucose)= 242 - 232 = 10 mmol/L. There is not a large increase in unmeasured osmolar substances\n\n3. What are the likely aetiologies?\n\nPatient fits the category of euvolaemic, hypo-osmolar, hypontraemia with urinary Na> 20 mmol/L. The possible aetiologies are SIADH, drugs (includes thiazides), chronic renal failure, hypothyroidism and cortisol deficiency. She does not have evidence of the latter two.\n\nAs she is taking thiazides and carbimazole (antithyroid), it is possible that these have contributed to her condition. SiADH is a possible diagnosis, but requires the exclusion of other aetiologies.\n\n4. Outline your immediate management plan?\n\nResuscitation\nConsider risk of osmotic adaptation\nCentral pontine myelinolysis\nTraditionally said to be due to sudden correction leading to shift water out of brain\u2019\nHowever many patients with rapid correction hyponatraemia have not had morbidity\nMost cases CPM not associated hyponatraemia but other medical conditions\nHyponatraemic patients with CPM appear to be those with associated hypoxia, or with chronic hyponatraemia suddenly corrected\nRate / degree of correction:\nChronic:\nOnset <0.5 mmol/l/hr\n+/- symptoms\nslow correction\nusually water restrict, stop thiazide diuretics\nmaximum 0.5 mmol/l/hr in 1st 24 hrs, 0.3 mmol/l/hr thereafter.\nAcute :\nOnset > 0.5 mmol/l/hr\nSymptomatic ++\nTolerate rapid correction\nN.Saline, hypertonic saline, frusemide\nNot seizing - maximum 20 mmol/l in 24 hrs. Less than 1mmol/l/hr.\nSeizures \u2013 bolus hypertonic saline, eg 3% 100-200mls (0.5mm/ml) until seizing stops increase Na by 2mmol/hr up to 120 mm, then slow down as above.", "imgs": [], "cat": "Biochemistry"}, {"q": "A 55 year old man is brought to ED early one morning after being found unconscious in bed by his wife.  He has irregular snoring respirations.  There is no sign of an apparent cause (drugs, trauma etc).\n\nHe is reported to have a GCS of 5 prior to intubation and \"no focal neurological signs\".  Your registrar reports that his CT is normal.\n\nIs it?\n\nWhat will you do now?", "a": "No, its not!\n\nThebasilar artery and left vertebral artery are hyperdense.  This change extends into the posterior cerebral artery, and is likely to represent clot.  There is no evidence of structural brain injury at this point.\n\nAfter basic supportive care, further information should be sought.  A thorough neurological examination is required, particularly looking at signs of brainstem function.  Further imaging with MRI / MRA is indicated to confirm the diagnosis and quantify extent of injury.\n\nIn this case, MRI confirmed thrombosis and severe brainstem infarction.  Thrombolysis was not contemplated as the time of onset was unknown.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20122.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20219.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20312.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2049.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%2057.JPG"], "cat": "CT"}, {"q": "A 55 yr old alcoholic male with severe community-acquired pneumonia has been ventilated in your ICU for 5 days. For the last 2 days he has had a chest-drained inserted and it is bubbling continuously. He has a tracheostomy, but on emergence from sedation is agitated, tachypneic (40 bpm), with expired tidal volumes of 250ml with ventilator settings PEEP 8cmH2O, PS 12 cmH2O. Despite this he has adequate gas exchange (FiO2 0.4, PaCO2 45 mmHg, PaO2 80 mmHg)\n\n1. Describe the changes in the following CT\n\n2. What factors may be contributing to his failure to wean from ventilation\n\n3. Outline your ventilatory strategy from here", "a": "1. Describe the changes in the following CT\n\nMediastinal structures are midline. There is a large left-sided pneumothorax with marked collapse of the left lung. There is also associated dense opacity in the left lower lobe. Two intercostal drains are present, one lying posteriorly to the apex and surrounded by pleural fluid. The second is lying anteriorly in the pneumothorax that extends to the level of the apex. A tracheostomy  lies with its tip above the carina. There is extensive subcutaneous emphysema over the left chest wall. The right lung shows widespread emphysematous change but no evidence of any pneumothorax. There is confluent opacity in the apical segment of the right lower lobe. This may represent consolidation /pneumonia but further review is warranted.\n\n2. What factors may be contributing to his failure to wean from ventilation\n\nNeurological\n\nthe emergence from sedation in an agitated state may represent encephalopathy/ delirium of mutlifactorial origin inclduing sepsis, alcohol withdrawal, hepatic failure, or ischaemic injury if there has been hypoxia or hypotension.\n\nRespiratory:\n\nsevere underlying bullous emphysema, which will be associated with decreased respiratory reserve\nongoing consolidation\nbronchopleural fistula  and persistent lung collpase: the inability to reinflate the lung despite adequate drain position, continuous air leak is consistent with bronchopleural fistula. This may explain partly the reduced expiratory tidal volume\n\nOther: factors including muscle weakness, cardiac dysfunction, raised abdominal pressure due to ascites should be considered.\n\n3. Outline your ventilatory strategy from here:\n\nThe major issue appears to be the management of bronchopleural fistula in a patient with severe underlying bullous emphysema.\n\nMaintain gas exchange:The patients gas exchange is adequate, suggesting that other therapies (eg Isolated lung techniques,HFV, ECMO) may not be indicated from a ventilation persepctive\nReduce air leak / expand lung: theoretically reducing PS, PEEP, and aiming for negative pressure ventilation will help reduce air leak. This is made difficult in the setting of agitation and tachypnoea. Treating co-exisitng co", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/bullaeptx1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/bullaeptx2.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/bullaeptx3.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/bullaeptx4.jpg"], "cat": "ABG"}, {"q": "Describe the presence and progression of abnormalities in the following 2 X-rays taken 5 days apart", "a": "The first X-ray shows extensive consolidation throughout the left lung and at the right base. The right mid and upper zone are spared. No pleural fluid is demonstrated. Paucity of lung markings in the upper zones suggest underlying emphysema. There is no ETT present\n\nThe second X-ray shows a moderate sized left pneumothorax , with lung edge separation measuring 3.5 cm in the upper zone. The pneumothorax is associated with partial atelectasis of the left lung, associated with increased radio density. No significant midline shift is identified. Two intercostal chest drains can be seen in the left chest, both terminating in the left apical region. Presence of a left internal jugular central line, with its tip in the SVC. For the right lung, there is a patch of ill-defined alveolar shadowing detected in the right lower zone. An ETT (tracheostomy) is present.\n\nThe progression is consistent with partial resolution of severe pneumonia with underlying bullous emphysema, complicated by left-sided pneumothorax in the setting of ventilatory support. The lung remains uninflated despite the presence of 2 ICC's, suggesting inadeqaute drainage system or the presence of a bronchopleural fistula", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/pneumwint1.jpg", "https://djb9j7fyr9fnv.cloudfront.net/media/ptxwint1.jpg"], "cat": "X-Ray"}, {"q": "A 23 year old female is intubated in ICU following a severe drug overdose.  She has a GCS of 3 and is not breathing independently.\n\nThe following scan is obtained.\n\nWhat is the scan?  What does it show?  What would you do now?", "a": "The scan is a CT cerebral angiogram. \n\nThere is good opacification noted of the aortic arch and its branches.  These branches can be followed into the base of the skull, but the left internal carotid beyond the base of skull is not opacified. The right internal carotid artery is opacified but attenuated in size. Distally there is opacification of the right middle cerebral artery in its proximal and mid portions up to the proximal sylvian fissure, but it extends no further.  There is some opacification noted of the left middle cerebral artery and the proximal anterior cerebral arteries, due to collateral flow from the right side.  The terminal portions of both the vertebral arteries are not opacified, nor is the basilar artery or the posterior system.\n\nMarked cerebral oedema changes are noted in the brain.\n\n \n\nThe CT demonstrates severe cerebral oedema with obstruction of almost all the major arteries - the patient's prognosis is abysmal.  CT angiography is usually performed in this circumstance to confirm braindeath, which is considered proven if there is no flow in the major arteries.  This is not the case in this patient.\n\nThe outlook for this patient is abysmal but the scan does not confirm braindeath.  If this diagnosis is required, clinical criteria, or alternate scanning (scintilography) can be performed.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20123.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20220.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20313.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20410.JPG"], "cat": "Biochemistry"}, {"q": "A 31 year old female presents with severe peritonitis following a perforated appendicitis.  She develops respiratory failure requiring intubation.  During CT scanning of her abdomen, her chest was also scanned.\n\nWhat does the CT show?  What intervention is required?", "a": "The CT shows lung windows from apex to bases.  There is marked ground glass inflitrate predominantly in the dependent areas and perihilar regions.  This is consistent with pulmonary oedema and may be due to cardiac dysfunction or Acute Respiratory Distress Syndrome.  Moderate sized effusions are noted bilaterally and there is minor atelectasis of the left base.\n\nImportantly, the endotracheal tube has migrated into the right main bronchus.  It needs to be withdrawn into the trachea.  Supportive care, including a low volume ventilation strategy is required, as well as agressive source control.", "imgs": ["https://djb9j7fyr9fnv.cloudfront.net/media/composite%20124.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20221.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20314.JPG", "https://djb9j7fyr9fnv.cloudfront.net/media/composite%20411.JPG"], "cat": "X-Ray"}, {"q": "A 34 year old female is brought into ED in cardiac arrest following a quinidine overdose.  After prolonged resuscitation she is intubated and ventilated.  She requires
